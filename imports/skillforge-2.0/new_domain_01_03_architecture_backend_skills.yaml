      - name: "E-commerce Lakehouse"
        user: "We want to build a lakehouse for our e-commerce data. We have order events, product catalog, and customer data. Should we use Delta Lake or Iceberg?"
        ai_response: |
          ## E-commerce Lakehouse Architecture
          
          ### Table Format Comparison
          
          | Feature | Delta Lake | Apache Iceberg |
          |---------|------------|----------------|
          | ACID | Yes | Yes |
          | Time Travel | Yes | Yes |
          | Schema Evolution | Yes | Yes (better) |
          | Partition Evolution | Limited | Yes |
          | Hidden Partitioning | No | Yes |
          | Community | Databricks-led | Vendor-neutral |
          
          **Recommendation: Apache Iceberg** for partition evolution and vendor neutrality
          
          ### Medallion Architecture
          
          ```
          ┌─────────────────────────────────────────────────────────┐
          │  BRONZE (Raw)                                           │
          │  - Raw ingested data                                    │
          │  - Schema on read                                       │
          │  - Retention: 30 days                                   │
          └─────────────────────────┬───────────────────────────────┘
                                    │
                                    ▼
          ┌─────────────────────────────────────────────────────────┐
          │  SILVER (Cleaned)                                       │
          │  - Deduplicated, validated                              │
          │  - Enriched with reference data                         │
          │  - Retention: 90 days                                   │
          └─────────────────────────┬───────────────────────────────┘
                                    │
                                    ▼
          ┌─────────────────────────────────────────────────────────┐
          │  GOLD (Aggregated)                                      │
          │  - Business-level aggregations                          │
          │  - Optimized for analytics                              │
          │  - Retention: Indefinite                                │
          └─────────────────────────────────────────────────────────┘
          ```
          
          ### Bronze Layer (Raw Events)
          ```sql
          -- Create bronze table for order events
          CREATE TABLE bronze.order_events (
            event_id STRING,
            event_type STRING,
            order_id STRING,
            customer_id STRING,
            event_timestamp TIMESTAMP,
            payload STRING  -- Raw JSON
          )
          PARTITIONED BY (days(event_timestamp))
          TBLPROPERTIES (
            'format-version' = '2',
            'write_compression' = 'ZSTD'
          );
          
          -- Ingest from Kafka
          INSERT INTO bronze.order_events
          SELECT 
            event_id,
            event_type,
            order_id,
            customer_id,
            event_timestamp,
            to_json(payload) as payload
          FROM kafka_order_stream;
          ```
          
          ### Silver Layer (Cleaned)
          ```sql
          -- Create silver orders table with deduplication
          CREATE TABLE silver.orders (
            order_id STRING,
            customer_id STRING,
            order_date DATE,
            total_amount DECIMAL(10,2),
            status STRING,
            items ARRAY<STRUCT<
              product_id: STRING,
              quantity: INT,
              price: DECIMAL(10,2)
            >>,
            processed_at TIMESTAMP
          )
          PARTITIONED BY (order_date)
          TBLPROPERTIES (
            'format-version' = '2'
          );
          
          -- Deduplicate and clean
          MERGE INTO silver.orders t
          USING (
            SELECT *
            FROM (
              SELECT *,
                ROW_NUMBER() OVER (
                  PARTITION BY order_id 
                  ORDER BY event_timestamp DESC
                ) as rn
              FROM bronze.order_events
              WHERE event_type = 'OrderCreated'
            )
            WHERE rn = 1
          ) s
          ON t.order_id = s.order_id
          WHEN NOT MATCHED THEN INSERT *;
          ```
          
          ### Gold Layer (Aggregated)
          ```sql
          -- Daily order metrics
          CREATE TABLE gold.daily_order_metrics (
            order_date DATE,
            total_orders BIGINT,
            total_revenue DECIMAL(12,2),
            avg_order_value DECIMAL(10,2),
            unique_customers BIGINT
          )
          PARTITIONED BY (order_date);
          
          -- Populate gold table
          INSERT INTO gold.daily_order_metrics
          SELECT 
            order_date,
            COUNT(*) as total_orders,
            SUM(total_amount) as total_revenue,
            AVG(total_amount) as avg_order_value,
            COUNT(DISTINCT customer_id) as unique_customers
          FROM silver.orders
          GROUP BY order_date;
          ```
          
          ### Optimization
          ```sql
          -- Compact small files
          OPTIMIZE silver.orders REWRITE DATA 
            USING BIN_PACK
            WHERE order_date < current_date() - INTERVAL '7' DAY;
          
          -- Z-order for multi-column filtering
          OPTIMIZE silver.orders REWRITE DATA 
            USING ZORDER (customer_id, order_date);
          
          -- Time travel query
          SELECT * FROM silver.orders
          FOR SYSTEM_TIME AS OF TIMESTAMP '2024-01-15 00:00:00';
          ```

          // State backend
          env.setStateBackend(new RocksDBStateBackend("hdfs://checkpoints"));
          
          // Parallelism
          env.setParallelism(12);
          ```
          
          ### Expected Latency
          - End-to-end latency: <100ms (p99)
          - Processing latency: <50ms (p99)
          - Throughput: 100K+ events/second

      - name: "Collaborative Document Editor"
        user: "We're building a collaborative document editor like Google Docs. Multiple users can edit simultaneously. How do we use CRDTs to merge changes automatically?"
        ai_response: |
          ## Collaborative Document with CRDTs
          
          ### CRDT Selection
          
          | Data Structure | CRDT Type | Use Case |
          |----------------|-----------|----------|
          | Document text | RGA (Replicated Growable Array) | Character sequence |
          | Cursor positions | LWW-Register | Single value |
          | User presence | OR-Set | Online users |
          | Document metadata | LWW-Map | Key-value pairs |
          
          ### RGA (Replicated Growable Array) for Text
          ```typescript
          // RGA Node - Each character is a node with unique ID
          interface RGANode {
            id: NodeId;           // Unique identifier (actorId + sequence)
            visible: boolean;     // Tombstone for deleted characters
            value: string;        // Single character
            parent: NodeId | null; // Parent node for ordering
            timestamp: number;    // Lamport timestamp
          }
          
          interface NodeId {
            actorId: string;      // Unique per client
            sequence: number;     // Monotonic per actor
          }
          
          class RGADocument {
            private nodes: Map<string, RGANode> = new Map();
            private root: NodeId = { actorId: 'root', sequence: 0 };
            private localSequence = 0;
            
            constructor(private actorId: string) {}
            
            // Insert character at position
            insert(index: number, char: string): RGANode {
              this.localSequence++;
              const newNodeId: NodeId = {
                actorId: this.actorId,
                sequence: this.localSequence
              };
              
              // Find parent node (node before insertion point)
              const visibleNodes = this.getVisibleNodes();
              const parentId = index > 0 
                ? visibleNodes[index - 1].id 
                : this.root;
              
              const newNode: RGANode = {
                id: newNodeId,
                visible: true,
                value: char,
                parent: parentId,
                timestamp: Date.now()
              };
              
              this.nodes.set(this.nodeIdToString(newNodeId), newNode);
              return newNode;
            }
            
            // Delete character at position (tombstone)
            delete(index: number): RGANode {
              const visibleNodes = this.getVisibleNodes();
              const nodeToDelete = visibleNodes[index];
              
              if (!nodeToDelete) {
                throw new Error('Invalid index');
              }
              
              nodeToDelete.visible = false;
              return nodeToDelete;
            }
            
            // Merge remote changes (CRDT merge)
            merge(remoteNodes: RGANode[]): void {
              for (const remoteNode of remoteNodes) {
                const nodeId = this.nodeIdToString(remoteNode.id);
                const localNode = this.nodes.get(nodeId);
                
                if (!localNode) {
                  // New node, add it
                  this.nodes.set(nodeId, remoteNode);
                } else {
                  // Node exists, merge visibility (LWW)
                  if (remoteNode.timestamp > localNode.timestamp) {
                    localNode.visible = remoteNode.visible;
                    localNode.timestamp = remoteNode.timestamp;
                  }
                }
              }
            }
            
            // Get document text
            toString(): string {
              return this.getVisibleNodes()
                .map(n => n.value)
                .join('');
            }
            
            private getVisibleNodes(): RGANode[] {
              // Sort by parent relationship and timestamp
              const sorted = Array.from(this.nodes.values())
                .filter(n => n.visible)
                .sort((a, b) => {
                  // RGA ordering: parent first, then by timestamp
                  if (this.isAncestor(a.id, b.id)) return -1;
                  if (this.isAncestor(b.id, a.id)) return 1;
                  return a.timestamp - b.timestamp;
                });
              
              return sorted;
            }
            
            private isAncestor(ancestor: NodeId, descendant: NodeId): boolean {
              // Check if ancestor is in descendant's parent chain
              let current = this.nodes.get(this.nodeIdToString(descendant));
              while (current && current.parent) {
                if (this.nodeIdEquals(current.parent, ancestor)) {
                  return true;
                }
                current = this.nodes.get(this.nodeIdToString(current.parent));
              }
              return false;
            }
            
            private nodeIdToString(id: NodeId): string {
              return `${id.actorId}:${id.sequence}`;
            }
            
            private nodeIdEquals(a: NodeId, b: NodeId): boolean {
              return a.actorId === b.actorId && a.sequence === b.sequence;
            }
          }
          ```
          
          ### PN-Counter for Character Count
          ```typescript
          class PNCounter {
            private increments: Map<string, number> = new Map();
            private decrements: Map<string, number> = new Map();
            
            constructor(private actorId: string) {}
            
            increment(): void {
              const current = this.increments.get(this.actorId) || 0;
              this.increments.set(this.actorId, current + 1);
            }
            
            decrement(): void {
              const current = this.decrements.get(this.actorId) || 0;
              this.decrements.set(this.actorId, current + 1);
            }
            
            get value(): number {
              const totalInc = Array.from(this.increments.values())
                .reduce((a, b) => a + b, 0);
              const totalDec = Array.from(this.decrements.values())
                .reduce((a, b) => a + b, 0);
              return totalInc - totalDec;
            }
            
            merge(other: PNCounter): void {
              // Merge increments (G-Counter merge)
              for (const [actor, count] of other.increments) {
                const current = this.increments.get(actor) || 0;
                this.increments.set(actor, Math.max(current, count));
              }
              
              // Merge decrements (G-Counter merge)
              for (const [actor, count] of other.decrements) {
                const current = this.decrements.get(actor) || 0;
                this.decrements.set(actor, Math.max(current, count));
              }
            }
          }
          ```
          
          ### OR-Set for Active Users
          ```typescript
          class ORSet<T> {
            private elements: Map<T, Set<string>> = new Map(); // value -> tags
            private tombstones: Set<string> = new Set();       // removed tags
            
            add(value: T, tag: string): void {
              if (this.tombstones.has(tag)) return;
              
              if (!this.elements.has(value)) {
                this.elements.set(value, new Set());
              }
              this.elements.get(value)!.add(tag);
            }
            
            remove(value: T): void {
              const tags = this.elements.get(value);
              if (tags) {
                for (const tag of tags) {
                  this.tombstones.add(tag);
                }
                this.elements.delete(value);
              }
            }
            
            has(value: T): boolean {
              return this.elements.has(value);
            }
            
            get values(): T[] {
              return Array.from(this.elements.keys());
            }
            
            merge(other: ORSet<T>): void {
              // Merge tombstones
              for (const tag of other.tombstones) {
                this.tombstones.add(tag);
              }
              
              // Merge elements (excluding tombstoned tags)
              for (const [value, tags] of other.elements) {
                for (const tag of tags) {
                  if (!this.tombstones.has(tag)) {
                    this.add(value, tag);
                  }
                }
              }
            }
          }
          ```
          
          ### Usage Example

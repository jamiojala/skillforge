      primary_model: "claude-sonnet-4"
      secondary_model: "claude-haiku"
      fallback_model: "gpt-4o"
    
    validation:
      hooks:
        - hook_id: "transactional-outbox-check"
          description: "Ensures outbox writes are transactional"
    

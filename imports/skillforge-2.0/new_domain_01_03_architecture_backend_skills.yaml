    examples:
      - name: "Order Processing Saga"
        user: "We need to implement an order processing flow that reserves inventory, processes payment, and creates a shipment. How do we handle failures?"
        ai_response: |
          ## Order Processing Saga Design
          
          ### Saga Steps
          
          | Step | Service | Action | Compensation |
          |------|---------|--------|--------------|
          | 1 | Order Service | Create Order | Cancel Order |
          | 2 | Inventory Service | Reserve Inventory | Release Reservation |
          | 3 | Payment Service | Process Payment | Refund Payment |
          | 4 | Shipping Service | Create Shipment | Cancel Shipment |
          
          ### Orchestration Approach
          
          ```typescript
          class OrderProcessingSaga {
            private state: SagaState;
            
            async execute(orderRequest: OrderRequest): Promise<void> {
              try {
                // Step 1: Create Order
                const order = await this.orderService.createOrder(orderRequest);
                this.state.addStep('CREATE_ORDER', order.id);
                
                // Step 2: Reserve Inventory
                const reservation = await this.inventoryService.reserve({
                  orderId: order.id,
                  items: order.items
                });
                this.state.addStep('RESERVE_INVENTORY', reservation.id);
                
                // Step 3: Process Payment
                const payment = await this.paymentService.charge({
                  orderId: order.id,
                  amount: order.total,
                  paymentMethod: order.paymentMethod
                });
                this.state.addStep('PROCESS_PAYMENT', payment.id);
                
                // Step 4: Create Shipment
                const shipment = await this.shippingService.createShipment({
                  orderId: order.id,
                  address: order.shippingAddress,
                  items: order.items
                });
                this.state.addStep('CREATE_SHIPMENT', shipment.id);
                
                // Complete saga
                await this.orderService.markComplete(order.id);
                
              } catch (error) {
                // Compensation on failure
                await this.compensate();
                throw error;
              }
            }
            
            private async compensate(): Promise<void> {
              // Compensate in reverse order
              for (const step of this.state.getCompletedSteps().reverse()) {
                try {
                  switch (step.name) {
                    case 'CREATE_SHIPMENT':
                      await this.shippingService.cancelShipment(step.resultId);
                      break;
                    case 'PROCESS_PAYMENT':
                      await this.paymentService.refund(step.resultId);
                      break;
                    case 'RESERVE_INVENTORY':
                      await this.inventoryService.releaseReservation(step.resultId);
                      break;
                    case 'CREATE_ORDER':
                      await this.orderService.cancelOrder(step.resultId);
                      break;
                  }
                } catch (compError) {
                  // Log for manual intervention
                  await this.alertManualIntervention(step, compError);
                }
              }
            }
          }
          ```
          
          ### State Machine
          ```
          [START] -> CREATING_ORDER -> RESERVING_INVENTORY -> PROCESSING_PAYMENT -> CREATING_SHIPMENT -> [COMPLETED]
                                            |                       |                      |
                                            v                       v                      v
                                      [COMPENSATING] <----------------------------------------
                                            |
                                            v
                                      [FAILED]
          ```
          
          ### Compensation Failure Handling
          ```typescript
          class CompensationFailureHandler {
            async handle(failedStep: SagaStep, error: Error): Promise<void> {
              // 1. Log to dead letter queue
              await this.dlq.publish({
                sagaId: this.state.id,
                failedStep,
                error: error.message,
                timestamp: new Date()
              });
              
              // 2. Alert operations team
              await this.pagerDuty.alert({
                severity: 'critical',
                message: `Saga compensation failed for ${failedStep.name}`,
                context: this.state
              });
              
              // 3. Mark saga as requiring manual intervention
              await this.state.markManualInterventionRequired();
            }
          }
          ```
        notes: "Complete saga implementation with compensation logic and failure handling"
    

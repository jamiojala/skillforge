    examples:
      - name: "Shopping Cart with Eventual Consistency"
        user: "We have a shopping cart service replicated across 3 regions. Users can update carts from any region. How do we handle conflicts when the same item is modified in different regions?"
        ai_response: |
          ## Shopping Cart with Eventual Consistency
          
          ### Consistency Model
          
          **Chosen: Eventual Consistency with Vector Clocks**
          
          Reasons:
          - High availability required (cart must work during partitions)
          - Cross-region replication
          - Conflicts can be resolved (merge cart items)
          - Temporary inconsistency acceptable
          
          ### Data Model
          ```typescript
          interface ShoppingCart {
            cartId: CartId;
            customerId: CustomerId;
            items: Map<ProductId, CartItem>;
            version: VectorClock;
            lastModified: Date;
            region: Region;
          }
          
          interface CartItem {
            productId: ProductId;
            quantity: number;
            addedAt: Date;
            version: VectorClock;
          }
          
          // Vector clock for causality tracking
          interface VectorClock {
            [region: string]: number;
          }
          ```
          
          ### Vector Clock Implementation
          ```typescript
          class VectorClock {
            private clock: Map<string, number> = new Map();
            
            increment(region: string): void {
              const current = this.clock.get(region) || 0;
              this.clock.set(region, current + 1);
            }
            
            merge(other: VectorClock): void {
              for (const [region, timestamp] of other.clock) {
                const current = this.clock.get(region) || 0;
                this.clock.set(region, Math.max(current, timestamp));
              }
            }
            
            compare(other: VectorClock): 'before' | 'after' | 'concurrent' | 'equal' {
              let hasGreater = false;
              let hasLess = false;
              
              const allRegions = new Set([
                ...this.clock.keys(),
                ...other.clock.keys()
              ]);
              
              for (const region of allRegions) {
                const thisValue = this.clock.get(region) || 0;
                const otherValue = other.clock.get(region) || 0;
                
                if (thisValue > otherValue) hasGreater = true;
                if (thisValue < otherValue) hasLess = true;
              }
              
              if (hasGreater && hasLess) return 'concurrent';
              if (hasGreater) return 'after';
              if (hasLess) return 'before';
              return 'equal';
            }
          }
          ```
          
          ### Conflict Detection
          ```typescript
          class CartConflictDetector {
            detectConflict(
              localCart: ShoppingCart,
              remoteCart: ShoppingCart
            ): Conflict | null {
              const comparison = localCart.version.compare(remoteCart.version);
              
              if (comparison === 'concurrent') {
                // Find conflicting items
                const conflicts: ItemConflict[] = [];
                
                for (const [productId, localItem] of localCart.items) {
                  const remoteItem = remoteCart.items.get(productId);
                  
                  if (remoteItem) {
                    const itemComparison = localItem.version.compare(remoteItem.version);
                    
                    if (itemComparison === 'concurrent') {
                      conflicts.push({
                        productId,
                        localQuantity: localItem.quantity,
                        remoteQuantity: remoteItem.quantity,
                        localVersion: localItem.version,
                        remoteVersion: remoteItem.version
                      });
                    }
                  }
                }
                
                if (conflicts.length > 0) {
                  return {
                    type: 'CONCURRENT_UPDATE',
                    cartId: localCart.cartId,
                    conflicts
                  };
                }
              }
              
              return null;
            }
          }
          ```
          
          ### Conflict Resolution
          ```typescript
          class CartConflictResolver {
            resolve(
              localCart: ShoppingCart,
              remoteCart: ShoppingCart,
              conflict: Conflict
            ): ShoppingCart {
              // Strategy: Max quantity wins for each item
              const mergedItems = new Map(localCart.items);
              
              for (const itemConflict of conflict.conflicts) {
                const resolvedQuantity = Math.max(
                  itemConflict.localQuantity,
                  itemConflict.remoteQuantity
                );
                
                mergedItems.set(itemConflict.productId, {
                  productId: itemConflict.productId,
                  quantity: resolvedQuantity,
                  addedAt: new Date(),
                  version: this.mergeVectorClocks(
                    itemConflict.localVersion,
                    itemConflict.remoteVersion
                  )
                });
              }
              
              // Add items only in remote cart
              for (const [productId, remoteItem] of remoteCart.items) {
                if (!localCart.items.has(productId)) {
                  mergedItems.set(productId, remoteItem);
                }
              }
              
              return {
                ...localCart,
                items: mergedItems,
                version: this.mergeVectorClocks(
                  localCart.version,
                  remoteCart.version
                ),
                lastModified: new Date()
              };
            }
            
            private mergeVectorClocks(a: VectorClock, b: VectorClock): VectorClock {
              const merged = new VectorClock();
              merged.merge(a);
              merged.merge(b);
              return merged;
            }
          }
          ```
          
          ### Replication with Conflict Handling
          ```typescript
          class CartReplicationService {
            constructor(
              private localStore: CartStore,
              private remoteStores: CartStore[],
              private conflictDetector: CartConflictDetector,
              private conflictResolver: CartConflictResolver
            ) {}
            
            async replicateToRegion(
              cartId: CartId,
              targetRegion: Region
            ): Promise<void> {
              const localCart = await this.localStore.get(cartId);
              const remoteStore = this.remoteStores.find(
                r => r.region === targetRegion
              );
              
              if (!remoteStore) {
                throw new Error(`Unknown region: ${targetRegion}`);
              }
              
              const remoteCart = await remoteStore.get(cartId);
              
              if (remoteCart) {
                const conflict = this.conflictDetector.detectConflict(
                  localCart,
                  remoteCart
                );
                
                if (conflict) {
                  // Resolve conflict
                  const resolved = this.conflictResolver.resolve(
                    localCart,
                    remoteCart,
                    conflict
                  );
                  
                  // Log conflict for monitoring
                  await this.logConflict(conflict, resolved);
                  
                  // Save resolved cart
                  await remoteStore.save(resolved);
                } else {
                  // No conflict, apply if newer
                  const comparison = localCart.version.compare(remoteCart.version);
                  if (comparison === 'after') {
                    await remoteStore.save(localCart);
                  }
                }
              } else {
                // Cart doesn't exist remotely, create it
                await remoteStore.save(localCart);
              }
            }
          }
          ```
          
          ### Monitoring
          ```typescript
          // Track replication lag and conflicts
          interface ReplicationMetrics {
            replicationLag: Histogram;  // Time to replicate
            conflictRate: Counter;      // Conflicts per minute
            conflictResolutionTime: Histogram;
            readRepairCount: Counter;
          }
          
          // Alert on high conflict rate
          if (conflictRate > 10) {
            alert('High conflict rate detected');
          }
          ```

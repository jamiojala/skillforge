    examples:
      - name: "E-commerce Data Mesh"
        user: "We have a centralized data warehouse that's becoming a bottleneck. Our teams (Orders, Inventory, Customers) all depend on the data team. How do we implement data mesh?"
        ai_response: |
          ## Data Mesh Implementation for E-commerce
          
          ### Domain Analysis
          
          | Domain | Team | Data Products | Consumers |
          |--------|------|---------------|-----------|
          | Orders | Order Team | Order Events, Order Analytics | Finance, Marketing |
          | Inventory | Inventory Team | Stock Levels, Availability | Orders, Fulfillment |
          | Customers | Customer Team | Customer 360, Segments | Marketing, Support |
          | Products | Product Team | Product Catalog, Pricing | All domains |
          
          ### Data Product Specification
          ```yaml
          # orders-domain/data-product.yaml
          apiVersion: dataproduct.io/v1
          kind: DataProduct
          metadata:
            name: order-analytics
            domain: orders
            owner: order-team@company.com
            
          spec:
            description: "Analytical view of orders for reporting"
            
            inputPorts:
              - name: order-events
                type: event-stream
                source: kafka://orders-topic
                
            outputPorts:
              - name: order-analytics-table
                type: analytical-table
                location: s3://data-products/orders/analytics/
                format: iceberg
                
            quality:
              - rule: order_id_not_null
                expectation: "Order ID must not be null"
                severity: critical
              - rule: total_positive
                expectation: "Order total must be positive"
                severity: critical
                
            sla:
              freshness: "1 hour"
              availability: "99.9%"
          ```
          
          ### Self-Serve Data Platform
          ```yaml
          # platform-services.yaml
          platform:
            storage:
              - s3://data-products/{domain}/{product}/
              - iceberg format
              
            compute:
              - spark jobs for transformation
              - dbt for modeling
              
            governance:
              - automated quality checks
              - lineage tracking
              - access control
              
            discovery:
              - data catalog (DataHub)
              - data product registry
          ```
          
          ### Federated Governance
          ```yaml
          # governance-policies.yaml
          policies:
            - name: data-classification
              scope: global
              rules:
                - all data must be classified as public/internal/confidential
                
            - name: pii-handling
              scope: global
              rules:
                - pii must be encrypted at rest
                - pii access requires approval
                
            - name: orders-domain-standards
              scope: domain
              domain: orders
              rules:
                - order events must include timestamp
                - order totals must use standardized currency
          ```
          
          ### Implementation Roadmap
          
          **Phase 1 (Months 1-3): Foundation**
          - Set up self-serve platform
          - Implement data catalog
          - Train 2 pilot domain teams
          
          **Phase 2 (Months 4-6): Pilot Domains**
          - Orders domain creates first data products
          - Inventory domain follows
          - Iterate on platform based on feedback
          
          **Phase 3 (Months 7-12): Scale**
          - Roll out to all domains
          - Deprecate centralized ETL jobs
          - Full federated governance
        notes: "Complete data mesh implementation with domains, products, and governance"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "claude-haiku"
      fallback_model: "gpt-4o"
    
    validation:
      hooks:
        - hook_id: "domain-alignment-check"
          description: "Validates data domains align with business domains"
    

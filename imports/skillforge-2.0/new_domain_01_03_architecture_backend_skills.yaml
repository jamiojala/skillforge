        comments: "verbose"
        examples: "always"
    
    examples:
      - name: "Clean User Management"
        user: "We want to refactor our user management module to follow Clean Architecture. Currently it has Express routes directly calling the database."
        ai_response: |
          ## Clean Architecture User Management
          
          ### Layer Structure
          ```
          ┌─────────────────────────────────────────────────────────┐
          │  Frameworks & Drivers (Outer Layer)                      │
          │  - Express Controllers                                   │
          │  - MongoDB Repository                                    │
          │  - JWT Auth Service                                      │
          └─────────────────────────────────────────────────────────┘
                              ▲
                              │ (depends on)
                              │
          ┌─────────────────────────────────────────────────────────┐
          │  Interface Adapters                                      │
          │  - UserController (converts HTTP to use case input)      │
          │  - UserPresenter (formats use case output)               │
          │  - MongoUserRepository (implements repository interface) │
          └─────────────────────────────────────────────────────────┘
                              ▲
                              │ (depends on)
                              │
          ┌─────────────────────────────────────────────────────────┐
          │  Use Cases (Application Business Rules)                  │
          │  - RegisterUserUseCase                                   │
          │  - AuthenticateUserUseCase                               │
          │  - UpdateProfileUseCase                                  │
          └─────────────────────────────────────────────────────────┘
                              ▲
                              │ (depends on)
                              │
          ┌─────────────────────────────────────────────────────────┐
          │  Entities (Enterprise Business Rules)                    │
          │  - User Entity                                           │
          │  - Password Value Object                                 │
          │  - Email Value Object                                    │
          └─────────────────────────────────────────────────────────┘
          ```
          
          ### Entities (Inner Layer - No Dependencies!)
          ```typescript
          // src/entities/user.ts
          export class User {
            constructor(
              public readonly id: UserId,
              public email: Email,
              public password: Password,
              public profile: UserProfile,
              public readonly createdAt: Date,
              public updatedAt: Date
            ) {}
            
            updateEmail(newEmail: Email): User {
              return new User(
                this.id,
                newEmail,
                this.password,
                this.profile,
                this.createdAt,
                new Date()
              );
            }
            
            updateProfile(profile: UserProfile): User {
              return new User(
                this.id,
                this.email,
                this.password,
                profile,
                this.createdAt,
                new Date()
              );
            }
            
            verifyPassword(plainPassword: string, hasher: PasswordHasher): boolean {
              return hasher.verify(plainPassword, this.password.value);
            }
          }
          
          // Value Objects
          export class Email {
            constructor(public readonly value: string) {
              if (!this.isValid(value)) {
                throw new Error('Invalid email');
              }
            }
            
            private isValid(email: string): boolean {
              return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }
          }
          
          export class Password {
            private constructor(public readonly value: string) {}
            
            static create(plainPassword: string, hasher: PasswordHasher): Password {
              if (plainPassword.length < 8) {
                throw new Error('Password must be at least 8 characters');
              }
              return new Password(hasher.hash(plainPassword));
            }
          }
          ```
          
          ### Use Cases (Application Business Rules)
          ```typescript
          // src/usecases/register-user.ts
          export interface RegisterUserInput {
            email: string;
            password: string;
            firstName: string;
            lastName: string;
          }
          
          export interface RegisterUserOutput {
            success: boolean;
            user?: User;
            error?: string;
          }
          
          export class RegisterUserUseCase {
            constructor(
              private userRepository: UserRepository,
              private passwordHasher: PasswordHasher,
              private idGenerator: IdGenerator
            ) {}
            
            async execute(input: RegisterUserInput): Promise<RegisterUserOutput> {
              // Check if email exists
              const existingUser = await this.userRepository.findByEmail(
                new Email(input.email)
              );
              
              if (existingUser) {
                return { success: false, error: 'Email already registered' };
              }
              
              // Create user
              const user = new User(
                this.idGenerator.generate(),
                new Email(input.email),
                Password.create(input.password, this.passwordHasher),
                { firstName: input.firstName, lastName: input.lastName },
                new Date(),
                new Date()
              );
              
              // Save
              await this.userRepository.save(user);
              
              return { success: true, user };
            }
          }
          ```
          
          ### Interface Adapters
          ```typescript
          // src/adapters/controllers/user-controller.ts
          export class UserController {
            constructor(
              private registerUserUseCase: RegisterUserUseCase,
              private userPresenter: UserPresenter
            ) {}
            
            async register(req: Request, res: Response): Promise<void> {
              const input: RegisterUserInput = {
                email: req.body.email,
                password: req.body.password,
                firstName: req.body.firstName,
                lastName: req.body.lastName
              };
              
              const output = await this.registerUserUseCase.execute(input);
              
              if (output.success) {
                res.status(201).json(
                  this.userPresenter.present(output.user!)
                );
              } else {
                res.status(400).json({ error: output.error });
              }
            }
          }
          
          // src/adapters/presenters/user-presenter.ts
          export class UserPresenter {
            present(user: User): UserViewModel {
              return {
                id: user.id.value,
                email: user.email.value,
                firstName: user.profile.firstName,
                lastName: user.profile.lastName,
                createdAt: user.createdAt.toISOString()
              };
            }
          }
          ```
          

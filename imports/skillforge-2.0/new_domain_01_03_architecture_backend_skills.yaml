    response_format:
      structure:
        - "Layer Structure"
        - "Entities Design"
        - "Use Cases"
        - "Interface Adapters"
        - "Frameworks Layer"
      required_elements:
        - "Layer definitions"
        - "Dependency directions"
        - "Boundary interfaces"

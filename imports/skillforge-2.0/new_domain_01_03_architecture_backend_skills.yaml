    examples:
      - name: "Notification Service Ports and Adapters"
        user: "We need to send notifications via email, SMS, and push. We might add more channels later. How do we design this with ports and adapters?"
        ai_response: |
          ## Notification Service with Ports and Adapters
          
          ### Architecture
          ```
                    ┌─────────────────────────────────────┐
                    │      Driving Adapters               │
                    │  ┌──────────┐    ┌──────────┐      │
                    │  │ REST API │    │ CLI Tool │      │
                    │  └────┬─────┘    └────┬─────┘      │
                    └───────┼───────────────┼────────────┘
                            │               │
                            ▼               ▼
          ┌─────────────────────────────────────────────────┐
          │              Application Core                      │
          │         (NotificationService)                      │
          │  ┌──────────────────────────────────────────┐    │
          │  │ Port: NotificationSender (interface)     │    │
          │  │   - send(notification): Promise<void>    │    │
          │  └──────────────────────────────────────────┘    │
          └────────────────────────┬────────────────────────┘
                                   │
                    ┌──────────────┼──────────────┐
                    ▼              ▼              ▼
          ┌──────────────┐ ┌──────────────┐ ┌──────────────┐
          │ EmailAdapter │ │  SMSAdapter  │ │ PushAdapter  │
          │  (SendGrid)  │ │   (Twilio)   │ │  (Firebase)  │
          └──────────────┘ └──────────────┘ └──────────────┘
          ```
          
          ### Port Definition (In Application Core)
          ```typescript
          // src/core/ports/notification-sender.port.ts
          export interface NotificationSender {
            send(notification: Notification): Promise<SendResult>;
            supports(channel: NotificationChannel): boolean;
          }
          
          export interface Notification {
            id: NotificationId;
            channel: NotificationChannel;
            recipient: Recipient;
            content: NotificationContent;
            priority: Priority;
            metadata?: Record<string, unknown>;
          }
          
          export type NotificationChannel = 'email' | 'sms' | 'push';
          
          export interface SendResult {
            success: boolean;
            messageId?: string;
            error?: string;
          }
          ```
          
          ### Application Core
          ```typescript
          // src/core/services/notification.service.ts
          export class NotificationService {
            constructor(
              private senders: NotificationSender[],
              private repository: NotificationRepository,
              private eventBus: EventBus
            ) {}
            
            async send(notification: Notification): Promise<SendResult> {
              // Find appropriate sender
              const sender = this.senders.find(
                s => s.supports(notification.channel)
              );
              
              if (!sender) {
                return {
                  success: false,
                  error: `No sender available for channel: ${notification.channel}`
                };
              }
              
              // Send notification
              const result = await sender.send(notification);
              
              // Persist result
              await this.repository.save({
                ...notification,
                sentAt: new Date(),
                status: result.success ? 'sent' : 'failed',
                error: result.error
              });
              
              // Publish event
              if (result.success) {
                await this.eventBus.publish(
                  new NotificationSentEvent(notification.id)
                );
              }
              
              return result;
            }
            
            async sendToMultiple(
              notifications: Notification[]
            ): Promise<SendResult[]> {
              return Promise.all(
                notifications.map(n => this.send(n))
              );
            }
          }
          ```
          
          ### Driven Adapters
          ```typescript
          // src/adapters/email/sendgrid-adapter.ts
          export class SendGridAdapter implements NotificationSender {
            constructor(private sendgrid: SendGridClient) {}
            
            supports(channel: NotificationChannel): boolean {
              return channel === 'email';
            }
            
            async send(notification: Notification): Promise<SendResult> {
              try {
                const response = await this.sendgrid.send({
                  to: notification.recipient.email,
                  from: 'notifications@example.com',
                  subject: notification.content.title,
                  text: notification.content.body,
                  html: notification.content.htmlBody
                });
                
                return {
                  success: true,
                  messageId: response[0].messageId
                };
              } catch (error) {
                return {
                  success: false,
                  error: error.message
                };
              }
            }
          }
          
          // src/adapters/sms/twilio-adapter.ts
          export class TwilioAdapter implements NotificationSender {
            constructor(private twilio: TwilioClient) {}
            
            supports(channel: NotificationChannel): boolean {
              return channel === 'sms';
            }
            
            async send(notification: Notification): Promise<SendResult> {
              try {
                const message = await this.twilio.messages.create({
                  body: notification.content.body,
                  to: notification.recipient.phone,
                  from: process.env.TWILIO_PHONE_NUMBER
                });
                
                return {
                  success: true,
                  messageId: message.sid
                };
              } catch (error) {
                return {
                  success: false,
                  error: error.message
                };
              }
            }
          }
          
          // src/adapters/push/firebase-adapter.ts
          export class FirebasePushAdapter implements NotificationSender {
            constructor(private firebase: admin.messaging.Messaging) {}
            
            supports(channel: NotificationChannel): boolean {
              return channel === 'push';
            }
            
            async send(notification: Notification): Promise<SendResult> {
              try {
                const response = await this.firebase.send({
                  token: notification.recipient.deviceToken,
                  notification: {
                    title: notification.content.title,
                    body: notification.content.body
                  },
                  data: notification.metadata as { [key: string]: string }
                });
                
                return {
                  success: true,
                  messageId: response
                };
              } catch (error) {
                return {
                  success: false,
                  error: error.message
                };
              }
            }
          }
          ```
          
          ### Test Adapter
          ```typescript
          // test/adapters/in-memory-notification-sender.ts
          export class InMemoryNotificationSender implements NotificationSender {
            sentNotifications: Notification[] = [];
            shouldFail = false;
            
            supports(channel: NotificationChannel): boolean {
              return true; // Supports all channels for testing
            }
            
            async send(notification: Notification): Promise<SendResult> {
              if (this.shouldFail) {
                return { success: false, error: 'Test failure' };
              }
              
              this.sentNotifications.push(notification);
              
              return {
                success: true,
                messageId: `test-${Date.now()}`
              };
            }
            
            clear(): void {
              this.sentNotifications = [];
            }
          }
          ```
          
          ### Wiring
          ```typescript
          // src/infrastructure/di/container.ts
          container.register<NotificationSender[]>('NotificationSenders', {
            useFactory: () => [
              new SendGridAdapter(sendgridClient),
              new TwilioAdapter(twilioClient),
              new FirebasePushAdapter(firebaseMessaging)
            ]
          });
          
          container.register<NotificationService>(NotificationService, {
            useClass: NotificationService
          });
          ```
        notes: "Complete ports and adapters implementation with multiple notification channels"
    

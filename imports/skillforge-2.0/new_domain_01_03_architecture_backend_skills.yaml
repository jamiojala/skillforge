      - name: "E-commerce CQRS Implementation"
        user: "Our product catalog has complex read requirements (search, filtering, recommendations) but simple writes. Should we use CQRS?"
        ai_response: |
          ## CQRS Analysis for Product Catalog
          
          ### Read vs Write Pattern Analysis
          
          **Write Patterns:**
          - Add/Update Product: ~10 ops/minute
          - Simple validation rules
          - Low complexity
          
          **Read Patterns:**
          - Search with filters: 10,000 queries/minute
          - Product recommendations: 5,000 queries/minute
          - Product details: 50,000 queries/minute
          - Complex aggregations for analytics
          
          **Verdict: CQRS is highly justified**
          
          ### Write Model Design
          ```typescript
          // Command
          interface UpdateProductCommand {
            productId: UUID;
            name: string;
            price: Money;
            categoryIds: UUID[];
          }
          
          // Aggregate
          class ProductAggregate {
            updateProduct(cmd: UpdateProductCommand): ProductUpdatedEvent[] {
              // Business validation
              this.validatePrice(cmd.price);
              this.validateCategories(cmd.categoryIds);
              
              return [new ProductUpdatedEvent({
                productId: this.id,
                name: cmd.name,
                price: cmd.price,
                categoryIds: cmd.categoryIds
              })];
            }
          }
          ```
          
          ### Read Models
          
          **1. Search Read Model (Elasticsearch)**
          ```typescript
          interface ProductSearchDocument {
            productId: UUID;
            name: string;
            name_keyword: string; // For exact match
            description: string;
            price: number;
            categories: string[];
            attributes: Record<string, string[]>;
            inStock: boolean;
            rating: number;
            reviewCount: number;
            // Denormalized for search performance
          }
          ```
          
          **2. Recommendation Read Model (Redis)**
          ```typescript
          interface ProductRecommendationView {
            productId: UUID;
            similarProducts: SimilarProduct[];
            frequentlyBoughtTogether: UUID[];
            // Pre-computed for instant response
          }
          ```
          
          **3. Product Detail Read Model (PostgreSQL)**
          ```typescript
          interface ProductDetailView {
            productId: UUID;
            name: string;
            price: Money;
            description: string;
            images: Image[];
            variants: ProductVariant[];
            reviews: ReviewSummary;
            // Exactly matches UI requirements
          }
          ```
          
          ### Synchronization via Events
          ```typescript
          // Event handler updates all read models
          class ProductEventHandler {
            async handleProductUpdated(event: ProductUpdatedEvent): Promise<void> {
              // Update search index
              await this.elasticsearch.update({
                index: 'products',
                id: event.productId,
                doc: {
                  name: event.name,
                  price: event.price.amount
                }
              });
              
              // Update detail view
              await this.postgres.query(`
                UPDATE product_details 
                SET name = $1, price = $2 
                WHERE product_id = $3
              `, [event.name, event.price, event.productId]);
              
              // Invalidate recommendation cache
              await this.redis.del(`recommendations:${event.productId}`);
            }
          }
          ```
        notes: "Shows practical CQRS with multiple read models optimized for different query patterns"
    

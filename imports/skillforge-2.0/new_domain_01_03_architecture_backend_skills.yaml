    examples:
      - name: "FinOps Implementation"
        user: "Our cloud bill is $50K/month and growing. We have no visibility into who's spending what. How do we implement FinOps?"
        ai_response: |
          ## FinOps Implementation Plan
          
          ### Current State Analysis
          - Monthly spend: $50,000
          - Untagged resources: ~40%
          - Top services: EC2 (45%), RDS (20%), S3 (15%)
          
          ### Phase 1: Tagging Strategy (Week 1-2)
          
          **Mandatory Tags:**
          ```hcl
          # tagging-policy.tf
          resource "aws_organizations_policy" "mandatory_tags" {
            name = "mandatory-tags"
            type = "TAG_POLICY"
            
            content = jsonencode({
              tags = {
                Environment = {
                  tag_key = { "@@assign" = "Environment" }
                  tag_value = { "@@assign" = ["prod", "staging", "dev"] }
                  enforced_for = { "@@assign" = ["ec2:instance", "rds:db"] }
                }
                Team = {
                  tag_key = { "@@assign" = "Team" }
                  enforced_for = { "@@assign" = ["*"] }
                }
                CostCenter = {
                  tag_key = { "@@assign" = "CostCenter" }
                  enforced_for = { "@@assign" = ["*"] }
                }
                Project = {
                  tag_key = { "@@assign" = "Project" }
                  enforced_for = { "@@assign" = ["*"] }
                }
              }
            })
          }
          ```
          
          ### Phase 2: Cost Allocation
          ```yaml
          # cost-allocation.yaml
          allocation_rules:
            - name: "Engineering Teams"
              rules:
                - tag: "Team"
                  values: ["platform", "backend", "frontend", "data"]
              
            - name: "Environments"
              rules:
                - tag: "Environment"
                  values: ["prod", "staging", "dev"]
                  
            - name: "Projects"
              rules:
                - tag: "Project"
                  values: ["*"]
          ```
          
          ### Phase 3: Optimization Actions
          
          **Immediate Actions (Expected 30% savings):**
          
          1. **Right-size EC2 instances**
             ```bash
             # Use AWS Compute Optimizer
             aws compute-optimizer get-ec2-instance-recommendations
             ```
             Expected savings: $6,750/month
          
          2. **Purchase Savings Plans**
             ```hcl
             resource "aws_savingsplans_plan" "compute" {
               savings_plan_type = "Compute"
               term              = 1  # 1-year
               payment_option    = "Partial Upfront"
               commitment        = "50.0"  # $50/hour
             }
             ```
             Expected savings: $7,500/month
          
          3. **Auto-shutdown dev environments**
             ```hcl
             resource "aws_lambda_function" "auto_shutdown" {
               function_name = "auto-shutdown-dev"
               runtime       = "python3.9"
               handler       = "shutdown.handler"
               
               environment {
                 variables = {
                   SCHEDULE = "cron(0 19 ? * MON-FRI *)"  # 7 PM weekdays
                   TAG_FILTER = "Environment=dev"
                 }
               }
             }
             ```
             Expected savings: $3,000/month
          
          ### Phase 4: Monitoring
          ```hcl
          # cost-anomaly-detection.tf
          resource "aws_ce_anomaly_monitor" "service_monitor" {
            name              = "ServiceLevelMonitor"
            monitor_type      = "DIMENSIONAL"
            monitor_dimension = "SERVICE"
          }
          
          resource "aws_ce_anomaly_subscription" "alert" {
            name      = "CostAnomalyAlert"
            threshold = 100  # $100 anomaly threshold
            frequency = "IMMEDIATE"
            
            monitor_arn_list = [aws_ce_anomaly_monitor.service_monitor.arn]
            
            subscriber {
              type    = "EMAIL"
              address = "finops@company.com"
            }
          }
          ```
          
          ### Expected Results
          | Metric | Before | After (3 months) |
          |--------|--------|------------------|
          | Monthly Spend | $50,000 | $32,500 |
          | Untagged Resources | 40% | <5% |
          | Cost Visibility | Low | High |
        notes: "Complete FinOps implementation with tagging, allocation, and optimization"
    

    examples:
      - name: "Microservices API Gateway"
        user: "We have 10 microservices and need a unified API gateway with authentication, rate limiting, and request logging. Should we use Kong or Envoy?"
        ai_response: |
          ## API Gateway Design
          
          ### Gateway Comparison
          
          | Feature | Kong | Envoy |
          |---------|------|-------|
          | Plugins | Rich ecosystem | Limited |
          | Rate Limiting | Built-in | Via filters |
          | Auth | Multiple options | JWT/OAuth |
          | Performance | Good | Excellent |
          | Learning Curve | Low | High |
          
          **Recommendation: Kong** for rich plugin ecosystem and ease of use
          
          ### Kong Configuration
          ```yaml
          # kong.yml
          _format_version: "3.0"
          _transform: true
          
          services:
            - name: user-service
              url: http://user-service:8080
              routes:
                - name: user-routes
                  paths:
                    - /api/v1/users
                  strip_path: false
                  methods:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    
            - name: order-service
              url: http://order-service:8080
              routes:
                - name: order-routes
                  paths:
                    - /api/v1/orders
                  strip_path: false
                  
            - name: product-service
              url: http://product-service:8080
              routes:
                - name: product-routes
                  paths:
                    - /api/v1/products
                  strip_path: false
          
          plugins:
            # Authentication
            - name: jwt
              config:
                uri_param_names: []
                cookie_names: []
                key_claim_name: iss
                secret_is_base64: false
                claims_to_verify:
                  - exp
                  
            # Rate Limiting
            - name: rate-limiting
              config:
                minute: 100
                policy: redis
                redis_host: redis
                fault_tolerant: true
                hide_client_headers: false
                
            # Request Logging
            - name: file-log
              config:
                path: /var/log/kong/access.log
                reopen: false
                
            # CORS
            - name: cors
              config:
                origins:
                  - "https://app.example.com"
                methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                headers:
                  - Authorization
                  - Content-Type
                max_age: 3600
          
          consumers:
            - username: mobile-app
              jwt_secrets:
                - algorithm: HS256
                  key: mobile-app-key
                  secret: ${JWT_SECRET}
                  
            - username: web-app
              jwt_secrets:
                - algorithm: HS256
                  key: web-app-key
                  secret: ${JWT_SECRET}
          ```
          
          ### Rate Limiting by Consumer
          ```yaml
          # Override rate limits per consumer
          plugins:
            - name: rate-limiting
              consumer: mobile-app
              config:
                minute: 200  # Higher limit for mobile
                
            - name: rate-limiting
              consumer: web-app
              config:
                minute: 100
          ```
          
          ### Circuit Breaker (via custom plugin or Envoy)
          ```yaml
          # Using Kong's proxy-cache for simple circuit breaking
          plugins:
            - name: proxy-cache
              config:
                response_code:
                  - 200
                  - 301
                  - 404
                request_method:
                  - GET
                  - HEAD
                content_type:
                  - text/plain
                  - application/json
                cache_ttl: 300
                strategy: memory
          ```
          
          ### Monitoring
          ```yaml
          # Prometheus metrics
          plugins:
            - name: prometheus
              config:
                per_consumer: true
                status_code_metrics: true
                latency_metrics: true
                bandwidth_metrics: true
                upstream_health_metrics: true
          ```

        user: "We're building an e-commerce platform and want to apply DDD tactical patterns. How should we model Orders, Products, and Customers?"
        ai_response: |
          ## DDD Tactical Design for E-commerce
          
          ### Bounded Contexts
          ```
          ┌─────────────────────────────────────────────────────────┐
          │                  Sales Context                           │
          │  (Orders, Shopping Cart, Pricing)                        │
          └─────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────┐
          │                Catalog Context                           │
          │  (Products, Categories, Inventory)                       │
          └─────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────┐
          │               Customer Context                           │
          │  (Customers, Addresses, Preferences)                     │
          └─────────────────────────────────────────────────────────┘
          ```
          
          ### Order Aggregate (Sales Context)
          ```typescript
          // Aggregate Root
          export class Order extends AggregateRoot<OrderId> {
            private _customerId: CustomerId;
            private _items: OrderItem[] = [];
            private _shippingAddress: Address;
            private _status: OrderStatus;
            private _createdAt: Date;
            private _total: Money;
            
            constructor(
              id: OrderId,
              customerId: CustomerId,
              shippingAddress: Address
            ) {
              super(id);
              this._customerId = customerId;
              this._shippingAddress = shippingAddress;
              this._status = OrderStatus.PENDING;
              this._createdAt = new Date();
              this._total = Money.zero('USD');
              
              this.addDomainEvent(new OrderCreatedEvent(id, customerId));
            }
            
            // Business methods enforce invariants
            addItem(productId: ProductId, productName: string, 
                    quantity: number, unitPrice: Money): void {
              // Invariant: Cannot modify shipped orders
              if (this._status !== OrderStatus.PENDING) {
                throw new DomainError('Cannot add items to non-pending order');
              }
              
              // Invariant: Quantity must be positive
              if (quantity <= 0) {
                throw new DomainError('Quantity must be positive');
              }
              
              // Check if item already exists
              const existingItem = this._items.find(
                i => i.productId.equals(productId)
              );
              
              if (existingItem) {
                existingItem.increaseQuantity(quantity);
              } else {
                this._items.push(new OrderItem(
                  new OrderItemId(),
                  productId,
                  productName,
                  quantity,
                  unitPrice
                ));
              }
              
              this.recalculateTotal();
            }
            
            removeItem(itemId: OrderItemId): void {
              if (this._status !== OrderStatus.PENDING) {
                throw new DomainError('Cannot remove items from non-pending order');
              }
              
              const index = this._items.findIndex(i => i.id.equals(itemId));
              if (index === -1) {
                throw new DomainError('Item not found');
              }
              
              this._items.splice(index, 1);
              this.recalculateTotal();
            }
            
            confirm(): void {
              // Invariant: Order must have items
              if (this._items.length === 0) {
                throw new DomainError('Cannot confirm empty order');
              }
              
              // Invariant: Order must be pending
              if (this._status !== OrderStatus.PENDING) {
                throw new DomainError('Order already confirmed');
              }
              
              this._status = OrderStatus.CONFIRMED;
              this.addDomainEvent(new OrderConfirmedEvent(this.id));
            }
            
            private recalculateTotal(): void {
              this._total = this._items.reduce(
                (sum, item) => sum.add(item.subtotal),
                Money.zero(this._total.currency)
              );
            }
            
            get total(): Money { return this._total; }
            get status(): OrderStatus { return this._status; }
            get items(): ReadonlyArray<OrderItem> { return this._items; }
          }
          
          // Entity within Order Aggregate
          export class OrderItem extends Entity<OrderItemId> {
            constructor(
              id: OrderItemId,
              public readonly productId: ProductId,
              public readonly productName: string,
              private _quantity: number,
              public readonly unitPrice: Money
            ) {
              super(id);
            }
            
            increaseQuantity(amount: number): void {
              this._quantity += amount;
            }
            
            get quantity(): number { return this._quantity; }
            
            get subtotal(): Money {
              return this.unitPrice.multiply(this._quantity);
            }
          }
          ```
          
          ### Value Objects
          ```typescript
          // Money Value Object - Immutable
          export class Money extends ValueObject {
            constructor(
              public readonly amount: number,
              public readonly currency: string
            ) {
              super();
              if (amount < 0) throw new DomainError('Amount cannot be negative');
            }
            
            add(other: Money): Money {
              this.assertSameCurrency(other);
              return new Money(this.amount + other.amount, this.currency);
            }
            
            multiply(factor: number): Money {
              return new Money(this.amount * factor, this.currency);
            }
            
            static zero(currency: string): Money {
              return new Money(0, currency);
            }
            
            private assertSameCurrency(other: Money): void {
              if (this.currency !== other.currency) {
                throw new DomainError('Cannot operate on different currencies');
              }
            }
            
            protected getEqualityComponents(): unknown[] {
              return [this.amount, this.currency];
            }
          }
          
          // Address Value Object - Immutable
          export class Address extends ValueObject {
            constructor(
              public readonly street: string,
              public readonly city: string,
              public readonly state: string,
              public readonly zipCode: string,
              public readonly country: string
            ) {
              super();
              if (!zipCode.match(/^\d{5}(-\d{4})?$/)) {
                throw new DomainError('Invalid zip code');
              }
            }
            
            protected getEqualityComponents(): unknown[] {
              return [this.street, this.city, this.state, this.zipCode, this.country];
            }
          }
          ```
          
          ### Domain Service
          ```typescript
          // Pricing Service - Cross-aggregate operation
          export class PricingService {
            constructor(
              private productRepository: ProductRepository,
              private discountRepository: DiscountRepository
            ) {}
            
            async calculateOrderTotal(
              items: OrderItem[],
              customerId: CustomerId,
              couponCode?: string
            ): Promise<Money> {
              let subtotal = Money.zero('USD');
              
              // Calculate item totals
              for (const item of items) {
                const product = await this.productRepository.findById(item.productId);
                if (!product) throw new DomainError('Product not found');
                
                subtotal = subtotal.add(product.price.multiply(item.quantity));
              }
              
              // Apply discounts
              let discount = Money.zero('USD');
              
              if (couponCode) {
                const coupon = await this.discountRepository.findByCode(couponCode);
                if (coupon && coupon.isValid()) {
                  discount = coupon.apply(subtotal);
                }
              }
              
              return subtotal.subtract(discount);
            }
          }
          ```
          
          ### Repository
          ```typescript
          export interface OrderRepository {
            findById(id: OrderId): Promise<Order | null>;
            findByCustomerId(customerId: CustomerId): Promise<Order[]>;
            findPendingOrders(): Promise<Order[]>;
            save(order: Order): Promise<void>;
            delete(id: OrderId): Promise<void>;
          }
          ```
        notes: "Complete DDD tactical design with aggregates, entities, value objects, and domain services"
    

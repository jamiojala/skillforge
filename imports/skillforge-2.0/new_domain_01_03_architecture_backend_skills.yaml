                              ML Model (Fraud Score)
          ```
          
          ### Flink Job Implementation
          ```java
          public class FraudDetectionJob {
            public static void main(String[] args) {
              StreamExecutionEnvironment env = 
                StreamExecutionEnvironment.getExecutionEnvironment();
              
              // Configure event time and watermarks
              env.setStreamTimeCharacteristic(TimeCharacteristic.EventTime);
              env.getConfig().setAutoWatermarkInterval(100);
              
              // Source: Transaction events from Kafka
              KafkaSource<Transaction> source = KafkaSource.<Transaction>builder()
                .setBootstrapServers("kafka:9092")
                .setTopics("transactions")
                .setGroupId("fraud-detection")
                .setStartingOffsets(OffsetsInitializer.latest())
                .setValueOnlyDeserializer(new TransactionDeserializationSchema())
                .build();
              
              DataStream<Transaction> transactions = env
                .fromSource(source, WatermarkStrategy
                  .<Transaction>forBoundedOutOfOrderness(Duration.ofSeconds(5))
                  .withTimestampAssigner((txn, timestamp) -> txn.getTimestamp()),
                  "Kafka Transactions")
                .keyBy(Transaction::getUserId);
              
              // Window: 1-minute sliding window for velocity check
              DataStream<VelocityMetrics> velocityMetrics = transactions
                .window(SlidingEventTimeWindows.of(
                  Time.minutes(1), Time.seconds(10)))
                .aggregate(new VelocityAggregateFunction());
              
              // Stateful processing: User behavior profile
              DataStream<FraudScore> fraudScores = transactions
                .keyBy(Transaction::getUserId)
                .process(new FraudDetectionFunction());
              
              // Alert on high fraud score
              fraudScores
                .filter(score -> score.getScore() > 0.8)
                .addSink(new AlertSink());
              
              env.execute("Fraud Detection");
            }
          }
          ```
          
          ### Stateful Fraud Detection Function
          ```java
          public class FraudDetectionFunction 
            extends KeyedProcessFunction<String, Transaction, FraudScore> {
            
            private ValueState<UserProfile> profileState;
            private ValueState<TransactionStats> statsState;
            
            @Override
            public void open(Configuration parameters) {
              profileState = getRuntimeContext().getState(
                new ValueStateDescriptor<>("profile", UserProfile.class));
              statsState = getRuntimeContext().getState(
                new ValueStateDescriptor<>("stats", TransactionStats.class));
            }
            
            @Override
            public void processElement(
                Transaction txn, 
                Context ctx, 
                Collector<FraudScore> out) {
              
              UserProfile profile = profileState.value();
              if (profile == null) {
                profile = new UserProfile(txn.getUserId());
              }
              
              // Update profile
              profile.addTransaction(txn);
              profileState.update(profile);
              
              // Calculate fraud indicators
              double velocityScore = calculateVelocityScore(txn, profile);
              double amountScore = calculateAmountScore(txn, profile);
              double locationScore = calculateLocationScore(txn, profile);
              
              // Combine scores
              double fraudScore = combineScores(
                velocityScore, amountScore, locationScore);
              
              out.collect(new FraudScore(txn.getId(), fraudScore));
            }
            
            private double calculateVelocityScore(
                Transaction txn, UserProfile profile) {
              // Unusual transaction frequency
              long recentCount = profile.getRecentTransactionCount(Duration.ofMinutes(5));
              return Math.min(recentCount / 10.0, 1.0);
            }
          }
          ```
          
          ### Performance Tuning
          ```java
          // Checkpointing for fault tolerance
          env.enableCheckpointing(5000); // 5 seconds
          env.getCheckpointConfig().setCheckpointingMode(
            CheckpointingMode.EXACTLY_ONCE);

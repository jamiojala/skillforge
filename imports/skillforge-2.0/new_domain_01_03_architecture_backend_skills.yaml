      - name: "Image Processing Pipeline"
        user: "We need to build an image processing pipeline that resizes images, generates thumbnails, and extracts metadata when users upload photos."
        ai_response: |
          ## Serverless Image Processing Pipeline
          
          ### Architecture Overview
          ```
          S3 Upload → Lambda (Validator) → SQS → Lambda (Processor) → S3 Output
                                          ↓
                                    DynamoDB (Metadata)
          ```
          
          ### Function 1: Upload Validator
          ```typescript
          // validator.ts
          export const handler = async (event: S3Event): Promise<void> => {
            for (const record of event.Records) {
              const bucket = record.s3.bucket.name;
              const key = decodeURIComponent(record.s3.object.key);
              
              // Validate file type
              if (!isValidImageType(key)) {
                await moveToQuarantine(bucket, key, 'Invalid file type');
                continue;
              }
              
              // Validate file size
              if (record.s3.object.size > 50 * 1024 * 1024) {
                await moveToQuarantine(bucket, key, 'File too large');
                continue;
              }
              
              // Send to processing queue
              await sqs.sendMessage({
                QueueUrl: process.env.PROCESSING_QUEUE_URL!,
                MessageBody: JSON.stringify({
                  bucket,
                  key,
                  size: record.s3.object.size
                }),
                MessageAttributes: {
                  'ContentType': {
                    DataType: 'String',
                    StringValue: getContentType(key)
                  }
                }
              });
            }
          };
          ```
          
          ### Function 2: Image Processor
          ```typescript
          // processor.ts
          import sharp from 'sharp';
          
          // Initialize outside handler for connection reuse
          const s3 = new S3Client({});
          
          export const handler = async (event: SQSEvent): Promise<void> => {
            for (const record of event.Records) {
              const message = JSON.parse(record.body);
              
              try {
                // Download image
                const imageBuffer = await downloadImage(message.bucket, message.key);
                
                // Process in parallel
                const [thumbnail, medium, metadata] = await Promise.all([
                  createThumbnail(imageBuffer),
                  createMediumVersion(imageBuffer),
                  extractMetadata(imageBuffer)
                ]);
                
                // Upload processed versions
                await Promise.all([
                  uploadToS3(thumbnail, 'thumbnails/', message.key),
                  uploadToS3(medium, 'medium/', message.key),
                  saveMetadata(metadata, message.key)
                ]);
                
              } catch (error) {
                console.error('Processing failed:', error);
                throw error; // Trigger SQS retry
              }
            }
          };
          
          async function createThumbnail(buffer: Buffer): Promise<Buffer> {
            return sharp(buffer)
              .resize(150, 150, { fit: 'cover' })
              .jpeg({ quality: 80 })
              .toBuffer();
          }
          ```
          
          ### Serverless.yml Configuration
          ```yaml
          service: image-processor
          
          provider:
            name: aws
            runtime: nodejs18.x
            memorySize: 1024  # More memory = faster CPU
            timeout: 30
            environment:
              PROCESSING_QUEUE_URL: !Ref ImageProcessingQueue
              OUTPUT_BUCKET: !Ref ProcessedImagesBucket
          
          functions:
            validator:
              handler: dist/validator.handler
              events:
                - s3:
                    bucket: ${self:provider.environment.UPLOAD_BUCKET}
                    event: s3:ObjectCreated:*
                    rules:
                      - prefix: uploads/
            
            processor:
              handler: dist/processor.handler
              reservedConcurrency: 50  # Limit concurrent executions
              events:
                - sqs:
                    arn: !GetAtt ImageProcessingQueue.Arn
                    batchSize: 5
                    maximumBatchingWindowInSeconds: 5
              provisionedConcurrency: 10  # Keep warm for responsiveness
          
          resources:
            Resources:
              ImageProcessingQueue:
                Type: AWS::SQS::Queue
                Properties:
                  VisibilityTimeout: 60
                  RedrivePolicy:
                    deadLetterTargetArn: !GetAtt DLQ.Arn
                    maxReceiveCount: 3
          ```
          
          ### Cost Optimization
          - **Memory**: 1024MB gives best price/performance for image processing
          - **Batching**: Process 5 images per invocation reduces costs
          - **Provisioned Concurrency**: 10 concurrent executions for predictable latency

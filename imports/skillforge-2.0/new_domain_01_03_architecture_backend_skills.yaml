      - name: "Order Fulfillment Saga"
        user: "We need to implement an order fulfillment saga that reserves inventory, processes payment, and ships the order. What's the best approach?"
        ai_response: |
          ## Order Fulfillment Saga
          
          ### Saga Steps
          
          | Step | Service | Action | Compensation |
          |------|---------|--------|--------------|
          | 1 | Order | Create Order | Cancel Order |
          | 2 | Inventory | Reserve Items | Release Reservation |
          | 3 | Payment | Charge Customer | Refund Payment |
          | 4 | Shipping | Create Shipment | Cancel Shipment |
          | 5 | Notification | Send Confirmation | - |
          
          ### Orchestration vs Choreography
          
          **Orchestration Recommended** because:
          - Complex workflow with 5 steps
          - Need for centralized monitoring
          - Steps have dependencies
          - Requires rollback coordination
          
          ### Temporal.io Implementation
          ```typescript
          // workflows/order-fulfillment.ts
          import { workflow, activity, sleep } from '@temporalio/workflow';
          
          interface OrderFulfillmentInput {
            orderId: string;
            customerId: string;
            items: OrderItem[];
            shippingAddress: Address;
            paymentMethod: PaymentMethod;
          }
          
          export async function orderFulfillmentWorkflow(
            input: OrderFulfillmentInput
          ): Promise<OrderResult> {
            const { orderId } = input;
            
            try {
              // Step 1: Create Order
              const order = await createOrder(input);
              
              // Step 2: Reserve Inventory
              const reservation = await reserveInventory({
                orderId,
                items: input.items
              });
              
              // Step 3: Process Payment
              const payment = await processPayment({
                orderId,
                amount: order.total,
                paymentMethod: input.paymentMethod
              });
              
              // Step 4: Create Shipment
              const shipment = await createShipment({
                orderId,
                items: input.items,
                shippingAddress: input.shippingAddress
              });
              
              // Step 5: Send Confirmation
              await sendNotification({
                type: 'ORDER_CONFIRMED',
                customerId: input.customerId,
                orderId,
                trackingNumber: shipment.trackingNumber
              });
              
              return {
                success: true,
                orderId,
                trackingNumber: shipment.trackingNumber
              };
              
            } catch (error) {
              // Compensation on failure
              await compensate(orderId);
              throw error;
            }
          }
          
          // Compensation logic
          async function compensate(orderId: string): Promise<void> {
            // Get saga state
            const state = await getSagaState(orderId);
            
            // Compensate in reverse order
            if (state.shipmentCreated) {
              await cancelShipment(orderId);
            }
            if (state.paymentProcessed) {
              await refundPayment(orderId);
            }
            if (state.inventoryReserved) {
              await releaseInventory(orderId);
            }
            if (state.orderCreated) {
              await cancelOrder(orderId);
            }
          }
          ```
          

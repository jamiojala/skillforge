    examples:
      - name: "Order Processing Event Model"
        user: "We need to design an order processing system. Can you help us model it using event modeling?"
        ai_response: |
          ## Order Processing Event Model
          
          ### Actors
          - **Customer**: Places orders, views order status
          - **System**: Processes payments, manages inventory
          - **Warehouse**: Picks, packs, ships orders
          - **Admin**: Manages orders, handles issues
          
          ### Event Model Visualization
          ```
          Timeline: Customer
          ─────────────────────────────────────────────────────────
          [View: Product Catalog] → [Cmd: Add to Cart] → 
          [View: Shopping Cart] → [Cmd: Place Order] →
          [View: Order Confirmation] → [View: Order Status]
          
          Timeline: System
          ─────────────────────────────────────────────────────────
          [Evt: OrderPlaced] → [Cmd: Process Payment] →
          [Evt: PaymentProcessed] → [Cmd: Reserve Inventory] →
          [Evt: InventoryReserved] → [Cmd: Confirm Order] →
          [Evt: OrderConfirmed]
          
          Timeline: Warehouse
          ─────────────────────────────────────────────────────────
          [View: Pending Orders] → [Cmd: Pick Items] →
          [Evt: ItemsPicked] → [Cmd: Pack Order] →
          [Evt: OrderPacked] → [Cmd: Ship Order] →
          [Evt: OrderShipped]
          ```
          
          ### Events (Orange)
          ```typescript
          // Events represent facts that occurred
          interface OrderPlaced {
            orderId: OrderId;
            customerId: CustomerId;
            items: OrderItem[];
            total: Money;
            timestamp: Date;
          }
          
          interface PaymentProcessed {
            orderId: OrderId;
            paymentId: PaymentId;
            amount: Money;
            status: 'success' | 'failed';
            timestamp: Date;
          }
          
          interface InventoryReserved {
            orderId: OrderId;
            reservations: InventoryReservation[];
            timestamp: Date;
          }
          
          interface OrderConfirmed {
            orderId: OrderId;
            confirmedAt: Date;
          }
          
          interface ItemsPicked {
            orderId: OrderId;
            pickedBy: WarehouseWorkerId;
            items: PickedItem[];
            timestamp: Date;
          }
          
          interface OrderPacked {
            orderId: OrderId;
            packageId: PackageId;
            weight: number;
            timestamp: Date;
          }
          
          interface OrderShipped {
            orderId: OrderId;
            trackingNumber: string;
            carrier: string;
            shippedAt: Date;
          }
          ```
          
          ### Commands (Blue)
          ```typescript
          // Commands represent intent
          interface PlaceOrder {
            cartId: CartId;
            customerId: CustomerId;
            shippingAddress: Address;
            paymentMethod: PaymentMethod;
          }
          
          interface ProcessPayment {
            orderId: OrderId;
            amount: Money;
            paymentMethod: PaymentMethod;
          }
          
          interface ReserveInventory {
            orderId: OrderId;
            items: { productId: ProductId; quantity: number }[];
          }
          
          interface PickItems {
            orderId: OrderId;
            pickedBy: WarehouseWorkerId;
          }
          
          interface PackOrder {
            orderId: OrderId;
            packageType: PackageType;
          }
          
          interface ShipOrder {
            orderId: OrderId;
            carrier: string;
            serviceLevel: string;
          }
          ```
          
          ### Views/Read Models (Green)
          ```typescript
          // Views serve specific user needs
          interface ProductCatalogView {
            products: {
              id: ProductId;
              name: string;
              price: Money;
              inStock: boolean;
            }[];
            categories: Category[];
          }
          
          interface ShoppingCartView {
            cartId: CartId;
            items: {
              productId: ProductId;
              name: string;
              quantity: number;
              unitPrice: Money;
              subtotal: Money;
            }[];
            total: Money;
            itemCount: number;
          }
          
          interface OrderStatusView {
            orderId: OrderId;
            status: OrderStatus;
            statusHistory: {
              status: OrderStatus;
              timestamp: Date;
            }[];
            estimatedDelivery?: Date;
            trackingNumber?: string;
          }
          
          interface PendingOrdersView {
            orders: {
              orderId: OrderId;
              priority: number;
              items: number;
              placedAt: Date;
              customerTier: string;
            }[];
          }
          ```
          
          ### Implementation Mapping

        - "Domain entities"
        - "Adapter implementations"
      optional_elements:
        - "Test examples"
        - "Configuration"
      code_style:
        language: "typescript"
        comments: "verbose"
        examples: "always"
    
    examples:
      - name: "Order Service Hexagonal Design"
        user: "We want to refactor our order service to use hexagonal architecture. Currently it has tight coupling to PostgreSQL and Stripe. How should we structure it?"
        ai_response: |
          ## Hexagonal Order Service
          
          ### Architecture Overview
          ```
          ┌─────────────────────────────────────────────────────────┐
          │                    Application Layer                      │
          │              (Use Cases / Application Services)           │
          └─────────────────────────┬───────────────────────────────┘
                                    │
              ┌─────────────────────┴─────────────────────┐
              │                                           │
              ▼                                           ▼
          ┌──────────┐                              ┌──────────┐
          │  Domain  │                              │   Port   │
          │  (Pure)  │                              │ Interfaces│
          └──────────┘                              └────┬─────┘
                                                         │
              ┌──────────────────────────────────────────┼──────────┐
              │                                          │          │
              ▼                                          ▼          ▼
          ┌──────────┐                            ┌──────────┐ ┌──────────┐
          │  REST    │                            │  Order   │ │ Payment  │
          │ Adapter  │                            │ Repository│ │  Port    │
          └──────────┘                            └────┬─────┘ └────┬─────┘
                                                       │            │
                                                       ▼            ▼
                                                  ┌──────────┐ ┌──────────┐
                                                  │ Postgres │ │  Stripe  │
                                                  │ Adapter  │ │ Adapter  │
                                                  └──────────┘ └──────────┘
          ```
          
          ### Domain Layer (Pure)
          ```typescript
          // src/domain/order.ts
          export class Order {
            constructor(
              public readonly id: OrderId,
              public readonly customerId: CustomerId,
              public readonly items: OrderItem[],
              public readonly total: Money,
              public status: OrderStatus = OrderStatus.PENDING
            ) {}
            
            confirm(): void {
              if (this.status !== OrderStatus.PENDING) {
                throw new InvalidOrderStateError('Order already confirmed');
              }
              this.status = OrderStatus.CONFIRMED;
            }
            
            cancel(): void {
              if (this.status === OrderStatus.SHIPPED) {
                throw new InvalidOrderStateError('Cannot cancel shipped order');
              }
              this.status = OrderStatus.CANCELLED;
            }
          }
          
          // Value objects
          export class Money {
            constructor(
              public readonly amount: number,
              public readonly currency: string
            ) {
              if (amount < 0) throw new Error('Amount cannot be negative');
            }
            
            add(other: Money): Money {
              if (this.currency !== other.currency) {
                throw new Error('Cannot add different currencies');
              }
              return new Money(this.amount + other.amount, this.currency);
            }
          }
          ```
          
          ### Port Definitions
          ```typescript
          // src/ports/order-repository.port.ts
          export interface OrderRepository {
            findById(id: OrderId): Promise<Order | null>;
            findByCustomerId(customerId: CustomerId): Promise<Order[]>;
            save(order: Order): Promise<void>;
            delete(id: OrderId): Promise<void>;
          }
          
          // src/ports/payment.port.ts
          export interface PaymentService {
            charge(amount: Money, token: PaymentToken): Promise<PaymentResult>;
            refund(paymentId: PaymentId): Promise<void>;
          }
          
          // src/ports/notification.port.ts
          export interface NotificationService {
            sendOrderConfirmation(order: Order): Promise<void>;
            sendOrderShipped(order: Order): Promise<void>;
          }
          ```
          
          ### Application Service
          ```typescript
          // src/application/order-service.ts
          export class OrderApplicationService {
            constructor(
              private orderRepository: OrderRepository,
              private paymentService: PaymentService,
              private notificationService: NotificationService
            ) {}
            
            async createOrder(command: CreateOrderCommand): Promise<Order> {
              // Business logic
              const order = Order.create({
                customerId: command.customerId,
                items: command.items
              });
              
              // Persist through port
              await this.orderRepository.save(order);
              
              return order;
            }
            
            async confirmOrder(orderId: OrderId, paymentToken: PaymentToken): Promise<void> {
              const order = await this.orderRepository.findById(orderId);
              if (!order) throw new OrderNotFoundError(orderId);
              
              // Process payment through port
              const payment = await this.paymentService.charge(order.total, paymentToken);
              
              if (payment.success) {
                order.confirm();
                await this.orderRepository.save(order);
                await this.notificationService.sendOrderConfirmation(order);
              } else {
                throw new PaymentFailedError(payment.error);
              }
            }
          }
          ```
          
          ### Adapter Implementations
          ```typescript
          // src/infrastructure/persistence/postgres-order-repository.ts
          export class PostgresOrderRepository implements OrderRepository {
            constructor(private db: Knex) {}
            
            async findById(id: OrderId): Promise<Order | null> {
              const row = await this.db('orders')
                .where('id', id.value)
                .first();
              
              if (!row) return null;
              
              return this.mapToDomain(row);
            }
            
            async save(order: Order): Promise<void> {
              await this.db('orders')
                .insert({
                  id: order.id.value,
                  customer_id: order.customerId.value,
                  total_amount: order.total.amount,
                  total_currency: order.total.currency,
                  status: order.status,
                  items: JSON.stringify(order.items)
                })
                .onConflict('id')
                .merge();
            }
            
            private mapToDomain(row: any): Order {
              return new Order(
                new OrderId(row.id),
                new CustomerId(row.customer_id),
                JSON.parse(row.items),
                new Money(row.total_amount, row.total_currency),
                row.status
              );
            }
          }
          
          // src/infrastructure/payment/stripe-payment-service.ts
          export class StripePaymentService implements PaymentService {
            constructor(private stripe: Stripe) {}
            
            async charge(amount: Money, token: PaymentToken): Promise<PaymentResult> {
              try {
                const payment = await this.stripe.paymentIntents.create({
                  amount: amount.amount * 100, // Convert to cents
                  currency: amount.currency.toLowerCase(),
                  payment_method: token.value,
                  confirm: true
                });
                
                return {
                  success: payment.status === 'succeeded',
                  paymentId: payment.id
                };
              } catch (error) {
                return {
                  success: false,
                  error: error.message
                };
              }
            }
          }
          ```
          
          ### Dependency Wiring
          ```typescript
          // src/infrastructure/di/container.ts
          import { container } from 'tsyringe';
          
          // Register ports with implementations
          container.register<OrderRepository>(
            'OrderRepository',
            { useClass: PostgresOrderRepository }
          );
          
          container.register<PaymentService>(
            'PaymentService',
            { useClass: StripePaymentService }
          );
          
          container.register<NotificationService>(
            'NotificationService',
            { useClass: SendGridNotificationService }
          );
          ```
          
          ### Testing (No Database!)
          ```typescript
          // test/unit/order-service.test.ts
          describe('OrderApplicationService', () => {
            let service: OrderApplicationService;
            let mockRepository: jest.Mocked<OrderRepository>;
            let mockPayment: jest.Mocked<PaymentService>;
            
            beforeEach(() => {
              mockRepository = {
                findById: jest.fn(),
                save: jest.fn(),
                // ...
              };
              
              mockPayment = {
                charge: jest.fn(),
                refund: jest.fn()
              };
              
              service = new OrderApplicationService(
                mockRepository,
                mockPayment,
                {} as any
              );
            });
            
            it('should confirm order when payment succeeds', async () => {
              const order = createTestOrder();
              mockRepository.findById.mockResolvedValue(order);
              mockPayment.charge.mockResolvedValue({ success: true });
              
              await service.confirmOrder(order.id, 'token-123');
              
              expect(order.status).toBe(OrderStatus.CONFIRMED);
              expect(mockRepository.save).toHaveBeenCalledWith(order);
            });
          });
          ```
        notes: "Complete hexagonal architecture with domain, ports, adapters, and testing"
    

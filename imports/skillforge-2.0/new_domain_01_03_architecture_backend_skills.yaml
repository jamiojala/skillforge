    examples:
      - name: "E-commerce Federation"
        user: "We have separate GraphQL services for Products, Orders, and Users. How do we federate them so clients can query orders with product and user details?"
        ai_response: |
          ## GraphQL Federation Design
          
          ### Architecture
          ```
          ┌─────────────────────────────────────────────────────────┐
          │                    Apollo Gateway                        │
          │                   (Schema Composition)                   │
          └──────────┬──────────────┬──────────────┬───────────────┘
                     │              │              │
                     ▼              ▼              ▼
          ┌──────────────┐ ┌──────────────┐ ┌──────────────┐
          │   Products   │ │    Orders    │ │    Users     │
          │   Subgraph   │ │   Subgraph   │ │   Subgraph   │
          └──────────────┘ └──────────────┘ └──────────────┘
          ```
          
          ### Products Subgraph
          ```graphql
          # products/schema.graphql
          type Product @key(fields: "id") {
            id: ID!
            name: String!
            description: String
            price: Float!
            category: Category!
          }
          
          type Category @key(fields: "id") {
            id: ID!
            name: String!
            products: [Product!]!
          }
          
          type Query {
            product(id: ID!): Product
            products: [Product!]!
            category(id: ID!): Category
          }
          ```
          
          ### Users Subgraph
          ```graphql
          # users/schema.graphql
          type User @key(fields: "id") {
            id: ID!
            email: String!
            name: String!
            orders: [Order!]! @external
          }
          
          extend type Order @key(fields: "id") {
            id: ID! @external
            user: User!
          }
          
          type Query {
            user(id: ID!): User
            users: [User!]!
            me: User
          }
          ```
          
          ### Orders Subgraph
          ```graphql
          # orders/schema.graphql
          type Order @key(fields: "id") {
            id: ID!
            userId: ID!
            user: User! @provides(fields: "id")
            items: [OrderItem!]!
            total: Float!
            status: OrderStatus!
            createdAt: String!
          }
          
          type OrderItem {
            productId: ID!
            product: Product! @external
            quantity: Int!
            price: Float!
          }
          
          extend type Product @key(fields: "id") {
            id: ID! @external
          }
          
          extend type User @key(fields: "id") {
            id: ID! @external
            orders: [Order!]!
          }
          
          type Query {
            order(id: ID!): Order
            orders(userId: ID): [Order!]!
          }
          
          type Mutation {
            createOrder(input: CreateOrderInput!): Order!
            updateOrderStatus(id: ID!, status: OrderStatus!): Order!
          }
          ```
          
          ### Gateway Configuration
          ```javascript
          // gateway.js
          const { ApolloServer } = require('apollo-server');
          const { ApolloGateway, IntrospectAndCompose } = require('@apollo/gateway');
          
          const gateway = new ApolloGateway({
            supergraphSdl: new IntrospectAndCompose({
              subgraphs: [
                { name: 'products', url: 'http://products:4001/graphql' },
                { name: 'orders', url: 'http://orders:4002/graphql' },
                { name: 'users', url: 'http://users:4003/graphql' },
              ],
            }),
          });
          
          const server = new ApolloServer({
            gateway,
            subscriptions: false,
          });
          
          server.listen().then(({ url }) => {
            console.log(`Gateway ready at ${url}`);
          });
          ```
          
          ### Cross-Service Query
          ```graphql
          # Client query spanning all subgraphs
          query GetOrderDetails($orderId: ID!) {
            order(id: $orderId) {
              id
              total
              status
              createdAt
              user {
                id
                name
                email
              }
              items {
                quantity
                price
                product {
                  id
                  name
                  category {
                    name
                  }
                }
              }
            }
          }
          ```
          
          ### Query Plan
          ```
          1. Gateway receives query
          2. Gateway queries Orders subgraph for order + items
          3. Gateway queries Users subgraph for user details (parallel)
          4. Gateway queries Products subgraph for product details (parallel)
          5. Gateway composes response
          ```
        notes: "Complete federation example with three subgraphs and cross-service queries"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "claude-haiku"
      fallback_model: "gpt-4o"
    
    validation:
      hooks:
        - hook_id: "federation-schema-check"
          description: "Validates subgraph schemas compose correctly"
    

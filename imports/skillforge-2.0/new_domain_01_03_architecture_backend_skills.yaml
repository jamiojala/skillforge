          ### Edge Function Implementation
          ```typescript
          // middleware.ts (Vercel Edge)
          import { NextResponse } from 'next/server';
          import type { NextRequest } from 'next/server';
          
          export const config = {
            runtime: 'edge',
            regions: ['iad1', 'fra1', 'sin1', 'syd1'] // US, EU, Asia, AU
          };
          
          export default async function middleware(request: NextRequest) {
            // Check edge cache first
            const cache = request.cookies.get('edge-cache');
            const cacheKey = `api:${request.url}`;
            
            // Try KV cache
            const cached = await EDGE_KV.get(cacheKey);
            if (cached) {
              return NextResponse.json(JSON.parse(cached), {
                headers: {
                  'X-Cache': 'HIT',
                  'X-Edge-Region': process.env.VERCEL_REGION || 'unknown'
                }
              });
            }
            
            // Fetch from origin with stale-while-revalidate
            const response = await fetch(request.url, {
              headers: {
                ...Object.fromEntries(request.headers),
                'X-Edge-Request': 'true'
              }
            });
            
            // Cache the response
            const data = await response.json();
            await EDGE_KV.put(cacheKey, JSON.stringify(data), {
              expirationTtl: 60 // 1 minute cache
            });
            
            return NextResponse.json(data, {
              headers: {
                'X-Cache': 'MISS',
                'X-Edge-Region': process.env.VERCEL_REGION || 'unknown'
              }
            });
          }
          ```
          
          ### Cloudflare Workers Alternative
          ```typescript
          // worker.ts
          export interface Env {
            API_CACHE: KVNamespace;
            ORIGIN_API: string;
          }
          
          export default {
            async fetch(request: Request, env: Env): Promise<Response> {
              const cacheKey = new URL(request.url).pathname;
              
              // Check cache
              const cached = await env.API_CACHE.get(cacheKey);
              if (cached) {
                return new Response(cached, {
                  headers: {
                    'Content-Type': 'application/json',
                    'CF-Cache-Status': 'HIT'
                  }
                });
              }
              
              // Fetch from origin
              const response = await fetch(`${env.ORIGIN_API}${cacheKey}`, {
                headers: request.headers
              });
              
              const data = await response.text();
              
              // Cache with 1-minute TTL
              await env.API_CACHE.put(cacheKey, data, {
                expirationTtl: 60
              });
              
              return new Response(data, {
                headers: {
                  'Content-Type': 'application/json',
                  'CF-Cache-Status': 'MISS'
                }
              });
            }
          };
          ```
          

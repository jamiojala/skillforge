        ai_response: |
          ## Payment Processing Distributed Transaction
          
          ### Transaction Analysis
          
          | Operation | Service | Duration | Compensation |
          |-----------|---------|----------|--------------|
          | Deduct Wallet | Wallet Service | ~50ms | Credit Wallet |
          | Create Transaction | Transaction Service | ~30ms | Void Transaction |
          | Update Order | Order Service | ~20ms | Revert Order Status |
          
          **Pattern Selection: Saga (Orchestration)**
          - Short duration (< 1 second)
          - Synchronous requirements
          - Clear compensation logic
          - Need for immediate feedback
          
          ### Saga Implementation
          ```typescript
          interface PaymentTransaction {
            transactionId: string;
            orderId: string;
            userId: string;
            amount: number;
            status: 'PENDING' | 'DEDUCTED' | 'RECORDED' | 'COMPLETED' | 'FAILED';
            steps: TransactionStep[];
          }
          
          interface TransactionStep {
            name: string;
            status: 'PENDING' | 'SUCCESS' | 'FAILED' | 'COMPENSATED';
            compensation?: () => Promise<void>;
          }
          
          class PaymentSaga {
            constructor(
              private walletService: WalletService,
              private transactionService: TransactionService,
              private orderService: OrderService,
              private sagaStore: SagaStore
            ) {}
            
            async execute(payment: PaymentRequest): Promise<PaymentResult> {
              const sagaId = generateUUID();
              const saga: PaymentTransaction = {
                transactionId: sagaId,
                orderId: payment.orderId,
                userId: payment.userId,
                amount: payment.amount,
                status: 'PENDING',
                steps: []
              };
              
              // Persist saga state
              await this.sagaStore.save(saga);
              
              try {
                // Step 1: Deduct from wallet
                await this.deductWallet(saga);
                
                // Step 2: Create transaction record
                await this.createTransaction(saga);
                
                // Step 3: Update order status
                await this.updateOrder(saga);
                
                // Complete saga
                saga.status = 'COMPLETED';
                await this.sagaStore.save(saga);
                
                return { success: true, transactionId: sagaId };
                
              } catch (error) {
                // Compensate on failure
                await this.compensate(saga);
                
                saga.status = 'FAILED';
                await this.sagaStore.save(saga);
                
                return { success: false, error: error.message };
              }
            }
            
            private async deductWallet(saga: PaymentTransaction): Promise<void> {
              const step = {
                name: 'DEDUCT_WALLET',
                status: 'PENDING' as const,
                compensation: async () => {
                  await this.walletService.credit(
                    saga.userId,
                    saga.amount,
                    { idempotencyKey: saga.transactionId }
                  );
                }
              };
              
              saga.steps.push(step);
              
              try {
                await this.walletService.debit(
                  saga.userId,
                  saga.amount,
                  { idempotencyKey: saga.transactionId }
                );
                
                step.status = 'SUCCESS';
                saga.status = 'DEDUCTED';
                await this.sagaStore.save(saga);
                
              } catch (error) {
                step.status = 'FAILED';
                await this.sagaStore.save(saga);
                throw error;
              }
            }
            
            private async createTransaction(saga: PaymentTransaction): Promise<void> {
              const step = {
                name: 'CREATE_TRANSACTION',
                status: 'PENDING' as const,
                compensation: async () => {
                  await this.transactionService.void(
                    saga.transactionId,
                    { idempotencyKey: saga.transactionId }
                  );
                }
              };
              
              saga.steps.push(step);
              
              try {
                await this.transactionService.create({
                  id: saga.transactionId,
                  orderId: saga.orderId,
                  userId: saga.userId,
                  amount: saga.amount,
                  type: 'PAYMENT'
                }, { idempotencyKey: saga.transactionId });
                
                step.status = 'SUCCESS';
                saga.status = 'RECORDED';
                await this.sagaStore.save(saga);
                
              } catch (error) {
                step.status = 'FAILED';
                await this.sagaStore.save(saga);
                throw error;
              }
            }
            
            private async updateOrder(saga: PaymentTransaction): Promise<void> {
              const step = {
                name: 'UPDATE_ORDER',
                status: 'PENDING' as const,
                compensation: async () => {
                  await this.orderService.updateStatus(
                    saga.orderId,
                    'PENDING_PAYMENT',
                    { idempotencyKey: saga.transactionId }
                  );
                }
              };
              
              saga.steps.push(step);
              
              try {
                await this.orderService.updateStatus(
                  saga.orderId,
                  'PAID',
                  { idempotencyKey: saga.transactionId }
                );
                
                step.status = 'SUCCESS';
                await this.sagaStore.save(saga);
                
              } catch (error) {
                step.status = 'FAILED';
                await this.sagaStore.save(saga);
                throw error;
              }
            }
            
            private async compensate(saga: PaymentTransaction): Promise<void> {
              // Compensate in reverse order
              for (const step of [...saga.steps].reverse()) {
                if (step.status === 'SUCCESS' && step.compensation) {
                  try {
                    await step.compensation();
                    step.status = 'COMPENSATED';
                  } catch (error) {
                    // Log for manual intervention
                    console.error(`Compensation failed for ${step.name}:`, error);
                  }
                  await this.sagaStore.save(saga);
                }
              }
            }
          }
          ```
          
          ### Idempotent Services
          ```typescript
          class WalletService {
            async debit(
              userId: string, 
              amount: number, 
              options: { idempotencyKey: string }
            ): Promise<void> {
              // Check if already processed
              const existing = await this.db.idempotencyKeys.findOne({
                key: options.idempotencyKey,
                operation: 'DEBIT'
              });
              
              if (existing) {
                if (existing.status === 'SUCCESS') {
                  return; // Already succeeded
                }
                if (existing.status === 'PROCESSING') {
                  // Wait for completion or timeout
                  await this.waitForCompletion(options.idempotencyKey);
                  return;
                }
              }
              
              // Mark as processing
              await this.db.idempotencyKeys.insert({
                key: options.idempotencyKey,
                operation: 'DEBIT',
                status: 'PROCESSING',
                createdAt: new Date()
              });
              
              try {
                // Perform debit
                await this.db.wallets.updateOne(
                  { userId },
                  { $inc: { balance: -amount } }
                );
                
                // Mark as success
                await this.db.idempotencyKeys.updateOne(
                  { key: options.idempotencyKey },
                  { $set: { status: 'SUCCESS' } }
                );
                
              } catch (error) {
                // Mark as failed
                await this.db.idempotencyKeys.updateOne(
                  { key: options.idempotencyKey },
                  { $set: { status: 'FAILED', error: error.message } }
                );
                throw error;
              }
            }
          }
          ```
          
          ### Recovery on Startup
          ```typescript
          class SagaRecoveryService {
            constructor(private sagaStore: SagaStore) {}
            
            async recover(): Promise<void> {
              // Find incomplete sagas
              const incompleteSagas = await this.sagaStore.find({
                status: { $in: ['PENDING', 'DEDUCTED', 'RECORDED'] }
              });
              
              for (const saga of incompleteSagas) {
                // Check if saga is stuck (older than timeout)
                const timeout = 5 * 60 * 1000; // 5 minutes
                if (Date.now() - saga.createdAt.getTime() > timeout) {
                  // Compensate stuck saga
                  await this.compensateSaga(saga);
                }
              }
            }
          }
          ```

          doc1.insert(0, 'H');
          doc1.insert(1, 'i');
          
          // Client 2 (concurrent)
          const doc2 = new RGADocument('client-2');
          doc2.insert(0, 'H');
          doc2.insert(1, 'e');
          doc2.insert(2, 'l');
          doc2.insert(3, 'l');
          doc2.insert(4, 'o');
          
          // Merge
          doc1.merge(Array.from(doc2.nodes.values()));
          doc2.merge(Array.from(doc1.nodes.values()));
          
          // Both converge to same state
          console.log(doc1.toString()); // "HelloHi" or "HiHello"
          console.log(doc2.toString()); // Same as doc1
          ```

    examples:
      - name: "Mobile BFF"
        user: "Our mobile app needs to show a dashboard with user info, recent orders, and notifications. Currently it makes 5 separate API calls. How can a BFF help?"
        ai_response: |
          ## Mobile BFF Design
          
          ### Current State (5 API Calls)
          1. GET /api/users/me - User profile
          2. GET /api/orders?limit=5 - Recent orders
          3. GET /api/notifications - Notifications
          4. GET /api/products/recommended - Recommendations
          5. GET /api/cart - Shopping cart
          
          **Mobile Pain Points:**
          - 5 round trips = slow loading
          - Large payloads with unused fields
          - Battery drain from multiple requests
          
          ### BFF Solution (1 API Call)
          
          ```typescript
          // mobile-bff/src/routes/dashboard.ts
          import { Router } from 'express';
          import { UserService, OrderService, NotificationService } from '../services';
          
          const router = Router();
          
          router.get('/dashboard', async (req, res) => {
            const userId = req.user.id;
            
            // Parallel backend calls
            const [user, orders, notifications, recommendations, cart] = 
              await Promise.all([
                UserService.getProfile(userId),
                OrderService.getRecent(userId, 5),
                NotificationService.getUnread(userId),
                ProductService.getRecommendations(userId, 3),
                CartService.getCart(userId)
              ]);
            
            // Transform to mobile-optimized response
            const dashboard = {
              user: {
                name: user.name,
                avatar: user.avatarUrl,
                membershipTier: user.membership.tier
              },
              orders: orders.map(o => ({
                id: o.id,
                total: o.total.amount,
                currency: o.total.currency,
                status: o.status,
                itemCount: o.items.length,
                date: o.createdAt
              })),
              notifications: notifications.slice(0, 3).map(n => ({
                id: n.id,
                message: n.message,
                type: n.type,
                timestamp: n.createdAt
              })),
              recommendations: recommendations.map(p => ({
                id: p.id,
                name: p.name,
                price: p.price.amount,
                image: p.images[0]?.thumbnailUrl
              })),
              cart: {
                itemCount: cart.items.length,
                total: cart.total.amount
              }
            };
            
            res.json(dashboard);
          });
          ```
          
          ### Response Size Comparison
          
          | Approach | Requests | Response Size | Load Time |
          |----------|----------|---------------|-----------|
          | Direct APIs | 5 | ~45KB | 800ms |
          | Mobile BFF | 1 | ~8KB | 200ms |
          
          ### Caching Strategy
          ```typescript
          // Cache user profile for 5 minutes
          const userCache = new Map<string, { data: User; expiry: number }>();
          
          async function getCachedUser(userId: string): Promise<User> {
            const cached = userCache.get(userId);
            if (cached && cached.expiry > Date.now()) {
              return cached.data;
            }
            
            const user = await UserService.getProfile(userId);
            userCache.set(userId, {
              data: user,
              expiry: Date.now() + 5 * 60 * 1000
            });
            
            return user;
          }
          ```
          
          ### Error Handling
          ```typescript
          // Graceful degradation
          router.get('/dashboard', async (req, res) => {
            const results = await Promise.allSettled([
              UserService.getProfile(userId),
              OrderService.getRecent(userId, 5),
              NotificationService.getUnread(userId),
              ProductService.getRecommendations(userId, 3),
              CartService.getCart(userId)
            ]);
            
            const dashboard = {
              user: results[0].status === 'fulfilled' ? results[0].value : null,
              orders: results[1].status === 'fulfilled' ? results[1].value : [],
              notifications: results[2].status === 'fulfilled' ? results[2].value : [],
              recommendations: results[3].status === 'fulfilled' ? results[3].value : [],
              cart: results[4].status === 'fulfilled' ? results[4].value : { items: [], total: 0 }
            };
            
            res.json(dashboard);
          });
          ```
        notes: "Complete BFF example with aggregation, optimization, and graceful degradation"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "claude-haiku"
      fallback_model: "gpt-4o"
    
    validation:
      hooks:
        - hook_id: "bff-scope-check"
          description: "Validates BFF doesn't contain domain logic"
    
    metadata:
      complexity: "medium"
      estimated_time_saved: "40-80 hours"
      version: "1.0.0"
      author: "SkillForge Team"
      last_updated: "2025-01-15"



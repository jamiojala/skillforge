    examples:
      - name: "Order Service Outbox Implementation"
        user: "Our order service needs to publish OrderCreated events to Kafka, but we're seeing events lost during database failures. How do we fix this?"
        ai_response: |
          ## Outbox Pattern Implementation
          
          ### Problem: Dual Write
          ```typescript
          // BAD: Non-atomic operations
          await db.orders.insert(order);      // Might succeed
          await kafka.produce('order-created', event);  // Might fail
          ```
          
          ### Solution: Outbox Pattern
          
          **1. Outbox Table Schema**
          ```sql
          CREATE TABLE order_outbox (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            aggregate_id UUID NOT NULL,
            event_type VARCHAR(100) NOT NULL,
            payload JSONB NOT NULL,
            headers JSONB DEFAULT '{}',
            created_at TIMESTAMP NOT NULL DEFAULT NOW(),
            published_at TIMESTAMP,
            retry_count INTEGER DEFAULT 0,
            error_message TEXT
          );
          
          CREATE INDEX idx_outbox_unpublished 
            ON order_outbox(published_at) 
            WHERE published_at IS NULL;
          ```
          
          **2. Business Transaction with Outbox**
          ```typescript
          class OrderService {
            async createOrder(cmd: CreateOrderCommand): Promise<Order> {
              return await this.db.transaction(async (trx) => {
                // 1. Create order
                const order = await trx.orders.insert({
                  id: generateUUID(),
                  customerId: cmd.customerId,
                  items: cmd.items,
                  status: 'PENDING'
                });
                
                // 2. Write to outbox (SAME TRANSACTION!)
                await trx.order_outbox.insert({
                  aggregate_id: order.id,
                  event_type: 'OrderCreated',
                  payload: {
                    orderId: order.id,
                    customerId: order.customerId,
                    items: order.items,
                    total: calculateTotal(order.items)
                  },
                  headers: {
                    correlationId: cmd.correlationId,
                    causationId: cmd.commandId
                  }
                });
                
                return order;
              });
            }
          }
          ```
          
          **3. Message Relay**
          ```typescript
          class OutboxRelay {
            async run(): Promise<void> {
              while (true) {
                const messages = await this.db.query(`
                  SELECT * FROM order_outbox 
                  WHERE published_at IS NULL 
                  AND retry_count < 5
                  ORDER BY created_at
                  LIMIT 100
                `);
                
                for (const message of messages) {
                  try {
                    await this.kafka.produce('order-events', {
                      key: message.aggregate_id,
                      value: JSON.stringify({
                        eventType: message.event_type,
                        payload: message.payload,
                        headers: message.headers
                      })
                    });
                    
                    // Mark as published
                    await this.db.query(`
                      UPDATE order_outbox 
                      SET published_at = NOW() 
                      WHERE id = $1
                    `, [message.id]);
                    
                  } catch (error) {
                    await this.handlePublishError(message, error);
                  }
                }
                
                await sleep(100); // Poll interval
              }
            }
            
            private async handlePublishError(message: OutboxMessage, error: Error): Promise<void> {
              await this.db.query(`
                UPDATE order_outbox 
                SET retry_count = retry_count + 1,
                    error_message = $1
                WHERE id = $2
              `, [error.message, message.id]);
              
              if (message.retry_count >= 5) {
                await this.dlq.publish(message);
              }
            }
          }
          ```
          
          **4. Idempotent Consumer**
          ```typescript
          class OrderEventConsumer {
            async handleOrderCreated(event: OrderCreatedEvent): Promise<void> {
              // Check for duplicate
              const processed = await this.db.processed_events.findOne({
                eventId: event.headers.eventId
              });
              
              if (processed) {
                console.log('Duplicate event, skipping');
                return;
              }
              
              // Process event
              await this.inventoryService.reserve(event.payload);
              
              // Mark as processed
              await this.db.processed_events.insert({
                eventId: event.headers.eventId,
                processedAt: new Date()
              });
            }
          }
          ```
        notes: "Complete outbox implementation solving the dual-write problem"
    

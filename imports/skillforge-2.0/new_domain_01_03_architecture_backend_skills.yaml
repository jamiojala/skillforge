    examples:
      - name: "E-commerce Order Event Sourcing"
        user: "I need to implement event sourcing for our order management system. We need complete audit history and the ability to see order state at any point in time."
        ai_response: |
          ## Event Sourcing Design for Order Management
          
          ### Domain Events
          ```typescript
          interface OrderEvent {
            eventId: UUID;
            aggregateId: UUID; // orderId
            eventType: string;
            timestamp: Date;
            version: number;
            correlationId: UUID;
            causationId: UUID;
            payload: OrderEventPayload;
          }
          
          type OrderEventPayload =
            | OrderCreatedEvent
            | OrderItemAddedEvent
            | OrderItemRemovedEvent
            | OrderSubmittedEvent
            | OrderPaidEvent
            | OrderShippedEvent
            | OrderCancelledEvent;
          
          interface OrderCreatedEvent {
            customerId: UUID;
            shippingAddress: Address;
            createdAt: Date;
          }
          ```
          
          ### Aggregate Design
          ```typescript
          class OrderAggregate {
            private events: OrderEvent[] = [];
            private state: OrderState;
            
            createOrder(cmd: CreateOrderCommand): OrderEvent[] {
              const event: OrderCreatedEvent = {
                eventId: generateUUID(),
                aggregateId: cmd.orderId,
                eventType: 'OrderCreated',
                timestamp: new Date(),
                version: this.getNextVersion(),
                correlationId: cmd.correlationId,
                causationId: cmd.commandId,
                payload: { /* ... */ }
              };
              return [event];
            }
          }
          ```
          
          ### Read Model Projections
          ```typescript
          // Projection for order list view
          class OrderListProjection {
            async handle(event: OrderEvent): Promise<void> {
              switch(event.eventType) {
                case 'OrderCreated':
                  await this.db.orders.insert({
                    orderId: event.aggregateId,
                    status: 'DRAFT',
                    customerId: event.payload.customerId,
                    createdAt: event.timestamp
                  });
                  break;
                case 'OrderSubmitted':
                  await this.db.orders.update(
                    { orderId: event.aggregateId },
                    { status: 'SUBMITTED', submittedAt: event.timestamp }
                  );
                  break;
              }
            }
          }
          ```
          
          ### Temporal Query Example
          ```typescript
          // Get order state as of specific date
          async function getOrderAtPointInTime(
            orderId: UUID, 
            asOfDate: Date
          ): Promise<OrderState> {
            const events = await eventStore
              .getEvents(orderId)
              .filter(e => e.timestamp <= asOfDate)
              .orderBy('version');
            
            return events.reduce((state, event) => 
              applyEvent(state, event), 
              OrderState.initial()
            );
          }
          ```
        notes: "Demonstrates complete event sourcing implementation with temporal queries and projections"
      
      - name: "Event Schema Evolution Strategy"
        user: "We need to add a new field to our OrderCreated event. How do we handle schema changes in an event-sourced system?"
        ai_response: |
          ## Event Schema Evolution Strategy
          
          ### Version 1: Original Event
          ```typescript
          interface OrderCreatedEventV1 {
            customerId: UUID;
            shippingAddress: Address;
          }
          ```
          
          ### Version 2: With Priority Field
          ```typescript
          interface OrderCreatedEventV2 {
            customerId: UUID;
            shippingAddress: Address;
            priority: 'LOW' | 'NORMAL' | 'HIGH'; // NEW FIELD
          }
          
          // Upcaster transforms V1 -> V2
          class OrderCreatedUpcaster implements EventUpcaster {
            canUpcast(event: StoredEvent): boolean {
              return event.eventType === 'OrderCreated' 
                && event.schemaVersion === 1;
            }
            
            upcast(event: StoredEvent): StoredEvent {
              return {
                ...event,
                schemaVersion: 2,
                payload: {
                  ...event.payload,
                  priority: 'NORMAL' // Default for existing events
                }
              };
            }
          }
          ```
          
          ### Migration Strategies
          
          **1. Lazy Upcasting (Recommended)**
          - Transform events on read
          - No data migration needed
          - Slightly higher read latency
          
          **2. Eager Migration**
          - Transform all events in background
          - Requires downtime or dual-write
          - Better read performance
          
          **3. Copy-on-Write**
          - Keep original events
          - Store transformed version separately
          - Most complex but preserves originals
        notes: "Shows practical schema evolution with upcasters and migration strategies"
    

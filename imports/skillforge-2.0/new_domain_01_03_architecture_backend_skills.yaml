    examples:
      - name: "Real-Time Chat Service"
        user: "We need to build a real-time chat service that supports multiple users in rooms with message history. Should we use gRPC streaming?"
        ai_response: |
          ## gRPC Streaming Chat Service
          
          ### Protobuf Schema
          ```protobuf
          // chat.proto
          syntax = "proto3";
          package chat;
          
          service ChatService {
            // Unary: Join a chat room
            rpc JoinRoom(JoinRequest) returns (JoinResponse);
            
            // Server streaming: Receive messages
            rpc StreamMessages(StreamRequest) returns (stream Message);
            
            // Client streaming: Send messages
            rpc SendMessages(stream SendMessageRequest) returns (SendResponse);
            
            // Bidirectional: Full-duplex chat
            rpc Chat(stream ChatMessage) returns (stream ChatMessage);
            
            // Unary: Get message history
            rpc GetHistory(HistoryRequest) returns (HistoryResponse);
          }
          
          message JoinRequest {
            string room_id = 1;
            string user_id = 2;
            string username = 3;
          }
          
          message JoinResponse {
            bool success = 1;
            string room_id = 2;
            repeated string participants = 3;
          }
          
          message ChatMessage {
            string message_id = 1;
            string room_id = 2;
            string user_id = 3;
            string username = 4;
            string content = 5;
            int64 timestamp = 6;
            MessageType type = 7;
          }
          
          enum MessageType {
            TEXT = 0;
            JOIN = 1;
            LEAVE = 2;
            SYSTEM = 3;
          }
          
          message StreamRequest {
            string room_id = 1;
            string user_id = 2;
            int64 last_message_id = 3;
          }
          
          message SendMessageRequest {
            string room_id = 1;
            string content = 2;
          }
          
          message HistoryRequest {
            string room_id = 1;
            int32 limit = 2;
            int64 before_timestamp = 3;
          }
          
          message HistoryResponse {
            repeated ChatMessage messages = 1;
            bool has_more = 2;
          }
          ```
          
          ### Server Implementation (Go)
          ```go
          // server.go
          type ChatServer struct {
            chat.UnimplementedChatServiceServer
            rooms map[string]*Room
            mu    sync.RWMutex
          }
          
          type Room struct {
            id           string
            participants map[string]*Participant
            messages     []ChatMessage
            broadcast    chan ChatMessage
            mu           sync.RWMutex
          }
          
          type Participant struct {
            userID   string
            username string
            stream   chan ChatMessage
          }
          
          // Bidirectional streaming implementation
          func (s *ChatServer) Chat(stream chat.ChatService_ChatServer) error {
            ctx := stream.Context()
            var roomID, userID string
            
            // Handle incoming messages
            go func() {
              for {
                select {
                case <-ctx.Done():
                  return
                default:
                  msg, err := stream.Recv()
                  if err == io.EOF {
                    return
                  }
                  if err != nil {
                    log.Printf("Error receiving: %v", err)
                    return
                  }
                  
                  roomID = msg.RoomId
                  userID = msg.UserId
                  
                  // Store and broadcast message
                  s.broadcastMessage(msg)
                }
              }
            }()
            
            // Send outgoing messages
            for {
              select {
              case <-ctx.Done():
                s.leaveRoom(roomID, userID)
                return nil
              case msg := <-s.getParticipantStream(roomID, userID):
                if err := stream.Send(&msg); err != nil {
                  return err
                }
              }
            }
          }
          
          func (s *ChatServer) broadcastMessage(msg *chat.ChatMessage) {
            s.mu.RLock()
            room, exists := s.rooms[msg.RoomId]
            s.mu.RUnlock()
            
            if !exists {
              return
            }
            
            room.mu.RLock()
            defer room.mu.RUnlock()
            
            for _, participant := range room.participants {
              select {
              case participant.stream <- *msg:
              default:
                // Channel full, drop message
              }
            }
          }
          ```
          
          ### Client Implementation (TypeScript)
          ```typescript
          // client.ts
          import * as grpc from '@grpc/grpc-js';
          import { ChatServiceClient } from './chat_grpc_pb';
          import { ChatMessage, JoinRequest } from './chat_pb';
          
          class ChatClient {
            private client: ChatServiceClient;
            private stream: grpc.ClientDuplexStream<ChatMessage, ChatMessage>;
            
            constructor(address: string) {
              this.client = new ChatServiceClient(
                address, 
                grpc.credentials.createInsecure()
              );
            }
            
            async joinRoom(roomId: string, userId: string, username: string): Promise<void> {
              const request = new JoinRequest();
              request.setRoomId(roomId);
              request.setUserId(userId);
              request.setUsername(username);
              
              return new Promise((resolve, reject) => {
                this.client.joinRoom(request, (err, response) => {
                  if (err) reject(err);
                  else resolve();
                });
              });
            }
            
            startChat(roomId: string, userId: string, username: string): void {
              this.stream = this.client.chat();
              
              // Handle incoming messages
              this.stream.on('data', (message: ChatMessage) => {
                console.log(`${message.getUsername()}: ${message.getContent()}`);
              });
              
              this.stream.on('error', (err) => {
                console.error('Stream error:', err);
              });
              
              // Send join message
              const joinMsg = new ChatMessage();
              joinMsg.setRoomId(roomId);
              joinMsg.setUserId(userId);
              joinMsg.setUsername(username);
              joinMsg.setType(ChatMessage.MessageType.JOIN);
              this.stream.write(joinMsg);
            }
            
            sendMessage(content: string, roomId: string, userId: string, username: string): void {
              const message = new ChatMessage();
              message.setRoomId(roomId);
              message.setUserId(userId);
              message.setUsername(username);
              message.setContent(content);
              message.setType(ChatMessage.MessageType.TEXT);
              message.setTimestamp(Date.now());
              
              this.stream.write(message);
            }
          }
          ```
          
          ### Performance Characteristics
          - Latency: <10ms for message delivery
          - Throughput: 100K+ messages/second per server
          - Connection: Single HTTP/2 connection per client
          - Backpressure: Built-in flow control
        notes: "Complete bidirectional streaming chat service with gRPC"
    

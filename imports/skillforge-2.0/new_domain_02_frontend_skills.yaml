      - name: "Accordion ARIA Pattern"
        user: "Implement a fully accessible accordion component with proper ARIA"
        ai_response: |
          🎯 **Accessibility Goal**: Create an accordion that is fully accessible to keyboard users and screen reader users, following the ARIA Accordion pattern.
          
          ♿ **ARIA Pattern**:
          - Accordion uses `heading` role for headers with nested `button`
          - Panels use `region` role with `aria-labelledby`
          - Buttons control panel visibility with `aria-expanded` and `aria-controls`
          
          📋 **Implementation**:
          
          ```tsx
          // Accordion.tsx
          import { useState, useRef, createContext, useContext } from 'react';
          
          interface AccordionContextType {
            expandedItems: Set<string>;
            toggleItem: (id: string) => void;
            allowMultiple: boolean;
          }
          
          const AccordionContext = createContext<AccordionContextType | null>(null);
          
          function useAccordion() {
            const context = useContext(AccordionContext);
            if (!context) throw new Error('Must be used within Accordion');
            return context;
          }
          
          // Main Accordion container
          interface AccordionProps {
            children: React.ReactNode;
            allowMultiple?: boolean;
            defaultExpanded?: string[];
          }
          
          export function Accordion({ 
            children, 
            allowMultiple = false,
            defaultExpanded = []
          }: AccordionProps) {
            const [expandedItems, setExpandedItems] = useState(
              new Set(defaultExpanded)
            );
            
            const toggleItem = (id: string) => {
              setExpandedItems(prev => {
                const next = new Set(prev);
                if (next.has(id)) {
                  next.delete(id);
                } else {
                  if (!allowMultiple) {
                    next.clear();
                  }
                  next.add(id);
                }
                return next;
              });
            };
            
            return (
              <AccordionContext.Provider value={{ expandedItems, toggleItem, allowMultiple }}>
                <div className="accordion">
                  {children}
                </div>
              </AccordionContext.Provider>
            );
          }
          
          // Accordion Item
          interface AccordionItemProps {
            id: string;
            children: React.ReactNode;
          }
          
          export function AccordionItem({ id, children }: AccordionItemProps) {
            return (
              <div className="accordion-item">
                {children}
              </div>
            );
          }
          
          // Accordion Trigger (button)
          interface AccordionTriggerProps {
            children: React.ReactNode;
            itemId: string;
          }
          
          export function AccordionTrigger({ children, itemId }: AccordionTriggerProps) {
            const { expandedItems, toggleItem } = useAccordion();
            const isExpanded = expandedItems.has(itemId);
            const buttonRef = useRef<HTMLButtonElement>(null);
            
            const handleKeyDown = (e: React.KeyboardEvent) => {
              // Handle keyboard navigation between accordion headers
              const headers = Array.from(
                document.querySelectorAll('[data-accordion-trigger]')
              ) as HTMLButtonElement[];
              const currentIndex = headers.indexOf(buttonRef.current!);
              
              switch (e.key) {
                case 'ArrowDown':
                  e.preventDefault();
                  const nextIndex = (currentIndex + 1) % headers.length;
                  headers[nextIndex]?.focus();
                  break;
                case 'ArrowUp':
                  e.preventDefault();
                  const prevIndex = (currentIndex - 1 + headers.length) % headers.length;
                  headers[prevIndex]?.focus();
                  break;
                case 'Home':
                  e.preventDefault();
                  headers[0]?.focus();
                  break;
                case 'End':
                  e.preventDefault();
                  headers[headers.length - 1]?.focus();
                  break;
              }
            };
            
            return (
              <h3 className="accordion-header">
                <button
                  ref={buttonRef}
                  data-accordion-trigger
                  type="button"
                  aria-expanded={isExpanded}
                  aria-controls={`accordion-panel-${itemId}`}
                  id={`accordion-header-${itemId}`}
                  onClick={() => toggleItem(itemId)}
                  onKeyDown={handleKeyDown}
                  className="accordion-trigger"
                >
                  {children}
                  <span className="accordion-icon" aria-hidden="true">
                    {isExpanded ? '−' : '+'}
                  </span>
                </button>
              </h3>
            );
          }
          
          // Accordion Panel (content)
          interface AccordionPanelProps {
            children: React.ReactNode;
            itemId: string;
          }
          
          export function AccordionPanel({ children, itemId }: AccordionPanelProps) {
            const { expandedItems } = useAccordion();
            const isExpanded = expandedItems.has(itemId);
            
            return (
              <div
                id={`accordion-panel-${itemId}`}
                role="region"
                aria-labelledby={`accordion-header-${itemId}`}
                hidden={!isExpanded}
                className="accordion-panel"
              >
                <div className="accordion-content">
                  {children}
                </div>
              </div>
            );
          }
          ```
          
          ```css

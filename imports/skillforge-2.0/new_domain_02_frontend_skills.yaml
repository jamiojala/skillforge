          **tokens/theme/dark.json**
          ```json
          {
            "theme": {
              "color": {
                "background": { "value": "{color.gray.900}", "type": "color" },
                "surface": { "value": "{color.gray.800}", "type": "color" },
                "text": { "value": "{color.gray.50}", "type": "color" },
                "text-muted": { "value": "{color.gray.400}", "type": "color" },
                "border": { "value": "{color.gray.700}", "type": "color" }
              }
            }
          }
          ```
          
          **Generated CSS Output**:
          ```css
          :root {
            /* Light mode (default) */
            --theme-color-background: #f9fafb;
            --theme-color-surface: #ffffff;
            --theme-color-text: #111827;
            --theme-color-text-muted: #6b7280;
            --theme-color-border: #e5e7eb;
          }
          
          @media (prefers-color-scheme: dark) {
            :root {
              /* Dark mode */
              --theme-color-background: #111827;
              --theme-color-surface: #1f2937;
              --theme-color-text: #f9fafb;
              --theme-color-text-muted: #9ca3af;
              --theme-color-border: #374151;
            }
          }
          
          /* Manual theme toggle support */
          [data-theme="dark"] {
            --theme-color-background: #111827;
            --theme-color-surface: #1f2937;
            --theme-color-text: #f9fafb;
            --theme-color-text-muted: #9ca3af;
            --theme-color-border: #374151;
          }
          ```
          
          **Usage in Components**:
          ```css
          .card {
            background: var(--theme-color-surface);
            color: var(--theme-color-text);
            border: 1px solid var(--theme-color-border);
          }
          ```
        notes: "Dark mode token structure with theme switching"
    

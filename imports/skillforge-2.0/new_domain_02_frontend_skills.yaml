        - "📋 Code Solutions"
        - "📈 Expected Impact"
      required_elements:
        - "Resource prioritization"
        - "Hint implementation"
        - "Before/after waterfall"
        - "Testing approach"
      code_style:
        language: "html"
        comments: "verbose"
        examples: "always"
    
    examples:
      - name: "Complete Resource Hints Setup"
        user: "Set up complete resource hints for our e-commerce site"
        ai_response: |
          📊 **Resource Analysis**:
          - Critical resources: Hero image, main CSS, core JS
          - Third-party origins: Analytics, payment, CDN
          - Next-page predictions: Product detail pages
          
          🎯 **Loading Strategy**:
          1. Preconnect to all critical origins
          2. Preload LCP image and critical CSS
          3. Modulepreload critical JS bundles
          4. Prefetch likely next-page resources
          
          💡 **Implementation**:
          
          ```html
          <!DOCTYPE html>
          <html>
          <head>
            <!-- ============================================
                 STEP 1: Preconnect to Critical Origins
                 (Do this first - establishes connections)
                 ============================================ -->
            
            <!-- CDN for images/assets -->
            <link rel="preconnect" href="https://cdn.example.com" />
            
            <!-- API server -->
            <link rel="preconnect" href="https://api.example.com" />
            
            <!-- Analytics (with crossorigin for CORS) -->
            <link rel="preconnect" href="https://analytics.google.com" crossorigin />
            
            <!-- Payment provider -->
            <link rel="preconnect" href="https://js.stripe.com" crossorigin />
            
            <!-- DNS prefetch for less critical origins -->
            <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
            
            <!-- ============================================
                 STEP 2: Preload Critical Resources
                 (Current page, high priority)
                 ============================================ -->
            
            <!-- Preload LCP image -->
            <link rel="preload" 
                  as="image" 
                  href="https://cdn.example.com/hero.webp"
                  imagesrcset="https://cdn.example.com/hero-400.webp 400w,
                               https://cdn.example.com/hero-800.webp 800w"
                  imagesizes="100vw"
                  fetchpriority="high" />
            
            <!-- Preload critical CSS -->
            <link rel="preload" 
                  href="/css/critical.css" 
                  as="style" />
            
            <!-- Preload critical font -->
            <link rel="preload" 
                  href="/fonts/main-bold.woff2" 
                  as="font" 
                  type="font/woff2"
                  crossorigin />
            
            <!-- ============================================
                 STEP 3: Modulepreload Critical JS
                 (For ES module-based apps)
                 ============================================ -->
            
            <link rel="modulepreload" href="/js/app.mjs" />
            <link rel="modulepreload" href="/js/shared.mjs" />
            <link rel="modulepreload" href="/js/router.mjs" />
            
            <!-- ============================================
                 STEP 4: Prefetch Likely Next Resources
                 (Low priority, for next navigation)
                 ============================================ -->
            
            <!-- Prefetch product detail page (if on listing page) -->
            <link rel="prefetch" href="/product/featured-item" as="document" />
            
            <!-- Prefetch common product images -->
            <link rel="prefetch" href="https://cdn.example.com/products/featured-1.webp" as="image" />
            
            <!-- ============================================
                 STEP 5: Apply Critical Resources
                 ============================================ -->
            
            <!-- Critical CSS (inline or external) -->
            <link rel="stylesheet" href="/css/critical.css" />
            
            <!-- Main app script -->
            <script type="module" src="/js/app.mjs"></script>
          </head>
          ```
          
          📈 **Expected Impact**:
          - Preconnect: -100-300ms connection setup time
          - Preload: -200-500ms for critical resources
          - Modulepreload: -100-200ms for JS modules
          - Prefetch: Instant next-page loads
        notes: "Complete resource hints implementation"
      
      - name: "Dynamic Prefetching"
        user: "How do we implement smart prefetching based on user behavior?"
        ai_response: |
          📊 **Resource Analysis**:
          - Static prefetching wastes bandwidth
          - Dynamic prefetching based on user intent is more efficient
          - Hover/touchstart signals strong intent
          
          🎯 **Loading Strategy**:
          1. Prefetch on hover (desktop)
          2. Prefetch on touchstart (mobile)
          3. Use Intersection Observer for visible links
          4. Respect data saver mode
          
          💡 **Implementation**:
          
          ```javascript
          // Smart prefetching based on user intent
          class SmartPrefetcher {
            constructor(options = {}) {
              this.prefetched = new Set();
              this.hoverDelay = options.hoverDelay || 100;
              this.observer = null;
              
              this.init();
            }
            
            init() {
              // Don't prefetch if user has data saver enabled
              if (this.shouldSkipPrefetch()) return;
              
              this.setupHoverPrefetch();
              this.setupVisiblePrefetch();
            }
            
            shouldSkipPrefetch() {
              return (
                // Data saver mode
                navigator.connection?.saveData ||
                // Slow connection
                navigator.connection?.effectiveType === '2g' ||
                // Battery saver (if available)
                navigator.getBattery?.then(b => b.saveData)
              );
            }
            
            setupHoverPrefetch() {
              // Desktop: prefetch on hover after delay
              let hoverTimer;
              
              document.addEventListener('mouseover', (e) => {
                const link = e.target.closest('a[href^="/"]');
                if (!link) return;
                
                clearTimeout(hoverTimer);
                hoverTimer = setTimeout(() => {
                  this.prefetch(link.href);
                }, this.hoverDelay);
              });
              
              document.addEventListener('mouseout', () => {
                clearTimeout(hoverTimer);
              });
              
              // Mobile: prefetch on touchstart
              document.addEventListener('touchstart', (e) => {
                const link = e.target.closest('a[href^="/"]');
                if (link) {
                  this.prefetch(link.href);
                }
              }, { passive: true });
            }
            
            setupVisiblePrefetch() {
              // Prefetch links that become visible in viewport
              this.observer = new IntersectionObserver(
                (entries) => {
                  entries.forEach(entry => {
                    if (entry.isIntersecting) {
                      const link = entry.target;
                      this.prefetch(link.href);
                      this.observer.unobserve(link);
                    }
                  });
                },
                { rootMargin: '200px' } // Start prefetching 200px before visible
              );
              
              // Observe all internal links
              document.querySelectorAll('a[href^="/"]').forEach(link => {
                this.observer.observe(link);
              });
            }
            
            prefetch(url) {
              // Skip if already prefetched
              if (this.prefetched.has(url)) return;
              
              // Skip external URLs
              if (url.startsWith('http') && !url.startsWith(window.location.origin)) return;
              
              this.prefetched.add(url);
              
              // Use link rel=prefetch
              const link = document.createElement('link');
              link.rel = 'prefetch';
              link.href = url;
              link.as = 'document';
              document.head.appendChild(link);
              
              console.log(`[Prefetch] ${url}`);
            }
            
            // Prefetch specific resources (images, scripts, etc.)
            prefetchResource(url, as = 'fetch') {
              if (this.prefetched.has(url)) return;
              
              this.prefetched.add(url);
              
              const link = document.createElement('link');
              link.rel = 'prefetch';
              link.href = url;
              link.as = as;
              document.head.appendChild(link);
            }
          }
          
          // Usage
          const prefetcher = new SmartPrefetcher({
            hoverDelay: 100 // ms to wait before prefetching on hover
          });
          
          // Prefetch specific product images when viewing related products
          prefetcher.prefetchResource(
            'https://cdn.example.com/products/related-1.webp',
            'image'
          );
          ```
          
          📈 **Expected Impact**:
          - Intelligent prefetching reduces wasted bandwidth
          - Hover-based prefetching feels instant
          - Respects user preferences (data saver)
          - **Result: 50-80% faster perceived navigation**
        notes: "Smart prefetching based on user intent signals"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "gpt-4o"
      fallback_model: "claude-haiku"
    
    validation:
      hooks:
        - hook_id: critical-resource-check
          description: "Ensures critical resources are preloaded"
        - hook_id: preconnect-limit-check
          description: "Validates preconnect count is reasonable"
        - hook_id: fetchpriority-check
          description: "Verifies fetchpriority is set correctly"
    

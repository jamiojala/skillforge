    examples:
      - name: "Button Component Documentation"
        user: "Write comprehensive documentation for a Button component"
        ai_response: |
          🎯 **Component Overview**:
          
          ```mdx
          import { Meta, Story, Canvas, ArgsTable } from '@storybook/addon-docs';
          import { Button } from './Button';
          
          <Meta title="Components/Button" component={Button} />
          
          # Button
          
          Buttons allow users to take actions and make choices with a single tap. They're the primary way users interact with our interface.
          
          ## When to Use
          
          Use buttons for:
          - **Primary actions**: Submit forms, confirm choices, proceed to next step
          - **Secondary actions**: Cancel, go back, dismiss
          - **Destructive actions**: Delete, remove, permanently change state
          
          Don't use buttons for:
          - Navigation (use links instead)
          - Toggling states (use switches or checkboxes)
          
          ## Live Examples
          
          <Canvas>
            <Story name="Primary">
              <Button variant="primary">Primary Button</Button>
            </Story>
          </Canvas>
          
          ### Variants
          
          <Canvas>
            <Story name="Variants">
              <div style={{ display: 'flex', gap: '1rem' }}>
                <Button variant="primary">Primary</Button>
                <Button variant="secondary">Secondary</Button>
                <Button variant="ghost">Ghost</Button>
                <Button variant="danger">Danger</Button>
              </div>
            </Story>
          </Canvas>
          
          ### Sizes
          
          <Canvas>
            <Story name="Sizes">
              <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                <Button size="sm">Small</Button>
                <Button size="md">Medium</Button>
                <Button size="lg">Large</Button>
              </div>
            </Story>
          </Canvas>
          
          ### States
          
          <Canvas>
            <Story name="States">
              <div style={{ display: 'flex', gap: '1rem' }}>
                <Button>Default</Button>
                <Button disabled>Disabled</Button>
                <Button loading>Loading</Button>
              </div>
            </Story>
          </Canvas>
          
          ## Usage Guidelines
          
          ### Do's ✓
          
          - **Use clear, action-oriented labels**: "Save changes" not "OK"
          - **Place primary actions on the right** in button groups
          - **Use only one primary button per view**
          - **Provide loading state** for async actions
          
          <Canvas>
            <Story name="Do - Clear Label">
              <Button variant="primary">Save Changes</Button>
            </Story>
          </Canvas>
          
          ### Don'ts ✗
          
          - **Don't use vague labels**: "Click here" or "OK"
          - **Don't use multiple primary buttons**
          - **Don't disable buttons without explanation**
          
          <Canvas>
            <Story name="Don't - Vague Label">
              <Button variant="primary">Click Here</Button>
            </Story>
          </Canvas>
          
          ## API Reference
          
          <ArgsTable of={Button} />
          
          ### Props
          
          | Prop | Type | Default | Description |
          |------|------|---------|-------------|
          | `variant` | `'primary' \| 'secondary' \| 'ghost' \| 'danger'` | `'primary'` | Visual style of the button |
          | `size` | `'sm' \| 'md' \| 'lg'` | `'md'` | Size of the button |
          | `disabled` | `boolean` | `false` | Whether the button is disabled |
          | `loading` | `boolean` | `false` | Shows loading spinner |
          | `onClick` | `() => void` | - | Click handler |
          
          ## Code Examples
          
          ### Basic Usage
          
          ```tsx
          import { Button } from '@company/design-system';
          
          function App() {
            return (
              <Button variant="primary" onClick={() => console.log('Clicked!')}>
                Click Me
              </Button>
            );
          }
          ```
          
          ### With Loading State
          
          ```tsx
          function SaveButton() {
            const [isSaving, setIsSaving] = useState(false);
            
            const handleSave = async () => {
              setIsSaving(true);
              await saveData();
              setIsSaving(false);
            };
            
            return (
              <Button 
                variant="primary" 
                loading={isSaving}
                onClick={handleSave}
              >
                Save Changes
              </Button>
            );
          }
          ```
          
          ### Button Group
          
          ```tsx
          <div style={{ display: 'flex', gap: '0.5rem' }}>
            <Button variant="secondary">Cancel</Button>
            <Button variant="primary">Confirm</Button>
          </div>
          ```
          
          ## Accessibility
          
          ### Keyboard Navigation
          
          - **Tab**: Focus the button
          - **Enter** or **Space**: Activate the button
          - When disabled, button is not focusable
          
          ### Screen Reader
          
          - Buttons announce as "button" role
          - Loading state announces "Loading" via aria-label
          - Disabled state has `aria-disabled="true"`
          
          ### Best Practices
          
          - Always provide accessible labels
          - Use `aria-label` for icon-only buttons
          - Ensure sufficient color contrast (4.5:1 minimum)
          
          ## Design Rationale
          
          Our button design prioritizes:
          1. **Clarity**: Clear visual hierarchy between variants
          2. **Consistency**: Same interaction patterns across all buttons
          3. **Accessibility**: WCAG 2.2 AA compliant
          
          ## Related Components
          
          - [IconButton](./IconButton) - For icon-only actions
          - [ButtonGroup](./ButtonGroup) - For grouping related actions
          - [Link](./Link) - For navigation actions
          ```
        notes: "Comprehensive component documentation with live examples"
    
    delegation:

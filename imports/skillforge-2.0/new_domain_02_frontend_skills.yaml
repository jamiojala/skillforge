      - name: "3D Product Card with Depth"
        user: "Create a product card with 3D tilt effect that responds to mouse position"
        ai_response: |
          🎯 **3D Effect Goal**: Create a product card that tilts in 3D space based on mouse position, creating an interactive depth effect.
          
          💡 **3D Strategy**:
          - Container with perspective
          - JavaScript to track mouse position
          - Dynamic rotateX and rotateY based on cursor
          - Subtle shadow that moves with tilt
          
          📋 **Implementation**:
          
          ```tsx
          // TiltCard.tsx
          import { useRef, useState } from 'react';
          
          interface TiltCardProps {
            children: React.ReactNode;
            maxTilt?: number; // Maximum tilt angle in degrees
            scale?: number; // Scale on hover
          }
          
          export function TiltCard({ 
            children, 
            maxTilt = 15,
            scale = 1.02 
          }: TiltCardProps) {
            const cardRef = useRef<HTMLDivElement>(null);
            const [transform, setTransform] = useState('');
            const [shadow, setShadow] = useState('');
            
            const handleMouseMove = (e: React.MouseEvent<HTMLDivElement>) => {
              const card = cardRef.current;
              if (!card) return;
              
              const rect = card.getBoundingClientRect();
              const centerX = rect.left + rect.width / 2;
              const centerY = rect.top + rect.height / 2;
              
              // Calculate mouse position relative to center (-1 to 1)
              const mouseX = (e.clientX - centerX) / (rect.width / 2);
              const mouseY = (e.clientY - centerY) / (rect.height / 2);
              
              // Calculate rotation (invert Y for natural feel)
              const rotateY = mouseX * maxTilt;
              const rotateX = -mouseY * maxTilt;
              
              setTransform(`
                perspective(1000px)
                rotateX(${rotateX}deg)
                rotateY(${rotateY}deg)
                scale3d(${scale}, ${scale}, ${scale})
              `);
              
              // Dynamic shadow based on tilt
              const shadowX = -mouseX * 20;
              const shadowY = -mouseY * 20;
              setShadow(`${shadowX}px ${shadowY}px 30px rgba(0, 0, 0, 0.2)`);
            };
            
            const handleMouseLeave = () => {
              setTransform('');
              setShadow('');
            };
            
            return (
              <div
                ref={cardRef}
                className="tilt-card"
                onMouseMove={handleMouseMove}
                onMouseLeave={handleMouseLeave}
                style={{
                  transform,
                  boxShadow: shadow,
                  transition: 'transform 0.1s ease-out, box-shadow 0.1s ease-out',
                  transformStyle: 'preserve-3d',
                }}
              >
                {children}
              </div>
            );
          }
          ```
          
          ```css
          .tilt-card {

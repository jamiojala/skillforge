    examples:
      - name: "Complete Theming System"
        user: "Build a complete theming system with light/dark mode and persistence"
        ai_response: |
          🎯 **Theming Requirements**:
          - Light and dark themes
          - Instant theme switching
          - Persist user preference
          - Respect system preference
          - No flash of wrong theme
          
          💡 **Architecture Design**:
          - CSS custom properties for all theme values
          - Data attribute for theme state
          - Inline script to prevent flash
          - React context for theme management
          
          📋 **Implementation**:
          
          **Step 1: Prevent Flash of Wrong Theme (Inline Script)**
          ```html
          <!DOCTYPE html>
          <html>
          <head>
            <!-- This MUST be inline and in <head> -->
            <script>
              (function() {
                // Check for saved theme or system preference
                const savedTheme = localStorage.getItem('theme');
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                
                // Determine theme
                const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
                
                // Apply immediately before any rendering
                document.documentElement.setAttribute('data-theme', theme);
              })();
            </script>
            
            <!-- Theme styles -->
            <style>
              /* Light theme (default) */
              :root,
              [data-theme="light"] {
                --color-bg: #ffffff;
                --color-surface: #f9fafb;
                --color-text: #111827;
                --color-text-muted: #6b7280;
                --color-primary: #3b82f6;
                --color-border: #e5e7eb;
              }
              
              /* Dark theme */
              [data-theme="dark"] {
                --color-bg: #111827;
                --color-surface: #1f2937;
                --color-text: #f9fafb;
                --color-text-muted: #9ca3af;
                --color-primary: #60a5fa;
                --color-border: #374151;
              }
            </style>
          </head>
          ```
          
          **Step 2: React Theme Provider**
          ```tsx
          // ThemeContext.tsx
          import React, { createContext, useContext, useEffect, useState } from 'react';
          
          type Theme = 'light' | 'dark' | 'system';
          
          interface ThemeContextType {
            theme: Theme;
            resolvedTheme: 'light' | 'dark';
            setTheme: (theme: Theme) => void;
            toggleTheme: () => void;
          }
          
          const ThemeContext = createContext<ThemeContextType | undefined>(undefined);
          
          export function ThemeProvider({ children }: { children: React.ReactNode }) {
            const [theme, setThemeState] = useState<Theme>('system');
            const [resolvedTheme, setResolvedTheme] = useState<'light' | 'dark'>('light');
            
            // Initialize theme from localStorage
            useEffect(() => {
              const saved = localStorage.getItem('theme') as Theme;
              if (saved) {
                setThemeState(saved);
              }
            }, []);
            
            // Apply theme and listen for system changes
            useEffect(() => {
              const applyTheme = () => {
                let resolved: 'light' | 'dark';
                
                if (theme === 'system') {
                  resolved = window.matchMedia('(prefers-color-scheme: dark)').matches 
                    ? 'dark' 
                    : 'light';
                } else {
                  resolved = theme;
                }
                
                setResolvedTheme(resolved);
                document.documentElement.setAttribute('data-theme', resolved);
              };
              
              applyTheme();
              
              // Listen for system preference changes
              const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
              mediaQuery.addEventListener('change', applyTheme);
              
              return () => mediaQuery.removeEventListener('change', applyTheme);
            }, [theme]);
            
            const setTheme = (newTheme: Theme) => {
              setThemeState(newTheme);
              localStorage.setItem('theme', newTheme);
            };
            
            const toggleTheme = () => {
              const newTheme = resolvedTheme === 'light' ? 'dark' : 'light';
              setTheme(newTheme);
            };
            
            return (
              <ThemeContext.Provider value={{ theme, resolvedTheme, setTheme, toggleTheme }}>
                {children}
              </ThemeContext.Provider>
            );
          }
          
          export function useTheme() {
            const context = useContext(ThemeContext);
            if (!context) {
              throw new Error('useTheme must be used within ThemeProvider');
            }
            return context;
          }
          ```
          
          **Step 3: Theme Toggle Component**
          ```tsx
          // ThemeToggle.tsx
          import { useTheme } from './ThemeContext';
          
          export function ThemeToggle() {
            const { resolvedTheme, toggleTheme } = useTheme();
            
            return (
              <button 
                onClick={toggleTheme}
                aria-label={`Switch to ${resolvedTheme === 'light' ? 'dark' : 'light'} mode`}
              >
                {resolvedTheme === 'light' ? '🌙' : '☀️'}
              </button>
            );
          }
          ```
          
          **Step 4: Theme-Aware Components**
          ```tsx
          // Card.tsx
          export function Card({ children }: { children: React.ReactNode }) {
            return (
              <div className="card">
                {children}
              </div>
            );
          }
          ```
          
          ```css
          /* Card.css - uses theme variables */
          .card {
            background: var(--color-surface);
            color: var(--color-text);
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            padding: 1rem;
          }
          ```
          
          🎨 **Theme Definitions**:
          
          **Extended Theme with High Contrast**:
          ```css
          /* High contrast mode */
          @media (prefers-contrast: high) {
            [data-theme="light"] {
              --color-text: #000000;
              --color-border: #000000;
              --color-primary: #0000ff;
            }
            
            [data-theme="dark"] {
              --color-text: #ffffff;
              --color-border: #ffffff;
              --color-primary: #ffff00;
            }
          }
          ```
          
          ♿ **Accessibility Notes**:
          - Respects `prefers-color-scheme` system preference
          - Supports `prefers-contrast: high` for accessibility
          - Toggle button has proper aria-label
          - Theme change is instant (no page reload)
          - No flash of wrong theme on load
        notes: "Complete theming system with flash prevention"
      
      - name: "Multi-Theme System"
        user: "We need multiple brand themes (blue, green, purple). How do we structure this?"
        ai_response: |

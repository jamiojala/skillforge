    examples:
      - name: "Animated Gradient Background"
        user: "Create a smoothly animating gradient background that shifts colors"
        ai_response: |
          🎯 **Animation Goal**: Create a background gradient that smoothly transitions between color stops, creating a living, breathing effect.
          
          💡 **@property Strategy**: Register custom properties for the gradient angle and color stops, then animate them using CSS keyframes.
          
          📋 **Implementation**:
          ```css
          /* Register custom properties for animation */
          @property --gradient-angle {
            syntax: "<angle>";
            inherits: false;
            initial-value: 0deg;
          }
          
          @property --color-1 {
            syntax: "<color>";
            inherits: false;
            initial-value: #3b82f6;
          }
          
          @property --color-2 {
            syntax: "<color>";
            inherits: false;
            initial-value: #8b5cf6;
          }
          
          @property --color-3 {
            syntax: "<color>";
            inherits: false;
            initial-value: #ec4899;
          }
          
          /* Apply animated gradient */
          .animated-gradient {
            /* Use the registered properties in gradient */
            background: linear-gradient(
              var(--gradient-angle),
              var(--color-1),
              var(--color-2),
              var(--color-3)
            );
            
            /* Apply animation */
            animation: gradient-shift 8s ease infinite;
            
            /* Fallback for non-Chromium browsers */
            background-color: #3b82f6;
          }
          
          @keyframes gradient-shift {
            0% {
              --gradient-angle: 0deg;
              --color-1: #3b82f6;
              --color-2: #8b5cf6;
              --color-3: #ec4899;
            }
            33% {
              --gradient-angle: 120deg;
              --color-1: #8b5cf6;
              --color-2: #ec4899;
              --color-3: #3b82f6;
            }
            66% {
              --gradient-angle: 240deg;
              --color-1: #ec4899;
              --color-2: #3b82f6;
              --color-3: #8b5cf6;
            }
            100% {
              --gradient-angle: 360deg;
              --color-1: #3b82f6;
              --color-2: #8b5cf6;
              --color-3: #ec4899;
            }
          }
          ```
          
          🎨 **Animation Result**: A smoothly rotating gradient that shifts colors in a continuous loop. The gradient angle rotates while colors cycle through positions.
          
          🔄 **Fallback Strategy**:
          ```css
          /* Non-Chromium browsers get a static gradient */
          @supports not (@property --gradient-angle) {
            .animated-gradient {
              background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            }
          }
          ```
          
          📊 **Browser Support**: @property works in Chrome/Edge 85+, Opera 71+, Samsung Internet. Firefox and Safari do not yet support it.
        notes: "Shows gradient animation using @property registration"
      
      - name: "Animated Border Glow"
        user: "Create a pulsing glow effect around a button that animates smoothly"
        ai_response: |
          🎯 **Animation Goal**: Create a pulsing glow effect around a button where the glow color and spread animate smoothly.
          
          💡 **@property Strategy**: Register properties for glow color, spread radius, and opacity, then animate them for a breathing/pulsing effect.
          
          📋 **Implementation**:
          ```css
          /* Register properties for the glow effect */
          @property --glow-color {
            syntax: "<color>";
            inherits: false;
            initial-value: rgba(59, 130, 246, 0.5);
          }
          
          @property --glow-spread {
            syntax: "<length>";
            inherits: false;
            initial-value: 10px;
          }
          
          @property --glow-opacity {
            syntax: "<number>";
            inherits: false;
            initial-value: 0.5;
          }
          
          .glow-button {
            position: relative;
            padding: 1rem 2rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            
            /* The glow effect using registered properties */
            box-shadow: 
              0 0 var(--glow-spread) var(--glow-spread) var(--glow-color),
              inset 0 0 20px rgba(255, 255, 255, var(--glow-opacity));
            
            animation: pulse-glow 2s ease-in-out infinite;
          }
          
          @keyframes pulse-glow {
            0%, 100% {
              --glow-color: rgba(59, 130, 246, 0.3);
              --glow-spread: 10px;
              --glow-opacity: 0.3;
            }
            50% {
              --glow-color: rgba(59, 130, 246, 0.6);
              --glow-spread: 20px;
              --glow-opacity: 0.6;
            }
          }
          
          /* Hover state with faster animation */
          .glow-button:hover {
            animation-duration: 1s;
          }
          ```
          
          🎨 **Animation Result**: A smooth pulsing glow that breathes in and out around the button. The glow intensifies on hover with a faster pulse.
          
          🔄 **Fallback Strategy**:
          ```css
          @supports not (@property --glow-color) {
            .glow-button {
              /* Static glow for unsupported browsers */
              box-shadow: 0 0 15px 10px rgba(59, 130, 246, 0.4);
              animation: none;
            }
            
            .glow-button:hover {
              box-shadow: 0 0 25px 15px rgba(59, 130, 246, 0.6);
            }
          }
          ```
        notes: "Demonstrates multiple animated properties for complex effects"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "gpt-4o"
      fallback_model: "claude-haiku"
    
    validation:
      hooks:

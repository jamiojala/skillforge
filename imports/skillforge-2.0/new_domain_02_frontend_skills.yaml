        - "Are long tasks broken up?"
      decision_criteria:
        - "User impact vs. implementation effort"
        - "Device capability range"
        - "Code complexity trade-offs"
    
    response_format:
      structure:
        - "📊 Interaction Analysis"
        - "🎯 Optimization Strategy"
        - "💡 Implementation"
        - "📋 Code Solutions"
        - "📈 Performance Impact"
      required_elements:
        - "Slow interaction identification"
        - "Yielding implementation"
        - "Before/after timing"
        - "Testing approach"
      code_style:
        language: "typescript/javascript"
        comments: "verbose"
        examples: "always"
    
    examples:
      - name: "Slow Click Handler Fix"
        user: "Our button click handler takes 300ms. It's processing a large array. How do we fix this?"
        ai_response: |
          📊 **Interaction Analysis**:
          - Current handler time: 300ms
          - INP impact: Severe (>200ms threshold)
          - Root cause: Synchronous array processing blocking main thread
          
          🎯 **Optimization Strategy**:
          1. Break the array processing into smaller chunks
          2. Yield to main thread between chunks
          3. Show visual feedback immediately
          4. Process data asynchronously
          
          💡 **Implementation**:
          
          **Before (blocking):**
          ```javascript
          // ❌ BAD: Blocks for 300ms
          button.addEventListener('click', () => {
            const results = largeArray.map(expensiveOperation);
            updateUI(results);
          });
          ```
          
          **After (yielding):**
          ```javascript
          // ✅ GOOD: Yields to main thread
          button.addEventListener('click', async () => {
            // Show immediate feedback
            button.disabled = true;
            button.textContent = 'Processing...';
            
            // Process in chunks with yielding
            const results = await processInChunks(largeArray, 100);
            
            updateUI(results);
            button.disabled = false;
            button.textContent = 'Done!';
          });
          
          async function processInChunks(array, chunkSize) {
            const results = [];
            
            for (let i = 0; i < array.length; i += chunkSize) {
              const chunk = array.slice(i, i + chunkSize);
              results.push(...chunk.map(expensiveOperation));
              
              // Yield to main thread
              await yieldToMainThread();
            }
            
            return results;
          }
          
          function yieldToMainThread() {
            return new Promise(resolve => {
              // Use scheduler.yield() if available
              if ('scheduler' in window && scheduler.yield) {
                scheduler.yield().then(resolve);
              } else {
                setTimeout(resolve, 0);
              }
            });
          }
          ```
          
          📈 **Performance Impact**:
          - Before: 300ms blocking time
          - After: ~10ms per chunk, yielding between
          - INP improvement: 300ms → <50ms
          - User perception: Instant feedback
        notes: "Classic yielding pattern for long operations"
      
      - name: "Search Input Optimization"
        user: "Our search input feels sluggish. Users type and results update slowly. How do we optimize this?"
        ai_response: |
          📊 **Interaction Analysis**:
          - Input lag: ~150ms between keystroke and visual update
          - INP impact: Moderate (approaching threshold)
          - Root cause: Expensive search on every keystroke without debouncing
          
          🎯 **Optimization Strategy**:
          1. Debounce search to reduce frequency
          2. Use requestIdleCallback for non-urgent updates
          3. Implement virtual scrolling for large result sets
          4. Show immediate visual feedback
          
          💡 **Implementation**:
          
          ```javascript
          // Optimized search component
          class SearchInput {
            constructor(input, resultsContainer) {
              this.input = input;
              this.resultsContainer = resultsContainer;
              this.debounceTimer = null;
              this.abortController = null;
              
              this.input.addEventListener('input', (e) => this.handleInput(e));
            }
            
            handleInput(event) {
              const query = event.target.value;
              
              // Immediate visual feedback (no delay)
              this.showSearchingState();
              
              // Clear previous debounce
              clearTimeout(this.debounceTimer);
              
              // Cancel previous search
              if (this.abortController) {
                this.abortController.abort();
              }
              
              // Debounce search execution
              this.debounceTimer = setTimeout(() => {
                this.performSearch(query);
              }, 150); // 150ms debounce
            }
            
            async performSearch(query) {
              if (!query.trim()) {
                this.clearResults();
                return;
              }
              
              this.abortController = new AbortController();
              
              try {
                // Use requestIdleCallback for non-critical rendering
                await new Promise(resolve => {
                  if ('requestIdleCallback' in window) {
                    requestIdleCallback(resolve, { timeout: 100 });
                  } else {
                    setTimeout(resolve, 0);
                  }
                });
                
                const results = await fetchSearchResults(query, this.abortController.signal);
                
                // Chunk result rendering
                await this.renderResultsInChunks(results, 20);
                
              } catch (error) {
                if (error.name !== 'AbortError') {
                  this.showError(error);
                }
              }
            }
            
            async renderResultsInChunks(results, chunkSize) {
              this.resultsContainer.innerHTML = '';
              
              for (let i = 0; i < results.length; i += chunkSize) {
                const chunk = results.slice(i, i + chunkSize);
                const chunkHtml = chunk.map(r => this.renderResult(r)).join('');
                
                this.resultsContainer.insertAdjacentHTML('beforeend', chunkHtml);
                
                // Yield to main thread every chunk
                if (i + chunkSize < results.length) {
                  await new Promise(resolve => setTimeout(resolve, 0));
                }
              }
            }
            
            showSearchingState() {
              this.resultsContainer.innerHTML = '<div class="searching">Searching...</div>';
            }
            
            renderResult(result) {
              return `<div class="result">${result.title}</div>`;
            }
          }
          
          // Usage
          const search = new SearchInput(
            document.getElementById('search-input'),
            document.getElementById('search-results')
          );
          ```
          
          📈 **Performance Impact**:
          - Debounce reduces search frequency by ~80%
          - Chunked rendering prevents jank
          - INP improvement: 150ms → <50ms
          - User perception: Responsive, fluid typing
        notes: "Comprehensive search optimization with debouncing and chunked rendering"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "gpt-4o"
      fallback_model: "claude-haiku"
    
    validation:
      hooks:

    examples:
      - name: "Complete Token System Setup"
        user: "Create a design token system for our product with colors, spacing, and typography"
        ai_response: |
          🎯 **Token System Design**:
          Three-tier hierarchy: Primitive (raw values) → Semantic (purpose) → Component (specific)
          
          💡 **Taxonomy Strategy**:
          - **Primitive**: color.blue.500, space.4, font.size.16
          - **Semantic**: color.primary, space.component.padding, font.body.size
          - **Component**: button.primary.bg, card.padding
          
          📋 **Token Structure**:
          
          **tokens/primitive/color.json**
          ```json
          {
            "color": {
              "blue": {
                "50": { "value": "#eff6ff", "type": "color" },
                "100": { "value": "#dbeafe", "type": "color" },
                "500": { "value": "#3b82f6", "type": "color" },
                "600": { "value": "#2563eb", "type": "color" },
                "900": { "value": "#1e3a8a", "type": "color" }
              },
              "gray": {
                "50": { "value": "#f9fafb", "type": "color" },
                "100": { "value": "#f3f4f6", "type": "color" },
                "500": { "value": "#6b7280", "type": "color" },
                "900": { "value": "#111827", "type": "color" }
              }
            }
          }
          ```
          
          **tokens/primitive/space.json**
          ```json
          {
            "space": {
              "0": { "value": "0", "type": "dimension" },
              "1": { "value": "0.25rem", "type": "dimension" },
              "2": { "value": "0.5rem", "type": "dimension" },
              "4": { "value": "1rem", "type": "dimension" },
              "8": { "value": "2rem", "type": "dimension" },
              "16": { "value": "4rem", "type": "dimension" }
            }
          }
          ```
          
          **tokens/semantic/color.json**
          ```json
          {
            "color": {
              "primary": { "value": "{color.blue.500}", "type": "color" },
              "primary-hover": { "value": "{color.blue.600}", "type": "color" },
              "text": { "value": "{color.gray.900}", "type": "color" },
              "text-muted": { "value": "{color.gray.500}", "type": "color" },
              "background": { "value": "{color.gray.50}", "type": "color" },
              "border": { "value": "{color.gray.100}", "type": "color" }
            }
          }
          ```
          
          **tokens/component/button.json**
          ```json
          {
            "button": {
              "primary": {
                "bg": { "value": "{color.primary}", "type": "color" },
                "bg-hover": { "value": "{color.primary-hover}", "type": "color" },
                "text": { "value": "#ffffff", "type": "color" },
                "padding": { "value": "{space.2} {space.4}", "type": "dimension" },
                "border-radius": { "value": "0.5rem", "type": "dimension" }
              }
            }
          }
          ```
          
          🔧 **Transformation Pipeline**:
          
          **config.js**
          ```javascript
          module.exports = {
            source: ['tokens/**/*.json'],
            platforms: {
              css: {
                transformGroup: 'css',
                buildPath: 'build/css/',
                files: [{
                  destination: 'variables.css',
                  format: 'css/variables'
                }]
              },
              scss: {
                transformGroup: 'scss',
                buildPath: 'build/scss/',
                files: [{
                  destination: '_variables.scss',
                  format: 'scss/variables'
                }]
              },
              js: {
                transformGroup: 'js',
                buildPath: 'build/js/',
                files: [{
                  destination: 'tokens.js',
                  format: 'javascript/es6'
                }]
              },
              ios: {
                transformGroup: 'ios',
                buildPath: 'build/ios/',
                files: [{
                  destination: 'StyleDictionary.swift',
                  format: 'ios-swift/class.swift'
                }]
              }
            }
          };
          ```
          
          **package.json scripts**
          ```json
          {
            "scripts": {
              "build:tokens": "style-dictionary build",
              "watch:tokens": "style-dictionary build --watch"
            }
          }
          ```
          
          📚 **Documentation**:
          
          **Token Usage Guidelines**:
          ```
          ## Token Usage
          
          ### Primitive Tokens
          Use for defining new semantic tokens. Don't use directly in components.
          
          ### Semantic Tokens
          Use for component styling. Reference these in your CSS.
          
          ### Component Tokens
          Use when extending components. These are component-specific.
          
          ## Examples
          
          ```css
          /* ✅ Good: Use semantic tokens */
          .my-component {
            color: var(--color-text);
            padding: var(--space-4);
          }
          
          /* ❌ Bad: Don't use primitive tokens directly */
          .my-component {
            color: var(--color-gray-900);
          }
          ```
          ```
        notes: "Complete design token system with transformation pipeline"
      
      - name: "Dark Mode Token Setup"
        user: "How do we structure tokens to support dark mode?"

      required_elements:
        - "Before and after code comparison"
        - "Specificity impact analysis"
        - "Browser support information"
      code_style:
        language: "css"
        comments: "verbose"
        examples: "always"
    
    examples:
      - name: "Button Component Nesting"
        user: "Refactor this flat button CSS using native nesting"
        ai_response: |
          🎯 **Nesting Strategy**: Group related selectors (pseudo-classes, modifiers, states) under the base .btn selector to show relationships and reduce repetition.
          
          📊 **Before/After Comparison**:
          
          **Before (flat):**
          ```css
          .btn {
            display: inline-flex;
            padding: 0.5rem 1rem;
            background: #3b82f6;
            color: white;
            border-radius: 0.25rem;
          }
          
          .btn:hover {
            background: #2563eb;
          }
          
          .btn:focus {
            outline: 2px solid #60a5fa;
            outline-offset: 2px;
          }
          
          .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
          }
          
          .btn--large {
            padding: 0.75rem 1.5rem;
            font-size: 1.125rem;
          }
          
          .btn--secondary {
            background: transparent;
            color: #3b82f6;
            border: 1px solid currentColor;
          }
          
          .btn--secondary:hover {
            background: #eff6ff;
          }
          ```
          
          **After (nested):**
          ```css
          .btn {
            display: inline-flex;
            padding: 0.5rem 1rem;
            background: #3b82f6;
            color: white;
            border-radius: 0.25rem;
            
            /* Pseudo-classes */
            &:hover {
              background: #2563eb;
            }
            
            &:focus {
              outline: 2px solid #60a5fa;
              outline-offset: 2px;
            }
            
            &:disabled {
              opacity: 0.5;
              cursor: not-allowed;
            }
            
            /* Modifiers */
            &--large {
              padding: 0.75rem 1.5rem;
              font-size: 1.125rem;
            }
            
            &--secondary {
              background: transparent;
              color: #3b82f6;
              border: 1px solid currentColor;
              
              &:hover {
                background: #eff6ff;
              }
            }
          }
          ```
          
          ⚠️ **Specificity Notes**: Nesting maintains the same specificity as the flat version. `.btn:hover` and `.btn { &:hover }` both have (0,2,0) specificity.
          
          💡 **Key Improvements**:
          - Shows relationship between base and modifiers
          - Reduces repetition of `.btn` prefix
          - Groups related styles together
          - Easier to understand component structure
        notes: "Demonstrates basic nesting for pseudo-classes and modifiers"
      
      - name: "Card with Media Query Nesting"
        user: "Show me how to nest media queries within a card component"
        ai_response: |
          🎯 **Nesting Strategy**: Nest media queries directly within the component block to keep responsive styles co-located with the component they affect.
          
          📊 **Before/After Comparison**:
          
          **Before (media queries at bottom):**
          ```css
          .card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1rem;
          }
          
          .card__image {
            width: 100%;
            aspect-ratio: 16 / 9;
          }
          
          .card__title {
            font-size: 1.25rem;
          }
          
          @media (min-width: 768px) {
            .card {
              flex-direction: row;
              padding: 1.5rem;
            }
            
            .card__image {
              width: 200px;
            }
            
            .card__title {
              font-size: 1.5rem;
            }
          }
          ```
          
          **After (nested media queries):**
          ```css
          .card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1rem;
            
            @media (min-width: 768px) {
              flex-direction: row;
              padding: 1.5rem;
            }
            
            &__image {
              width: 100%;
              aspect-ratio: 16 / 9;
              
              @media (min-width: 768px) {
                width: 200px;
              }
            }
            
            &__title {
              font-size: 1.25rem;
              
              @media (min-width: 768px) {
                font-size: 1.5rem;
              }
            }
          }
          ```
          
          💡 **Key Benefits**:
          - Responsive styles live with their components
          - No need to repeat `.card` prefix in media queries
          - Easier to maintain—changes are localized
          - Better code organization
          
          ⚠️ **Note**: The compiled CSS will have media queries at the root level. Nesting is just a developer convenience.
        notes: "Shows media query nesting for better organization"
    
    delegation:
      primary_model: "gpt-4o"
      secondary_model: "claude-sonnet-4"
      fallback_model: "claude-haiku"
    
    validation:
      hooks:
        - hook_id: nesting-depth-check
          description: "Ensures nesting doesn't exceed 3 levels"
        - hook_id: ampersand-position-check
          description: "Validates & is at the start of compound selectors"
        - hook_id: specificity-check
          description: "Warns about specificity increases from nesting"
    
    metadata:
      complexity: "medium"
      estimated_time_saved: "4-8 hours"
      version: "1.0.0"
      author: "SkillForge Team"
      last_updated: "2025-01-15"


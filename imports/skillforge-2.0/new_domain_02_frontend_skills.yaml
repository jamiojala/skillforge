    examples:
      - name: "Aligned Card Grid"
        user: "Create a card grid where all card headers, content, and footers align horizontally"
        ai_response: |
          🎯 **Layout Requirements**: A grid of cards where each card's header, content area, and footer align perfectly across all cards, regardless of content length.
          
          💡 **Subgrid Strategy**: 
          - Parent grid defines the card columns
          - Each card uses `grid-template-rows: subgrid` to align its internal sections
          - Cards span multiple rows of the parent grid
          
          📋 **Implementation**:
          ```html
          <div class="card-grid">
            <article class="card">
              <header class="card-header">Short Title</header>
              <div class="card-content">Brief content.</div>
              <footer class="card-footer">Read more</footer>
            </article>
            <article class="card">
              <header class="card-header">Much Longer Card Title</header>
              <div class="card-content">This is much longer content that takes up more space vertically.</div>
              <footer class="card-footer">Learn more →</footer>
            </article>
            <!-- More cards... -->
          </div>
          ```
          
          ```css
          /* Parent grid: defines columns and rows */
          .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            /* Define row tracks for alignment */
            grid-auto-rows: auto 1fr auto;
            gap: 1.5rem;
          }
          
          /* Each card spans 3 rows of the parent */
          .card {
            display: grid;
            /* Use parent's row tracks */
            grid-template-rows: subgrid;
            grid-row: span 3;
            
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
          }
          
          .card-header {
            padding: 1rem;
            background: #f8fafc;
            font-weight: 600;
            font-size: 1.125rem;
          }
          
          .card-content {
            padding: 1rem;
            color: #64748b;
          }
          
          .card-footer {
            padding: 1rem;
            background: #f1f5f9;
            font-size: 0.875rem;
            color: #3b82f6;
          }
          ```
          
          🎨 **Visual Result**: All card headers align on the same row, all content areas start at the same height, and all footers align at the bottom—regardless of content length in each card.
          
          🔄 **Fallback Strategy**:
          ```css
          @supports not (grid-template-rows: subgrid) {
            .card {
              display: flex;
              flex-direction: column;
            }
            
            .card-content {
              flex: 1;
            }
          }
          ```
          
          📊 **Browser Support**: Subgrid is supported in Firefox 71+, Safari 16+, and Chrome 117+. The fallback uses flexbox for older browsers.
        notes: "Classic card alignment use case for subgrid"
      
      - name: "Form Layout with Subgrid"
        user: "Create a form where labels and inputs align in a complex multi-column layout"
        ai_response: |
          🎯 **Layout Requirements**: A form with labels and inputs that align across multiple columns, where each form row's label and input align with those in other rows.
          
          💡 **Subgrid Strategy**:
          - Parent grid defines label and input columns
          - Each form row uses `grid-template-columns: subgrid`
          - Labels and inputs automatically align across all rows
          
          📋 **Implementation**:
          ```html
          <form class="form-grid">
            <div class="form-row">
              <label for="name">Full Name</label>
              <input type="text" id="name" />
            </div>
            <div class="form-row">
              <label for="email">Email Address</label>
              <input type="email" id="email" />
            </div>
            <div class="form-row">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" />
            </div>
          </form>
          ```
          
          ```css
          .form-grid {
            display: grid;
            /* Label column + Input column */
            grid-template-columns: 150px 1fr;
            gap: 1rem 1.5rem;
            max-width: 600px;
          }
          
          .form-row {
            display: grid;
            /* Use parent's column tracks */
            grid-template-columns: subgrid;
            /* Span across both columns */
            grid-column: 1 / -1;
            align-items: center;

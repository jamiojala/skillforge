          2. Integration: Component-level accessibility tests
          3. Manual: Screen reader testing procedures
          
          🤖 **Automated Testing Setup**:
          
          **Install dependencies**:
          ```bash
          npm install --save-dev @axe-core/react jest-axe @testing-library/jest-dom
          ```
          
          **jest.config.js**:
          ```javascript
          module.exports = {
            setupFilesAfterEnv: ['<rootDir>/jest.setup.js'],
          };
          ```
          
          **jest.setup.js**:
          ```javascript
          import '@testing-library/jest-dom';
          import { toHaveNoViolations } from 'jest-axe';
          
          expect.extend(toHaveNoViolations);
          ```
          
          **Component test with axe**:
          ```tsx
          // Button.test.tsx
          import { render, screen } from '@testing-library/react';
          import { axe, toHaveNoViolations } from 'jest-axe';
          import { Button } from './Button';
          
          expect.extend(toHaveNoViolations);
          
          describe('Button', () => {
            it('should have no accessibility violations', async () => {
              const { container } = render(
                <Button variant="primary">Click me</Button>
              );
              
              const results = await axe(container);
              expect(results).toHaveNoViolations();
            });
            
            it('should be keyboard accessible', () => {
              render(<Button>Click me</Button>);
              const button = screen.getByRole('button');
              
              expect(button).toHaveFocus();
              button.focus();
              expect(button).toHaveFocus();
            });
            
            it('should have accessible name', () => {
              render(<Button>Save Changes</Button>);
              expect(screen.getByRole('button', { name: 'Save Changes' })).toBeInTheDocument();
            });
          });
          ```
          
          **Custom axe configuration**:
          ```typescript
          // axe-config.ts
          export const axeConfig = {
            rules: {
              // Enable all rules by default
              'color-contrast': { enabled: true },
              'label': { enabled: true },
              'aria-required-attr': { enabled: true },
              'aria-required-children': { enabled: true },
              
              // Disable rules that may have false positives
              'region': { enabled: false }, // Requires landmarks, may not apply
            },
            // Only test visible elements
            elementRef: true,
          };
          ```
          
          👨‍💻 **Screen Reader Testing**:
          
          **NVDA Testing Procedure**:
          1. Install NVDA (free screen reader for Windows)
          2. Start NVDA with default settings
          3. Navigate to component using Tab key
          4. Verify announcements:
             - Role announced ("button", "link", etc.)
             - Name announced (label text)
             - State announced ("expanded", "checked", etc.)
          
          **VoiceOver Testing (macOS)**:
          1. Enable VoiceOver: Cmd + F5
          2. Navigate with Ctrl + Option + Arrow keys
          3. Interact with Ctrl + Option + Space
          4. Verify same announcements as NVDA
          
          **Test Checklist Template**:
          ```markdown
          ## Component: [Name]
          
          ### Keyboard Navigation
          - [ ] Tab reaches component
          - [ ] Enter/Space activates
          - [ ] Arrow keys navigate (if applicable)
          - [ ] Escape closes (if applicable)
          
          ### Screen Reader (NVDA)
          - [ ] Role announced correctly
          - [ ] Name announced correctly
          - [ ] State announced correctly
          - [ ] Changes announced
          
          ### Screen Reader (VoiceOver)
          - [ ] Same as NVDA
          
          ### axe-core
          - [ ] No violations
          ```
          
          🚀 **CI/CD Integration**:
          
          **.github/workflows/a11y.yml**:
          ```yaml
          name: Accessibility Tests
          
          on: [push, pull_request]
          
          jobs:
            test:
              runs-on: ubuntu-latest
              
              steps:
                - uses: actions/checkout@v3
                
                - name: Setup Node.js
                  uses: actions/setup-node@v3
                  with:
                    node-version: '18'
                    cache: 'npm'
                
                - name: Install dependencies
                  run: npm ci
                
                - name: Run accessibility tests
                  run: npm run test:a11y
                
                - name: Run axe on built app
                  run: |
                    npm run build
                    npm run test:axe-ci
          ```
          
          **package.json scripts**:
          ```json
          {
            "scripts": {
              "test:a11y": "jest --testPathPattern='a11y|accessibility'",
              "test:axe-ci": "axe http://localhost:3000 --exit"
            }
          }
          ```
        notes: "Complete accessibility testing setup with automation and screen reader procedures"
    

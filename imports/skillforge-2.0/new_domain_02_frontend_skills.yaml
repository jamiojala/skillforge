            background: white;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            will-change: transform;
          }
          
          .tilt-card-content {
            padding: 1.5rem;
            transform: translateZ(50px); /* Pop content forward in 3D space */
          }
          
          .tilt-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transform: translateZ(30px); /* Image slightly forward */
          }
          
          /* Reduced motion support */
          @media (prefers-reduced-motion: reduce) {
            .tilt-card {
              transition: none !important;
              transform: none !important;
            }
          }
          ```
          
          **Usage**:
          ```tsx

          2. **Screen Reader Test**:
             - Verify labels announced
             - Verify required fields indicated
             - Submit with errors, verify error announcement
             - Verify error summary is focused
          3. **axe-core Test**: Run automated accessibility check
        notes: "Complete accessible form with validation and error handling"
    

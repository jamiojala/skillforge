          ```
          Primary: #3b82f6 (blue-500)
          Secondary: #6b7280 (gray-500)
          Success: #22c55e (green-500)
          Error: #ef4444 (red-500)
          Background: #ffffff
          Text: #111827
          ```
          
          **Contrast Ratios (on white background)**:
          | Color | Ratio | WCAG AA Normal | WCAG AA Large |
          |-------|-------|----------------|---------------|
          | #111827 (text) | 15.8:1 | ✅ Pass | ✅ Pass |
          | #3b82f6 (primary) | 3.3:1 | ❌ Fail | ✅ Pass |
          | #6b7280 (secondary) | 5.5:1 | ✅ Pass | ✅ Pass |
          | #22c55e (success) | 2.9:1 | ❌ Fail | ❌ Fail |
          | #ef4444 (error) | 4.0:1 | ❌ Fail | ✅ Pass |
          
          🎯 **Compliance Strategy**:
          - Adjust primary color for better contrast
          - Use darker success color
          - Use darker error color for normal text
          
          💡 **Color Adjustments**:
          
          ```css
          /* Before (non-compliant) */
          :root {
            --color-primary: #3b82f6;      /* 3.3:1 - FAILS AA normal */
            --color-success: #22c55e;      /* 2.9:1 - FAILS AA */
            --color-error: #ef4444;        /* 4.0:1 - FAILS AA normal */
          }
          
          /* After (WCAG AA compliant) */
          :root {
            --color-primary: #2563eb;      /* 4.6:1 - PASSES AA normal */
            --color-success: #15803d;      /* 4.6:1 - PASSES AA normal */
            --color-error: #dc2626;        /* 4.6:1 - PASSES AA normal */
          }
          ```
          
          **Dark Mode Contrast**:
          ```css
          @media (prefers-color-scheme: dark) {
            :root {
              --color-bg: #111827;
              --color-text: #f9fafb;
              
              /* Adjust for dark background */
              --color-primary: #60a5fa;      /* 4.7:1 on dark */
              --color-success: #4ade80;      /* 4.6:1 on dark */
              --color-error: #f87171;        /* 4.6:1 on dark */
            }
          }
          ```
          
          🔧 **Automation Setup**:
          
          **contrast-check.js**:
          ```javascript
          const { getContrast } = require('color-contrast-checker');
          const tokens = require('./tokens.json');
          
          function checkContrast(foreground, background) {
            const ratio = getContrast(foreground, background);
            return {
              ratio: ratio.toFixed(2),
              passesAA: ratio >= 4.5,
              passesAALarge: ratio >= 3,
            };
          }
          
          // Check all combinations
          const colors = tokens.color;
          const background = colors.background;
          
          Object.entries(colors).forEach(([name, value]) => {
            if (name === 'background') return;
            
            const result = checkContrast(value, background);
            console.log(`${name}: ${result.ratio}:1 - ${result.passesAA ? '✅' : '❌'}`);
            
            if (!result.passesAA) {
              console.error(`  FAILS WCAG AA for normal text`);
              process.exitCode = 1;
            }
          });
          ```
          
          **package.json**:
          ```json
          {
            "scripts": {
              "check-contrast": "node contrast-check.js"
            }
          }
          ```

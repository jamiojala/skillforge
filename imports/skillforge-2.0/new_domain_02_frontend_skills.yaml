          - Track drag position for visual feedback
          - Trigger actions on swipe threshold
          - Animate card exit and next card entrance
          
          📋 **Code Solution**:
          
          ```tsx
          // SwipeableCard.tsx
          import { motion, useMotionValue, useTransform, PanInfo } from 'framer-motion';
          import { useState } from 'react';
          
          interface SwipeableCardProps {
            id: string;
            content: React.ReactNode;
            onSwipeLeft: (id: string) => void;
            onSwipeRight: (id: string) => void;
          }
          
          export function SwipeableCard({ 
            id, 
            content, 
            onSwipeLeft, 
            onSwipeRight 
          }: SwipeableCardProps) {
            const [exitX, setExitX] = useState(0);
            
            // Motion values for tracking
            const x = useMotionValue(0);
            const rotate = useTransform(x, [-200, 200], [-30, 30]);
            const opacity = useTransform(
              x, 
              [-200, -100, 0, 100, 200], 
              [0.5, 1, 1, 1, 0.5]
            );
            
            // Visual feedback transforms
            const leftIndicatorOpacity = useTransform(x, [-100, -50], [1, 0]);
            const rightIndicatorOpacity = useTransform(x, [50, 100], [0, 1]);
            const backgroundColor = useTransform(
              x,
              [-200, -100, 0, 100, 200],
              ['#ef4444', '#ffffff', '#ffffff', '#ffffff', '#22c55e']
            );
            
            const handleDragEnd = (event: any, info: PanInfo) => {
              const threshold = 100;
              
              if (info.offset.x > threshold) {
                setExitX(500);
                onSwipeRight(id);
              } else if (info.offset.x < -threshold) {
                setExitX(-500);
                onSwipeLeft(id);
              }
            };
            
            return (
              <motion.div
                className="swipe-card"
                style={{ 
                  x, 
                  rotate, 
                  opacity,
                  backgroundColor,
                  touchAction: 'pan-y', // Allow vertical scroll
                }}
                drag="x"
                dragConstraints={{ left: 0, right: 0 }}
                dragElastic={0.8}
                onDragEnd={handleDragEnd}
                animate={{ x: exitX }}
                transition={{ type: 'spring', stiffness: 300, damping: 30 }}
              >
                {/* Swipe indicators */}
                <motion.div 
                  className="swipe-indicator swipe-indicator--left"
                  style={{ opacity: leftIndicatorOpacity }}
                >
                  ✕
                </motion.div>
                <motion.div 
                  className="swipe-indicator swipe-indicator--right"
                  style={{ opacity: rightIndicatorOpacity }}
                >
                  ✓
                </motion.div>
                
                {content}
              </motion.div>
            );
          }
          ```
          

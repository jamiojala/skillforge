      - name: "Parallax Scroll Effect"
        user: "Create a parallax effect where background moves slower than foreground"
        ai_response: |
          🎯 **Scroll Animation Goal**: Create depth by making background elements move slower than foreground content as users scroll.
          
          💡 **Technique Selection**: Use GSAP ScrollTrigger for smooth, performant parallax with precise control over scroll-linked movement.
          
          📋 **Implementation**:
          
          ```tsx
          // ParallaxSection.tsx
          import { useEffect, useRef } from 'react';
          import gsap from 'gsap';
          import { ScrollTrigger } from 'gsap/ScrollTrigger';
          
          gsap.registerPlugin(ScrollTrigger);
          
          interface ParallaxSectionProps {
            children: React.ReactNode;
            backgroundImage: string;
            parallaxSpeed?: number; // 0.5 = half speed, 2 = double speed
          }
          
          export function ParallaxSection({ 
            children, 
            backgroundImage,
            parallaxSpeed = 0.5 
          }: ParallaxSectionProps) {
            const sectionRef = useRef<HTMLElement>(null);
            const backgroundRef = useRef<HTMLDivElement>(null);
            
            useEffect(() => {
              const section = sectionRef.current;
              const background = backgroundRef.current;
              
              if (!section || !background) return;
              
              // Check for reduced motion
              const prefersReducedMotion = window.matchMedia(
                '(prefers-reduced-motion: reduce)'
              ).matches;
              
              if (prefersReducedMotion) return;
              
              // Create parallax animation
              const tl = gsap.timeline({
                scrollTrigger: {
                  trigger: section,
                  start: 'top bottom',
                  end: 'bottom top',
                  scrub: true, // Smooth scroll-linked animation
                }
              });
              
              // Background moves slower than scroll
              tl.to(background, {
                y: `${(1 - parallaxSpeed) * 100}%`,
                ease: 'none'
              });
              
              return () => {
                tl.kill();
                ScrollTrigger.getAll().forEach(st => {
                  if (st.trigger === section) st.kill();
                });
              };
            }, [parallaxSpeed]);
            
            return (
              <section 
                ref={sectionRef}
                className="parallax-section"
                style={{ position: 'relative', overflow: 'hidden', minHeight: '100vh' }}
              >
                <div
                  ref={backgroundRef}
                  className="parallax-background"
                  style={{
                    position: 'absolute',
                    inset: '-20% 0',
                    backgroundImage: `url(${backgroundImage})`,
                    backgroundSize: 'cover',
                    backgroundPosition: 'center',
                    willChange: 'transform',
                  }}
                />
                <div 
                  className="parallax-content"
                  style={{ position: 'relative', zIndex: 1 }}
                >
                  {children}
                </div>
              </section>
            );
          }
          ```
          

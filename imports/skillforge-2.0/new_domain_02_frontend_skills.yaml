    examples:
      - name: "Complete Style Dictionary Setup"
        user: "Set up Style Dictionary to output CSS, SCSS, JS, and iOS formats"
        ai_response: |
          🎯 **Pipeline Requirements**:
          - Input: W3C format JSON tokens
          - Output: CSS, SCSS, JS/TS, iOS Swift
          - Handle references and themes
          - CI/CD automated builds
          
          💡 **Configuration Strategy**:
          - Use built-in transforms for common formats
          - Create custom transforms for special needs
          - Separate platforms into different build paths
          
          📋 **Style Dictionary Config**:
          
          **style-dictionary.config.js**
          ```javascript
          const StyleDictionary = require('style-dictionary');
          
          // Custom transform: Convert px to rem
          StyleDictionary.registerTransform({
            name: 'size/px-to-rem',
            type: 'value',
            matcher: (token) => token.type === 'dimension' && token.value.endsWith('px'),
            transformer: (token) => {
              const px = parseFloat(token.value);
              return `${px / 16}rem`;
            }
          });
          
          // Custom transform: Add px suffix for iOS
          StyleDictionary.registerTransform({
            name: 'size/swift-px',
            type: 'value',
            matcher: (token) => token.type === 'dimension',
            transformer: (token) => {
              return parseFloat(token.value).toString();
            }
          });
          
          // Custom format: TypeScript types
          StyleDictionary.registerFormat({
            name: 'typescript/types',
            formatter: function({ dictionary }) {
              const tokens = dictionary.allTokens
                .map(token => `  "${token.name}": string;`)
                .join('\\n');
              
              return `export interface DesignTokens {\\n${tokens}\\n}`;
            }
          });
          
          // Custom format: Swift class
          StyleDictionary.registerFormat({
            name: 'ios-swift/class',
            formatter: function({ dictionary, options }) {
              const className = options.className || 'DesignTokens';
              
              const properties = dictionary.allTokens
                .map(token => {
                  const value = token.type === 'color' 
                    ? `UIColor(hex: "${token.value}")`
                    : token.value;
                  return `    static let ${token.name} = ${value}`;
                })
                .join('\\n');
              
              return `import UIKit\\n\\nclass ${className} {\\n${properties}\\n}`;
            }
          });
          
          module.exports = {
            source: ['tokens/**/*.json'],
            
            platforms: {
              // CSS Custom Properties
              css: {
                transformGroup: 'css',
                buildPath: 'build/css/',
                files: [{
                  destination: 'variables.css',
                  format: 'css/variables',
                  options: {
                    outputReferences: true
                  }
                }]
              },
              
              // SCSS Variables
              scss: {
                transformGroup: 'scss',
                buildPath: 'build/scss/',
                files: [{
                  destination: '_variables.scss',
                  format: 'scss/variables',
                  options: {
                    outputReferences: true
                  }
                }]
              },
              
              // JavaScript ES6
              js: {
                transformGroup: 'js',
                buildPath: 'build/js/',
                files: [
                  {
                    destination: 'tokens.js',
                    format: 'javascript/es6'
                  },
                  {
                    destination: 'tokens.d.ts',
                    format: 'typescript/types'
                  }
                ]
              },
              
              // iOS Swift
              ios: {
                transforms: ['attribute/cti', 'name/cti/pascal', 'size/swift-px', 'color/UIColorSwift'],
                buildPath: 'build/ios/',
                files: [{
                  destination: 'DesignTokens.swift',
                  format: 'ios-swift/class',
                  options: {
                    className: 'DesignTokens'
                  }
                }]
              },
              
              // Android XML
              android: {
                transformGroup: 'android',
                buildPath: 'build/android/',
                files: [{
                  destination: 'design_tokens.xml',
                  format: 'android/resources'
                }]
              }
            }
          };
          ```
          
          **package.json scripts**
          ```json
          {
            "scripts": {
              "build:tokens": "style-dictionary build",
              "watch:tokens": "style-dictionary build --watch",
              "clean:tokens": "rm -rf build/"
            }
          }
          ```
          
          🔧 **CI/CD Integration**:
          
          **.github/workflows/tokens.yml**
          ```yaml
          name: Build Design Tokens
          
          on:
            push:
              paths:
                - 'tokens/**'
                - 'style-dictionary.config.js'
            pull_request:
              paths:
                - 'tokens/**'
          
          jobs:
            build:
              runs-on: ubuntu-latest
              
              steps:
                - uses: actions/checkout@v3
                
                - name: Setup Node.js
                  uses: actions/setup-node@v3
                  with:
                    node-version: '18'
                    cache: 'npm'
                
                - name: Install dependencies
                  run: npm ci
                
                - name: Build tokens
                  run: npm run build:tokens
                
                - name: Check for changes
                  id: changes
                  run: |
                    if [ -n "$(git status --porcelain build/)" ]; then
                      echo "has_changes=true" >> $GITHUB_OUTPUT
                    fi
                
                - name: Commit changes
                  if: steps.changes.outputs.has_changes == 'true' && github.event_name == 'push'
                  run: |
                    git config user.name "Token Bot"
                    git config user.email "tokens@example.com"
                    git add build/
                    git commit -m "chore: update design tokens [skip ci]"
                    git push
          ```
          
          🚀 **Output Examples**:
          

    examples:
      - name: "Hero Image LCP Optimization"
        user: "Our hero image is the LCP element. How do we optimize it for fastest loading?"
        ai_response: |
          📊 **LCP Analysis**:
          - LCP Element: Hero image
          - Current LCP: [Need measurement]
          - Target: < 2.5s
          
          🎯 **Optimization Strategy**:
          1. Preload hero image in <head>
          2. Use modern image format (AVIF/WebP)
          3. Implement responsive images
          4. Set fetchpriority="high"
          5. Use CDN for delivery
          
          💡 **Implementation**:
          
          **Step 1: Preload in <head>**
          ```html
          <!DOCTYPE html>
          <html>
          <head>
            <!-- Preload LCP image - MUST be in <head> -->
            <link rel="preload" 
                  as="image" 
                  href="/images/hero-800.avif"
                  imagesrcset="/images/hero-400.avif 400w,
                               /images/hero-800.avif 800w,
                               /images/hero-1200.avif 1200w"
                  imagesizes="100vw"
                  fetchpriority="high" />
            
            <!-- Preconnect to image CDN -->
            <link rel="preconnect" href="https://cdn.example.com" />
            
            <!-- Inline critical CSS -->
            <style>
              .hero {
                min-height: 60vh;
                background: #e5e7eb; /* Placeholder color */
              }
              
              .hero img {
                width: 100%;
                height: auto;
                aspect-ratio: 16 / 9;
              }
            </style>
          </head>
          ```
          
          **Step 2: Optimized Hero Image**
          ```html
          <section class="hero">
            <picture>
              <!-- AVIF format (best compression) -->
              <source 
                srcset="/images/hero-400.avif 400w,
                        /images/hero-800.avif 800w,
                        /images/hero-1200.avif 1200w,
                        /images/hero-1600.avif 1600w"
                sizes="(max-width: 600px) 400px,
                       (max-width: 1000px) 800px,
                       (max-width: 1400px) 1200px,
                       1600px"
                type="image/avif"
              />
              
              <!-- WebP fallback -->
              <source 
                srcset="/images/hero-400.webp 400w,
                        /images/hero-800.webp 800w,
                        /images/hero-1200.webp 1200w,
                        /images/hero-1600.webp 1600w"
                sizes="(max-width: 600px) 400px,
                       (max-width: 1000px) 800px,
                       (max-width: 1400px) 1200px,
                       1600px"
                type="image/webp"
              />
              
              <!-- JPEG fallback -->
              <img 
                src="/images/hero-800.jpg"
                srcset="/images/hero-400.jpg 400w,
                        /images/hero-800.jpg 800w,
                        /images/hero-1200.jpg 1200w,
                        /images/hero-1600.jpg 1600w"
                sizes="(max-width: 600px) 400px,
                       (max-width: 1000px) 800px,
                       (max-width: 1400px) 1200px,
                       1600px"
                alt="Hero description"
                width="1600"
                height="900"
                fetchpriority="high"
                decoding="async"
              />
            </picture>
          </section>
          ```
          
          **Step 3: Image Optimization Script**
          ```bash
          # Convert to AVIF (best compression)
          avifenc --min 0 --max 63 -a end-usage=q -a cq-level=24 -a tune=ssim \
            input.jpg output.avif
          
          # Convert to WebP
          cwebp -q 85 input.jpg -o output.webp
          
          # Generate multiple sizes
          for size in 400 800 1200 1600; do
            convert input.jpg -resize ${size}x -quality 85 hero-${size}.jpg
            cwebp -q 85 hero-${size}.jpg -o hero-${size}.webp
            avifenc hero-${size}.jpg hero-${size}.avif
          done
          ```
          
          📈 **Expected Improvements**:
          - Preload: -300-500ms
          - AVIF format: -30-50% file size
          - Responsive images: -50-70% on mobile
          - fetchpriority: -100-200ms
          - **Total estimated improvement: 500-1000ms**
        notes: "Complete LCP optimization for hero images"
      
      - name: "Text-based LCP Optimization"
        user: "Our LCP element is a large heading, not an image. How do we optimize text LCP?"
        ai_response: |
          📊 **LCP Analysis**:
          - LCP Element: Large heading text
          - Common causes of text LCP issues:
            - Web fonts loading slowly
            - Render-blocking font CSS
            - Flash of invisible text (FOIT)
            - Font-display issues
          
          🎯 **Optimization Strategy**:
          1. Use font-display: swap
          2. Preload critical fonts
          3. Subset fonts to reduce size
          4. Use system font fallbacks
          5. Inline critical font CSS
          
          💡 **Implementation**:
          
          **Step 1: Font Loading Strategy**
          ```css
          @font-face {
            font-family: 'Custom Heading';
            src: url('/fonts/heading-regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap; /* Show fallback immediately */
          }
          
          @font-face {
            font-family: 'Custom Heading';
            src: url('/fonts/heading-bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
          }
          ```
          
          **Step 2: Preload Critical Fonts**
          ```html
          <head>
            <!-- Preload critical heading font -->
            <link rel="preload" 
                  href="/fonts/heading-bold.woff2" 
                  as="font" 
                  type="font/woff2"
                  crossorigin />
            
            <!-- Preconnect to font CDN -->
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
          </head>
          ```
          
          **Step 3: Optimize Font Usage**
          ```css
          /* Use system font stack as fallback */
          .hero-heading {
            font-family: 'Custom Heading', system-ui, -apple-system, sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1.2;
          }
          
          /* Match fallback font metrics to minimize CLS */
          @font-face {
            font-family: 'Custom Heading Fallback';
            src: local('Arial');
            size-adjust: 105%;
            ascent-override: 90%;
            descent-override: 20%;
          }
          
          .hero-heading {
            font-family: 'Custom Heading', 'Custom Heading Fallback', system-ui, sans-serif;
          }
          ```
          
          **Step 4: Font Subsetting**
          ```bash
          # Subset font to only needed characters
          pyftsubset font.ttf \
            --output-file=font-subset.woff2 \
            --flavor=woff2 \
            --unicodes="U+0020-007F" \
            --layout-features='*'
          
          # Or use glyphhanger for automatic subsetting
          glyphhanger https://example.com --subset=font.woff2
          ```
          
          📈 **Expected Improvements**:
          - font-display: swap: -500-1000ms perceived LCP
          - Font preloading: -200-300ms
          - Font subsetting: -50-80% file size
          - **Total: Text visible immediately, custom font swaps in smoothly**
        notes: "Text-based LCP optimization focusing on font loading"
    
    delegation:
      primary_model: "gpt-4o"
      secondary_model: "claude-sonnet-4"
      fallback_model: "claude-haiku"
    
    validation:
      hooks:

    examples:
      - name: "Tabs Primitive"
        user: "Create an accessible tabs primitive with keyboard navigation"
        ai_response: |
          🎯 **Component Behavior**:
          - Tab list with selectable tabs
          - Tab panels that show/hide content
          - Keyboard navigation (arrow keys, home/end)
          - Focus management
          
          ♿ **ARIA Pattern**:
          - tablist role for tab container
          - tab role for each tab
          - tabpanel role for content panels
          - aria-selected, aria-controls, aria-labelledby
          
          💡 **Implementation Strategy**:
          Use compound component pattern with context for state sharing between tabs and panels.
          
          📋 **Code Solution**:
          
          ```tsx
          // Tabs.tsx
          import React, { 
            createContext, 
            useContext, 
            useState, 
            useCallback,
            Children,
            isValidElement,
            cloneElement
          } from 'react';
          
          // Context for sharing state
          interface TabsContextType {
            selectedIndex: number;
            setSelectedIndex: (index: number) => void;
            baseId: string;
          }
          
          const TabsContext = createContext<TabsContextType | null>(null);
          
          function useTabs() {
            const context = useContext(TabsContext);
            if (!context) {
              throw new Error('Tabs components must be used within <Tabs>');
            }
            return context;
          }
          
          // Main Tabs component
          interface TabsProps {
            children: React.ReactNode;
            defaultIndex?: number;
            onChange?: (index: number) => void;
          }
          
          export function Tabs({ children, defaultIndex = 0, onChange }: TabsProps) {
            const [selectedIndex, setSelectedIndex] = useState(defaultIndex);
            const [baseId] = useState(() => `tabs-${Math.random().toString(36).slice(2)}`);
            
            const handleSetIndex = useCallback((index: number) => {
              setSelectedIndex(index);
              onChange?.(index);
            }, [onChange]);
            
            return (
              <TabsContext.Provider value={{ selectedIndex, setSelectedIndex: handleSetIndex, baseId }}>
                {children}
              </TabsContext.Provider>
            );
          }
          
          // TabList component
          interface TabListProps {
            children: React.ReactNode;
            className?: string;
          }
          
          export function TabList({ children, className }: TabListProps) {
            const { selectedIndex, setSelectedIndex, baseId } = useTabs();
            
            const handleKeyDown = (event: React.KeyboardEvent) => {
              const tabCount = Children.count(children);
              
              switch (event.key) {
                case 'ArrowRight':
                  event.preventDefault();
                  setSelectedIndex((selectedIndex + 1) % tabCount);
                  break;
                case 'ArrowLeft':
                  event.preventDefault();
                  setSelectedIndex((selectedIndex - 1 + tabCount) % tabCount);
                  break;
                case 'Home':
                  event.preventDefault();
                  setSelectedIndex(0);
                  break;
                case 'End':
                  event.preventDefault();
                  setSelectedIndex(tabCount - 1);
                  break;
              }
            };
            
            return (
              <div 
                role="tablist" 
                className={className}
                onKeyDown={handleKeyDown}
              >
                {Children.map(children, (child, index) => {
                  if (!isValidElement(child)) return child;
                  
                  return cloneElement(child, {
                    index,
                    isSelected: index === selectedIndex,
                    onSelect: () => setSelectedIndex(index),
                    id: `${baseId}-tab-${index}`,
                    controlsId: `${baseId}-panel-${index}`,
                  } as TabProps);
                })}
              </div>
            );
          }
          
          // Tab component
          interface TabProps {
            children: React.ReactNode;
            index?: number;
            isSelected?: boolean;
            onSelect?: () => void;
            id?: string;
            controlsId?: string;
            className?: string;
          }
          
          export const Tab = React.forwardRef<HTMLButtonElement, TabProps>(
            ({ children, isSelected, onSelect, id, controlsId, className }, ref) => {
              return (
                <button
                  ref={ref}
                  role="tab"
                  id={id}
                  aria-selected={isSelected}
                  aria-controls={controlsId}
                  tabIndex={isSelected ? 0 : -1}
                  onClick={onSelect}
                  className={className}
                  data-selected={isSelected}
                >
                  {children}
                </button>
              );
            }
          );
          
          Tab.displayName = 'Tab';
          
          // TabPanels component
          interface TabPanelsProps {
            children: React.ReactNode;
          }
          
          export function TabPanels({ children }: TabPanelsProps) {
            const { selectedIndex, baseId } = useTabs();
            
            return (
              <>
                {Children.map(children, (child, index) => {
                  if (!isValidElement(child)) return child;
                  
                  return cloneElement(child, {
                    index,
                    isSelected: index === selectedIndex,
                    id: `${baseId}-panel-${index}`,
                    labelledById: `${baseId}-tab-${index}`,
                  } as TabPanelProps);
                })}
              </>
            );
          }
          
          // TabPanel component
          interface TabPanelProps {
            children: React.ReactNode;
            index?: number;
            isSelected?: boolean;
            id?: string;
            labelledById?: string;
            className?: string;
          }
          
          export const TabPanel = React.forwardRef<HTMLDivElement, TabPanelProps>(
            ({ children, isSelected, id, labelledById, className }, ref) => {
              return (
                <div
                  ref={ref}
                  role="tabpanel"
                  id={id}
                  aria-labelledby={labelledById}
                  hidden={!isSelected}
                  className={className}
                  data-selected={isSelected}
                >
                  {isSelected && children}
                </div>
              );
            }
          );
          
          TabPanel.displayName = 'TabPanel';
          ```
          
          🎨 **Styling Examples**:
          
          ```tsx
          // Usage with Tailwind CSS
          function App() {
            return (
              <Tabs defaultIndex={0}>
                <TabList className="flex border-b border-gray-200">
                  <Tab className="px-4 py-2 data-[selected=true]:border-b-2 data-[selected=true]:border-blue-500 data-[selected=true]:text-blue-600">
                    Account
                  </Tab>
                  <Tab className="px-4 py-2 data-[selected=true]:border-b-2 data-[selected=true]:border-blue-500 data-[selected=true]:text-blue-600">
                    Password
                  </Tab>
                  <Tab className="px-4 py-2 data-[selected=true]:border-b-2 data-[selected=true]:border-blue-500 data-[selected=true]:text-blue-600">
                    Settings
                  </Tab>
                </TabList>
                
                <TabPanels>
                  <TabPanel className="p-4">
                    <h2>Account Settings</h2>
                    <p>Manage your account details here.</p>
                  </TabPanel>
                  <TabPanel className="p-4">
                    <h2>Password</h2>
                    <p>Change your password here.</p>
                  </TabPanel>
                  <TabPanel className="p-4">
                    <h2>Settings</h2>
                    <p>Configure your preferences here.</p>
                  </TabPanel>
                </TabPanels>
              </Tabs>
            );
          }
          ```
          
          ♿ **Accessibility Features**:
          - Full keyboard navigation (arrow keys, home, end)
          - Proper ARIA roles (tablist, tab, tabpanel)
          - aria-selected indicates active tab
          - aria-controls links tab to panel
          - aria-labelledby links panel to tab
          - Focus management with tabIndex
        notes: "Complete accessible tabs primitive with keyboard navigation"
      
      - name: "Dialog/Modal Primitive"
        user: "Create an accessible dialog primitive with focus trapping"
        ai_response: |
          🎯 **Component Behavior**:
          - Modal dialog that blocks interaction with background
          - Focus trapping within dialog
          - Escape key to close
          - Click outside to close (optional)
          - Focus restoration on close
          
          ♿ **ARIA Pattern**:
          - dialog role for the modal
          - aria-modal="true" for modal behavior
          - aria-labelledby for title
          - aria-describedby for description
          
          💡 **Implementation Strategy**:
          Use portal for rendering outside DOM hierarchy, implement focus trap, and manage focus restoration.
          
          📋 **Code Solution**:
          
          ```tsx
          // Dialog.tsx
          import React, { useEffect, useRef, useCallback } from 'react';
          import { createPortal } from 'react-dom';
          
          interface DialogProps {
            isOpen: boolean;
            onClose: () => void;
            children: React.ReactNode;
            className?: string;
            initialFocusRef?: React.RefObject<HTMLElement>;
          }
          
          export function Dialog({ 
            isOpen, 
            onClose, 
            children, 
            className,
            initialFocusRef 
          }: DialogProps) {
            const dialogRef = useRef<HTMLDivElement>(null);
            const previousFocusRef = useRef<HTMLElement | null>(null);
            
            // Store previous focus when opening
            useEffect(() => {
              if (isOpen) {
                previousFocusRef.current = document.activeElement as HTMLElement;
              }
            }, [isOpen]);
            
            // Restore focus when closing
            useEffect(() => {
              if (!isOpen && previousFocusRef.current) {
                previousFocusRef.current.focus();
              }
            }, [isOpen]);
            
            // Handle escape key
            useEffect(() => {
              if (!isOpen) return;
              
              const handleKeyDown = (event: KeyboardEvent) => {
                if (event.key === 'Escape') {
                  onClose();
                }
              };
              
              document.addEventListener('keydown', handleKeyDown);
              return () => document.removeEventListener('keydown', handleKeyDown);
            }, [isOpen, onClose]);
            
            // Focus trap
            useEffect(() => {
              if (!isOpen) return;
              
              const dialog = dialogRef.current;
              if (!dialog) return;
              
              // Set initial focus
              if (initialFocusRef?.current) {
                initialFocusRef.current.focus();
              } else {
                const focusableElement = dialog.querySelector<HTMLElement>(
                  'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
                );
                focusableElement?.focus();
              }
              
              const handleTabKey = (event: KeyboardEvent) => {
                if (event.key !== 'Tab') return;
                
                const focusableElements = dialog.querySelectorAll<HTMLElement>(
                  'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
                );
                
                const firstElement = focusableElements[0];
                const lastElement = focusableElements[focusableElements.length - 1];
                
                if (event.shiftKey && document.activeElement === firstElement) {
                  event.preventDefault();
                  lastElement.focus();
                } else if (!event.shiftKey && document.activeElement === lastElement) {
                  event.preventDefault();
                  firstElement.focus();
                }
              };
              
              document.addEventListener('keydown', handleTabKey);
              return () => document.removeEventListener('keydown', handleTabKey);
            }, [isOpen, initialFocusRef]);
            
            // Prevent body scroll when open
            useEffect(() => {
              if (isOpen) {
                document.body.style.overflow = 'hidden';
              } else {
                document.body.style.overflow = '';
              }
              return () => {
                document.body.style.overflow = '';
              };
            }, [isOpen]);
            
            if (!isOpen) return null;
            
            return createPortal(
              <div 
                className="dialog-overlay"
                onClick={(e) => {
                  if (e.target === e.currentTarget) onClose();
                }}
                style={{
                  position: 'fixed',
                  inset: 0,
                  background: 'rgba(0, 0, 0, 0.5)',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  zIndex: 50,
                }}
              >
                <div
                  ref={dialogRef}
                  role="dialog"
                  aria-modal="true"
                  className={className}
                  style={{
                    background: 'white',
                    borderRadius: '8px',
                    maxWidth: '90vw',
                    maxHeight: '90vh',
                    overflow: 'auto',
                  }}
                >
                  {children}
                </div>
              </div>,
              document.body
            );
          }
          
          // Dialog sub-components
          export function DialogTitle({ 
            children, 
            className 
          }: { 
            children: React.ReactNode; 
            className?: string;
          }) {
            return <h2 id="dialog-title" className={className}>{children}</h2>;
          }
          
          export function DialogDescription({ 
            children, 
            className 
          }: { 
            children: React.ReactNode; 
            className?: string;
          }) {
            return <p id="dialog-description" className={className}>{children}</p>;
          }
          ```
          
          🎨 **Usage Example**:
          ```tsx
          function App() {
            const [isOpen, setIsOpen] = React.useState(false);
            const confirmButtonRef = useRef<HTMLButtonElement>(null);
            
            return (

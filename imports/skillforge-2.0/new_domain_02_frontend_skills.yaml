                />
                <div className="tilt-card-content">
                  <h3>Premium Headphones</h3>
                  <p>$299.99</p>
                  <button>Add to Cart</button>
                </div>
              </TiltCard>
            );
          }
          ```
          
          🎨 **Visual Result**: Card tilts in 3D space following the mouse cursor, with content at different Z-depths creating parallax within the card.
          
          ⚡ **Performance Notes**:
          - Uses requestAnimationFrame implicitly through React state updates
          - `will-change: transform` optimizes for GPU
          - `translateZ` creates true 3D depth
          - Short transition (0.1s) for responsive feel
        notes: "Interactive 3D tilt card with mouse tracking"
    

          📋 **Implementation**:
          
          ```css
          /* Card container with perspective */
          .flip-card {
            width: 300px;
            height: 400px;
            perspective: 1000px; /* Creates 3D depth context */
            cursor: pointer;
          }
          
          /* Inner wrapper - handles the flip */
          .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            
            /* Enable 3D transforms for children */
            transform-style: preserve-3d;
            
            /* Smooth flip transition */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
          }
          
          /* Flip on hover */
          .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
          }
          
          /* Front and back faces */
          .flip-card-front,
          .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            
            /* Hide the back of each face */
            backface-visibility: hidden;
            

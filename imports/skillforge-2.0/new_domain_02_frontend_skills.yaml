      - name: "Modal Focus Trap"
        user: "Implement focus trapping for a modal dialog"
        ai_response: |
          🎯 **Focus Management Goal**: Ensure focus stays within the modal while it's open, returns to the trigger when closed, and has visible focus indicators.
          
          💡 **Implementation Strategy**:
          - Use focus-trap library for robust trapping
          - Store previous focus element on open
          - Restore focus on close
          - Set initial focus to first focusable element
          
          📋 **Code Solution**:
          
          ```tsx
          // Modal.tsx with focus management
          import { useEffect, useRef, useCallback } from 'react';
          import { createFocusTrap } from 'focus-trap';
          
          interface ModalProps {
            isOpen: boolean;
            onClose: () => void;
            title: string;
            children: React.ReactNode;
            initialFocusRef?: React.RefObject<HTMLElement>;
          }
          
          export function Modal({ 
            isOpen, 
            onClose, 
            title, 
            children,
            initialFocusRef 
          }: ModalProps) {
            const modalRef = useRef<HTMLDivElement>(null);
            const previousFocusRef = useRef<HTMLElement | null>(null);
            const focusTrapRef = useRef<ReturnType<typeof createFocusTrap> | null>(null);
            
            // Store previous focus when opening
            useEffect(() => {
              if (isOpen) {
                previousFocusRef.current = document.activeElement as HTMLElement;
              }
            }, [isOpen]);
            
            // Setup focus trap
            useEffect(() => {
              if (!isOpen || !modalRef.current) return;
              
              // Create focus trap
              focusTrapRef.current = createFocusTrap(modalRef.current, {
                initialFocus: initialFocusRef?.current || undefined,
                fallbackFocus: modalRef.current,
                escapeDeactivates: false,
                allowOutsideClick: false,
                returnFocusOnDeactivate: false, // We handle this manually
              });
              
              // Activate trap
              focusTrapRef.current.activate();
              
              return () => {
                focusTrapRef.current?.deactivate();
              };
            }, [isOpen, initialFocusRef]);
            
            // Restore focus on close
            useEffect(() => {
              if (!isOpen && previousFocusRef.current) {
                // Small delay to ensure DOM is updated
                setTimeout(() => {
                  previousFocusRef.current?.focus();
                }, 0);
              }
            }, [isOpen]);
            
            // Handle escape key
            useEffect(() => {
              if (!isOpen) return;
              
              const handleKeyDown = (e: KeyboardEvent) => {
                if (e.key === 'Escape') {
                  onClose();
                }
              };
              
              document.addEventListener('keydown', handleKeyDown);
              return () => document.removeEventListener('keydown', handleKeyDown);
            }, [isOpen, onClose]);
            
            // Prevent body scroll
            useEffect(() => {
              if (isOpen) {
                document.body.style.overflow = 'hidden';
              } else {
                document.body.style.overflow = '';
              }
              return () => {
                document.body.style.overflow = '';
              };
            }, [isOpen]);
            
            if (!isOpen) return null;
            
            return (
              <div 
                className="modal-overlay"
                onClick={(e) => {
                  if (e.target === e.currentTarget) onClose();
                }}
              >
                <div
                  ref={modalRef}
                  role="dialog"
                  aria-modal="true"
                  aria-labelledby="modal-title"
                  className="modal"
                  tabIndex={-1}
                >
                  <header className="modal-header">
                    <h2 id="modal-title">{title}</h2>
                    <button 
                      onClick={onClose}
                      aria-label="Close modal"
                      className="modal-close"
                    >
                      ×
                    </button>
                  </header>
                  <div className="modal-content">
                    {children}
                  </div>
                </div>
              </div>
            );
          }
          ```
          

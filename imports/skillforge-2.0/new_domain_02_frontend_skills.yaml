            border-color: #dc2626;
          }
          
          input[aria-invalid="true"]:focus,
          textarea[aria-invalid="true"]:focus {
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2);
          }
          
          .error-message {

          ## Self-Service Infrastructure with Terraform
          
          ### Terraform Module Structure
          ```
          terraform-modules/
          ├── modules/
          │   ├── eks-cluster/
          │   ├── rds-database/
          │   ├── s3-bucket/
          │   └── sqs-queue/
          └── services/
              ├── database-service/
              └── storage-service/
          ```
          
          ### Guarded Terraform Module
          ```hcl
          # modules/rds-database/main.tf
          variable "environment" {
            type        = string
            description = "Environment (dev, staging, prod)"
            
            validation {
              condition     = contains(["dev", "staging", "prod"], var.environment)
              error_message = "Environment must be dev, staging, or prod."
            }
          }
          
          variable "instance_class" {
            type        = string
            default     = "db.t3.micro"
            description = "RDS instance class"
            
            validation {
              condition     = can(regex("^db\\.t3\\.", var.instance_class))
              error_message = "Only db.t3.* instance classes are allowed for self-service."
            }
          }
          
          resource "aws_db_instance" "main" {
            identifier        = "${var.project}-${var.environment}"
            engine           = "postgres"
            instance_class   = var.instance_class
            allocated_storage = var.environment == "prod" ? 100 : 20
            
            # Security guardrails
            publicly_accessible = false
            storage_encrypted   = true
            deletion_protection = var.environment == "prod"
            
            tags = {
              Environment = var.environment
              ManagedBy   = "platform"
              Owner       = var.owner
            }
          }
          ```
        notes: "Self-service infrastructure with Terraform modules and built-in guardrails"
    

      - name: "E-commerce SLO Implementation"
        user: "We need to define SLOs for our e-commerce platform. What SLIs should we track and what targets make sense?"
        ai_response: |
          ## E-commerce SLO Implementation
          
          ### Critical User Journeys
          | Journey | Criticality | SLIs |
          |---------|-------------|------|
          | Browse Products | High | Availability, Latency |
          | Add to Cart | Critical | Availability, Latency, Success Rate |
          | Checkout | Critical | Availability, Latency, Success Rate |
          | Payment | Critical | Availability, Latency, Success Rate |
          
          ### SLI Definitions
          ```yaml
          slis:
            - name: checkout_availability
              good_events: sum(rate(checkout_requests_total{status!~"5.."}[1m]))
              valid_events: sum(rate(checkout_requests_total[1m]))
            - name: checkout_latency
              good_events: sum(rate(checkout_duration_seconds_bucket{le="0.5"}[1m]))
              valid_events: sum(rate(checkout_duration_seconds_count[1m]))
          ```
          
          ### SLO Targets
          ```yaml
          slos:
            - name: checkout_availability
              target: 0.999  # 99.9% availability
              window: 30d
              alert:
                fast_burn: { window: 1h, burn_rate: 14.4 }
                slow_burn: { window: 6h, burn_rate: 6 }
            - name: checkout_latency
              target: 0.99  # 99% under 500ms
              window: 30d
          ```
          
          ### Burn Rate Alert
          ```yaml
          groups:
            - name: slo_alerts
              rules:
                - alert: CheckoutAvailabilityFastBurn
                  expr: (sum(rate(checkout_requests_total{status=~"5.."}[1h])) / sum(rate(checkout_requests_total[1h]))) > (1 - 0.999) * 14.4
                  labels: { severity: critical }
          ```
        notes: "Complete SLO implementation with SLI definitions, error budgets, burn rate alerts, and deployment gates"
      
      - name: "Validating SLOs with Load Testing"
        user: "How do we validate that our SLOs are achievable before committing to them?"
        ai_response: |
          ## SLO Validation Through Load Testing
          
          ### k6 Load Test for SLO Validation
          ```javascript
          import http from 'k6/http';
          import { Rate, Trend } from 'k6/metrics';
          
          const errorRate = new Rate('error_rate');
          const latencyP99 = new Trend('latency_p99');
          
          export const options = {
            stages: [
              { duration: '5m', target: 100 },
              { duration: '10m', target: 100 },
              { duration: '5m', target: 200 },
            ],
            thresholds: {
              error_rate: ['rate<0.001'],
              latency_p99: ['p(99)<500'],
            },
          };
          
          export default function () {
            const response = http.post(`${BASE_URL}/api/checkout`, payload);
            errorRate.add(response.status !== 200);
            latencyP99.add(response.timings.duration);
          }
          ```
        notes: "Load testing approach for validating SLOs before committing to targets"
    

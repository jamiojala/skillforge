      - name: "React Native App Testing with Detox"
        user: "We have a React Native e-commerce app. We need to set up E2E testing for iOS and Android. What tool and approach do you recommend?"
        ai_response: |
          ## React Native E2E Testing with Detox
          
          ### Why Detox for React Native?
          - Gray box testing (can interact with app internals)
          - Synchronized with app lifecycle
          - Cross-platform (iOS/Android)
          - Fast and reliable
          - Great CI/CD integration
          
          ### Setup
          ```bash
          npm install detox --save-dev
          npx detox init
          ```
          
          ### Configuration
          ```javascript
          // .detoxrc.js
          module.exports = {
            apps: {
              'ios.debug': {
                type: 'ios.app',
                binaryPath: 'ios/build/Build/Products/Debug-iphonesimulator/YourApp.app',
                build: 'xcodebuild -workspace ios/YourApp.xcworkspace -scheme YourApp -configuration Debug -sdk iphonesimulator -derivedDataPath ios/build',
              },
              'android.debug': {
                type: 'android.apk',
                binaryPath: 'android/app/build/outputs/apk/debug/app-debug.apk',
                build: 'cd android && ./gradlew assembleDebug assembleAndroidTest -DtestBuildType=debug',
              },
            },
            devices: {
              simulator: {
                type: 'ios.simulator',
                device: {
                  type: 'iPhone 15',
                },
              },
              emulator: {
                type: 'android.emulator',
                device: {
                  avdName: 'Pixel_7_API_34',
                },
              },
            },
            configurations: {
              'ios.sim.debug': {
                device: 'simulator',
                app: 'ios.debug',
              },
              'android.emu.debug': {
                device: 'emulator',
                app: 'android.debug',
              },
            },
          };
          ```
          
          ### Page Object Model
          ```typescript
          // e2e/pages/LoginPage.ts
          export class LoginPage {
            private readonly emailInput = element(by.id('emailInput'));
            private readonly passwordInput = element(by.id('passwordInput'));
            private readonly loginButton = element(by.id('loginButton'));
            private readonly errorMessage = element(by.id('errorMessage'));
            
            async enterEmail(email: string) {
              await this.emailInput.typeText(email);
            }
            
            async enterPassword(password: string) {
              await this.passwordInput.typeText(password);
            }
            
            async tapLogin() {
              await this.loginButton.tap();
            }
            
            async login(email: string, password: string) {
              await this.enterEmail(email);
              await this.enterPassword(password);
              await this.tapLogin();
            }
            
            async isErrorVisible() {
              return await this.errorMessage.isVisible();
            }
          }
          
          // e2e/pages/ProductListPage.ts
          export class ProductListPage {
            private readonly productList = element(by.id('productList'));
            private readonly searchInput = element(by.id('searchInput'));
            private readonly cartButton = element(by.id('cartButton'));
            
            async waitForLoaded() {
              await waitFor(this.productList).toBeVisible().withTimeout(5000);
            }
            
            async tapProduct(index: number) {
              const product = element(by.id(`product-${index}`));
              await product.tap();
            }
            
            async searchFor(query: string) {
              await this.searchInput.typeText(query);
              await element(by.id('searchButton')).tap();
            }
            
            async swipeToRefresh() {
              await this.productList.swipe('down', 'slow', 0.5);
            }
          }
          ```
          

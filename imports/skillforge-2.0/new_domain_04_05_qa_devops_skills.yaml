          ### Database Seeding
          ```typescript
          // test/seed/database-seeder.ts
          import { PrismaClient } from '@prisma/client';
          import {
            userFactory,
            productFactory,
            orderFactory,
            addressFactory,
          } from '../factories';
          
          export class DatabaseSeeder {
            private prisma: PrismaClient;
            
            constructor() {
              this.prisma = new PrismaClient();
            }
            
            async seed(options: SeedOptions = {}) {
              const {
                userCount = 10,
                productCount = 50,
                orderCount = 100,
              } = options;
              
              // Clear existing data
              await this.clean();
              
              // Seed in dependency order
              console.log('Seeding users...');
              const users = await this.seedUsers(userCount);
              
              console.log('Seeding products...');
              const products = await this.seedProducts(productCount);
              
              console.log('Seeding orders...');
              await this.seedOrders(orderCount, users, products);
              
              console.log('Seeding complete!');
            }
            
            private async seedUsers(count: number) {
              const users = userFactory.buildMany(count);
              return await this.prisma.$transaction(
                users.map((user) => this.prisma.user.create({ data: user }))
              );
            }
            
            private async seedProducts(count: number) {
              const products = productFactory.buildMany(count);
              return await this.prisma.$transaction(
                products.map((product) => this.prisma.product.create({ data: product }))
              );
            }
            
            private async seedOrders(
              count: number,
              users: User[],
              products: Product[]
            ) {
              const orders = orderFactory.buildMany(count);
              
              for (const orderData of orders) {
                // Assign to random user
                const user = faker.helpers.arrayElement(users);
                orderData.userId = user.id;
                
                // Create order with items
                await this.prisma.order.create({
                  data: {
                    ...orderData,
                    items: {
                      create: orderData.items.map((item) => ({
                        ...item,
                        productId: faker.helpers.arrayElement(products).id,
                      })),
                    },
                  },
                });
              }
            }
            
            async clean() {
              // Delete in reverse dependency order
              await this.prisma.orderItem.deleteMany();
              await this.prisma.order.deleteMany();
              await this.prisma.product.deleteMany();
              await this.prisma.address.deleteMany();
              await this.prisma.user.deleteMany();
            }
            
            async disconnect() {
              await this.prisma.$disconnect();
            }
          }
          
          // Usage in tests
          // test/integration/orders.test.ts
          describe('Orders API', () => {
            let seeder: DatabaseSeeder;
            
            beforeAll(async () => {
              seeder = new DatabaseSeeder();
              await seeder.seed({ userCount: 5, productCount: 20, orderCount: 30 });
            });
            
            afterAll(async () => {
              await seeder.clean();
              await seeder.disconnect();
            });
            
            // Tests...
          });
          ```
          
          ### Data Masking for Production Subsets
          ```typescript
          // scripts/mask-production-data.ts
          import { faker } from '@faker-js/faker';
          
          interface MaskingRule {
            field: string;
            mask: (value: any) => any;
          }
          
          const maskingRules: Record<string, MaskingRule[]> = {
            users: [
              {
                field: 'email',
                mask: (email) => {
                  const [localPart] = email.split('@');
                  return `masked-${localPart.slice(0, 3)}***@example.com`;
                },
              },
              {
                field: 'firstName',
                mask: () => faker.person.firstName(),
              },
              {
                field: 'lastName',
                mask: () => faker.person.lastName(),
              },
              {
                field: 'phone',
                mask: () => `+1-555-${faker.string.numeric(3)}-${faker.string.numeric(4)}`,
              },
              {
                field: 'passwordHash',
                mask: () => '$2b$10$MaskedPasswordHash',
              },
            ],
            addresses: [
              {
                field: 'street1',
                mask: () => `${faker.number.int({ min: 100, max: 9999 })} ${faker.location.street()}`,
              },
              {
                field: 'street2',
                mask: () => null,
              },
            ],
          };
          
          export function maskRecord(
            table: string,
            record: Record<string, any>
          ): Record<string, any> {
            const rules = maskingRules[table] || [];
            const masked = { ...record };
            
            for (const rule of rules) {
              if (record[rule.field] !== undefined) {
                masked[rule.field] = rule.mask(record[rule.field]);
              }
            }
            
            return masked;
          }
          
          // Usage
          const maskedUser = maskRecord('users', productionUser);
          ```

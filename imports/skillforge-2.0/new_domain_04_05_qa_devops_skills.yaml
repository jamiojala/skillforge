          ### Alert Rules
          ```yaml
          # slo-alerts.yaml
          groups:
            - name: slo_burn_rate_alerts
              rules:
                # Fast burn: 2% budget in 1 hour
                - alert: HighErrorRate
                  expr: |
                    (
                      sum(rate(http_requests_total{status=~"5.."}[1h]))
                      /
                      sum(rate(http_requests_total[1h]))
                    ) > (1 - 0.999) * 14.4
                  for: 2m
                  labels:
                    severity: critical
                    slo: availability
                  annotations:
                    summary: "High error rate - fast burn"
                    description: "Error rate is {{ $value | humanizePercentage }} over 1h"
                
                # Slow burn: 5% budget in 6 hours
                - alert: ElevatedErrorRate
                  expr: |
                    (
                      sum(rate(http_requests_total{status=~"5.."}[6h]))
                      /
                      sum(rate(http_requests_total[6h]))
                    ) > (1 - 0.999) * 6
                  for: 15m
                  labels:
                    severity: warning
                    slo: availability
                  annotations:
                    summary: "Elevated error rate - slow burn"
                    description: "Error rate is {{ $value | humanizePercentage }} over 6h"
          ```
        notes: "Burn rate alerting with fast and slow burn detection for SLO violations"
    

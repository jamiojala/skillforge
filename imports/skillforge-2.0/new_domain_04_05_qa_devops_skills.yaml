      - name: "ArgoCD Multi-Environment Setup"
        user: "We want to set up ArgoCD to manage deployments across dev, staging, and production. How should we structure this?"
        ai_response: |
          ## ArgoCD Multi-Environment Setup
          
          ### Repository Structure
          ```
          gitops-repo/
          ├── apps/
          │   ├── frontend/
          │   ├── backend/
          │   └── database/
          ├── environments/
          │   ├── dev/
          │   ├── staging/
          │   └── prod/
          ├── bootstrap/
          │   └── argocd/
          └── clusters/
              ├── dev/
              ├── staging/
              └── prod/
          ```
          
          ### ApplicationSet for Multi-Environment
          ```yaml
          # bootstrap/argocd/applicationset.yaml
          apiVersion: argoproj.io/v1alpha1
          kind: ApplicationSet
          metadata:
            name: microservices
            namespace: argocd
          spec:
            generators:
              - list:
                  elements:
                    - cluster: dev
                      url: https://kubernetes.default.svc
                      namespace: dev
                    - cluster: staging
                      url: https://staging-cluster.example.com
                      namespace: staging
                    - cluster: prod
                      url: https://prod-cluster.example.com
                      namespace: prod
            template:
              metadata:
                name: '{{cluster}}-microservices'
              spec:
                project: default
                source:
                  repoURL: https://github.com/org/gitops-repo.git
                  targetRevision: HEAD
                  path: environments/{{cluster}}
                destination:
                  server: '{{url}}'
                  namespace: '{{namespace}}'
                syncPolicy:
                  automated:
                    prune: true
                    selfHeal: true
                  syncOptions:
                    - CreateNamespace=true
          ```
          
          ### Environment-Specific Kustomization
          ```yaml
          # environments/dev/kustomization.yaml
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          
          namespace: dev
          
          resources:
            - ../../apps/frontend
            - ../../apps/backend
          
          patches:
            - target:
                kind: Deployment
                name: frontend
              patch: |
                - op: replace
                  path: /spec/replicas
                  value: 2
                - op: replace
                  path: /spec/template/spec/containers/0/resources/limits/memory
                  value: 512Mi
          ```
        notes: "Multi-environment ArgoCD setup with ApplicationSets, Kustomize, and automated sync policies"
      
      - name: "Progressive Delivery with Argo Rollouts"
        user: "How do we implement canary deployments using ArgoCD and Argo Rollouts?"
        ai_response: |
          ## Progressive Delivery with Argo Rollouts
          
          ### Rollout Definition
          ```yaml
          # apps/frontend/rollout.yaml
          apiVersion: argoproj.io/v1alpha1
          kind: Rollout
          metadata:
            name: frontend
          spec:
            replicas: 5
            strategy:
              canary:
                canaryService: frontend-canary
                stableService: frontend-stable
                trafficRouting:
                  nginx:
                    stableIngress: frontend-ingress
                    annotationPrefix: nginx.ingress.kubernetes.io
                steps:
                  - setWeight: 10
                  - pause: {duration: 10m}
                  - analysis:
                      templates:
                        - templateName: success-rate
                  - setWeight: 25
                  - pause: {duration: 10m}
                  - analysis:
                      templates:
                        - templateName: success-rate
                  - setWeight: 50
                  - pause: {duration: 10m}
                  - analysis:
                      templates:
                        - templateName: success-rate
                  - setWeight: 100
            selector:
              matchLabels:
                app: frontend
            template:
              spec:
                containers:
                  - name: frontend
                    image: frontend:v2.0.0
          ```
          
          ### Analysis Template
          ```yaml
          # apps/frontend/analysis-template.yaml
          apiVersion: argoproj.io/v1alpha1
          kind: AnalysisTemplate
          metadata:
            name: success-rate
          spec:
            metrics:
              - name: success-rate
                interval: 5m
                successCondition: result[0] >= 0.95
                provider:
                  prometheus:
                    address: http://prometheus:9090
                    query: |
                      sum(rate(http_requests_total{service="frontend",status=~"2.."}[5m]))
                      /
                      sum(rate(http_requests_total{service="frontend"}[5m]))
          ```
        notes: "Canary deployments with Argo Rollouts including automated analysis and progressive traffic shifting"
    

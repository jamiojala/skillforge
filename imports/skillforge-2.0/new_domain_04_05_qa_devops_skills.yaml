          ```bash
          # Find slow traces
          jaeger-query --service=order-service --minDuration=1s
          
          # Find error traces
          jaeger-query --service=order-service --tags='error=true'
          
          # Find traces with specific operation
          jaeger-query --service=order-service --operation='process-order'
          ```
          

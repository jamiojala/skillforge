          ```yaml
          # canary/frontend.yaml
          apiVersion: flagger.app/v1beta1
          kind: Canary
          metadata:
            name: frontend
            namespace: default
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: frontend
            service:
              port: 80
              targetPort: 8080
              gateways:
                - public-gateway.istio-system.svc.cluster.local
              hosts:
                - app.example.com
            analysis:
              interval: 1m
              threshold: 5
              maxWeight: 50
              stepWeight: 10
              metrics:
                - name: request-success-rate
                  thresholdRange:
                    min: 99
                  interval: 1m
                - name: request-duration
                  thresholdRange:
                    max: 500
                  interval: 1m
              webhooks:
                - name: load-test
                  url: http://flagger-loadtester.test/
                  timeout: 5s
                  metadata:
                    cmd: "hey -z 1m -q 10 -c 2 http://app.example.com/"
                - name: conformance-test
                  type: pre-rollout
                  url: http://flagger-loadtester.test/
                  timeout: 30s
                  metadata:
                    type: bash
                    cmd: "curl -sf http://frontend-canary:8080/health"
            alerts:
              - name: on-call
                severity: critical
                providerRef:
                  name: slack
          ```
          
          ### Metric Template
          ```yaml
          # canary/metric-template.yaml
          apiVersion: flagger.app/v1beta1
          kind: MetricTemplate
          metadata:
            name: request-success-rate
            namespace: istio-system
          spec:
            provider:
              type: prometheus
              address: http://prometheus:9090
            query: |
              sum(rate(istio_requests_total{
                reporter="destination",
                destination_workload_namespace="{{ namespace }}",
                destination_workload="{{ target }}",
                response_code!~"5.."
              }[1m]))
              /
              sum(rate(istio_requests_total{
                reporter="destination",
                destination_workload_namespace="{{ namespace }}",
                destination_workload="{{ target }}"
              }[1m])) * 100
          ```

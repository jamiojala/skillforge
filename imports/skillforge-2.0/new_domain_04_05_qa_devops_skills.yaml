    examples:
      - name: "Multi-Level Quality Gate Implementation"
        user: "We want to implement quality gates in our CI/CD pipeline. We use GitHub Actions and SonarCloud. What gates should we implement and how?"
        ai_response: |
          ## Multi-Level Quality Gate Strategy
          
          ### Gate Hierarchy
          ```
          Commit Gate (Fast - < 2 min)
          ├── Lint/Format check
          ├── Unit tests (changed files only)
          └── Type check
          
          PR Gate (Medium - < 10 min)
          ├── Full unit test suite
          ├── Code coverage (new code > 80%)
          ├── SonarCloud analysis
          ├── Security scan (Snyk)
          └── Dependency check
          
          Merge Gate (Thorough - < 30 min)
          ├── Integration tests
          ├── E2E tests (critical paths)
          ├── Performance regression check
          └── Accessibility scan
          
          Deploy Gate (Pre-production)
          ├── Full E2E suite
          ├── Load test (smoke)
          └── Security penetration scan
          ```
          
          ### SonarCloud Quality Gate Configuration
          ```yaml
          # sonar-project.properties
          sonar.projectKey=your-org-your-project
          sonar.organization=your-org
          sonar.sources=src
          sonar.tests=src
          sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
          sonar.typescript.lcov.reportPaths=coverage/lcov.info
          
          # Quality Gate Conditions (configured in SonarCloud UI)
          # New Code:
          #   - Coverage >= 80%
          #   - Duplicated Lines <= 3%
          #   - Maintainability Rating >= A
          #   - Reliability Rating >= A
          #   - Security Rating >= A
          #   - No new blocker/critical issues
          ```
          
          ### GitHub Actions Workflow
          ```yaml
          # .github/workflows/quality-gates.yml
          name: Quality Gates
          
          on:
            pull_request:
              branches: [main, develop]
            push:
              branches: [main]
          
          jobs:
            commit-gate:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: '20'
                    cache: 'npm'
                - run: npm ci
                - name: Lint
                  run: npm run lint
                - name: Type Check
                  run: npm run type-check
                - name: Unit Tests (Changed Files)
                  run: npm test -- --changedSince=origin/main --passWithNoTests
          
            pr-gate:
              runs-on: ubuntu-latest
              needs: commit-gate
              steps:
                - uses: actions/checkout@v4
                  with:
                    fetch-depth: 0 # Required for SonarCloud
                - uses: actions/setup-node@v4
                  with:
                    node-version: '20'
                    cache: 'npm'
                - run: npm ci
                
                - name: Run Tests with Coverage
                  run: npm run test:coverage
                
                - name: Upload Coverage to Codecov
                  uses: codecov/codecov-action@v3
                  with:
                    fail_ci_if_error: true
                    flags: unittests
                    name: codecov-umbrella
                
                - name: SonarCloud Scan
                  uses: SonarSource/sonarcloud-github-action@master
                  env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                
                - name: Security Scan
                  uses: snyk/actions/node@master
                  env:
                    SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
                  with:
                    args: --severity-threshold=high
          
            merge-gate:
              runs-on: ubuntu-latest
              needs: pr-gate
              if: github.ref == 'refs/heads/main'
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: '20'
                    cache: 'npm'
                - run: npm ci
                
                - name: Integration Tests
                  run: npm run test:integration
                
                - name: E2E Tests (Critical Paths)
                  run: npm run test:e2e:smoke
                
                - name: Performance Check
                  run: npm run lighthouse:ci
          
            quality-gate-status:
              runs-on: ubuntu-latest
              needs: [commit-gate, pr-gate, merge-gate]
              if: always()
              steps:
                - name: Check All Gates Passed
                  run: |
                    if [[ "${{ needs.commit-gate.result }}" == "failure" ]] || \
                       [[ "${{ needs.pr-gate.result }}" == "failure" ]] || \
                       [[ "${{ needs.merge-gate.result }}" == "failure" ]]; then
                      echo "Quality gates failed!"
                      exit 1
                    fi
                    echo "All quality gates passed!"
          ```
          
          ### Codecov Configuration
          ```yaml
          # codecov.yml
          coverage:
            status:
              project:
                default:
                  target: 80%
                  threshold: 2%
                  base: auto
                  paths:
                    - "src"
              patch:
                default:
                  target: 80%
                  threshold: 1%
                  base: auto
                  paths:
                    - "src"
          
          comment:
            layout: "reach,diff,flags,files,footer"
            behavior: default
            require_changes: true
          
          ignore:
            - "**/*.spec.ts"
            - "**/*.test.ts"
            - "**/mocks/**"
            - "**/types/**"
          ```
          
          ### Gate Failure Remediation Guide
          
          **Coverage Gate Failed (< 80%)**
          ```bash
          # 1. Identify uncovered lines
          npm run test:coverage
          open coverage/lcov-report/index.html
          
          # 2. Add tests for uncovered code
          # 3. If code is untestable, refactor for testability
          ```
          
          **SonarCloud Issue**
          ```bash
          # 1. View issues in SonarCloud dashboard
          # 2. For false positives, mark as "Won't Fix" with explanation
          # 3. For real issues, fix and push
          ```
          
          **Security Vulnerability**
          ```bash
          # 1. Review Snyk report
          npx snyk test
          
          # 2. Update vulnerable dependencies
          npx snyk fix
          
          # 3. For non-fixable issues, create exception with justification
          ```
        notes: "Complete multi-level quality gate implementation with SonarCloud, Codecov, Snyk, and GitHub Actions"
      
      - name: "Team-Specific Quality Gate Rollout"
        user: "Our team is new to quality gates. How do we roll them out without disrupting development?"
        ai_response: |
          ## Incremental Quality Gate Rollout
          
          ### Phase 1: Baseline & Observation (Weeks 1-2)
          ```yaml
          # .github/workflows/quality-baseline.yml
          name: Quality Baseline (Non-blocking)
          
          on: [pull_request]
          
          jobs:
            measure:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - run: npm ci
                
                - name: Measure Current State
                  run: |
                    echo "## Current Quality Metrics" >> $GITHUB_STEP_SUMMARY
                    echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
                    echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
                    
                    # Coverage
                    COVERAGE=$(npm run test:coverage --silent 2>/dev/null | grep -oP 'All files[^|]+\|\s*\K[0-9.]+' || echo "N/A")
                    echo "| Code Coverage | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
                    
                    # Lint issues
                    LINT_ISSUES=$(npm run lint 2>&1 | grep -c 'error' || echo "0")
                    echo "| Lint Errors | ${LINT_ISSUES} |" >> $GITHUB_STEP_SUMMARY
                    
                    # Test count
                    TEST_COUNT=$(npm test -- --listTests 2>/dev/null | wc -l)
                    echo "| Total Tests | ${TEST_COUNT} |" >> $GITHUB_STEP_SUMMARY
          ```
          
          ### Phase 2: Warning Gates (Weeks 3-6)
          ```yaml
          # .github/workflows/quality-warning.yml
          name: Quality Gates (Warning Only)
          
          on: [pull_request]
          
          jobs:
            warning-gates:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - run: npm ci
                
                - name: Coverage Gate (Warning: 60%)
                  run: |
                    npm run test:coverage
                    # Post warning comment but don't fail
                    COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
                    if (( $(echo "$COVERAGE < 60" | bc -l) )); then
                      echo "::warning::Coverage is ${COVERAGE}%, target is 60%"
                    fi
                  continue-on-error: true
                
                - name: SonarCloud (Warning Mode)
                  uses: SonarSource/sonarcloud-github-action@master
                  continue-on-error: true
          ```
          
          ### Phase 3: Enforcing Gates (Weeks 7-10)
          ```yaml
          # .github/workflows/quality-enforced.yml
          name: Quality Gates (Enforced)
          
          on: [pull_request]
          
          jobs:
            enforced-gates:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - run: npm ci
                
                - name: Coverage Gate (Enforced: 70%)
                  run: |
                    npm run test:coverage
                    COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
                    if (( $(echo "$COVERAGE < 70" | bc -l) )); then
                      echo "::error::Coverage is ${COVERAGE}%, minimum is 70%"
                      exit 1
                    fi
                
                - name: No New Lint Errors
                  run: npm run lint
                
                - name: SonarCloud Quality Gate
                  uses: SonarSource/sonarcloud-github-action@master
                  # Now fails on quality gate breach
          ```
          
          ### Phase 4: Maturation (Ongoing)
          - Increase coverage target to 80%
          - Add performance gates
          - Add security gates
          - Add accessibility gates
          - Review and adjust quarterly
          
          ### Team Communication Template
          ```markdown
          ## Quality Gates Rollout
          
          ### Week 1-2: Baseline
          - We're measuring current quality metrics
          - No changes to workflow
          - Goal: Understand where we are
          
          ### Week 3-6: Warning Phase
          - Gates will warn but not block
          - Use warnings as learning opportunities
          - Ask for help if you're unsure
          
          ### Week 7+: Enforcement
          - Gates will block PRs that don't meet criteria
          - Coverage: 70% minimum
          - No new lint errors
          - SonarCloud quality gate
          
          ### Getting Help
          - #quality-gates Slack channel
          - Weekly office hours: Tuesdays 2pm
          - Documentation: [link]
          ```
        notes: "Phased rollout approach that builds team buy-in and avoids disruption"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "gpt-4o"
      fallback_model: "claude-haiku-3"
      
    validation:
      hooks:
        - hook_id: "gate-automation-check"
          description: "Validates gates are fully automated"
        - hook_id: "threshold-reasonableness"
          description: "Ensures thresholds are achievable"
    

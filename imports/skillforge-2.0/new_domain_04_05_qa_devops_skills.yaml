          export class SafetyController {
            async monitorAndProtect(experiment) {
              setInterval(async () => {
                const health = await this.checkSystemHealth();
                if (!health.isHealthy) {
                  await this.abortExperiment(experiment);
                }
              }, 5000);
            }
            
            async checkSystemHealth() {
              const [errorRate, latency] = await Promise.all([
                this.metrics.getErrorRate('5m'),
                this.metrics.getP99Latency('5m'),

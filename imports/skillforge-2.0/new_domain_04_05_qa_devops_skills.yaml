    examples:
      - name: "Terraform Multi-Environment Setup"
        user: "We need to set up Terraform for multiple environments (dev, staging, prod). What's the best structure?"
        ai_response: |
          ## Terraform Multi-Environment Setup
          
          ### Directory Structure
          ```
          terraform/
          ├── modules/
          │   ├── networking/
          │   ├── compute/
          │   └── database/
          ├── environments/
          │   ├── dev/
          │   ├── staging/
          │   └── prod/
          └── global/
              └── iam/
          ```
          
          ### Environment Configuration
          ```hcl
          # environments/dev/main.tf
          terraform {
            required_version = ">= 1.0"
            
            backend "s3" {
              bucket         = "terraform-state-dev"
              key            = "infrastructure/terraform.tfstate"
              region         = "us-west-2"
              encrypt        = true
              dynamodb_table = "terraform-locks-dev"
            }
          }
          
          provider "aws" {
            region = var.aws_region
            
            default_tags {
              tags = {
                Environment = "dev"
                ManagedBy   = "terraform"
              }
            }
          }
          
          module "networking" {
            source = "../../modules/networking"
            
            environment = "dev"
            vpc_cidr    = "10.0.0.0/16"
          }
          
          module "compute" {
            source = "../../modules/compute"
            
            environment    = "dev"
            vpc_id         = module.networking.vpc_id
            instance_count = 2
            instance_type  = "t3.micro"
          }
          ```
          
          ### Reusable Module
          ```hcl
          # modules/networking/main.tf
          variable "environment" {
            type = string
          }
          
          variable "vpc_cidr" {
            type    = string
            default = "10.0.0.0/16"
          }
          
          resource "aws_vpc" "main" {
            cidr_block           = var.vpc_cidr
            enable_dns_hostnames = true
            enable_dns_support   = true
            
            tags = {
              Name        = "${var.environment}-vpc"
              Environment = var.environment
            }
          }
          
          output "vpc_id" {
            value = aws_vpc.main.id
          }
          ```
        notes: "Multi-environment Terraform setup with remote state, modular architecture, and environment-specific configurations"
      
      - name: "Infrastructure Testing with Terratest"
        user: "How do we test our Terraform modules to ensure they work correctly?"
        ai_response: |
          ## Infrastructure Testing with Terratest
          
          ### Unit Test Example
          ```go
          // test/networking_test.go
          package test
          
          import (
            "testing"
            "github.com/gruntwork-io/terratest/modules/terraform"
            "github.com/stretchr/testify/assert"
          )
          
          func TestNetworkingModule(t *testing.T) {
            t.Parallel()
            
            terraformOptions := &terraform.Options{
              TerraformDir: "../modules/networking",
              Vars: map[string]interface{}{
                "environment": "test",
                "vpc_cidr":    "10.0.0.0/16",
              },
            }
            
            defer terraform.Destroy(t, terraformOptions)
            terraform.InitAndApply(t, terraformOptions)
            
            vpcID := terraform.Output(t, terraformOptions, "vpc_id")
            assert.NotEmpty(t, vpcID)
            
            publicSubnetIDs := terraform.OutputList(t, terraformOptions, "public_subnet_ids")
            assert.Equal(t, 3, len(publicSubnetIDs))
          }
          ```
          
          ### Security Testing with Checkov
          ```yaml
          # .github/workflows/terraform-checks.yml
          name: Terraform Checks
          on: [pull_request]
          jobs:
            checkov:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Run Checkov
                  uses: bridgecrewio/checkov-action@master
                  with:
                    directory: .
                    framework: terraform
                    output_format: sarif
          ```
        notes: "Infrastructure testing with Terratest for functional tests and Checkov for security scanning"
    

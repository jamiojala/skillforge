          // order-service/test/contracts/payment-service.pact.spec.ts
          import { Pact } from '@pact-foundation/pact';
          
          const provider = new Pact({
            consumer: 'order-service',
            provider: 'payment-service',
            port: 1234,
            dir: './pacts',
          });
          

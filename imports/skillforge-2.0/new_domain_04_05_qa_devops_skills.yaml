    examples:
      - name: "GitHub Actions CI/CD Pipeline"
        user: "We need a complete CI/CD pipeline using GitHub Actions. What should this look like?"
        ai_response: |
          ## GitHub Actions CI/CD Pipeline
          
          ### Complete Pipeline
          ```yaml
          # .github/workflows/ci-cd.yml
          name: CI/CD Pipeline
          
          on:
            push:
              branches: [main, develop]
            pull_request:
              branches: [main]
          
          env:
            REGISTRY: ghcr.io
            IMAGE_NAME: ${{ github.repository }}
          
          jobs:
            # Stage 1: Build and Test
            build:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                
                - name: Setup Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: '20'
                    cache: 'npm'
                
                - name: Install dependencies
                  run: npm ci
                
                - name: Run linter
                  run: npm run lint
                
                - name: Run type check
                  run: npm run type-check
                
                - name: Run tests
                  run: npm run test:coverage
                
                - name: Upload coverage
                  uses: codecov/codecov-action@v3
          
            # Stage 2: Security Scanning
            security:
              runs-on: ubuntu-latest
              needs: build
              steps:
                - uses: actions/checkout@v4
                
                - name: Run Trivy vulnerability scanner
                  uses: aquasecurity/trivy-action@master
                  with:
                    scan-type: 'fs'
                    format: 'sarif'
                    output: 'trivy-results.sarif'
                
                - name: Upload Trivy scan results
                  uses: github/codeql-action/upload-sarif@v2
                  with:
                    sarif_file: 'trivy-results.sarif'
                
                - name: Run Snyk
                  uses: snyk/actions/node@master
                  env:
                    SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          
            # Stage 3: Build and Push Image
            containerize:
              runs-on: ubuntu-latest
              needs: [build, security]
              if: github.ref == 'refs/heads/main'
              permissions:
                contents: read
                packages: write
              steps:
                - uses: actions/checkout@v4
                
                - name: Set up Docker Buildx
                  uses: docker/setup-buildx-action@v3
                
                - name: Login to Container Registry
                  uses: docker/login-action@v3
                  with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
                
                - name: Extract metadata
                  id: meta
                  uses: docker/metadata-action@v5
                  with:
                    images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                    tags: |
                      type=sha,prefix=,suffix=,format=short
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                
                - name: Build and push
                  uses: docker/build-push-action@v5
                  with:
                    context: .
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    cache-from: type=gha
                    cache-to: type=gha,mode=max
          
            # Stage 4: Deploy to Staging
            deploy-staging:
              runs-on: ubuntu-latest
              needs: containerize
              environment: staging
              steps:
                - uses: actions/checkout@v4
                
                - name: Setup kubectl
                  uses: azure/setup-kubectl@v3
                
                - name: Configure AWS credentials
                  uses: aws-actions/configure-aws-credentials@v4
                  with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: us-west-2
                
                - name: Update kubeconfig
                  run: aws eks update-kubeconfig --name staging-cluster
                
                - name: Deploy to staging
                  run: |
                    kubectl set image deployment/app \
                      app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                      -n staging
                    kubectl rollout status deployment/app -n staging
          
            # Stage 5: Deploy to Production
            deploy-production:
              runs-on: ubuntu-latest
              needs: deploy-staging
              environment: production
              steps:
                - uses: actions/checkout@v4
                
                - name: Setup kubectl
                  uses: azure/setup-kubectl@v3
                
                - name: Configure AWS credentials
                  uses: aws-actions/configure-aws-credentials@v4
                  with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: us-west-2
                
                - name: Update kubeconfig
                  run: aws eks update-kubeconfig --name production-cluster
                
                - name: Deploy to production
                  run: |
                    kubectl set image deployment/app \
                      app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                      -n production
                    kubectl rollout status deployment/app -n production
                
                - name: Notify Slack
                  uses: 8398a7/action-slack@v3
                  with:
                    status: ${{ job.status }}
                    channel: '#deployments'
                  env:
                    SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ```
        notes: "Complete CI/CD pipeline with build, security scanning, containerization, and deployment stages"
      
      - name: "Pipeline Optimization"
        user: "Our CI/CD pipeline is slow. How do we optimize it?"
        ai_response: |
          ## Pipeline Optimization
          
          ### Caching Strategy
          ```yaml
          - name: Cache dependencies
            uses: actions/cache@v3
            with:
              path: |
                ~/.npm
                ~/.cache/pip
                ~/.gradle/caches
              key: ${{ runner.os }}-deps-${{ hashFiles('**/package-lock.json') }}
              restore-keys: |
                ${{ runner.os }}-deps-
          ```
          
          ### Parallel Jobs
          ```yaml
          jobs:
            test-unit:
              runs-on: ubuntu-latest
              steps:
                - run: npm run test:unit
            
            test-integration:
              runs-on: ubuntu-latest
              steps:
                - run: npm run test:integration
            
            test-e2e:
              runs-on: ubuntu-latest
              steps:
                - run: npm run test:e2e
          ```
          
          ### Conditional Jobs
          ```yaml
          jobs:
            deploy:
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              runs-on: ubuntu-latest
              steps:
                - run: ./deploy.sh
          ```
        notes: "Pipeline optimization techniques including caching, parallelization, and conditional execution"
    

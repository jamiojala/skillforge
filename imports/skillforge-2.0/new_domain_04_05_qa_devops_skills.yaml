      - name: "Terraform Self-Service Modules"
        user: "We want to create self-service Terraform modules for our development teams. What's the best approach?"
        ai_response: |
          ## Terraform Self-Service Modules
          
          ### Module Structure
          ```
          terraform-aws-modules/
          ├── modules/
          │   ├── vpc/
          │   ├── eks/
          │   ├── rds/
          │   └── s3-bucket/
          └── examples/
              ├── complete/
              └── minimal/
          ```
          
          ### Secure S3 Bucket Module
          ```hcl
          # modules/s3-bucket/variables.tf
          variable "bucket_name" {
            type        = string
            description = "Name of the S3 bucket"
          }
          
          variable "environment" {
            type        = string
            description = "Environment (dev, staging, prod)"
            
            validation {
              condition     = contains(["dev", "staging", "prod"], var.environment)
              error_message = "Environment must be dev, staging, or prod."
            }
          }
          
          variable "enable_versioning" {
            type        = bool
            default     = true
            description = "Enable versioning (required for prod)"
          }
          
          # modules/s3-bucket/main.tf
          resource "aws_s3_bucket" "this" {
            bucket = var.bucket_name
            
            tags = {
              Environment = var.environment
              ManagedBy   = "terraform"
            }
          }
          
          # Security: Block all public access
          resource "aws_s3_bucket_public_access_block" "this" {
            bucket = aws_s3_bucket.this.id
            
            block_public_acls       = true
            block_public_policy     = true
            ignore_public_acls      = true
            restrict_public_buckets = true
          }
          
          # Security: Enable encryption
          resource "aws_s3_bucket_server_side_encryption_configuration" "this" {
            bucket = aws_s3_bucket.this.id
            
            rule {
              apply_server_side_encryption_by_default {
                sse_algorithm = "AES256"
              }
            }
          }
          
          # Prod requirement: Enable versioning
          resource "aws_s3_bucket_versioning" "this" {
            bucket = aws_s3_bucket.this.id
            versioning_configuration {
              status = var.environment == "prod" || var.enable_versioning ? "Enabled" : "Disabled"
            }
          }
          ```
        notes: "Self-service Terraform modules with built-in security guardrails and validation"
      
      - name: "Policy as Code with OPA"
        user: "How do we enforce governance policies on self-service infrastructure?"
        ai_response: |
          ## Policy as Code with OPA
          
          ### Terraform Plan Validation
          ```rego
          # policies/restrict_instance_types.rego
          package terraform
          
          import input.tfplan as tfplan
          
          # Deny non-approved instance types
          deny[msg] {
            resource := tfplan.resource_changes[_]
            resource.type == "aws_instance"
            instance_type := resource.change.after.instance_type
            not approved_instance_type(instance_type)
            msg := sprintf("Instance type '%s' is not approved. Use t3.micro, t3.small, or t3.medium.", [instance_type])
          }
          
          approved_instance_type("t3.micro")
          approved_instance_type("t3.small")
          approved_instance_type("t3.medium")
          
          # Require encryption
          deny[msg] {
            resource := tfplan.resource_changes[_]
            resource.type == "aws_db_instance"
            not resource.change.after.storage_encrypted
            msg := "RDS instances must have storage encryption enabled."
          }
          
          # Require tags
          deny[msg] {
            resource := tfplan.resource_changes[_]
            resource.type == "aws_s3_bucket"
            not resource.change.after.tags["Environment"]
            msg := "S3 buckets must have an Environment tag."
          }
          ```
          
          ### CI/CD Integration
          ```yaml
          name: Terraform Policy Check
          on: [pull_request]
          jobs:
            opa-check:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Setup OPA
                  uses: open-policy-agent/setup-opa@v2
                - name: Terraform Plan
                  run: terraform plan -out=tfplan
                - name: Convert Plan to JSON
                  run: terraform show -json tfplan > tfplan.json
                - name: Run OPA Policies
                  run: opa eval --data policies/ --input tfplan.json "data.terraform.deny"
          ```
        notes: "Policy as Code implementation using OPA for Terraform governance"
    

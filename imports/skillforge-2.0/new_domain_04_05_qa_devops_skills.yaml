      - name: "Change-Based Test Selection"
        user: "Our test suite takes 2 hours to run. How can we run only the tests affected by code changes?"
        ai_response: |
          ## Change-Based Test Selection
          
          ### Test Impact Analysis
          ```typescript
          // scripts/test-impact-analysis.ts
          import { execSync } from 'child_process';
          import * as fs from 'fs';
          import * as path from 'path';
          
          interface TestMapping {
            testFile: string;
            sourceFiles: string[];
            dependencies: string[];
          }
          
          // Build test-to-source mapping
          export function buildTestMapping(): TestMapping[] {
            const mappings: TestMapping[] = [];
            
            // Find all test files
            const testFiles = execSync('find . -name "*.test.ts" -o -name "*.spec.ts"')
              .toString()
              .split('\n')
              .filter(Boolean);
            
            for (const testFile of testFiles) {
              const content = fs.readFileSync(testFile, 'utf-8');
              
              // Extract imports to find source dependencies
              const imports = content.match(/from ['"]([^'"]+)['"]/g) || [];
              const sourceFiles = imports
                .map((imp) => imp.match(/from ['"]([^'"]+)['"]/)?.[1])
                .filter((imp): imp is string => Boolean(imp))
                .filter((imp) => !imp.startsWith('.') || imp.includes('/'));
              
              mappings.push({
                testFile: path.relative('.', testFile),
                sourceFiles,
                dependencies: [], // Could use dependency graph
              });
            }
            
            return mappings;
          }
          
          // Find affected tests for changed files
          export function findAffectedTests(
            changedFiles: string[],
            testMapping: TestMapping[]
          ): string[] {
            const affectedTests = new Set<string>();
            
            for (const changedFile of changedFiles) {
              for (const mapping of testMapping) {
                // Direct match
                if (mapping.sourceFiles.some((sf) => changedFile.includes(sf))) {
                  affectedTests.add(mapping.testFile);
                }
                
                // Pattern matching for related tests
                const component = changedFile.split('/')[1]; // e.g., src/checkout/...
                if (mapping.testFile.includes(component)) {
                  affectedTests.add(mapping.testFile);
                }
              }
            }
            
            return Array.from(affectedTests);
          }
          
          // Get changed files from git
          export function getChangedFiles(baseBranch = 'main'): string[] {
            const output = execSync(
              `git diff --name-only origin/${baseBranch}...HEAD`
            ).toString();
            return output.split('\n').filter(Boolean);
          }
          ```
          
          ### Jest Integration
          ```typescript
          // jest.config.js
          module.exports = {
            // ... other config
            
            // Custom test sequencer for change-based selection
            testSequencer: './test/sequencer.js',
          };
          
          // test/sequencer.js
          const Sequencer = require('@jest/test-sequencer').default;
          const { findAffectedTests, getChangedFiles } = require('./test-impact-analysis');
          
          class ChangeBasedSequencer extends Sequencer {
            sort(tests) {
              const changedFiles = getChangedFiles();
              const testMapping = buildTestMapping();
              const affectedTests = findAffectedTests(changedFiles, testMapping);
              
              // Prioritize affected tests
              const copyTests = Array.from(tests);
              return copyTests.sort((testA, testB) => {
                const aAffected = affectedTests.includes(testA.path);
                const bAffected = affectedTests.includes(testB.path);
                
                if (aAffected && !bAffected) return -1;
                if (!aAffected && bAffected) return 1;
                return 0;
              });
            }
          }
          
          module.exports = ChangeBasedSequencer;
          ```
          
          ### CI/CD with Change-Based Selection
          ```yaml
          # .github/workflows/smart-tests.yml
          name: Smart Test Selection
          
          on: [pull_request]
          
          jobs:
            detect-changes:
              runs-on: ubuntu-latest
              outputs:
                test-files: ${{ steps.tests.outputs.files }}
              steps:
                - uses: actions/checkout@v4
                  with:
                    fetch-depth: 0
                
                - name: Get Changed Files
                  id: changes
                  run: |
                    CHANGED=$(git diff --name-only origin/main...HEAD | tr '\n' ' ')
                    echo "files=$CHANGED" >> $GITHUB_OUTPUT
                
                - name: Find Affected Tests
                  id: tests
                  run: |
                    AFFECTED=$(node scripts/find-affected-tests.js "${{ steps.changes.outputs.files }}")
                    echo "files=$AFFECTED" >> $GITHUB_OUTPUT
            
            run-affected-tests:
              runs-on: ubuntu-latest
              needs: detect-changes
              if: needs.detect-changes.outputs.test-files != ''
              steps:
                - uses: actions/checkout@v4
                - run: npm ci
                - name: Run Affected Tests
                  run: |
                    npm test -- --testPathPattern="${{ needs.detect-changes.outputs.test-files }}"
            
            run-full-suite:
              runs-on: ubuntu-latest
              needs: detect-changes
              if: needs.detect-changes.outputs.test-files == ''
              steps:
                - uses: actions/checkout@v4
                - run: npm ci
                - name: Run Full Test Suite
                  run: npm test
          ```
          
          ### Usage
          ```bash
          # Run only tests affected by changes
          npm run test:affected
          
          # Run tests for specific component
          npm run test:component -- checkout
          
          # Run full suite (nightly)
          npm run test:full
          ```
        notes: "Smart test selection based on code changes, reducing test execution time from hours to minutes"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "gpt-4o"
      fallback_model: "claude-haiku-3"
      
    validation:
      hooks:
        - hook_id: "risk-assessment-completeness"
          description: "Validates all components have risk scores"
        - hook_id: "coverage-alignment"
          description: "Ensures coverage matches risk levels"
    
    metadata:
      complexity: "medium"
      estimated_time_saved: "25-50 hours"

      - name: "Loki-Based Log Aggregation"
        user: "We want to set up log aggregation using Grafana Loki. How do we structure this?"
        ai_response: |
          ## Loki Log Aggregation
          
          ### Architecture
          ```
          Applications
               │
               ▼
          Fluent Bit (DaemonSet)
               │
               ▼
          Loki (Distributed)
               │
               ▼
          Grafana (Visualization)
          ```
          
          ### Fluent Bit Configuration
          ```yaml
          # fluent-bit-config.yaml
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: fluent-bit-config
          data:
            fluent-bit.conf: |
              [INPUT]
                  Name              tail
                  Tag               kube.*
                  Path              /var/log/containers/*.log
                  Parser            docker
                  DB                /var/log/flb_kube.db
                  Mem_Buf_Limit     5MB
                  Skip_Long_Lines   On
                  Refresh_Interval  10
              
              [FILTER]
                  Name                kubernetes
                  Match               kube.*
                  Kube_URL            https://kubernetes.default.svc:443
                  Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
                  Merge_Log           On
                  Keep_Log            Off
                  K8S-Logging.Parser  On
                  K8S-Logging.Exclude Off
              
              [FILTER]
                  Name                nest
                  Match               kube.*
                  Operation           lift
                  Nested_under        kubernetes
                  Add_prefix          k8s_
              
              [OUTPUT]
                  Name            loki
                  Match           *
                  Host            loki
                  Port            3100
                  Labels          job=fluentbit
                  Line_Format     json
          ```
          
          ### Application Logging (Node.js)
          ```typescript
          // logger.ts
          import winston from 'winston';
          
          const logger = winston.createLogger({
            level: process.env.LOG_LEVEL || 'info',
            format: winston.format.combine(
              winston.format.timestamp(),
              winston.format.errors({ stack: true }),
              winston.format.json()
            ),
            defaultMeta: {
              service: 'order-service',
              environment: process.env.NODE_ENV,
            },
            transports: [
              new winston.transports.Console(),
            ],
          });
          
          // Usage with correlation ID
          export function createLogger(correlationId: string) {
            return logger.child({ correlation_id: correlationId });
          }
          ```
        notes: "Loki-based log aggregation with Fluent Bit collection and structured logging"
      
      - name: "Log Retention and Compliance"
        user: "How do we set up log retention for compliance requirements?"
        ai_response: |
          ## Log Retention and Compliance
          
          ### Retention Configuration
          ```yaml
          # loki-retention.yaml
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: loki-config
          data:
            loki.yaml: |
              schema_config:
                configs:
                  - from: 2020-05-15
                    store: boltdb-shipper
                    object_store: s3
                    schema: v11
                    index:
                      prefix: index_
                      period: 24h
              
              compactor:
                working_directory: /data/compactor
                shared_store: s3
                compaction_interval: 10m
                retention_enabled: true
                retention_delete_delay: 2h
                retention_delete_worker_count: 150
              
              limits_config:
                retention_period: 744h  # 31 days
                reject_old_samples: true
                reject_old_samples_max_age: 168h
          ```
          
          ### Compliance Labels
          ```yaml
          # Add compliance labels to logs
          [FILTER]
              Name    modify
              Match   *
              Add     compliance_required true
              Add     data_classification internal
          ```

          ### Backstage Configuration
          ```yaml
          # app-config.yaml
          app:
            title: Internal Developer Portal
            baseUrl: http://localhost:3000
          
          organization:
            name: Acme Corp
          
          backend:
            baseUrl: http://localhost:7007
            database:
              client: better-sqlite3
              connection: ':memory:'
          
          integrations:
            github:
              - host: github.com
                token: ${GITHUB_TOKEN}
          
          catalog:
            locations:
              - type: url
                target: https://github.com/acme/backstage-catalog/blob/main/catalog-info.yaml
          
          scaffolder:
            defaultAuthor:
              name: Platform Team
              email: platform@acme.com
          ```
          
          ### Golden Path Template
          ```yaml
          # templates/microservice/template.yaml
          apiVersion: scaffolder.backstage.io/v1beta3
          kind: Template
          metadata:
            name: microservice-template
            title: Microservice
            description: Create a new microservice with best practices
            tags:
              - recommended
              - microservice
              - nodejs
          spec:
            owner: platform-team
            type: service
            parameters:
              - title: Service Information
                required:
                  - name
                  - owner
                properties:
                  name:
                    title: Service Name
                    type: string
                    pattern: '^[a-z0-9-]+$'
                  owner:
                    title: Owner Team
                    type: string
                    ui:field: OwnerPicker
                    ui:options:
                      allowedKinds:
                        - Group
            steps:
              - id: fetch-base
                name: Fetch Base Template
                action: fetch:template
                input:
                  url: ./template
                  values:
                    name: ${{ parameters.name }}
                    owner: ${{ parameters.owner }}
              
              - id: publish
                name: Publish to GitHub
                action: publish:github
                input:
                  allowedHosts: ['github.com']
                  description: Microservice ${{ parameters.name }}
                  repoUrl: github.com?owner=acme&repo=${{ parameters.name }}
              
              - id: register
                name: Register in Catalog
                action: catalog:register
                input:
                  repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
                  catalogInfoPath: '/catalog-info.yaml'
          ```

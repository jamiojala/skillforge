            description: faker.commerce.productDescription(),
            sku: faker.string.alphanumeric(10).toUpperCase(),
            price: parseFloat(faker.commerce.price({ min: 10, max: 1000 })),
            category: faker.commerce.department(),
            inventory: faker.number.int({ min: 0, max: 1000 }),
            isActive: true,
            createdAt: faker.date.past(),
            images: Array.from(
              { length: faker.number.int({ min: 1, max: 5 }) },
              () => faker.image.url()
            ),
          }))
            .trait('outOfStock', () => ({ inventory: 0 }))
            .trait('discontinued', () => ({ isActive: false }))
            .trait('onSale', (data) => ({
              salePrice: (data.price || 100) * 0.8,
            }));
          
          // Order Factory with relationships
          export const orderFactory = new Factory<Order>(() => {
            const user = userFactory.build();
            const itemCount = faker.number.int({ min: 1, max: 5 });
            const items = orderItemFactory.buildMany(itemCount);

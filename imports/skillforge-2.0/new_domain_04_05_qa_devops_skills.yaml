    examples:
      - name: "E-commerce Load Testing with k6"
        user: "We need to load test our e-commerce site before Black Friday. How do we design realistic tests?"
        ai_response: |
          ## Black Friday Load Testing Strategy
          
          ### Traffic Analysis
          - Normal peak: 1,000 concurrent users
          - Black Friday peak: 10,000 concurrent users
          - Traffic mix: 70% browse, 20% cart, 10% checkout
          
          ### Test Scenarios
          ```javascript
          import http from 'k6/http';
          import { check, sleep, group } from 'k6';
          import { Rate, Trend } from 'k6/metrics';
          
          const checkoutSuccess = new Rate('checkout_success');
          
          export const options = {
            scenarios: {
              browsers: {
                executor: 'ramping-vus',
                stages: [
                  { duration: '10m', target: 7000 },
                  { duration: '30m', target: 7000 },
                  { duration: '10m', target: 0 },
                ],
                exec: 'browseFlow',
              },
              buyers: {
                executor: 'ramping-vus',
                stages: [
                  { duration: '10m', target: 1000 },
                  { duration: '30m', target: 1000 },
                  { duration: '10m', target: 0 },
                ],
                exec: 'checkoutFlow',
              },
            },
            thresholds: {
              http_req_duration: ['p(95)<500', 'p(99)<1000'],
              http_req_failed: ['rate<0.01'],
              checkout_success: ['rate>0.99'],
            },
          };
          
          export function browseFlow() {
            group('Browse Products', () => {
              let response = http.get(`${BASE_URL}/`);
              check(response, { 'homepage loads': (r) => r.status === 200 });
              sleep(Math.random() * 3 + 2);
            });
          }
          
          export function checkoutFlow() {
            group('Checkout', () => {
              const response = http.post(`${BASE_URL}/api/checkout/payment`, payload);
              const success = check(response, { 'payment successful': (r) => r.status === 200 });
              checkoutSuccess.add(success);
            });
          }
          ```
        notes: "Complete load testing strategy with realistic scenarios, distributed testing, and comprehensive reporting"
      
      - name: "Spike and Stress Testing"
        user: "We want to test how our system handles sudden traffic spikes. What's the best approach?"
        ai_response: |
          ## Spike and Stress Testing
          
          ### Spike Test - Sudden Traffic Surge
          ```javascript
          export const options = {
            stages: [
              { duration: '2m', target: 100 },    // Normal load
              { duration: '10s', target: 5000 },  // SPIKE!
              { duration: '5m', target: 5000 },   // Sustained spike
              { duration: '10s', target: 100 },   // Back to normal
              { duration: '5m', target: 100 },    // Recovery
            ],
            thresholds: {
              http_req_failed: ['rate<0.05'],
            },
          };
          ```
          
          ### Stress Test - Finding Breaking Point
          ```javascript
          export const options = {
            stages: [
              { duration: '5m', target: 100 },
              { duration: '10m', target: 1000 },
              { duration: '10m', target: 2000 },
              { duration: '10m', target: 3000 },
              { duration: '10m', target: 4000 },
              { duration: '10m', target: 5000 },
              { duration: '5m', target: 0 },
            ],
          };
          ```
        notes: "Spike, stress, and soak testing approaches for understanding system behavior under extreme conditions"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "gpt-4o"
      fallback_model: "claude-haiku-3"
      
    validation:
      hooks:
        - hook_id: "realism-check"
          description: "Validates tests match production patterns"
        - hook_id: "coverage-validation"
          description: "Ensures all critical paths are tested"
    

      - name: "Deterministic Test Data for Reproducible Tests"
        user: "Our tests are flaky because test data is random. How do we make test data deterministic while still being realistic?"
        ai_response: |
          ## Deterministic Test Data Strategy
          
          ### Seeded Faker for Reproducibility
          ```typescript
          // test/utils/faker-seed.ts
          import { faker } from '@faker-js/faker';
          
          // Seed faker for deterministic output
          export function seedFaker(seed: string | number) {
            faker.seed(typeof seed === 'string' ? seed.split('').reduce((a, b) => a + b.charCodeAt(0), 0) : seed);
          }
          
          // Reset faker after each test
          export function resetFaker() {
            faker.seed(Math.floor(Math.random() * 1000000));
          }
          
          // test/setup.ts
          beforeEach(() => {
            // Each test gets a seed based on test name
            const testName = expect.getState().currentTestName || 'default';
            seedFaker(testName);
          });
          
          afterEach(() => {
            resetFaker();
          });
          ```
          
          ### Deterministic Factory
          ```typescript
          // test/factories/deterministic-factory.ts
          import { faker } from '@faker-js/faker';
          import { seedFaker } from '../utils/faker-seed';
          
          export class DeterministicFactory<T> {
            constructor(
              private name: string,
              private builder: () => T
            ) {}
            
            build(seed?: string, overrides: Partial<T> = {}): T {
              // Use provided seed or generate from factory name + counter
              const effectiveSeed = seed || `${this.name}-${this.counter++}`;
              seedFaker(effectiveSeed);
              
              const data = this.builder();
              return { ...data, ...overrides };
            }
            
            buildMany(count: number, baseSeed?: string, overrides: Partial<T> = {}): T[] {
              return Array.from({ length: count }, (_, i) =>
                this.build(`${baseSeed}-${i}`, overrides)
              );
            }
            
            private counter = 0;
          }
          
          // Usage
          const userFactory = new DeterministicFactory<User>('user', () => ({
            id: faker.string.uuid(),
            email: faker.internet.email(),
            name: faker.person.fullName(),
          }));
          
          // Always produces same data for same seed
          const user1a = userFactory.build('test-user-1');
          const user1b = userFactory.build('test-user-1');
          console.log(user1a.id === user1b.id); // true
          ```
          

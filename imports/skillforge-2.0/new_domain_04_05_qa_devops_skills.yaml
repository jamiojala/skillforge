    examples:
      - name: "E-commerce Checkout Flow Testing"
        user: "I need to set up Playwright tests for our e-commerce checkout flow. We have cart, shipping, payment, and confirmation pages. Tests are flaky with our current Selenium setup."
        ai_response: |
          ## Playwright Test Architecture for E-commerce Checkout
          
          ### Project Structure
          ```
          e2e/
          ├── fixtures/
          │   └── test-data.ts
          ├── pages/
          │   ├── CartPage.ts
          │   ├── ShippingPage.ts
          │   ├── PaymentPage.ts
          │   └── ConfirmationPage.ts
          ├── tests/
          │   └── checkout.spec.ts
          └── utils/
              └── test-helpers.ts
          ```
          
          ### Page Object Model - CartPage.ts
          ```typescript
          import { Page, Locator, expect } from '@playwright/test';
          
          export class CartPage {
            readonly page: Page;
            readonly cartItems: Locator;
            readonly checkoutButton: Locator;
            readonly subtotal: Locator;
            
            constructor(page: Page) {
              this.page = page;
              this.cartItems = page.getByTestId('cart-item');
              this.checkoutButton = page.getByTestId('checkout-button');
              this.subtotal = page.getByTestId('cart-subtotal');
            }
            
            async goto() {
              await this.page.goto('/cart');
            }
            
            async getItemCount(): Promise<number> {
              return await this.cartItems.count();
            }
            
            async proceedToCheckout() {
              await this.checkoutButton.click();
              await this.page.waitForURL('**/checkout/shipping');
            }
            
            async getSubtotal(): Promise<string> {
              return await this.subtotal.textContent() || '';
            }
          }
          ```
          
          ### Test Implementation
          ```typescript
          import { test, expect } from '@playwright/test';
          import { CartPage } from '../pages/CartPage';
          import { ShippingPage } from '../pages/ShippingPage';
          import { PaymentPage } from '../pages/PaymentPage';
          
          test.describe('Checkout Flow', () => {
            test('complete purchase successfully', async ({ page }) => {
              // Arrange
              const cartPage = new CartPage(page);
              const shippingPage = new ShippingPage(page);
              const paymentPage = new PaymentPage(page);
              
              // Act - Add items and proceed through checkout
              await cartPage.goto();
              await expect(cartPage.cartItems).toHaveCount(2);
              await cartPage.proceedToCheckout();
              
              await shippingPage.fillShippingInfo({
                firstName: 'John',
                lastName: 'Doe',
                address: '123 Test St',
                city: 'Test City',
                zipCode: '12345'
              });
              await shippingPage.continueToPayment();
              
              await paymentPage.fillPaymentInfo({
                cardNumber: '4111111111111111',
                expiryDate: '12/25',
                cvv: '123'
              });
              await paymentPage.completePurchase();
              
              // Assert
              await expect(page).toHaveURL(/\/confirmation/);
              await expect(page.getByTestId('order-confirmation')).toBeVisible();
              await expect(page.getByTestId('order-number')).toHaveText(/ORD-\d+/);
            });
          });
          ```
          
          ### playwright.config.ts
          ```typescript
          import { defineConfig, devices } from '@playwright/test';
          
          export default defineConfig({
            testDir: './e2e/tests',
            fullyParallel: true,
            forbidOnly: !!process.env.CI,
            retries: process.env.CI ? 2 : 0,
            workers: process.env.CI ? 4 : undefined,
            reporter: [
              ['html', { open: 'never' }],
              ['allure-playwright']
            ],
            use: {
              baseURL: process.env.BASE_URL || 'http://localhost:3000',
              trace: 'on-first-retry',
              screenshot: 'only-on-failure',
              video: 'retain-on-failure',
              actionTimeout: 15000,
              navigationTimeout: 30000,
            },
            projects: [
              { name: 'chromium', use: { ...devices['Desktop Chrome'] } },
              { name: 'firefox', use: { ...devices['Desktop Firefox'] } },
              { name: 'webkit', use: { ...devices['Desktop Safari'] } },
            ],
          });
          ```
        notes: "Demonstrates proper Page Object Model, web-first assertions, parallel configuration, and comprehensive failure artifacts"
      
      - name: "Flaky Test Debugging"
        user: "Our login test is flaky - sometimes it passes, sometimes it fails with 'element not found'. We're using explicit waits."
        ai_response: |
          ## Fixing Flaky Login Test
          
          ### Common Causes & Solutions
          
          **Problem 1: Race condition with page load**
          ```typescript
          // ❌ BAD - Arbitrary wait
          await page.waitForTimeout(2000);
          await page.fill('[name="username"]', 'user');
          
          // ✅ GOOD - Wait for element to be ready
          await page.getByTestId('username-input').fill('user');
          // Playwright auto-waits for element to be actionable
          ```
          
          **Problem 2: Dynamic content loading**
          ```typescript
          // ❌ BAD - Element might not exist yet
          await page.click('.login-button');
          
          // ✅ GOOD - Wait for element with proper assertion
          await expect(page.getByTestId('login-button')).toBeVisible();
          await page.getByTestId('login-button').click();
          ```
          
          **Problem 3: Network-dependent UI**
          ```typescript
          // ✅ GOOD - Wait for network idle when needed
          await page.goto('/login');
          await page.waitForLoadState('networkidle');
          
          // Or use API response waiting
          const responsePromise = page.waitForResponse('**/api/auth/session');
          await page.getByTestId('login-button').click();
          await responsePromise;
          ```
          
          **Problem 4: Animations causing visibility issues**
          ```typescript
          // playwright.config.ts
          export default defineConfig({
            use: {
              // Disable CSS animations for tests
              contextOptions: {
                reducedMotion: 'reduce'
              }
            }
          });
          ```
          
          ### Debugging Tools
          ```typescript
          // Enable trace for detailed debugging
          test('login', async ({ page }, testInfo) => {
            // Test code...
            
            // Attach trace on failure
            if (testInfo.status !== testInfo.expectedStatus) {
              await testInfo.attach('trace', {
                path: await page.context().tracing.stop(),
                contentType: 'application/zip'
              });
            }
          });
          ```
        notes: "Shows common flaky test causes and Playwright's built-in solutions for reliability"
    

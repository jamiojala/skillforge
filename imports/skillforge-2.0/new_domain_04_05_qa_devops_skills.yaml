          ### Factory Architecture
          ```typescript
          // test/factories/index.ts
          import { faker } from '@faker-js/faker';
          
          // Base factory with common utilities
          export class Factory<T> {
            private builders: Array<(data: Partial<T>) => Partial<T>> = [];
            
            constructor(private defaultBuilder: () => Partial<T>) {}
            
            trait(name: string, builder: (data: Partial<T>) => Partial<T>): this {
              this.builders.push(builder);
              return this;
            }
            
            build(overrides: Partial<T> = {}): T {
              let data = { ...this.defaultBuilder() };
              this.builders.forEach((builder) => {
                data = { ...data, ...builder(data) };
              });
              return { ...data, ...overrides } as T;
            }
            
            buildMany(count: number, overrides: Partial<T> = {}): T[] {
              return Array.from({ length: count }, () => this.build(overrides));
            }
          }
          

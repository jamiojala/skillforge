          ### Database State Snapshots
          ```typescript
          // test/utils/db-snapshot.ts
          import { PrismaClient } from '@prisma/client';
          
          export class DatabaseSnapshot {
            private snapshots: Map<string, any> = new Map();
            
            constructor(private prisma: PrismaClient) {}
            
            async save(name: string) {
              const tables = ['users', 'products', 'orders', 'order_items'];
              const snapshot: Record<string, any[]> = {};
              
              for (const table of tables) {
                snapshot[table] = await this.prisma.$queryRawUnsafe(
                  `SELECT * FROM ${table}`
                );
              }
              
              this.snapshots.set(name, snapshot);
            }
            
            async restore(name: string) {
              const snapshot = this.snapshots.get(name);
              if (!snapshot) throw new Error(`Snapshot ${name} not found`);
              
              // Clear and restore
              await this.prisma.$transaction([
                this.prisma.orderItem.deleteMany(),
                this.prisma.order.deleteMany(),
                this.prisma.product.deleteMany(),
                this.prisma.user.deleteMany(),
                // Then insert snapshot data...
              ]);
            }
          }
          
          // Usage
          const snapshot = new DatabaseSnapshot(prisma);
          
          beforeAll(async () => {
            await seedBaseData();
            await snapshot.save('base-state');
          });
          
          afterEach(async () => {
            await snapshot.restore('base-state');
          });

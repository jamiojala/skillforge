      - name: "OpenTelemetry Setup for Microservices"
        user: "We have a microservices architecture and want to implement distributed tracing with OpenTelemetry. How do we set this up?"
        ai_response: |
          ## OpenTelemetry for Microservices
          
          ### Architecture
          ```
          Services                    Collector                    Backends
          ────────                    ─────────                    ───────
          Service A  ──┐
          Service B  ──┼──>  OTel Collector  ──>  Jaeger/Tempo
          Service C  ──┤         (Agent)
                       │
          Service D  ──┴──>  OTel Collector  ──>  Prometheus
                            (Gateway)
          ```
          
          ### Collector Configuration
          ```yaml
          # otel-collector-config.yaml
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          
          processors:
            batch:
              timeout: 1s
              send_batch_size: 1024
            
            resource:
              attributes:
                - key: environment
                  value: production
                  action: upsert
            
            tail_sampling:
              decision_wait: 10s
              num_traces: 100
              expected_new_traces_per_sec: 10
              policies:
                - name: errors
                  type: status_code
                  status_code: {status_codes: [ERROR]}
                - name: slow
                  type: latency
                  latency: {threshold_ms: 1000}
          
          exporters:
            jaeger:
              endpoint: jaeger:14250
              tls:
                insecure: true
            
            prometheus:
              endpoint: 0.0.0.0:8889
          
          service:
            pipelines:
              traces:
                receivers: [otlp]
                processors: [batch, tail_sampling]
                exporters: [jaeger]
              metrics:
                receivers: [otlp]
                processors: [batch]
                exporters: [prometheus]
          ```
          
          ### Application Instrumentation (Node.js)
          ```typescript
          // tracing.ts
          import { NodeSDK } from '@opentelemetry/sdk-node';
          import { OTLPTraceExporter } from '@opentelemetry/exporter-trace-otlp-grpc';
          import { getNodeAutoInstrumentations } from '@opentelemetry/auto-instrumentations-node';
          import { Resource } from '@opentelemetry/resources';
          import { SemanticResourceAttributes } from '@opentelemetry/semantic-conventions';
          
          const sdk = new NodeSDK({
            resource: new Resource({
              [SemanticResourceAttributes.SERVICE_NAME]: 'order-service',
              [SemanticResourceAttributes.SERVICE_VERSION]: '1.0.0',
            }),
            traceExporter: new OTLPTraceExporter({
              url: 'http://otel-collector:4317',
            }),
            instrumentations: [getNodeAutoInstrumentations()],
          });
          
          sdk.start();
          
          // Custom span
          import { trace } from '@opentelemetry/api';
          
          export async function processOrder(orderId: string) {
            const tracer = trace.getTracer('order-service');
            
            return tracer.startActiveSpan('process-order', async (span) => {
              span.setAttribute('order.id', orderId);
              
              try {
                // Business logic
                await validateOrder(orderId);
                await chargePayment(orderId);
                await fulfillOrder(orderId);
                
                span.setStatus({ code: SpanStatusCode.OK });
              } catch (error) {
                span.recordException(error);
                span.setStatus({ code: SpanStatusCode.ERROR });
                throw error;
              } finally {
                span.end();
              }
            });
          }
          ```
        notes: "Complete OpenTelemetry setup with collector configuration, auto-instrumentation, and custom spans"
      
      - name: "Correlating Traces, Metrics, and Logs"
        user: "How do we correlate traces, metrics, and logs for better observability?"
        ai_response: |
          ## Correlating Telemetry Signals
          
          ### Trace Context in Logs
          ```typescript
          // logger.ts
          import { context, trace } from '@opentelemetry/api';
          import winston from 'winston';
          
          const logger = winston.createLogger({
            format: winston.format.combine(
              winston.format.json(),
              winston.format((info) => {
                const span = trace.getSpan(context.active());
                if (span) {
                  const spanContext = span.spanContext();
                  info.trace_id = spanContext.traceId;
                  info.span_id = spanContext.spanId;
                  info.trace_flags = spanContext.traceFlags;
                }
                return info;
              })()
            ),
            transports: [new winston.transports.Console()],
          });
          
          export default logger;
          ```
          
          ### Exemplars for Metric-to-Trace Linking
          ```yaml
          # prometheus-config.yaml
          global:
            external_labels:
              cluster: production
          
          scrape_configs:
            - job_name: 'otel-collector'
              static_configs:
                - targets: ['otel-collector:8889']
              # Enable exemplars
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: '.*'
                  target_label: __tmp_exemplars
                  replacement: 'true'
          ```
          
          ### Grafana Dashboard with Correlation
          ```json
          {
            "dashboard": {
              "panels": [
                {
                  "title": "Request Rate",
                  "type": "timeseries",
                  "targets": [
                    {
                      "expr": "rate(http_requests_total[5m])",
                      "legendFormat": "{{method}} {{status}}"
                    }
                  ]
                },
                {
                  "title": "Traces",
                  "type": "traces",
                  "datasource": "tempo",
                  "query": "{service.name=\"order-service\"}"
                }
              ]
            }
          }
          ```
        notes: "Correlating telemetry signals with trace context propagation, exemplars, and unified dashboards"
    

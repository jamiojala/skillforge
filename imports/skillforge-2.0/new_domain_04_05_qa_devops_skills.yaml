      - name: "Design System Button Component Testing"
        user: "We have a design system with Button, Input, and Modal components. How should we set up Cypress component testing for these?"
        ai_response: |
          ## Cypress Component Testing for Design System
          
          ### Project Structure
          ```
          src/
          ├── components/
          │   ├── Button/
          │   │   ├── Button.tsx
          │   │   ├── Button.module.css
          │   │   └── Button.cy.tsx
          │   ├── Input/
          │   │   └── Input.cy.tsx
          │   └── Modal/
          │       └── Modal.cy.tsx
          └── test-utils/
              ├── mount.tsx
              └── mocks/
                  └── handlers.ts
          ```
          
          ### Button Component Test
          ```typescript
          // src/components/Button/Button.cy.tsx
          import Button from './Button';
          
          describe('Button', () => {
            it('renders with default props', () => {
              cy.mount(<Button>Click me</Button>);
              cy.get('button').should('contain', 'Click me');
              cy.get('button').should('not.be.disabled');
            });
            
            it('handles click events', () => {
              const onClick = cy.spy().as('onClick');
              cy.mount(<Button onClick={onClick}>Click me</Button>);
              cy.get('button').click();
              cy.get('@onClick').should('have.been.calledOnce');
            });
            
            it('supports different variants', () => {
              cy.mount(<Button variant="primary">Primary</Button>);
              cy.get('button').should('have.class', 'button--primary');
              
              cy.mount(<Button variant="secondary">Secondary</Button>);
              cy.get('button').should('have.class', 'button--secondary');
              
              cy.mount(<Button variant="danger">Danger</Button>);
              cy.get('button').should('have.class', 'button--danger');
            });
            
            it('shows loading state', () => {
              cy.mount(<Button isLoading>Loading</Button>);
              cy.get('button').should('be.disabled');
              cy.get('[data-testid="loading-spinner"]').should('be.visible');
              cy.get('button').should('contain', 'Loading');
            });
            
            it('is accessible', () => {
              cy.mount(<Button aria-label="Submit form">Submit</Button>);
              cy.get('button').should('have.attr', 'aria-label', 'Submit form');
              cy.checkA11y(); // Using cypress-axe
            });
          });
          ```
          
          ### Test Utilities
          ```typescript
          // src/test-utils/mount.tsx
          import { mount } from 'cypress/react18';
          import { ThemeProvider } from '../theme';
          
          export const mountWithTheme = (component: React.ReactNode) => {
            return mount(<ThemeProvider>{component}</ThemeProvider>);
          };
          
          // In tests: import { mountWithTheme as cyMount } from '../test-utils/mount';
          ```
          
          ### cypress.config.ts
          ```typescript
          import { defineConfig } from 'cypress';
          
          export default defineConfig({
            component: {
              devServer: {
                framework: 'react',
                bundler: 'vite',
              },
              specPattern: 'src/**/*.cy.{ts,tsx}',
              supportFile: 'cypress/support/component.ts',
            },
            video: false,
            screenshotOnRunFailure: true,
          });
          ```
        notes: "Shows proper component isolation, variant testing, and accessibility validation"
      
      - name: "Complex Component with API Dependencies"
        user: "Our UserProfile component fetches user data from an API. How do we test this with Cypress CT?"
        ai_response: |
          ## Testing Components with API Dependencies
          
          ### UserProfile Component
          ```typescript
          // src/components/UserProfile/UserProfile.tsx
          export const UserProfile: React.FC<{ userId: string }> = ({ userId }) => {
            const { data: user, isLoading, error } = useUser(userId);
            
            if (isLoading) return <LoadingSpinner />;
            if (error) return <ErrorMessage error={error} />;
            if (!user) return null;
            
            return (
              <div data-testid="user-profile">
                <img src={user.avatar} alt={user.name} />
                <h2>{user.name}</h2>
                <p>{user.email}</p>
                <button onClick={() => editProfile(user.id)}>Edit Profile</button>
              </div>
            );
          };
          ```
          
          ### MSW Setup
          ```typescript
          // src/test-utils/mocks/handlers.ts
          import { http, HttpResponse } from 'msw';
          
          export const handlers = [
            http.get('/api/users/:userId', ({ params }) => {
              const { userId } = params;
              return HttpResponse.json({
                id: userId,
                name: 'John Doe',
                email: 'john@example.com',
                avatar: 'https://example.com/avatar.jpg',
              });
            }),
          ];
          
          // src/test-utils/mocks/browser.ts
          import { setupWorker } from 'msw/browser';
          import { handlers } from './handlers';
          
          export const worker = setupWorker(...handlers);
          ```
          
          ### Component Test with MSW
          ```typescript
          // src/components/UserProfile/UserProfile.cy.tsx
          import { UserProfile } from './UserProfile';
          import { worker } from '../../test-utils/mocks/browser';
          import { http, HttpResponse } from 'msw';
          
          describe('UserProfile', () => {
            before(() => {
              worker.start();
            });
            
            afterEach(() => {
              worker.resetHandlers();
            });
            
            it('displays user information', () => {
              cy.mount(<UserProfile userId="user-123" />);
              
              cy.get('[data-testid="user-profile"]').should('be.visible');
              cy.get('h2').should('contain', 'John Doe');
              cy.get('p').should('contain', 'john@example.com');
            });
            
            it('handles loading state', () => {
              // Delay the response to test loading state
              worker.use(
                http.get('/api/users/:userId', async () => {
                  await new Promise((resolve) => setTimeout(resolve, 500));
                  return HttpResponse.json({ id: 'user-123', name: 'John' });
                })
              );
              
              cy.mount(<UserProfile userId="user-123" />);
              cy.get('[data-testid="loading-spinner"]').should('be.visible');
              cy.get('[data-testid="user-profile"]').should('be.visible');
            });
            
            it('handles error state', () => {
              worker.use(
                http.get('/api/users/:userId', () => {
                  return new HttpResponse(null, { status: 404 });
                })
              );
              
              cy.mount(<UserProfile userId="invalid-id" />);
              cy.get('[data-testid="error-message"]').should('be.visible');
              cy.get('[data-testid="error-message"]').should('contain', 'User not found');
            });
          });
          ```
        notes: "Demonstrates MSW integration for API mocking and testing different states (loading, success, error)"
    

          ## Feature Flags with OpenFeature
          
          ### OpenFeature SDK Integration
          ```typescript
          // src/features.ts
          import { OpenFeature } from '@openfeature/js-sdk';
          import { FlagdProvider } from '@openfeature/flagd-provider';
          
          // Configure provider
          OpenFeature.setProvider(new FlagdProvider({
            host: 'flagd',
            port: 8013,
          }));
          
          const client = OpenFeature.getClient();
          
          // Use feature flag
          export async function getCheckoutExperience(userId: string) {
            const newCheckoutEnabled = await client.getBooleanValue(
              'new-checkout-flow',
              false,
              { targetingKey: userId }
            );
            
            return newCheckoutEnabled ? 'v2' : 'v1';
          }
          ```
          
          ### Flagd Configuration
          ```yaml
          # flagd/flags.yaml
          apiVersion: core.openfeature.dev/v1alpha1
          kind: FeatureFlag
          metadata:
            name: new-checkout-flow
            labels:
              app: ecommerce
          spec:
            flagSpec:
              flags:
                new-checkout-flow:
                  state: ENABLED
                  variants:
                    'on': true
                    'off': false
                  defaultVariant: 'off'
                  targeting:
                    - if:
                        - in: ["@acme.com", { var: email }]
                      variant: 'on'
          ```
          
          ### Kubernetes Deployment
          ```yaml
          # flagd/deployment.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: flagd
          spec:
            replicas: 2
            template:
              spec:
                containers:
                  - name: flagd
                    image: ghcr.io/open-feature/flagd:latest
                    args:
                      - start
                      - --uri
                      - file:///etc/flagd/flags.yaml
                    volumeMounts:
                      - name: flags
                        mountPath: /etc/flagd
                volumes:
                  - name: flags
                    configMap:
                      name: flagd-config
          ```

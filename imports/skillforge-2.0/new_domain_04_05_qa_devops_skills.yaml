      - name: "Cross-Platform Testing with Appium"
        user: "We need to test both our iOS and Android native apps with a single test suite. What's the best approach?"
        ai_response: |
          ## Cross-Platform Mobile Testing with Appium
          
          ### Architecture Overview
          ```
          tests/
          ├── pages/
          │   ├── BasePage.ts       # Common page logic
          │   ├── LoginPage.ts      # Platform-agnostic
          │   └── HomePage.ts
          ├── utils/
          │   ├── DriverFactory.ts  # Creates platform-specific drivers
          │   └── Capabilities.ts   # Platform capabilities
          └── specs/
              └── login.spec.ts     # Single test for both platforms
          ```
          
          ### Driver Factory
          ```typescript
          // tests/utils/DriverFactory.ts
          import { remote, BrowserObject } from 'webdriverio';
          
          export class DriverFactory {
            static async createDriver(platform: 'ios' | 'android'): Promise<BrowserObject> {
              const capabilities = platform === 'ios' 
                ? this.getIOSCapabilities()
                : this.getAndroidCapabilities();
              
              return await remote({
                hostname: 'hub.browserstack.com',
                path: '/wd/hub',
                user: process.env.BROWSERSTACK_USER,
                key: process.env.BROWSERSTACK_KEY,
                capabilities,
              });
            }
            
            private static getIOSCapabilities() {
              return {
                platformName: 'iOS',
                'appium:platformVersion': '17.0',
                'appium:deviceName': 'iPhone 15',
                'appium:app': 'bs://your-ios-app-id',
                'appium:automationName': 'XCUITest',
                'bstack:options': {
                  projectName: 'Mobile Tests',
                  buildName: `Build ${Date.now()}`,
                },
              };
            }
            
            private static getAndroidCapabilities() {
              return {
                platformName: 'Android',
                'appium:platformVersion': '14.0',
                'appium:deviceName': 'Google Pixel 8',
                'appium:app': 'bs://your-android-app-id',
                'appium:automationName': 'UiAutomator2',
                'bstack:options': {
                  projectName: 'Mobile Tests',
                  buildName: `Build ${Date.now()}`,
                },
              };
            }
          }
          ```
          
          ### Platform-Agnostic Page Object
          ```typescript
          // tests/pages/LoginPage.ts
          import { BrowserObject } from 'webdriverio';
          
          export class LoginPage {
            constructor(private driver: BrowserObject) {}
            
            // Platform-agnostic selectors
            private get emailInput() {
              return this.driver.$('~emailInput'); // accessibility id
            }
            
            private get passwordInput() {
              return this.driver.$('~passwordInput');
            }
            
            private get loginButton() {
              return this.driver.$('~loginButton');
            }
            
            async enterEmail(email: string) {
              await this.emailInput.setValue(email);
            }
            
            async enterPassword(password: string) {
              await this.passwordInput.setValue(password);
            }
            
            async tapLogin() {
              await this.loginButton.click();
            }
            
            async login(email: string, password: string) {
              await this.enterEmail(email);
              await this.enterPassword(password);
              await this.tapLogin();
            }
            
            async isDisplayed() {
              return await this.emailInput.isDisplayed();
            }
          }
          ```
          
          ### Cross-Platform Test
          ```typescript
          // tests/specs/login.spec.ts
          import { DriverFactory } from '../utils/DriverFactory';
          import { LoginPage } from '../pages/LoginPage';
          import { HomePage } from '../pages/HomePage';
          
          const platforms: ('ios' | 'android')[] = ['ios', 'android'];
          
          platforms.forEach((platform) => {
            describe(`Login Tests - ${platform.toUpperCase()}`, () => {
              let driver;
              let loginPage: LoginPage;
              let homePage: HomePage;
              
              beforeAll(async () => {
                driver = await DriverFactory.createDriver(platform);
                loginPage = new LoginPage(driver);
                homePage = new HomePage(driver);
              });
              
              afterAll(async () => {
                await driver.deleteSession();
              });
              
              it('should login with valid credentials', async () => {
                await loginPage.login('test@example.com', 'password123');
                await expect(homePage.welcomeMessage).toBeDisplayed();
              });
              
              it('should show error with invalid credentials', async () => {
                await loginPage.login('invalid@example.com', 'wrongpassword');
                await expect(loginPage.errorMessage).toBeDisplayed();
                await expect(loginPage.errorMessage).toHaveText('Invalid credentials');
              });
              
              it('should handle OS-level alerts', async () => {
                // iOS and Android handle alerts differently
                if (platform === 'ios') {
                  const alert = driver.$('-ios predicate string:type == "XCUIElementTypeAlert"');
                  if (await alert.isExisting()) {
                    await driver.$('~OK').click();
                  }
                } else {
                  const alert = driver.$('android:id/alertTitle');
                  if (await alert.isExisting()) {
                    await driver.$('android:id/button1').click();
                  }
                }
              });
            });
          });
          ```
          
          ### Running Tests
          ```bash
          # Run on both platforms in parallel
          npm run test:mobile:parallel
          
          # Run on specific platform
          PLATFORM=ios npm run test:mobile
          PLATFORM=android npm run test:mobile
          ```
        notes: "Demonstrates cross-platform testing with Appium, shared page objects, and BrowserStack device farm integration"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "gpt-4o"
      fallback_model: "claude-haiku-3"
      
    validation:
      hooks:
        - hook_id: "cross-platform-validation"
          description: "Validates tests work on both iOS and Android"
        - hook_id: "real-device-check"
          description: "Ensures real device testing is included"
    
    metadata:
      complexity: "complex"
      estimated_time_saved: "50-100 hours"
      version: "1.0.0"

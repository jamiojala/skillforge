          export async function cleanupOldFlags() {
            const client = new LaunchDarklyClient();
            const flags = await client.getAllFlags();
            
            const flagsToReview = flags.filter(flag => {
              const age = Date.now() - flag.created.getTime();
              const ageDays = age / (1000 * 60 * 60 * 24);
              
              // Release flags older than 30 days
              if (flag.category === 'release' && ageDays > 30) {
                return true;
              }
              
              // Experiment flags older than 90 days
              if (flag.category === 'experiment' && ageDays > 90) {
                return true;
              }
              
              // Flags not evaluated in 30 days
              const daysSinceEval = (Date.now() - flag.lastEvaluated.getTime()) / (1000 * 60 * 60 * 24);

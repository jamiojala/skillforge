          {
            "dashboard": {
              "title": "Trace Analysis",
              "panels": [
                {
                  "title": "P95 Latency by Service",
                  "type": "timeseries",
                  "targets": [
                    {
                      "expr": "histogram_quantile(0.95, sum(rate(span_duration_bucket[5m])) by (le, service_name))",
                      "legendFormat": "{{service_name}}"
                    }
                  ]
                },
                {
                  "title": "Error Rate by Service",

    examples:
      - name: "Crossplane Platform Setup"
        user: "We want to use Crossplane to manage our cloud infrastructure through Kubernetes. How do we set this up?"
        ai_response: |
          ## Crossplane Platform Setup
          
          ### Architecture
          ```
          Kubernetes Cluster
          ├── Crossplane
          │   ├── Providers (AWS/Azure/GCP)
          │   ├── Compositions
          │   └── XRDs (Composite Resources)
          ├── Platform Services
          │   ├── Database
          │   ├── Cache
          │   └── Storage
          └── Applications
          ```
          
          ### Composite Resource Definition
          ```yaml
          # xrd/database.yaml
          apiVersion: apiextensions.crossplane.io/v1
          kind: CompositeResourceDefinition
          metadata:
            name: xpostgresqlinstances.database.example.org
          spec:
            group: database.example.org
            names:
              kind: XPostgreSQLInstance
              plural: xpostgresqlinstances
            claimNames:
              kind: PostgreSQLInstance
              plural: postgresqlinstances
            versions:
              - name: v1alpha1
                served: true
                referenceable: true
                schema:
                  openAPIV3Schema:
                    type: object
                    properties:
                      spec:
                        type: object
                        properties:
                          parameters:
                            type: object
                            properties:
                              storageGB:
                                type: integer
                              version:
                                type: string
                                enum: ["11", "12", "13", "14"]
                            required:
                              - storageGB
          ```
          
          ### Composition
          ```yaml
          # compositions/postgresql.yaml
          apiVersion: apiextensions.crossplane.io/v1
          kind: Composition
          metadata:
            name: postgresql-aws
            labels:
              provider: aws
          spec:
            compositeTypeRef:
              apiVersion: database.example.org/v1alpha1
              kind: XPostgreSQLInstance
            resources:
              - name: rdsinstance
                base:
                  apiVersion: rds.aws.upbound.io/v1beta1
                  kind: Instance
                  spec:
                    forProvider:
                      engine: postgres
                      instanceClass: db.t3.micro
                      skipFinalSnapshot: true
                patches:
                  - fromFieldPath: spec.parameters.storageGB
                    toFieldPath: spec.forProvider.allocatedStorage
                  - fromFieldPath: spec.parameters.version
                    toFieldPath: spec.forProvider.engineVersion
          ```
          
          ### Claim (Developer Interface)
          ```yaml
          # claims/my-database.yaml
          apiVersion: database.example.org/v1alpha1
          kind: PostgreSQLInstance
          metadata:
            name: my-app-database
            namespace: default
          spec:
            parameters:
              storageGB: 20
              version: "14"
            compositionSelector:
              matchLabels:
                provider: aws
            writeConnectionSecretToRef:
              name: my-db-connection
          ```
        notes: "Crossplane-based platform with composite resources, compositions, and developer-friendly claims"
      
      - name: "Kubernetes Operator for Custom Resources"
        user: "We need to create a Kubernetes operator to manage our application's lifecycle. How do we build this?"
        ai_response: |
          ## Kubernetes Operator Development
          
          ### Operator Architecture
          ```
          Custom Resource (MyApp)
          └── Operator
              ├── Controller
              │   ├── Reconcile Loop
              │   ├── Create Resources
              │   └── Update Status
              └── Webhooks
                  ├── Validation
                  └── Defaulting
          ```
          
          ### Custom Resource Definition
          ```yaml
          # config/crd/bases/app.example.com_myapps.yaml
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: myapps.app.example.com
          spec:
            group: app.example.com
            names:
              kind: MyApp
              listKind: MyAppList
              plural: myapps
              singular: myapp
            scope: Namespaced
            versions:
              - name: v1
                served: true
                storage: true
                schema:
                  openAPIV3Schema:
                    type: object
                    properties:
                      spec:
                        type: object
                        properties:
                          replicas:
                            type: integer
                            minimum: 1
                            maximum: 10
                          image:
                            type: string
                          resources:
                            type: object
                      status:
                        type: object
                        properties:
                          conditions:
                            type: array
                          readyReplicas:
                            type: integer
          ```
          
          ### Controller Implementation
          ```go
          // controllers/myapp_controller.go
          func (r *MyAppReconciler) Reconcile(ctx context.Context, req ctrl.Request) (ctrl.Result, error) {
            log := log.FromContext(ctx)
            
            // Fetch the MyApp instance
            myApp := &appv1.MyApp{}
            if err := r.Get(ctx, req.NamespacedName, myApp); err != nil {
              return ctrl.Result{}, client.IgnoreNotFound(err)
            }
            
            // Create or update Deployment
            deployment := r.deploymentForMyApp(myApp)
            if err := ctrl.SetControllerReference(myApp, deployment, r.Scheme); err != nil {
              return ctrl.Result{}, err
            }
            
            found := &appsv1.Deployment{}
            err := r.Get(ctx, types.NamespacedName{Name: deployment.Name, Namespace: deployment.Namespace}, found)
            if err != nil && errors.IsNotFound(err) {
              log.Info("Creating Deployment", "Deployment.Namespace", deployment.Namespace, "Deployment.Name", deployment.Name)
              err = r.Create(ctx, deployment)
            } else if err == nil {
              log.Info("Updating Deployment")
              found.Spec = deployment.Spec
              err = r.Update(ctx, found)
            }
            
            // Update status
            myApp.Status.ReadyReplicas = found.Status.ReadyReplicas
            err = r.Status().Update(ctx, myApp)
            
            return ctrl.Result{RequeueAfter: time.Minute}, nil
          }
          ```
        notes: "Kubernetes operator development with CRDs, controllers, and reconciliation loops"
    

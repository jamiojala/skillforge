      - name: "Design System Visual Testing with Chromatic"
        user: "We have a React design system with 50+ components. We need to set up visual regression testing to prevent unintended UI changes."
        ai_response: |
          ## Visual Testing Strategy for Design System
          
          ### Tool Selection: Chromatic
          Chromatic is ideal for Storybook-based design systems with:
          - Automatic Storybook integration
          - Built-in baseline management
          - Parallel cross-browser testing
          - UI review workflow
          
          ### Setup
          ```bash
          npm install --save-dev chromatic
          npx chromatic --project-token=YOUR_TOKEN
          ```
          
          ### Storybook Configuration
          ```typescript
          // .storybook/preview.ts
          import type { Preview } from '@storybook/react';
          
          const preview: Preview = {
            parameters: {
              chromatic: {
                // Test multiple viewports
                viewports: [320, 768, 1280, 1920],
                // Delay for animations to complete
                delay: 300,
                // Diff threshold (0.1% = very sensitive)
                diffThreshold: 0.1,
                // Pause animations
                pauseAnimationAtEnd: true,
              },
            },
          };
          
          export default preview;
          ```
          
          ### Component Stories with Visual Test Config
          ```typescript
          // src/components/Button/Button.stories.tsx
          import type { Meta, StoryObj } from '@storybook/react';
          import { Button } from './Button';
          
          const meta: Meta<typeof Button> = {
            component: Button,
            title: 'Components/Button',
            parameters: {
              chromatic: {
                viewports: [320, 1280],
              },
            },
          };
          
          export default meta;
          type Story = StoryObj<typeof Button>;
          
          export const Primary: Story = {
            args: {
              variant: 'primary',
              children: 'Primary Button',
            },
          };
          
          export const Secondary: Story = {
            args: {
              variant: 'secondary',
              children: 'Secondary Button',
            },
          };
          
          export const Loading: Story = {
            args: {
              isLoading: true,
              children: 'Loading...',
            },
            parameters: {
              // Ignore loading spinner animation
              chromatic: { delay: 100 },
            },
          };
          
          export const AllVariants: Story = {
            render: () => (
              <div style={{ display: 'flex', gap: '16px' }}>
                <Button variant="primary">Primary</Button>
                <Button variant="secondary">Secondary</Button>
                <Button variant="danger">Danger</Button>
                <Button variant="ghost">Ghost</Button>
              </div>
            ),
            parameters: {
              chromatic: {
                // This story tests all variants at once
                diffThreshold: 0.05,
              },
            },
          };
          ```
          
          ### GitHub Actions Workflow
          ```yaml
          # .github/workflows/visual-tests.yml
          name: Visual Tests
          
          on:
            push:
              branches: [main, develop]
            pull_request:
              branches: [main]
          
          jobs:
            chromatic:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                  with:
                    fetch-depth: 0 # Required for Chromatic
                
                - uses: actions/setup-node@v4
                  with:
                    node-version: '20'
                    cache: 'npm'
                
                - run: npm ci
                
                - name: Build Storybook
                  run: npm run build-storybook
                
                - name: Run Chromatic
                  uses: chromaui/action@v11
                  with:
                    projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
                    storybookBuildDir: storybook-static
                    exitOnceUploaded: true
                    autoAcceptChanges: ${{ github.ref == 'refs/heads/main' }}
          ```
          
          ### Baseline Management Workflow
          1. **Developer pushes changes** → Chromatic detects visual changes
          2. **Review required** → Changes marked as "UNREVIEWED"
          3. **Designer/QA reviews** → Accept or deny changes in Chromatic UI
          4. **PR blocked** until visual changes are accepted
          5. **Auto-accept on main** → Baselines updated after merge
        notes: "Complete setup for Storybook + Chromatic with multi-viewport testing and PR integration"
      
      - name: "Handling Dynamic Content in Visual Tests"
        user: "Our components show timestamps and user avatars that change on every render. How do we handle this in visual tests?"
        ai_response: |
          ## Handling Dynamic Content in Visual Tests
          
          ### Problem: Dynamic Content Causes False Positives
          ```tsx
          // ❌ This will cause visual diffs every run
          export const UserCard = () => (
            <div>
              <img src={`https://api.dicebear.com/avatar.jpg?seed=${Date.now()}`} />
              <p>Last updated: {new Date().toLocaleString()}</p>
            </div>
          );
          ```
          
          ### Solution 1: Mock Dynamic Data in Stories
          ```tsx
          // src/components/UserCard/UserCard.stories.tsx
          export const Default: Story = {
            args: {
              user: {
                name: 'John Doe',
                // Use static avatar URL
                avatar: 'https://api.dicebear.com/avatar.jpg?seed=static',
                lastUpdated: '2024-01-15T10:30:00Z', // Static timestamp
              },
            },
          };
          ```
          
          ### Solution 2: Use Chromatic Ignore Regions
          ```tsx
          // .storybook/preview.ts
          const preview: Preview = {
            parameters: {
              chromatic: {
                // Ignore elements by selector
                ignoreSelectors: [
                  '.timestamp',
                  '[data-testid="dynamic-avatar"]',
                ],
              },
            },
          };
          
          // Or per-story
          export const WithTimestamp: Story = {
            render: () => <UserCard showTimestamp />,
            parameters: {
              chromatic: {
                ignoreSelectors: ['.timestamp'],
              },
            },
          };
          ```
          
          ### Solution 3: Use Placeholder Components
          ```tsx
          // src/components/UserCard/UserCard.tsx
          interface UserCardProps {
            user: User;
            // Allow overriding for tests
            TimestampComponent?: React.ComponentType;
            AvatarComponent?: React.ComponentType<{ src: string }>;
          }
          
          export const UserCard: React.FC<UserCardProps> = ({
            user,
            TimestampComponent = RealTimestamp,
            AvatarComponent = RealAvatar,
          }) => (
            <div>
              <AvatarComponent src={user.avatar} />
              <TimestampComponent />
            </div>
          );
          
          // In story: Use static components
          export const ForVisualTest: Story = {
            render: () => (
              <UserCard
                user={mockUser}
                TimestampComponent={() => <span>Jan 15, 2024</span>}
                AvatarComponent={() => <div className="avatar-placeholder" />}
              />
            ),
          };
          ```
          
          ### Solution 4: Percy-Specific (if using Percy)
          ```tsx
          // Using Percy SDK
          import { percySnapshot } from '@percy/playwright';
          
          test('user card visual', async ({ page }) => {
            await page.goto('/user-card');
            
            await percySnapshot(page, 'User Card', {
              percyCSS: `
                .timestamp { visibility: hidden !important; }
                .dynamic-avatar { visibility: hidden !important; }
              `,
            });
          });
          ```
        notes: "Multiple strategies for handling dynamic content: mocking, ignore regions, placeholder components, and CSS hiding"
    

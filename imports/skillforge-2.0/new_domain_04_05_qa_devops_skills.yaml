      - name: "Complete Tracing Setup"
        user: "We need to set up distributed tracing for our microservices. What's a complete setup look like?"
        ai_response: |
          ## Complete Distributed Tracing Setup
          
          ### Service Instrumentation
          ```typescript
          // Gateway Service
          import { trace, context, propagation } from '@opentelemetry/api';
          
          app.use((req, res, next) => {
            const tracer = trace.getTracer('gateway');
            
            // Extract context from incoming request
            const parentContext = propagation.extract(context.active(), req.headers);
            
            tracer.startActiveSpan('gateway.handle-request', {
              attributes: {
                'http.method': req.method,
                'http.url': req.url,
                'http.user_agent': req.get('user-agent'),
              },
            }, parentContext, async (span) => {
              try {
                // Call downstream service with context
                const response = await callOrderService(req, context.active());
                span.setAttribute('http.status_code', response.status);
                span.setStatus({ code: SpanStatusCode.OK });
              } catch (error) {
                span.recordException(error);
                span.setStatus({ code: SpanStatusCode.ERROR });
              } finally {
                span.end();
              }
            });
          });
          
          // Order Service
          async function callOrderService(req, parentContext) {
            const tracer = trace.getTracer('gateway');
            
            return tracer.startActiveSpan('gateway.call-order-service', {
              attributes: {
                'peer.service': 'order-service',
                'rpc.method': 'createOrder',
              },
            }, parentContext, async (span) => {
              // Inject context into outgoing request
              const headers = {};
              propagation.inject(context.active(), headers);
              
              const response = await fetch('http://order-service/orders', {
                headers,
                method: 'POST',
                body: JSON.stringify(req.body),
              });
              
              span.setAttribute('http.status_code', response.status);
              return response;
            });
          }
          ```
          
          ### Database Tracing
          ```typescript
          // Database instrumentation
          import { trace } from '@opentelemetry/api';
          
          const originalQuery = db.query.bind(db);
          db.query = async function(sql, params) {
            const tracer = trace.getTracer('database');
            
            return tracer.startActiveSpan('db.query', {
              attributes: {
                'db.system': 'postgresql',
                'db.statement': sql,
                'db.operation': sql.split(' ')[0],
              },
            }, async (span) => {
              try {
                const result = await originalQuery(sql, params);
                span.setAttribute('db.rows_affected', result.rowCount);
                return result;
              } catch (error) {
                span.recordException(error);
                throw error;
              } finally {
                span.end();
              }
            });
          };
          ```
        notes: "Complete tracing setup with HTTP context propagation, database tracing, and error tracking"
      
      - name: "Trace Analysis and Visualization"

          class MarquezClient:
              """Client for Marquez lineage API."""
              
              def __init__(self, base_url: str = "http://localhost:5000"):
                  self.base_url = base_url
              
              def get_lineage(self, node_id: str, depth: int = 5) -> Dict:
                  """Get lineage for a node."""
                  response = requests.get(
                      f"{self.base_url}/api/v1/lineage",
                      params={"nodeId": node_id, "depth": depth}
                  )
                  response.raise_for_status()
                  return response.json()
              
              def get_dataset_lineage(self, namespace: str, dataset: str) -> Dict:
                  """Get lineage for a dataset."""
                  node_id = f"dataset:{namespace}:{dataset}"
                  return self.get_lineage(node_id)
              
              def get_job_lineage(self, namespace: str, job: str) -> Dict:
                  """Get lineage for a job."""
                  node_id = f"job:{namespace}:{job}"
                  return self.get_lineage(node_id)
              
              def search_datasets(self, query: str) -> List[Dict]:
                  """Search for datasets."""
                  response = requests.get(
                      f"{self.base_url}/api/v1/search",
                      params={"q": query, "type": "DATASET"}
                  )
                  response.raise_for_status()
                  return response.json().get("datasets", [])

          # Usage

    examples:
      - name: "Creating an Expectation Suite for Sales Data"
        user: |
          I need to set up data quality validation for our daily sales data. 
          The table has: sale_id, customer_id, product_id, quantity, unit_price, sale_date, total_amount
        ai_response: |
          I'll create a comprehensive expectation suite for your sales data with critical business validations.

          ## Quality Assessment

          **Dataset**: Daily Sales Data  
          **Criticality**: High (used for revenue reporting)  
          **Validation Strategy**: Critical + Warning expectations

          ## Expectation Suite

          ```python
          # expectations/sales_expectations.py
          import great_expectations as gx
          from great_expectations.core.expectation_suite import ExpectationSuite
          from great_expectations.expectations import (
              ExpectColumnValuesToNotBeNull,
              ExpectColumnValuesToBeUnique,
              ExpectColumnValuesToBeBetween,
              ExpectColumnValuesToBeInSet,
              ExpectTableRowCountToBeBetween,
              ExpectColumnPairValuesToBeEqual,
              ExpectColumnValuesToMatchRegex,
          )

          # Create or load context
          context = gx.get_context()

          # Create expectation suite
          suite_name = "sales_data_quality"
          suite = context.add_or_update_expectation_suite(expectation_suite_name=suite_name)

          # CRITICAL EXPECTATIONS - Block pipeline on failure
          critical_expectations = [
              # Primary key must be unique and not null
              ExpectColumnValuesToNotBeNull(column="sale_id"),
              ExpectColumnValuesToBeUnique(column="sale_id"),
              
              # Foreign keys must not be null
              ExpectColumnValuesToNotBeNull(column="customer_id"),
              ExpectColumnValuesToNotBeNull(column="product_id"),
              
              # Business-critical fields
              ExpectColumnValuesToNotBeNull(column="sale_date"),
              ExpectColumnValuesToNotBeNull(column="total_amount"),
              
              # Quantity must be positive
              ExpectColumnValuesToBeBetween(
                  column="quantity",
                  min_value=1,
                  max_value=10000,
                  meta={
                      "business_rule": "Quantity must be between 1 and 10,000",
                      "severity": "critical",
                      "owner": "sales-operations"
                  }
              ),
              
              # Unit price must be positive
              ExpectColumnValuesToBeBetween(
                  column="unit_price",
                  min_value=0.01,
                  max_value=100000,
                  meta={
                      "business_rule": "Unit price must be positive and reasonable",
                      "severity": "critical",
                      "owner": "sales-operations"
                  }
              ),
              
              # Total amount calculation validation
              ExpectColumnPairValuesToBeEqual(
                  column_A="total_amount",
                  column_B="quantity * unit_price",
                  or_equal=True,
                  meta={
                      "business_rule": "Total amount must equal quantity * unit_price",
                      "severity": "critical",
                      "owner": "finance-team"
                  }
              ),
          ]

          # WARNING EXPECTATIONS - Alert but don't block
          warning_expectations = [
              # Sale date should be within last 30 days
              ExpectColumnValuesToBeBetween(
                  column="sale_date",
                  min_value="2024-01-01",  # Adjust as needed
                  max_value="today",
                  meta={
                      "business_rule": "Sale date should be current or historical",
                      "severity": "warning",
                      "owner": "data-engineering"
                  }
              ),
              
              # Customer ID format validation
              ExpectColumnValuesToMatchRegex(
                  column="customer_id",
                  regex=r"^CUST_[0-9]{6}$",
                  mostly=0.95,
                  meta={
                      "business_rule": "Customer ID should follow CUST_XXXXXX format",
                      "severity": "warning",
                      "owner": "data-engineering"
                  }
              ),
              
              # Reasonable row count for daily data
              ExpectTableRowCountToBeBetween(
                  min_value=100,
                  max_value=100000,
                  meta={
                      "business_rule": "Daily sales should be between 100 and 100,000 rows",
                      "severity": "warning",
                      "owner": "data-engineering"
                  }
              ),
          ]

          # Add all expectations to suite
          for expectation in critical_expectations + warning_expectations:
              suite.add_expectation(expectation)

          # Save the suite
          context.save_expectation_suite(suite)
          ```

          ## Checkpoint Configuration

          ```yaml
          # checkpoints/sales_data_checkpoint.yml
          name: sales_data_checkpoint
          config_version: 1.0
          
          validations:
            - batch_request:
                datasource_name: sales_datasource

          ## Feature Transformation

          ```python
          # features/transformations.py
          from feast import on_demand_feature_view
          from feast.types import Float32, Int64
          from pandas import DataFrame

          @on_demand_feature_view(
              sources={
                  "user_demographics": user_demographics_fv,
                  "user_purchase_stats": user_purchase_stats_fv,
              },
              schema=[
                  Field(name="customer_lifetime_value", dtype=Float32),
                  Field(name="purchase_frequency", dtype=Float32),
                  Field(name="is_high_value_customer", dtype=Bool),
              ],
              mode="pandas"
          )
          def customer_metrics(df: DataFrame) -> DataFrame:
              """Compute derived customer metrics on-demand."""
              df["customer_lifetime_value"] = (
                  df["total_revenue"] / (df["account_age_days"] / 30 + 1)
              )
              
              df["purchase_frequency"] = (
                  df["total_orders"] / (df["account_age_days"] / 30 + 1)
              )
              
              df["is_high_value_customer"] = (
                  (df["total_revenue"] > 1000) & 
                  (df["purchase_frequency"] > 0.5)
              )
              
              return df[[
                  "customer_lifetime_value",
                  "purchase_frequency", 
                  "is_high_value_customer"
              ]]
          ```

          ## Feature Serving

          ```python
          # serving/feature_server.py
          from feast import FeatureStore
          import pandas as pd
          from typing import List, Dict

          class FeatureServer:
              """Serve features for ML models."""
              
              def __init__(self, repo_path: str = "."):
                  self.store = FeatureStore(repo_path=repo_path)
              
              def get_online_features(
                  self,
                  entity_rows: List[Dict],
                  feature_refs: List[str]
              ) -> Dict:
                  """Get online features for real-time inference."""
                  features = self.store.get_online_features(
                      features=feature_refs,
                      entity_rows=entity_rows
                  ).to_dict()
                  
                  return features
              
              def get_historical_features(
                  self,
                  entity_df: pd.DataFrame,
                  feature_refs: List[str]
              ) -> pd.DataFrame:
                  """Get historical features for training."""
                  return self.store.get_historical_features(
                      entity_df=entity_df,
                      features=feature_refs
                  ).to_df()
              
              def get_recommendation_features(self, user_id: str) -> Dict:
                  """Get features for recommendation model."""
                  feature_refs = [
                      "user_demographics:age",
                      "user_demographics:country",
                      "user_purchase_stats:total_orders",
                      "user_purchase_stats:favorite_category",
                      "user_activity:page_views_1h",
                      "customer_metrics:customer_lifetime_value",
                      "customer_metrics:is_high_value_customer",
                  ]
                  
                  return self.get_online_features(
                      entity_rows=[{"user_id": user_id}],
                      feature_refs=feature_refs
                  )

          # FastAPI serving endpoint
          from fastapi import FastAPI
          from pydantic import BaseModel

          app = FastAPI()
          feature_server = FeatureServer()

          class FeatureRequest(BaseModel):
              user_id: str
              feature_names: List[str] = None

          @app.post("/features/online")
          def get_online_features(request: FeatureRequest):
              """Get online features for a user."""
              features = feature_server.get_recommendation_features(request.user_id)
              return {"user_id": request.user_id, "features": features}

          @app.get("/features/{user_id}")
          def get_user_features(user_id: str):
              """Get all features for a user."""
              return feature_server.get_recommendation_features(user_id)
          ```

          ## Feature Monitoring

          ```python
          # monitoring/feature_monitor.py
          from feast import FeatureStore
          import pandas as pd
          import numpy as np
          from scipy import stats
          from typing import Dict, List

          class FeatureMonitor:
              """Monitor feature quality and drift."""
              
              def __init__(self, repo_path: str = "."):
                  self.store = FeatureStore(repo_path=repo_path)
                  self.baseline_stats = {}
              
              def compute_feature_statistics(
                  self,
                  feature_view: str,
                  start_date: str,
                  end_date: str
              ) -> Dict:
                  """Compute statistics for a feature view."""
                  # Get historical features
                  entity_df = pd.DataFrame({
                      "user_id": ["*"],  # All users
                      "event_timestamp": [pd.Timestamp(end_date)]
                  })
                  
                  features = self.store.get_historical_features(
                      entity_df=entity_df,
                      features=[f"{feature_view}:*"]
                  ).to_df()
                  
                  stats = {}
                  for col in features.columns:
                      if col not in ["user_id", "event_timestamp"]:
                          stats[col] = {
                              "mean": float(features[col].mean()),
                              "std": float(features[col].std()),
                              "min": float(features[col].min()),
                              "max": float(features[col].max()),
                              "null_pct": float(features[col].isnull().mean()),
                              "unique_count": int(features[col].nunique())
                          }
                  
                  return stats
              
              def detect_drift(
                  self,
                  feature_view: str,
                  feature_name: str,
                  current_stats: Dict,
                  threshold: float = 0.05
              ) -> Dict:
                  """Detect feature drift compared to baseline."""
                  baseline_key = f"{feature_view}:{feature_name}"
                  
                  if baseline_key not in self.baseline_stats:
                      self.baseline_stats[baseline_key] = current_stats
                      return {"status": "baseline_set", "drift_detected": False}
                  
                  baseline = self.baseline_stats[baseline_key]
                  
                  # Compare distributions using z-score
                  mean_diff = abs(current_stats["mean"] - baseline["mean"])
                  mean_zscore = mean_diff / baseline["std"] if baseline["std"] > 0 else 0
                  
                  drift_detected = mean_zscore > 2.0  # 2 standard deviations
                  
                  return {
                      "feature": f"{feature_view}:{feature_name}",
                      "drift_detected": drift_detected,
                      "mean_zscore": mean_zscore,
                      "baseline_mean": baseline["mean"],
                      "current_mean": current_stats["mean"],
                      "threshold": threshold
                  }
              
              def run_monitoring_check(self) -> List[Dict]:
                  """Run full monitoring check on all features."""
                  alerts = []
                  
                  feature_views = [
                      "user_demographics",
                      "user_purchase_stats",
                      "user_activity"
                  ]
                  
                  for fv in feature_views:
                      stats = self.compute_feature_statistics(fv, "2024-01-01", "2024-01-31")
                      
                      for feature_name, feature_stats in stats.items():
                          drift_result = self.detect_drift(fv, feature_name, feature_stats)
                          
                          if drift_result.get("drift_detected"):
                              alerts.append(drift_result)
                  
                  return alerts

          # Scheduled monitoring job
          from apscheduler.schedulers.background import BackgroundScheduler

          def run_feature_monitoring():
              monitor = FeatureMonitor()
              alerts = monitor.run_monitoring_check()
              
              if alerts:
                  # Send alerts
                  for alert in alerts:
                      print(f"DRIFT ALERT: {alert['feature']} - z-score: {alert['mean_zscore']:.2f}")
              else:
                  print("No drift detected")

          scheduler = BackgroundScheduler()
          scheduler.add_job(run_feature_monitoring, 'interval', hours=24)
          scheduler.start()
          ```


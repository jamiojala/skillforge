    examples:
      - name: "ClickHouse Schema for Event Analytics"
        user: |
          We need to store 100M events/day with sub-second query latency for dashboards.
          Events have: event_id, user_id, event_type, timestamp, properties (JSON), session_id
          Queries filter by date range, event_type, and aggregate by user_id.
        ai_response: |
          I'll design a ClickHouse schema optimized for your event analytics workload.

          ## Architecture Overview

          **Engine**: ClickHouse  
          **Data Volume**: 100M events/day (~3B/month)  
          **Query Latency Target**: < 500ms for dashboard queries  
          **Retention**: 90 days hot, archive to cold storage

          ## Engine Selection Rationale

          ClickHouse is ideal because:
          - Superior compression with columnar storage
          - Excellent performance for high-cardinality GROUP BY
          - Real-time ingestion with low latency
          - Rich SQL support with window functions
          - Cost-effective at scale

          ## Schema Design

          ```sql
          -- Main events table with optimized data types
          CREATE TABLE events (
              -- Primary key and timestamp
              event_id UUID,
              timestamp DateTime64(3),  -- Millisecond precision
              date Date DEFAULT toDate(timestamp),
              
              -- User and session identifiers
              user_id UInt64,  -- Hashed user ID for efficiency
              session_id UInt64,
              
              -- Event classification
              event_type LowCardinality(String),  -- Enum-like optimization
              event_category LowCardinality(String),
              
              -- Properties as structured columns (extract common fields)
              page_url String,
              referrer String,
              device_type LowCardinality(String),
              browser LowCardinality(String),
              os LowCardinality(String),
              country LowCardinality(String) DEFAULT 'unknown',
              
              -- Raw properties for flexibility
              properties String CODEC(ZSTD(3)),  -- Compressed JSON
              
              -- Derived metrics
              duration_ms UInt32,
              revenue Decimal(10, 2),
              
              -- Indexing
              INDEX idx_event_type event_type TYPE bloom_filter GRANULARITY 4,
              INDEX idx_user_id user_id TYPE bloom_filter GRANULARITY 4,
              INDEX idx_properties properties TYPE tokenbf_v1(32768, 3, 0) GRANULARITY 4
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMM(date)
          ORDER BY (event_type, toStartOfHour(timestamp), user_id, event_id)
          TTL date + INTERVAL 90 DAY TO VOLUME 'cold'
          SETTINGS index_granularity = 8192;

          -- Materialized view for pre-aggregated hourly stats
          CREATE MATERIALIZED VIEW events_hourly_mv
          ENGINE = SummingMergeTree()
          PARTITION BY toYYYYMM(hour)
          ORDER BY (hour, event_type, country)
          AS SELECT
              toStartOfHour(timestamp) AS hour,
              event_type,
              country,
              count() AS event_count,
              uniqExact(user_id) AS unique_users,
              sum(revenue) AS total_revenue,
              avg(duration_ms) AS avg_duration
          FROM events
          GROUP BY hour, event_type, country;

          -- Materialized view for user sessions
          CREATE MATERIALIZED VIEW user_sessions_mv
          ENGINE = AggregatingMergeTree()
          PARTITION BY toYYYYMM(session_date)
          ORDER BY (session_date, user_id)
          AS SELECT
              toDate(timestamp) AS session_date,
              user_id,
              session_id,
              min(timestamp) AS session_start,
              max(timestamp) AS session_end,
              groupUniqArrayState(event_type) AS event_types,
              countState() AS event_count,
              sumState(revenue) AS session_revenue
          FROM events
          GROUP BY session_date, user_id, session_id;
          ```

          ## Indexing Strategy

          | Index | Type | Purpose |
          |-------|------|---------|
          | Primary Key | (event_type, hour, user_id, event_id) | Data locality for queries |
          | Partition | toYYYYMM(date) | Time-based pruning |
          | Bloom Filter | event_type, user_id | Fast existence checks |
          | Token BF | properties | JSON property search |

          ## Ingestion Configuration

          ```sql
          -- Kafka engine for real-time ingestion
          CREATE TABLE events_queue (
              event_id String,
              user_id String,
              event_type String,
              timestamp String,
              session_id String,
              properties String,
              page_url String,
              device_type String,
              browser String,
              os String,
              country String,
              duration_ms String,
              revenue String
          ) ENGINE = Kafka()
          SETTINGS
              kafka_broker_list = 'kafka:9092',
              kafka_topic_list = 'events',
              kafka_group_name = 'clickhouse_events_consumer',
              kafka_format = 'JSONEachRow',
              kafka_max_block_size = 65536,
              kafka_skip_broken_messages = 100;

          -- MV to transform and insert from Kafka
          CREATE MATERIALIZED VIEW events_consumer TO events AS
          SELECT
              toUUID(event_id) AS event_id,
              parseDateTime64BestEffort(timestamp) AS timestamp,
              toUInt64(user_id) AS user_id,
              toUInt64(session_id) AS session_id,
              event_type,
              properties,
              page_url,
              device_type,
              browser,
              os,
              country,
              toUInt32(duration_ms) AS duration_ms,
              toDecimal32(revenue, 2) AS revenue
          FROM events_queue;
          ```

          ## Query Optimization

          ```sql
          -- Dashboard query: Events by hour (uses MV)
          SELECT 
              hour,
              sum(event_count) AS events,
              sum(unique_users) AS users
          FROM events_hourly_mv
          WHERE hour >= now() - INTERVAL 24 HOUR
          GROUP BY hour
          ORDER BY hour;
          -- Expected: < 50ms

          -- Funnel analysis (optimized with primary key)
          SELECT 
              event_type,
              count() AS events,
              uniqExact(user_id) AS unique_users
          FROM events
          WHERE timestamp >= now() - INTERVAL 7 DAY
            AND event_type IN ('page_view', 'add_to_cart', 'purchase')
          GROUP BY event_type
          ORDER BY events DESC;
          -- Expected: < 200ms with 100M rows

          -- User journey (uses session MV)
          SELECT 
              user_id,
              session_start,
              session_end,
              session_revenue
          FROM user_sessions_mv
          WHERE session_date = today()
          ORDER BY session_revenue DESC
          LIMIT 100;
          -- Expected: < 100ms
          ```


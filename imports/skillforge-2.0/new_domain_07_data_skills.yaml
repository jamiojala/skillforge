          ## Domain Design

          ```yaml
          # domains/ecommerce_domains.yml
          data_mesh:
            organization:
              name: E-Commerce Data Mesh
              version: 1.0.0
              
            domains:
              - id: customers
                name: Customer Domain
                description: |
                  All customer-related data including profiles, preferences,
                  segmentation, and customer journey data.
                
                business_capability: Customer Management
                
                bounded_context:
                  - Customer profiles and identities
                  - Customer preferences and consent
                  - Customer segmentation
                  - Customer support interactions
                
                team:
                  name: Customer Data Team
                  size: 3-5 people
                  roles:
                    - data_product_owner
                    - data_engineer
                    - data_analyst
                  
                data_products:
                  - name: customer_360
                    description: Unified customer profile
                    consumers:
                      - marketing_team
                      - customer_support
                      - analytics_team
                    
                  - name: customer_segments
                    description: Customer segmentation data
                    consumers:
                      - marketing_team
                      - product_team
                
                sources:
                  - crm_system
                  - authentication_service
                  - preference_center
                
                sla:
                  freshness: 1 hour
                  availability: 99.9%
                  
              - id: orders
                name: Order Domain
                description: |
                  All order-related data including transactions, order lifecycle,
                  fulfillment, and returns.
                
                business_capability: Order Management
                
                bounded_context:
                  - Order transactions
                  - Order lifecycle (placed, confirmed, shipped, delivered)
                  - Payment transactions
                  - Returns and refunds
                
                team:
                  name: Order Data Team
                  size: 3-4 people
                  
                data_products:
                  - name: order_transactions
                    description: Complete order transaction history
                    consumers:
                      - finance_team
                      - operations_team
                      - analytics_team
                      
                  - name: order_fulfillment
                    description: Order fulfillment status and tracking
                    consumers:
                      - operations_team
                      - customer_support
                
                sources:
                  - order_service
                  - payment_gateway
                  - fulfillment_system
                
                sla:
                  freshness: 5 minutes
                  availability: 99.95%
                  
              - id: products
                name: Product Domain
                description: |
                  All product-related data including catalogs, inventory,
                  pricing, and product attributes.
                
                business_capability: Product Management
                
                bounded_context:
                  - Product catalog
                  - Product attributes and categories
                  - Inventory levels
                  - Pricing and promotions
                
                team:
                  name: Product Data Team
                  size: 2-3 people
                  
                data_products:
                  - name: product_catalog
                    description: Complete product catalog with attributes
                    consumers:
                      - all_teams
                      
                  - name: inventory_levels
                    description: Real-time inventory data
                    consumers:
                      - operations_team
                      - merchandising_team
                
                sources:
                  - product_information_management
                  - inventory_management_system
                
                sla:
                  freshness: 15 minutes
                  availability: 99.9%
                  
              - id: marketing
                name: Marketing Domain
                description: |
                  All marketing-related data including campaigns, channels,
                  attribution, and customer acquisition.
                
                business_capability: Marketing
                
                bounded_context:
                  - Marketing campaigns
                  - Channel performance
                  - Customer acquisition
                  - Marketing attribution
                
                team:
                  name: Marketing Data Team
                  size: 2-3 people
                  
                data_products:
                  - name: campaign_performance
                    description: Marketing campaign performance metrics
                    consumers:
                      - marketing_team
                      - executive_team
                      
                  - name: customer_acquisition
                    description: Customer acquisition funnel data
                    consumers:
                      - marketing_team
                      - product_team
                
                sources:
                  - marketing_automation_platform
                  - ad_platforms
                  - web_analytics
                
                sla:
                  freshness: 1 hour
                  availability: 99.5%
          ```

          ## Self-Serve Platform Architecture

          ```yaml
          # platform/self_serve_platform.yml
          data_platform:
            name: Self-Serve Data Platform
            description: |
              Platform providing infrastructure and tools for domain teams
              to build and operate their data products.
            
            capabilities:
              - name: data_ingestion
                description: Ingest data from source systems
                tools:
                  - fivetran
                  - airbyte
                  - kafka_connect
                self_serve: true
                
              - name: data_storage
                description: Store and manage data
                tools:
                  - snowflake
                  - s3
                  - delta_lake
                self_serve: true
                
              - name: data_transformation
                description: Transform and model data
                tools:
                  - dbt
                  - spark
                self_serve: true
                templates:
                  - domain_model_template
                  - data_product_template
                  
              - name: data_quality
                description: Validate and monitor data quality
                tools:
                  - great_expectations
                  - soda_core
                self_serve: true
                
              - name: data_catalog
                description: Discover and understand data
                tools:
                  - datahub
                self_serve: true
                
              - name: data_governance
                description: Enforce governance policies
                tools:
                  - datahub
                  - apache_atlas
                self_serve: false  # Federated governance
                
              - name: data_observability
                description: Monitor data pipelines
                tools:
                  - monte_carlo
                  - bigeye
                self_serve: true
                
              - name: data_lineage
                description: Track data lineage
                tools:
                  - openlineage
                  - datahub
                self_serve: true
            
            platform_team:
              name: Data Platform Team
              responsibilities:
                - Maintain platform infrastructure
                - Develop self-serve tools
                - Provide domain team support
                - Define platform standards
              
            domain_team_responsibilities:
              - Own their data products
              - Build and maintain data pipelines
              - Ensure data quality
              - Serve data consumers
              - Define data contracts
          ```

          ## Federated Governance Framework

          ```yaml
          # governance/federated_governance.yml
          federated_governance:
            principles:
              - name: decentralization
                description: |
                  Governance decisions are made by domain teams,
                  not a central authority.
                
              - name: automation
                description: |
                  Governance is enforced through automated policies,
                  not manual reviews.
                
              - name: interoperability
                description: |
                  Data products must be discoverable and usable
                  across domains.
            
            governance_domains:
              - name: data_quality
                central_policies:
                  - All data products must have quality checks
                  - Critical data must have SLAs
                federated_policies:
                  - Domain teams define specific quality rules
                  - Domain teams set their own SLAs
                  
              - name: data_security
                central_policies:
                  - PII must be classified and protected
                  - Access controls must be implemented
                federated_policies:
                  - Domain teams classify their data
                  - Domain teams implement access controls
                  
              - name: data_discovery
                central_policies:
                  - All data products must be registered in catalog
                  - Data products must have documentation
                federated_policies:
                  - Domain teams maintain their documentation
                  - Domain teams define their metadata
                  
              - name: data_contracts
                central_policies:
                  - Data contracts must be versioned
                  - Breaking changes require approval
                federated_policies:
                  - Domain teams define their contracts
                  - Domain teams manage contract lifecycle
            
            governance_council:
              description: |
                Cross-domain council for governance decisions
                affecting multiple domains.
              
              members:
                - platform_team_representative
                - each_domain_representative
                - security_representative
                - compliance_representative
              
              responsibilities:
                - Define global governance policies
                - Resolve cross-domain conflicts
                - Approve breaking changes
                - Review new domain proposals
          ```


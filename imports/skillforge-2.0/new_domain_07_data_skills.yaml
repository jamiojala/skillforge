      - name: "SQL Lineage Parser"
        user: |
          I need to extract column-level lineage from SQL queries in our dbt project.
          How do I parse SQL to get source-to-target column mappings?
        ai_response: |
          I'll create a SQL lineage parser using sqlglot that extracts column-level mappings from dbt models.

          ## Lineage Architecture

          **Parser**: sqlglot for SQL AST analysis  
          **Storage**: Neo4j graph database  
          **API**: GraphQL for lineage queries  
          **Integration**: dbt artifacts + CI/CD

          ## SQL Lineage Parser

          ```python
          # lineage_parser.py
          from sqlglot import parse, exp
          from dataclasses import dataclass
          from typing import List, Dict, Optional, Set
          import json

          @dataclass
          class ColumnLineage:
              target_column: str
              source_columns: List[str]
              transformation: str
              source_tables: List[str]

          class SQLLineageExtractor:
              """Extract column-level lineage from SQL queries."""
              
              def __init__(self):
                  self.lineage_graph = []
              
              def extract_lineage(self, sql: str, target_table: str) -> List[ColumnLineage]:
                  """Extract lineage from a SQL query."""
                  try:
                      parsed = parse(sql)
                  except Exception as e:
                      print(f"Failed to parse SQL: {e}")
                      return []
                  
                  lineage = []
                  
                  for statement in parsed:
                      if isinstance(statement, exp.Create):
                          lineage.extend(self._extract_from_create(statement, target_table))
                      elif isinstance(statement, exp.Insert):
                          lineage.extend(self._extract_from_insert(statement, target_table))
                  
                  return lineage
              
              def _extract_from_create(self, statement: exp.Create, target_table: str) -> List[ColumnLineage]:
                  """Extract lineage from CREATE TABLE AS SELECT."""
                  lineage = []
                  
                  # Get target columns from schema if defined
                  target_columns = self._get_target_columns(statement)
                  
                  # Get the SELECT expression
                  select_expr = statement.expression
                  if isinstance(select_expr, exp.Select):
                      source_tables = self._extract_source_tables(select_expr)
                      column_mappings = self._extract_select_columns(select_expr, source_tables)
                      
                      for i, (target_col, sources, transform) in enumerate(column_mappings):
                          lineage.append(ColumnLineage(
                              target_column=target_col,
                              source_columns=sources,
                              transformation=transform,
                              source_tables=list(source_tables)
                          ))
                  
                  return lineage
              
              def _extract_source_tables(self, select_expr: exp.Select) -> Set[str]:
                  """Extract source table names from SELECT."""
                  tables = set()
                  
                  for table in select_expr.find_all(exp.Table):
                      table_name = table.name
                      if table.db:
                          table_name = f"{table.db}.{table_name}"
                      tables.add(table_name)
                  
                  return tables
              
              def _extract_select_columns(self, select_expr: exp.Select, source_tables: Set[str]) -> List[tuple]:
                  """Extract column mappings from SELECT expressions."""
                  mappings = []
                  
                  for i, projection in enumerate(select_expr.expressions):
                      target_name = self._get_target_column_name(projection, i)
                      source_cols = self._extract_source_columns(projection)
                      transform = projection.sql()
                      
                      mappings.append((target_name, source_cols, transform))
                  
                  return mappings
              
              def _get_target_column_name(self, projection: exp.Expression, index: int) -> str:
                  """Get the target column name from projection."""
                  if isinstance(projection, exp.Alias):
                      return projection.alias
                  elif isinstance(projection, exp.Column):
                      return projection.name
                  else:
                      return f"column_{index}"
              
              def _extract_source_columns(self, expression: exp.Expression) -> List[str]:
                  """Extract source column references from expression."""
                  columns = []
                  
                  for col in expression.find_all(exp.Column):
                      col_ref = col.name
                      if col.table:
                          col_ref = f"{col.table}.{col.name}"
                      columns.append(col_ref)
                  
                  return columns
              
              def _get_target_columns(self, statement: exp.Create) -> List[str]:
                  """Extract target column names from CREATE statement."""
                  columns = []
                  schema = statement.find(exp.Schema)
                  if schema:
                      for col in schema.find_all(exp.ColumnDef):
                          columns.append(col.name)
                  return columns

          # Usage example
          if __name__ == "__main__":
              sql = """
              CREATE TABLE analytics.customer_orders AS

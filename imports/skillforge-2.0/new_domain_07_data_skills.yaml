      - name: "Druid Ingestion Spec for Time-Series Data"
        user: |
          We need to set up Apache Druid for real-time ingestion of IoT sensor data.
          Sensors send: sensor_id, timestamp, temperature, humidity, pressure, location
          We need to query aggregates by location and time ranges.
        ai_response: |
          I'll create a Druid ingestion specification optimized for IoT time-series analytics.

          ## Architecture Overview

          **Engine**: Apache Druid  
          **Data Type**: IoT sensor time-series  
          **Ingestion**: Real-time from Kafka  
          **Query Pattern**: Time-range aggregations by location

          ## Ingestion Specification

          ```json
          {
            "type": "kafka",
            "spec": {
              "dataSchema": {
                "dataSource": "iot_sensors",
                "timestampSpec": {
                  "column": "timestamp",
                  "format": "iso"
                },
                "dimensionsSpec": {
                  "dimensions": [
                    {
                      "type": "string",
                      "name": "sensor_id"
                    },
                    {
                      "type": "string",
                      "name": "location"
                    },
                    {
                      "type": "float",
                      "name": "temperature"
                    },
                    {
                      "type": "float",
                      "name": "humidity"
                    },
                    {
                      "type": "float",
                      "name": "pressure"
                    }
                  ]
                },
                "metricsSpec": [
                  {
                    "type": "count",
                    "name": "count"
                  },
                  {
                    "type": "doubleSum",
                    "name": "temperature_sum",
                    "fieldName": "temperature"
                  },
                  {
                    "type": "doubleMin",
                    "name": "temperature_min",
                    "fieldName": "temperature"
                  },
                  {
                    "type": "doubleMax",
                    "name": "temperature_max",
                    "fieldName": "temperature"
                  },
                  {
                    "type": "doubleSum",
                    "name": "humidity_sum",
                    "fieldName": "humidity"
                  },
                  {
                    "type": "doubleSum",
                    "name": "pressure_sum",
                    "fieldName": "pressure"
                  }
                ],
                "granularitySpec": {
                  "type": "uniform",
                  "segmentGranularity": "HOUR",
                  "queryGranularity": "MINUTE",
                  "rollup": true,
                  "intervals": null
                }
              },
              "tuningConfig": {
                "type": "kafka",
                "maxRowsPerSegment": 5000000,
                "maxRowsInMemory": 1000000,
                "maxBytesInMemory": 1000000000,
                "maxTotalRows": 20000000,
                "intermediatePersistPeriod": "PT10M",
                "maxPendingPersists": 0,
                "indexSpec": {
                  "bitmap": {
                    "type": "roaring"
                  },
                  "dimensionCompression": "lz4",
                  "metricCompression": "lz4",
                  "longEncoding": "longs"
                },
                "buildV9Directly": true,
                "reportParseExceptions": false,
                "handoffConditionTimeout": 900000,
                "resetOffsetAutomatically": false,
                "workerThreads": null,
                "chatThreads": null,
                "chatRetries": 20,
                "httpTimeout": "PT10S",
                "shutdownTimeout": "PT80S",
                "offsetFetchPeriod": "PT30S",
                "intermediateHandoffPeriod": "P2147483647D"
              },
              "ioConfig": {
                "topic": "iot-sensor-data",
                "consumerProperties": {
                  "bootstrap.servers": "kafka:9092",
                  "group.id": "druid-iot-consumer"
                },
                "pollTimeout": 100,
                "replicas": 2,
                "taskCount": 4,
                "taskDuration": "PT1H",
                "useEarliestOffset": false,
                "completionTimeout": "PT2H",
                "lateMessageRejectionPeriod": "PT1H",
                "earlyMessageRejectionPeriod": "PT10M"
              }
            }
          }
          ```

          ## Query Examples

          ```sql
          -- Average temperature by location (last 24 hours)
          SELECT 
              location,
              AVG(temperature) AS avg_temp,
              MAX(temperature_max) AS max_temp,
              MIN(temperature_min) AS min_temp,
              SUM(count) AS readings
          FROM iot_sensors
          WHERE __time >= CURRENT_TIMESTAMP - INTERVAL '1' DAY
          GROUP BY location
          ORDER BY avg_temp DESC;

          -- Temperature trend by hour
          SELECT 
              TIME_FLOOR(__time, 'PT1H') AS hour,
              AVG(temperature_sum / count) AS avg_temp,
              AVG(humidity_sum / count) AS avg_humidity
          FROM iot_sensors
          WHERE __time >= CURRENT_TIMESTAMP - INTERVAL '7' DAY
          GROUP BY 1
          ORDER BY 1;

          -- Alert: Sensors with abnormal readings
          SELECT 
              sensor_id,
              location,
              AVG(temperature_sum / count) AS avg_temp,
              COUNT(*) AS reading_count
          FROM iot_sensors
          WHERE __time >= CURRENT_TIMESTAMP - INTERVAL '1' HOUR
            AND (temperature_max > 100 OR temperature_min < -20)
          GROUP BY sensor_id, location
          HAVING reading_count > 10;
          ```

          ## Performance Tuning

          | Parameter | Value | Rationale |
          |-----------|-------|-----------|
          | segmentGranularity | HOUR | Balance between segment count and size |
          | queryGranularity | MINUTE | Rollup to minute-level for efficiency |
          | maxRowsPerSegment | 5M | Optimal segment size for queries |
          | intermediatePersistPeriod | 10 min | Frequent persists for real-time |
          | replicas | 2 | High availability |
          | taskCount | 4 | Parallel ingestion |

          ## Retention Policy

          ```json
          {
            "type": "loadByInterval",
            "tieredReplicants": {
              "hot": {"replicant": 2, "tier": "hot"},
              "cold": {"replicant": 1, "tier": "cold"}
            },
            "intervals": ["2024-01-01/2024-02-01"]
          }
          ```

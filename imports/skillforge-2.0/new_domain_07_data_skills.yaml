      - name: "Custom Expectation for Business Rule"
        user: |
          We have a business rule that the total_amount should equal quantity * unit_price within $0.01 tolerance.
          How do I create a custom expectation for this?
        ai_response: |
          I'll create a custom expectation for your specific business rule with tolerance handling.

          ## Custom Expectation Implementation

          ```python
          # custom_expectations/expect_column_a_to_equal_column_b_within_tolerance.py
          from typing import Any, Dict, Optional
          from great_expectations.core.expectation_configuration import ExpectationConfiguration
          from great_expectations.expectations.expectation import ColumnPairMapExpectation
          from great_expectations.render import RenderedStringTemplateContent

          class ExpectColumnAToEqualColumnBWithinTolerance(ColumnPairMapExpectation):
              """
              Expect values in column A to equal values in column B within a specified tolerance.
              
              Args:
                  column_A: The first column name
                  column_B: The second column name (can be expression)
                  tolerance: The allowed difference (default: 0.01)
                  or_equal: If True, allows equality (default: True)
              
              Example:
                  expectation = ExpectColumnAToEqualColumnBWithinTolerance(
                      column_A="total_amount",
                      column_B="quantity * unit_price",
                      tolerance=0.01,
                      mostly=0.99
                  )
              """
              
              library_metadata = {
                  "maturity": "experimental",
                  "tags": ["custom", "business-rule"],
                  "contributors": ["@data-quality-team"],
              }
              
              map_metric = "column_pair_values.equal_within_tolerance"
              success_keys = ("column_A", "column_B", "tolerance", "mostly")
              default_kwarg_values = {
                  "tolerance": 0.01,
                  "mostly": 1.0,
                  "result_format": "BASIC",
                  "include_config": True,
                  "catch_exceptions": False,
              }
              
              def validate_configuration(
                  self, configuration: Optional[ExpectationConfiguration] = None
              ) -> None:
                  super().validate_configuration(configuration)
                  tolerance = configuration.kwargs.get("tolerance")
                  if tolerance is not None and tolerance < 0:
                      raise ValueError("Tolerance must be non-negative")
              
              @classmethod
              def _prescriptive_renderer(
                  cls,
                  configuration: ExpectationConfiguration = None,
                  result: Dict = None,
                  runtime_configuration: Dict = None,
                  **kwargs,
              ):
                  column_A = configuration.kwargs.get("column_A")
                  column_B = configuration.kwargs.get("column_B")
                  tolerance = configuration.kwargs.get("tolerance", 0.01)
                  mostly = configuration.kwargs.get("mostly", 1.0)
                  
                  template_str = f"Values in \"{column_A}\" must equal \"{column_B}\" within ${tolerance} tolerance"
                  if mostly < 1.0:
                      template_str += f" at least {mostly * 100}% of the time"
                  
                  return [
                      RenderedStringTemplateContent(
                          **{
                              "content_block_type": "string_template",
                              "string_template": {
                                  "template": template_str,
                                  "params": configuration.kwargs,
                                  "styling": {"default": {"classes": ["badge", "badge-secondary"]}},
                              },
                          }
                      )
                  ]

          # Register the custom expectation
          from great_expectations.expectations.registry import register_expectation
          register_expectation(ExpectColumnAToEqualColumnBWithinTolerance)
          ```

          ## Metric Implementation

          ```python
          # custom_metrics/column_pair_values_equal_within_tolerance.py
          from great_expectations.execution_engine import (
              PandasExecutionEngine,
              SparkDFExecutionEngine,
              SqlAlchemyExecutionEngine,
          )
          from great_expectations.expectations.metrics.map_metric_provider import (
              MapMetricProvider,
              column_pair_condition_partial,
          )

          class ColumnPairValuesEqualWithinTolerance(MapMetricProvider):
              condition_metric_name = "column_pair_values.equal_within_tolerance"
              condition_value_keys = ("tolerance",)
              
              @column_pair_condition_partial(engine=PandasExecutionEngine)
              def _pandas(cls, column_A, column_B, tolerance, **kwargs):
                  return abs(column_A - column_B) <= tolerance
              
              @column_pair_condition_partial(engine=SparkDFExecutionEngine)
              def _spark(cls, column_A, column_B, tolerance, **kwargs):
                  return abs(column_A - column_B) <= tolerance
              
              @column_pair_condition_partial(engine=SqlAlchemyExecutionEngine)
              def _sqlalchemy(cls, column_A, column_B, tolerance, **kwargs):
                  return func.abs(column_A - column_B) <= tolerance
          ```

          ## Usage in Suite

          ```python
          from custom_expectations import ExpectColumnAToEqualColumnBWithinTolerance

          suite.add_expectation(
              ExpectColumnAToEqualColumnBWithinTolerance(
                  column_A="total_amount",
                  column_B="quantity * unit_price",
                  tolerance=0.01,
                  mostly=0.999,  # Allow 0.1% exceptions for rounding
                  meta={
                      "business_rule": "Total amount must equal quantity * unit_price within $0.01",
                      "severity": "critical",
                      "owner": "finance-team",
                      "rationale": "Prevents billing discrepancies and revenue leakage"
                  }
              )
          )
          ```

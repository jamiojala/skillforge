          ## Custom OpenLineage Extractor

          ```python
          # extractors/snowflake_extractor.py
          from airflow.providers.openlineage.extractors import BaseExtractor
          from openlineage.client.run import Dataset
          from typing import List, Optional

          class SnowflakeOperatorExtractor(BaseExtractor):
              """Extract lineage from SnowflakeOperator."""
              
              @classmethod
              def get_operator_classnames(cls) -> List[str]:
                  return ["SnowflakeOperator"]
              
              def extract(self) -> Optional:
                  """Extract lineage from operator."""
                  sql = self.operator.sql
                  
                  # Parse SQL to extract input/output datasets
                  inputs = self._extract_inputs(sql)
                  outputs = self._extract_outputs(sql)
                  
                  return {
                      "inputs": inputs,
                      "outputs": outputs
                  }
              
              def _extract_inputs(self, sql: str) -> List[Dataset]:
                  """Extract input datasets from SQL."""
                  # Simple regex-based extraction
                  import re
                  
                  inputs = []
                  # Match FROM and JOIN clauses
                  from_pattern = r'(?:FROM|JOIN)\s+([\w\.]+)'
                  matches = re.findall(from_pattern, sql, re.IGNORECASE)
                  
                  for match in set(matches):
                      parts = match.split('.')
                      if len(parts) == 2:
                          inputs.append(Dataset(
                              namespace=f"snowflake://{self.operator.snowflake_conn_id}",
                              name=match
                          ))
                  
                  return inputs
              
              def _extract_outputs(self, sql: str) -> List[Dataset]:
                  """Extract output datasets from SQL."""
                  import re
                  
                  outputs = []
                  # Match INSERT INTO and CREATE TABLE
                  output_pattern = r'(?:INSERT\s+INTO|CREATE\s+TABLE)\s+([\w\.]+)'
                  matches = re.findall(output_pattern, sql, re.IGNORECASE)
                  
                  for match in set(matches):
                      outputs.append(Dataset(
                          namespace=f"snowflake://{self.operator.snowflake_conn_id}",
                          name=match
                      ))
                  
                  return outputs
          ```


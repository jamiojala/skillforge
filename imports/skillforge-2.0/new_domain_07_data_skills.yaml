      - name: "Metric Governance Framework"
        user: |
          How do we implement governance for our metrics layer to ensure consistency?
        ai_response: |
          I'll implement a comprehensive metric governance framework with approval workflows and versioning.

          ```yaml
          # governance/metric_governance.yml
          governance:
            # Metric ownership
            ownership:
              required: true
              fields:
                - owner_team
                - owner_contact
                - review_date
            
            # Metric approval workflow
            approval:
              stages:
                - name: draft
                  approvers: []
                - name: review
                  approvers: ["data-team"]
                - name: approved
                  approvers: ["data-team", "business-stakeholders"]
                - name: deprecated
                  approvers: ["data-team"]
            
            # Metric standards
            standards:
              required_fields:
                - description
                - business_definition
                - calculation_logic
                - dimensions
                - time_grains
                - owner
              
              naming_conventions:
                pattern: "^[a-z][a-z0-9_]*$"
                examples:
                  - revenue
                  - orders
                  - average_order_value
              
              documentation:
                min_description_length: 50
                require_business_context: true
          
            # Metric versioning
            versioning:
              strategy: semantic
              breaking_changes:
                - calculation_logic_change
                - dimension_removal
                - grain_change
              
            # Metric monitoring
            monitoring:
              freshness_check: true
              anomaly_detection: true
              drift_threshold: 0.1
          ```

          ```python
          # governance/metric_validator.py
          import yaml
          import re
          from typing import Dict, List, Tuple

          class MetricGovernanceValidator:
              """Validate metrics against governance standards."""
              
              def __init__(self, governance_config: str):
                  with open(governance_config) as f:
                      self.config = yaml.safe_load(f)
              
              def validate_metric(self, metric: Dict) -> Tuple[bool, List[str]]:
                  """Validate a metric definition."""
                  errors = []
                  standards = self.config["governance"]["standards"]
                  
                  # Check required fields
                  for field in standards["required_fields"]:
                      if field not in metric or not metric[field]:
                          errors.append(f"Missing required field: {field}")
                  
                  # Check naming convention
                  name_pattern = standards["naming_conventions"]["pattern"]
                  if not re.match(name_pattern, metric.get("name", "")):
                      errors.append(
                          f"Metric name '{metric.get('name')}' doesn't match pattern: {name_pattern}"
                      )
                  
                  # Check description length
                  min_length = standards["documentation"]["min_description_length"]
                  if len(metric.get("description", "")) < min_length:
                      errors.append(
                          f"Description must be at least {min_length} characters"
                      )
                  
                  # Check ownership
                  if self.config["governance"]["ownership"]["required"]:
                      if "owner" not in metric:
                          errors.append("Metric must have an owner")
                  
                  return len(errors) == 0, errors
              
              def validate_all_metrics(self, metrics_file: str) -> Dict:
                  """Validate all metrics in a file."""
                  with open(metrics_file) as f:
                      metrics = yaml.safe_load(f)
                  
                  results = {
                      "valid": [],
                      "invalid": []
                  }
                  
                  for metric in metrics.get("metrics", []):
                      is_valid, errors = self.validate_metric(metric)
                      
                      if is_valid:
                          results["valid"].append(metric["name"])
                      else:
                          results["invalid"].append({
                              "name": metric["name"],
                              "errors": errors
                          })
                  
                  return results
          ```
        notes: "Metric governance framework with validation, approval workflows, and standards"
    

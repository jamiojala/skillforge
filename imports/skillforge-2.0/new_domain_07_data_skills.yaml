          ## Lineage Graph Model

          ```python
          # lineage_graph.py
          from py2neo import Graph, Node, Relationship
          from dataclasses import asdict

          class LineageGraph:
              """Store and query lineage in Neo4j."""
              
              def __init__(self, uri: str, user: str, password: str):
                  self.graph = Graph(uri, auth=(user, password))
                  self._create_constraints()
              
              def _create_constraints(self):
                  """Create uniqueness constraints."""
                  constraints = [
                      "CREATE CONSTRAINT table_name IF NOT EXISTS FOR (t:Table) REQUIRE t.full_name IS UNIQUE",
                      "CREATE CONSTRAINT column_name IF NOT EXISTS FOR (c:Column) REQUIRE c.full_name IS UNIQUE"
                  ]
                  for constraint in constraints:
                      try:
                          self.graph.run(constraint)
                      except:
                          pass
              
              def add_lineage(self, lineage: List[ColumnLineage], target_table: str):
                  """Add lineage to graph."""
                  for col in lineage:
                      # Create target column node
                      target_col_name = f"{target_table}.{col.target_column}"
                      target_node = Node("Column", 
                          name=col.target_column,
                          table=target_table,
                          full_name=target_col_name,
                          transformation=col.transformation
                      )
                      self.graph.merge(target_node, "Column", "full_name")
                      
                      # Create source column nodes and relationships
                      for source_col in col.source_columns:
                          source_table = self._infer_table(source_col, col.source_tables)
                          source_col_name = f"{source_table}.{source_col.split('.')[-1]}"
                          
                          source_node = Node("Column",
                              name=source_col.split('.')[-1],
                              table=source_table,
                              full_name=source_col_name
                          )
                          self.graph.merge(source_node, "Column", "full_name")
                          
                          # Create DERIVED_FROM relationship
                          rel = Relationship(target_node, "DERIVED_FROM", source_node,
                              transformation=col.transformation
                          )
                          self.graph.create(rel)
              
              def _infer_table(self, column_ref: str, source_tables: Set[str]) -> str:
                  """Infer table from column reference."""
                  if '.' in column_ref:
                      return column_ref.split('.')[0]
                  # Default to first source table
                  return list(source_tables)[0] if source_tables else "unknown"
              
              def get_upstream(self, column_name: str, depth: int = 5) -> List[Dict]:
                  """Get upstream lineage for a column."""
                  query = """
                  MATCH path = (target:Column {full_name: $column_name})<-[:DERIVED_FROM*1..%d]-(source:Column)
                  RETURN source.full_name AS source, 
                         target.full_name AS target,
                         length(path) AS distance,
                         [rel in relationships(path) | rel.transformation] AS transformations
                  ORDER BY distance
                  """ % depth
                  
                  return list(self.graph.run(query, column_name=column_name))
              
              def get_downstream(self, column_name: str, depth: int = 5) -> List[Dict]:
                  """Get downstream lineage for a column."""
                  query = """
                  MATCH path = (source:Column {full_name: $column_name})-[:DERIVED_FROM*1..%d]->(target:Column)
                  RETURN source.full_name AS source,
                         target.full_name AS target,
                         length(path) AS distance
                  ORDER BY distance
                  """ % depth
                  
                  return list(self.graph.run(query, column_name=column_name))
              
              def get_impact(self, table_name: str) -> Dict:
                  """Get impact analysis for a table change."""
                  query = """
                  MATCH (t:Table {name: $table_name})<-[:BELONGS_TO]-(c:Column)
                  MATCH (c)-[:DERIVED_FROM*]->(downstream:Column)
                  RETURN c.name AS source_column,
                         collect(DISTINCT downstream.table) AS impacted_tables,
                         count(DISTINCT downstream) AS impacted_columns
                  """
                  
                  return list(self.graph.run(query, table_name=table_name))
          ```


          ```python
          # validation/feature_validator.py
          from great_expectations.core import ExpectationSuite
          from great_expectations.expectations import (
              ExpectColumnValuesToNotBeNull,
              ExpectColumnValuesToBeBetween,
              ExpectColumnValuesToBeOfType,
              ExpectColumnMeanToBeBetween,
          )
          import pandas as pd
          from typing import Dict, List

          class FeatureValidator:
              """Validate features before deployment."""
              
              def __init__(self):
                  self.validations = {}
              
              def create_feature_suite(self, feature_view: str, 
                                       schema: Dict[str, str]) -> ExpectationSuite:
                  """Create validation suite for a feature view."""
                  suite = ExpectationSuite(
                      expectation_suite_name=f"{feature_view}_validation"
                  )
                  
                  for feature_name, feature_type in schema.items():
                      # All features should have values
                      suite.add_expectation(
                          ExpectColumnValuesToNotBeNull(column=feature_name)
                      )
                      
                      # Type validation
                      if feature_type == "Float32":
                          suite.add_expectation(
                              ExpectColumnValuesToBeOfType(
                                  column=feature_name,
                                  type_="float64"
                              )
                          )
                      elif feature_type == "Int64":
                          suite.add_expectation(
                              ExpectColumnValuesToBeOfType(
                                  column=feature_name,
                                  type_="int64"
                              )
                          )
                  
                  return suite
              
              def validate_training_serving_skew(
                  self,
                  training_df: pd.DataFrame,
                  serving_features: Dict,
                  tolerance: float = 0.01
              ) -> Dict:
                  """Validate training-serving consistency."""
                  results = {
                      "passed": True,
                      "feature_checks": []
                  }
                  
                  for feature_name in training_df.columns:
                      if feature_name in ["user_id", "event_timestamp"]:
                          continue
                      
                      training_mean = training_df[feature_name].mean()
                      
                      # Get serving values for the same users
                      serving_values = [
                          serving_features.get(feature_name, [None])[0]
                      ]
                      serving_mean = np.mean([v for v in serving_values if v is not None])
                      
                      if training_mean != 0:
                          relative_diff = abs(training_mean - serving_mean) / training_mean
                      else:
                          relative_diff = abs(training_mean - serving_mean)
                      
                      check_passed = relative_diff <= tolerance
                      
                      results["feature_checks"].append({
                          "feature": feature_name,
                          "training_mean": training_mean,
                          "serving_mean": serving_mean,
                          "relative_diff": relative_diff,
                          "passed": check_passed
                      })
                      
                      if not check_passed:
                          results["passed"] = False
                  
                  return results

          # CI/CD validation
          def validate_before_deploy():
              """Validate features in CI/CD pipeline."""
              validator = FeatureValidator()
              
              # Validate feature definitions
              feature_views = ["user_demographics", "user_purchase_stats"]
              
              for fv in feature_views:
                  # Run validation
                  suite = validator.create_feature_suite(fv, schema={
                      "age": "Int64",
                      "total_orders": "Int64",
                      "total_revenue": "Float32"
                  })
                  
                  # Check for training-serving skew
                  skew_results = validator.validate_training_serving_skew(
                      training_df=load_training_data(),
                      serving_features=load_serving_features(),
                      tolerance=0.01
                  )
                  
                  if not skew_results["passed"]:
                      raise ValueError(f"Training-serving skew detected: {skew_results}")
              
              print("All validations passed!")
          ```

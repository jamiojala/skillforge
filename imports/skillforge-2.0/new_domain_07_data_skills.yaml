    examples:
      - name: "ksqlDB Windowed Aggregation"
        user: |
          I need to calculate hourly page view counts from a clickstream topic.
          The topic has: user_id, page_url, timestamp, session_id
        ai_response: |
          I'll create a ksqlDB pipeline for hourly page view aggregations with proper event-time semantics.

          ## Stream Processing Design

          **Source**: clickstream topic  
          **Processing**: Hourly aggregation by page  
          **Output**: page_views_hourly topic  
          **Semantics**: Event-time with 5-minute allowed lateness

          ## Time Semantics

          ```sql
          -- Create stream with event-time extraction
          CREATE STREAM clickstream (
              user_id VARCHAR,
              page_url VARCHAR,
              session_id VARCHAR,
              event_time BIGINT  -- Unix timestamp in milliseconds
          ) WITH (
              KAFKA_TOPIC = 'clickstream',
              VALUE_FORMAT = 'AVRO',
              TIMESTAMP = 'event_time',  -- Use event time
              TIMESTAMP_FORMAT = 'unix_timestamp',
              PARTITIONS = 12
          );
          ```

          ## Windowed Aggregation

          ```sql
          -- Hourly page view counts with event-time windowing
          CREATE TABLE page_views_hourly AS
          SELECT
              page_url,
              COUNT(*) AS view_count,
              COUNT_DISTINCT(user_id) AS unique_users,
              COUNT_DISTINCT(session_id) AS unique_sessions,
              WINDOWSTART AS window_start,
              WINDOWEND AS window_end
          FROM clickstream
          WINDOW TUMBLING (
              SIZE 1 HOUR,
              GRACE PERIOD 5 MINUTES  -- Allow late data up to 5 min
          )
          GROUP BY page_url
          EMIT FINAL;  -- Emit only when window is complete
          ```

          ## Enhanced with Hopping Window

          ```sql
          -- 5-minute rolling average (hopping window)
          CREATE TABLE page_views_rolling_avg AS
          SELECT
              page_url,
              AVG(view_count) AS avg_views_5min,
              SUM(view_count) AS total_views_5min
          FROM page_views_hourly
          WINDOW HOPPING (
              SIZE 1 HOUR,
              ADVANCE BY 5 MINUTES,
              GRACE PERIOD 5 MINUTES
          )
          GROUP BY page_url;
          ```

          ## Session Window for User Activity

          ```sql
          -- Track user sessions with 30-minute inactivity gap
          CREATE TABLE user_sessions AS
          SELECT
              user_id,
              COUNT(*) AS event_count,
              COLLECT_LIST(page_url) AS pages_visited,
              WINDOWSTART AS session_start,
              WINDOWEND AS session_end,
              (WINDOWEND - WINDOWSTART) / 1000 / 60 AS session_duration_minutes
          FROM clickstream
          WINDOW SESSION (30 MINUTES)
          GROUP BY user_id
          EMIT FINAL;
          ```

          ## State Management

          ```sql
          -- Set retention for state cleanup
          SET 'ksql.streams.state.dir' = '/var/lib/kafka-streams';
          SET 'ksql.streams.retention.ms' = '86400000';  -- 24 hours
          SET 'ksql.streams.windowstore.changelog.additional.retention.ms' = '3600000';
          ```

          ## Query for Monitoring

          ```sql
          -- Check processing lag
          SELECT 
              query_id,
              kafka_topic,
              consumer_group,
              SUM(lag) AS total_lag
          FROM KSQL_PROCESSING_LOG
          GROUP BY query_id, kafka_topic, consumer_group;
          ```
        notes: "Complete ksqlDB example with tumbling, hopping, and session windows with proper event-time semantics"
      
      - name: "Flink SQL Stream-Table Join"
        user: |
          I need to enrich order events with customer information using a stream-table join.
          Orders stream: order_id, customer_id, amount, order_time
          Customers table: customer_id, name, tier, country
        ai_response: |
          I'll implement a stream-table join in Flink SQL with proper temporal semantics.

          ## Stream Processing Design

          **Stream**: orders (append-only events)  
          **Table**: customers (mutable dimension)  
          **Join Type**: Temporal join (FOR SYSTEM_TIME AS OF)  
          **Output**: Enriched orders with customer details

          ## Source Definitions

          ```sql
          -- Orders stream with event-time
          CREATE TABLE orders (
              order_id STRING,
              customer_id STRING,
              amount DECIMAL(10, 2),
              order_time TIMESTAMP(3),
              WATERMARK FOR order_time AS order_time - INTERVAL '5' SECOND
          ) WITH (
              'connector' = 'kafka',
              'topic' = 'orders',
              'properties.bootstrap.servers' = 'kafka:9092',
              'properties.group.id' = 'flink-orders-consumer',
              'format' = 'json',
              'scan.startup.mode' = 'latest-offset'
          );

          -- Customers dimension table (changelog from CDC)
          CREATE TABLE customers (
              customer_id STRING,
              name STRING,
              tier STRING,
              country STRING,
              update_time TIMESTAMP(3),
              PRIMARY KEY (customer_id) NOT ENFORCED,
              WATERMARK FOR update_time AS update_time - INTERVAL '1' SECOND
          ) WITH (
              'connector' = 'upsert-kafka',
              'topic' = 'customers',
              'properties.bootstrap.servers' = 'kafka:9092',
              'key.format' = 'json',
              'value.format' = 'json'
          );
          ```

          ## Temporal Stream-Table Join

          ```sql
          -- Enrich orders with customer info at order time
          CREATE TABLE enriched_orders AS
          SELECT
              o.order_id,
              o.customer_id,
              o.amount,
              o.order_time,
              c.name AS customer_name,
              c.tier AS customer_tier,
              c.country AS customer_country,
              CASE 
                  WHEN c.tier = 'GOLD' THEN o.amount * 0.10
                  WHEN c.tier = 'SILVER' THEN o.amount * 0.05
                  ELSE 0
              END AS loyalty_discount
          FROM orders o
          LEFT JOIN customers FOR SYSTEM_TIME AS OF o.order_time c
              ON o.customer_id = c.customer_id;
          ```

          ## Stream-Stream Join (Order-OrderItem)

          ```sql
          -- Order items stream
          CREATE TABLE order_items (
              order_id STRING,
              item_id STRING,
              product_id STRING,
              quantity INT,
              unit_price DECIMAL(10, 2),
              item_time TIMESTAMP(3),
              WATERMARK FOR item_time AS item_time - INTERVAL '5' SECOND
          ) WITH (
              'connector' = 'kafka',
              'topic' = 'order-items',
              'properties.bootstrap.servers' = 'kafka:9092',
              'format' = 'json'
          );

          -- Join orders with items within 1-hour interval
          CREATE TABLE order_details AS
          SELECT
              o.order_id,
              o.customer_id,
              o.amount AS order_total,
              o.order_time,
              i.item_id,
              i.product_id,
              i.quantity,
              i.unit_price,
              i.quantity * i.unit_price AS item_total
          FROM orders o
          JOIN order_items i
              ON o.order_id = i.order_id
              AND i.item_time BETWEEN o.order_time - INTERVAL '1' HOUR 
                                  AND o.order_time + INTERVAL '1' HOUR;
          ```

          ## Windowed Aggregation with Join

          ```sql
          -- Hourly revenue by customer tier
          CREATE TABLE hourly_revenue_by_tier AS
          SELECT
              TUMBLE_START(eo.order_time, INTERVAL '1' HOUR) AS hour_start,
              TUMBLE_END(eo.order_time, INTERVAL '1' HOUR) AS hour_end,
              eo.customer_tier,
              COUNT(DISTINCT eo.order_id) AS order_count,
              COUNT(DISTINCT eo.customer_id) AS customer_count,
              SUM(eo.amount) AS total_revenue,
              SUM(eo.loyalty_discount) AS total_discounts,
              AVG(eo.amount) AS avg_order_value
          FROM enriched_orders eo
          WHERE eo.customer_tier IS NOT NULL
          GROUP BY 
              TUMBLE(eo.order_time, INTERVAL '1' HOUR),
              eo.customer_tier;
          ```

          ## State Configuration

          ```sql
          -- Configure state backend and retention
          SET 'state.backend' = 'rocksdb';
          SET 'state.backend.incremental' = 'true';
          SET 'state.checkpoint-storage' = 'filesystem';
          SET 'state.checkpoints.dir' = 's3://flink-checkpoints/orders';
          SET 'state.retention.min' = '24h';
          SET 'state.retention.max' = '48h';
          ```

          ## Late Data Handling

          ```sql
          -- Side output for late orders
          CREATE TABLE late_orders (
              order_id STRING,
              customer_id STRING,
              amount DECIMAL(10, 2),
              order_time TIMESTAMP(3),
              processing_time TIMESTAMP(3),
              delay_ms BIGINT
          ) WITH (
              'connector' = 'kafka',
              'topic' = 'late-orders',
              'properties.bootstrap.servers' = 'kafka:9092',
              'format' = 'json'
          );

          -- In application code, route late data to side output
          -- when order_time < watermark
          ```
        notes: "Complete Flink SQL example with temporal joins, stream-stream joins, and windowed aggregations"
    

          user_batch_source = SnowflakeSource(
              database="ANALYTICS",
              schema="FEATURES",
              table="user_features",
              timestamp_field="event_timestamp",
              created_timestamp_column="created_timestamp"
          )

          # Stream data source for real-time features
          user_stream_source = KafkaSource(
              name="user_events_stream",
              kafka_bootstrap_servers="kafka:9092",
              topic="user-events",
              timestamp_field="event_timestamp",
              batch_source=user_batch_source,
              message_format=ParquetFormat()
          )

          # features/user_features.py
          from feast import FeatureView, Feature, Field

          ## BI Tool Integration

          ```python
          # integration/metric_api.py
          from dbt_semantic_interfaces.references import MetricReference
          from dbt_semantic_interfaces.transformations import SemanticManifestTransformer
          from metricflow.engine.metricflow_engine import MetricFlowEngine
          from metricflow.model.semantic_manifest_lookup import SemanticManifestLookup
          import pandas as pd

          class MetricsAPI:
              """API for querying metrics."""
              
              def __init__(self, manifest_path: str):
                  self.engine = MetricFlowEngine.from_yaml_config(manifest_path)
              
              def query_metric(
                  self,
                  metric_name: str,
                  group_by: list = None,
                  where: str = None,
                  time_grain: str = "day",
                  start_time: str = None,
                  end_time: str = None
              ) -> pd.DataFrame:
                  """Query a metric with dimensions and filters."""
                  result = self.engine.query(
                      metric_names=[metric_name],
                      group_by_names=group_by or [],
                      where_constraint=where,
                      time_constraint_start=start_time,
                      time_constraint_end=end_time,
                  )
                  return result.to_pandas()
              
              def get_metric_metadata(self, metric_name: str) -> dict:
                  """Get metric definition and metadata."""
                  return self.engine.get_metric(metric_name)
              
              def list_metrics(self) -> list:
                  """List all available metrics."""
                  return self.engine.list_metrics()

          # FastAPI endpoint
          from fastapi import FastAPI, Query
          from typing import List, Optional

          app = FastAPI()
          metrics_api = MetricsAPI("semantic_manifest.json")

          @app.get("/metrics")
          def list_metrics():
              """List all available metrics."""
              return {"metrics": metrics_api.list_metrics()}

          @app.get("/metrics/{metric_name}")
          def query_metric(
              metric_name: str,
              group_by: Optional[List[str]] = Query(None),
              where: Optional[str] = None,
              time_grain: str = "day",
              start_date: Optional[str] = None,
              end_date: Optional[str] = None
          ):
              """Query a metric."""
              df = metrics_api.query_metric(
                  metric_name=metric_name,
                  group_by=group_by,
                  where=where,
                  time_grain=time_grain,
                  start_time=start_date,
                  end_time=end_date
              )
              return df.to_dict(orient="records")

          @app.get("/metrics/{metric_name}/metadata")
          def get_metric_metadata(metric_name: str):
              """Get metric metadata."""
              return metrics_api.get_metric_metadata(metric_name)
          ```


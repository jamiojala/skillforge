          ## Implementation

          ```python
          # k_anonymity.py
          from typing import List, Dict, Set, Tuple
          from collections import defaultdict
          import pandas as pd

          class GeneralizationHierarchy:
              """Define generalization hierarchies for quasi-identifiers."""
              
              def __init__(self):
                  self.hierarchies = {}
              
              def add_hierarchy(self, column: str, levels: List[Dict]):
                  """Add generalization hierarchy for a column.
                  
                  Args:
                      column: Column name
                      levels: List of generalization levels, each a dict mapping
                             values to their generalized form at that level
                  """
                  self.hierarchies[column] = levels
              
              def generalize(self, value, column: str, level: int):
                  """Generalize a value to the specified level."""
                  if column not in self.hierarchies:
                      return value
                  
                  hierarchy = self.hierarchies[column]
                  if level >= len(hierarchy):
                      return "*"
                  
                  return hierarchy[level].get(value, "*")

          class KAnonymityEnforcer:
              """Enforce k-anonymity on datasets."""
              
              def __init__(self, k: int = 5, hierarchies: GeneralizationHierarchy = None):
                  self.k = k
                  self.hierarchies = hierarchies or GeneralizationHierarchy()
                  self.generalization_levels = {}
              
              def _get_equivalence_classes(self, df: pd.DataFrame, 
                                           quasi_identifiers: List[str]) -> Dict[Tuple, List[int]]:
                  """Group records by quasi-identifier values."""
                  classes = defaultdict(list)
                  
                  for idx, row in df.iterrows():
                      key = tuple(row[qi] for qi in quasi_identifiers)
                      classes[key].append(idx)
                  
                  return classes
              
              def _count_violations(self, equivalence_classes: Dict[Tuple, List[int]]) -> int:
                  """Count equivalence classes with fewer than k records."""
                  return sum(1 for indices in equivalence_classes.values() if len(indices) < self.k)
              
              def _generalize_column(self, df: pd.DataFrame, column: str, level: int) -> pd.DataFrame:
                  """Generalize a column to the specified level."""
                  df_copy = df.copy()
                  df_copy[column] = df_copy[column].apply(
                      lambda x: self.hierarchies.generalize(x, column, level)
                  )
                  return df_copy
              
              def anonymize(self, df: pd.DataFrame, quasi_identifiers: List[str],
                           max_iterations: int = 100) -> Tuple[pd.DataFrame, Dict]:
                  """Anonymize dataset to achieve k-anonymity.
                  
                  Args:
                      df: Input dataframe
                      quasi_identifiers: Columns that can be used for re-identification
                      max_iterations: Maximum generalization iterations
                  
                  Returns:
                      Anonymized dataframe and anonymization report
                  """
                  current_df = df.copy()
                  current_levels = {qi: 0 for qi in quasi_identifiers}
                  iteration = 0
                  
                  report = {
                      "k": self.k,
                      "initial_records": len(df),
                      "quasi_identifiers": quasi_identifiers,
                      "iterations": 0,
                      "final_violations": 0,
                      "generalization_levels": {}
                  }
                  
                  while iteration < max_iterations:
                      equivalence_classes = self._get_equivalence_classes(
                          current_df, quasi_identifiers
                      )
                      violations = self._count_violations(equivalence_classes)
                      
                      if violations == 0:
                          # k-anonymity achieved
                          report["iterations"] = iteration
                          report["final_violations"] = 0
                          report["generalization_levels"] = current_levels
                          return current_df, report
                      
                      # Find the column to generalize
                      # Strategy: generalize the column with most unique values
                      unique_counts = {
                          qi: current_df[qi].nunique() 
                          for qi in quasi_identifiers
                      }
                      column_to_generalize = max(unique_counts, key=unique_counts.get)
                      
                      # Check if we can generalize further
                      if current_levels[column_to_generalize] >= len(
                          self.hierarchies.hierarchies.get(column_to_generalize, [])
                      ):
                          # Can't generalize more, suppress remaining violations
                          current_df = self._suppress_violations(
                              current_df, equivalence_classes, quasi_identifiers
                          )
                          break
                      
                      # Generalize the column
                      current_levels[column_to_generalize] += 1
                      current_df = self._generalize_column(
                          current_df, 
                          column_to_generalize, 
                          current_levels[column_to_generalize]
          )
                      
                      iteration += 1
                  
                  report["iterations"] = iteration
                  report["final_violations"] = violations
                  report["generalization_levels"] = current_levels
                  
                  return current_df, report
              
              def _suppress_violations(self, df: pd.DataFrame,
                                       equivalence_classes: Dict[Tuple, List[int]],
                                       quasi_identifiers: List[str]) -> pd.DataFrame:
                  """Suppress records in violating equivalence classes."""
                  df_copy = df.copy()
                  
                  for key, indices in equivalence_classes.items():
                      if len(indices) < self.k:
                          # Suppress quasi-identifiers for these records
                          for qi in quasi_identifiers:
                              df_copy.loc[indices, qi] = "*"
                  
                  return df_copy

          class LDiversityEnforcer:
              """Enforce l-diversity for sensitive attributes."""
              
              def __init__(self, l: int = 2):
                  self.l = l
              
              def check_l_diversity(self, df: pd.DataFrame, quasi_identifiers: List[str],
                                   sensitive_attribute: str) -> Dict:
                  """Check l-diversity for sensitive attribute."""
                  equivalence_classes = defaultdict(list)
                  
                  for idx, row in df.iterrows():
                      key = tuple(row[qi] for qi in quasi_identifiers)
                      equivalence_classes[key].append(row[sensitive_attribute])
                  
                  violations = []
                  for key, values in equivalence_classes.items():
                      unique_values = len(set(values))
                      if unique_values < self.l:
                          violations.append({
                              "equivalence_class": key,
                              "unique_values": unique_values,
                              "required": self.l,
                              "records": len(values)
                          })
                  
                  return {
                      "l": self.l,
                      "total_classes": len(equivalence_classes),
                      "violations": len(violations),
                      "violation_details": violations
                  }

          # Usage example
          if __name__ == "__main__":
              # Sample customer data
              data = {
                  "name": ["Alice", "Bob", "Charlie", "Diana", "Eve"],
                  "age": [25, 30, 35, 28, 32],
                  "zipcode": ["12345", "12346", "12347", "12345", "12346"],
                  "disease": ["Flu", "Cold", "Flu", "Cold", "Flu"]
              }
              df = pd.DataFrame(data)
              
              # Set up generalization hierarchies
              hierarchies = GeneralizationHierarchy()
              
              # Age hierarchy: exact -> decade -> *
              hierarchies.add_hierarchy("age", [
                  {},  # Level 0: exact values
                  {25: "20-29", 30: "30-39", 35: "30-39", 28: "20-29", 32: "30-39"},
                  {**{k: "*" for k in [25, 30, 35, 28, 32]}}
              ])
              
              # Zipcode hierarchy: exact -> first 3 digits -> *
              hierarchies.add_hierarchy("zipcode", [
                  {},
                  {"12345": "123**", "12346": "123**", "12347": "123**"},
                  {"12345": "*", "12346": "*", "12347": "*"}
              ])
              
              # Apply k-anonymity
              enforcer = KAnonymityEnforcer(k=2, hierarchies=hierarchies)
              anonymized_df, report = enforcer.anonymize(
                  df, 
                  quasi_identifiers=["age", "zipcode"]
              )
              
              print("Anonymization Report:")
              print(json.dumps(report, indent=2))
              print("\nAnonymized Data:")
              print(anonymized_df)
              
              # Check l-diversity
              diversity_enforcer = LDiversityEnforcer(l=2)
              diversity_report = diversity_enforcer.check_l_diversity(
                  anonymized_df,
                  quasi_identifiers=["age", "zipcode"],
                  sensitive_attribute="disease"
              )
              print("\nL-Diversity Report:")
              print(json.dumps(diversity_report, indent=2))
          ```

          ## Privacy Guarantees

          | Property | Guarantee | Verification |
          |----------|-----------|------------|
          | k-anonymity | k >= 5 | Equivalence class size |
          | l-diversity | l >= 2 | Distinct sensitive values |
          | Generalization | Minimal | Iterative refinement |

          ## Compliance Mapping

          | Regulation | Requirement | Implementation |
          |------------|-------------|----------------|
          | GDPR | Pseudonymization | Generalization |
          | CCPA | De-identification | k-anonymity |
          | HIPAA | Safe Harbor | Suppression + generalization |
        notes: "Complete k-anonymity and l-diversity implementation with generalization hierarchies"
    

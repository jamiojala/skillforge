        ai_response: |
          I'll implement a comprehensive data observability framework with the 5 pillars of data observability.

          ## Observability Strategy

          **Pillars**: Freshness, Volume, Schema, Distribution, Lineage  
          **Detection**: Statistical anomaly detection with seasonality  
          **Alerting**: Tiered (warning/critical) with escalation  
          **Response**: Automated runbooks

          ## Core Observability Framework

          ```python
          # observability/core.py
          from dataclasses import dataclass
          from datetime import datetime, timedelta
          from typing import Dict, List, Optional, Callable
          import pandas as pd
          import numpy as np
          from scipy import stats

          @dataclass
          class DataQualityCheck:
              name: str
              check_type: str
              table: str
              column: Optional[str]
              threshold: float
              severity: str  # warning, critical

          @dataclass
          class AnomalyResult:
              check_name: str
              is_anomaly: bool
              severity: str
              current_value: float
              expected_range: tuple
              z_score: float
              timestamp: datetime
              details: Dict

          class DataObservabilityFramework:
              """Comprehensive data observability framework."""
              
              def __init__(self, db_connection):
                  self.db = db_connection
                  self.baselines = {}
                  self.checks = []
              
              def add_check(self, check: DataQualityCheck):
                  """Add a data quality check."""
                  self.checks.append(check)
              
              def compute_baseline(self, table: str, column: str, 
                                  metric: str, days: int = 30) -> Dict:
                  """Compute statistical baseline for a metric."""
                  query = f"""
                  SELECT 
                      DATE(created_at) as date,
                      {metric}({column}) as value
                  FROM {table}
                  WHERE created_at >= CURRENT_DATE - INTERVAL '{days} days'
                  GROUP BY 1
                  ORDER BY 1
                  """
                  
                  df = pd.read_sql(query, self.db)
                  
                  baseline = {
                      "mean": df["value"].mean(),
                      "std": df["value"].std(),
                      "median": df["value"].median(),
                      "p5": df["value"].quantile(0.05),
                      "p95": df["value"].quantile(0.95),
                      "trend": self._compute_trend(df["value"]),
                      "seasonality": self._detect_seasonality(df)
                  }
                  
                  self.baselines[f"{table}.{column}.{metric}"] = baseline
                  return baseline
              
              def _compute_trend(self, values: pd.Series) -> float:
                  """Compute trend using linear regression."""
                  x = np.arange(len(values))
                  slope, _, _, _, _ = stats.linregress(x, values)
                  return slope
              
              def _detect_seasonality(self, df: pd.DataFrame) -> Optional[int]:
                  """Detect seasonality pattern (e.g., weekly)."""
                  if len(df) < 14:
                      return None
                  
                  # Check for weekly pattern
                  df["day_of_week"] = pd.to_datetime(df["date"]).dt.dayofweek
                  daily_avg = df.groupby("day_of_week")["value"].mean()
                  
                  # If significant variation by day, likely weekly seasonality
                  cv = daily_avg.std() / daily_avg.mean()
                  return 7 if cv > 0.1 else None
              
              def detect_anomaly(self, table: str, column: str,
                                metric: str, current_value: float) -> AnomalyResult:
                  """Detect if current value is anomalous."""
                  baseline_key = f"{table}.{column}.{metric}"
                  
                  if baseline_key not in self.baselines:
                      self.compute_baseline(table, column, metric)
                  
                  baseline = self.baselines[baseline_key]
                  
                  # Compute Z-score
                  if baseline["std"] > 0:
                      z_score = (current_value - baseline["mean"]) / baseline["std"]
                  else:
                      z_score = 0
                  
                  # Determine if anomaly based on Z-score
                  is_anomaly = abs(z_score) > 3  # 3 sigma rule
                  
                  # Determine severity
                  if abs(z_score) > 4:
                      severity = "critical"
                  elif abs(z_score) > 3:
                      severity = "warning"
                  else:
                      severity = "normal"
                  
                  expected_range = (
                      baseline["mean"] - 3 * baseline["std"],
                      baseline["mean"] + 3 * baseline["std"]
                  )
                  
                  return AnomalyResult(
                      check_name=f"{table}.{column}.{metric}",
                      is_anomaly=is_anomaly,
                      severity=severity,
                      current_value=current_value,
                      expected_range=expected_range,
                      z_score=z_score,
                      timestamp=datetime.now(),
                      details={"baseline": baseline}
                  )

          # monitoring/freshness_monitor.py
          class FreshnessMonitor:
              """Monitor data freshness."""
              
              def __init__(self, db_connection):
                  self.db = db_connection
                  self.framework = DataObservabilityFramework(db_connection)
              
              def check_freshness(self, table: str, timestamp_column: str,
                                 max_delay_minutes: int = 60) -> AnomalyResult:
                  """Check if data is fresh."""
                  query = f"""
                  SELECT 
                      MAX({timestamp_column}) as last_update,
                      EXTRACT(EPOCH FROM (CURRENT_TIMESTAMP - MAX({timestamp_column}))) / 60 as delay_minutes
                  FROM {table}
                  """
                  
                  result = pd.read_sql(query, self.db)
                  delay_minutes = result["delay_minutes"].iloc[0]
                  
                  is_anomaly = delay_minutes > max_delay_minutes
                  
                  severity = "critical" if delay_minutes > max_delay_minutes * 2 else "warning" if is_anomaly else "normal"
                  
                  return AnomalyResult(
                      check_name=f"{table}.freshness",
                      is_anomaly=is_anomaly,
                      severity=severity,
                      current_value=delay_minutes,
                      expected_range=(0, max_delay_minutes),
                      z_score=0,
                      timestamp=datetime.now(),
                      details={"last_update": result["last_update"].iloc[0]}
                  )

          # monitoring/volume_monitor.py
          class VolumeMonitor:
              """Monitor data volume anomalies."""
              
              def __init__(self, db_connection):
                  self.db = db_connection
                  self.framework = DataObservabilityFramework(db_connection)
              
              def check_volume(self, table: str, 
                              time_window: str = "1 hour") -> AnomalyResult:
                  """Check for volume anomalies."""
                  query = f"""
                  SELECT COUNT(*) as row_count
                  FROM {table}
                  WHERE created_at >= CURRENT_TIMESTAMP - INTERVAL '{time_window}'
                  """
                  
                  result = pd.read_sql(query, self.db)
                  current_volume = result["row_count"].iloc[0]
                  
                  return self.framework.detect_anomaly(
                      table, "*", f"count_{time_window.replace(' ', '_')}", 
                      current_volume
                  )

          # monitoring/schema_monitor.py
          class SchemaMonitor:
              """Monitor schema changes."""
              
              def __init__(self, db_connection):
                  self.db = db_connection
                  self.schema_cache = {}
              
              def get_current_schema(self, table: str) -> Dict:
                  """Get current schema of a table."""
                  query = f"""
                  SELECT 
                      column_name,
                      data_type,
                      is_nullable
                  FROM information_schema.columns
                  WHERE table_name = '{table}'
                  ORDER BY ordinal_position
                  """
                  
                  df = pd.read_sql(query, self.db)
                  return {
                      row["column_name"]: {
                          "type": row["data_type"],
                          "nullable": row["is_nullable"] == "YES"
                      }
                      for _, row in df.iterrows()
                  }
              
              def detect_schema_changes(self, table: str) -> Dict:
                  """Detect schema changes."""
                  current_schema = self.get_current_schema(table)
                  
                  if table not in self.schema_cache:
                      self.schema_cache[table] = current_schema
                      return {"changed": False, "changes": []}
                  
                  cached_schema = self.schema_cache[table]
                  changes = []
                  
                  # Check for added columns
                  for col in current_schema:
                      if col not in cached_schema:
                          changes.append({
                              "type": "added",
                              "column": col,
                              "details": current_schema[col]
                          })
                  
                  # Check for removed columns
                  for col in cached_schema:
                      if col not in current_schema:
                          changes.append({
                              "type": "removed",
                              "column": col,
                              "details": cached_schema[col]
                          })
                  
                  # Check for type changes
                  for col in current_schema:
                      if col in cached_schema:
                          if current_schema[col]["type"] != cached_schema[col]["type"]:
                              changes.append({
                                  "type": "type_changed",
                                  "column": col,
                                  "from": cached_schema[col]["type"],
                                  "to": current_schema[col]["type"]
                              })
                  
                  self.schema_cache[table] = current_schema
                  
                  return {
                      "changed": len(changes) > 0,
                      "changes": changes,
                      "table": table
                  }

          # monitoring/distribution_monitor.py
          class DistributionMonitor:
              """Monitor data distribution drift."""
              
              def __init__(self, db_connection):
                  self.db = db_connection
                  self.baseline_distributions = {}
              
              def compute_distribution(self, table: str, column: str,
                                      bins: int = 50) -> np.ndarray:
                  """Compute histogram distribution."""
                  query = f"SELECT {column} FROM {table} WHERE {column} IS NOT NULL"
                  df = pd.read_sql(query, self.db)
                  
                  hist, _ = np.histogram(df[column], bins=bins, density=True)
                  return hist
              
              def detect_distribution_drift(self, table: str, column: str,
                                           threshold: float = 0.05) -> Dict:
                  """Detect distribution drift using KS test."""
                  baseline_key = f"{table}.{column}"
                  
                  # Get current data
                  query = f"SELECT {column} FROM {table} WHERE created_at >= CURRENT_DATE - INTERVAL '1 day'"
                  current_df = pd.read_sql(query, self.db)
                  
                  # Get baseline data
                  baseline_query = f"""
                  SELECT {column} 
                  FROM {table} 
                  WHERE created_at BETWEEN CURRENT_DATE - INTERVAL '8 days' AND CURRENT_DATE - INTERVAL '1 day'
                  """
                  baseline_df = pd.read_sql(baseline_query, self.db)
                  
                  # Perform KS test
                  statistic, p_value = stats.ks_2samp(
                      baseline_df[column].dropna(),
                      current_df[column].dropna()
                  )
                  
                  drift_detected = p_value < threshold
                  
                  return {
                      "drift_detected": drift_detected,
                      "ks_statistic": statistic,
                      "p_value": p_value,
                      "threshold": threshold,
                      "table": table,
                      "column": column
                  }
          ```

          ## Alerting System

          ```python
          # alerting/alert_manager.py
          from typing import List, Dict
          import requests
          import json

          class AlertManager:
              """Manage and route alerts."""
              
              def __init__(self, slack_webhook: str = None, pagerduty_key: str = None):
                  self.slack_webhook = slack_webhook
                  self.pagerduty_key = pagerduty_key
              
              def send_alert(self, anomaly: AnomalyResult, channels: List[str] = None):
                  """Send alert through configured channels."""
                  if channels is None:
                      channels = ["slack"] if anomaly.severity == "warning" else ["slack", "pagerduty"]
                  
                  message = self._format_alert_message(anomaly)
                  
                  if "slack" in channels and self.slack_webhook:
                      self._send_slack_alert(message, anomaly.severity)
                  
                  if "pagerduty" in channels and self.pagerduty_key:
                      self._send_pagerduty_alert(anomaly)
              
              def _format_alert_message(self, anomaly: AnomalyResult) -> str:
                  """Format alert message."""
                  emoji = "🔴" if anomaly.severity == "critical" else "🟡"
                  
                  return f"""
          {emoji} *Data Quality Alert: {anomaly.severity.upper()}*
          
          *Check:* {anomaly.check_name}
          *Current Value:* {anomaly.current_value:.2f}
          *Expected Range:* {anomaly.expected_range[0]:.2f} - {anomaly.expected_range[1]:.2f}
          *Z-Score:* {anomaly.z_score:.2f}
          *Time:* {anomaly.timestamp}
          
          *Recommended Action:* {self._get_recommended_action(anomaly)}
                  """
              
              def _get_recommended_action(self, anomaly: AnomalyResult) -> str:
                  """Get recommended action based on anomaly type."""
                  if "freshness" in anomaly.check_name:
                      return "Check pipeline execution status and upstream dependencies"
                  elif "volume" in anomaly.check_name:
                      return "Verify data source and pipeline configuration"
                  elif "schema" in anomaly.check_name:
                      return "Review recent schema changes and update downstream consumers"
                  else:
                      return "Investigate data quality and check upstream systems"
              
              def _send_slack_alert(self, message: str, severity: str):
                  """Send alert to Slack."""
                  color = "danger" if severity == "critical" else "warning"
                  
                  payload = {
                      "attachments": [{
                          "color": color,
                          "text": message,
                          "footer": "Data Observability"
                      }]
                  }
                  
                  requests.post(self.slack_webhook, json=payload)
              
              def _send_pagerduty_alert(self, anomaly: AnomalyResult):
                  """Send alert to PagerDuty."""
                  payload = {
                      "routing_key": self.pagerduty_key,
                      "event_action": "trigger",
                      "dedup_key": anomaly.check_name,
                      "payload": {
                          "summary": f"Data Quality Alert: {anomaly.check_name}",
                          "severity": "critical" if anomaly.severity == "critical" else "error",
                          "source": "data-observability",
                          "custom_details": {
                              "current_value": anomaly.current_value,
                              "expected_range": anomaly.expected_range,
                              "z_score": anomaly.z_score
                          }
                      }
                  }
                  
                  requests.post(
                      "https://events.pagerduty.com/v2/enqueue",
                      json=payload
                  )
          ```


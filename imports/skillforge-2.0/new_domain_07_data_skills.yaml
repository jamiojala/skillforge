          ## Custom Transformer for Ownership

          ```python
          # transformers/ownership_transformer.py
          from datahub.ingestion.transformer.base_transformer import Transformer
          from datahub.metadata.schema_classes import OwnershipClass, OwnerClass
          from datahub.metadata.urns import CorpUserUrn

          class AddOwnershipTransformer(Transformer):
              """Add ownership based on dataset naming patterns."""
              
              def __init__(self, config):
                  self.ownership_map = config.get("ownership_map", {})
              
              def transform(self, record):
                  dataset_name = record.get("dataset_name", "")
                  
                  # Determine owner based on naming pattern
                  owner = None
                  for pattern, assigned_owner in self.ownership_map.items():
                      if pattern in dataset_name:
                          owner = assigned_owner
                          break
                  
                  if owner:
                      ownership = OwnershipClass(
                          owners=[
                              OwnerClass(
                                  owner=CorpUserUrn(owner),
                                  type="DATAOWNER"
                              )
                          ]
                      )
                      record["ownership"] = ownership
                  
                  return record
          ```


          # dbt_lineage.py
          import json
          from pathlib import Path

          class DBTLineageExtractor:
              """Extract lineage from dbt artifacts."""
              
              def __init__(self, target_dir: str = "target"):
                  self.target_dir = Path(target_dir)
              
              def extract_from_manifest(self) -> Dict:
                  """Extract lineage from dbt manifest."""
                  manifest_path = self.target_dir / "manifest.json"
                  
                  with open(manifest_path) as f:
                      manifest = json.load(f)
                  
                  lineage = {
                      "nodes": {},
                      "sources": {},
                      "edges": []
                  }
                  
                  # Extract model lineage
                  for node_id, node in manifest.get("nodes", {}).items():
                      if node["resource_type"] == "model":
                          lineage["nodes"][node_id] = {
                              "name": node["name"],
                              "schema": node["schema"],
                              "depends_on": node.get("depends_on", {}).get("nodes", [])
                          }
                          
                          # Add edges
                          for dep in node.get("depends_on", {}).get("nodes", []):
                              lineage["edges"].append({
                                  "source": dep,
                                  "target": node_id,
                                  "type": "depends_on"
                              })
                  
                  # Extract source lineage
                  for source_id, source in manifest.get("sources", {}).items():
                      lineage["sources"][source_id] = {
                          "name": source["name"],
                          "schema": source["schema"],
                          "database": source["database"]
                      }
                  
                  return lineage
              
              def extract_column_lineage(self, model_sql: str, model_name: str) -> List[ColumnLineage]:
                  """Extract column-level lineage from model SQL."""
                  extractor = SQLLineageExtractor()
                  return extractor.extract_lineage(model_sql, model_name)

          ## Semantic Model Design

          ```yaml
          # models/marts/semantic_models/orders_semantic_model.yml
          semantic_models:
            - name: orders
              description: |
                Order-level data for e-commerce analytics.
                Each record represents a single order.
              model: ref('fct_orders')
              
              defaults:
                agg_time_dimension: order_date
              
              entities:
                - name: order
                  type: primary
                  expr: order_id
                
                - name: customer
                  type: foreign
                  expr: customer_id
              
              dimensions:
                - name: order_date
                  type: time
                  type_params:
                    time_granularity: day
                
                - name: order_month
                  type: time
                  expr: date_trunc('month', order_date)
                  type_params:
                    time_granularity: month
                
                - name: country
                  type: categorical
                  expr: shipping_country
                
                - name: region
                  type: categorical
                  expr: CASE 
                          WHEN shipping_country IN ('US', 'CA', 'MX') THEN 'North America'
                          WHEN shipping_country IN ('GB', 'DE', 'FR', 'IT', 'ES') THEN 'Europe'
                          ELSE 'Other'
                        END
                
                - name: product_category
                  type: categorical
                  expr: primary_category
                
                - name: customer_segment
                  type: categorical
                  expr: CASE 
                          WHEN customer_lifetime_value > 1000 THEN 'High Value'
                          WHEN customer_lifetime_value > 500 THEN 'Medium Value'
                          ELSE 'Low Value'
                        END
                
                - name: is_first_order
                  type: categorical
                  expr: CASE WHEN order_number = 1 THEN 'New Customer' ELSE 'Returning' END
              
              measures:
                - name: order_count
                  description: The total number of orders
                  agg: count
                  create_metric: true
                
                - name: order_total
                  description: The total revenue from orders
                  agg: sum
                  expr: order_amount
                  create_metric: true
                
                - name: discount_amount
                  description: Total discount amount applied
                  agg: sum
                  expr: discount_amount
                
                - name: shipping_amount
                  description: Total shipping revenue
                  agg: sum
                  expr: shipping_amount
                
                - name: tax_amount
                  description: Total tax collected
                  agg: sum
                  expr: tax_amount
                
                - name: unique_customers
                  description: Count of unique customers
                  agg: count_distinct
                  expr: customer_id
                  create_metric: true

            - name: customers
              description: Customer-level metrics and attributes
              model: ref('dim_customers')
              
              entities:
                - name: customer
                  type: primary
                  expr: customer_id
              
              dimensions:
                - name: customer_acquisition_date
                  type: time
                  type_params:
                    time_granularity: day
                
                - name: country
                  type: categorical
                
                - name: customer_tier
                  type: categorical
              
              measures:
                - name: customer_count
                  description: Count of customers
                  agg: count
                  create_metric: true
                
                - name: total_lifetime_value
                  description: Sum of customer lifetime values
                  agg: sum
                  expr: lifetime_value
                
                - name: avg_lifetime_value
                  description: Average customer lifetime value
                  agg: average
                  expr: lifetime_value
                  create_metric: true
          ```


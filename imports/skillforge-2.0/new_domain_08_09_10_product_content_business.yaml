    examples:
      - name: "Design Tokens Architecture"
        user: "We're starting a new design system and need to set up design tokens properly. What's the best token structure?"
        ai_response: |
          ## Design Tokens Architecture
          
          ### 🏗️ Token Hierarchy
          
          ```json
          {
            "color": {
              "base": {
                "blue": {
                  "50": { "value": "#E3F2FD" },
                  "100": { "value": "#BBDEFB" },
                  "500": { "value": "#2196F3" },
                  "700": { "value": "#1976D2" }
                },
                "red": { "50": { "value": "#FFEBEE" }, "500": { "value": "#F44336" } },
                "neutral": { "0": { "value": "#FFFFFF" }, "1000": { "value": "#000000" } }
              },
              "semantic": {
                "primary": { "value": "{color.base.blue.500}" },
                "primary-hover": { "value": "{color.base.blue.700}" },
                "error": { "value": "{color.base.red.500}" },
                "background": { "value": "{color.base.neutral.0}" },
                "text-primary": { "value": "{color.base.neutral.1000}" }
              },
              "component": {
                "button-primary-bg": { "value": "{color.semantic.primary}" },
                "button-primary-bg-hover": { "value": "{color.semantic.primary-hover}" },
                "input-border-error": { "value": "{color.semantic.error}" }
              }
            },
            "spacing": {
              "base": { "value": "4px" },
              "scale": {
                "xs": { "value": "{spacing.base}" },
                "sm": { "value": "{spacing.base} * 2" },
                "md": { "value": "{spacing.base} * 4" },
                "lg": { "value": "{spacing.base} * 6" },
                "xl": { "value": "{spacing.base} * 8" }
              }
            },
            "typography": {
              "font-family": {
                "sans": { "value": "Inter, system-ui, sans-serif" },
                "mono": { "value": "JetBrains Mono, monospace" }
              },
              "font-size": {
                "xs": { "value": "12px" },
                "sm": { "value": "14px" },
                "base": { "value": "16px" },
                "lg": { "value": "18px" },
                "xl": { "value": "20px" },
                "2xl": { "value": "24px" }
              },
              "font-weight": {
                "regular": { "value": "400" },
                "medium": { "value": "500" },
                "semibold": { "value": "600" },
                "bold": { "value": "700" }
              }
            },
            "border-radius": {
              "none": { "value": "0" },
              "sm": { "value": "4px" },
              "md": { "value": "8px" },
              "lg": { "value": "12px" },
              "full": { "value": "9999px" }
            }
          }
          ```
          
          ### 📋 Token Organization Principles
          
          **Three-Tier Architecture:**
          1. **Base Tokens**: Raw values (hex colors, px sizes)
          2. **Semantic Tokens**: Meaningful abstractions (primary, error, background)
          3. **Component Tokens**: Component-specific values (button-primary-bg)
          
          **Naming Convention:**
          ```
          {category}.{type}.{variant}.{state}
          
          Examples:
          - color.semantic.primary
          - spacing.scale.md
          - typography.font-size.heading-lg
          - border-radius.component.button
          ```
          
          ### 🔧 Implementation with Style Dictionary
          
          ```javascript
          // style-dictionary.config.js
          module.exports = {
            source: ['tokens/**/*.json'],
            platforms: {
              css: {
                transformGroup: 'css',
                buildPath: 'build/css/',
                files: [{
                  destination: 'variables.css',
                  format: 'css/variables'
                }]
              },
              scss: {
                transformGroup: 'scss',
                buildPath: 'build/scss/',
                files: [{
                  destination: '_variables.scss',
                  format: 'scss/variables'
                }]
              },
              js: {
                transformGroup: 'js',
                buildPath: 'build/js/',
                files: [{
                  destination: 'tokens.js',
                  format: 'javascript/es6'
                }]
              }
            }
          };
          ```
          
          ### 🚀 Figma Integration
          
          Use **Tokens Studio** plugin:
          1. Connect to GitHub repository
          2. Sync tokens bidirectionally
          3. Apply tokens to Figma styles
          4. Export tokens for development
          
          ### 📈 Success Metrics
          - Token coverage: % of styles using tokens
          - Consistency score: Visual audit results
          - Dev handoff time: Minutes to specs
        notes: "Complete design token architecture with three-tier structure and implementation guidance"
      
      - name: "Figma File Organization"
        user: "Our Figma files are becoming chaotic as the team grows. How should we organize files for a 20-person design team?"
        ai_response: |
          ## Figma File Organization for Scale
          
          ### 🏗️ File Structure
          
          ```
          📁 Design System (Team)
          ├── 📄 Design Tokens (Library)
          ├── 📄 Core Components (Library)
          ├── 📄 Icon Library (Library)
          └── 📄 Component Documentation
          
          📁 Product A (Team)
          ├── 📄 A - Discovery & Research
          ├── 📄 A - Wireframes & Concepts
          ├── 📄 A - Visual Design (Library)
          ├── 📄 A - Prototypes
          └── 📄 A - Archive (2024)
          
          📁 Product B (Team)
          ├── [same structure]
          
          📁 Shared Resources (Team)
          ├── 📄 User Research Repository
          ├── 📄 Journey Maps & Personas
          └── 📄 Workshop Templates
          ```
          
          ### 📋 Naming Conventions
          
          **Pages:**
          ```
          🎯 Cover
          📋 Overview / Index
          🔍 Research
          ✏️ Wireframes
          🎨 Visual Design
          🧪 Prototype
          📱 Responsive States
          ✅ Ready for Dev
          🗂️ Archive
          ```
          
          **Frames/Artboards:**
          ```
          [Flow] / [Screen] / [State]

          Examples:
          - Onboarding / Welcome / Default
          - Onboarding / Welcome / Error
          - Checkout / Payment / Filled
          - Checkout / Payment / Success
          ```
          
          **Components:**
          ```
          [Category]/[Component]/[Variant]/[State]

          Examples:
          - Button/Primary/Default
          - Button/Primary/Hover
          - Button/Primary/Disabled
          - Input/Text/Default
          - Input/Text/Error
          - Input/Text/Filled
          ```
          
          ### 🔧 Figma Setup
          
          **Team Library Structure:**
          1. **Design Tokens Library**: Colors, typography, spacing, effects
          2. **Core Components Library**: Buttons, inputs, cards, navigation
          3. **Product-Specific Libraries**: Feature components
          
          **Access Control:**
          - Design System: Design Ops + Senior Designers (Edit)
          - Product Files: Product Team (Edit)
          - Cross-Functional: View access for PMs, Eng
          
          ### 📊 Governance Model
          
          **Component Lifecycle:**
          ```
          Draft → Review → Published → Deprecated → Removed
          ```
          
          **Change Process:**
          1. Propose change in #design-system Slack
          2. Create branch in Figma
          3. Review with 2+ designers
          4. Update documentation
          5. Announce in #design-updates
          6. Merge to main
          
          **Monthly Audit:**
          - [ ] Unused components identified
          - [ ] Naming inconsistencies fixed
          - [ ] New components documented
          - [ ] Library performance checked
          
          ### 🚀 Quick Wins
          1. **Create template files** for new projects
          2. **Use Figma's built-in analytics** to track component usage
          3. **Set up Slack notifications** for library updates
          4. **Create a "What's New" page** in design system
        notes: "Comprehensive Figma organization strategy for scaling design teams"
    
    delegation:
      primary_model: "gpt-4o"
      secondary_model: "claude-sonnet-4"
      fallback_model: "claude-haiku"
    
    validation:
      hooks:
        - hook_id: design-token-validator
          description: "Validates token structure and naming conventions"
        - hook_id: figma-organization-checker
          description: "Checks file structure and naming compliance"
        - hook_id: component-coverage-analyzer
          description: "Analyzes component library completeness"
    

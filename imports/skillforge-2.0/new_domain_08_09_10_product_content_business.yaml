                      $ref: '#/components/schemas/Error'
                    example:
                      error: "forbidden"
                      message: "You don't have permission to perform this action."
              
              NotFound:
                description: Resource not found
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/Error'
                    example:
                      error: "not_found"
                      message: "The requested resource was not found."
          ```
          
          ### 💻 Code Examples
          
          **cURL**:
          ```bash
          # List products
          curl -X GET "https://api.example.com/v1/products?page=1&limit=10" \
            -H "Authorization: Bearer YOUR_TOKEN"
          
          # Create product
          curl -X POST "https://api.example.com/v1/products" \
            -H "Authorization: Bearer YOUR_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "New Product",
              "price": 49.99,
              "category": "Electronics"
            }'
          ```
          
          **Python**:
          ```python
          import requests
          
          headers = {"Authorization": "Bearer YOUR_TOKEN"}
          
          # List products
          response = requests.get(
              "https://api.example.com/v1/products",
              headers=headers,
              params={"page": 1, "limit": 10}
          )
          products = response.json()
          
          # Create product
          new_product = {
              "name": "New Product",
              "price": 49.99,
              "category": "Electronics"
          }
          response = requests.post(
              "https://api.example.com/v1/products",
              headers=headers,
              json=new_product
          )
          created_product = response.json()
          ```
          
          **JavaScript**:
          ```javascript
          const headers = { 'Authorization': 'Bearer YOUR_TOKEN' };
          
          // List products
          const products = await fetch(
            'https://api.example.com/v1/products?page=1&limit=10',
            { headers }
          ).then(r => r.json());
          
          // Create product
          const created = await fetch('https://api.example.com/v1/products', {
            method: 'POST',
            headers: { ...headers, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: 'New Product',
              price: 49.99,
              category: 'Electronics'
            })
          }).then(r => r.json());
          ```
          
          ### 🛠️ Tools Integration
          
          **Swagger UI**: Interactive documentation
          **Postman Collection**: Import OpenAPI spec
          **Spectral Linting**: Validate spec quality
          
          ```bash
          # Validate spec
          npx @stoplight/spectral-cli lint openapi.yaml
          
          # Generate Postman collection
          npx openapi-to-postmanv2 -s openapi.yaml -o collection.json
          ```
        notes: "Complete OpenAPI 3.0 specification with comprehensive examples and error handling"
    

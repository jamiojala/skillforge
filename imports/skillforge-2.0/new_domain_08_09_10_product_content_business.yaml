        - "Confidence level"
        - "Effort required"
        - "Dependencies"
    
    response_format:
      structure:
        - "🎯 Strategic Context"
        - "📊 OKR Framework"
        - "🗺️ Roadmap Structure"
        - "📋 Initiative Details"
        - "⚖️ Prioritization Rationale"
        - "⚠️ Risks & Dependencies"
        - "📣 Communication Plan"
      required_elements:

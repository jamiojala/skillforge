      - name: "Dependency Management"
        user: "We have 8 teams working on a new product launch. Dependencies are getting complex. How do we track and manage them effectively?"
        ai_response: |
          ## Dependency Management Framework
          
          ### 📊 Dependency Types
          
          **1. Technical Dependencies**
          - Service A needs API from Service B
          - Frontend needs backend endpoint
          - Shared library updates
          
          **2. Resource Dependencies**
          - Team needs platform team's K8s cluster
          - Needs security review
          - Needs design resources
          
          **3. Timeline Dependencies**
          - Task B can't start until Task A completes
          - Parallel workstreams with handoffs
          
          ### 🔧 Dependency Tracking System
          
          **Dependency Matrix**:
          ```markdown
          | ID | Dependency | Consumer | Provider | Type | Status | Target Date | Risk |
          |----|------------|----------|----------|------|--------|-------------|------|
          | D1 | Auth API v2 | Orders | Auth | Technical | 🟢 Ready | Done | Low |
          | D2 | Payment SDK | Checkout | Platform | Technical | 🟡 In Progress | Jan 15 | Medium |
          | D3 | Design System | All | Design | Resource | 🔴 Blocked | Jan 10 | High |
          ```
          
          **Jira/Linear Setup**:
          ```
          Epic: Product Launch
          ├── Story: Auth Service [Auth Team]
          │   └── Blocks: Order Service
          ├── Story: Order Service [Orders Team]
          │   └── Depends on: Auth Service
          │   └── Blocks: Checkout Flow
          ├── Story: Payment Integration [Platform Team]
          │   └── Blocks: Checkout Flow
          └── Story: Checkout Flow [Frontend Team]
              └── Depends on: Order Service, Payment Integration
          ```
          
          **Dependency Visualization** (Miro):
          ```
          [Auth Service] ──► [Order Service] ──► [Checkout Flow]
                              ▲                      ▲
                              │                      │
          [Payment SDK] ──────┘                      │
                                                     │
          [Design System] ───────────────────────────┘
          ```
          
          ### 📋 Dependency Management Process
          
          **1. Identification (Program Start)**
          - Workshop with all team leads
          - Map all known dependencies
          - Categorize by type and criticality
          
          **2. Documentation**
          ```markdown
          ## Dependency: D2 - Payment SDK
          
          **Consumer**: Checkout Team
          **Provider**: Platform Team
          **Description**: Payment SDK v3.0 with new webhook format
          **Contract**: [Link to API spec]
          **Target Date**: January 15, 2024
          **Status**: 🟡 In Progress
          
          **Details**:
          - SDK must support async webhooks
          - Error handling spec required
          - Test environment needed by Jan 10
          
          **Risks**:
          - Platform team has competing priorities
          - SDK v3.0 has breaking changes
          
          **Mitigation**:
          - Weekly sync between teams
          - Fallback to v2.5 if delayed
          ```
          
          **3. Tracking Cadence**
          - Weekly: Dependency status review in program sync
          - Bi-weekly: Deep-dive on at-risk dependencies
          - Ad-hoc: Immediate escalation if status changes
          
          **4. Status Definitions**
          - 🟢 **Ready**: Dependency delivered and available
          - 🟡 **In Progress**: Work underway, on track
          - 🟠 **At Risk**: Potential delay, mitigation in place
          - 🔴 **Blocked**: Delivery blocked, escalation needed
          
          ### ⚠️ Early Warning System
          
          **Dependency Health Dashboard**:
          ```
          Total Dependencies: 24
          🟢 Ready: 12 (50%)
          🟡 In Progress: 8 (33%)
          🟠 At Risk: 3 (13%)
          🔴 Blocked: 1 (4%)
          
          At Risk Dependencies:
          - D3: Design System (blocked on design team capacity)
          - D7: Security Review (backlog)
          - D12: Performance Testing (environment issues)
          ```
          
          **Escalation Triggers**:
          - Dependency status changes to 🔴 Blocked
          - At-risk dependency has no owner
          - Target date missed without communication
          - Consumer team blocked for >2 days
          
          ### 🔄 Dependency Negotiation
          
          When dependencies conflict:
          
          **1. Impact Analysis**
          - How many teams affected?
          - What's the business impact?
          - Are there workarounds?
          
          **2. Trade-off Discussion**
          - Can scope be reduced?
          - Can timeline be extended?
          - Can alternative solution work?
          
          **3. Decision Framework**
          - Priority: Business critical > Important > Nice-to-have
          - Impact: Customer-facing > Internal
          - Risk: High risk items first
          
          **4. Documentation**
          - Decision recorded in decision log
          - All stakeholders informed
          - Dependencies updated
          
          ### 📈 Metrics to Track
          
          - **Dependency resolution time**: Average time from identification to resolution
          - **Blocked time**: Total team-days lost to blocked dependencies
          - **Dependency churn**: Number of dependency changes per week
          - **On-time delivery**: % of dependencies delivered by target date
        notes: "Comprehensive dependency management framework with tracking, escalation, and negotiation"
    

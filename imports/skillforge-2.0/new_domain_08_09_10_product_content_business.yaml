    examples:
      - name: "Senior Backend Engineer Interview Loop"
        user: "We need to design an interview loop for a Senior Backend Engineer position. We want to assess coding, system design, and collaboration skills."
        ai_response: |
          ## Senior Backend Engineer Interview Loop
          
          ### 🎯 Role Analysis
          
          **Role**: Senior Backend Engineer
          **Level**: IC4 (Senior)
          **Key Competencies**:
          1. **Coding Proficiency**: Write clean, efficient code
          2. **System Design**: Design scalable distributed systems
          3. **Problem Solving**: Break down complex problems
          4. **Collaboration**: Work effectively with others
          5. **Communication**: Explain technical concepts clearly
          
          ### 📋 Interview Loop Design
          
          **Total Time**: 5 hours (can split across days)
          
          | Round | Duration | Competency | Format |
          |-------|----------|------------|--------|
          | 1. Recruiter Screen | 30 min | Basic fit, motivation | Phone |
          | 2. Technical Phone Screen | 60 min | Coding, problem solving | Video + CoderPad |
          | 3. Coding Interview | 60 min | Coding proficiency | Video + IDE |
          | 4. System Design | 60 min | System design, scalability | Whiteboard/video |
          | 5. Behavioral | 45 min | Collaboration, communication | Video |
          | 6. Values/Bar Raiser | 45 min | Culture fit, judgment | Video |
          
          ### ❓ Question Bank
          
          **Round 2: Technical Phone Screen (60 min)**
          
          *Question: Rate Limiter Implementation*
          
          **Prompt**:
          ```
          Design and implement a rate limiter that limits requests to 
          100 requests per minute per user ID.
          
          Requirements:
          - Function signature: is_allowed(user_id: str) -> bool
          - Return True if request allowed, False if rate limited
          - Handle concurrent requests
          - Efficient in time and space
          ```
          
          **Follow-ups**:
          1. How would you scale this across multiple servers?
          2. How would you handle different rate limits for different users?
          3. How would you test this?
          
          **Round 3: Coding Interview (60 min)**
          
          *Question: Distributed Job Scheduler*
          
          **Prompt**:
          ```
          Design a job scheduler that:
          - Accepts jobs with a scheduled time
          - Executes jobs at the scheduled time
          - Handles job failures with retries
          - Supports job priorities
          
          Focus on the core data structures and algorithms.
          ```
          
          **Round 4: System Design (60 min)**
          
          *Question: Design a URL Shortener*
          
          **Prompt**:
          ```
          Design a URL shortening service like bit.ly.
          
          Requirements:
          - Shorten long URLs to short codes
          - Redirect short codes to original URLs
          - Support custom short codes
          - Track click analytics
          - Handle 10M new URLs/day, 100M redirects/day
          
          Start with high-level design, then dive into specific components.
          ```
          
          **Areas to Cover**:
          - API design
          - Database schema
          - URL generation algorithm
          - Caching strategy
          - Analytics pipeline
          - Scaling considerations
          
          **Round 5: Behavioral (45 min)**
          
          *Questions*:
          1. "Tell me about a time you had a conflict with a teammate. How did you resolve it?"
          2. "Describe a project where you had to make a significant technical decision. How did you approach it?"
          3. "Tell me about a time you received critical feedback. How did you respond?"
          4. "Describe a situation where you had to balance technical debt with delivering features."
          
          **Round 6: Values/Bar Raiser (45 min)**
          
          *Questions*:
          1. "Tell me about a time you had to make a decision with incomplete information."
          2. "Describe a situation where you had to challenge the status quo."
          3. "How do you approach mentoring junior engineers?"
          
          ### 📊 Rubric Design
          
          **Coding Rubric**:
          
          | Dimension | 1 - Poor | 2 - Fair | 3 - Good | 4 - Strong |
          |-----------|----------|----------|----------|------------|
          | **Problem Solving** | Struggles to understand problem; needs significant hints | Understands problem with some clarification; basic approach | Understands quickly; good approach with minor gaps | Immediately grasps problem; elegant approach |
          | **Code Quality** | Code is messy, unclear, or has major bugs | Code works but has style issues or minor bugs | Clean, readable code; minor edge cases missed | Production-quality code; handles all edge cases |
          | **Efficiency** | Inefficient solution; no awareness of complexity | Basic awareness; some optimization | Good complexity analysis; appropriate data structures | Excellent optimization; discusses trade-offs |
          | **Communication** | Unclear explanations; doesn't listen to hints | Adequate communication; responds to feedback | Clear explanations; good collaboration | Exceptional communicator; proactive discussion |
          
          **System Design Rubric**:
          
          | Dimension | 1 - Poor | 2 - Fair | 3 - Good | 4 - Strong |
          |-----------|----------|----------|----------|------------|
          | **Requirements** | Misses key requirements | Captures basic requirements | Good requirements gathering | Thorough; clarifies ambiguities |
          | **Architecture** | Inappropriate or unclear design | Basic design with gaps | Solid design; covers main components | Excellent; considers trade-offs |
          | **Scalability** | No consideration of scale | Basic awareness | Good scaling discussion | Deep understanding; quantifies |
          | **Trade-offs** | Doesn't discuss alternatives | Mentions some trade-offs | Good discussion of options | Comprehensive; justifies decisions |
          
          **Behavioral Rubric**:
          
          Use STAR format evaluation:
          - **Situation**: Did they set context?
          - **Task**: What was their responsibility?
          - **Action**: What did they do?
          - **Result**: What was the outcome?
          
          Score: 1 (vague, no structure) to 4 (clear STAR, strong impact)
          
          ### ⚖️ Bias Mitigation
          
          **1. Structured Interviews**
          - Ask same core questions to all candidates
          - Use same rubric for evaluation
          - Take notes before discussing with others
          
          **2. Diverse Interview Panels**
          - Include interviewers from different backgrounds
          - Ensure gender diversity on panels
          - Rotate interviewers regularly
          
          **3. Calibration Sessions**
          - Review rubric before interviews
          - Calibrate on sample responses
          - Discuss borderline cases as a group
          
          **4. Redacted Resume Review**
          - Remove names, schools, companies initially
          - Focus on relevant experience
          - Structured resume scoring
          
          **5. Standardized Feedback**
          - Use structured feedback forms
          - Require evidence for scores
          - Separate "hire/no-hire" from notes
          
          ### 👨‍🏫 Interviewer Training
          
          **Training Agenda (2 hours)**:
          
          1. **Interview Philosophy** (15 min)
             - Our hiring principles
             - Candidate experience matters
             - Legal considerations
          
          2. **Structured Interviewing** (30 min)
             - Why structure matters
             - How to use rubrics
             - Taking effective notes
          
          3. **Question Walkthrough** (30 min)
             - Review each question
             - Expected good responses
             - Common pitfalls
          
          4. **Bias Awareness** (30 min)
             - Common biases in interviewing
             - Mitigation strategies
             - Self-awareness exercises
          
          5. **Practice & Calibration** (15 min)
             - Mock interview review
             - Score calibration exercise
          
          **Interviewer Checklist**:
          - [ ] Reviewed rubric before interview
          - [ ] Read candidate's resume
          - [ ] Prepared question variations
          - [ ] Set up interview environment
          - [ ] Have water/coffee for candidate
          - [ ] Start with introductions and context
          - [ ] Take detailed notes
          - [ ] Leave time for candidate questions
          - [ ] Fill out rubric immediately after
          - [ ] Submit feedback within 24 hours
          
          ### 📈 Calibration & Iteration
          
          **Weekly Calibration**:
          - Review borderline candidates
          - Discuss scoring discrepancies
          - Update rubric if needed
          
          **Quarterly Review**:
          - Analyze hiring outcomes
          - Check for bias in decisions
          - Update questions based on performance
          - Refine rubrics
          
          **Metrics to Track**:
          - Offer acceptance rate
          - New hire performance (6-month review)
          - Time to fill
          - Candidate NPS
          - Interviewer calibration scores
        notes: "Complete interview loop design with questions, rubrics, and bias mitigation strategies"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "gpt-4o"
      fallback_model: "claude-haiku"
    
    validation:
      hooks:
        - hook_id: rubric-completeness-validator
          description: "Validates rubric completeness and clarity"
        - hook_id: bias-checker
          description: "Checks for potential bias in questions"
        - hook_id: competency-coverage-validator
          description: "Validates competency coverage"
    

        language: "sql"
        comments: "verbose"
        examples: "always"
    
    examples:
      - name: "DORA Metrics Implementation"
        user: "We want to start tracking DORA metrics for our engineering teams. We use GitHub and deploy to AWS. How do we set this up?"
        ai_response: |
          ## DORA Metrics Implementation
          
          ### 📊 DORA Metrics Overview
          
          **The Four Key Metrics**:
          1. **Deployment Frequency**: How often deployments occur
          2. **Lead Time for Changes**: Time from commit to production
          3. **Change Failure Rate**: % of deployments causing incidents
          4. **Time to Restore Service**: Time to recover from failure
          
          **Performance Levels**:
          | Metric | Low | Medium | High | Elite |
          |--------|-----|--------|------|-------|
          | Deployment Frequency | <1/month | 1/week-1/month | 1/week-1/day | On-demand |
          | Lead Time | >6 months | 1 week-6 months | 1 day-1 week | <1 hour |
          | Change Failure Rate | >45% | 31-45% | 16-30% | <15% |
          | Time to Restore | >6 months | 1 week-6 months | 1 day-1 week | <1 hour |
          
          ### 🔧 Data Collection Pipeline
          
          **Architecture**:
          ```
          GitHub ──┐
                   ├──► ETL Pipeline ──► Data Warehouse ──► Dashboard
          Jira ────┤      (dbt)            (Snowflake)      (Grafana)
                   │
          AWS ─────┘
          ```
          
          **1. Deployment Frequency Query** (GitHub + AWS)
          ```sql
          -- deployments.sql
          WITH deployments AS (
            SELECT
              d.deployment_id,
              d.repository,
              d.environment,
              d.status,
              d.created_at,
              DATE_TRUNC('week', d.created_at) as week
            FROM github.deployments d
            WHERE d.environment = 'production'
              AND d.status = 'success'
              AND d.created_at >= DATE_SUB(CURRENT_DATE, INTERVAL 90 DAY)
          )
          SELECT
            repository,
            week,
            COUNT(*) as deployment_count,
            CASE
              WHEN COUNT(*) >= 7 THEN 'elite'
              WHEN COUNT(*) >= 1 THEN 'high'
              WHEN COUNT(*) >= 0.25 THEN 'medium'
              ELSE 'low'
            END as performance_level
          FROM deployments
          GROUP BY repository, week
          ORDER BY repository, week;
          ```
          
          **2. Lead Time for Changes** (GitHub)
          ```sql
          -- lead_time.sql
          WITH commits_to_deploy AS (
            SELECT
              pr.repository,
              pr.pull_request_id,
              pr.merged_at as commit_time,
              d.created_at as deploy_time,
              TIMESTAMPDIFF(HOUR, pr.merged_at, d.created_at) as lead_time_hours
            FROM github.pull_requests pr
            JOIN github.deployments d
              ON pr.merge_commit_sha = d.sha
            WHERE pr.merged_at IS NOT NULL
              AND d.environment = 'production'
              AND d.created_at >= DATE_SUB(CURRENT_DATE, INTERVAL 90 DAY)
          )
          SELECT
            repository,
            AVG(lead_time_hours) as avg_lead_time_hours,
            PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY lead_time_hours) as median_lead_time_hours,
            PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY lead_time_hours) as p95_lead_time_hours,
            CASE
              WHEN AVG(lead_time_hours) < 1 THEN 'elite'
              WHEN AVG(lead_time_hours) < 168 THEN 'high'
              WHEN AVG(lead_time_hours) < 4320 THEN 'medium'
              ELSE 'low'
            END as performance_level
          FROM commits_to_deploy
          GROUP BY repository;
          ```
          
          **3. Change Failure Rate** (GitHub + Incident System)
          ```sql
          -- change_failure_rate.sql
          WITH production_deployments AS (
            SELECT
              d.deployment_id,
              d.repository,
              d.created_at,
              DATE_TRUNC('week', d.created_at) as week
            FROM github.deployments d
            WHERE d.environment = 'production'
              AND d.created_at >= DATE_SUB(CURRENT_DATE, INTERVAL 90 DAY)
          ),
          deployment_incidents AS (
            SELECT
              d.deployment_id,
              d.repository,
              COUNT(i.incident_id) as incident_count
            FROM production_deployments d
            LEFT JOIN incidents i
              ON d.deployment_id = i.deployment_id
              AND i.created_at BETWEEN d.created_at 
                AND DATE_ADD(d.created_at, INTERVAL 24 HOUR)
            GROUP BY d.deployment_id, d.repository
          )
          SELECT
            repository,
            COUNT(*) as total_deployments,
            SUM(CASE WHEN incident_count > 0 THEN 1 ELSE 0 END) as failed_deployments,
            ROUND(
              SUM(CASE WHEN incident_count > 0 THEN 1 ELSE 0 END) * 100.0 / COUNT(*),
              2
            ) as change_failure_rate,
            CASE
              WHEN SUM(CASE WHEN incident_count > 0 THEN 1 ELSE 0 END) * 100.0 / COUNT(*) < 15 THEN 'elite'
              WHEN SUM(CASE WHEN incident_count > 0 THEN 1 ELSE 0 END) * 100.0 / COUNT(*) < 30 THEN 'high'
              WHEN SUM(CASE WHEN incident_count > 0 THEN 1 ELSE 0 END) * 100.0 / COUNT(*) < 45 THEN 'medium'
              ELSE 'low'
            END as performance_level
          FROM deployment_incidents
          GROUP BY repository;
          ```
          
          **4. Time to Restore Service** (Incident System)
          ```sql
          -- mttr.sql
          WITH incident_recovery AS (
            SELECT
              i.incident_id,
              i.repository,
              i.created_at as incident_start,
              i.resolved_at as incident_end,
              TIMESTAMPDIFF(MINUTE, i.created_at, i.resolved_at) as recovery_time_minutes
            FROM incidents i
            WHERE i.resolved_at IS NOT NULL
              AND i.created_at >= DATE_SUB(CURRENT_DATE, INTERVAL 90 DAY)
              AND i.severity IN ('P0', 'P1', 'P2')
          )
          SELECT
            repository,
            AVG(recovery_time_minutes) as avg_recovery_minutes,
            PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY recovery_time_minutes) as median_recovery_minutes,
            CASE
              WHEN AVG(recovery_time_minutes) < 60 THEN 'elite'
              WHEN AVG(recovery_time_minutes) < 10080 THEN 'high'
              WHEN AVG(recovery_time_minutes) < 259200 THEN 'medium'
              ELSE 'low'
            END as performance_level
          FROM incident_recovery
          GROUP BY repository;
          ```
          
          ### 📈 Dashboard Design
          
          **DORA Dashboard Layout**:
          ```
          ┌─────────────────────────────────────────────────────────────┐
          │  DORA Metrics - Engineering Effectiveness                   │
          │  Last 90 Days | Updated: 2024-01-15 09:00 UTC              │
          ├─────────────────────────────────────────────────────────────┤
          │  ┌─────────────┐  ┌─────────────┐  ┌─────────────┐         │
          │  │ Deployment  │  │ Lead Time   │  │ Change      │         │
          │  │ Frequency   │  │ for Changes │  │ Failure Rate│         │
          │  │             │  │             │  │             │         │
          │  │ 4.2/week    │  │ 2.3 days    │  │ 8.5%        │         │
          │  │ 🟢 Elite    │  │ 🟡 High     │  │ 🟢 Elite    │         │
          │  └─────────────┘  └─────────────┘  └─────────────┘         │
          │  ┌─────────────┐                                           │
          │  │ Time to     │                                           │
          │  │ Restore     │                                           │
          │  │             │                                           │
          │  │ 45 min      │                                           │
          │  │ 🟢 Elite    │                                           │
          │  └─────────────┘                                           │
          ├─────────────────────────────────────────────────────────────┤
          │  📊 Trends (Last 12 Weeks)                                  │
          │  [Line chart showing metric trends over time]               │
          ├─────────────────────────────────────────────────────────────┤
          │  🎯 Improvement Opportunities                               │
          │  - Lead time: 60% of time spent in code review              │
          │  - Recommendation: Review assignment automation             │
          └─────────────────────────────────────────────────────────────┘
          ```
          
          ### 💡 Analysis & Insights
          
          **Interpreting Your Metrics**:
          
          | Metric | Your Value | Benchmark | Insight | Action |
          |--------|------------|-----------|---------|--------|
          | Deployment Frequency | 4.2/week | Elite: On-demand | ✅ Strong | Maintain |
          | Lead Time | 2.3 days | Elite: <1 hour | 🟡 Gap | Focus area |
          | Change Failure Rate | 8.5% | Elite: <15% | ✅ Strong | Maintain |
          | Time to Restore | 45 min | Elite: <1 hour | ✅ Strong | Maintain |
          
          **Deep Dive: Lead Time Analysis**:
          ```sql
          -- Break down lead time by stage
          WITH stage_times AS (
            SELECT
              pr.pull_request_id,
              TIMESTAMPDIFF(HOUR, pr.created_at, pr.first_review_at) as time_to_first_review,
              TIMESTAMPDIFF(HOUR, pr.first_review_at, pr.approved_at) as time_to_approval,
              TIMESTAMPDIFF(HOUR, pr.approved_at, pr.merged_at) as time_to_merge,
              TIMESTAMPDIFF(HOUR, pr.merged_at, d.created_at) as time_to_deploy
            FROM github.pull_requests pr
            JOIN github.deployments d ON pr.merge_commit_sha = d.sha
            WHERE pr.merged_at >= DATE_SUB(CURRENT_DATE, INTERVAL 30 DAY)
          )
          SELECT
            AVG(time_to_first_review) as avg_hours_to_review,
            AVG(time_to_approval) as avg_hours_to_approval,
            AVG(time_to_merge) as avg_hours_to_merge,
            AVG(time_to_deploy) as avg_hours_to_deploy
          FROM stage_times;
          ```
          
          **Results**:
          - Time to first review: 8 hours (40% of lead time)
          - Time to approval: 10 hours (50% of lead time)
          - Time to merge: 1 hour (5% of lead time)
          - Time to deploy: 1 hour (5% of lead time)
          
          **Insight**: 90% of lead time is in code review. Focus here for improvement.
          
          ### 🎯 Improvement Recommendations
          
          **Priority 1: Reduce Code Review Time**
          - Implement automatic reviewer assignment
          - Set SLAs for review response (4 hours)
          - Create review priority queue
          - Target: Reduce review time from 18h to 8h
          
          **Priority 2: Maintain Deployment Excellence**
          - Continue current practices
          - Add deployment runbooks
          - Target: Maintain <1 hour deploy time
          
          **Priority 3: Incident Response**
          - Document common incident playbooks
          - Run incident response drills
          - Target: Maintain <1 hour MTTR
          
          ### 📋 Implementation Checklist
          
          **Week 1-2: Data Pipeline**
          - [ ] Set up data warehouse connection
          - [ ] Create dbt models for each metric
          - [ ] Validate data accuracy
          
          **Week 3-4: Dashboard**
          - [ ] Create Grafana dashboards
          - [ ] Add team-level breakdowns
          - [ ] Set up automated refresh
          
          **Week 5-6: Rollout**
          - [ ] Share with engineering leadership
          - [ ] Train teams on interpretation
          - [ ] Establish review cadence
          
          **Ongoing: Improvement**
          - [ ] Monthly metric reviews
          - [ ] Quarterly goal setting
          - [ ] Continuous refinement
        notes: "Complete DORA metrics implementation with SQL queries, dashboard design, and improvement recommendations"
    
    delegation:
      primary_model: "gpt-4o"
      secondary_model: "claude-sonnet-4"

          src/
          ├── i18n/
          │   ├── index.ts              # i18n initialization
          │   ├── config.ts             # Configuration
          │   └── utils.ts              # Helper functions
          ├── locales/                  # Source locale files
          │   ├── en/
          │   │   ├── common.json
          │   │   ├── auth.json
          │   │   └── dashboard.json
          │   ├── es/
          │   │   ├── common.json
          │   │   ├── auth.json
          │   │   └── dashboard.json
          │   └── [other languages...]
          └── components/
              └── LanguageSwitcher.tsx
          ```
          
          ### 🔧 Implementation
          
          **1. Install Dependencies**
          ```bash
          npm install react-i18next i18next i18next-http-backend
          npm install -D i18next-parser  # For string extraction
          ```
          
          **2. i18n Configuration** (`src/i18n/index.ts`)
          ```typescript
          import i18n from 'i18next';
          import { initReactI18next } from 'react-i18next';
          import HttpBackend from 'i18next-http-backend';
          
          import enCommon from '../locales/en/common.json';
          import enAuth from '../locales/en/auth.json';
          import esCommon from '../locales/es/common.json';
          import esAuth from '../locales/es/auth.json';
          // ... other imports
          
          const resources = {
            en: {
              common: enCommon,
              auth: enAuth,
            },
            es: {
              common: esCommon,
              auth: esAuth,
            },
            // ... other languages
          };
          
          i18n
            .use(HttpBackend)
            .use(initReactI18next)
            .init({
              resources,
              fallbackLng: 'en',
              defaultNS: 'common',
              interpolation: {
                escapeValue: false, // React already escapes
              },
              detection: {
                order: ['localStorage', 'navigator', 'htmlTag'],
                caches: ['localStorage'],
              },
            });
          
          export default i18n;
          ```
          
          **3. Locale File Structure** (`src/locales/en/common.json`)
          ```json
          {
            "app": {
              "name": "MyApp",
              "tagline": "The best app for {{purpose}}"
            },
            "navigation": {
              "home": "Home",
              "dashboard": "Dashboard",
              "settings": "Settings",
              "logout": "Log Out"
            },
            "actions": {
              "save": "Save",
              "cancel": "Cancel",
              "delete": "Delete",
              "confirm": "Confirm",
              "loading": "Loading..."
            },
            "errors": {
              "generic": "Something went wrong. Please try again.",
              "network": "Network error. Please check your connection.",
              "unauthorized": "You don't have permission to do that."
            },
            "validation": {
              "required": "{{field}} is required",
              "email": "Please enter a valid email address",
              "minLength": "{{field}} must be at least {{min}} characters",
              "maxLength": "{{field}} must be at most {{max}} characters"
            }
          }
          ```
          
          **4. Using Translations in Components**
          ```tsx
          import { useTranslation } from 'react-i18next';
          
          function Dashboard() {
            const { t, i18n } = useTranslation(['common', 'dashboard']);
            
            return (
              <div>
                <h1>{t('dashboard:title')}</h1>
                <p>{t('app:tagline', { purpose: 'productivity' })}</p>
                <button>{t('common:actions.save')}</button>
              </div>
            );
          }
          ```
          
          **5. Pluralization** (ICU Format)
          ```json
          {
            "items": {
              "count": "{{count}} item",
              "count_plural": "{{count}} items"
            },
            "notifications": {
              "new": "You have {{count}} new notification",
              "new_plural_0": "You have no new notifications",
              "new_plural_1": "You have one new notification",
              "new_plural_other": "You have {{count}} new notifications"
            }
          }
          ```
          
          ```tsx
          <p>{t('items:count', { count: 5 })}</p>
          // Output: "5 items"
          ```
          
          **6. Language Switcher Component**
          ```tsx
          function LanguageSwitcher() {
            const { i18n } = useTranslation();
            
            const languages = [
              { code: 'en', name: 'English', flag: '🇺🇸' },
              { code: 'es', name: 'Español', flag: '🇪🇸' },
              { code: 'fr', name: 'Français', flag: '🇫🇷' },
              { code: 'de', name: 'Deutsch', flag: '🇩🇪' },
              { code: 'ja', name: '日本語', flag: '🇯🇵' },
            ];
            
            return (
              <select
                value={i18n.language}
                onChange={(e) => i18n.changeLanguage(e.target.value)}
              >
                {languages.map((lang) => (
                  <option key={lang.code} value={lang.code}>
                    {lang.flag} {lang.name}
                  </option>
                ))}
              </select>
            );
          }
          ```
          
          ### 🔄 Translation Workflow
          
          **1. String Extraction** (i18next-parser)
          ```bash
          # Extract strings from code
          npx i18next-parser --config i18next-parser.config.js
          ```
          
          `i18next-parser.config.js`:
          ```javascript
          module.exports = {
            locales: ['en', 'es', 'fr', 'de', 'ja'],
            output: 'src/locales/$LOCALE/$NAMESPACE.json',
            input: ['src/**/*.{js,jsx,ts,tsx}'],
            sort: true,
            createOldCatalogs: false,
          };
          ```
          
          **2. Translation Management System (Phrase)**
          
          ```yaml
          # .phrase.yml
          phrase:
            project_id: your-project-id
            push:
              sources:
                - file: ./src/locales/en/*.json
                  params:
                    file_format: i18next
                    locale_id: en
            pull:
              targets:
                - file: ./src/locales/<locale_name>/*.json
                  params:
                    file_format: i18next
          ```
          
          **3. CI/CD Integration**
          ```yaml
          # .github/workflows/i18n.yml
          name: Localization
          
          on:
            push:
              branches: [main]
              paths:
                - 'src/locales/en/**'
          
          jobs:
            sync-translations:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                
                - name: Push source strings to Phrase
                  run: |
                    phrase push
                  env:
                    PHRASE_API_TOKEN: ${{ secrets.PHRASE_API_TOKEN }}
                
                - name: Pull translations
                  run: |
                    phrase pull
                  env:
                    PHRASE_API_TOKEN: ${{ secrets.PHRASE_API_TOKEN }}
                
                - name: Create PR with updated translations
                  uses: peter-evans/create-pull-request@v5
                  with:
                    title: 'Update translations'
                    branch: 'update-translations'
          ```
          
          ### ✅ Quality Assurance
          
          **1. Pseudolocalization Testing**
          ```bash
          npm install pseudo-localization
          
          # Test with pseudolocale
          npx pseudo-localization --source src/locales/en --target src/locales/xx
          ```
          
          **2. Translation Validation**
          ```javascript
          // scripts/validate-translations.js
          const fs = require('fs');
          const path = require('path');
          
          function validateTranslations() {
            const en = JSON.parse(fs.readFileSync('src/locales/en/common.json'));
            const errors = [];
            
            ['es', 'fr', 'de', 'ja'].forEach((lang) => {
              const translations = JSON.parse(
                fs.readFileSync(`src/locales/${lang}/common.json`)
              );
              
              // Check for missing keys
              function checkKeys(source, target, prefix = '') {
                Object.keys(source).forEach((key) => {
                  const fullKey = prefix ? `${prefix}.${key}` : key;
                  if (!(key in target)) {
                    errors.push(`Missing key in ${lang}: ${fullKey}`);
                  } else if (typeof source[key] === 'object') {
                    checkKeys(source[key], target[key], fullKey);
                  }
                });
              }
              
              checkKeys(en, translations);
            });
            
            if (errors.length > 0) {
              console.error('Translation validation failed:');
              errors.forEach((e) => console.error(`  - ${e}`));
              process.exit(1);
            }
            
            console.log('✅ All translations validated');
          }
          
          validateTranslations();
          ```
          
          **3. Text Expansion Testing**
          ```css
          /* Test with longer text */
          [lang="de"] .button {
            /* German text can be 30% longer */
            min-width: auto;
            white-space: normal;
          }
          ```
          
          ### 📋 Key Naming Conventions
          
          ```
          feature:subfeature:element:variant
          
          Examples:
          - auth:login:submit_button
          - dashboard:widgets:weather:title
          - settings:profile:form:email:label
          - errors:network:retry_message
          ```
        notes: "Complete React i18n setup with extraction, TMS integration, and quality checks"
    

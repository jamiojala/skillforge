    examples:
      - name: "A/B Test Design for Checkout Flow"
        user: "We want to test a new checkout flow. We currently have 1,000 daily checkout starts. How do we design this experiment properly?"
        ai_response: |
          ## A/B Test Design: Checkout Flow Optimization
          
          ### 🎯 Experiment Design
          
          **Hypothesis**: The new checkout flow will increase conversion rate by at least 10% (from 15% to 16.5%)
          
          **Primary Metric**: Checkout completion rate
          **Secondary Metrics**: 
          - Revenue per visitor
          - Time to complete checkout
          - Cart abandonment rate
          
          **Guardrail Metrics**:
          - Error rate (must not increase >20%)
          - Support tickets (must not increase >15%)
          - Page load time (must not increase >100ms)
          
          ### 📊 Statistical Setup
          
          **Sample Size Calculation**:
          ```python
          from scipy import stats
          
          # Parameters
          baseline_rate = 0.15  # Current conversion rate
          mde = 0.015  # Minimum detectable effect (1.5% absolute)
          alpha = 0.05  # Significance level
          power = 0.80  # Statistical power
          
          # Calculate required sample size per variant
          p1 = baseline_rate
          p2 = baseline_rate + mde
          p_pooled = (p1 + p2) / 2
          
          z_alpha = stats.norm.ppf(1 - alpha/2)
          z_beta = stats.norm.ppf(power)
          
          n = (
              (2 * p_pooled * (1 - p_pooled) * (z_alpha + z_beta)**2) /
              (p2 - p1)**2
          )
          
          print(f"Required sample per variant: {int(n):,}")
          print(f"Total sample needed: {int(n * 2):,}")
          
          # With 1,000 daily checkout starts
          days_needed = int(n * 2 / 1000) + 1
          print(f"Estimated duration: {days_needed} days")
          ```
          
          **Result**: Need ~29,000 users per variant (58,000 total) → **~58 days** at current traffic
          
          **Recommendation**: 
          - Increase MDE to 2% absolute (15% → 17%) → 14,500 per variant → **29 days**
          - Or run at 90% power → 11,600 per variant → **23 days**
          
          ### 🔧 Implementation
          
          **Randomization Strategy**:
          ```python
          import hashlib
          
          def assign_variant(user_id: str, experiment_id: str) -> str:
              """
              Deterministic assignment based on user_id + experiment_id
              Ensures same user always gets same variant
              """
              hash_input = f"{user_id}:{experiment_id}"
              hash_value = int(hashlib.md5(hash_input.encode()).hexdigest(), 16)
              
              # 50/50 split
              if hash_value % 100 < 50:
                  return "control"
              return "treatment"
          ```
          
          **Feature Flag Setup** (LaunchDarkly):
          ```python
          import ldclient
          
          def get_checkout_flow(user_id: str):
              context = ldclient.Context.builder(user_id).build()
              
              # Check if user is in experiment
              if ldclient.get().variation(
                  "new-checkout-flow", 
                  context, 
                  False
              ):
                  return NewCheckoutFlow()
              return CurrentCheckoutFlow()
          ```
          
          ### ⚠️ Guardrails & Monitoring
          
          **Sample Ratio Mismatch (SRM) Check**:
          ```python
          from scipy.stats import chisquare
          
          def check_srm(control_count: int, treatment_count: int):
              """Detect if randomization is broken"""
              expected = (control_count + treatment_count) / 2
              chi2, p_value = chisquare(
                  [control_count, treatment_count],
                  [expected, expected]
              )
              
              if p_value < 0.001:  # SRM detected
                  alert("Sample Ratio Mismatch detected! Stop experiment.")
                  return False
              return True
          ```
          
          **Real-time Dashboard Metrics**:
          - Variant assignment counts (check SRM hourly)
          - Guardrail metrics (alert if thresholds exceeded)
          - Primary metric (for monitoring, not decision-making)
          
          ### 📈 Analysis Plan
          
          **Statistical Test**: Two-proportion z-test
          
          ```python
          from statsmodels.stats.proportion import proportions_ztest
          
          def analyze_experiment(control_conversions, control_total,
                                treatment_conversions, treatment_total):
              
              counts = [control_conversions, treatment_conversions]
              nobs = [control_total, treatment_total]
              
              z_stat, p_value = proportions_ztest(counts, nobs)
              
              # Calculate relative lift
              control_rate = control_conversions / control_total
              treatment_rate = treatment_conversions / treatment_total
              relative_lift = (treatment_rate - control_rate) / control_rate
              
              # Confidence interval
              from statsmodels.stats.proportion import proportion_confint
              ci_low, ci_high = proportion_confint(
                  treatment_conversions, treatment_total, alpha=0.05
              )
              
              return {
                  'p_value': p_value,
                  'relative_lift': relative_lift,
                  'ci_95': (ci_low, ci_high),
                  'significant': p_value < 0.05
              }
          ```
          
          ### 📋 Results Template
          
          | Metric | Control | Treatment | Lift | p-value | Significant |
          |--------|---------|-----------|------|---------|-------------|
          | Conversion Rate | 15.2% | 16.8% | +10.5% | 0.023 | ✅ Yes |
          | Revenue/Visitor | $12.50 | $13.80 | +10.4% | 0.031 | ✅ Yes |
          | Avg Order Value | $82.30 | $82.10 | -0.2% | 0.891 | No |
          
          **Decision**: ✅ **Ship treatment** - Statistically significant improvement in primary metric with no guardrail violations.
        notes: "Complete A/B test design with sample size calculation, implementation, and analysis plan"
      
      - name: "Feature Flagging Architecture"
        user: "We need to build a feature flagging system for safe rollouts and experiments. What's the architecture?"
        ai_response: |
          ## Feature Flagging Architecture
          
          ### 🏗️ System Components
          
          ```
          ┌─────────────────────────────────────────────────────────────┐
          │                    Feature Flag Service                      │
          ├─────────────────────────────────────────────────────────────┤
          │  ┌──────────────┐  ┌──────────────┐  ┌──────────────┐      │
          │  │   Flag Store │  │   Rules      │  │   Targeting  │      │
          │  │   (Config)   │  │   Engine     │  │   Engine     │      │
          │  └──────────────┘  └──────────────┘  └──────────────┘      │
          └─────────────────────────────────────────────────────────────┘
                              │
              ┌───────────────┼───────────────┐
              ▼               ▼               ▼
          ┌──────────┐   ┌──────────┐   ┌──────────┐
          │  Web App │   │ Mobile   │   │  Backend │
          │  (SDK)   │   │  (SDK)   │   │  (SDK)   │
          └──────────┘   └──────────┘   └──────────┘
          ```
          
          ### 📊 Flag Configuration Schema
          
          ```json
          {
            "flags": {
              "new-dashboard": {
                "key": "new-dashboard",
                "name": "New Dashboard UI",
                "description": "Redesigned dashboard with widgets",
                "variations": {
                  "control": false,
                  "treatment": true
                },
                "defaultVariation": "control",
                "rules": [
                  {
                    "name": "Beta Users",
                    "condition": {
                      "and": [
                        {"attribute": "user.beta", "op": "in", "values": [true]},
                        {"attribute": "user.plan", "op": "in", "values": ["pro", "enterprise"]}
                      ]
                    },
                    "variation": "treatment"
                  },
                  {
                    "name": "Gradual Rollout",
                    "condition": {
                      "attribute": "user.id",
                      "op": "percentRollout",
                      "value": 10
                    },
                    "variation": "treatment"
                  }
                ],
                "metadata": {
                  "owner": "product-team",
                  "createdAt": "2024-01-15",
                  "expiresAt": "2024-04-15"
                }
              }
            }
          }
          ```
          
          ### 🔧 SDK Implementation
          
          ```python
          # flag_sdk/client.py
          class FeatureFlagClient:
              def __init__(self, api_key: str, options: dict = None):
                  self.api_key = api_key
                  self.options = options or {}
                  self._cache = {}
                  self._refresh_interval = options.get('refresh_interval', 60)
                  
              def get_flag(self, flag_key: str, context: dict, default=None):
                  """Get flag value for context"""
                  flag = self._get_flag_config(flag_key)
                  if not flag:
                      return default
                      
                  # Evaluate rules in order
                  for rule in flag.get('rules', []):
                      if self._evaluate_condition(rule['condition'], context):
                          return flag['variations'][rule['variation']]
                  
                  # Return default
                  return flag['variations'][flag['defaultVariation']]
              
              def _evaluate_condition(self, condition: dict, context: dict) -> bool:
                  """Evaluate a condition against context"""
                  op = condition.get('op')
                  
                  if op == 'and':
                      return all(
                          self._evaluate_condition(c, context) 
                          for c in condition['and']
                      )
                  elif op == 'in':
                      attr_value = context.get(condition['attribute'])
                      return attr_value in condition['values']
                  elif op == 'percentRollout':
                      user_id = context.get('user.id', '')
                      rollout_key = f"{condition.get('flag_key')}:{user_id}"
                      hash_val = hash(rollout_key) % 100
                      return hash_val < condition['value']
                  
                  return False
          ```
          
          ### 🚀 Rollout Strategies
          
          **1. Kill Switch**
          ```python
          # Instant off switch for emergencies
          if flags.get('new-feature', user, default=False):
              try:
                  return new_feature()
              except Exception as e:
                  logger.error(f"New feature failed: {e}")
                  # Fall back to old feature
                  return old_feature()
          ```
          
          **2. Gradual Rollout**
          ```python
          # Start at 1%, increase by 10% daily
          rollout_percent = min(1 + (days_since_launch * 10), 100)
          
          if flags.get('new-feature', user, rollout_percent=rollout_percent):
              return new_feature()
          ```
          
          **3. Targeted Rollout**
          ```python
          # Beta users first, then by plan tier
          if user.is_beta or user.plan in ['pro', 'enterprise']:
              return new_feature()
          ```
          
          ### 📊 Monitoring & Alerting
          
          **Metrics to Track**:
          - Flag evaluation latency (p50, p95, p99)
          - Flag fetch success rate
          - Cache hit rate
          - Flag configuration changes
          
          **Alerts**:
          - Flag evaluation latency > 50ms
          - Flag fetch failure rate > 1%
          - Flag without owner > 30 days
          - Flag enabled for > 90 days (cleanup reminder)
          
          ### 🧹 Flag Lifecycle
          
          ```
          Draft → Testing → Gradual Rollout → Full Rollout → Deprecated → Removed
          ```
          
          **Cleanup Policy**:
          - Flags in "Full Rollout" for > 30 days → Remove from code
          - Flags "Deprecated" for > 14 days → Archive config
          - Monthly audit of all flags
        notes: "Complete feature flagging architecture with SDK implementation and rollout strategies"
    

        - "Scenario planning"
      code_style:
        language: "markdown"
        comments: "inline"
        examples: "always"
    
    examples:
      - name: "Q1 Product Roadmap with OKRs"
        user: "I need to create a Q1 roadmap for our B2B SaaS product. Our company goal is to reduce churn by 20%. Can you help me structure this?"
        ai_response: |
          ## Q1 Product Roadmap: Churn Reduction Focus
          
          ### 🎯 Strategic Context
          **Company Goal**: Reduce churn by 20% in Q1
          **Product Vision**: Become the most indispensable tool in our customers' workflow
          
          ### 📊 OKR Framework
          
          **Objective 1: Make onboarding effortless**
          *Key Results:*
          - KR1: Increase Day-7 activation from 45% to 65%
          - KR2: Reduce time-to-first-value from 3 days to <1 day
          - KR3: Achieve 4.5+ onboarding NPS
          
          **Objective 2: Deliver continuous value**
          *Key Results:*
          - KR1: Increase weekly active users from 60% to 75%
          - KR2: Launch 3 high-requested features (usage >40%)
          - KR3: Reduce support tickets by 30%
          
          **Objective 3: Proactively address at-risk customers**
          *Key Results:*
          - KR1: Build churn prediction model (80%+ accuracy)
          - KR2: Implement automated health scoring
          - KR3: Reduce at-risk customer churn by 35%
          
          ### 🗺️ Roadmap Structure
          
          | Initiative | Objective | Impact | Confidence | Effort | RICE | Timeline |
          |------------|-----------|--------|------------|--------|------|----------|
          | Onboarding wizard redesign | O1 | 8 | 7 | M | 18.7 | Jan |
          | In-app feature discovery | O1 | 7 | 8 | S | 37.3 | Jan |
          | Quick-start templates | O1 | 6 | 9 | S | 54.0 | Feb |
          | Usage analytics dashboard | O2 | 8 | 8 | M | 21.3 | Feb |
          | Top 3 requested features | O2 | 9 | 7 | L | 12.6 | Jan-Mar |
          | Self-service help center | O2 | 7 | 9 | M | 21.0 | Feb |
          | Churn prediction ML model | O3 | 9 | 6 | L | 10.8 | Jan-Feb |
          | Automated health alerts | O3 | 8 | 8 | M | 21.3 | Mar |
          | CSM playbook integration | O3 | 7 | 9 | S | 42.0 | Mar |
          
          *RICE = (Reach × Impact × Confidence) / Effort*
          
          ### 📋 Top Initiative Details
          
          **Onboarding Wizard Redesign**
          - **Outcome**: Day-7 activation increases from 45% to 65%
          - **Output**: 5-step guided onboarding with progress indicator
          - **Success Metrics**: Activation rate, completion rate, time-to-complete
          - **Owner**: Sarah (Product), Alex (Design)
          - **Confidence**: 70% (based on competitor analysis + user research)
          
          **Churn Prediction Model**
          - **Outcome**: Identify at-risk customers 30 days before churn
          - **Output**: ML model + dashboard for CSMs
          - **Success Metrics**: Model accuracy, precision, recall
          - **Owner**: Mike (Data), Lisa (Product)
          - **Confidence**: 60% (new capability, limited historical data)
          
          ### ⚠️ Risks & Mitigations
          
          | Risk | Impact | Likelihood | Mitigation |
          |------|--------|------------|------------|
          | ML model accuracy low | High | Medium | Start with rule-based scoring |
          | Engineering capacity | High | Medium | Prioritize, defer lower RICE items |
          | Feature adoption low | Medium | Low | Build with users, beta program |
          
          ### 📣 Communication Plan
          
          **Weekly**: Team standup - progress against OKRs
          **Bi-weekly**: Leadership update - key metrics + blockers
          **Monthly**: All-hands - wins, learnings, adjustments
          **Quarter-end**: Retrospective + Q2 planning kickoff
        notes: "Complete OKR-aligned roadmap with prioritization framework and communication plan"
      
      - name: "Feature Prioritization Framework"
        user: "We have 50+ feature requests and limited engineering capacity. How do we prioritize what to build?"
        ai_response: |
          ## Feature Prioritization Framework
          
          ### 📊 RICE Scoring
          
          **Formula**: RICE = (Reach × Impact × Confidence) / Effort
          
          | Factor | Scale | Questions to Ask |
          |--------|-------|------------------|
          | **Reach** | 1-10 | How many users will this affect in a quarter? |
          | **Impact** | 0.25-3 | How much will this impact each user? (3=massive, 2=high, 1=medium, 0.25=low) |
          | **Confidence** | 0-100% | How confident are we in our estimates? |
          | **Effort** | Person-months | How much engineering time required? |
          
          ### 📋 Example Prioritization
          
          | Feature | Reach | Impact | Confidence | Effort | RICE | Priority |
          |---------|-------|--------|------------|--------|------|----------|
          | Dark mode | 8 | 1 | 90% | 0.5 | 14.4 | P1 |
          | API webhooks | 3 | 3 | 70% | 2 | 3.15 | P2 |
          | SSO (SAML) | 2 | 3 | 80% | 3 | 1.6 | P3 |
          | Mobile app | 10 | 2 | 50% | 6 | 1.67 | P3 |
          | Bulk actions | 6 | 2 | 85% | 1 | 10.2 | P1 |
          
          ### 🎯 Alternative Frameworks
          
          **Value vs. Effort Matrix**
          ```
          High Value │ Quick Wins │ Big Bets
                     │            │
          ───────────┼────────────┼──────────
                     │            │
          Low Value  │ Fill-ins   │ Avoid
                     │            │
                     Low Effort   High Effort
          ```
          
          **Kano Model Categories**
          - **Must-haves**: Expected, don't delight (table stakes)
          - **Performance**: More = better (linear satisfaction)
          - **Delighters**: Unexpected, high satisfaction
          - **Indifferent**: Don't affect satisfaction
          - **Reverse**: Some users dislike
          
          ### 🔄 Prioritization Process
          
          **Step 1: Gather Input**
          - Customer feedback (support tickets, NPS, interviews)
          - Sales requests (deals blocked, competitive gaps)
          - Engineering input (tech debt, architecture)
          - Leadership priorities (strategy alignment)
          
          **Step 2: Score Each Feature**
          - Product team scores independently
          - Discuss and align on scores
          - Document assumptions
          
          **Step 3: Review with Stakeholders**
          - Share ranked list
          - Gather feedback
          - Adjust based on new information
          
          **Step 4: Finalize and Communicate**
          - Lock in priorities for the quarter
          - Communicate to all teams
          - Set expectations for next review
          
          ### ⚠️ Common Pitfalls
          
          - **HiPPO effect**: Highest Paid Person's Opinion overrides data
          - **Recency bias**: Recent requests seem more important
          - **Squeaky wheel**: Loud customers get priority
          - **Tech debt neglect**: Always prioritize features over maintenance
          
          **Mitigation**: Use framework consistently, document rationale, review quarterly
        notes: "Comprehensive prioritization framework with RICE scoring and process guidance"
    
    delegation:
      primary_model: "claude-sonnet-4"
      secondary_model: "gpt-4o"
      fallback_model: "claude-haiku"
    
    validation:
      hooks:

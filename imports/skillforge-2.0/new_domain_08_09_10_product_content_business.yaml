                - uses: actions/checkout@v4
                  with:
                    fetch-depth: 0  # For git revision date
                
                - name: Set up Python
                  uses: actions/setup-python@v5
                  with:
                    python-version: '3.11'
                
                - name: Install dependencies
                  run: |
                    pip install -r requirements-docs.txt
                
                - name: Lint markdown
                  run: |
                    npm install -g markdownlint-cli
                    markdownlint docs/**/*.md
                
                - name: Check links
                  run: |
                    pip install linkchecker
                    mkdocs build
                    linkchecker site/
                
                - name: Build documentation
                  run: mkdocs build --strict
                
                - name: Deploy to GitHub Pages
                  if: github.ref == 'refs/heads/main'
                  uses: peaceiris/actions-gh-pages@v3
                  with:
                    github_token: ${{ secrets.GITHUB_TOKEN }}
                    publish_dir: ./site
          ```
          
          **4. Quality Checks**
          
          Create `.markdownlint.json`:
          ```json
          {
            "default": true,
            "MD013": false,  // Line length
            "MD024": false,  // Duplicate headers
            "MD033": false   // Inline HTML
          }
          ```
          
          **5. Documentation Template** (`docs/getting-started.md`)
          ```markdown
          # Getting Started
          
          Welcome! This guide will help you get up and running with My API in minutes.
          
          ## Prerequisites
          
          - Python 3.8 or higher
          - pip package manager
          
          ## Installation
          
          ```bash
          pip install myapi
          ```
          
          ## Quick Start
          
          ```python
          from myapi import Client
          
          # Initialize client
          client = Client(api_key="your-api-key")
          
          # Make your first request
          response = client.users.list()
          print(response)
          ```
          
          !!! tip "Need help?"
              Check out our [Tutorials](tutorials/index.md) for more detailed guides.
          ```
          
          ### 📋 Workflow
          
          **For Writers:**
          1. Create branch: `git checkout -b docs/update-getting-started`
          2. Edit docs locally: `mkdocs serve` (live reload)
          3. Commit and push: `git commit -m "docs: update getting started"`
          4. Open PR for review
          5. Merge triggers auto-deployment
          
          **For Reviewers:**
          - Check content accuracy
          - Verify code examples work
          - Ensure style consistency
          - Approve and merge
          
          ### 🚀 Deployment
          
          - **Production**: Auto-deploy on merge to `main`
          - **Preview**: Netlify deploy previews for PRs
          - **Versioning**: Use mike for versioned docs
          
          ### 📈 Maintenance
          
          - Monthly: Review and update outdated content
          - Quarterly: Analyze search analytics
          - Continuous: Monitor for broken links
        notes: "Complete MkDocs pipeline with CI/CD, quality checks, and workflow documentation"
      
      - name: "Documentation Testing Strategy"
        user: "How do we ensure our code examples in documentation actually work and stay up to date?"
        ai_response: |
          ## Documentation Testing Strategy
          
          ### 🎯 Testing Approach
          
          Code examples in docs should be tested just like production code. Here's a comprehensive strategy:
          
          ### 🔧 Implementation
          
          **1. Code Block Extraction**
          
          Create a script to extract code blocks from Markdown:
          
          ```python
          # scripts/extract_code_blocks.py
          import re
          import json
          from pathlib import Path
          
          def extract_code_blocks(markdown_file):
              """Extract fenced code blocks from markdown"""
              content = Path(markdown_file).read_text()
              
              # Pattern for fenced code blocks
              pattern = r'```(\w+)\n(.*?)```'
              matches = re.findall(pattern, content, re.DOTALL)
              
              code_blocks = []
              for lang, code in matches:
                  if lang in ['python', 'javascript', 'bash']:
                      code_blocks.append({
                          'language': lang,
                          'code': code.strip(),
                          'source_file': markdown_file
                      })
              
              return code_blocks
          
          # Extract from all docs
          for md_file in Path('docs').rglob('*.md'):
              blocks = extract_code_blocks(md_file)
              # Save for testing
          ```
          
          **2. Testable Code Examples**
          
          Mark testable examples with special comments:
          
          ````markdown
          ```python
          # testable-example: basic-usage
          from myapi import Client
          
          client = Client(api_key="test-key")  # doctest: +SKIP
          users = client.users.list()
          assert len(users) >= 0  # doctest: +SKIP
          ```
          ````
          
          **3. Doctest Integration**
          
          For Python, use doctest:
          
          ```python
          # In your Python module
          def calculate_total(items):
              """
              Calculate total price of items.
              
              Example:
                  >>> items = [{'price': 10}, {'price': 20}]
                  >>> calculate_total(items)
                  30
              """
              return sum(item['price'] for item in items)
          ```
          
          Run with: `python -m doctest your_module.py -v`
          
          **4. Custom Test Runner**
          
          ```python
          # scripts/test_code_examples.py
          import subprocess
          import tempfile
          from pathlib import Path
          
          def test_python_example(code, test_name):
              """Test a Python code example"""
              with tempfile.NamedTemporaryFile(
                  mode='w', 
                  suffix='.py', 
                  delete=False
              ) as f:
                  f.write(code)
                  f.flush()
                  
                  result = subprocess.run(
                      ['python', f.name],
                      capture_output=True,
                      text=True,
                      timeout=30
                  )
                  
                  if result.returncode != 0:
                      print(f"❌ {test_name} failed:")
                      print(result.stderr)
                      return False
                  
                  print(f"✅ {test_name} passed")
                  return True
          
          # Test all extracted examples
          for example in extracted_examples:
              if example['language'] == 'python':
                  test_python_example(example['code'], example['name'])
          ```
          
          **5. CI Integration**
          
          Add to your docs workflow:
          
          ```yaml
          # .github/workflows/docs.yml
          jobs:
            test-examples:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                
                - name: Set up Python
                  uses: actions/setup-python@v5
                  with:
                    python-version: '3.11'
                
                - name: Install package
                  run: pip install -e .
                
                - name: Extract code examples
                  run: python scripts/extract_code_blocks.py
                
                - name: Test Python examples
                  run: python scripts/test_code_examples.py
                
                - name: Run doctests
                  run: python -m doctest src/**/*.py -v
          ```
          
          **6. API Example Testing**
          
          For API documentation, use contract testing:
          
          ```python
          # tests/test_api_examples.py
          import requests
          import pytest
          
          API_BASE = "http://localhost:8000"
          
          def test_list_users_example():
              """Test the 'List Users' example from docs"""
              response = requests.get(f"{API_BASE}/users")
              
              assert response.status_code == 200
              data = response.json()
              assert 'users' in data
              assert isinstance(data['users'], list)
          
          def test_create_user_example():
              """Test the 'Create User' example from docs"""
              payload = {
                  "name": "Test User",
                  "email": "test@example.com"
              }
              response = requests.post(
                  f"{API_BASE}/users",
                  json=payload
              )
              
              assert response.status_code == 201
              data = response.json()
              assert data['name'] == payload['name']
          ```
          
          ### 📊 Testing Coverage
          
          Track which examples are tested:
          
          | Document | Code Blocks | Tested | Coverage |
          |----------|-------------|--------|----------|
          | getting-started.md | 5 | 5 | 100% |
          | api-reference.md | 12 | 10 | 83% |
          | tutorials/quickstart.md | 8 | 6 | 75% |
          
          ### 🎯 Best Practices
          
          1. **Mark non-testable examples**: Use `# not-testable` comment
          2. **Use test fixtures**: Mock external dependencies
          3. **Keep examples simple**: One concept per example
          4. **Version examples**: Test against multiple API versions
          5. **Fail CI on broken examples**: Don't allow merging
        notes: "Comprehensive strategy for testing documentation code examples"
    

          ### Implementation

          ```python
          from typing import List, Dict, Optional
          from dataclasses import dataclass
          import numpy as np
          from sentence_transformers import SentenceTransformer

          @dataclass
          class RAGEvaluationResult:
              query: str
              retrieved_contexts: List[str]
              generated_answer: str
              ground_truth_answer: Optional[str]
              metrics: Dict[str, float]

          class RAGEvaluator:
              def __init__(self, embedding_model: str = "all-MiniLM-L6-v2"):
                  self.embedding_model = SentenceTransformer(embedding_model)

              async def evaluate(
                  self,
                  query: str,
                  retrieved_contexts: List[str],
                  generated_answer: str,
                  ground_truth_contexts: Optional[List[str]] = None,
                  ground_truth_answer: Optional[str] = None
              ) -> RAGEvaluationResult:
                  """Evaluate RAG system output"""

                  metrics = {}

                  # Retrieval metrics
                  if ground_truth_contexts:
                      metrics["context_precision"] = self._context_precision(
                          retrieved_contexts, ground_truth_contexts
                      )
                      metrics["context_recall"] = self._context_recall(
                          retrieved_contexts, ground_truth_contexts
                      )
                      metrics["context_mrr"] = self._context_mrr(
                          retrieved_contexts, ground_truth_contexts
                      )

                  # Generation metrics
                  metrics["faithfulness"] = await self._faithfulness(
                      generated_answer, retrieved_contexts
                  )
                  metrics["answer_relevance"] = await self._answer_relevance(
                      query, generated_answer
                  )

                  # End-to-end metrics
                  if ground_truth_answer:
                      metrics["answer_correctness"] = await self._answer_correctness(
                          generated_answer, ground_truth_answer
                      )

                  return RAGEvaluationResult(
                      query=query,
                      retrieved_contexts=retrieved_contexts,
                      generated_answer=generated_answer,
                      ground_truth_answer=ground_truth_answer,
                      metrics=metrics
                  )

              def _context_precision(
                  self,
                  retrieved: List[str],
                  ground_truth: List[str]
              ) -> float:
                  """Calculate context precision"""

                  if not retrieved:
                      return 0.0

                  # Encode contexts
                  retrieved_emb = self.embedding_model.encode(retrieved)
                  ground_truth_emb = self.embedding_model.encode(ground_truth)

                  # Check each retrieved context against ground truth
                  relevant_count = 0
                  for ret_vec in retrieved_emb:
                      similarities = np.dot(ground_truth_emb, ret_vec)
                      if np.max(similarities) > 0.8:  # Threshold for relevance
                          relevant_count += 1

                  return relevant_count / len(retrieved)

              def _context_recall(
                  self,
                  retrieved: List[str],
                  ground_truth: List[str]
              ) -> float:
                  """Calculate context recall"""

                  if not ground_truth:
                      return 1.0

                  retrieved_emb = self.embedding_model.encode(retrieved)
                  ground_truth_emb = self.embedding_model.encode(ground_truth)

                  # Check each ground truth context was retrieved
                  retrieved_count = 0
                  for gt_vec in ground_truth_emb:
                      similarities = np.dot(retrieved_emb, gt_vec)
                      if np.max(similarities) > 0.8:
                          retrieved_count += 1

                  return retrieved_count / len(ground_truth)

              def _context_mrr(
                  self,
                  retrieved: List[str],
                  ground_truth: List[str]
              ) -> float:
                  """Calculate Mean Reciprocal Rank"""

                  retrieved_emb = self.embedding_model.encode(retrieved)
                  ground_truth_emb = self.embedding_model.encode(ground_truth)

                  # Find rank of first relevant context
                  for rank, ret_vec in enumerate(retrieved_emb, 1):
                      similarities = np.dot(ground_truth_emb, ret_vec)
                      if np.max(similarities) > 0.8:
                          return 1.0 / rank

                  return 0.0

              async def _faithfulness(
                  self,
                  answer: str,
                  contexts: List[str]
              ) -> float:
                  """Calculate answer faithfulness to context"""

                  # Extract claims from answer
                  claims = await self._extract_claims(answer)

                  if not claims:
                      return 1.0

                  # Check each claim against context
                  supported_count = 0
                  context_text = " ".join(contexts)

                  for claim in claims:
                      is_supported = await self._verify_claim(claim, context_text)
                      if is_supported:
                          supported_count += 1

                  return supported_count / len(claims)

              async def _extract_claims(self, text: str) -> List[str]:
                  """Extract factual claims from text"""

                  prompt = f"""
                  Extract all factual claims from this text. Return as a JSON list.

                  Text: {text}

                  Claims:
                  """

                  response = await self.llm.generate(
                      prompt,
                      response_format={"type": "json_object"}
                  )

                  return json.loads(response).get("claims", [])

              async def _verify_claim(self, claim: str, context: str) -> bool:
                  """Verify if claim is supported by context"""

                  prompt = f"""
                  Is the following claim supported by the context?

                  Claim: {claim}

                  Context: {context}

                  Answer with only "yes" or "no".
                  """

                  response = await self.llm.generate(prompt, temperature=0.0)
                  return "yes" in response.lower()

              async def _answer_relevance(
                  self,
                  query: str,
                  answer: str
              ) -> float:
                  """Calculate answer relevance to query"""

                  # Encode query and answer
                  query_emb = self.embedding_model.encode([query])[0]
                  answer_emb = self.embedding_model.encode([answer])[0]

                  # Calculate cosine similarity
                  similarity = np.dot(query_emb, answer_emb) / (
                      np.linalg.norm(query_emb) * np.linalg.norm(answer_emb)
                  )

                  return float(similarity)

              async def _answer_correctness(
                  self,
                  generated: str,
                  ground_truth: str
              ) -> float:
                  """Calculate answer correctness"""

                  # Use LLM to judge correctness
                  prompt = f"""
                  Rate the correctness of the generated answer compared to the ground truth.

                  Ground Truth: {ground_truth}

                  Generated Answer: {generated}

                  Rate from 0 to 1, where:
                  - 1.0: Perfectly correct
                  - 0.5: Partially correct
                  - 0.0: Completely incorrect

                  Score (0-1):
                  """

                  response = await self.llm.generate(prompt, temperature=0.0)

                  try:
                      return float(response.strip())
                  except:
                      return 0.0

          class RAGBenchmark:
              """Run benchmark evaluation on test set"""

              def __init__(self, evaluator: RAGEvaluator):
                  self.evaluator = evaluator

              async def run_benchmark(
                  self,
                  test_cases: List[Dict],
                  rag_system
              ) -> Dict:
                  """Run full benchmark evaluation"""

                  results = []

                  for case in test_cases:
                      # Run RAG system
                      rag_output = await rag_system.query(case["query"])

                      # Evaluate
                      eval_result = await self.evaluator.evaluate(
                          query=case["query"],
                          retrieved_contexts=rag_output["contexts"],
                          generated_answer=rag_output["answer"],
                          ground_truth_contexts=case.get("relevant_contexts"),
                          ground_truth_answer=case.get("ground_truth_answer")
                      )

                      results.append(eval_result)

                  # Aggregate metrics
                  aggregated = self._aggregate_metrics(results)

                  return {
                      "overall_metrics": aggregated,
                      "individual_results": results,
                      "summary": self._generate_summary(aggregated)
                  }

              def _aggregate_metrics(self, results: List[RAGEvaluationResult]) -> Dict:
                  """Aggregate metrics across all results"""

                  all_metrics = {}

                  # Collect all metric values
                  for result in results:
                      for metric, value in result.metrics.items():
                          if metric not in all_metrics:
                              all_metrics[metric] = []
                          all_metrics[metric].append(value)

                  # Calculate statistics
                  aggregated = {}
                  for metric, values in all_metrics.items():
                      aggregated[metric] = {
                          "mean": np.mean(values),
                          "median": np.median(values),
                          "std": np.std(values),
                          "min": np.min(values),
                          "max": np.max(values),
                      }

                  return aggregated

              def _generate_summary(self, aggregated: Dict) -> str:
                  """Generate human-readable summary"""

                  lines = ["RAG Evaluation Summary", "=" * 40]

                  for metric, stats in aggregated.items():
                      lines.append(f"{metric}:")
                      lines.append(f"  Mean: {stats['mean']:.3f}")
                      lines.append(f"  Median: {stats['median']:.3f}")
                      lines.append(f"  Std: {stats['std']:.3f}")
                      lines.append("")

                  return "\n".join(lines)
          ```

          ### Benchmark Dataset Creation

          ```python
          class BenchmarkDatasetBuilder:
              """Create evaluation benchmark dataset"""

              async def create_benchmark(
                  self,
                  documents: List[str],
                  num_questions: int = 100
              ) -> List[Dict]:
                  """Create benchmark from documents"""

                  test_cases = []

                  for doc in documents:
                      # Generate questions from document
                      questions = await self._generate_questions(doc, n=3)

                      for question in questions:
                          test_case = {
                              "query": question["question"],
                              "ground_truth_answer": question["answer"],
                              "relevant_contexts": [doc],
                              "question_type": question["type"]
                          }
                          test_cases.append(test_case)

                      if len(test_cases) >= num_questions:
                          break

                  return test_cases[:num_questions]

              async def _generate_questions(self, document: str, n: int = 3) -> List[Dict]:
                  """Generate questions from document"""

                  prompt = f"""
                  Generate {n} diverse questions that can be answered from this document.
                  Include: factual, inferential, and comparative questions.

                  Document: {document[:2000]}

                  Return as JSON list with fields: question, answer, type
                  """

                  response = await self.llm.generate(
                      prompt,
                      response_format={"type": "json_object"}
                  )

                  return json.loads(response).get("questions", [])
          ```


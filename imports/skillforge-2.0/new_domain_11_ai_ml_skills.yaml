          ### Implementation

          ```python
          from typing import List, Dict, Tuple
          import numpy as np
          from dataclasses import dataclass

          @dataclass
          class SearchResult:
              doc_id: str
              score: float
              source: str  # 'bm25', 'dense', 'sparse'
              metadata: Dict

          class HybridSearch:
              def __init__(
                  self,
                  bm25_index,
                  dense_index,
                  sparse_index,
                  fusion_method: str = "rrf"
              ):
                  self.bm25 = bm25_index
                  self.dense = dense_index
                  self.sparse = sparse_index
                  self.fusion_method = fusion_method

                  # Fusion weights (tuned on validation set)
                  self.weights = {
                      "bm25": 0.3,
                      "dense": 0.5,
                      "sparse": 0.2
                  }

              async def search(self, query: str, top_k: int = 10) -> List[SearchResult]:
                  """Hybrid search with fusion"""

                  # Get results from each method
                  bm25_results = await self._bm25_search(query, top_k * 2)
                  dense_results = await self._dense_search(query, top_k * 2)
                  sparse_results = await self._sparse_search(query, top_k * 2)

                  # Fuse results
                  if self.fusion_method == "rrf":
                      fused = self._reciprocal_rank_fusion(
                          bm25_results, dense_results, sparse_results,
                          k=60  # RRF constant
                      )
                  elif self.fusion_method == "linear":
                      fused = self._linear_fusion(
                          bm25_results, dense_results, sparse_results
                      )

                  return fused[:top_k]

              async def _bm25_search(self, query: str, top_k: int) -> List[SearchResult]:
                  """BM25 keyword search"""

                  results = self.bm25.search(query, top_k)

                  return [
                      SearchResult(
                          doc_id=r["id"],
                          score=r["score"],
                          source="bm25",
                          metadata={"terms": r.get("matched_terms", [])}
                      )
                      for r in results
                  ]

              async def _dense_search(self, query: str, top_k: int) -> List[SearchResult]:
                  """Dense vector semantic search"""

                  # Encode query
                  query_embedding = self.dense.encode(query)

                  # Search
                  results = self.dense.search(query_embedding, top_k)

                  return [
                      SearchResult(
                          doc_id=r["id"],
                          score=r["score"],
                          source="dense",
                          metadata={"similarity": r["score"]}
                      )
                      for r in results
                  ]

              async def _sparse_search(self, query: str, top_k: int) -> List[SearchResult]:
                  """Sparse vector search (SPLADE or similar)"""

                  # Expand query using SPLADE
                  query_vector = self.sparse.encode(query)

                  results = self.sparse.search(query_vector, top_k)

                  return [
                      SearchResult(
                          doc_id=r["id"],
                          score=r["score"],
                          source="sparse",
                          metadata={"expanded_terms": r.get("terms", [])}
                      )
                      for r in results
                  ]

              def _reciprocal_rank_fusion(
                  self,
                  bm25_results: List[SearchResult],
                  dense_results: List[SearchResult],
                  sparse_results: List[SearchResult],
                  k: int = 60
              ) -> List[SearchResult]:
                  """Reciprocal Rank Fusion (RRF)"""

                  scores = {}

                  # Process each result list
                  for rank, result in enumerate(bm25_results):
                      doc_id = result.doc_id
                      rrf_score = 1 / (k + rank + 1) * self.weights["bm25"]
                      scores[doc_id] = scores.get(doc_id, 0) + rrf_score

                  for rank, result in enumerate(dense_results):
                      doc_id = result.doc_id
                      rrf_score = 1 / (k + rank + 1) * self.weights["dense"]
                      scores[doc_id] = scores.get(doc_id, 0) + rrf_score

                  for rank, result in enumerate(sparse_results):
                      doc_id = result.doc_id
                      rrf_score = 1 / (k + rank + 1) * self.weights["sparse"]
                      scores[doc_id] = scores.get(doc_id, 0) + rrf_score

                  # Sort by fused score
                  sorted_scores = sorted(scores.items(), key=lambda x: x[1], reverse=True)

                  return [
                      SearchResult(
                          doc_id=doc_id,
                          score=score,
                          source="fused",
                          metadata={"rrf_score": score}
                      )
                      for doc_id, score in sorted_scores
                  ]

              def _linear_fusion(
                  self,
                  bm25_results: List[SearchResult],
                  dense_results: List[SearchResult],
                  sparse_results: List[SearchResult]
              ) -> List[SearchResult]:
                  """Linear combination with normalization"""

                  # Normalize scores for each method
                  def normalize(results: List[SearchResult]) -> Dict[str, float]:
                      if not results:
                          return {}
                      max_score = max(r.score for r in results)
                      min_score = min(r.score for r in results)
                      score_range = max_score - min_score if max_score != min_score else 1

                      return {
                          r.doc_id: (r.score - min_score) / score_range
                          for r in results
                      }

                  bm25_norm = normalize(bm25_results)
                  dense_norm = normalize(dense_results)
                  sparse_norm = normalize(sparse_results)

                  # Combine scores
                  all_docs = set(bm25_norm.keys()) | set(dense_norm.keys()) | set(sparse_norm.keys())

                  fused_scores = {}
                  for doc_id in all_docs:
                      score = (
                          self.weights["bm25"] * bm25_norm.get(doc_id, 0) +
                          self.weights["dense"] * dense_norm.get(doc_id, 0) +
                          self.weights["sparse"] * sparse_norm.get(doc_id, 0)
                      )
                      fused_scores[doc_id] = score

                  # Sort and return
                  sorted_scores = sorted(fused_scores.items(), key=lambda x: x[1], reverse=True)

                  return [
                      SearchResult(
                          doc_id=doc_id,
                          score=score,
                          source="fused",
                          metadata={}
                      )
                      for doc_id, score in sorted_scores
                  ]
          ```

          ### Query Classification and Routing

          ```python
          class QueryRouter:
              """Route queries to optimal retrieval method"""

              def __init__(self):
                  self.query_patterns = {
                      "keyword": [
                          r"\b(error|code|exception)\s*\d+",  # Error codes
                          r"\b(API|endpoint|method)\s*:\s*\w+",  # API references
                          r"\b(v\d+\.\d+|version)\b",  # Version numbers
                      ],
                      "semantic": [
                          r"\b(how\s+to|what\s+is|explain)\b",  # Questions
                          r"\b(best\s+practice|guide|tutorial)\b",  # Guides
                      ],
                  }

              def classify(self, query: str) -> str:
                  """Classify query type"""

                  query_lower = query.lower()

                  # Check for keyword patterns
                  for pattern in self.query_patterns["keyword"]:
                      if re.search(pattern, query_lower):
                          return "keyword_heavy"

                  # Check for semantic patterns
                  for pattern in self.query_patterns["semantic"]:
                      if re.search(pattern, query_lower):
                          return "semantic"

                  # Default to hybrid
                  return "hybrid"

              def get_optimal_weights(self, query_type: str) -> Dict[str, float]:
                  """Get fusion weights for query type"""

                  weights = {
                      "keyword_heavy": {"bm25": 0.5, "dense": 0.2, "sparse": 0.3},
                      "semantic": {"bm25": 0.1, "dense": 0.7, "sparse": 0.2},
                      "hybrid": {"bm25": 0.3, "dense": 0.5, "sparse": 0.2},
                  }

                  return weights.get(query_type, weights["hybrid"])
          ```

          ### Weight Tuning

          ```python
          class FusionWeightTuner:
              """Tune fusion weights using validation queries"""

              def __init__(self, hybrid_search, validation_queries: List[Dict]):
                  self.search = hybrid_search
                  self.validation_queries = validation_queries

              def tune(self, metric: str = "ndcg@10") -> Dict[str, float]:
                  """Tune weights using grid search"""

                  best_weights = None
                  best_score = 0

                  # Grid search over weight combinations
                  for bm25_w in np.arange(0.1, 0.7, 0.1):
                      for dense_w in np.arange(0.1, 0.8, 0.1):
                          sparse_w = 1.0 - bm25_w - dense_w
                          if sparse_w < 0.1:
                              continue

                          weights = {
                              "bm25": bm25_w,
                              "dense": dense_w,
                              "sparse": sparse_w
                          }

                          score = self._evaluate_weights(weights, metric)

                          if score > best_score:
                              best_score = score
                              best_weights = weights

                  return best_weights

              def _evaluate_weights(self, weights: Dict, metric: str) -> float:
                  """Evaluate weight configuration"""

                  self.search.weights = weights

                  scores = []
                  for q in self.validation_queries:
                      results = self.search.search(q["query"])
                      score = self._calculate_metric(results, q["relevant_docs"], metric)
                      scores.append(score)

                  return np.mean(scores)
          ```

          This hybrid approach typically improves NDCG@10 by 15-25% over single-method retrieval.


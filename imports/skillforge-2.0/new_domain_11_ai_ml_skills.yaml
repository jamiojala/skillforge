          ### Extraction Pipeline

          ```python
          import spacy
          from transformers import AutoTokenizer, AutoModelForTokenClassification
          from transformers import pipeline

          class KnowledgeExtractor:
              def __init__(self):
                  # Load NER model
                  self.nlp = spacy.load("en_core_web_trf")

                  # Load relation extraction model
                  self.relation_extractor = pipeline(
                      "text2text-generation",
                      model="google/flan-t5-large"
                  )

                  # Entity linker to Wikidata
                  self.entity_linker = EntityLinker()

              async def extract_from_document(self, doc: Dict) -> Dict:
                  """Extract knowledge triples from document"""

                  text = doc["content"]
                  doc_id = doc["id"]

                  # Step 1: Entity extraction
                  entities = await self._extract_entities(text)

                  # Step 2: Entity linking
                  linked_entities = await self._link_entities(entities)

                  # Step 3: Coreference resolution
                  resolved_entities = self._resolve_coreferences(text, linked_entities)

                  # Step 4: Relationship extraction
                  relationships = await self._extract_relationships(
                      text, resolved_entities
                  )

                  # Step 5: Document-entity links
                  doc_links = self._create_document_links(doc_id, resolved_entities)

                  return {
                      "document_id": doc_id,
                      "entities": resolved_entities,
                      "relationships": relationships + doc_links
                  }

              async def _extract_entities(self, text: str) -> List[Dict]:
                  """Extract entities with positions"""

                  doc = self.nlp(text)
                  entities = []

                  for ent in doc.ents:
                      entity_type = self._map_to_ontology(ent.label_)
                      if entity_type:
                          entities.append({
                              "text": ent.text,
                              "type": entity_type,
                              "start": ent.start_char,
                              "end": ent.end_char,
                              "sentence": ent.sent.text
                          })

                  # Add custom entity patterns
                  custom_entities = self._extract_custom_entities(text)
                  entities.extend(custom_entities)

                  return entities

              def _map_to_ontology(self, spacy_label: str) -> Optional[EntityType]:
                  """Map spaCy labels to ontology"""

                  mapping = {
                      "PERSON": EntityType.PERSON,
                      "ORG": EntityType.ORGANIZATION,
                      "GPE": EntityType.LOCATION,
                      "PRODUCT": EntityType.TECHNOLOGY,
                      "WORK_OF_ART": EntityType.DOCUMENT,
                  }
                  return mapping.get(spacy_label)

              async def _link_entities(self, entities: List[Dict]) -> List[Dict]:
                  """Link entities to canonical references"""

                  linked = []

                  for entity in entities:
                      # Try exact match with known entities
                      canonical = self._find_canonical_entity(entity)

                      if canonical:
                          entity["canonical_id"] = canonical["id"]
                          entity["canonical_name"] = canonical["name"]
                      else:
                          # Try Wikidata linking
                          wiki_match = await self.entity_linker.link(
                              entity["text"], entity["type"]
                          )
                          if wiki_match and wiki_match["score"] > 0.8:
                              entity["wikidata_id"] = wiki_match["id"]
                              entity["canonical_name"] = wiki_match["name"]

                      linked.append(entity)

                  return linked

              async def _extract_relationships(
                  self,
                  text: str,
                  entities: List[Dict]
              ) -> List[Dict]:
                  """Extract relationships between entities"""

                  relationships = []

                  # Group entities by sentence
                  sentence_entities = self._group_by_sentence(entities)

                  for sentence_text, sent_entities in sentence_entities.items():
                      if len(sent_entities) < 2:
                          continue

                      # Extract all pairwise relationships
                      for i, ent1 in enumerate(sent_entities):
                          for ent2 in sent_entities[i+1:]:
                              rel = await self._classify_relationship(
                                  sentence_text, ent1, ent2
                              )

                              if rel:
                                  relationships.append({
                                      "source": ent1.get("canonical_id", ent1["text"]),
                                      "target": ent2.get("canonical_id", ent2["text"]),
                                      "type": rel["type"],
                                      "confidence": rel["confidence"],
                                      "evidence": sentence_text
                                  })

                  return relationships

              async def _classify_relationship(
                  self,
                  sentence: str,
                  ent1: Dict,
                  ent2: Dict
              ) -> Optional[Dict]:
                  """Classify relationship between two entities"""

                  prompt = f"""
                  What is the relationship between "{ent1['text']}" and "{ent2['text']}" in this sentence?

                  Sentence: {sentence}

                  Choose the most specific relationship from:
                  - worksFor (person works for organization)
                  - manages (person manages person/team)
                  - worksOn (person works on project)
                  - created (person created document)
                  - dependsOn (project/tech depends on project/tech)
                  - none (no clear relationship)

                  Return JSON: {{"type": "relationship", "confidence": 0.0-1.0}}
                  """

                  result = self.relation_extractor(prompt, max_length=100)[0]['generated_text']

                  try:
                      parsed = json.loads(result)
                      if parsed.get("type") != "none" and parsed.get("confidence", 0) > 0.6:
                          return parsed
                  except:
                      pass

                  return None
          ```

          ### Graph Construction

          ```python
          from neo4j import GraphDatabase

          class GraphBuilder:
              def __init__(self, uri: str, user: str, password: str):
                  self.driver = GraphDatabase.driver(uri, auth=(user, password))

              async def build_graph(self, extractions: List[Dict]):
                  """Build knowledge graph from extractions"""

                  with self.driver.session() as session:
                      for extraction in extractions:
                          # Create entity nodes
                          for entity in extraction["entities"]:
                              await self._create_entity_node(session, entity)

                          # Create relationship edges
                          for rel in extraction["relationships"]:
                              await self._create_relationship_edge(session, rel)

              async def _create_entity_node(self, session, entity: Dict):
                  """Create or merge entity node"""

                  entity_id = entity.get("canonical_id", entity["text"])

                  cypher = """
                  MERGE (e:Entity {id: $id})
                  SET e.name = $name,
                      e.type = $type,
                      e.source_text = $source_text
                  """

                  # Add type-specific label
                  if entity.get("type"):
                      cypher += f"SET e:{entity['type'].value}"

                  session.run(cypher, {
                      "id": entity_id,
                      "name": entity.get("canonical_name", entity["text"]),
                      "type": entity.get("type", "Unknown").value if entity.get("type") else "Unknown",
                      "source_text": entity["text"]
                  })

              async def _create_relationship_edge(self, session, rel: Dict):
                  """Create relationship edge"""

                  cypher = f"""
                  MATCH (source:Entity {{id: $source_id}})
                  MATCH (target:Entity {{id: $target_id}})
                  MERGE (source)-[r:{rel['type']}]->(target)
                  SET r.confidence = $confidence,
                      r.evidence = $evidence,
                      r.created_at = datetime()
                  """

                  session.run(cypher, {
                      "source_id": rel["source"],
                      "target_id": rel["target"],
                      "confidence": rel.get("confidence", 0.5),
                      "evidence": rel.get("evidence", "")[:500]  # Limit evidence length
                  })
          ```

          This provides a complete pipeline for building enterprise knowledge graphs from documents.


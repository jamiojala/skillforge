          ### Chain Monitoring

          ```python
          class ChainMonitor:
              """Monitor chain execution"""

              def __init__(self):
                  self.step_times: Dict[str, List[float]] = {}
                  self.error_counts: Dict[str, int] = {}

              async def wrap_step(self, step: ChainStep, state: ChainState) -> ChainState:
                  """Wrap step execution with monitoring"""

                  import time

                  start = time.time()

                  try:
                      result = await step.execute(state)

                      # Record success
                      elapsed = time.time() - start
                      if step.name not in self.step_times:
                          self.step_times[step.name] = []
                      self.step_times[step.name].append(elapsed)

                      return result

                  except Exception as e:
                      # Record error
                      self.error_counts[step.name] = self.error_counts.get(step.name, 0) + 1
                      raise

              def get_stats(self) -> Dict:
                  """Get chain execution statistics"""

                  stats = {}

                  for step_name, times in self.step_times.items():
                      stats[step_name] = {
                          "avg_time": sum(times) / len(times),
                          "max_time": max(times),
                          "min_time": min(times),
                          "error_count": self.error_counts.get(step_name, 0),
                      }

                  return stats

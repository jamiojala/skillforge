          from dataclasses import dataclass
          from typing import Dict, List, Set
          from enum import Enum

          class EntityType(Enum):
              PERSON = "Person"
              ORGANIZATION = "Organization"
              PROJECT = "Project"
              TECHNOLOGY = "Technology"
              DOCUMENT = "Document"
              MEETING = "Meeting"

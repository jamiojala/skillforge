          ## Agent Message Protocol Design

          ### Message Schema

          ```python
          from dataclasses import dataclass
          from typing import Dict, Any, Optional
          from enum import Enum
          from datetime import datetime
          import json

          class MessageType(Enum):
              REQUEST = "request"
              RESPONSE = "response"
              EVENT = "event"
              COMMAND = "command"
              ERROR = "error"

          class Priority(Enum):
              LOW = 1
              NORMAL = 2
              HIGH = 3
              CRITICAL = 4

          @dataclass
          class MessageEnvelope:
              """Message envelope with metadata"""
              message_id: str
              correlation_id: str
              version: str = "1.0"
              message_type: MessageType
              priority: Priority = Priority.NORMAL
              source_agent: str
              target_agent: Optional[str]  # None for broadcast
              timestamp: datetime
              ttl: int = 300  # Time to live in seconds
              idempotency_key: Optional[str] = None

          @dataclass
          class MessagePayload:
              """Actual message content"""
              action: str
              parameters: Dict[str, Any]
              context: Dict[str, Any] = None

          @dataclass
          class AgentMessage:
              """Complete agent message"""
              envelope: MessageEnvelope
              payload: MessagePayload
              signature: Optional[str] = None  # For authentication
          ```

          ### Protocol Implementation

          ```python
          import asyncio
          from typing import Callable, Dict

          class AgentProtocol:
              def __init__(self, agent_id: str, message_broker):
                  self.agent_id = agent_id
                  self.broker = message_broker
                  self.pending_responses: Dict[str, asyncio.Future] = {}
                  self.message_handlers: Dict[str, Callable] = {}

              async def send(
                  self,
                  target_agent: str,
                  action: str,
                  parameters: Dict,
                  wait_for_response: bool = True,
                  timeout: float = 30.0
              ) -> Optional[AgentMessage]:
                  """Send message to another agent"""

                  message = self._create_message(target_agent, action, parameters)

                  if wait_for_response:
                      # Create future for response
                      future = asyncio.Future()
                      self.pending_responses[message.envelope.message_id] = future

                      try:
                          await self._send_message(message)
                          return await asyncio.wait_for(future, timeout=timeout)
                      except asyncio.TimeoutError:
                          del self.pending_responses[message.envelope.message_id]
                          raise TimeoutError(f"No response from {target_agent}")
                  else:
                      await self._send_message(message)
                      return None

              async def _send_message(self, message: AgentMessage):
                  """Serialize and send message"""

                  # Serialize to Protobuf/JSON
                  serialized = self._serialize(message)

                  # Send via broker
                  await self.broker.publish(
                      channel=f"agent.{message.envelope.target_agent}",
                      message=serialized
                  )

              def _serialize(self, message: AgentMessage) -> bytes:
                  """Serialize message to bytes"""

                  data = {
                      "envelope": {
                          "message_id": message.envelope.message_id,
                          "correlation_id": message.envelope.correlation_id,
                          "version": message.envelope.version,
                          "message_type": message.envelope.message_type.value,
                          "priority": message.envelope.priority.value,
                          "source_agent": message.envelope.source_agent,
                          "target_agent": message.envelope.target_agent,
                          "timestamp": message.envelope.timestamp.isoformat(),
                          "ttl": message.envelope.ttl,
                          "idempotency_key": message.envelope.idempotency_key,
                      },
                      "payload": {
                          "action": message.payload.action,
                          "parameters": message.payload.parameters,
                          "context": message.payload.context,
                      }
                  }

                  return json.dumps(data).encode('utf-8')

              async def handle_message(self, raw_message: bytes):
                  """Handle incoming message"""

                  message = self._deserialize(raw_message)

                  # Check TTL
                  age = (datetime.now() - message.envelope.timestamp).total_seconds()
                  if age > message.envelope.ttl:
                      logger.warning(f"Expired message received: {message.envelope.message_id}")
                      return

                  # Handle based on message type
                  if message.envelope.message_type == MessageType.RESPONSE:
                      await self._handle_response(message)
                  else:
                      await self._handle_request(message)

              async def _handle_response(self, message: AgentMessage):
                  """Handle response message"""

                  # Find pending request
                  request_id = message.envelope.correlation_id
                  if request_id in self.pending_responses:
                      future = self.pending_responses.pop(request_id)
                      future.set_result(message)

              async def _handle_request(self, message: AgentMessage):
                  """Handle request/command/event"""

                  handler = self.message_handlers.get(message.payload.action)

                  if handler:
                      try:
                          result = await handler(message.payload.parameters)

                          # Send response if request
                          if message.envelope.message_type == MessageType.REQUEST:
                              await self._send_response(message, result)
                      except Exception as e:
                          await self._send_error(message, str(e))
                  else:
                      await self._send_error(message, f"Unknown action: {message.payload.action}")

              async def _send_response(self, request: AgentMessage, result: Any):
                  """Send response to request"""

                  response = AgentMessage(
                      envelope=MessageEnvelope(
                          message_id=str(uuid.uuid4()),
                          correlation_id=request.envelope.message_id,
                          message_type=MessageType.RESPONSE,
                          source_agent=self.agent_id,
                          target_agent=request.envelope.source_agent,
                          timestamp=datetime.now()
                      ),
                      payload=MessagePayload(
                          action=request.payload.action,
                          parameters={"result": result}
                      )
                  )

                  await self._send_message(response)
          ```

          ### Delivery Guarantees

          ```python
          class ReliableDeliveryProtocol(AgentProtocol):
              """Protocol with at-least-once delivery guarantee"""

              def __init__(self, agent_id: str, message_broker):
                  super().__init__(agent_id, message_broker)
                  self.message_store = MessageStore()  # Persistent store
                  self.retry_interval = 5.0
                  self.max_retries = 3

              async def send_with_guarantee(
                  self,
                  target_agent: str,
                  action: str,
                  parameters: Dict
              ) -> AgentMessage:
                  """Send with at-least-once guarantee"""

                  message = self._create_message(target_agent, action, parameters)

                  # Store message for potential retry
                  await self.message_store.store(message)

                  for attempt in range(self.max_retries):
                      try:
                          response = await self.send(
                              target_agent, action, parameters,
                              wait_for_response=True, timeout=30.0
                          )

                          # Mark as delivered
                          await self.message_store.mark_delivered(message.envelope.message_id)
                          return response

                      except TimeoutError:
                          if attempt < self.max_retries - 1:
                              await asyncio.sleep(self.retry_interval * (2 ** attempt))
                          else:
                              raise DeliveryError(f"Failed to deliver after {self.max_retries} attempts")
          ```

          This provides a robust protocol with versioning, delivery guarantees, and proper error handling.


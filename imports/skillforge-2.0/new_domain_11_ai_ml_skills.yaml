      - name: "Software Development Agent Hierarchy"
        user: |
          I want to build an AI system that can write complete software features. It should break down requirements, design architecture, write code, and run tests. How should I structure the agent hierarchy?
        ai_response: |
          ## Software Development Agent Hierarchy

          ### Hierarchy Design

          ```
          [Project Manager Agent]
                  |
          ┌────────┴────────┬───────────────┐
          ↓                 ↓               ↓
      [Architect]    [Dev Lead]      [QA Lead]
          |                 |               |
          ↓           ┌─────┴─────┐         ↓
      [Designers]   ↓           ↓    [Test Engineers]
              [Frontend]  [Backend]
          ```

          ### Agent Responsibilities

          | Level | Agent | Scope | Decision Authority |
          |-------|-------|-------|-------------------|
          | L0 | Project Manager | Requirements → Task breakdown | Resource allocation, timeline |
          | L1 | Architect | System design, tech stack | Architecture decisions |
          | L1 | Dev Lead | Feature implementation | Code organization |
          | L1 | QA Lead | Test strategy, coverage | Quality gates |
          | L2 | Frontend Dev | UI components, interactions | Component API design |
          | L2 | Backend Dev | API endpoints, business logic | Endpoint design |
          | L2 | Test Engineer | Unit/integration tests | Test case design |

          ### Delegation Protocol

          ```python
          from dataclasses import dataclass
          from typing import List, Optional, Dict, Any
          from enum import Enum

          class TaskStatus(Enum):
              PENDING = "pending"
              DELEGATED = "delegated"
              IN_PROGRESS = "in_progress"
              COMPLETED = "completed"
              FAILED = "failed"
              ESCALATED = "escalated"

          @dataclass
          class DelegationTask:
              task_id: str
              description: str
              requirements: List[str]
              constraints: Dict[str, Any]
              success_criteria: List[str]
              max_subtasks: int = 5
              deadline: Optional[float] = None
              parent_task_id: Optional[str] = None

          @dataclass
          class TaskResult:
              task_id: str
              status: TaskStatus
              output: Any
              subtask_results: List['TaskResult']
              learnings: List[str]
              confidence: float

          class HierarchicalAgent:
              def __init__(self, role: str, subordinates: List['HierarchicalAgent'] = None):
                  self.role = role
                  self.subordinates = subordinates or []
                  self.max_direct_reports = 7  # Dunbar's number for management

              async def execute(self, task: DelegationTask) -> TaskResult:
                  """Execute task, delegating to subordinates if needed"""

                  # Check if we can handle directly
                  if self._can_handle_directly(task):
                      return await self._process_task(task)

                  # Decompose and delegate
                  subtasks = self._decompose(task)

                  if len(subtasks) > self.max_direct_reports:
                      # Need intermediate management layer
                      return await self._create_intermediate_layer(task, subtasks)

                  # Delegate to subordinates
                  subtask_results = await self._delegate_subtasks(subtasks)

                  # Aggregate results
                  return self._aggregate_results(task, subtask_results)

              def _decompose(self, task: DelegationTask) -> List[DelegationTask]:
                  """Break task into subtasks"""
                  prompt = f"""
                  Break down this task into {task.max_subtasks} or fewer subtasks.
                  Each subtask must have clear success criteria.

                  Task: {task.description}
                  Requirements: {task.requirements}

                  Return as JSON list of subtasks.
                  """
                  # Use LLM to decompose
                  return self.llm_decompose(prompt)

              async def _delegate_subtasks(self, subtasks: List[DelegationTask]) -> List[TaskResult]:
                  """Delegate subtasks to appropriate subordinates"""
                  assignments = self._assign_subtasks(subtasks)

                  # Execute in parallel
                  tasks = []
                  for agent, subtask_list in assignments.items():
                      for subtask in subtask_list:
                          tasks.append(agent.execute(subtask))

                  return await asyncio.gather(*tasks, return_exceptions=True)

              def _aggregate_results(self, original_task: DelegationTask,
                                    subtask_results: List[TaskResult]) -> TaskResult:
                  """Combine subtask results into final output"""
                  # Check for failures
                  failures = [r for r in subtask_results if isinstance(r, Exception)]
                  if failures:
                      return TaskResult(
                          task_id=original_task.task_id,
                          status=TaskStatus.FAILED,
                          output=None,
                          subtask_results=subtask_results,
                          learnings=[f"Failed subtasks: {len(failures)}"],
                          confidence=0.0
                      )

                  # Aggregate successful results
                  combined_output = self._combine_outputs(subtask_results)
                  confidence = sum(r.confidence for r in subtask_results) / len(subtask_results)

                  return TaskResult(
                      task_id=original_task.task_id,
                      status=TaskStatus.COMPLETED,
                      output=combined_output,
                      subtask_results=subtask_results,
                      learnings=self._extract_learnings(subtask_results),
                      confidence=confidence
                  )
          ```

          ### Implementation: Feature Development Flow

          ```python
          async def develop_feature(requirements: str) -> FeatureResult:
              # Create project manager
              pm = ProjectManagerAgent(
                  subordinates=[
                      ArchitectAgent(),
                      DevLeadAgent(),
                      QALeadAgent()
                  ]
              )

              # Top-level task
              feature_task = DelegationTask(
                  task_id="feature-001",
                  description=f"Implement feature: {requirements}",
                  requirements=[requirements],
                  success_criteria=[
                      "Code compiles without errors",
                      "All tests pass",
                      "Code review approved",
                      "Documentation complete"
                  ],
                  max_subtasks=5
              )

              # Execute through hierarchy
              result = await pm.execute(feature_task)

              return FeatureResult(
                  code=result.output.get("code"),
                  tests=result.output.get("tests"),
                  docs=result.output.get("documentation"),
                  confidence=result.confidence
              )
          ```

          ### Escalation Protocol

          ```python
          class EscalationManager:
              """Handle escalations up the hierarchy"""

              ESCALATION_REASONS = {
                  "AMBIGUOUS_REQUIREMENTS": "Requirements unclear or conflicting",
                  "TECHNICAL_BLOCKER": "Technical constraint blocking progress",
                  "RESOURCE_CONSTRAINT": "Insufficient resources (time/compute)",
                  "QUALITY_GATE_FAILED": "Output doesn't meet quality criteria",
                  "DEPENDENCY_FAILURE": "Required dependency unavailable"
              }

              async def escalate(self, task: DelegationTask, reason: str,
                               context: dict) -> TaskResult:
                  """Escalate task to parent agent"""

                  # Find parent in hierarchy
                  parent = self._find_parent(task)

                  if not parent:
                      # At top of hierarchy - need human intervention
                      return await self._request_human_intervention(task, reason, context)

                  # Create escalation task
                  escalation = DelegationTask(
                      task_id=f"escalation-{task.task_id}",
                      description=f"Escalation: {reason}",
                      requirements=[
                          f"Original task: {task.description}",
                          f"Escalation reason: {reason}",
                          f"Context: {context}"
                      ],
                      parent_task_id=task.task_id
                  )

                  return await parent.execute(escalation)
          ```

          ### Monitoring Hierarchy Health

          ```python
          @dataclass
          class HierarchyMetrics:
              avg_delegation_depth: float
              tasks_per_level: Dict[int, int]
              escalation_rate: float
              bottleneck_agents: List[str]
              avg_completion_time: float

          class HierarchyMonitor:
              def collect_metrics(self) -> HierarchyMetrics:
                  return HierarchyMetrics(
                      avg_delegation_depth=self._calc_avg_depth(),
                      tasks_per_level=self._count_tasks_by_level(),
                      escalation_rate=self._calc_escalation_rate(),
                      bottleneck_agents=self._find_bottlenecks(),
                      avg_completion_time=self._calc_avg_time()
                  )

              def _find_bottlenecks(self) -> List[str]:
                  """Find agents with high queue depth"""
                  return [
                      agent_id for agent_id, queue_depth in self.queue_depths.items()
                      if queue_depth > self.threshold
                  ]
          ```

          This hierarchy provides clear accountability, parallel execution, and scalable task decomposition.

      - name: "Executive-Assistant Pattern"
        user: |
          I have a complex agent that needs to handle many different types of requests. Some are simple lookups, others require deep reasoning. Should I use a single agent or create a hierarchy? How would that work?
        ai_response: |
          ## Executive-Assistant Agent Pattern

          For your use case, I recommend the **Executive-Assistant Pattern** - a two-level hierarchy where an executive agent handles high-level decisions and delegates to specialized assistants.

          ### Architecture

          ```
          [Executive Agent] - Orchestrator & Decision Maker
                  |
          ┌────────┼────────┬────────┐
          ↓        ↓        ↓        ↓
      [Lookup] [Reasoning] [Creative] [Analysis]
      Assistant Assistant  Assistant  Assistant
          ```

          ### Why This Pattern Fits

          | Request Type | Delegation Target | Rationale |
          |-------------|-------------------|-----------|
          | Simple lookup | Lookup Assistant | Fast, cached responses |
          | Multi-step reasoning | Reasoning Assistant | Dedicated compute for complex logic |
          | Content generation | Creative Assistant | Specialized prompt engineering |
          | Data analysis | Analysis Assistant | Structured analytical approach |

          ### Implementation

          ```python
          from typing import Type, Dict, Callable
          from enum import Enum

          class RequestType(Enum):
              LOOKUP = "lookup"
              REASONING = "reasoning"
              CREATIVE = "creative"
              ANALYSIS = "analysis"

          class ExecutiveAgent:
              """Routes requests to appropriate assistants"""

              def __init__(self):
                  self.assistants: Dict[RequestType, BaseAssistant] = {
                      RequestType.LOOKUP: LookupAssistant(),
                      RequestType.REASONING: ReasoningAssistant(),
                      RequestType.CREATIVE: CreativeAssistant(),
                      RequestType.ANALYSIS: AnalysisAssistant(),
                  }
                  self.classifier = RequestClassifier()

              async def handle(self, request: str) -> Response:
                  # Classify request type
                  request_type = await self.classifier.classify(request)

                  # Route to appropriate assistant
                  assistant = self.assistants.get(request_type)
                  if not assistant:
                      # Fallback to reasoning assistant
                      assistant = self.assistants[RequestType.REASONING]

                  # Delegate with context
                  return await assistant.process(request)

          class RequestClassifier:
              """Fast classification to avoid LLM call for routing"""

              KEYWORDS = {
                  RequestType.LOOKUP: ["what is", "find", "lookup", "search", "get"],
                  RequestType.REASONING: ["why", "how to", "explain", "compare", "evaluate"],
                  RequestType.CREATIVE: ["write", "create", "generate", "draft", "compose"],
                  RequestType.ANALYSIS: ["analyze", "calculate", "predict", "forecast", "trend"],
              }

              async def classify(self, request: str) -> RequestType:
                  request_lower = request.lower()

                  # Fast keyword matching
                  for req_type, keywords in self.KEYWORDS.items():
                      if any(kw in request_lower for kw in keywords):
                          return req_type

                  # Fallback to LLM classification for ambiguous cases
                  return await self._llm_classify(request)
          ```

          ### Specialized Assistants

          ```python
          class LookupAssistant(BaseAssistant):
              """Fast, cached lookups"""

              def __init__(self):
                  self.cache = LRUCache(maxsize=1000)
                  self.knowledge_base = VectorStore()

              async def process(self, request: str) -> Response:
                  # Check cache first
                  cache_key = hashlib.md5(request.encode()).hexdigest()
                  if cache_key in self.cache:
                      return Response(
                          content=self.cache[cache_key],
                          source="cache",
                          latency_ms=1
                      )

                  # Vector search for relevant info
                  results = await self.knowledge_base.search(request, top_k=3)

                  # Quick synthesis
                  answer = await self._synthesize(request, results)

                  # Cache result
                  self.cache[cache_key] = answer

                  return Response(content=answer, source="kb", latency_ms=50)

          class ReasoningAssistant(BaseAssistant):
              """Complex multi-step reasoning"""

              async def process(self, request: str) -> Response:
                  # Use chain-of-thought prompting
                  reasoning_prompt = f"""
                  Work through this problem step by step:

                  Problem: {request}

                  Step 1: Understand the problem
                  Step 2: Identify relevant information
                  Step 3: Apply reasoning
                  Step 4: Form conclusion

                  Provide your reasoning clearly.
                  """

                  response = await self.llm.generate(
                      reasoning_prompt,
                      temperature=0.3,
                      max_tokens=2000
                  )

                  return Response(
                      content=response,
                      reasoning_steps=self._extract_steps(response),
                      confidence=self._assess_confidence(response)
                  )

          class CreativeAssistant(BaseAssistant):
              """Content generation with style adaptation"""

              async def process(self, request: str, style: str = None) -> Response:
                  # Extract style from request if specified
                  detected_style = style or self._detect_style(request)

                  creative_prompt = f"""
                  Create content following these guidelines:
                  - Style: {detected_style}
                  - Be original and engaging
                  - Maintain consistent tone

                  Request: {request}
                  """

                  # Higher temperature for creativity
                  response = await self.llm.generate(
                      creative_prompt,
                      temperature=0.8,
                      max_tokens=1500
                  )

                  return Response(content=response, style=detected_style)
          ```

          ### Benefits of This Pattern

          1. **Latency Optimization**: Simple lookups complete in <100ms
          2. **Cost Efficiency**: Route to cheaper models for simple tasks
          3. **Specialization**: Each assistant optimized for its domain
          4. **Scalability**: Add new assistant types without changing executive
          5. **Observability**: Clear attribution of request handling

          ### When to Escalate

          ```python
          async def should_escalate(self, request: str, assistant_result: Response) -> bool:
              """Determine if executive should handle directly"""

              escalation_triggers = [
                  assistant_result.confidence < 0.7,
                  assistant_result.contains_uncertainty(),
                  "escalate" in assistant_result.content.lower(),
                  self._crosses_multiple_domains(request),
              ]

              return any(escalation_triggers)
          ```

          This pattern gives you the best of both worlds: fast handling of simple requests and deep reasoning for complex ones.


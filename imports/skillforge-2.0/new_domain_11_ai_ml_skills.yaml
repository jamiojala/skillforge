          ### Implementation

          ```python
          from typing import Optional, List
          from dataclasses import dataclass
          import hashlib
          import json
          import numpy as np
          from sentence_transformers import SentenceTransformer
          import redis
          import faiss

          @dataclass
          class CacheEntry:
              prompt_hash: str
              embedding: np.ndarray
              response: str
              timestamp: float
              hit_count: int
              ttl: int

          class SemanticCache:
              def __init__(
                  self,
                  embedding_model: str = "all-MiniLM-L6-v2",
                  similarity_threshold: float = 0.95,
                  redis_host: str = "localhost"
              ):
                  self.encoder = SentenceTransformer(embedding_model)
                  self.similarity_threshold = similarity_threshold
                  self.redis = redis.Redis(host=redis_host, decode_responses=True)

                  # In-memory exact cache
                  self.exact_cache: Dict[str, str] = {}

                  # FAISS index for semantic search
                  embedding_dim = self.encoder.get_sentence_embedding_dimension()
                  self.index = faiss.IndexFlatIP(embedding_dim)  # Inner product for cosine
                  self.entries: List[CacheEntry] = []

              async def get(self, prompt: str) -> Optional[str]:
                  """Get cached response for prompt"""

                  # L1: Exact match
                  prompt_hash = self._hash_prompt(prompt)
                  if prompt_hash in self.exact_cache:
                      return self.exact_cache[prompt_hash]

                  # Check Redis for exact match
                  cached = self.redis.get(f"exact:{prompt_hash}")
                  if cached:
                      self.exact_cache[prompt_hash] = cached
                      return cached

                  # L2: Semantic match
                  embedding = self.encoder.encode([prompt])[0]

                  if len(self.entries) > 0:
                      # Search FAISS index
                      D, I = self.index.search(
                          np.array([embedding]).astype('float32'),
                          k=1
                      )

                      if D[0][0] >= self.similarity_threshold:
                          matched_entry = self.entries[I[0][0]]
                          matched_entry.hit_count += 1
                          return matched_entry.response

                  return None

              async def set(
                  self,
                  prompt: str,
                  response: str,
                  ttl: int = 3600
              ):
                  """Cache response for prompt"""

                  prompt_hash = self._hash_prompt(prompt)
                  embedding = self.encoder.encode([prompt])[0]

                  # Normalize for cosine similarity
                  embedding = embedding / np.linalg.norm(embedding)

                  # Add to in-memory exact cache
                  self.exact_cache[prompt_hash] = response

                  # Add to Redis with TTL
                  self.redis.setex(f"exact:{prompt_hash}", ttl, response)

                  # Add to semantic cache
                  entry = CacheEntry(
                      prompt_hash=prompt_hash,
                      embedding=embedding,
                      response=response,
                      timestamp=time.time(),
                      hit_count=0,
                      ttl=ttl
                  )

                  self.entries.append(entry)
                  self.index.add(np.array([embedding]).astype('float32'))

              def _hash_prompt(self, prompt: str) -> str:
                  """Create hash for prompt"""
                  return hashlib.sha256(prompt.encode()).hexdigest()[:16]

              async def get_stats(self) -> dict:
                  """Get cache statistics"""
                  return {
                      "exact_cache_size": len(self.exact_cache),
                      "semantic_cache_size": len(self.entries),
                      "avg_hit_count": np.mean([e.hit_count for e in self.entries]) if self.entries else 0,
                  }

          # Usage with LLM
          class CachedLLM:
              def __init__(self, llm_client, cache: SemanticCache):
                  self.llm = llm_client
                  self.cache = cache
                  self.stats = {"hits": 0, "misses": 0}

              async def generate(self, prompt: str) -> str:
                  # Try cache first
                  cached = await self.cache.get(prompt)
                  if cached:
                      self.stats["hits"] += 1
                      return cached

                  # Cache miss - call LLM
                  self.stats["misses"] += 1
                  response = await self.llm.generate(prompt)

                  # Cache the response
                  await self.cache.set(prompt, response)

                  return response
          ```

          ### Smart Cache Keys

          ```python
          class SmartCacheKey:
              """Generate cache keys that capture semantic equivalence"""

              def __init__(self):
                  self.stopwords = set(['the', 'a', 'an', 'is', 'are', 'was', 'were'])

              def normalize(self, prompt: str) -> str:
                  """Normalize prompt for better cache hits"""
                  # Lowercase
                  normalized = prompt.lower()

                  # Remove extra whitespace
                  normalized = ' '.join(normalized.split())

                  # Remove stopwords (optional, use carefully)
                  # words = [w for w in normalized.split() if w not in self.stopwords]
                  # normalized = ' '.join(words)

                  return normalized

              def generate_key(self, prompt: str, context: dict = None) -> str:
                  """Generate cache key"""
                  normalized = self.normalize(prompt)

                  # Include relevant context
                  if context:
                      context_str = json.dumps(context, sort_keys=True)
                      normalized = f"{normalized}:{context_str}"

                  return hashlib.sha256(normalized.encode()).hexdigest()
          ```


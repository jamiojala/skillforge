        user: |
          I need to classify customer support tickets into categories. How do I design an effective few-shot prompt?
        ai_response: |
          ## Few-Shot Classification Prompt

          ### Example Selection Strategy

          ```python
          # Curated examples covering key categories and edge cases
          CLASSIFICATION_EXAMPLES = [
              # Standard cases
              {
                  "input": "I can't log into my account. It says password is wrong but I'm sure it's correct.",
                  "output": {
                      "category": "Account Access",
                      "priority": "High",
                      "sentiment": "Frustrated"
                  }
              },
              {
                  "input": "How do I export my data to Excel format?",
                  "output": {
                      "category": "Feature Question",
                      "priority": "Low",
                      "sentiment": "Neutral"
                  }
              },
              {
                  "input": "There's a bug in the checkout process. I keep getting an error when I try to pay.",
                  "output": {
                      "category": "Bug Report",
                      "priority": "Critical",
                      "sentiment": "Frustrated"
                  }
              },
              # Edge cases
              {
                  "input": "Your product is terrible and I want a refund immediately!!!",
                  "output": {
                      "category": "Refund Request",
                      "priority": "High",
                      "sentiment": "Angry"
                  }
              },
              {
                  "input": "Hi, just wanted to say I love your product. Keep up the great work!",
                  "output": {
                      "category": "Feedback",
                      "priority": "Low",
                      "sentiment": "Positive"
                  }
              },
              # Ambiguous cases
              {
                  "input": "The button doesn't work.",
                  "output": {
                      "category": "Bug Report",
                      "priority": "Medium",
                      "sentiment": "Neutral",
                      "note": "Vague - may need clarification"
                  }
              },
          ]
          ```

          ### Prompt Template

          ```python
          CLASSIFICATION_PROMPT = """You are a customer support ticket classifier.

          Analyze each ticket and classify it into one of these categories:
          - Account Access: Login, password, account issues
          - Bug Report: Software errors, unexpected behavior
          - Feature Question: How-to, feature requests
          - Refund Request: Billing, refund, cancellation
          - Feedback: General comments, praise, complaints

          Also determine priority (Critical/High/Medium/Low) and customer sentiment.

          Here are examples:

          {examples}

          Now classify this ticket:
          Ticket: {ticket}

          Respond with ONLY a JSON object in this exact format:
          {{
              "category": "Category Name",
              "priority": "Priority Level",
              "sentiment": "Sentiment",
              "confidence": 0.0-1.0
          }}
          """

          def format_examples(examples: List[Dict]) -> str:
              """Format examples for prompt"""

              formatted = []
              for i, ex in enumerate(examples, 1):
                  formatted.append(f"Example {i}:")
                  formatted.append(f"Ticket: {ex['input']}")
                  formatted.append(f"Classification: {json.dumps(ex['output'], indent=2)}")
                  formatted.append("")

              return "\n".join(formatted)

          def build_classification_prompt(ticket: str) -> str:
              """Build few-shot prompt for ticket classification"""

              examples_text = format_examples(CLASSIFICATION_EXAMPLES)

              return CLASSIFICATION_PROMPT.format(
                  examples=examples_text,
                  ticket=ticket
              )
          ```

          ### Consistency Testing

          ```python
          class FewShotEvaluator:
              """Evaluate few-shot prompt consistency"""

              def __init__(self, llm_client):
                  self.llm = llm_client

              async def evaluate_consistency(
                  self,
                  prompt_builder: Callable,
                  test_cases: List[str],
                  num_runs: int = 10
              ) -> Dict:
                  """Evaluate prompt consistency across multiple runs"""

                  results = []

                  for test_case in test_cases:
                      case_results = []

                      for _ in range(num_runs):
                          prompt = prompt_builder(test_case)
                          response = await self.llm.generate(prompt, temperature=0.0)

                          try:
                              parsed = json.loads(response)
                              case_results.append(parsed)
                          except:
                              case_results.append({"error": "parse_failed"})

                      # Calculate consistency metrics
                      consistency = self._calculate_consistency(case_results)

                      results.append({
                          "test_case": test_case[:100],
                          "consistency": consistency,
                          "results": case_results
                      })

                  return {
                      "overall_consistency": sum(r["consistency"] for r in results) / len(results),
                      "per_case_results": results
                  }

              def _calculate_consistency(self, results: List[Dict]) -> float:
                  """Calculate consistency score for a test case"""

                  if not results:
                      return 0.0

                  # Check if all results have same category
                  categories = [r.get("category") for r in results if "category" in r]
                  if not categories:
                      return 0.0

                  most_common = max(set(categories), key=categories.count)
                  agreement_rate = categories.count(most_common) / len(categories)

                  return agreement_rate
          ```

          ### Example Optimization

          ```python
          class ExampleOptimizer:
              """Optimize example selection for best performance"""

              def __init__(self, example_pool: List[Dict]):
                  self.example_pool = example_pool

              async def optimize(
                  self,
                  llm_client,
                  validation_set: List[Dict],
                  max_examples: int = 7
              ) -> List[Dict]:
                  """Find optimal example set"""

                  best_examples = None
                  best_score = 0

                  # Try different combinations
                  from itertools import combinations

                  for num in range(3, max_examples + 1):
                      for combo in combinations(self.example_pool, num):
                          score = await self._evaluate_combo(
                              llm_client, list(combo), validation_set
                          )

                          if score > best_score:
                              best_score = score
                              best_examples = list(combo)

                  return best_examples

              async def _evaluate_combo(
                  self,
                  llm_client,
                  examples: List[Dict],
                  validation_set: List[Dict]
              ) -> float:
                  """Evaluate example combination"""

                  correct = 0

                  for val_case in validation_set:
                      prompt = self._build_prompt_with_examples(examples, val_case["input"])
                      response = await llm_client.generate(prompt, temperature=0.0)

                      try:
                          parsed = json.loads(response)
                          if parsed.get("category") == val_case["expected_category"]:
                              correct += 1
                      except:
                          pass

                  return correct / len(validation_set)
          ```

          This provides a systematic approach to few-shot prompt engineering with consistency verification.


      - name: "Customer Support Multi-Agent System"
        user: |
          I need to design a customer support system with multiple AI agents: one for intent classification, one for knowledge base retrieval, one for response generation, and one for escalation decisions. How should they coordinate?
        ai_response: |
          ## Multi-Agent Customer Support Architecture

          ### Architecture Overview
          I'll design an orchestrated pipeline with a central dispatcher coordinating specialized agents:

          ```
          [Customer Query] → [Orchestrator/Dispatcher]
                              ↓
              ┌───────────────┼───────────────┐
              ↓               ↓               ↓
          [Intent Agent] [KB Retrieval] [Escalation Agent]
              ↓               ↓               ↓
              └───────────────┴───────────────┘
                              ↓
                    [Response Generator]
                              ↓
                      [Customer Response]
          ```

          ### Communication Protocol

          ```python
          from dataclasses import dataclass
          from typing import Optional, Dict, Any
          from enum import Enum

          class AgentRole(Enum):
              INTENT_CLASSIFIER = "intent_classifier"
              KB_RETRIEVER = "kb_retriever"
              ESCALATION = "escalation"
              RESPONSE_GENERATOR = "response_generator"

          @dataclass
          class AgentMessage:
              message_id: str
              correlation_id: str  # Links related messages
              sender: AgentRole
              recipient: AgentRole
              payload: Dict[str, Any]
              timestamp: float
              ttl: int = 3  # Retry attempts

          @dataclass
          class SupportContext:
              query: str
              intent: Optional[str] = None
              retrieved_docs: list = None
              escalation_score: float = 0.0
              customer_history: Dict = None
          ```

          ### Implementation Guide

          ```python
          import asyncio
          from typing import Dict, List
          import uuid

          class SupportOrchestrator:
              def __init__(self):
                  self.agents: Dict[AgentRole, BaseAgent] = {}
                  self.message_bus = AsyncMessageBus()
                  self.context_store = ContextStore()

              async def process_query(self, customer_query: str) -> str:
                  # Create shared context
                  context_id = str(uuid.uuid4())
                  context = SupportContext(query=customer_query)
                  await self.context_store.save(context_id, context)

                  # Phase 1: Parallel intent classification and escalation check
                  intent_task = self._call_agent(
                      AgentRole.INTENT_CLASSIFIER,
                      {"query": customer_query, "context_id": context_id}
                  )
                  escalation_task = self._call_agent(
                      AgentRole.ESCALATION,
                      {"query": customer_query, "context_id": context_id}
                  )

                  intent_result, escalation_result = await asyncio.gather(
                      intent_task, escalation_task,
                      return_exceptions=True
                  )

                  # Handle failures gracefully
                  if isinstance(intent_result, Exception):
                      intent_result = {"intent": "general", "confidence": 0.5}

                  # Update context
                  context.intent = intent_result.get("intent")
                  context.escalation_score = escalation_result.get("score", 0.0)
                  await self.context_store.save(context_id, context)

                  # Phase 2: Conditional KB retrieval
                  if context.escalation_score < 0.7:
                      kb_result = await self._call_agent(
                          AgentRole.KB_RETRIEVER,
                          {"intent": context.intent, "query": customer_query}
                      )
                      context.retrieved_docs = kb_result.get("documents", [])
                      await self.context_store.save(context_id, context)

                  # Phase 3: Generate response
                  response = await self._call_agent(
                      AgentRole.RESPONSE_GENERATOR,
                      {"context": context.to_dict()}
                  )

                  return response.get("message", "I'm sorry, I couldn't process your request.")

              async def _call_agent(self, role: AgentRole, payload: dict) -> dict:
                  """Call agent with timeout and retry logic"""
                  agent = self.agents.get(role)
                  if not agent:
                      raise ValueError(f"Agent {role} not registered")

                  for attempt in range(3):
                      try:
                          return await asyncio.wait_for(
                              agent.process(payload),
                              timeout=5.0
                          )
                      except asyncio.TimeoutError:
                          if attempt == 2:
                              raise
                          await asyncio.sleep(0.5 * (2 ** attempt))  # Exponential backoff
          ```

          ### Failure Handling Strategy

          1. **Agent Timeout**: Each agent call has 5-second timeout with 3 retries
          2. **Circuit Breaker**: Track failure rates; open circuit after 5 failures in 60 seconds
          3. **Graceful Degradation**: If KB retriever fails, response generator uses general knowledge
          4. **Dead Letter Queue**: Failed messages logged for manual review

          ### Monitoring Setup

          ```python
          # Track key metrics
          metrics = {
              "agent_latency": Histogram("agent_processing_seconds", ["agent_role"]),
              "agent_errors": Counter("agent_errors_total", ["agent_role", "error_type"]),
              "message_queue_depth": Gauge("message_queue_depth", ["queue_name"]),
              "context_size": Histogram("context_size_bytes"),
          }
          ```

          This architecture provides clear separation of concerns, parallel processing where possible, and robust failure handling.

      - name: "Research Agent Swarm"
        user: |
          I'm building a research assistant that uses multiple agents to gather information from different sources (web search, academic databases, internal docs) and synthesize findings. How do I coordinate them without creating bottlenecks?
        ai_response: |
          ## Research Agent Swarm Architecture

          For research tasks, I'll design a swarm topology with a coordinator and parallel researcher agents:

          ### Architecture: Hub-and-Spoke with Result Aggregation

          ```
                       [Research Coordinator]
                              |
          ┌─────────────┬───────┴───────┬─────────────┐
          ↓             ↓               ↓             ↓
      [Web Agent] [Academic Agent] [Internal Agent] [Fact-Check Agent]
          |             |               |             |
          └─────────────┴───────┬───────┴─────────────┘
                              ↓
                      [Synthesis Agent]
                              ↓
                      [Quality Review Agent]
          ```

          ### Key Design Decisions

          **1. Parallel Execution with Early Termination**
          ```python
          async def parallel_research(query: str, max_wait: float = 10.0):
              """Run all research agents in parallel, return when sufficient results gathered"""
              agents = {
                  "web": WebResearchAgent(),
                  "academic": AcademicResearchAgent(),
                  "internal": InternalDocsAgent(),
              }

              results = {}
              pending = {
                  asyncio.create_task(agent.research(query), name=name)
                  for name, agent in agents.items()
              }

              start_time = asyncio.get_event_loop().time()

              while pending and (asyncio.get_event_loop().time() - start_time) < max_wait:
                  done, pending = await asyncio.wait(
                      pending,
                      return_when=asyncio.FIRST_COMPLETED,
                      timeout=1.0
                  )

                  for task in done:
                      agent_name = task.get_name()
                      try:
                          result = task.result()
                          results[agent_name] = result

                          # Early termination: stop if we have sufficient coverage
                          if self._has_sufficient_coverage(results):
                              # Cancel remaining tasks
                              for p in pending:
                                  p.cancel()
                              return results
                      except Exception as e:
                          logger.warning(f"Agent {agent_name} failed: {e}")

              return results  # Return whatever we have
          ```

          **2. Result Deduplication and Ranking**
          ```python
          from sklearn.feature_extraction.text import TfidfVectorizer
          from sklearn.metrics.pairwise import cosine_similarity

          class ResultAggregator:
              def aggregate(self, agent_results: Dict[str, List[Source]]) -> List[Source]:
                  # Flatten all results
                  all_sources = []
                  for agent_name, sources in agent_results.items():
                      for source in sources:
                          source.agent_source = agent_name
                          all_sources.append(source)

                  # Deduplicate using semantic similarity
                  deduplicated = self._deduplicate(all_sources)

                  # Rank by credibility score
                  ranked = sorted(
                      deduplicated,
                      key=lambda s: s.credibility_score(),
                      reverse=True
                  )

                  return ranked[:20]  # Top 20 unique sources

              def _deduplicate(self, sources: List[Source], threshold=0.85) -> List[Source]:
                  if len(sources) <= 1:
                      return sources

                  texts = [s.summary for s in sources]
                  vectors = TfidfVectorizer().fit_transform(texts)
                  similarity = cosine_similarity(vectors)

                  unique = []
                  seen = set()

                  for i, source in enumerate(sources):
                      if i in seen:
                          continue
                      unique.append(source)
                      # Mark similar items as seen
                      for j in range(i + 1, len(sources)):
                          if similarity[i, j] > threshold:
                              seen.add(j)

                  return unique
          ```

          **3. Conflict Resolution**
          ```python
          class ConflictResolver:
              """Handle conflicting information from different sources"""

              def resolve_conflicts(self, findings: List[Finding]) -> ResolvedFinding:
                  # Group findings by claim
                  claim_groups = self._group_by_claim(findings)

                  resolved = []
                  for claim, sources in claim_groups.items():
                      if len(sources) == 1:
                          resolved.append(ResolvedFinding(
                              claim=claim,
                              confidence=sources[0].confidence,
                              sources=sources
                          ))
                      else:
                          # Weight by source credibility
                          weighted_confidence = self._weighted_vote(sources)
                          resolved.append(ResolvedFinding(
                              claim=claim,
                              confidence=weighted_confidence,
                              sources=sources,
                              conflict_resolved=True
                          ))

                  return resolved
          ```

          ### Bottleneck Prevention

          1. **Streaming Results**: Don't wait for all agents; stream partial results
          2. **Agent Pools**: Maintain pools of identical agents for high-throughput sources
          3. **Intelligent Routing**: Route queries to most relevant agents based on query classification
          4. **Caching Layer**: Cache research results with TTL based on source volatility

          ```python
          @cache(ttl=timedelta(hours=1))
          async def cached_research(query: str, agent_type: str):
              agent = agent_pool.get_agent(agent_type)
              return await agent.research(query)
          ```

          This design maximizes parallelism while maintaining result quality through intelligent aggregation.


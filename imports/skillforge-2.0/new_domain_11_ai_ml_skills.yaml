          ### Implementation

          ```python
          from typing import Dict, List, Callable, Any, Optional
          from dataclasses import dataclass, field
          from enum import Enum
          import asyncio

          class DocumentType(Enum):
              INVOICE = "invoice"
              CONTRACT = "contract"
              REPORT = "report"
              OTHER = "other"

          @dataclass
          class ChainState:
              document: str
              document_type: Optional[DocumentType] = None
              extracted_data: Dict = field(default_factory=dict)
              summary: Optional[str] = None
              metadata: Dict = field(default_factory=dict)

          class ChainStep:
              """Base class for chain steps"""

              def __init__(self, name: str):
                  self.name = name

              async def execute(self, state: ChainState) -> ChainState:
                  raise NotImplementedError

          class ClassifierStep(ChainStep):
              """Classify document type"""

              def __init__(self, llm_client):
                  super().__init__("classifier")
                  self.llm = llm_client

              async def execute(self, state: ChainState) -> ChainState:
                  prompt = f"""
                  Classify this document into one of: invoice, contract, report, other.

                  Document (first 1000 chars):
                  {state.document[:1000]}

                  Return only the classification.
                  """

                  response = await self.llm.generate(prompt, temperature=0.0)
                  doc_type = response.strip().lower()

                  try:
                      state.document_type = DocumentType(doc_type)
                  except ValueError:
                      state.document_type = DocumentType.OTHER

                  return state

          class RouterStep(ChainStep):
              """Route to appropriate processing chain"""

              def __init__(self, handlers: Dict[DocumentType, List[ChainStep]]):
                  super().__init__("router")
                  self.handlers = handlers

              async def execute(self, state: ChainState) -> ChainState:
                  handler_chain = self.handlers.get(
                      state.document_type,
                      self.handlers[DocumentType.OTHER]
                  )

                  for step in handler_chain:
                      state = await step.execute(state)

                  return state

          class ParallelExtractionStep(ChainStep):
              """Run multiple extractions in parallel"""

              def __init__(self, extractors: Dict[str, Callable]):
                  super().__init__("parallel_extraction")
                  self.extractors = extractors

              async def execute(self, state: ChainState) -> ChainState:
                  # Run all extractors in parallel
                  tasks = {
                      name: extractor(state.document)
                      for name, extractor in self.extractors.items()
                  }

                  results = await asyncio.gather(*tasks.values())

                  # Combine results
                  for name, result in zip(tasks.keys(), results):
                      state.extracted_data[name] = result

                  return state

          class DocumentProcessingChain:
              """Main processing chain"""

              def __init__(self, llm_client):
                  self.llm = llm_client

                  # Define handlers for each document type
                  handlers = {
                      DocumentType.INVOICE: [
                          ParallelExtractionStep({
                              "items": self._extract_invoice_items,
                              "totals": self._extract_invoice_totals,
                              "vendor": self._extract_vendor_info,

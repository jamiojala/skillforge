        ai_response: |
          ## Structured Data Extraction System

          ### Pydantic Schema Design

          ```python
          from pydantic import BaseModel, Field, validator
          from typing import List, Optional, Literal
          from datetime import datetime
          from enum import Enum

          class Priority(str, Enum):
              LOW = "low"
              MEDIUM = "medium"
              HIGH = "high"
              CRITICAL = "critical"

          class ActionItem(BaseModel):
              description: str = Field(
                  description="Clear description of the action item"
              )
              assignee: Optional[str] = Field(
                  None,
                  description="Person assigned to this action item"
              )
              due_date: Optional[str] = Field(
                  None,
                  description="Due date in YYYY-MM-DD format"
              )
              priority: Priority = Field(
                  default=Priority.MEDIUM,
                  description="Priority level of the action item"
              )

              @validator('due_date')
              def validate_date(cls, v):
                  if v is None:
                      return v
                  try:
                      datetime.strptime(v, '%Y-%m-%d')
                      return v
                  except ValueError:
                      raise ValueError('Date must be in YYYY-MM-DD format')

          class MeetingInfo(BaseModel):
              meeting_title: str = Field(
                  description="Title or subject of the meeting"
              )
              date: Optional[str] = Field(
                  None,
                  description="Meeting date in YYYY-MM-DD format"
              )
              attendees: List[str] = Field(
                  default_factory=list,
                  description="List of people who attended"
              )
              key_decisions: List[str] = Field(
                  default_factory=list,
                  description="Important decisions made"
              )
              action_items: List[ActionItem] = Field(
                  default_factory=list,
                  description="Action items from the meeting"
              )
              next_meeting: Optional[str] = Field(
                  None,
                  description="Date of next meeting if mentioned"
              )

              @validator('attendees', pre=True)
              def parse_attendees(cls, v):
                  if isinstance(v, str):
                      return [name.strip() for name in v.split(',')]
                  return v
          ```

          ### Extraction Pipeline

          ```python
          import json
          from typing import Type, TypeVar

          T = TypeVar('T', bound=BaseModel)

          class StructuredExtractor:
              def __init__(self, llm_client):
                  self.llm = llm_client

              async def extract(
                  self,
                  text: str,
                  schema_class: Type[T],
                  examples: List[Dict] = None
              ) -> T:
                  """Extract structured data from text"""

                  # Generate schema description
                  schema_description = self._generate_schema_description(schema_class)

                  # Build prompt with examples
                  prompt = self._build_extraction_prompt(
                      text, schema_description, examples
                  )

                  # Get structured output from LLM
                  response = await self.llm.chat.completions.create(
                      model="gpt-4",
                      messages=[
                          {"role": "system", "content": "You are a data extraction assistant. Extract structured information accurately."},
                          {"role": "user", "content": prompt}
                      ],
                      response_format={"type": "json_object"}
                  )

                  # Parse and validate
                  content = response.choices[0].message.content
                  return self._parse_and_validate(content, schema_class)

              def _generate_schema_description(self, schema_class: Type[BaseModel]) -> str:
                  """Generate human-readable schema description"""

                  schema = schema_class.schema()
                  lines = [f"Extract the following fields:", ""]

                  for field_name, field_info in schema.get("properties", {}).items():
                      field_type = field_info.get("type", "any")
                      description = field_info.get("description", "")
                      lines.append(f"- {field_name} ({field_type}): {description}")

                  return "\n".join(lines)

              def _build_extraction_prompt(
                  self,
                  text: str,
                  schema_description: str,
                  examples: List[Dict] = None
              ) -> str:
                  """Build extraction prompt with examples"""

                  prompt_parts = [
                      schema_description,
                      "",
                      "Extract information from the following text:",
                      "---",
                      text,
                      "---",
                      "",
                      "Return ONLY a valid JSON object matching the schema.",
                  ]

                  if examples:
                      prompt_parts.extend([
                          "",
                          "Examples:",
                      ])
                      for i, example in enumerate(examples, 1):
                          prompt_parts.append(f"\nExample {i}:")
                          prompt_parts.append(f"Input: {example['input']}")
                          prompt_parts.append(f"Output: {json.dumps(example['output'], indent=2)}")

                  return "\n".join(prompt_parts)

              def _parse_and_validate(
                  self,
                  content: str,
                  schema_class: Type[T]
              ) -> T:
                  """Parse JSON and validate against schema"""

                  try:
                      data = json.loads(content)
                  except json.JSONDecodeError as e:
                      # Try to extract JSON from markdown
                      data = self._extract_json_from_markdown(content)
                      if data is None:
                          raise ValueError(f"Invalid JSON: {e}")

                  # Validate with Pydantic
                  try:
                      return schema_class(**data)
                  except Exception as e:
                      # Try partial recovery
                      return self._attempt_partial_recovery(data, schema_class, str(e))

              def _extract_json_from_markdown(self, text: str) -> Optional[Dict]:
                  """Try to extract JSON from markdown code blocks"""

                  import re

                  # Look for JSON in code blocks
                  patterns = [
                      r'```json\s*(.*?)\s*```',
                      r'```\s*(.*?)\s*```',
                  ]

                  for pattern in patterns:
                      match = re.search(pattern, text, re.DOTALL)
                      if match:
                          try:
                              return json.loads(match.group(1))
                          except:
                              pass

                  # Try to find JSON object directly
                  try:
                      start = text.index('{')
                      end = text.rindex('}') + 1
                      return json.loads(text[start:end])
                  except:
                      return None

              def _attempt_partial_recovery(
                  self,
                  data: Dict,
                  schema_class: Type[T],
                  error: str
              ) -> T:
                  """Try to recover partial valid data"""

                  # Get schema fields
                  schema = schema_class.schema()
                  required_fields = schema.get("required", [])
                  properties = schema.get("properties", {})

                  # Check which required fields are missing
                  missing_required = [f for f in required_fields if f not in data]

                  if missing_required:
                      # Fill with defaults if possible
                      for field in missing_required:
                          if field in properties:
                              default = properties[field].get("default")
                              if default is not None:
                                  data[field] = default
                              elif properties[field].get("type") == "array":
                                  data[field] = []
                              elif properties[field].get("type") == "object":
                                  data[field] = {}

                  try:
                      return schema_class(**data)
                  except Exception:
                      raise ValueError(f"Could not parse output: {error}")
          ```

          ### Usage Example


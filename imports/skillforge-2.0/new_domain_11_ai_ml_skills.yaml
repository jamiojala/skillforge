          ### Implementation

          ```python
          from typing import Dict, List, Optional
          from dataclasses import dataclass
          import asyncio
          import hashlib

          @dataclass
          class Backend:
              id: str
              model: str
              gpu_type: str
              capacity: int  # Max concurrent requests
              current_load: int
              queue_depth: int
              healthy: bool
              avg_latency: float

          @dataclass
          class Request:
              id: str
              model_preference: str
              user_tier: str  # 'free', 'pro', 'enterprise'
              session_id: Optional[str]
              estimated_tokens: int
              priority: int  # 1-10

          class LLMLoadBalancer:
              def __init__(self):
                  self.backends: Dict[str, Backend] = {}
                  self.session_routes: Dict[str, str] = {}  # session -> backend
                  self.model_backends: Dict[str, List[str]] = {}  # model -> backend IDs

              def register_backend(self, backend: Backend):
                  self.backends[backend.id] = backend
                  if backend.model not in self.model_backends:
                      self.model_backends[backend.model] = []
                  self.model_backends[backend.model].append(backend.id)

              async def route(self, request: Request) -> Optional[str]:
                  """Route request to appropriate backend"""

                  # 1. Check session affinity
                  if request.session_id and request.session_id in self.session_routes:
                      backend_id = self.session_routes[request.session_id]
                      backend = self.backends.get(backend_id)
                      if backend and backend.healthy:
                          return backend_id

                  # 2. Filter backends by model compatibility
                  compatible = self._get_compatible_backends(request.model_preference)
                  if not compatible:
                      return None

                  # 3. Filter healthy backends
                  healthy = [b for b in compatible if b.healthy]
                  if not healthy:
                      return None

                  # 4. Select based on routing algorithm
                  selected = self._select_backend(healthy, request)

                  # 5. Store session affinity
                  if request.session_id:
                      self.session_routes[request.session_id] = selected.id

                  return selected.id

              def _get_compatible_backends(self, model: str) -> List[Backend]:
                  """Get backends that can serve this model"""
                  backend_ids = self.model_backends.get(model, [])
                  return [self.backends[bid] for bid in backend_ids]

              def _select_backend(self, backends: List[Backend], request: Request) -> Backend:
                  """Select best backend using weighted least-connections"""

                  # Calculate score for each backend
                  # Lower score = better
                  scored = []
                  for backend in backends:
                      # Base score: queue depth
                      score = backend.queue_depth

                      # Weight by GPU capability
                      gpu_weight = self._gpu_weight(backend.gpu_type)
                      score = score / gpu_weight

                      # Penalty for high latency
                      if backend.avg_latency > 5.0:  # 5 seconds
                          score *= 1.5

                      # Bonus for underutilized backends
                      utilization = backend.current_load / backend.capacity
                      if utilization < 0.5:
                          score *= 0.8

                      scored.append((backend, score))

                  # Sort by score and return best
                  scored.sort(key=lambda x: x[1])
                  return scored[0][0]

              def _gpu_weight(self, gpu_type: str) -> float:
                  """Weight GPU types by capability"""
                  weights = {
                      'A100-80GB': 4.0,
                      'A100-40GB': 3.0,
                      'A10G': 1.5,
                      'T4': 1.0,
                  }
                  return weights.get(gpu_type, 1.0)

              async def update_backend_metrics(self, backend_id: str, metrics: dict):
                  """Update backend metrics for routing decisions"""
                  if backend_id in self.backends:
                      backend = self.backends[backend_id]
                      backend.current_load = metrics.get('current_load', 0)
                      backend.queue_depth = metrics.get('queue_depth', 0)
                      backend.avg_latency = metrics.get('avg_latency', 0)
                      backend.healthy = metrics.get('healthy', True)
          ```

          ### Fair Queuing Implementation

          ```python
          import heapq
          from collections import deque

          class FairQueue:
              """Weighted fair queuing for different user tiers"""

              TIER_WEIGHTS = {
                  'enterprise': 4.0,
                  'pro': 2.0,
                  'free': 1.0,
              }

              def __init__(self):
                  self.queues: Dict[str, deque] = {
                      'enterprise': deque(),
                      'pro': deque(),
                      'free': deque(),
                  }
                  self.virtual_time = 0.0
                  self.last_finish_time: Dict[str, float] = {
                      tier: 0.0 for tier in self.queues
                  }

              def enqueue(self, request: Request):
                  """Add request to appropriate queue"""
                  tier = request.user_tier
                  finish_time = self._calculate_finish_time(request, tier)
                  self.queues[tier].append((request, finish_time))

              def dequeue(self) -> Optional[Request]:
                  """Get next request using weighted fair queuing"""
                  # Find queue with earliest finish time
                  earliest = None
                  earliest_tier = None

                  for tier, queue in self.queues.items():
                      if queue:
                          _, finish_time = queue[0]
                          weighted_finish = finish_time / self.TIER_WEIGHTS[tier]
                          if earliest is None or weighted_finish < earliest:
                              earliest = weighted_finish
                              earliest_tier = tier

                  if earliest_tier:
                      request, _ = self.queues[earliest_tier].popleft()
                      return request

                  return None

              def _calculate_finish_time(self, request: Request, tier: str) -> float:
                  """Calculate virtual finish time for request"""
                  weight = self.TIER_WEIGHTS[tier]
                  start_time = max(self.virtual_time, self.last_finish_time[tier])
                  finish_time = start_time + (request.estimated_tokens / weight)
                  self.last_finish_time[tier] = finish_time
                  return finish_time
          ```


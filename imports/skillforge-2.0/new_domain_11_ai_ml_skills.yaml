          ### Hierarchical Semantic Chunking

          ```python
          from typing import List, Dict, Optional
          import tiktoken

          class SemanticChunker:
              def __init__(
                  self,
                  chunk_size: int = 500,
                  chunk_overlap: int = 50,
                  encoding_name: str = "cl100k_base"
              ):
                  self.chunk_size = chunk_size
                  self.chunk_overlap = chunk_overlap
                  self.tokenizer = tiktoken.get_encoding(encoding_name)

              def chunk_document(self, document: Dict) -> List[Dict]:
                  """Create semantic chunks from document"""

                  text = document["content"]
                  doc_type = document.get("type", "text")

                  if doc_type == "code":
                      return self._chunk_code(text, document)
                  elif doc_type == "markdown":
                      return self._chunk_markdown(text, document)
                  else:
                      return self._chunk_text(text, document)

              def _chunk_text(self, text: str, metadata: Dict) -> List[Dict]:
                  """Chunk plain text by semantic boundaries"""

                  # Split into sentences
                  sentences = self._split_sentences(text)

                  chunks = []
                  current_chunk = []
                  current_tokens = 0

                  for sentence in sentences:
                      sentence_tokens = len(self.tokenizer.encode(sentence))

                      if current_tokens + sentence_tokens > self.chunk_size:
                          # Save current chunk
                          if current_chunk:
                              chunks.append(self._create_chunk(
                                  current_chunk, metadata, len(chunks)
                              ))

                          # Start new chunk with overlap
                          overlap_text = " ".join(current_chunk[-2:]) if len(current_chunk) >= 2 else ""
                          current_chunk = [overlap_text, sentence] if overlap_text else [sentence]
                          current_tokens = len(self.tokenizer.encode(" ".join(current_chunk)))
                      else:
                          current_chunk.append(sentence)
                          current_tokens += sentence_tokens

                  # Don't forget last chunk
                  if current_chunk:
                      chunks.append(self._create_chunk(
                          current_chunk, metadata, len(chunks)
                      ))

                  return chunks

              def _chunk_code(self, code: str, metadata: Dict) -> List[Dict]:
                  """Chunk code by function/class boundaries"""

                  import re

                  # Pattern to match function/class definitions
                  pattern = r'((?:def|class)\s+\w+[^:]*:[\s\S]*?)(?=\n(?:def|class)\s|\Z)'
                  matches = list(re.finditer(pattern, code))

                  chunks = []
                  for i, match in enumerate(matches):
                      chunk_text = match.group(1)
                      chunk_tokens = len(self.tokenizer.encode(chunk_text))

                      # If function is too long, split it
                      if chunk_tokens > self.chunk_size:
                          sub_chunks = self._chunk_large_function(chunk_text, metadata)
                          chunks.extend(sub_chunks)
                      else:
                          chunks.append({
                              "text": chunk_text,
                              "metadata": {
                                  **metadata,
                                  "chunk_index": i,
                                  "chunk_type": "function",
                                  "token_count": chunk_tokens
                              }
                          })

                  return chunks

              def _chunk_markdown(self, text: str, metadata: Dict) -> List[Dict]:
                  """Chunk markdown by headers"""

                  import re

                  # Split by headers
                  header_pattern = r'^(#{1,6}\s+.+)$'
                  sections = re.split(f'(?m){header_pattern}', text)

                  chunks = []
                  current_section = ""

                  for section in sections:
                      if not section.strip():
                          continue

                      section_tokens = len(self.tokenizer.encode(section))

                      if section_tokens > self.chunk_size:
                          # Split large sections
                          if current_section:
                              chunks.append(self._create_chunk(
                                  [current_section], metadata, len(chunks)
                              ))
                              current_section = ""

                          sub_chunks = self._chunk_text(section, metadata)
                          chunks.extend(sub_chunks)
                      else:
                          if current_section:
                              combined = current_section + "\n\n" + section
                              combined_tokens = len(self.tokenizer.encode(combined))

                              if combined_tokens > self.chunk_size:
                                  chunks.append(self._create_chunk(
                                      [current_section], metadata, len(chunks)
                                  ))
                                  current_section = section
                              else:
                                  current_section = combined
                          else:
                              current_section = section

                  if current_section:
                      chunks.append(self._create_chunk(
                          [current_section], metadata, len(chunks)
                      ))

                  return chunks

              def _create_chunk(
                  self,
                  sentences: List[str],
                  metadata: Dict,
                  chunk_index: int
              ) -> Dict:
                  """Create a chunk from sentences"""

                  text = " ".join(sentences)

                  return {
                      "text": text,
                      "metadata": {
                          **metadata,
                          "chunk_index": chunk_index,
                          "token_count": len(self.tokenizer.encode(text))
                      }
                  }
          ```

          ### Relevance-Based Context Assembly

          ```python
          class ContextAssembler:
              def __init__(self, token_budget: int = 117000):
                  self.token_budget = token_budget
                  self.tokenizer = tiktoken.get_encoding("cl100k_base")

              async def assemble_context(
                  self,
                  query: str,
                  retrieved_chunks: List[Dict],
                  query_embedding: List[float]
              ) -> str:
                  """Assemble optimal context within token budget"""

                  # Score chunks by relevance
                  scored_chunks = await self._score_chunks(
                      retrieved_chunks, query, query_embedding
                  )

                  # Sort by relevance
                  scored_chunks.sort(key=lambda x: x["score"], reverse=True)

                  # Select chunks within budget
                  selected_chunks = self._select_chunks_within_budget(scored_chunks)

                  # Deduplicate
                  deduplicated = self._deduplicate_chunks(selected_chunks)

                  # Assemble final context
                  context = self._format_context(deduplicated)

                  return context

              async def _score_chunks(
                  self,
                  chunks: List[Dict],
                  query: str,
                  query_embedding: List[float]
              ) -> List[Dict]:
                  """Score chunks by multiple relevance signals"""

                  scored = []

                  for chunk in chunks:
                      scores = {}

                      # Semantic similarity
                      chunk_embedding = chunk.get("embedding")
                      if chunk_embedding and query_embedding:
                          scores["semantic"] = self._cosine_similarity(
                              query_embedding, chunk_embedding
                          )

                      # Keyword overlap
                      scores["keyword"] = self._keyword_overlap(query, chunk["text"])

                      # Recency (if applicable)
                      if "timestamp" in chunk.get("metadata", {}):
                          scores["recency"] = self._recency_score(
                              chunk["metadata"]["timestamp"]
                          )

                      # Source authority
                      scores["authority"] = chunk.get("metadata", {}).get("authority_score", 0.5)

                      # Combined score
                      combined = (
                          0.5 * scores.get("semantic", 0) +
                          0.3 * scores.get("keyword", 0) +
                          0.1 * scores.get("recency", 0.5) +
                          0.1 * scores.get("authority", 0.5)
                      )

                      scored.append({
                          **chunk,
                          "score": combined,
                          "score_breakdown": scores
                      })

                  return scored

              def _select_chunks_within_budget(
                  self,
                  scored_chunks: List[Dict]
              ) -> List[Dict]:
                  """Select top chunks within token budget"""

                  selected = []
                  tokens_used = 0

                  for chunk in scored_chunks:
                      chunk_tokens = chunk["metadata"]["token_count"]

                      if tokens_used + chunk_tokens <= self.token_budget:
                          selected.append(chunk)
                          tokens_used += chunk_tokens
                      else:
                          # Try to fit a partial chunk if it's high relevance
                          if chunk["score"] > 0.9:
                              remaining = self.token_budget - tokens_used
                              if remaining > 100:  # Minimum chunk size
                                  truncated = self._truncate_chunk(chunk, remaining)
                                  selected.append(truncated)
                          break

                  return selected

              def _deduplicate_chunks(self, chunks: List[Dict]) -> List[Dict]:
                  """Remove duplicate or highly similar chunks"""

                  unique = []
                  seen_embeddings = []

                  for chunk in chunks:
                      embedding = chunk.get("embedding")

                      if not embedding:
                          unique.append(chunk)
                          continue

                      # Check similarity to already selected chunks
                      is_duplicate = False
                      for seen_emb in seen_embeddings:
                          similarity = self._cosine_similarity(embedding, seen_emb)
                          if similarity > 0.95:  # Threshold for duplication
                              is_duplicate = True
                              break

                      if not is_duplicate:
                          unique.append(chunk)
                          seen_embeddings.append(embedding)

                  return unique

              def _format_context(self, chunks: List[Dict]) -> str:
                  """Format chunks into final context string"""

                  parts = []

                  for i, chunk in enumerate(chunks):
                      metadata = chunk.get("metadata", {})
                      source = metadata.get("source", "Unknown")

                      part = f"[Document {i+1}] Source: {source}\n{chunk['text']}\n"
                      parts.append(part)

                  return "\n---\n".join(parts)

              def _truncate_chunk(self, chunk: Dict, max_tokens: int) -> Dict:
                  """Truncate chunk to fit remaining budget"""

                  text = chunk["text"]
                  tokens = self.tokenizer.encode(text)
                  truncated_tokens = tokens[:max_tokens]
                  truncated_text = self.tokenizer.decode(truncated_tokens)

                  return {
                      **chunk,
                      "text": truncated_text,
                      "metadata": {
                          **chunk["metadata"],
                          "token_count": max_tokens,
                          "truncated": True
                      }
                  }
          ```


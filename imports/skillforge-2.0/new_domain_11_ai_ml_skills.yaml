          ## Complete RAG Evaluation Framework

          ### Metrics Overview

          | Category | Metric | Description |
          |----------|--------|-------------|
          | Retrieval | Context Precision | % of retrieved chunks that are relevant |
          | Retrieval | Context Recall | % of relevant chunks that were retrieved |
          | Retrieval | MRR | Mean Reciprocal Rank of first relevant chunk |

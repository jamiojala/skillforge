        user: |
          I need to optimize hyperparameters for a deep learning model. There are 10 parameters with different ranges. Should I use a swarm approach? How would I implement it?
        ai_response: |
          ## Hyperparameter Optimization with Agent Swarm

          Yes, a swarm approach is excellent for hyperparameter optimization! It naturally handles the non-convex, noisy fitness landscape better than grid or random search.

          ### Swarm Design

          ```python
          import numpy as np
          from typing import List, Dict, Callable, Tuple
          from dataclasses import dataclass
          import asyncio

          @dataclass
          class HyperparameterSpace:
              name: str
              type: str  # 'continuous', 'integer', 'categorical'
              bounds: Tuple[float, float]  # For continuous/integer
              choices: List  # For categorical
              log_scale: bool = False

          @dataclass
          class Particle:
              position: np.ndarray
              velocity: np.ndarray
              best_position: np.ndarray
              best_fitness: float
              current_fitness: float
              particle_id: int

          class HPOAgentSwarm:
              def __init__(
                  self,
                  param_space: List[HyperparameterSpace],
                  swarm_size: int = 30,
                  max_iterations: int = 100,
                  topology: str = "ring"
              ):
                  self.param_space = param_space
                  self.swarm_size = swarm_size
                  self.max_iterations = max_iterations
                  self.topology = topology
                  self.dimensions = len(param_space)

                  # PSO parameters (adaptive)
                  self.w_max = 0.9  # Inertia weight (start)
                  self.w_min = 0.4  # Inertia weight (end)
                  self.c1 = 2.0  # Cognitive coefficient
                  self.c2 = 2.0  # Social coefficient

                  # Tracking
                  self.global_best_position = None
                  self.global_best_fitness = float('-inf')
                  self.fitness_history = []
                  self.diversity_history = []

              def initialize_swarm(self) -> List[Particle]:
                  """Initialize particles with diverse positions"""
                  swarm = []
                  for i in range(self.swarm_size):
                      position = self._random_position()
                      velocity = np.random.randn(self.dimensions) * 0.1

                      particle = Particle(
                          position=position.copy(),
                          velocity=velocity,
                          best_position=position.copy(),
                          best_fitness=float('-inf'),
                          current_fitness=float('-inf'),
                          particle_id=i
                      )
                      swarm.append(particle)

                  return swarm

              def _random_position(self) -> np.ndarray:
                  """Generate random position in parameter space"""
                  position = np.zeros(self.dimensions)
                  for i, param in enumerate(self.param_space):
                      if param.type in ['continuous', 'integer']:
                          low, high = param.bounds
                          if param.log_scale:
                              log_low, log_high = np.log10(low), np.log10(high)
                              position[i] = 10 ** np.random.uniform(log_low, log_high)
                          else:
                              position[i] = np.random.uniform(low, high)
                      elif param.type == 'categorical':
                          position[i] = np.random.randint(0, len(param.choices))
                  return position

              async def optimize(
                  self,
                  fitness_fn: Callable[[Dict], float]
              ) -> Tuple[Dict, float]:
                  """Run swarm optimization"""

                  swarm = self.initialize_swarm()

                  for iteration in range(self.max_iterations):
                      # Adaptive inertia weight
                      w = self.w_max - (self.w_max - self.w_min) * iteration / self.max_iterations

                      # Evaluate all particles (parallel)
                      evaluation_tasks = [
                          self._evaluate_particle(p, fitness_fn)
                          for p in swarm
                      ]
                      await asyncio.gather(*evaluation_tasks)

                      # Update global best
                      for particle in swarm:
                          if particle.best_fitness > self.global_best_fitness:
                              self.global_best_fitness = particle.best_fitness
                              self.global_best_position = particle.best_position.copy()

                      # Update velocities and positions
                      for particle in swarm:
                          self._update_particle(particle, swarm, w)

                      # Track metrics
                      self.fitness_history.append(self.global_best_fitness)
                      self.diversity_history.append(self._calculate_diversity(swarm))

                      # Check convergence
                      if self._should_stop(iteration):
                          break

                      # Diversity maintenance
                      if self.diversity_history[-1] < 0.1:
                          self._inject_diversity(swarm)

                  best_params = self._position_to_params(self.global_best_position)
                  return best_params, self.global_best_fitness

              def _update_particle(self, particle: Particle, swarm: List[Particle], w: float):
                  """Update particle velocity and position using PSO"""

                  # Get neighbors based on topology
                  neighbors = self._get_neighbors(particle, swarm)
                  neighbor_best = max(neighbors, key=lambda p: p.best_fitness)

                  # Random coefficients
                  r1, r2 = np.random.rand(2)

                  # Update velocity
                  particle.velocity = (
                      w * particle.velocity +
                      self.c1 * r1 * (particle.best_position - particle.position) +
                      self.c2 * r2 * (neighbor_best.best_position - particle.position)
                  )

                  # Clamp velocity
                  particle.velocity = np.clip(particle.velocity, -1, 1)

                  # Update position
                  particle.position += particle.velocity

                  # Ensure position stays in bounds
                  particle.position = self._clamp_position(particle.position)

              def _get_neighbors(self, particle: Particle, swarm: List[Particle]) -> List[Particle]:
                  """Get neighbors based on topology"""
                  if self.topology == "fully_connected":
                      return swarm
                  elif self.topology == "ring":
                      idx = particle.particle_id
                      left = swarm[(idx - 1) % self.swarm_size]
                      right = swarm[(idx + 1) % self.swarm_size]
                      return [particle, left, right]
                  elif self.topology == "random":
                      # Random subset of 5 particles
                      return [particle] + random.sample(
                          [p for p in swarm if p != particle],
                          min(5, self.swarm_size - 1)
                      )

              def _calculate_diversity(self, swarm: List[Particle]) -> float:
                  """Calculate swarm diversity as average distance from centroid"""
                  positions = np.array([p.position for p in swarm])
                  centroid = np.mean(positions, axis=0)
                  distances = np.linalg.norm(positions - centroid, axis=1)
                  return np.mean(distances)

              def _inject_diversity(self, swarm: List[Particle]):
                  """Reinitialize worst performing particles"""
                  # Sort by fitness
                  sorted_swarm = sorted(swarm, key=lambda p: p.best_fitness)

                  # Reinitialize bottom 20%
                  num_to_reset = max(1, len(swarm) // 5)
                  for particle in sorted_swarm[:num_to_reset]:
                      particle.position = self._random_position()
                      particle.velocity = np.random.randn(self.dimensions) * 0.1
                      particle.best_fitness = float('-inf')
          ```

          ### Usage Example

          ```python
          # Define hyperparameter space
          param_space = [
              HyperparameterSpace("learning_rate", "continuous", (1e-5, 1e-1), [], log_scale=True),
              HyperparameterSpace("batch_size", "integer", (16, 256), []),

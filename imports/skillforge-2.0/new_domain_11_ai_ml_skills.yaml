      - name: "Low-Latency Streaming Setup"
        user: |
          I need to serve an LLM for a chatbot with streaming responses. TTFT needs to be under 200ms. What's the best approach?
        ai_response: |
          ## Low-Latency Streaming LLM Serving

          For sub-200ms TTFT with streaming, you need aggressive optimization:

          ### Architecture

          ```
          [Client] → [CDN/Edge] → [Load Balancer] → [vLLM with TP=2]
                                                    (A100 80GB)

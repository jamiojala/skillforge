          ```

          ### Token Bucket Implementation

          ```python
          import redis
          import time
          import json

          class TokenBucketRateLimiter:
              """Redis-backed token bucket rate limiter"""

              def __init__(self, redis_client: redis.Redis):
                  self.redis = redis_client

              async def check_rate_limit(
                  self,
                  key: str,
                  tier: RateLimitTier,
                  tokens_requested: int = 1
              ) -> dict:
                  """Check if request is within rate limit"""

                  now = time.time()
                  bucket_key = f"ratelimit:{key}"

                  # Lua script for atomic token bucket operation
                  lua_script = """
                  local key = KEYS[1]
                  local rate = tonumber(ARGV[1])
                  local capacity = tonumber(ARGV[2])
                  local now = tonumber(ARGV[3])
                  local requested = tonumber(ARGV[4])

                  local bucket = redis.call('hmget', key, 'tokens', 'last_update')
                  local tokens = tonumber(bucket[1]) or capacity
                  local last_update = tonumber(bucket[2]) or now

                  -- Add tokens based on time passed
                  local delta = math.max(0, now - last_update)
                  tokens = math.min(capacity, tokens + delta * rate)

                  -- Check if request can be satisfied
                  if tokens >= requested then
                      tokens = tokens - requested
                      redis.call('hset', key, 'tokens', tokens, 'last_update', now)
                      redis.call('expire', key, 3600)
                      return {1, tokens}
                  else
                      redis.call('hset', key, 'tokens', tokens, 'last_update', now)
                      local retry_after = math.ceil((requested - tokens) / rate)
                      return {0, retry_after}
                  end
                  """

                  rate = tier.requests_per_minute / 60.0
                  capacity = tier.burst_size

                  result = self.redis.eval(
                      lua_script,
                      1,  # num keys
                      bucket_key,
                      rate,
                      capacity,
                      now,
                      tokens_requested
                  )

                  allowed = result[0] == 1
                  remaining = result[1] if allowed else 0
                  retry_after = result[1] if not allowed else 0

                  return {
                      "allowed": allowed,
                      "remaining": int(remaining),
                      "retry_after": int(retry_after),
                      "limit": tier.requests_per_minute,
                  }
          ```

          ### Multi-Dimensional Rate Limiting

          ```python
          class MultiDimensionalRateLimiter:
              """Rate limit on multiple dimensions simultaneously"""

              async def check_all_limits(
                  self,
                  user_id: str,
                  tier_name: str,
                  estimated_tokens: int
              ) -> dict:
                  tier = TIERS[tier_name]

                  checks = await asyncio.gather(
                      # Check request rate
                      self.request_limiter.check_rate_limit(
                          f"req:{user_id}", tier
                      ),
                      # Check token rate
                      self.token_limiter.check_rate_limit(
                          f"tok:{user_id}",
                          tier,
                          tokens_requested=estimated_tokens
                      ),
                      # Check concurrent requests
                      self.check_concurrent_limit(user_id, tier),
                  )

                  req_check, tok_check, concurrent_check = checks

                  # All checks must pass
                  allowed = all([
                      req_check["allowed"],
                      tok_check["allowed"],
                      concurrent_check["allowed"]
                  ])

                  return {
                      "allowed": allowed,
                      "request_limit": req_check,
                      "token_limit": tok_check,
                      "concurrent_limit": concurrent_check,
                      "headers": self._generate_headers(req_check, tok_check),
                  }

              def _generate_headers(self, req_check: dict, tok_check: dict) -> dict:
                  """Generate standard rate limit headers"""
                  return {
                      "X-RateLimit-Limit": str(req_check["limit"]),
                      "X-RateLimit-Remaining": str(req_check["remaining"]),
                      "X-RateLimit-Reset": str(int(time.time()) + 60),
                      "X-RateLimit-Token-Remaining": str(tok_check["remaining"]),
                  }
          ```

          ### FastAPI Middleware Integration

          ```python
          from fastapi import Request, Response
          from starlette.middleware.base import BaseHTTPMiddleware

          class RateLimitMiddleware(BaseHTTPMiddleware):
              def __init__(self, app, rate_limiter: MultiDimensionalRateLimiter):
                  super().__init__(app)
                  self.rate_limiter = rate_limiter

              async def dispatch(self, request: Request, call_next):
                  # Get user tier from auth
                  user_id = request.state.user_id
                  tier = request.state.user_tier

                  # Estimate tokens (can be from request body analysis)
                  estimated_tokens = self._estimate_tokens(request)

                  # Check rate limits
                  result = await self.rate_limiter.check_all_limits(
                      user_id, tier, estimated_tokens
                  )

                  if not result["allowed"]:
                      retry_after = result["request_limit"].get("retry_after", 60)
                      return Response(
                          content=json.dumps({"error": "Rate limit exceeded"}),
                          status_code=429,
                          headers={"Retry-After": str(retry_after), **result["headers"]}
                      )

                  # Process request
                  response = await call_next(request)

                  # Add rate limit headers
                  for header, value in result["headers"].items():
                      response.headers[header] = value

                  return response
          ```


          ## Consistent Hashing for KV Cache Optimization

          ```python
          import hashlib
          from typing import List, Dict
          import bisect

          class ConsistentHashRouter:
              """Route requests to maximize KV cache hits"""

              def __init__(self, replicas: int = 150):
                  self.replicas = replicas
                  self.ring: Dict[int, str] = {}  # hash -> backend_id
                  self.sorted_keys: List[int] = []
                  self.backends: set = set()

              def add_backend(self, backend_id: str):
                  """Add backend to hash ring"""
                  self.backends.add(backend_id)

                  for i in range(self.replicas):
                      key = self._hash(f"{backend_id}:{i}")
                      self.ring[key] = backend_id

                  self.sorted_keys = sorted(self.ring.keys())

              def remove_backend(self, backend_id: str):
                  """Remove backend from hash ring"""
                  self.backends.discard(backend_id)

                  for i in range(self.replicas):
                      key = self._hash(f"{backend_id}:{i}")
                      del self.ring[key]

                  self.sorted_keys = sorted(self.ring.keys())

              def get_backend(self, key: str) -> str:
                  """Get backend for key using consistent hashing"""
                  if not self.ring:
                      return None

                  hash_key = self._hash(key)

                  # Find first point on ring >= hash_key
                  idx = bisect.bisect_right(self.sorted_keys, hash_key)

                  if idx == len(self.sorted_keys):
                      idx = 0

                  return self.ring[self.sorted_keys[idx]]

              def _hash(self, key: str) -> int:
                  """Generate hash for key"""
                  return int(hashlib.md5(key.encode()).hexdigest(), 16)

          class CacheAwareRouter:
              """Router that maximizes KV cache hits"""

              def __init__(self):
                  self.consistent_hash = ConsistentHashRouter()
                  self.prefix_index: Dict[str, str] = {}  # prefix -> backend

              def route_by_prompt(self, prompt: str, session_id: str = None) -> str:
                  """Route to backend likely to have prompt in KV cache"""

                  # 1. Check session affinity first
                  if session_id:
                      backend = self.consistent_hash.get_backend(session_id)
                      if backend:
                          return backend

                  # 2. Extract key prefix for routing
                  # Use first 100 chars as routing key
                  prefix = prompt[:100].strip()

                  # 3. Route by prefix hash
                  return self.consistent_hash.get_backend(prefix)

              def route_by_conversation(self, conversation_id: str) -> str:
                  """Route entire conversation to same backend"""
                  return self.consistent_hash.get_backend(conversation_id)
          ```

          ### Key Benefits

          - **Cache Hits**: Similar prompts route to same backend
          - **Minimal Disruption**: Adding/removing backends only affects ~1/N requests
          - **Session Affinity**: Natural support for conversation routing

          This can improve cache hit rates by 30-50% for similar prompts.


      - name: "Cache Invalidation Strategy"
        user: |
          How do I handle cache invalidation when I update my LLM model or system prompt?
        ai_response: |
          ## Cache Invalidation Strategy

          ```python
          from enum import Enum
          from typing import Set
          import asyncio

          class InvalidationReason(Enum):
              MODEL_UPDATE = "model_update"
              SYSTEM_PROMPT_CHANGE = "system_prompt_change"
              TEMPERATURE_CHANGE = "temperature_change"
              MANUAL = "manual"
              TTL_EXPIRED = "ttl_expired"

          class CacheInvalidator:
              def __init__(self, cache: SemanticCache):
                  self.cache = cache
                  self.model_version = "1.0.0"
                  self.system_prompt_hash = ""

              async def invalidate_on_model_update(
                  self,
                  new_model_version: str,
                  reason: InvalidationReason = InvalidationReason.MODEL_UPDATE
              ):
                  """Invalidate cache when model is updated"""

                  if new_model_version == self.model_version:
                      return  # No change

                  # Model changes affect all cached responses
                  await self._full_invalidation(reason)
                  self.model_version = new_model_version

              async def invalidate_on_system_prompt_change(
                  self,
                  new_system_prompt: str
              ):
                  """Invalidate cache when system prompt changes"""

                  new_hash = hashlib.sha256(new_system_prompt.encode()).hexdigest()

                  if new_hash == self.system_prompt_hash:
                      return  # No change

                  # System prompt affects all responses
                  await self._full_invalidation(
                      InvalidationReason.SYSTEM_PROMPT_CHANGE
                  )
                  self.system_prompt_hash = new_hash

              async def invalidate_by_pattern(
                  self,
                  pattern: str,
                  reason: InvalidationReason = InvalidationReason.MANUAL
              ):
                  """Invalidate cache entries matching pattern"""

                  # Find matching entries
                  to_remove = []
                  for i, entry in enumerate(self.cache.entries):
                      if pattern in entry.response or pattern in entry.prompt_hash:
                          to_remove.append(i)

                  # Remove in reverse order to maintain indices
                  for i in reversed(to_remove):
                      self.cache.entries.pop(i)

                  # Rebuild FAISS index
                  await self._rebuild_index()

              async def _full_invalidation(self, reason: InvalidationReason):
                  """Clear entire cache"""
                  self.cache.exact_cache.clear()
                  self.cache.entries.clear()
                  self.cache.index = faiss.IndexFlatIP(
                      self.cache.encoder.get_sentence_embedding_dimension()
                  )
                  self.cache.redis.flushdb()

                  logger.info(f"Full cache invalidation: {reason.value}")

              async def _rebuild_index(self):
                  """Rebuild FAISS index after partial invalidation"""
                  if not self.cache.entries:
                      return

                  embeddings = np.array([e.embedding for e in self.cache.entries])
                  self.cache.index = faiss.IndexFlatIP(embeddings.shape[1])
                  self.cache.index.add(embeddings.astype('float32'))
          ```

          ### Versioned Caching

          ```python
          class VersionedCache:
              """Cache that includes version in key"""

              def __init__(self):
                  self.model_version = "1.0.0"
                  self.system_prompt_version = "1.0.0"

              def generate_key(self, prompt: str) -> str:
                  """Generate versioned cache key"""
                  versioned = f"{prompt}:{self.model_version}:{self.system_prompt_version}"
                  return hashlib.sha256(versioned.encode()).hexdigest()

              def update_model(self, new_version: str):
                  """Update model version (automatically invalidates)"""
                  self.model_version = new_version
                  # No explicit invalidation needed - keys change
          ```

          This approach provides clean invalidation without complex tracking.


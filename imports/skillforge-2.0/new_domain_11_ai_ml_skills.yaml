                              "metrics": self._extract_report_metrics,
                              "findings": self._extract_key_findings,
                          }),
                          SummaryStep(llm_client, "report"),
                      ],
                      DocumentType.OTHER: [
                          SummaryStep(llm_client, "general"),
                      ],
                  }

                  # Build main chain
                  self.chain = [
                      ClassifierStep(llm_client),
                      RouterStep(handlers),
                  ]

              async def process(self, document: str) -> ChainState:
                  """Process document through chain"""

                  state = ChainState(document=document)

                  for step in self.chain:
                      try:
                          state = await step.execute(state)
                      except Exception as e:
                          # Log error and continue with partial state
                          state.metadata["error"] = f"{step.name}: {str(e)}"
                          break

                  return state

              async def _extract_invoice_items(self, document: str) -> List[Dict]:

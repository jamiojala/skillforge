          ### Self-Critique Implementation

          ```python
          from typing import List, Dict
          import json

          class ConstitutionalAI:
              def __init__(self, llm_client, constitution: List[Dict]):
                  self.llm = llm_client
                  self.constitution = constitution

              async def generate_with_constitution(
                  self,
                  user_input: str,
                  max_revisions: int = 2
              ) -> Dict:
                  """Generate response with constitutional critique and revision"""

                  # Initial generation
                  response = await self._generate_initial(user_input)

                  revision_history = []

                  for revision_num in range(max_revisions):
                      # Self-critique
                      critique = await self._self_critique(response, user_input)

                      revision_history.append({
                          "revision": revision_num,
                          "response": response,
                          "critique": critique
                      })

                      # Check if response passes all principles
                      if critique["passed_all"]:
                          break

                      # Revise based on critique
                      response = await self._revise(response, critique, user_input)

                  return {
                      "final_response": response,
                      "revision_history": revision_history,
                      "num_revisions": len(revision_history),
                      "final_critique": critique
                  }

              async def _self_critique(self, response: str, user_input: str) -> Dict:
                  """Critique response against constitutional principles"""

                  critique_prompt = f"""
                  You are evaluating a customer support response against constitutional principles.

                  User Query: {user_input}

                  Proposed Response: {response}

                  Evaluate against each principle:

                  {json.dumps(self.constitution, indent=2)}

                  For each principle, provide:
                  1. Whether the response complies (true/false)
                  2. Specific issues found (if any)
                  3. Suggested improvements

                  Return as JSON:
                  {{
                      "evaluations": [
                          {{
                              "principle_id": "HONESTY",
                              "complies": true/false,
                              "issues": ["..."],
                              "suggestions": ["..."]
                          }}
                      ],
                      "passed_all": true/false,
                      "overall_assessment": "..."
                  }}
                  """

                  critique_response = await self.llm.generate(
                      critique_prompt,
                      temperature=0.0,
                      response_format={"type": "json_object"}
                  )

                  return json.loads(critique_response)

              async def _revise(
                  self,
                  response: str,
                  critique: Dict,
                  user_input: str
              ) -> str:
                  """Revise response based on critique"""

                  # Extract violations
                  violations = [
                      e for e in critique["evaluations"]
                      if not e["complies"]
                  ]

                  revision_prompt = f"""
                  Revise the following customer support response to address these constitutional violations:

                  User Query: {user_input}

                  Current Response: {response}

                  Violations to fix:
                  {json.dumps(violations, indent=2)}

                  Provide a revised response that:
                  1. Addresses all violations
                  2. Maintains helpfulness and accuracy
                  3. Stays natural and conversational

                  Revised Response:
                  """

                  revised = await self.llm.generate(revision_prompt, temperature=0.3)
                  return revised.strip()
          ```

          ### Usage Example

          ```python
          # Initialize
          cai = ConstitutionalAI(llm_client, CUSTOMER_SUPPORT_CONSTITUTION)

          # Generate with constitutional review
          result = await cai.generate_with_constitution(
              "I was charged twice for my subscription. I want a refund immediately!"
          )

          print(f"Final response: {result['final_response']}")
          print(f"Revisions needed: {result['num_revisions']}")
          print(f"Passed all principles: {result['final_critique']['passed_all']}")
          ```

          ### Monitoring Principle Violations

          ```python
          class ConstitutionMonitor:
              def __init__(self):
                  self.violation_counts = defaultdict(int)

              def log_critique(self, critique: Dict, user_input: str):
                  """Log critique results for monitoring"""

                  for eval in critique["evaluations"]:
                      if not eval["complies"]:
                          self.violation_counts[eval["principle_id"]] += 1

                          # Alert on repeated violations
                          if self.violation_counts[eval["principle_id"]] > 10:
                              logger.warning(
                                  f"Repeated {eval['principle_id']} violations. "
                                  f"Consider reviewing constitution or model."
                              )

              def get_violation_stats(self) -> Dict:
                  return dict(self.violation_counts)
          ```

          This implementation ensures responses align with defined principles through systematic critique and revision.

      - name: "Constitutional Chain-of-Thought"
        user: |
          How can I make my LLM reason through constitutional principles step by step before responding?
        ai_response: |
          ## Constitutional Chain-of-Thought

          ```python
          class ConstitutionalCoT:
              """Chain-of-thought reasoning through constitutional principles"""

              async def generate_with_cot(self, user_input: str) -> Dict:
                  """Generate response with constitutional reasoning"""

                  # Step 1: Analyze situation
                  analysis = await self._analyze_situation(user_input)

                  # Step 2: Identify relevant principles
                  relevant_principles = await self._identify_principles(analysis)

                  # Step 3: Reason through principles
                  principle_reasoning = await self._reason_through_principles(
                      user_input, analysis, relevant_principles
                  )

                  # Step 4: Generate response informed by reasoning
                  response = await self._generate_informed_response(
                      user_input, principle_reasoning
                  )

                  return {
                      "response": response,
                      "reasoning_chain": {
                          "analysis": analysis,
                          "relevant_principles": relevant_principles,
                          "principle_reasoning": principle_reasoning
                      }
                  }

              async def _analyze_situation(self, user_input: str) -> str:
                  """Analyze the user input for context"""

                  prompt = f"""
                  Analyze this customer query for:
                  1. Intent (what do they want?)
                  2. Emotional state (frustrated, neutral, happy?)
                  3. Urgency (how time-sensitive?)
                  4. Complexity (simple or multi-part?)

                  Query: {user_input}

                  Analysis:
                  """

                  return await self.llm.generate(prompt, temperature=0.3)

              async def _identify_principles(self, analysis: str) -> List[str]:
                  """Identify which constitutional principles are most relevant"""

                  prompt = f"""
                  Based on this situation analysis, which constitutional principles are most relevant?

                  Analysis: {analysis}

                  Available principles: HONESTY, HELPFULNESS, RESPECT, PRIVACY, BOUNDARIES

                  Return the top 3 most relevant principles in order of importance.
                  """

                  response = await self.llm.generate(prompt, temperature=0.0)
                  return [p.strip() for p in response.split(",")]

              async def _reason_through_principles(
                  self,
                  user_input: str,
                  analysis: str,
                  principles: List[str]
              ) -> str:
                  """Reason through each relevant principle"""

                  reasoning_parts = []

                  for principle in principles:
                      prompt = f"""
                      Reason through how to apply the {principle} principle to this situation:

                      User Query: {user_input}
                      Situation Analysis: {analysis}

                      Think step by step:
                      1. What does {principle} require in this context?
                      2. Are there any conflicts with other considerations?
                      3. How should this principle guide the response?

                      Reasoning:
                      """

                      reasoning = await self.llm.generate(prompt, temperature=0.3)
                      reasoning_parts.append(f"{principle}: {reasoning}")

                  return "\n\n".join(reasoning_parts)
          ```

          This approach makes the constitutional reasoning explicit and auditable.


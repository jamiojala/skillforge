        ai_response: |
          ## Hybrid Search for Technical Documentation

          ### Architecture

          ```
          [Query] → [Query Classifier] → [Router]
                          ↓
              ┌───────────┼───────────┐
              ↓           ↓           ↓
          [BM25]    [Dense Vector]  [Sparse Vector]
              ↓           ↓           ↓
              └───────────┴───────────┘
                          ↓

          ## Multi-Layer Semantic Cache for Q&A

          ### Cache Hierarchy

          ```
          [Request]
              ↓
          [L1: Exact Match Cache] (in-memory, <1ms)
              ↓ (miss)
          [L2: Semantic Cache] (Redis + Vector DB, ~10ms)

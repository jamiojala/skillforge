      - name: "Robust Code Generation Rewards"
        user: |
          I'm training an AI to generate code. How do I design rewards that encourage correct, readable code without gaming (like passing tests with trivial solutions)?
        ai_response: |
          ## Robust Code Generation Reward Design

          ### Multi-Faceted Reward Function

          ```python
          from typing import Dict, List
          import ast

          class RobustCodeReward:
              """Multi-objective reward function for code generation"""

              def __init__(self):
                  self.weights = {
                      'correctness': 0.4,
                      'readability': 0.2,
                      'efficiency': 0.15,
                      'style': 0.15,
                      'documentation': 0.10,
                  }

              def compute_reward(self, code: str, test_cases: List[Dict]) -> Dict:
                  """Compute multi-faceted reward"""

                  rewards = {}

                  # 1. Correctness (process-based where possible)
                  rewards['correctness'] = self._correctness_reward(code, test_cases)

                  # 2. Readability
                  rewards['readability'] = self._readability_reward(code)

                  # 3. Efficiency
                  rewards['efficiency'] = self._efficiency_reward(code, test_cases)

                  # 4. Style compliance
                  rewards['style'] = self._style_reward(code)

                  # 5. Documentation
                  rewards['documentation'] = self._documentation_reward(code)

                  # Weighted sum
                  total = sum(
                      rewards[k] * self.weights[k]
                      for k in rewards
                  )

                  return {
                      'total': total,
                      'components': rewards,
                      'details': self._get_reward_details(code)
                  }

              def _correctness_reward(self, code: str, test_cases: List[Dict]) -> float:
                  """Reward for correctness with anti-gaming measures"""

                  passed = 0
                  total = len(test_cases)

                  for test in test_cases:
                      try:
                          # Execute with timeout
                          result = self._execute_with_timeout(code, test['input'])

                          if result == test['expected']:
                              passed += 1
                      except:
                          pass

                  base_score = passed / total if total > 0 else 0

                  # Anti-gaming: Penalize trivial solutions
                  if self._is_trivial_solution(code, test_cases):
                      base_score *= 0.1  # Heavy penalty

                  # Anti-gaming: Require reasonable code length
                  if len(code.strip()) < 20:
                      base_score *= 0.5

                  return base_score

              def _is_trivial_solution(self, code: str, test_cases: List[Dict]) -> bool:
                  """Detect trivial/hardcoded solutions"""

                  # Check for hardcoded outputs
                  for test in test_cases:
                      expected_str = str(test['expected'])
                      if expected_str in code and len(test_cases) <= 3:
                          return True

                  # Check for trivial if-else chains
                  if code.count('if') >= len(test_cases) - 1:
                      return True

                  # Check for no actual logic
                  try:
                      tree = ast.parse(code)
                      has_logic = any(
                          isinstance(node, (ast.For, ast.While, ast.ListComp))
                          for node in ast.walk(tree)
                      )
                      if not has_logic and len(test_cases) > 2:
                          return True
                  except:
                      pass

                  return False

              def _readability_reward(self, code: str) -> float:
                  """Reward for code readability"""

                  score = 1.0

                  # Penalize very long lines
                  long_lines = sum(1 for line in code.split('\n') if len(line) > 100)
                  score -= long_lines * 0.05

                  # Reward meaningful variable names
                  try:
                      tree = ast.parse(code)
                      for node in ast.walk(tree):
                          if isinstance(node, ast.Name):
                              if len(node.id) == 1 and node.id not in 'ijk':
                                  score -= 0.1  # Penalize single-letter names (except loop vars)
                  except:
                      pass

                  # Reward proper indentation
                  lines = code.split('\n')
                  indent_issues = sum(
                      1 for line in lines
                      if line.strip() and not line.startswith(' ') and not line.startswith('\t')
                      and not line.strip().startswith('#')
                  )
                  score -= indent_issues * 0.1

                  return max(0, score)

              def _efficiency_reward(self, code: str, test_cases: List[Dict]) -> float:
                  """Reward for algorithmic efficiency"""

                  # Measure execution time on large inputs
                  large_test = self._generate_large_test(test_cases)

                  try:
                      start = time.time()
                      self._execute_with_timeout(code, large_test['input'], timeout=5)
                      execution_time = time.time() - start

                      # Reward faster solutions
                      if execution_time < 0.1:
                          return 1.0
                      elif execution_time < 1.0:
                          return 0.7
                      elif execution_time < 5.0:
                          return 0.4
                      else:
                          return 0.1
                  except:
                      return 0.0

              def _style_reward(self, code: str) -> float:
                  """Reward for following style guidelines"""

                  score = 1.0

                  # Check PEP 8 compliance (simplified)
                  if 'import *' in code:
                      score -= 0.3

                  # Reward docstrings
                  if '"""' in code or "'''" in code:
                      score += 0.1

                  # Penalize excessive blank lines
                  blank_lines = code.count('\n\n\n')
                  score -= blank_lines * 0.1

                  return max(0, min(1, score))

              def _documentation_reward(self, code: str) -> float:
                  """Reward for code documentation"""

                  score = 0.0

                  # Check for docstring
                  if '"""' in code or "'''" in code:
                      score += 0.5

                  # Check for comments
                  comment_lines = code.count('#')
                  if comment_lines > 0:
                      score += min(0.5, comment_lines * 0.1)

                  return min(1.0, score)
          ```

          ### Adversarial Testing

          ```python
          class AdversarialRewardTester:
              """Test reward function against gaming attempts"""

              GAMING_ATTEMPTS = [
                  # Hardcoded solutions
                  {
                      "name": "hardcoded_if_chain",
                      "code": '''
def solution(x):
    if x == 1:
        return 2
    if x == 2:
        return 4
    if x == 3:
        return 6
    return 0
                      ''',
                      "expected_behavior": "Low reward - trivial solution"
                  },
                  # Obfuscated hardcoding
                  {
                      "name": "obfuscated_hardcode",
                      "code": '''
def solution(x):
    results = {1: 2, 2: 4, 3: 6}
    return results.get(x, 0)
                      ''',
                      "expected_behavior": "Low reward - still hardcoded"
                  },
                  # Minimal code
                  {
                      "name": "minimal_code",
                      "code": 'def solution(x):return x*2',
                      "expected_behavior": "Reduced reward - too minimal"
                  },
              ]

              def test_reward_function(self, reward_fn):
                  """Test reward function against gaming attempts"""

                  results = []
                  for attempt in self.GAMING_ATTEMPTS:
                      reward = reward_fn.compute_reward(
                          attempt["code"],
                          test_cases=[
                              {"input": 1, "expected": 2},
                              {"input": 2, "expected": 4},
                              {"input": 3, "expected": 6},
                          ]
                      )

                      results.append({
                          "attempt": attempt["name"],
                          "reward": reward['total'],
                          "components": reward['components'],
                          "expected": attempt["expected_behavior"],
                          "passed": reward['total'] < 0.5  # Should be low
                      })

                  return results
          ```

          ### Reward Monitoring

          ```python
          class RewardMonitor:
              """Monitor for suspicious reward patterns"""

              def __init__(self):
                  self.reward_history = []
                  self.anomaly_threshold = 2.0  # Standard deviations

              def log_reward(self, episode: int, reward: Dict):
                  """Log reward for monitoring"""

                  self.reward_history.append({
                      "episode": episode,
                      "total": reward['total'],
                      "components": reward['components']
                  })

                  # Check for anomalies
                  if len(self.reward_history) > 100:
                      self._check_anomalies()

              def _check_anomalies(self):
                  """Detect suspicious reward patterns"""

                  recent = self.reward_history[-100:]
                  totals = [r['total'] for r in recent]

                  mean = np.mean(totals)
                  std = np.std(totals)

                  # Check for sudden spikes
                  if totals[-1] > mean + self.anomaly_threshold * std:
                      logger.warning(
                          f"Suspicious reward spike detected: {totals[-1]:.3f} "
                          f"(mean: {mean:.3f}, std: {std:.3f})"
                      )

                  # Check for component imbalance
                  recent_components = [r['components'] for r in recent[-10:]]
                  for component in ['correctness', 'readability', 'efficiency']:
                      values = [c.get(component, 0) for c in recent_components]
                      if np.mean(values) > 0.9 and component != 'correctness':
                          logger.warning(
                              f"Potential gaming: {component} consistently high"
                          )
          ```

          This multi-faceted approach prevents reward hacking through diverse signals and adversarial testing.


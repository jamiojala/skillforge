    examples:
      - name: "LLM Agent Pool Management"
        user: |
          I need to manage a pool of LLM agents that handle user requests. How do I handle initialization, health checks, scaling, and shutdown properly?
        ai_response: |
          ## LLM Agent Pool Lifecycle Management

          ### Complete Lifecycle Implementation

          ```python
          import asyncio
          from typing import List, Optional, Dict, Any
          from dataclasses import dataclass, field
          from enum import Enum
          import time
          import logging

          logger = logging.getLogger(__name__)

          class AgentState(Enum):
              INITIALIZING = "initializing"
              WARMING_UP = "warming_up"
              READY = "ready"
              BUSY = "busy"
              UNHEALTHY = "unhealthy"
              SHUTTING_DOWN = "shutting_down"
              TERMINATED = "terminated"

          @dataclass
          class AgentMetrics:
              requests_processed: int = 0
              total_latency_ms: float = 0
              errors: int = 0
              last_health_check: float = 0
              state_transitions: List[tuple] = field(default_factory=list)

              @property
              def avg_latency_ms(self) -> float:
                  if self.requests_processed == 0:
                      return 0
                  return self.total_latency_ms / self.requests_processed

              @property
              def error_rate(self) -> float:
                  if self.requests_processed == 0:
                      return 0
                  return self.errors / self.requests_processed

          class ManagedAgent:
              """Individual agent with lifecycle management"""

              def __init__(self, agent_id: str, llm_client):
                  self.agent_id = agent_id
                  self.llm_client = llm_client
                  self.state = AgentState.INITIALIZING
                  self.metrics = AgentMetrics()
                  self.current_request: Optional[asyncio.Task] = None
                  self._state_lock = asyncio.Lock()
                  self._shutdown_event = asyncio.Event()

              async def initialize(self):
                  """Initialize agent and perform warmup"""
                  async with self._state_lock:
                      self.state = AgentState.INITIALIZING
                      logger.info(f"Agent {self.agent_id}: Initializing")

                  # Initialize LLM connection
                  await self.llm_client.connect()

                  # Warmup: process a simple request
                  async with self._state_lock:
                      self.state = AgentState.WARMING_UP
                      logger.info(f"Agent {self.agent_id}: Warming up")

                  try:
                      await self.llm_client.generate("Hello, warm up test.", max_tokens=10)
                  except Exception as e:
                      logger.error(f"Agent {self.agent_id}: Warmup failed: {e}")
                      async with self._state_lock:
                          self.state = AgentState.UNHEALTHY
                      raise

                  async with self._state_lock:
                      self.state = AgentState.READY
                      logger.info(f"Agent {self.agent_id}: Ready")

              async def health_check(self) -> bool:
                  """Perform health check"""
                  try:
                      # Quick ping to LLM
                      start = time.time()
                      await asyncio.wait_for(
                          self.llm_client.generate("ping", max_tokens=5),
                          timeout=5.0
                      )
                      latency = (time.time() - start) * 1000

                      self.metrics.last_health_check = time.time()

                      # Check if latency is acceptable
                      if latency > 10000:  # 10 seconds
                          logger.warning(f"Agent {self.agent_id}: High latency {latency}ms")
                          return False

                      return True
                  except Exception as e:
                      logger.error(f"Agent {self.agent_id}: Health check failed: {e}")
                      return False

              async def process(self, request: str) -> str:
                  """Process a request"""
                  async with self._state_lock:
                      if self.state != AgentState.READY:
                          raise RuntimeError(f"Agent not ready: {self.state}")
                      self.state = AgentState.BUSY

                  start = time.time()
                  try:
                      response = await self.llm_client.generate(request)

                      self.metrics.requests_processed += 1
                      self.metrics.total_latency_ms += (time.time() - start) * 1000

                      return response
                  except Exception as e:
                      self.metrics.errors += 1
                      raise
                  finally:
                      async with self._state_lock:
                          if self.state == AgentState.BUSY:
                              self.state = AgentState.READY

              async def shutdown(self, timeout: float = 30.0):
                  """Graceful shutdown with request draining"""
                  async with self._state_lock:
                      if self.state in [AgentState.SHUTTING_DOWN, AgentState.TERMINATED]:
                          return
                      self.state = AgentState.SHUTTING_DOWN
                      logger.info(f"Agent {self.agent_id}: Shutting down")

                  # Wait for current request to complete
                  if self.current_request and not self.current_request.done():
                      try:
                          await asyncio.wait_for(
                              self.current_request,
                              timeout=timeout
                          )
                      except asyncio.TimeoutError:
                          logger.warning(f"Agent {self.agent_id}: Request drain timeout")
                          self.current_request.cancel()

                  # Close LLM connection
                  await self.llm_client.close()

                  async with self._state_lock:
                      self.state = AgentState.TERMINATED
                      logger.info(f"Agent {self.agent_id}: Terminated")

          class AgentPool:
              """Managed pool of agents with auto-scaling"""

              def __init__(
                  self,
                  min_size: int = 2,
                  max_size: int = 20,
                  scale_up_threshold: int = 5,
                  scale_down_threshold: int = 2,
                  health_check_interval: float = 30.0
              ):
                  self.min_size = min_size
                  self.max_size = max_size
                  self.scale_up_threshold = scale_up_threshold
                  self.scale_down_threshold = scale_down_threshold
                  self.health_check_interval = health_check_interval

                  self.agents: Dict[str, ManagedAgent] = {}
                  self.request_queue: asyncio.Queue = asyncio.Queue()
                  self._pool_lock = asyncio.Lock()
                  self._shutdown = False
                  self._scaling_task: Optional[asyncio.Task] = None
                  self._health_check_task: Optional[asyncio.Task] = None

              async def start(self):
                  """Start the pool with minimum agents"""
                  logger.info(f"Starting agent pool (min={self.min_size}, max={self.max_size})")

                  # Create initial agents
                  for i in range(self.min_size):
                      await self._create_agent()

                  # Start background tasks
                  self._scaling_task = asyncio.create_task(self._scaling_loop())
                  self._health_check_task = asyncio.create_task(self._health_check_loop())

              async def _create_agent(self) -> ManagedAgent:
                  """Create and initialize a new agent"""
                  agent_id = f"agent-{len(self.agents)}"
                  llm_client = LLMClient()  # Your LLM client

                  agent = ManagedAgent(agent_id, llm_client)
                  await agent.initialize()

                  async with self._pool_lock:
                      self.agents[agent_id] = agent

                  return agent

              async def _scaling_loop(self):
                  """Auto-scaling based on queue depth"""
                  while not self._shutdown:
                      await asyncio.sleep(10)  # Check every 10 seconds

                      queue_size = self.request_queue.qsize()
                      healthy_agents = len([a for a in self.agents.values()
                                          if a.state == AgentState.READY])

                      # Scale up if queue depth per agent exceeds threshold
                      if healthy_agents > 0 and queue_size / healthy_agents > self.scale_up_threshold:
                          if len(self.agents) < self.max_size:
                              logger.info(f"Scaling up: queue={queue_size}, agents={healthy_agents}")
                              try:
                                  await self._create_agent()
                              except Exception as e:
                                  logger.error(f"Scale up failed: {e}")

                      # Scale down if excess capacity
                      elif queue_size == 0 and healthy_agents > self.min_size:
                          # Find idle agent to remove
                          idle_agents = [a for a in self.agents.values()
                                       if a.state == AgentState.READY]
                          if len(idle_agents) > self.min_size:
                              agent_to_remove = idle_agents[0]
                              logger.info(f"Scaling down: removing {agent_to_remove.agent_id}")
                              await self._remove_agent(agent_to_remove.agent_id)

              async def _health_check_loop(self):
                  """Periodic health checks"""
                  while not self._shutdown:
                      await asyncio.sleep(self.health_check_interval)

                      unhealthy = []
                      for agent_id, agent in self.agents.items():
                          is_healthy = await agent.health_check()
                          if not is_healthy:
                              unhealthy.append(agent_id)

                      # Replace unhealthy agents
                      for agent_id in unhealthy:
                          logger.warning(f"Replacing unhealthy agent: {agent_id}")
                          await self._remove_agent(agent_id)
                          try:
                              await self._create_agent()
                          except Exception as e:
                              logger.error(f"Failed to replace agent: {e}")

              async def _remove_agent(self, agent_id: str):
                  """Remove an agent from the pool"""
                  async with self._pool_lock:
                      agent = self.agents.pop(agent_id, None)

                  if agent:
                      await agent.shutdown()

              async def submit(self, request: str) -> str:
                  """Submit request to pool"""
                  if self._shutdown:
                      raise RuntimeError("Pool is shutting down")

                  # Find available agent
                  async with self._pool_lock:
                      available = [a for a in self.agents.values()
                                 if a.state == AgentState.READY]

                      if not available:
                          # Queue request if no agents available
                          future = asyncio.Future()
                          await self.request_queue.put((request, future))
                          return await future

                      # Round-robin selection
                      agent = available[0]

                  return await agent.process(request)

              async def shutdown(self):
                  """Graceful shutdown of entire pool"""
                  logger.info("Shutting down agent pool")
                  self._shutdown = True

                  # Cancel background tasks
                  if self._scaling_task:
                      self._scaling_task.cancel()
                  if self._health_check_task:
                      self._health_check_task.cancel()

                  # Shutdown all agents
                  shutdown_tasks = [agent.shutdown() for agent in self.agents.values()]
                  await asyncio.gather(*shutdown_tasks, return_exceptions=True)

                  logger.info("Agent pool shutdown complete")
          ```

          ### Usage

          ```python
          # Create and start pool
          pool = AgentPool(
              min_size=2,
              max_size=20,
              scale_up_threshold=5,   # Scale up when 5+ requests per agent
              scale_down_threshold=2  # Scale down when <2 requests per agent
          )
          await pool.start()

          # Submit requests
          response = await pool.submit("What is machine learning?")

          # Graceful shutdown
          await pool.shutdown()
          ```

          This implementation provides complete lifecycle management with auto-scaling, health monitoring, and graceful shutdown.

      - name: "Circuit Breaker for Agent Failures"
        user: |
          My agents sometimes fail due to external API issues. How do I prevent cascade failures and implement proper circuit breaking?
        ai_response: |
          ## Circuit Breaker Pattern for Agent Resilience

          ```python
          from enum import Enum
          from typing import Callable, Optional
          import asyncio
          import time
          from dataclasses import dataclass

          class CircuitState(Enum):
              CLOSED = "closed"      # Normal operation
              OPEN = "open"          # Failing, reject requests
              HALF_OPEN = "half_open"  # Testing if recovered

          @dataclass
          class CircuitBreakerConfig:
              failure_threshold: int = 5
              recovery_timeout: float = 30.0
              half_open_max_calls: int = 3
              success_threshold: int = 2

          class CircuitBreaker:
              """Circuit breaker for agent calls"""

              def __init__(self, name: str, config: CircuitBreakerConfig = None):
                  self.name = name
                  self.config = config or CircuitBreakerConfig()

                  self.state = CircuitState.CLOSED
                  self.failure_count = 0
                  self.success_count = 0
                  self.last_failure_time: Optional[float] = None
                  self.half_open_calls = 0

                  self._lock = asyncio.Lock()

              async def call(self, func: Callable, *args, **kwargs):
                  """Execute function with circuit breaker protection"""

                  async with self._lock:
                      if self.state == CircuitState.OPEN:
                          if self._should_attempt_reset():
                              self.state = CircuitState.HALF_OPEN
                              self.half_open_calls = 0
                              self.success_count = 0
                          else:
                              raise CircuitBreakerOpen(f"Circuit {self.name} is OPEN")

                      if self.state == CircuitState.HALF_OPEN:
                          if self.half_open_calls >= self.config.half_open_max_calls:
                              raise CircuitBreakerOpen(f"Circuit {self.name} half-open limit reached")
                          self.half_open_calls += 1

                  # Execute the call
                  try:
                      result = await func(*args, **kwargs)
                      await self._on_success()
                      return result
                  except Exception as e:
                      await self._on_failure()
                      raise

              async def _on_success(self):
                  async with self._lock:
                      if self.state == CircuitState.HALF_OPEN:
                          self.success_count += 1
                          if self.success_count >= self.config.success_threshold:
                              self._reset()
                      else:
                          self.failure_count = 0

              async def _on_failure(self):
                  async with self._lock:
                      self.failure_count += 1
                      self.last_failure_time = time.time()

                      if self.state == CircuitState.HALF_OPEN:
                          self.state = CircuitState.OPEN
                      elif self.failure_count >= self.config.failure_threshold:
                          self.state = CircuitState.OPEN

              def _should_attempt_reset(self) -> bool:
                  if self.last_failure_time is None:
                      return True
                  return time.time() - self.last_failure_time >= self.config.recovery_timeout

              def _reset(self):
                  self.state = CircuitState.CLOSED
                  self.failure_count = 0
                  self.success_count = 0
                  self.half_open_calls = 0
                  self.last_failure_time = None

          class CircuitBreakerOpen(Exception):
              pass

          # Usage with agent
          class ResilientAgent:
              def __init__(self):
                  self.circuit_breaker = CircuitBreaker(
                      "llm_api",
                      CircuitBreakerConfig(
                          failure_threshold=5,
                          recovery_timeout=30.0
                      )
                  )

              async def generate(self, prompt: str) -> str:
                  return await self.circuit_breaker.call(
                      self._call_llm_api,
                      prompt
                  )

              async def _call_llm_api(self, prompt: str) -> str:
                  # Actual LLM API call
                  pass
          ```

          This prevents cascade failures by stopping calls to failing services and allowing them time to recover.


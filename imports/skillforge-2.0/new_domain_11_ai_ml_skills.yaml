          trace.get_tracer_provider().add_span_processor(span_processor)

          # Prometheus metrics
          llm_requests = Counter('llm_requests_total', 'Total LLM requests', ['model', 'status'])
          llm_latency = Histogram('llm_latency_seconds', 'Request latency', ['model'])
          ttft_metric = Histogram('llm_ttft_seconds', 'Time to first token', ['model'])
          tpot_metric = Histogram('llm_tpot_seconds', 'Time per output token', ['model'])
          token_usage = Counter('llm_tokens_total', 'Token usage', ['model', 'type'])
          cost_metric = Counter('llm_cost_dollars', 'Cost in dollars', ['model', 'user_tier'])
          active_requests = Gauge('llm_active_requests', 'Active requests', ['model'])

          class ObservableLLM:
              def __init__(self, model_name: str, cost_per_1k_tokens: dict):
                  self.model_name = model_name
                  self.cost_per_1k = cost_per_1k_tokens

              @tracer.start_as_current_span("llm.generate")
              async def generate(self, prompt: str, user_id: str = None, user_tier: str = "free"):
                  span = trace.get_current_span()
                  start_time = time.time()

                  # Track active requests
                  active_requests.labels(model=self.model_name).inc()

                  try:
                      # Log prompt (be careful with PII)
                      span.set_attribute("llm.prompt_length", len(prompt))
                      span.set_attribute("llm.model", self.model_name)
                      span.set_attribute("user.id", user_id)

                      # Call LLM
                      first_token_time = None
                      tokens_generated = 0

                      response_chunks = []
                      async for chunk in self._stream_generate(prompt):
                          if first_token_time is None:
                              first_token_time = time.time()
                              ttft = first_token_time - start_time
                              ttft_metric.labels(model=self.model_name).observe(ttft)
                              span.set_attribute("llm.ttft", ttft)

                          response_chunks.append(chunk)
                          tokens_generated += 1

                      response = "".join(response_chunks)
                      total_time = time.time() - start_time

                      # Calculate metrics
                      input_tokens = self._count_tokens(prompt)
                      output_tokens = tokens_generated
                      tpot = (total_time - (first_token_time - start_time)) / output_tokens if output_tokens > 0 else 0

                      # Track tokens
                      token_usage.labels(model=self.model_name, type="input").inc(input_tokens)
                      token_usage.labels(model=self.model_name, type="output").inc(output_tokens)

                      # Track cost
                      input_cost = (input_tokens / 1000) * self.cost_per_1k['input']
                      output_cost = (output_tokens / 1000) * self.cost_per_1k['output']
                      total_cost = input_cost + output_cost
                      cost_metric.labels(model=self.model_name, user_tier=user_tier).inc(total_cost)

                      # Track latency
                      llm_latency.labels(model=self.model_name).observe(total_time)
                      tpot_metric.labels(model=self.model_name).observe(tpot)

                      # Track success
                      llm_requests.labels(model=self.model_name, status="success").inc()

                      # Set span attributes
                      span.set_attribute("llm.input_tokens", input_tokens)
                      span.set_attribute("llm.output_tokens", output_tokens)
                      span.set_attribute("llm.total_tokens", input_tokens + output_tokens)
                      span.set_attribute("llm.cost", total_cost)
                      span.set_attribute("llm.total_latency", total_time)
                      span.set_attribute("llm.tpot", tpot)

                      return response

                  except Exception as e:
                      llm_requests.labels(model=self.model_name, status="error").inc()
                      span.set_attribute("error", True)
                      span.set_attribute("error.message", str(e))
                      raise

                  finally:
                      active_requests.labels(model=self.model_name).dec()

              def _count_tokens(self, text: str) -> int:
                  # Use appropriate tokenizer
                  return len(self.tokenizer.encode(text))


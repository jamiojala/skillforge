          class PriorityRouter:
              """Route high-priority requests with preemption capability"""

              HIGH_PRIORITY_THRESHOLD = 8  # Priority >= 8 can preempt

              async def route_with_preemption(self, request: Request) -> str:
                  if request.priority >= self.HIGH_PRIORITY_THRESHOLD:
                      # Try to preempt a low-priority request
                      preempted = self._try_preempt(request)
                      if preempted:
                          return preempted

                  # Normal routing
                  return await self.route(request)

              def _try_preempt(self, high_priority_request: Request) -> Optional[str]:
                  """Try to find a backend where we can preempt a low-priority request"""
                  for backend in self.backends.values():
                      if not backend.healthy:
                          continue

                      # Check if any running request can be preempted
                      preemptable = self._find_preemptable_request(backend.id)
                      if preemptable:

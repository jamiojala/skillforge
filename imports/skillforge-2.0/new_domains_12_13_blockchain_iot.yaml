              ### Factory Provisioning Script
              
              ```python
              # factory/provision_devices.py
              import json
              import subprocess
              from pathlib import Path
              from datetime import datetime
              
              class FactoryProvisioner:
                  def __init__(self, ca_dir: str, output_dir: str):
                      self.ca_dir = ca_dir
                      self.output_dir = Path(output_dir)
                      self.output_dir.mkdir(parents=True, exist_ok=True)
                  
                  def provision_device(self, device_id: str, hardware_id: str):
                      """Provision a single device at factory"""
                      
                      # Generate device certificate
                      cert_info = self._generate_certificate(device_id)
                      
                      # Create device configuration
                      config = {
                          'device_id': device_id,
                          'hardware_id': hardware_id,
                          'provisioning': {
                              'dps_id_scope': '0ne00000000',
                              'registration_id': device_id,
                              'cert_path': '/opt/certs/device.crt',
                              'key_path': '/opt/certs/device.key'
                          },
                          'iot_hub': None,  # Will be assigned by DPS
                          'provisioned_at': datetime.utcnow().isoformat()
                      }
                      
                      # Save configuration
                      config_path = self.output_dir / f'{device_id}_config.json'
                      with open(config_path, 'w') as f:
                          json.dump(config, f, indent=2)
                      
                      # Save certificates for device flashing
                      device_cert_dir = self.output_dir / 'certs' / device_id
                      device_cert_dir.mkdir(parents=True, exist_ok=True)
                      
                      subprocess.run([
                          'cp', cert_info['cert_path'], device_cert_dir / 'device.crt'
                      ])
                      subprocess.run([
                          'cp', cert_info['key_path'], device_cert_dir / 'device.key'
                      ])
                      
                      # Create provisioning manifest
                      manifest = {
                          'device_id': device_id,
                          'hardware_id': hardware_id,
                          'certificate_fingerprint': self._get_cert_fingerprint(
                              cert_info['cert_path']
                          ),
                          'provisioned_at': datetime.utcnow().isoformat()
                      }
                      
                      manifest_path = self.output_dir / 'manifests' / f'{device_id}.json'
                      manifest_path.parent.mkdir(parents=True, exist_ok=True)
                      with open(manifest_path, 'w') as f:
                          json.dump(manifest, f, indent=2)
                      
                      print(f"Device {device_id} provisioned successfully")
                      return config
                  
                  def _generate_certificate(self, device_id: str):
                      """Generate device certificate"""
                      # Use certificate generation from earlier
                      from scripts.generate_certificates import create_device_certificate
                      return create_device_certificate(
                          device_id,
                          str(self.output_dir / 'certs'),
                          self.ca_dir
                      )
                  
                  def _get_cert_fingerprint(self, cert_path: str) -> str:
                      """Get certificate fingerprint"""
                      result = subprocess.run(
                          ['openssl', 'x509', '-in', cert_path, '-noout', '-fingerprint'],
                          capture_output=True,
                          text=True
                      )
                      return result.stdout.strip().split('=')[1]
                  
                  def batch_provision(self, device_list: list):
                      """Provision multiple devices"""
                      results = []
                      for device_info in device_list:
                          try:
                              config = self.provision_device(
                                  device_info['device_id'],
                                  device_info['hardware_id']
                              )
                              results.append({
                                  'device_id': device_info['device_id'],
                                  'status': 'success',
                                  'config': config
                              })
                          except Exception as e:
                              results.append({
                                  'device_id': device_info['device_id'],
                                  'status': 'failed',
                                  'error': str(e)
                              })
                      
                      # Save batch manifest
                      batch_manifest = {
                          'provisioned_at': datetime.utcnow().isoformat(),
                          'total_devices': len(device_list),
                          'successful': len([r for r in results if r['status'] == 'success']),
                          'failed': len([r for r in results if r['status'] == 'failed']),
                          'devices': results
                      }
                      
                      with open(self.output_dir / 'batch_manifest.json', 'w') as f:
                          json.dump(batch_manifest, f, indent=2)
                      
                      return results
              
              # Usage
              if __name__ == '__main__':
                  provisioner = FactoryProvisioner(
                      ca_dir='certificates/ca',
                      output_dir='factory_output'
                  )
                  
                  devices = [
                      {'device_id': 'device-001', 'hardware_id': 'HW-001'},
                      {'device_id': 'device-002', 'hardware_id': 'HW-002'},
                      {'device_id': 'device-003', 'hardware_id': 'HW-003'},
                  ]
                  
                  provisioner.batch_provision(devices)

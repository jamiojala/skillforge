        examples:
          - name: "Constant Product AMM"
            user: "Design a Uniswap V2 style AMM with basic swap functionality"
            ai_response: |
              ## Constant Product AMM Design
              
              ### Mathematical Foundation
              
              The constant product formula: `x * y = k`
              - x: Reserve of token A
              - y: Reserve of token B
              - k: Constant (invariant)
              
              ### Implementation
              
              ```solidity
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "@openzeppelin/contracts/token/ERC20/IERC20.sol";
              import "@openzeppelin/contracts/security/ReentrancyGuard.sol";
              
              contract ConstantProductAMM is ReentrancyGuard {
                  IERC20 public tokenA;
                  IERC20 public tokenB;
                  
                  uint256 public reserveA;
                  uint256 public reserveB;
                  uint256 public totalSupply;
                  mapping(address => uint256) public balanceOf;
                  
                  uint256 public constant FEE_NUMERATOR = 997;  // 0.3% fee
                  uint256 public constant FEE_DENOMINATOR = 1000;
                  
                  event Mint(address indexed sender, uint256 amountA, uint256 amountB);
                  event Burn(address indexed sender, uint256 amountA, uint256 amountB);
                  event Swap(
                      address indexed sender,
                      address indexed tokenIn,
                      uint256 amountIn,
                      address indexed tokenOut,
                      uint256 amountOut
                  );
                  
                  constructor(address _tokenA, address _tokenB) {
                      tokenA = IERC20(_tokenA);
                      tokenB = IERC20(_tokenB);
                  }
                  
                  // Add liquidity
                  function addLiquidity(uint256 amountA, uint256 amountB) 
                      external 
                      nonReentrant 
                      returns (uint256 liquidity 
                  ) {
                      if (reserveA == 0 && reserveB == 0) {
                          // First deposit - set ratio
                          liquidity = sqrt(amountA * amountB);
                      } else {
                          // Maintain ratio
                          require(
                              amountA * reserveB == amountB * reserveA,
                              "Invalid ratio"
                          );
                          liquidity = (amountA * totalSupply) / reserveA;
                      }
                      
                      require(liquidity > 0, "Insufficient liquidity");
                      
                      tokenA.transferFrom(msg.sender, address(this), amountA);
                      tokenB.transferFrom(msg.sender, address(this), amountB);
                      
                      reserveA += amountA;
                      reserveB += amountB;
                      totalSupply += liquidity;
                      balanceOf[msg.sender] += liquidity;
                      
                      emit Mint(msg.sender, amountA, amountB);
                      return liquidity;
                  }
                  
                  // Remove liquidity
                  function removeLiquidity(uint256 liquidity) 
                      external 
                      nonReentrant 
                      returns (uint256 amountA, uint256 amountB) 
                  {
                      require(balanceOf[msg.sender] >= liquidity, "Insufficient balance");
                      
                      amountA = (liquidity * reserveA) / totalSupply;
                      amountB = (liquidity * reserveB) / totalSupply;
                      
                      balanceOf[msg.sender] -= liquidity;
                      totalSupply -= liquidity;
                      reserveA -= amountA;
                      reserveB -= amountB;
                      
                      tokenA.transfer(msg.sender, amountA);
                      tokenB.transfer(msg.sender, amountB);
                      
                      emit Burn(msg.sender, amountA, amountB);
                  }
                  
                  // Swap with slippage protection
                  function swap(
                      address tokenIn,
                      uint256 amountIn,
                      uint256 minAmountOut
                  ) external nonReentrant {
                      require(
                          tokenIn == address(tokenA) || tokenIn == address(tokenB),
                          "Invalid token"
                      );
                      require(amountIn > 0, "Zero amount");
                      
                      bool isAtoB = tokenIn == address(tokenA);
                      IERC20 tokenOut = isAtoB ? tokenB : tokenA;
                      
                      uint256 reserveIn = isAtoB ? reserveA : reserveB;
                      uint256 reserveOut = isAtoB ? reserveB : reserveA;
                      
                      // Calculate output with fee
                      uint256 amountInWithFee = amountIn * FEE_NUMERATOR;
                      uint256 numerator = amountInWithFee * reserveOut;
                      uint256 denominator = (reserveIn * FEE_DENOMINATOR) + amountInWithFee;
                      uint256 amountOut = numerator / denominator;
                      
                      require(amountOut >= minAmountOut, "Slippage exceeded");
                      require(amountOut < reserveOut, "Insufficient liquidity");
                      
                      // Update reserves
                      if (isAtoB) {
                          reserveA += amountIn;
                          reserveB -= amountOut;
                      } else {
                          reserveB += amountIn;
                          reserveA -= amountOut;
                      }
                      
                      // Transfer
                      IERC20(tokenIn).transferFrom(msg.sender, address(this), amountIn);
                      tokenOut.transfer(msg.sender, amountOut);
                      
                      emit Swap(msg.sender, tokenIn, amountIn, address(tokenOut), amountOut);
                  }
                  
                  // Get swap quote
                  function getSwapQuote(
                      address tokenIn,
                      uint256 amountIn
                  ) external view returns (uint256 amountOut) {
                      bool isAtoB = tokenIn == address(tokenA);
                      uint256 reserveIn = isAtoB ? reserveA : reserveB;
                      uint256 reserveOut = isAtoB ? reserveB : reserveA;
                      
                      uint256 amountInWithFee = amountIn * FEE_NUMERATOR;
                      uint256 numerator = amountInWithFee * reserveOut;
                      uint256 denominator = (reserveIn * FEE_DENOMINATOR) + amountInWithFee;
                      return numerator / denominator;
                  }
                  
                  function sqrt(uint256 x) internal pure returns (uint256) {
                      if (x == 0) return 0;
                      uint256 z = (x + 1) / 2;
                      uint256 y = x;
                      while (z < y) {
                          y = z;
                          z = (x / z + z) / 2;
                      }
                      return y;
                  }
              }
              ```
              
              ### Key Features
              
              1. **Constant Product Formula**: `x * y = k`
              2. **0.3% Trading Fee**: Built into swap calculation
              3. **Slippage Protection**: `minAmountOut` parameter
              4. **Reentrancy Guard**: Prevents reentrancy attacks
              5. **Ratio Enforcement**: Maintains pool ratio on deposits
              
              ### Testing Invariants
              
              ```solidity
              function invariant_ConstantProduct() public {
                  assertEq(amm.reserveA() * amm.reserveB(), initialK);
              }
              ```
            notes: "Complete constant product AMM with security features and mathematical rigor"
          
          - name: "Concentrated Liquidity AMM"
            user: "How does Uniswap V3 style concentrated liquidity work?"
            ai_response: |
              ## Concentrated Liquidity AMM
              
              ### Concept
              
              LPs provide liquidity within specific price ranges, improving capital efficiency.
              
              ### Key Differences from V2
              
              | Feature | V2 | V3 |
              |---------|-----|-----|
              | Price range | (0, ∞) | Custom range |
              | Capital efficiency | 1x | Up to 4000x |
              | LP tokens | Fungible | NFT positions |
              | Fees | 0.3% | Multiple tiers |
              
              ### Simplified Implementation
              
              ```solidity
              contract ConcentratedLiquidityAMM {
                  struct Position {
                      uint128 liquidity;
                      uint256 feeGrowthInside0Last;
                      uint256 feeGrowthInside1Last;
                      uint128 tokensOwed0;
                      uint128 tokensOwed1;
                  }
                  
                  // Price tick spacing
                  int24 public constant TICK_SPACING = 60;
                  
                  // Fee tiers (0.05%, 0.3%, 1%)
                  uint24 public constant FEE_LOW = 500;
                  uint24 public constant FEE_MEDIUM = 3000;
                  uint24 public constant FEE_HIGH = 10000;
                  
                  // Tick bitmap for efficient tick tracking
                  mapping(int16 => uint256) public tickBitmap;
                  
                  // Position NFTs
                  mapping(uint256 => Position) public positions;
                  uint256 private nextPositionId;
                  
                  function mint(
                      int24 tickLower,
                      int24 tickUpper,
                      uint128 liquidity,
                      uint24 feeTier
                  ) external returns (uint256 positionId) {
                      require(tickLower < tickUpper, "Invalid range");
                      require(tickLower % TICK_SPACING == 0, "Invalid lower tick");
                      require(tickUpper % TICK_SPACING == 0, "Invalid upper tick");
                      
                      // Calculate token amounts needed
                      (uint256 amount0, uint256 amount1) = getAmountsForLiquidity(
                          tickLower,
                          tickUpper,
                          liquidity
                      );
                      
                      // Transfer tokens
                      token0.transferFrom(msg.sender, address(this), amount0);
                      token1.transferFrom(msg.sender, address(this), amount1);
                      
                      // Create position NFT
                      positionId = ++nextPositionId;
                      positions[positionId] = Position({
                          liquidity: liquidity,
                          feeGrowthInside0Last: 0,
                          feeGrowthInside1Last: 0,
                          tokensOwed0: 0,
                          tokensOwed1: 0
                      });
                      
                      _mint(msg.sender, positionId);
                  }
                  
                  function getAmountsForLiquidity(
                      int24 tickLower,
                      int24 tickUpper,
                      uint128 liquidity
                  ) internal view returns (uint256 amount0, uint256 amount1) {
                      // Calculate based on current price and range
                      uint160 sqrtPriceCurrent = getSqrtPrice();
                      uint160 sqrtPriceLower = getSqrtRatioAtTick(tickLower);
                      uint160 sqrtPriceUpper = getSqrtRatioAtTick(tickUpper);
                      
                      if (sqrtPriceCurrent <= sqrtPriceLower) {
                          // Current price below range - all in token0
                          amount0 = getAmount0Delta(sqrtPriceLower, sqrtPriceUpper, liquidity);
                      } else if (sqrtPriceCurrent < sqrtPriceUpper) {
                          // Current price in range - mixed
                          amount0 = getAmount0Delta(sqrtPriceCurrent, sqrtPriceUpper, liquidity);
                          amount1 = getAmount1Delta(sqrtPriceLower, sqrtPriceCurrent, liquidity);
                      } else {
                          // Current price above range - all in token1
                          amount1 = getAmount1Delta(sqrtPriceLower, sqrtPriceUpper, liquidity);
                      }
                  }
                  
                  // Simplified swap (actual implementation more complex)
                  function swap(
                      bool zeroForOne,
                      uint256 amountSpecified,
                      uint160 sqrtPriceLimit
                  ) external returns (int256 amount0, int256 amount1) {
                      // Cross ticks, update liquidity, collect fees
                      // ... complex swap logic
                  }
              }
              ```
              
              ### Capital Efficiency Example
              
              For ETH/USDC at $2000:
              - V2: Provide $100k ETH + $100k USDC across all prices
              - V3: Provide $100k concentrated in $1500-$2500 range
              - Efficiency: ~4x more fees for same capital
              
              ### Risks
              
              1. **Impermanent Loss**: More severe if price exits range
              2. **Complexity**: Harder to manage positions
              3. **Gas**: Higher gas for crossing multiple ticks
            notes: "Advanced concentrated liquidity with capital efficiency analysis"
        

              # analytics/report_generator.py
              from datetime import datetime, timedelta
              import smtplib
              from email.mime.text import MIMEText
              from email.mime.multipart import MIMEMultipart
              from jinja2 import Template
              import json
              
              class ReportGenerator:
                  def __init__(self, analytics_engine, smtp_config: dict):
                      self.analytics = analytics_engine
                      self.smtp_config = smtp_config
                  
                  def generate_daily_report(self) -> str:
                      """Generate daily analytics report"""
                      
                      end = datetime.now()
                      start = end - timedelta(days=1)
                      
                      report = self.analytics.generate_report(start, end)
                      
                      # Render HTML
                      template = Template('''
                      <!DOCTYPE html>
                      <html>
                      <head>
                          <style>
                              body { font-family: Arial, sans-serif; }
                              .kpi { display: inline-block; margin: 10px; padding: 20px; background: #f0f0f0; }
                              .critical { color: red; }
                              .warning { color: orange; }
                              .good { color: green; }
                          </style>
                      </head>
                      <body>
                          <h1>IoT Fleet Daily Report</h1>
                          <p>Period: {{ report.period.start }} to {{ report.period.end }}</p>
                          
                          <h2>KPIs</h2>
                          <div class="kpi">
                              <h3>Device Uptime</h3>
                              <p class="{% if report.kpis.device_uptime < 95 %}critical{% else %}good{% endif %}">
                                  {{ "%.2f"|format(report.kpis.device_uptime) }}%
                              </p>
                          </div>
                          <div class="kpi">
                              <h3>Data Quality</h3>
                              <p class="{% if report.kpis.data_quality < 90 %}critical{% else %}good{% endif %}">
                                  {{ "%.2f"|format(report.kpis.data_quality) }}%
                              </p>
                          </div>
                          <div class="kpi">
                              <h3>Battery Health</h3>
                              <p class="{% if report.kpis.battery_health < 80 %}warning{% else %}good{% endif %}">
                                  {{ "%.2f"|format(report.kpis.battery_health) }}%
                              </p>
                          </div>
                          
                          <h2>Recommendations</h2>
                          <ul>
                          {% for rec in report.recommendations %}
                              <li class="{{ rec.priority }}">{{ rec.message }}</li>
                          {% endfor %}
                          </ul>
                      </body>
                      </html>
                      ''')
                      
                      return template.render(report=report)
                  
                  def send_email_report(self, recipients: list, subject: str = None):
                      """Send report via email"""
                      
                      html_content = self.generate_daily_report()
                      
                      msg = MIMEMultipart('alternative')
                      msg['Subject'] = subject or f"IoT Fleet Report - {datetime.now().strftime('%Y-%m-%d')}"
                      msg['From'] = self.smtp_config['from']
                      msg['To'] = ', '.join(recipients)
                      
                      msg.attach(MIMEText(html_content, 'html'))
                      
                      with smtplib.SMTP(self.smtp_config['host'], self.smtp_config['port']) as server:
                          server.starttls()
                          server.login(self.smtp_config['username'], self.smtp_config['password'])
                          server.sendmail(
                              self.smtp_config['from'],
                              recipients,
                              msg.as_string()
                          )
                      
                      print(f"Report sent to {recipients}")
              
              # Scheduled execution

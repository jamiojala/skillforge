              ### Monitoring
              
              ```javascript
              // monitoring/bridge-monitor.js
              const { ethers } = require("ethers");
              
              async function monitorBridge() {
                  const provider = new ethers.JsonRpcProvider(process.env.RPC_URL);
                  const bridge = new ethers.Contract(BRIDGE_ADDRESS, BRIDGE_ABI, provider);
                  
                  // Monitor for large transfers
                  bridge.on("TokensLocked", async (user, amount, dstChainId) => {

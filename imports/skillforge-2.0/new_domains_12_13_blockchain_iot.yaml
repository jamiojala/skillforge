          - name: "Lending Pool Implementation"
            user: "Design a basic lending pool with dynamic interest rates"
            ai_response: |
              ## Lending Pool Design
              
              ### Interest Rate Model
              
              ```
              Borrow Rate = Base Rate + (Multiplier × Utilization)
              
              Where:
              - Utilization = Total Borrows / Total Supply
              - Base Rate = 2% (configurable)
              - Multiplier = 20% (configurable)
              ```
              
              ### Implementation
              
              ```solidity
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "@openzeppelin/contracts/token/ERC20/IERC20.sol";
              import "@openzeppelin/contracts/security/ReentrancyGuard.sol";
              import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
              
              contract LendingPool is ReentrancyGuard {
                  IERC20 public underlying;
                  AggregatorV3Interface public priceFeed;
                  
                  // Pool state
                  uint256 public totalSupply;
                  uint256 public totalBorrows;
                  uint256 public supplyIndex;
                  uint256 public borrowIndex;
                  uint256 public lastAccrualTime;
                  
                  // Interest rate model parameters
                  uint256 public baseRatePerYear = 0.02e18;      // 2%
                  uint256 public multiplierPerYear = 0.2e18;      // 20%
                  uint256 public reserveFactor = 0.1e18;          // 10%
                  
                  // Risk parameters
                  uint256 public collateralFactor = 0.75e18;      // 75% LTV
                  uint256 public liquidationThreshold = 0.8e18;   // 80%
                  uint256 public liquidationBonus = 1.08e18;      // 8% bonus
                  
                  // User positions
                  struct Account {
                      uint256 supplyBalance;
                      uint256 borrowBalance;
                      uint256 supplyIndex;
                      uint256 borrowIndex;
                  }
                  mapping(address => Account) public accounts;
                  
                  // Collateral tokens (for cross-collateral)
                  mapping(address => bool) public isCollateral;
                  
                  uint256 public constant BLOCKS_PER_YEAR = 2102400;
                  uint256 public constant INITIAL_INDEX = 1e18;
                  
                  event Supply(address indexed user, uint256 amount);
                  event Withdraw(address indexed user, uint256 amount);
                  event Borrow(address indexed user, uint256 amount);
                  event Repay(address indexed user, uint256 amount);
                  event Liquidate(
                      address indexed liquidator,
                      address indexed borrower,
                      uint256 repayAmount,
                      address indexed collateralToken,
                      uint256 seizeAmount
                  );
                  
                  constructor(address _underlying, address _priceFeed) {
                      underlying = IERC20(_underlying);
                      priceFeed = AggregatorV3Interface(_priceFeed);
                      supplyIndex = INITIAL_INDEX;
                      borrowIndex = INITIAL_INDEX;
                      lastAccrualTime = block.timestamp;
                  }
                  
                  // Accrue interest
                  function accrueInterest() public {
                      uint256 currentTime = block.timestamp;
                      uint256 timeDelta = currentTime - lastAccrualTime;
                      
                      if (timeDelta == 0) return;
                      
                      uint256 borrowRate = getBorrowRate();
                      uint256 interestAccumulated = (totalBorrows * borrowRate * timeDelta) / (365 days) / 1e18;
                      
                      totalBorrows += interestAccumulated;
                      
                      uint256 reserveShare = (interestAccumulated * reserveFactor) / 1e18;
                      // Reserve share goes to protocol treasury
                      
                      uint256 supplyIncrease = interestAccumulated - reserveShare;
                      totalSupply += supplyIncrease;
                      
                      borrowIndex = (borrowIndex * (totalBorrows)) / (totalBorrows - interestAccumulated);
                      supplyIndex = (supplyIndex * (totalSupply)) / (totalSupply - supplyIncrease);
                      
                      lastAccrualTime = currentTime;
                  }
                  
                  function getBorrowRate() public view returns (uint256) {
                      uint256 utilization = getUtilization();
                      return baseRatePerYear + (multiplierPerYear * utilization) / 1e18;
                  }
                  
                  function getSupplyRate() public view returns (uint256) {
                      uint256 borrowRate = getBorrowRate();
                      uint256 utilization = getUtilization();
                      return (borrowRate * utilization * (1e18 - reserveFactor)) / 1e18 / 1e18;
                  }
                  
                  function getUtilization() public view returns (uint256) {
                      if (totalSupply == 0) return 0;
                      return (totalBorrows * 1e18) / totalSupply;
                  }
                  
                  // Supply assets
                  function supply(uint256 amount) external nonReentrant {
                      accrueInterest();
                      
                      Account storage account = accounts[msg.sender];
                      
                      // Accrue interest for user
                      if (account.supplyBalance > 0) {
                          uint256 interest = (account.supplyBalance * supplyIndex) / account.supplyIndex - account.supplyBalance;
                          account.supplyBalance += interest;
                      }
                      
                      underlying.transferFrom(msg.sender, address(this), amount);
                      
                      account.supplyBalance += amount;
                      account.supplyIndex = supplyIndex;
                      totalSupply += amount;
                      
                      emit Supply(msg.sender, amount);
                  }
                  
                  // Withdraw supply
                  function withdraw(uint256 amount) external nonReentrant {
                      accrueInterest();
                      
                      Account storage account = accounts[msg.sender];
                      
                      // Accrue interest
                      if (account.supplyBalance > 0) {
                          uint256 interest = (account.supplyBalance * supplyIndex) / account.supplyIndex - account.supplyBalance;
                          account.supplyBalance += interest;
                      }
                      
                      require(account.supplyBalance >= amount, "Insufficient balance");
                      
                      // Check if withdrawal would cause undercollateralization
                      require(
                          getAccountLiquidity(msg.sender) >= 0,
                          "Would become undercollateralized"
                      );
                      
                      account.supplyBalance -= amount;
                      account.supplyIndex = supplyIndex;
                      totalSupply -= amount;
                      
                      underlying.transfer(msg.sender, amount);
                      
                      emit Withdraw(msg.sender, amount);
                  }
                  
                  // Borrow assets
                  function borrow(uint256 amount) external nonReentrant {
                      accrueInterest();
                      
                      Account storage account = accounts[msg.sender];
                      
                      // Accrue borrow interest
                      if (account.borrowBalance > 0) {
                          uint256 interest = (account.borrowBalance * borrowIndex) / account.borrowIndex - account.borrowBalance;
                          account.borrowBalance += interest;
                      }
                      
                      // Check borrowing capacity
                      require(
                          getAccountLiquidity(msg.sender) >= int256(amount),
                          "Insufficient collateral"
                      );
                      
                      account.borrowBalance += amount;
                      account.borrowIndex = borrowIndex;
                      totalBorrows += amount;
                      
                      underlying.transfer(msg.sender, amount);
                      
                      emit Borrow(msg.sender, amount);
                  }
                  
                  // Repay borrow
                  function repay(uint256 amount) external nonReentrant {
                      accrueInterest();
                      
                      Account storage account = accounts[msg.sender];
                      
                      // Accrue borrow interest
                      if (account.borrowBalance > 0) {
                          uint256 interest = (account.borrowBalance * borrowIndex) / account.borrowIndex - account.borrowBalance;
                          account.borrowBalance += interest;
                      }
                      
                      uint256 repayAmount = amount > account.borrowBalance ? account.borrowBalance : amount;
                      
                      underlying.transferFrom(msg.sender, address(this), repayAmount);
                      
                      account.borrowBalance -= repayAmount;
                      account.borrowIndex = borrowIndex;
                      totalBorrows -= repayAmount;
                      
                      emit Repay(msg.sender, repayAmount);
                  }
                  
                  // Get account liquidity (positive = can borrow, negative = liquidatable)
                  function getAccountLiquidity(address account) public view returns (int256) {
                      Account memory acc = accounts[account];
                      
                      uint256 supplyValue = (acc.supplyBalance * supplyIndex) / acc.supplyIndex;
                      uint256 borrowValue = (acc.borrowBalance * borrowIndex) / acc.borrowIndex;
                      
                      uint256 collateralValue = (supplyValue * collateralFactor) / 1e18;
                      
                      return int256(collateralValue) - int256(borrowValue);
                  }
                  
                  // Liquidation
                  function liquidate(
                      address borrower,
                      uint256 repayAmount
                  ) external nonReentrant {
                      accrueInterest();
                      
                      require(
                          getAccountLiquidity(borrower) < 0,
                          "Account not undercollateralized"
                      );
                      
                      Account storage borrowAccount = accounts[borrower];
                      Account storage liquidatorAccount = accounts[msg.sender];
                      
                      // Accrue interest for both
                      // ... (similar to above)
                      
                      uint256 actualRepay = repayAmount > borrowAccount.borrowBalance 
                          ? borrowAccount.borrowBalance 
                          : repayAmount;
                      
                      // Calculate collateral to seize with bonus
                      uint256 seizeAmount = (actualRepay * liquidationBonus) / 1e18;
                      
                      underlying.transferFrom(msg.sender, address(this), actualRepay);
                      
                      borrowAccount.borrowBalance -= actualRepay;
                      totalBorrows -= actualRepay;
                      
                      // Transfer seized collateral (simplified - would use collateral token)
                      underlying.transfer(msg.sender, seizeAmount);
                      
                      emit Liquidate(msg.sender, borrower, actualRepay, address(underlying), seizeAmount);
                  }
                  
                  // Get price from Chainlink
                  function getPrice() public view returns (uint256) {
                      (, int256 price,,,) = priceFeed.latestRoundData();
                      require(price > 0, "Invalid price");
                      return uint256(price);
                  }
              }
              ```
              
              ### Risk Parameters
              
              | Parameter | Conservative | Moderate | Aggressive |
              |-----------|-------------|----------|------------|
              | Collateral Factor | 60% | 75% | 85% |
              | Liquidation Threshold | 70% | 80% | 90% |
              | Liquidation Bonus | 5% | 8% | 10% |
              | Reserve Factor | 15% | 10% | 5% |
              
              ### Testing Scenarios
              
              1. **Normal Operations**: Supply, borrow, repay, withdraw
              2. **Liquidation**: Price drop triggers liquidation
              3. **Interest Accrual**: Verify correct interest over time

              public class KafkaStreamsProcessor {
                  public static void main(String[] args) {
                      StreamsBuilder builder = new StreamsBuilder();
                      
                      // Consume from telemetry topic
                      KStream<String, String> telemetry = builder.stream(
                          "iot-telemetry",
                          Consumed.with(Serdes.String(), Serdes.String())
                      );
                      
                      // Parse and extract temperature
                      KStream<String, Double> temperatures = telemetry
                          .mapValues(value -> {
                              // Parse JSON and extract temperature
                              JsonObject json = JsonParser.parseString(value).getAsJsonObject();
                              return json.get("data").getAsJsonObject()
                                        .get("temperature").getAsDouble();
                          });
                      
                      // 5-minute tumbling window average
                      KTable<Windowed<String>, Double> avgTemperatures = temperatures
                          .groupByKey()
                          .windowedBy(TimeWindows.of(Duration.ofMinutes(5)))
                          .aggregate(
                              () -> new TemperatureAggregator(),
                              (key, value, agg) -> agg.add(value),
                              Materialized.with(Serdes.String(), 
                                  Serdes.serdeFrom(TemperatureAggregator.class))
                          )
                          .mapValues(agg -> agg.average());
                      
                      // Filter for high temperatures
                      KStream<Windowed<String>, Double> highTemps = avgTemperatures
                          .toStream()
                          .filter((key, avg) -> avg > 80.0);
                      
                      // Produce alerts
                      highTemps.to("iot-alerts", Produced.with(
                          WindowedSerdes.timeWindowedSerdeFrom(String.class),
                          Serdes.Double()
                      ));
                      
                      // Build and start
                      KafkaStreams streams = new KafkaStreams(
                          builder.build(),
                          getStreamsConfig()
                      );
                      streams.start();
                  }
                  
                  static class TemperatureAggregator {
                      double sum = 0.0;
                      int count = 0;
                      
                      TemperatureAggregator add(double value) {
                          sum += value;
                          count++;
                          return this;
                      }
                      
                      double average() {
                          return count > 0 ? sum / count : 0.0;
                      }
                  }
              }
              ```
              
              ### Real-Time Analytics with ksqlDB
              
              ```sql
              -- ksqldb/analytics.sql
              
              -- Create stream from telemetry topic
              CREATE STREAM iot_telemetry (
                  device_id VARCHAR,
                  temperature DOUBLE,
                  pressure DOUBLE,
                  timestamp BIGINT
              ) WITH (
                  KAFKA_TOPIC = 'iot-telemetry',
                  VALUE_FORMAT = 'JSON',
                  TIMESTAMP = 'timestamp'
              );
              
              -- 5-minute average temperature per device
              CREATE TABLE device_temp_avg AS
              SELECT 
                  device_id,
                  AVG(temperature) AS avg_temperature,
                  COUNT(*) AS reading_count
              FROM iot_telemetry
              WINDOW TUMBLING (SIZE 5 MINUTES)
              GROUP BY device_id;
              
              -- High temperature alerts
              CREATE STREAM high_temp_alerts AS
              SELECT 
                  device_id,
                  temperature,
                  'HIGH_TEMPERATURE' AS alert_type
              FROM iot_telemetry
              WHERE temperature > 80.0;
              
              -- Anomaly detection (temperature spike)
              CREATE STREAM temp_spikes AS
              SELECT 
                  t1.device_id,
                  t1.temperature AS current_temp,
                  t2.avg_temperature AS avg_temp,
                  (t1.temperature - t2.avg_temperature) AS temp_diff
              FROM iot_telemetry t1
              LEFT JOIN device_temp_avg t2
                  ON t1.device_id = t2.device_id
              WHERE (t1.temperature - t2.avg_temperature) > 15.0;
              
              -- Query examples
              -- Get current averages
              SELECT * FROM device_temp_avg WHERE device_id = 'device-001';
              
              -- Get all high temperature alerts in last hour
              SELECT * FROM high_temp_alerts
              WHERE ROWTIME > (UNIX_TIMESTAMP() - 3600000);
              ```
              
              ### Monitoring Stream Lag
              
              ```python
              # monitoring/stream_monitor.py
              from kafka import KafkaConsumer, TopicPartition
              from kafka.admin import KafkaAdminClient
              import time
              import json
              
              class StreamMonitor:
                  def __init__(self, bootstrap_servers: str):
                      self.admin_client = KafkaAdminClient(
                          bootstrap_servers=bootstrap_servers
                      )
                      self.consumer = KafkaConsumer(
                          bootstrap_servers=bootstrap_servers,
                          group_id='monitor-consumer'
                      )
                  
                  def get_consumer_lag(self, group_id: str) -> dict:
                      """Get lag for all partitions in a consumer group"""
                      
                      # Get consumer group offsets
                      offsets = self.admin_client.list_consumer_group_offsets(group_id)
                      
                      lag_info = {}
                      for tp, offset_metadata in offsets.items():
                          # Get log end offset
                          end_offsets = self.consumer.end_offsets([tp])
                          log_end = end_offsets.get(tp, 0)
                          
                          consumer_offset = offset_metadata.offset
                          lag = log_end - consumer_offset
                          
                          lag_info[f"{tp.topic}-{tp.partition}"] = {
                              'consumer_offset': consumer_offset,
                              'log_end_offset': log_end,
                              'lag': lag
                          }
                      
                      return lag_info
                  
                  def monitor_lag(self, group_id: str, threshold: int = 1000):
                      """Monitor lag and alert if above threshold"""
                      
                      while True:
                          lag_info = self.get_consumer_lag(group_id)
                          
                          total_lag = sum(info['lag'] for info in lag_info.values())
                          
                          print(f"Consumer Group: {group_id}")
                          print(f"Total Lag: {total_lag}")
                          
                          for partition, info in lag_info.items():
                              if info['lag'] > threshold:
                                  print(f"ALERT: High lag on {partition}: {info['lag']}")
                          
                          time.sleep(60)
                  
                  def get_throughput(self, topic: str, duration: int = 60) -> float:
                      """Calculate message throughput for a topic"""
                      
                      partitions = self.consumer.partitions_for_topic(topic)
                      if not partitions:
                          return 0.0
                      
                      # Get starting offsets
                      tps = [TopicPartition(topic, p) for p in partitions]
                      start_offsets = self.consumer.end_offsets(tps)
                      
                      time.sleep(duration)
                      
                      # Get ending offsets
                      end_offsets = self.consumer.end_offsets(tps)
                      
                      # Calculate throughput
                      total_messages = sum(
                          end_offsets[tp] - start_offsets[tp]
                          for tp in tps
                      )
                      
                      return total_messages / duration
              
              # Usage
              if __name__ == '__main__':
                  monitor = StreamMonitor('localhost:9092')
                  
                  # Monitor consumer lag
                  monitor.monitor_lag('flink-processor', threshold=10000)
                  
                  # Or get throughput
                  # throughput = monitor.get_throughput('iot-telemetry')
                  # print(f"Throughput: {throughput} msg/s")
              ```

              ### FastAPI Model Server
              
              ```python
              # serving/model_server.py
              from fastapi import FastAPI, HTTPException, BackgroundTasks
              from fastapi.middleware.cors import CORSMiddleware
              from pydantic import BaseModel
              import tensorflow as tf
              import numpy as np
              import time
              import asyncio
              from typing import List, Dict, Any
              import logging
              from prometheus_client import Counter, Histogram, Gauge, generate_latest
              from starlette.responses import Response
              import os
              import json
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              # Prometheus metrics
              PREDICTION_COUNTER = Counter(
                  'model_predictions_total',
                  'Total predictions',
                  ['model_version', 'status']
              )
              PREDICTION_LATENCY = Histogram(
                  'model_prediction_latency_seconds',
                  'Prediction latency',
                  ['model_version']
              )
              MODEL_LOAD_TIME = Gauge(
                  'model_load_time_seconds',
                  'Time to load model'
              )
              ACTIVE_REQUESTS = Gauge(
                  'model_active_requests',
                  'Number of active requests'
              )
              
              app = FastAPI(title="Edge Model Server")
              
              # CORS
              app.add_middleware(
                  CORSMiddleware,
                  allow_origins=["*"],
                  allow_methods=["*"],
                  allow_headers=["*"]
              )
              
              # Model registry
              MODELS: Dict[str, tf.keras.Model] = {}
              MODEL_METADATA: Dict[str, Dict] = {}
              
              class PredictionRequest(BaseModel):
                  instances: List[List[float]]
                  model_version: str = "default"
              
              class PredictionResponse(BaseModel):
                  predictions: List[Any]
                  model_version: str
                  inference_time_ms: float
              
              def load_model(model_path: str, version: str) -> tf.keras.Model:
                  """Load model with timing"""
                  start = time.time()
                  
                  model = tf.keras.models.load_model(model_path)
                  
                  load_time = time.time() - start
                  MODEL_LOAD_TIME.set(load_time)
                  
                  logger.info(f"Loaded model {version} in {load_time:.2f}s")
                  
                  return model
              
              @app.on_event("startup")
              async def startup_event():
                  """Load models on startup"""
                  
                  models_dir = os.getenv('MODELS_DIR', '/models')
                  
                  # Load all model versions
                  for version in os.listdir(models_dir):
                      version_path = os.path.join(models_dir, version)
                      if os.path.isdir(version_path):
                          model_file = os.path.join(version_path, 'model.h5')
                          metadata_file = os.path.join(version_path, 'metadata.json')
                          
                          if os.path.exists(model_file):
                              MODELS[version] = load_model(model_file, version)
                              
                              # Load metadata
                              if os.path.exists(metadata_file):
                                  with open(metadata_file) as f:
                                      MODEL_METADATA[version] = json.load(f)
                              
                              logger.info(f"Loaded model version: {version}")
                  
                  if not MODELS:
                      logger.warning("No models loaded!")
              
              @app.get("/health")
              async def health_check():
                  """Health check endpoint"""
                  
                  if not MODELS:
                      raise HTTPException(status_code=503, detail="No models loaded")
                  
                  return {
                      "status": "healthy",
                      "loaded_models": list(MODELS.keys()),
                      "timestamp": time.time()
                  }
              
              @app.get("/metrics")
              async def metrics():
                  """Prometheus metrics endpoint"""
                  return Response(
                      content=generate_latest(),
                      media_type="text/plain"
                  )
              
              @app.post("/v1/models/{model_name}:predict")
              async def predict(
                  model_name: str,
                  request: PredictionRequest
              ) -> PredictionResponse:
                  """Make predictions"""
                  
                  ACTIVE_REQUESTS.inc()
                  start_time = time.time()
                  
                  try:
                      # Get model
                      model = MODELS.get(request.model_version)
                      if not model:
                          raise HTTPException(
                              status_code=404,
                              detail=f"Model version {request.model_version} not found"
                          )
                      
                      # Prepare input
                      input_data = np.array(request.instances)
                      
                      # Run inference
                      with PREDICTION_LATENCY.labels(request.model_version).time():
                          predictions = model.predict(input_data, verbose=0)
                      
                      # Format response
                      if len(predictions.shape) > 1 and predictions.shape[1] > 1:
                          # Multi-class: return class probabilities
                          result = predictions.tolist()
                      else:
                          # Binary or regression
                          result = predictions.flatten().tolist()
                      
                      inference_time = (time.time() - start_time) * 1000
                      
                      PREDICTION_COUNTER.labels(
                          model_version=request.model_version,
                          status='success'
                      ).inc()
                      
                      return PredictionResponse(
                          predictions=result,
                          model_version=request.model_version,
                          inference_time_ms=inference_time
                      )
                  
                  except Exception as e:
                      PREDICTION_COUNTER.labels(
                          model_version=request.model_version,
                          status='error'
                      ).inc()
                      logger.error(f"Prediction error: {e}")
                      raise HTTPException(status_code=500, detail=str(e))
                  
                  finally:
                      ACTIVE_REQUESTS.dec()
              
              @app.get("/v1/models/{model_name}/versions")
              async def list_versions(model_name: str):
                  """List available model versions"""
                  return {
                      "model_name": model_name,
                      "versions": [
                          {
                              "version": v,
                              "metadata": MODEL_METADATA.get(v, {})
                          }
                          for v in MODELS.keys()
                      ]
                  }
              
              @app.post("/v1/models/{model_name}/versions/{version}:load")
              async def load_version(model_name: str, version: str):
                  """Load a specific model version"""
                  
                  models_dir = os.getenv('MODELS_DIR', '/models')
                  model_path = os.path.join(models_dir, version, 'model.h5')
                  
                  if not os.path.exists(model_path):
                      raise HTTPException(status_code=404, detail="Model not found")
                  
                  MODELS[version] = load_model(model_path, version)
                  
                  return {"status": "loaded", "version": version}
              
              # Batch prediction endpoint
              @app.post("/v1/models/{model_name}:batchPredict")
              async def batch_predict(
                  model_name: str,
                  request: PredictionRequest,
                  background_tasks: BackgroundTasks
              ):
                  """Async batch prediction"""
                  
                  # Queue for async processing
                  job_id = f"job_{int(time.time() * 1000)}"
                  
                  background_tasks.add_task(
                      process_batch,
                      job_id,
                      request
                  )
                  
                  return {"job_id": job_id, "status": "queued"}
              
              async def process_batch(job_id: str, request: PredictionRequest):
                  """Process batch prediction asynchronously"""
                  
                  logger.info(f"Processing batch job {job_id}")
                  
                  # Process in chunks
                  chunk_size = 100
                  all_predictions = []
                  
                  for i in range(0, len(request.instances), chunk_size):
                      chunk = request.instances[i:i + chunk_size]
                      
                      model = MODELS.get(request.model_version)
                      input_data = np.array(chunk)
                      predictions = model.predict(input_data, verbose=0)
                      all_predictions.extend(predictions.tolist())
                  
                  # Store results (in production: use Redis, S3, etc.)
                  logger.info(f"Batch job {job_id} complete")
              
              # Run server
              if __name__ == "__main__":
                  import uvicorn
                  
                  uvicorn.run(
                      app,
                      host="0.0.0.0",
                      port=int(os.getenv('PORT', 8080)),
                      workers=int(os.getenv('WORKERS', 1))
                  )
              ```
              

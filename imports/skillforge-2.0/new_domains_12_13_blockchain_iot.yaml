              });
              ```
              
              ### Expected Savings
              
              | Operation | Before | After | Savings |
              |-----------|--------|-------|---------|
              | Transfer | 65,000 | 48,000 | 26% |
              | Approval | 45,000 | 38,000 | 16% |
              | Deployment | 1,200,000 | 890,000 | 26% |
            notes: "Comprehensive storage optimization with measurable savings and benchmarking"
          
          - name: "Function Optimization"
            user: "My NFT minting function is very expensive. How can I optimize it?"
            ai_response: |
              ## NFT Minting Gas Optimization
              
              ### Common Expensive Patterns
              
              ```solidity
              // EXPENSIVE: Multiple storage writes
              function mint(address to) external payable {
                  require(msg.value >= mintPrice, "Insufficient payment");
                  uint256 tokenId = totalSupply + 1;  // SLOAD
                  totalSupply = tokenId;               // SSTORE
                  _owners[tokenId] = to;               // SSTORE
                  _balances[to] += 1;                  // SSTORE (read + write)
                  emit Transfer(address(0), to, tokenId);
              }
              ```
              
              ### Optimized Implementation
              
              ```solidity
              contract OptimizedNFT is ERC721 {
                  // Pack minting info into single slot
                  struct MintConfig {
                      uint64 price;
                      uint32 maxSupply;
                      uint32 currentSupply;
                      uint16 maxPerWallet;
                      bool paused;
                  }
                  MintConfig public config;
                  
                  // Use bitmap for cheaper tracking (1 slot = 256 tokens)
                  mapping(uint256 => uint256) private _ownerBitmap;
                  
                  // Batch mint for gas efficiency
                  function mintBatch(address to, uint256 quantity) external payable {
                      MintConfig memory cfg = config;  // Cache in memory
                      
                      require(!cfg.paused, "Minting paused");
                      require(quantity > 0 && quantity <= 10, "Invalid quantity");
                      require(
                          cfg.currentSupply + quantity <= cfg.maxSupply,
                          "Exceeds max supply"
                      );
                      require(
                          msg.value >= cfg.price * quantity,
                          "Insufficient payment"
                      );
                      
                      uint256 startTokenId = cfg.currentSupply + 1;
                      
                      // Single storage update for counter
                      config.currentSupply = uint32(cfg.currentSupply + quantity);
                      
                      // Batch mint (saves ~20k gas per additional token)
                      for (uint256 i = 0; i < quantity; ) {
                          _safeMint(to, startTokenId + i);
                          unchecked { ++i; }
                      }
                  }
                  
                  // Optimized ownerOf using bitmap
                  function ownerOf(uint256 tokenId) public view override returns (address) {
                      // Derive owner from bitmap (implementation details...)
                  }
              }
              ```
              
              ### Advanced: Merkle Tree Whitelist
              
              ```solidity
              // Gas-efficient whitelist using Merkle proofs
              bytes32 public merkleRoot;
              mapping(address => uint256) public mintedCount;
              
              function mintWhitelist(
                  uint256 quantity,
                  bytes32[] calldata merkleProof
              ) external payable {
                  // Verify whitelist membership (O(log n) gas)
                  bytes32 leaf = keccak256(abi.encodePacked(msg.sender));
                  require(
                      MerkleProof.verify(merkleProof, merkleRoot, leaf),
                      "Not whitelisted"
                  );
                  
                  require(
                      mintedCount[msg.sender] + quantity <= maxWhitelistMints,
                      "Exceeds whitelist allowance"
                  );
                  
                  mintedCount[msg.sender] += quantity;
                  // ... mint logic
              }
              ```
              
              ### Gas Comparison
              
              | Approach | Single Mint | 5 Batch Mint | 10 Batch Mint |
              |----------|-------------|--------------|---------------|
              | Naive | 85,000 | 425,000 | 850,000 |
              | Optimized | 65,000 | 180,000 | 280,000 |
              | Savings | 24% | 58% | 67% |
              
              ### Additional Tips
              
              1. **Use ERC721A** for batch minting (Azuki standard)
              2. **Lazy minting** - mint on first transfer
              3. **Pre-reveal** - use single URI before reveal
              4. **Allowlist merkle trees** - O(log n) verification
            notes: "Advanced NFT optimization including batch operations and Merkle trees"
        

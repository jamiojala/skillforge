            ai_response: |
              ## Multi-Oracle Price Feed
              
              ### Architecture
              
              ```
              Primary: Chainlink Price Feed
              Secondary: Uniswap V3 TWAP
              Validation: Deviation checks, staleness checks
              Fallback: Automatic switch on failure
              ```
              
              ### Implementation
              
              ```solidity
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
              import "@uniswap/v3-core/contracts/interfaces/IUniswapV3Pool.sol";
              import "@uniswap/v3-core/contracts/libraries/FullMath.sol";
              import "@uniswap/v3-core/contracts/libraries/TickMath.sol";
              import "@openzeppelin/contracts/access/Ownable.sol";
              
              contract MultiOraclePriceFeed is Ownable {
                  // Chainlink
                  AggregatorV3Interface public chainlinkFeed;
                  
                  // Uniswap V3
                  IUniswapV3Pool public uniswapPool;
                  uint32 public twapInterval = 1800; // 30 minutes
                  
                  // Validation parameters
                  uint256 public maxPriceDeviation = 500; // 5%
                  uint256 public constant DEVIATION_PRECISION = 10000;
                  uint256 public heartbeat = 3600; // 1 hour
                  
                  // Circuit breaker
                  bool public paused;
                  uint256 public lastValidPrice;
                  uint256 public lastUpdateTime;
                  
                  // Price data
                  struct PriceData {
                      uint256 price;
                      uint256 timestamp;
                      uint8 source; // 1 = Chainlink, 2 = TWAP
                      bool isValid;
                  }
                  PriceData public latestPrice;
                  
                  event PriceUpdated(uint256 price, uint8 source);
                  event CircuitBreakerTriggered(string reason);
                  event OracleSwitched(uint8 fromSource, uint8 toSource);
                  
                  constructor(
                      address _chainlinkFeed,
                      address _uniswapPool
                  ) {
                      chainlinkFeed = AggregatorV3Interface(_chainlinkFeed);
                      uniswapPool = IUniswapV3Pool(_uniswapPool);
                  }
                  
                  // Get validated price
                  function getPrice() external view returns (uint256) {
                      require(!paused, "Price feed paused");
                      require(latestPrice.isValid, "No valid price");
                      require(
                          block.timestamp - latestPrice.timestamp <= heartbeat,
                          "Price stale"
                      );
                      return latestPrice.price;
                  }
                  
                  // Update price from Chainlink
                  function updateFromChainlink() external returns (bool) {
                      if (paused) return false;
                      
                      try chainlinkFeed.latestRoundData() returns (
                          uint80 roundId,
                          int256 price,
                          uint256 startedAt,
                          uint256 updatedAt,
                          uint80 answeredInRound
                      ) {
                          // Validation
                          if (price <= 0) return false;
                          if (updatedAt == 0) return false;
                          if (answeredInRound < roundId) return false;
                          if (block.timestamp - updatedAt > heartbeat) return false;
                          
                          uint256 normalizedPrice = uint256(price);
                          
                          // Deviation check against last valid price
                          if (lastValidPrice > 0) {
                              uint256 deviation = _calculateDeviation(normalizedPrice, lastValidPrice);
                              if (deviation > maxPriceDeviation) {
                                  // Try fallback
                                  return _tryFallback(normalizedPrice);
                              }
                          }
                          
                          _updatePrice(normalizedPrice, 1);
                          return true;
                          
                      } catch {
                          // Chainlink failed, try fallback
                          return _tryFallback(0);
                      }
                  }
                  
                  // Update price from TWAP
                  function updateFromTWAP() external returns (bool) {
                      if (paused) return false;
                      
                      try uniswapPool.observe(_getSecondsAgos()) returns (
                          int56[] memory tickCumulatives,
                          uint160[] memory
                      ) {
                          int56 tickCumulativesDelta = tickCumulatives[1] - tickCumulatives[0];
                          int24 arithmeticMeanTick = int24(tickCumulativesDelta / int56(uint56(twapInterval)));
                          
                          uint160 sqrtPriceX96 = TickMath.getSqrtRatioAtTick(arithmeticMeanTick);
                          uint256 price = FullMath.mulDiv(
                              uint256(sqrtPriceX96) * uint256(sqrtPriceX96),
                              1e18,
                              1 << 192
                          );
                          
                          // Normalize based on token decimals
                          price = _normalizePrice(price);
                          
                          // Deviation check
                          if (lastValidPrice > 0) {
                              uint256 deviation = _calculateDeviation(price, lastValidPrice);
                              if (deviation > maxPriceDeviation) {
                                  _triggerCircuitBreaker("TWAP deviation too high");
                                  return false;
                              }
                          }
                          
                          _updatePrice(price, 2);
                          return true;
                          
                      } catch {
                          return false;
                      }
                  }
                  
                  // Try fallback oracle
                  function _tryFallback(uint256 primaryPrice) internal returns (bool) {
                      // Try TWAP
                      try uniswapPool.observe(_getSecondsAgos()) returns (
                          int56[] memory tickCumulatives,
                          uint160[] memory
                      ) {
                          int56 tickCumulativesDelta = tickCumulatives[1] - tickCumulatives[0];
                          int24 arithmeticMeanTick = int24(tickCumulativesDelta / int56(uint56(twapInterval)));
                          
                          uint160 sqrtPriceX96 = TickMath.getSqrtRatioAtTick(arithmeticMeanTick);
                          uint256 twapPrice = FullMath.mulDiv(
                              uint256(sqrtPriceX96) * uint256(sqrtPriceX96),
                              1e18,
                              1 << 192
                          );
                          twapPrice = _normalizePrice(twapPrice);
                          
                          // If primary price available, compare
                          if (primaryPrice > 0) {
                              uint256 deviation = _calculateDeviation(primaryPrice, twapPrice);
                              if (deviation > maxPriceDeviation) {
                                  _triggerCircuitBreaker("Oracle deviation too high");
                                  return false;
                              }
                          }
                          
                          emit OracleSwitched(1, 2);
                          _updatePrice(twapPrice, 2);
                          return true;
                          
                      } catch {
                          _triggerCircuitBreaker("All oracles failed");
                          return false;
                      }
                  }
                  
                  function _updatePrice(uint256 price, uint8 source) internal {
                      latestPrice = PriceData({
                          price: price,
                          timestamp: block.timestamp,
                          source: source,
                          isValid: true
                      });
                      lastValidPrice = price;
                      lastUpdateTime = block.timestamp;
                      
                      emit PriceUpdated(price, source);
                  }
                  
                  function _calculateDeviation(uint256 a, uint256 b) internal pure returns (uint256) {
                      if (a > b) {
                          return ((a - b) * DEVIATION_PRECISION) / b;
                      } else {
                          return ((b - a) * DEVIATION_PRECISION) / a;
                      }
                  }
                  
                  function _normalizePrice(uint256 price) internal view returns (uint256) {
                      // Adjust for token decimals if needed
                      // This depends on the specific pool configuration
                      return price;
                  }
                  
                  function _getSecondsAgos() internal view returns (uint32[] memory) {
                      uint32[] memory secondsAgos = new uint32[](2);
                      secondsAgos[0] = twapInterval;
                      secondsAgos[1] = 0;
                      return secondsAgos;
                  }
                  
                  function _triggerCircuitBreaker(string memory reason) internal {
                      paused = true;
                      emit CircuitBreakerTriggered(reason);
                  }
                  
                  // Admin functions
                  function setMaxDeviation(uint256 _maxDeviation) external onlyOwner {
                      require(_maxDeviation <= DEVIATION_PRECISION, "Invalid deviation");
                      maxPriceDeviation = _maxDeviation;
                  }
                  
                  function setHeartbeat(uint256 _heartbeat) external onlyOwner {
                      heartbeat = _heartbeat;
                  }
                  
                  function setTwapInterval(uint32 _interval) external onlyOwner {
                      twapInterval = _interval;
                  }
                  
                  function unpause() external onlyOwner {
                      paused = false;
                  }
                  
                  // Emergency: Set price manually (governance required)
                  function emergencySetPrice(uint256 price) external onlyOwner {
                      _updatePrice(price, 0); // Source 0 = manual
                  }
              }
              ```
              

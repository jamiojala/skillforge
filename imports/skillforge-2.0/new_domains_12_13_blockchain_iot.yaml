              # Bridge to cloud (optional)
              connection bridge-cloud
              address cloud-mqtt.example.com:8883
              bridge_cafile /etc/mosquitto/certs/cloud-ca.crt
              bridge_certfile /etc/mosquitto/certs/client.crt
              bridge_keyfile /etc/mosquitto/certs/client.key
              topic # out 1 factory/site/+/devices/+/telemetry
              topic # in 1 factory/site/+/devices/+/config

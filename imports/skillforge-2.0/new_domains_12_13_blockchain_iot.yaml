              ## Yield Farming Protocol Design
              
              ### Tokenomics Overview
              
              - **Total Supply**: 100M tokens
              - **Emission Schedule**: 4-year halving
              - **Initial Rate**: 100 tokens/block
              - **Allocation**: 70% farming, 15% team, 15% treasury
              
              ### Implementation
              
              ```solidity
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "@openzeppelin/contracts/token/ERC20/IERC20.sol";
              import "@openzeppelin/contracts/access/Ownable.sol";
              import "@openzeppelin/contracts/security/ReentrancyGuard.sol";
              
              contract MasterChef is Ownable, ReentrancyGuard {
                  // Info of each user
                  struct UserInfo {
                      uint256 amount;
                      uint256 rewardDebt;
                      uint256 pendingRewards;
                  }
                  
                  // Info of each pool
                  struct PoolInfo {
                      IERC20 lpToken;
                      uint256 allocPoint;
                      uint256 lastRewardBlock;
                      uint256 accRewardPerShare;
                      uint256 totalStaked;
                  }
                  
                  // Reward token
                  IERC20 public rewardToken;
                  
                  // Reward tokens created per block
                  uint256 public rewardPerBlock;
                  
                  // Halving schedule
                  uint256 public constant HALVING_INTERVAL = 365 days;
                  uint256 public startTime;
                  uint256 public lastHalvingTime;
                  
                  // Pool info
                  PoolInfo[] public poolInfo;
                  mapping(uint256 => mapping(address => UserInfo)) public userInfo;
                  
                  // Total allocation points (sum of all pool allocPoints)
                  uint256 public totalAllocPoint = 0;
                  
                  // Harvest lockup
                  uint256 public harvestLockup = 12 hours;
                  mapping(uint256 => mapping(address => uint256)) public lastHarvestTime;
                  
                  // Deposit fee (0.1%)
                  uint256 public depositFee = 10;
                  uint256 public constant FEE_DENOMINATOR = 10000;
                  address public feeAddress;
                  
                  // Team/dev allocation
                  uint256 public devAllocation = 1000; // 10%
                  address public devAddress;
                  
                  // Events
                  event Deposit(address indexed user, uint256 indexed pid, uint256 amount);
                  event Withdraw(address indexed user, uint256 indexed pid, uint256 amount);
                  event EmergencyWithdraw(address indexed user, uint256 indexed pid, uint256 amount);
                  event Harvest(address indexed user, uint256 indexed pid, uint256 amount);
                  
                  constructor(
                      IERC20 _rewardToken,
                      uint256 _rewardPerBlock,
                      address _devAddress,
                      address _feeAddress
                  ) {
                      rewardToken = _rewardToken;
                      rewardPerBlock = _rewardPerBlock;
                      devAddress = _devAddress;
                      feeAddress = _feeAddress;
                      startTime = block.timestamp;
                      lastHalvingTime = block.timestamp;
                  }
                  
                  // Get current reward per block (with halving)
                  function getCurrentRewardPerBlock() public view returns (uint256) {
                      uint256 halvings = (block.timestamp - lastHalvingTime) / HALVING_INTERVAL;
                      uint256 currentReward = rewardPerBlock;
                      for (uint256 i = 0; i < halvings; i++) {
                          currentReward = currentReward / 2;
                      }
                      return currentReward;
                  }
                  
                  // Add a new LP pool
                  function add(
                      uint256 _allocPoint,
                      IERC20 _lpToken,
                      bool _withUpdate
                  ) public onlyOwner {
                      if (_withUpdate) {
                          massUpdatePools();
                      }
                      uint256 lastRewardBlock = block.number;
                      totalAllocPoint += _allocPoint;
                      poolInfo.push(
                          PoolInfo({
                              lpToken: _lpToken,
                              allocPoint: _allocPoint,
                              lastRewardBlock: lastRewardBlock,
                              accRewardPerShare: 0,
                              totalStaked: 0
                          })
                      );
                  }
                  
                  // Update pool allocation
                  function set(
                      uint256 _pid,
                      uint256 _allocPoint,
                      bool _withUpdate
                  ) public onlyOwner {
                      if (_withUpdate) {
                          massUpdatePools();
                      }
                      totalAllocPoint = totalAllocPoint - poolInfo[_pid].allocPoint + _allocPoint;
                      poolInfo[_pid].allocPoint = _allocPoint;
                  }
                  
                  // Update reward variables for all pools
                  function massUpdatePools() public {
                      uint256 length = poolInfo.length;
                      for (uint256 pid = 0; pid < length; ++pid) {
                          updatePool(pid);
                      }
                  }
                  
                  // Update reward variables for specific pool
                  function updatePool(uint256 _pid) public {
                      PoolInfo storage pool = poolInfo[_pid];
                      if (block.number <= pool.lastRewardBlock) {
                          return;
                      }
                      uint256 lpSupply = pool.totalStaked;
                      if (lpSupply == 0) {
                          pool.lastRewardBlock = block.number;
                          return;
                      }
                      
                      uint256 currentReward = getCurrentRewardPerBlock();
                      uint256 multiplier = block.number - pool.lastRewardBlock;
                      uint256 reward = (multiplier * currentReward * pool.allocPoint) / totalAllocPoint;
                      
                      // Mint rewards (if mintable) or transfer from treasury
                      // rewardToken.mint(devAddress, reward * devAllocation / 10000);
                      // rewardToken.mint(address(this), reward);
                      
                      pool.accRewardPerShare += (reward * 1e18) / lpSupply;
                      pool.lastRewardBlock = block.number;
                  }
                  
                  // Deposit LP tokens
                  function deposit(uint256 _pid, uint256 _amount) external nonReentrant {
                      PoolInfo storage pool = poolInfo[_pid];
                      UserInfo storage user = userInfo[_pid][msg.sender];
                      updatePool(_pid);
                      
                      // Pay pending rewards
                      if (user.amount > 0) {
                          uint256 pending = (user.amount * pool.accRewardPerShare) / 1e18 - user.rewardDebt;
                          if (pending > 0) {
                              safeRewardTransfer(msg.sender, pending);
                          }
                      }
                      
                      if (_amount > 0) {
                          pool.lpToken.transferFrom(msg.sender, address(this), _amount);
                          
                          // Apply deposit fee
                          uint256 fee = (_amount * depositFee) / FEE_DENOMINATOR;
                          if (fee > 0) {
                              pool.lpToken.transfer(feeAddress, fee);
                              _amount -= fee;
                          }
                          
                          user.amount += _amount;
                          pool.totalStaked += _amount;
                      }
                      
                      user.rewardDebt = (user.amount * pool.accRewardPerShare) / 1e18;
                      lastHarvestTime[_pid][msg.sender] = block.timestamp;
                      
                      emit Deposit(msg.sender, _pid, _amount);
                  }
                  
                  // Withdraw LP tokens
                  function withdraw(uint256 _pid, uint256 _amount) external nonReentrant {
                      PoolInfo storage pool = poolInfo[_pid];
                      UserInfo storage user = userInfo[_pid][msg.sender];
                      require(user.amount >= _amount, "withdraw: insufficient balance");
                      updatePool(_pid);
                      
                      // Pay pending rewards
                      uint256 pending = (user.amount * pool.accRewardPerShare) / 1e18 - user.rewardDebt;
                      if (pending > 0) {
                          safeRewardTransfer(msg.sender, pending);
                      }
                      
                      if (_amount > 0) {
                          user.amount -= _amount;
                          pool.totalStaked -= _amount;
                          pool.lpToken.transfer(msg.sender, _amount);
                      }
                      
                      user.rewardDebt = (user.amount * pool.accRewardPerShare) / 1e18;
                      
                      emit Withdraw(msg.sender, _pid, _amount);
                  }
                  
                  // Harvest rewards only
                  function harvest(uint256 _pid) external nonReentrant {
                      require(
                          block.timestamp >= lastHarvestTime[_pid][msg.sender] + harvestLockup,
                          "harvest: in lockup"
                      );
                      
                      PoolInfo storage pool = poolInfo[_pid];
                      UserInfo storage user = userInfo[_pid][msg.sender];
                      updatePool(_pid);
                      
                      uint256 pending = (user.amount * pool.accRewardPerShare) / 1e18 - user.rewardDebt;
                      require(pending > 0, "harvest: no pending rewards");
                      
                      user.rewardDebt = (user.amount * pool.accRewardPerShare) / 1e18;
                      lastHarvestTime[_pid][msg.sender] = block.timestamp;
                      
                      safeRewardTransfer(msg.sender, pending);
                      
                      emit Harvest(msg.sender, _pid, pending);
                  }
                  
                  // Emergency withdraw without rewards
                  function emergencyWithdraw(uint256 _pid) external nonReentrant {
                      PoolInfo storage pool = poolInfo[_pid];
                      UserInfo storage user = userInfo[_pid][msg.sender];
                      uint256 amount = user.amount;
                      user.amount = 0;
                      user.rewardDebt = 0;
                      pool.totalStaked -= amount;
                      pool.lpToken.transfer(msg.sender, amount);
                      emit EmergencyWithdraw(msg.sender, _pid, amount);
                  }
                  
                  // Safe reward transfer
                  function safeRewardTransfer(address _to, uint256 _amount) internal {
                      uint256 rewardBal = rewardToken.balanceOf(address(this));
                      if (_amount > rewardBal) {
                          rewardToken.transfer(_to, rewardBal);
                      } else {
                          rewardToken.transfer(_to, _amount);
                      }
                  }
                  
                  // View functions
                  function pendingReward(uint256 _pid, address _user) external view returns (uint256) {
                      PoolInfo storage pool = poolInfo[_pid];
                      UserInfo storage user = userInfo[_pid][_user];
                      uint256 accRewardPerShare = pool.accRewardPerShare;
                      uint256 lpSupply = pool.totalStaked;
                      
                      if (block.number > pool.lastRewardBlock && lpSupply != 0) {
                          uint256 currentReward = getCurrentRewardPerBlock();
                          uint256 multiplier = block.number - pool.lastRewardBlock;
                          uint256 reward = (multiplier * currentReward * pool.allocPoint) / totalAllocPoint;
                          accRewardPerShare += (reward * 1e18) / lpSupply;
                      }
                      
                      return (user.amount * accRewardPerShare) / 1e18 - user.rewardDebt;
                  }
                  
                  function poolLength() external view returns (uint256) {
                      return poolInfo.length;
                  }
              }
              ```
              
              ### Emission Schedule
              
              | Year | Reward/Block | Daily Emission | Annual Emission |
              |------|-------------|----------------|-----------------|
              | 1 | 100 | 288,000 | 105M |
              | 2 | 50 | 144,000 | 52.5M |
              | 3 | 25 | 72,000 | 26.25M |
              | 4 | 12.5 | 36,000 | 13.125M |
              
              ### APR Calculation
              
              ```solidity
              function getAPR(uint256 _pid) external view returns (uint256) {
                  PoolInfo storage pool = poolInfo[_pid];
                  uint256 currentReward = getCurrentRewardPerBlock();
                  uint256 yearlyReward = currentReward * 7200 * 365 * pool.allocPoint / totalAllocPoint;
                  
                  // Assume $1 per reward token
                  uint256 rewardValue = yearlyReward * 1e18;
                  
                  // Get LP token value (simplified)
                  uint256 lpValue = pool.totalStaked * getLpPrice(_pid);
                  
                  if (lpValue == 0) return 0;
                  return (rewardValue * 100) / lpValue; // APR %
              }
              ```
            notes: "Complete MasterChef implementation with halving schedule and multiple pools"
        

              ### Python Analytics Engine
              
              ```python
              # analytics/iot_analytics.py
              import pandas as pd
              import numpy as np
              from datetime import datetime, timedelta
              from typing import Dict, List, Optional
              import logging
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              class IoTAnalytics:
                  def __init__(self, db_client):
                      self.db = db_client
                  
                  def calculate_kpis(self, hours: int = 24) -> Dict:
                      """Calculate key performance indicators"""
                      
                      kpis = {}
                      
                      # Device uptime
                      uptime_data = self.db.query(f'''
                          SELECT device_id, status, count(*) as count
                          FROM device_status
                          WHERE time > now() - {hours}h
                          GROUP BY device_id, status
                      ''')
                      
                      if uptime_data:
                          df = pd.DataFrame(uptime_data)
                          online_counts = df[df['status'] == 'online']['count'].sum()
                          total_counts = df['count'].sum()
                          kpis['device_uptime'] = (online_counts / total_counts * 100) if total_counts > 0 else 0
                      
                      # Data quality
                      quality_data = self.db.query(f'''
                          SELECT 
                              count(*) as total,
                              count(CASE WHEN temperature BETWEEN -40 AND 100 THEN 1 END) as valid
                          FROM sensor_data
                          WHERE time > now() - {hours}h
                      ''')
                      
                      if quality_data:
                          total = quality_data[0]['total']
                          valid = quality_data[0]['valid']
                          kpis['data_quality'] = (valid / total * 100) if total > 0 else 0
                      
                      # Battery health
                      battery_data = self.db.query('''
                          SELECT device_id, battery_level
                          FROM device_status
                          WHERE time > now() - 1h
                      ''')
                      
                      if battery_data:
                          df = pd.DataFrame(battery_data)
                          healthy = len(df[df['battery_level'] > 20])
                          kpis['battery_health'] = (healthy / len(df) * 100) if len(df) > 0 else 0
                      
                      return kpis
                  
                  def detect_anomalies(
                      self,
                      device_id: str,
                      metric: str = 'temperature',
                      window: str = '1h',
                      threshold: float = 3.0
                  ) -> List[Dict]:
                      """Detect anomalies using Z-score"""
                      
                      data = self.db.query(f'''
                          SELECT time, {metric}
                          FROM sensor_data
                          WHERE device_id = '{device_id}'
                            AND time > now() - {window}
                          ORDER BY time
                      ''')
                      
                      if not data or len(data) < 10:
                          return []
                      
                      df = pd.DataFrame(data)
                      
                      # Calculate Z-score
                      mean = df[metric].mean()
                      std = df[metric].std()
                      
                      if std == 0:
                          return []
                      
                      df['z_score'] = (df[metric] - mean) / std
                      df['is_anomaly'] = abs(df['z_score']) > threshold
                      
                      anomalies = df[df['is_anomaly']].to_dict('records')
                      
                      return [
                          {
                              'time': row['time'],
                              'value': row[metric],
                              'z_score': row['z_score'],
                              'expected_range': (mean - threshold * std, mean + threshold * std)
                          }
                          for row in anomalies
                      ]
                  
                  def predict_maintenance(self, device_id: str) -> Optional[Dict]:
                      """Predict maintenance needs based on trends"""
                      
                      # Get historical data
                      data = self.db.query(f'''
                          SELECT time, temperature, vibration
                          FROM sensor_data
                          WHERE device_id = '{device_id}'
                            AND time > now() - 7d
                          ORDER BY time
                      ''')
                      
                      if not data or len(data) < 100:
                          return None
                      
                      df = pd.DataFrame(data)
                      df['time'] = pd.to_datetime(df['time'])
                      df.set_index('time', inplace=True)
                      
                      # Calculate trends
                      temp_trend = np.polyfit(range(len(df)), df['temperature'], 1)[0]
                      vib_trend = np.polyfit(range(len(df)), df['vibration'], 1)[0]
                      
                      # Predict failure (simplified)
                      temp_threshold = 80
                      current_temp = df['temperature'].iloc[-1]
                      temp_increase_rate = temp_trend * 24  # per day
                      
                      if temp_increase_rate > 0:
                          days_to_threshold = (temp_threshold - current_temp) / temp_increase_rate
                      else:
                          days_to_threshold = float('inf')
                      
                      return {
                          'device_id': device_id,
                          'predicted_maintenance_date': (
                              datetime.now() + timedelta(days=max(0, days_to_threshold))
                          ).isoformat(),
                          'confidence': min(100, max(0, 100 - days_to_threshold)),
                          'indicators': {
                              'temperature_trend': temp_trend,
                              'vibration_trend': vib_trend,
                              'current_temperature': current_temp
                          },
                          'recommendation': 'Schedule maintenance' if days_to_threshold < 7 else 'Monitor closely'
                      }
                  
                  def generate_report(self, start_date: datetime, end_date: datetime) -> Dict:
                      """Generate comprehensive analytics report"""
                      
                      hours = int((end_date - start_date).total_seconds() / 3600)
                      
                      report = {
                          'period': {
                              'start': start_date.isoformat(),
                              'end': end_date.isoformat()
                          },
                          'kpis': self.calculate_kpis(hours),
                          'device_summary': self._get_device_summary(hours),
                          'alert_summary': self._get_alert_summary(hours),
                          'recommendations': []
                      }
                      
                      # Add recommendations based on data
                      if report['kpis'].get('device_uptime', 100) < 95:
                          report['recommendations'].append({
                              'priority': 'high',
                              'message': 'Device uptime below target. Investigate connectivity issues.'
                          })
                      
                      if report['kpis'].get('battery_health', 100) < 80:
                          report['recommendations'].append({
                              'priority': 'medium',
                              'message': 'Multiple devices have low battery. Schedule battery replacements.'
                          })
                      
                      return report
                  
                  def _get_device_summary(self, hours: int) -> Dict:
                      """Get device activity summary"""
                      data = self.db.query(f'''
                          SELECT 
                              count(distinct device_id) as active_devices,
                              count(*) as total_readings,
                              avg(temperature) as avg_temp
                          FROM sensor_data
                          WHERE time > now() - {hours}h
                      ''')
                      return data[0] if data else {}
                  
                  def _get_alert_summary(self, hours: int) -> Dict:
                      """Get alert summary"""
                      data = self.db.query(f'''
                          SELECT 
                              count(*) as total_alerts,
                              count(CASE WHEN severity = 'critical' THEN 1 END) as critical,
                              count(CASE WHEN severity = 'warning' THEN 1 END) as warnings
                          FROM alerts
                          WHERE time > now() - {hours}h
                      ''')
                      return data[0] if data else {}
              
              # Usage
              if __name__ == '__main__':
                  from influxdb_client import InfluxDBClient
                  
                  # Initialize
                  db_client = InfluxDBClient(url='http://localhost:8086', token='token', org='org')
                  analytics = IoTAnalytics(db_client)
                  
                  # Calculate KPIs
                  kpis = analytics.calculate_kpis(hours=24)
                  print("KPIs:", kpis)
                  
                  # Detect anomalies
                  anomalies = analytics.detect_anomalies('device-001')
                  print("Anomalies:", anomalies)
                  
                  # Predict maintenance
                  prediction = analytics.predict_maintenance('device-001')
                  print("Maintenance prediction:", prediction)
                  
                  # Generate report
                  report = analytics.generate_report(
                      datetime.now() - timedelta(days=7),
                      datetime.now()
                  )
                  print("Report:", report)
              ```
              

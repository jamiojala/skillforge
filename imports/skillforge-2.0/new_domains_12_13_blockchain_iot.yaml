              ### Certificate Generation
              
              ```python
              # scripts/generate_certificates.py
              import subprocess
              import os
              from pathlib import Path
              
              def create_root_ca(output_dir: str):
                  """Create root CA certificate"""
                  Path(output_dir).mkdir(parents=True, exist_ok=True)
                  
                  # Generate root CA private key
                  subprocess.run([
                      'openssl', 'genrsa', '-out', f'{output_dir}/rootCA.key', '4096'
                  ], check=True)
                  
                  # Generate root CA certificate
                  subprocess.run([
                      'openssl', 'req', '-x509', '-new', '-nodes',
                      '-key', f'{output_dir}/rootCA.key',
                      '-sha256', '-days', '3650',
                      '-out', f'{output_dir}/rootCA.pem',
                      '-subj', '/CN=IoT Root CA/O=YourOrg/C=US'
                  ], check=True)
                  
                  print(f"Root CA created in {output_dir}")
              
              def create_device_certificate(
                  device_id: str,
                  output_dir: str,
                  ca_dir: str
              ):
                  """Create device certificate signed by root CA"""
                  device_dir = Path(output_dir) / device_id
                  device_dir.mkdir(parents=True, exist_ok=True)
                  
                  # Generate device private key
                  subprocess.run([
                      'openssl', 'genrsa', '-out', f'{device_dir}/device.key', '2048'
                  ], check=True)
                  
                  # Create CSR
                  subprocess.run([
                      'openssl', 'req', '-new',
                      '-key', f'{device_dir}/device.key',
                      '-out', f'{device_dir}/device.csr',
                      '-subj', f'/CN={device_id}/O=YourOrg/C=US'
                  ], check=True)
                  
                  # Create extensions file for SAN
                  with open(f'{device_dir}/extfile.cnf', 'w') as f:
                      f.write(f"subjectAltName=DNS:{device_id}.devices.yourorg.com\n")
                  
                  # Sign certificate with CA
                  subprocess.run([
                      'openssl', 'x509', '-req',
                      '-in', f'{device_dir}/device.csr',
                      '-CA', f'{ca_dir}/rootCA.pem',
                      '-CAkey', f'{ca_dir}/rootCA.key',
                      '-CAcreateserial',
                      '-out', f'{device_dir}/device.crt',
                      '-days', '365',
                      '-sha256',
                      '-extfile', f'{device_dir}/extfile.cnf'
                  ], check=True)
                  
                  # Create full chain
                  with open(f'{device_dir}/device.crt', 'r') as cert, \
                       open(f'{ca_dir}/rootCA.pem', 'r') as ca:
                      with open(f'{device_dir}/fullchain.pem', 'w') as chain:
                          chain.write(cert.read())
                          chain.write(ca.read())
                  
                  print(f"Device certificate created for {device_id}")
                  return {
                      'cert_path': f'{device_dir}/device.crt',
                      'key_path': f'{device_dir}/device.key',
                      'chain_path': f'{device_dir}/fullchain.pem'
                  }
              
              # Generate certificates for multiple devices
              if __name__ == '__main__':
                  CA_DIR = 'certificates/ca'
                  DEVICES_DIR = 'certificates/devices'
                  
                  # Create root CA
                  create_root_ca(CA_DIR)
                  
                  # Create device certificates
                  devices = ['device-001', 'device-002', 'device-003']
                  for device_id in devices:
                      create_device_certificate(device_id, DEVICES_DIR, CA_DIR)
              ```
              
              ### DPS Setup
              
              ```python
              # provisioning/dps_setup.py
              from azure.identity import DefaultAzureCredential
              from azure.mgmt.iothubprovisioningservices import IotDpsClient
              from azure.mgmt.iothub import IotHubClient
              from azure.mgmt.resource import ResourceManagementClient
              import os
              
              class DPSProvisioner:
                  def __init__(self, subscription_id: str, resource_group: str):
                      self.credential = DefaultAzureCredential()
                      self.subscription_id = subscription_id
                      self.resource_group = resource_group
                      
                      self.dps_client = IotDpsClient(self.credential, subscription_id)
                      self.hub_client = IotHubClient(self.credential, subscription_id)
                      self.resource_client = ResourceManagementClient(
                          self.credential, subscription_id
                      )
                  
                  def create_dps(self, dps_name: str, location: str = 'eastus'):
                      """Create Device Provisioning Service"""
                      dps_params = {
                          'location': location,
                          'properties': {
                              'allocationPolicy': 'Hashed',
                              'iotHubs': []
                          }
                      }
                      
                      poller = self.dps_client.iot_dps_resource.begin_create_or_update(
                          self.resource_group,
                          dps_name,
                          dps_params
                      )
                      return poller.result()
                  
                  def link_iot_hub(self, dps_name: str, hub_name: str):
                      """Link IoT Hub to DPS"""
                      hub = self.hub_client.iot_hub_resource.get(
                          self.resource_group,
                          hub_name
                      )
                      
                      dps = self.dps_client.iot_dps_resource.get(
                          self.resource_group,
                          dps_name
                      )
                      
                      # Add hub to DPS linked hubs
                      dps.properties.iot_hubs.append({
                          'connectionString': hub.properties.event_hub_endpoints['events']
                                              .endpoint,
                          'location': hub.location
                      })
                      
                      self.dps_client.iot_dps_resource.begin_create_or_update(
                          self.resource_group,
                          dps_name,
                          dps
                      )
                  
                  def enroll_device_with_x509(
                      self,
                      dps_name: str,
                      enrollment_group_id: str,
                      ca_certificate_path: str
                  ):
                      """Create X.509 enrollment group"""
                      
                      # Read CA certificate
                      with open(ca_certificate_path, 'r') as f:
                          ca_cert = f.read()
                      
                      enrollment_group = {
                          'enrollment_group_id': enrollment_group_id,
                          'attestation': {
                              'type': 'x509',
                              'x509': {
                                  'signing_certificates': {
                                      'primary': {'certificate': ca_cert}
                                  }
                              }
                          },
                          'provisioning_status': 'enabled',
                          'capabilities': {'iotEdge': False},
                          'allocation_policy': 'hashed',
                          'iot_hubs': []
                      }
                      
                      return self.dps_client.enrollment_group.create_or_update(
                          self.resource_group,
                          dps_name,
                          enrollment_group_id,
                          enrollment_group
                      )
              
              # Usage
              if __name__ == '__main__':
                  provisioner = DPSProvisioner(
                      subscription_id=os.getenv('AZURE_SUBSCRIPTION_ID'),
                      resource_group='iot-rg'
                  )
                  
                  # Create DPS
                  dps = provisioner.create_dps('my-dps')
                  print(f"DPS created: {dps.name}")
                  
                  # Link IoT Hub
                  provisioner.link_iot_hub('my-dps', 'my-iot-hub')
                  
                  # Create enrollment group
                  provisioner.enroll_device_with_x509(
                      'my-dps',
                      'x509-enrollment',
                      'certificates/ca/rootCA.pem'
                  )
              ```
              
              ### Device Provisioning Client
              
              ```python
              # device/provisioning_client.py
              import asyncio
              from azure.iot.device.aio import ProvisioningDeviceClient
              from azure.iot.device.aio import IoTHubDeviceClient
              import ssl
              import logging
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              class DeviceProvisioningClient:
                  def __init__(
                      self,
                      provisioning_host: str,
                      id_scope: str,
                      registration_id: str,
                      cert_file: str,
                      key_file: str
                  ):
                      self.provisioning_host = provisioning_host
                      self.id_scope = id_scope
                      self.registration_id = registration_id
                      self.cert_file = cert_file
                      self.key_file = key_file
                      
                      # Create SSL context
                      self.ssl_context = ssl.create_default_context()
                      self.ssl_context.load_cert_chain(
                          certfile=cert_file,
                          keyfile=key_file
                      )
                  
                  async def register_device(self):
                      """Register device with DPS"""
                      client = ProvisioningDeviceClient.create_from_x509_certificate(
                          provisioning_host=self.provisioning_host,
                          registration_id=self.registration_id,
                          id_scope=self.id_scope,
                          x509=self.ssl_context
                      )
                      
                      logger.info(f"Registering device: {self.registration_id}")
                      
                      registration_result = await client.register()
                      
                      if registration_result.status == 'assigned':
                          logger.info(f"Device assigned to: {registration_result.registration_state.assigned_hub}")
                          return {
                              'device_id': registration_result.registration_state.device_id,
                              'assigned_hub': registration_result.registration_state.assigned_hub
                          }
                      else:
                          logger.error(f"Registration failed: {registration_result.status}")
                          raise Exception(f"Registration failed: {registration_result.status}")
                  
                  async def connect_to_iot_hub(self, assigned_hub: str, device_id: str):
                      """Connect to assigned IoT Hub"""
                      connection_string = f"HostName={assigned_hub};DeviceId={device_id};x509=true"
                      
                      client = IoTHubDeviceClient.create_from_x509_certificate(
                          hostname=assigned_hub,
                          device_id=device_id,
                          x509=self.ssl_context
                      )
                      
                      await client.connect()
                      logger.info(f"Connected to IoT Hub: {assigned_hub}")
                      
                      return client
                  
                  async def provision_and_connect(self):
                      """Full provisioning and connection flow"""

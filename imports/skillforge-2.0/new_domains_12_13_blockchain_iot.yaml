              def load_and_partition_mnist(
                  num_clients: int = 10,
                  iid: bool = True
              ) -> List[Tuple[np.ndarray, np.ndarray]]:
                  """Load MNIST and partition among clients"""
                  
                  (X_train, y_train), (_, _) = tf.keras.datasets.mnist.load_data()
                  
                  # Normalize
                  X_train = X_train.reshape(-1, 784).astype('float32') / 255.0
                  
                  # Partition data
                  client_data = []
                  samples_per_client = len(X_train) // num_clients
                  
                  for i in range(num_clients):
                      start = i * samples_per_client
                      end = start + samples_per_client
                      
                      if iid:
                          # IID: random samples
                          indices = np.random.choice(len(X_train), samples_per_client, replace=False)
                          client_data.append((X_train[indices], y_train[indices]))
                      else:
                          # Non-IID: each client gets specific classes
                          # Implementation depends on desired non-IID scenario
                          client_data.append((X_train[start:end], y_train[start:end]))
                  
                  return client_data
              
              def run_federated_simulation(
                  num_clients: int = 10,
                  num_rounds: int = 50,
                  clients_per_round: int = 5,
                  local_epochs: int = 5
              ):
                  """Run federated learning simulation"""
                  
                  # Load and partition data
                  client_datasets = load_and_partition_mnist(num_clients)
                  
                  # Create global model
                  global_model = tf.keras.Sequential([
                      tf.keras.layers.Dense(128, activation='relu', input_shape=(784,)),
                      tf.keras.layers.Dropout(0.2),
                      tf.keras.layers.Dense(64, activation='relu'),
                      tf.keras.layers.Dense(10, activation='softmax')
                  ])
                  
                  global_model.compile(
                      optimizer='adam',
                      loss='sparse_categorical_crossentropy',
                      metrics=['accuracy']
                  )
                  
                  # Create clients
                  clients = []
                  for i, (X, y) in enumerate(client_datasets):
                      client_model = tf.keras.models.clone_model(global_model)
                      client_model.compile(
                          optimizer='adam',
                          loss='sparse_categorical_crossentropy',
                          metrics=['accuracy']
                      )
                      
                      from federated.client import FederatedClient
                      clients.append(FederatedClient(
                          client_id=f'client-{i}',
                          model=client_model,
                          local_data=(X, y),
                          epochs=local_epochs
                      ))
                  
                  # Training history
                  history = {'round': [], 'accuracy': [], 'loss': []}
                  
                  # Load test data
                  (_, _), (X_test, y_test) = tf.keras.datasets.mnist.load_data()
                  X_test = X_test.reshape(-1, 784).astype('float32') / 255.0
                  
                  # Training loop
                  for round_num in range(num_rounds):
                      print(f"\n=== Round {round_num + 1}/{num_rounds} ===")
                      
                      # Select clients
                      selected = np.random.choice(
                          clients,
                          size=clients_per_round,
                          replace=False
                      )
                      
                      # Get global weights
                      global_weights = global_model.get_weights()
                      
                      # Train selected clients
                      client_updates = []
                      for client in selected:
                          client.set_weights(global_weights)
                          weights, num_samples, loss = client.local_train()
                          client_updates.append((weights, num_samples))
                      
                      # Aggregate
                      total_samples = sum(n for _, n in client_updates)
                      aggregated_weights = []
                      
                      for layer_idx in range(len(global_weights)):
                          layer_sum = np.zeros_like(global_weights[layer_idx])
                          for weights, num_samples in client_updates:
                              layer_sum += weights[layer_idx] * (num_samples / total_samples)
                          aggregated_weights.append(layer_sum)
                      
                      # Update global model
                      global_model.set_weights(aggregated_weights)
                      
                      # Evaluate
                      loss, accuracy = global_model.evaluate(X_test, y_test, verbose=0)
                      
                      history['round'].append(round_num + 1)
                      history['accuracy'].append(accuracy)
                      history['loss'].append(loss)
                      
                      print(f"Test accuracy: {accuracy*100:.2f}%, Loss: {loss:.4f}")
                  
                  # Plot results
                  plt.figure(figsize=(12, 4))
                  
                  plt.subplot(1, 2, 1)
                  plt.plot(history['round'], history['accuracy'])
                  plt.xlabel('Round')
                  plt.ylabel('Accuracy')
                  plt.title('Federated Learning Accuracy')
                  plt.grid(True)
                  
                  plt.subplot(1, 2, 2)
                  plt.plot(history['round'], history['loss'])
                  plt.xlabel('Round')
                  plt.ylabel('Loss')
                  plt.title('Federated Learning Loss')
                  plt.grid(True)
                  
                  plt.tight_layout()
                  plt.savefig('federated_learning_results.png')
                  plt.show()
                  
                  return history
              
              # Run simulation
              if __name__ == '__main__':
                  history = run_federated_simulation(
                      num_clients=10,
                      num_rounds=50,
                      clients_per_round=5,
                      local_epochs=5
                  )
              ```

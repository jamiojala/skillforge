                      'download_url': 'https://cdn.example.com/firmware-v1.2.0.bin',
                      'min_hardware_version': 'hw-v1',
                      'rollout_percentage': 10  # Staged rollout
                  }
              }
              
              def require_auth(f):
                  @wraps(f)
                  def decorated(*args, **kwargs):
                      token = request.headers.get('Authorization')
                      if not token:
                          return jsonify({'error': 'Missing token'}), 401
                      try:
                          jwt.decode(token, os.getenv('JWT_SECRET'), algorithms=['HS256'])
                      except:
                          return jsonify({'error': 'Invalid token'}), 401
                      return f(*args, **kwargs)
                  return decorated
              
              @app.route('/api/v1/updates', methods=['GET'])
              @require_auth
              def check_update():
                  device_id = request.args.get('device_id')
                  current_version = request.args.get('current_version')
                  
                  # Get latest version
                  latest = max(FIRMWARE_VERSIONS.values(), key=lambda x: x['version'])
                  
                  # Check if update needed
                  if current_version >= latest['version']:
                      return jsonify({'update_available': False})
                  
                  # Check staged rollout
                  device_hash = hash(device_id) % 100
                  if device_hash > latest['rollout_percentage']:
                      return jsonify({'update_available': False})
                  
                  return jsonify({
                      'update_available': True,
                      **latest
                  })
              
              @app.route('/api/v1/status', methods=['POST'])
              @require_auth
              def update_status():
                  data = request.json
                  device_id = data.get('device_id')
                  status = data.get('status')
                  version = data.get('version')
                  
                  DEVICES[device_id] = {
                      'status': status,
                      'version': version,
                      'last_seen': datetime.utcnow().isoformat()
                  }
                  
                  return jsonify({'success': True})
              
              @app.route('/api/v1/errors', methods=['POST'])
              def report_error():
                  data = request.json
                  # Log error for analysis
                  print(f"Device {data.get('device_id')} error: {data.get('error')}")
                  return jsonify({'success': True})
              
              if __name__ == '__main__':
                  app.run(host='0.0.0.0', port=5000)
              ```

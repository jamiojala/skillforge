              ```
              
              ### Connect Button Component
              
              ```tsx
              // components/ConnectButton.tsx
              'use client';
              
              import { ConnectButton as RainbowConnectButton } from '@rainbow-me/rainbowkit';
              
              export function ConnectButton() {
                return (
                  <RainbowConnectButton
                    accountStatus="address"
                    chainStatus="icon"
                    showBalance={false}
                  />
                );
              }
              ```
              
              ### Custom Hook for Transactions
              
              ```tsx
              // hooks/useTransaction.ts
              'use client';
              
              import { useWriteContract, useWaitForTransactionReceipt } from 'wagmi';
              import { useState, useCallback } from 'react';
              import { parseEther } from 'viem';
              
              interface UseTransactionOptions {
                onSuccess?: (hash: string) => void;
                onError?: (error: Error) => void;
              }
              
              export function useTransaction(options: UseTransactionOptions = {}) {
                const [isPending, setIsPending] = useState(false);
                const { writeContractAsync } = useWriteContract();
                
                const sendTransaction = useCallback(
                  async ({
                    address,
                    abi,
                    functionName,
                    args,
                    value,
                  }: {
                    address: `0x${string}`;
                    abi: any;
                    functionName: string;
                    args?: any[];
                    value?: string;
                  }) => {
                    setIsPending(true);
                    try {
                      const hash = await writeContractAsync({
                        address,
                        abi,
                        functionName,
                        args,
                        value: value ? parseEther(value) : undefined,
                      });
                      
                      options.onSuccess?.(hash);
                      return hash;
                    } catch (error) {
                      options.onError?.(error as Error);
                      throw error;
                    } finally {
                      setIsPending(false);
                    }
                  },
                  [writeContractAsync, options]
                );
                
                return { sendTransaction, isPending };
              }
              
              // Hook for waiting on transactions
              export function useTransactionStatus(hash: `0x${string}` | undefined) {
                const { data: receipt, isLoading } = useWaitForTransactionReceipt({
                  hash,
                });
                
                return {
                  isConfirming: isLoading,
                  isConfirmed: receipt?.status === 'success',
                  isFailed: receipt?.status === 'reverted',
                  receipt,
                };
              }
              ```
              
              ### Network Switching
              
              ```tsx
              // components/NetworkSwitcher.tsx
              'use client';
              
              import { useChainId, useSwitchChain } from 'wagmi';
              import { mainnet, sepolia, polygon } from 'wagmi/chains';
              
              const chains = [mainnet, sepolia, polygon];
              
              export function NetworkSwitcher() {
                const chainId = useChainId();
                const { switchChain, isPending } = useSwitchChain();
                
                return (
                  <select
                    value={chainId}
                    onChange={(e) => switchChain({ chainId: Number(e.target.value) })}
                    disabled={isPending}
                    className="network-select"
                  >
                    {chains.map((chain) => (
                      <option key={chain.id} value={chain.id}>
                        {chain.name}
                      </option>
                    ))}
                  </select>
                );
              }
              ```
              
              ### Error Handling
              
              ```tsx
              // components/TransactionError.tsx
              'use client';
              
              import { useEffect } from 'react';
              
              export function getErrorMessage(error: Error): string {
                if (error.message.includes('User rejected')) {
                  return 'Transaction was rejected by user';
                }
                if (error.message.includes('insufficient funds')) {
                  return 'Insufficient funds for transaction';
                }
                if (error.message.includes('gas required exceeds')) {
                  return 'Gas limit too low for this transaction';
                }
                if (error.message.includes('nonce too low')) {
                  return 'Transaction nonce error. Please refresh and try again';
                }
                return error.message || 'Transaction failed';
              }
              
              export function TransactionError({ error }: { error: Error | null }) {
                if (!error) return null;
                
                return (
                  <div className="error-message">
                    {getErrorMessage(error)}
                  </div>
                );
              }
              ```
              

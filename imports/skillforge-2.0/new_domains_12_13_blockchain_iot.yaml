              ## InfluxDB Time-Series Setup
              
              ### Schema Design
              
              ```python
              # influxdb/schema_setup.py
              from influxdb_client import InfluxDBClient, Point
              from influxdb_client.client.write_api import SYNCHRONOUS
              import os
              
              class InfluxDBSetup:
                  def __init__(self, url: str, token: str, org: str):
                      self.client = InfluxDBClient(url=url, token=token, org=org)
                      self.buckets_api = self.client.buckets_api()
                      self.org_api = self.client.organizations_api()
                  
                  def create_bucket_with_retention(
                      self,
                      bucket_name: str,
                      retention_days: int,
                      org_id: str
                  ):
                      """Create bucket with retention policy"""
                      
                      retention_seconds = retention_days * 24 * 60 * 60
                      
                      bucket = self.buckets_api.create_bucket(
                          bucket_name=bucket_name,
                          org_id=org_id,
                          retention_rules=[{
                              'type': 'expire',
                              'everySeconds': retention_seconds
                          }]
                      )
                      
                      print(f"Created bucket: {bucket_name} (retention: {retention_days} days)")
                      return bucket
                  
                  def setup_iot_buckets(self, org_id: str):
                      """Setup buckets for IoT data with different retention"""
                      
                      buckets = {
                          'iot-telemetry-raw': 7,      # Raw data: 7 days
                          'iot-telemetry-hourly': 90,  # Hourly aggregates: 90 days
                          'iot-telemetry-daily': 365,  # Daily aggregates: 1 year
                          'iot-alerts': 365,           # Alerts: 1 year
                          'iot-events': 30,            # Events: 30 days
                      }
                      
                      for bucket_name, retention in buckets.items():
                          self.create_bucket_with_retention(bucket_name, retention, org_id)
                  
                  def create_downsampling_tasks(self, org_id: str):
                      """Create tasks for downsampling data"""
                      
                      tasks_api = self.client.tasks_api()
                      
                      # Hourly aggregation task
                      hourly_task = '''
                      option task = {{
                          name: "telemetry-hourly-agg",
                          every: 1h,
                      }}
                      
                      from(bucket: "iot-telemetry-raw")
                          |> range(start: -task.every)
                          |> filter(fn: (r) => r._measurement == "sensor_data")
                          |> aggregateWindow(every: 1h, fn: mean)
                          |> to(bucket: "iot-telemetry-hourly", org: "{org}")
                      '''.format(org=org_id)
                      
                      tasks_api.create_task_every(
                          name='telemetry-hourly-agg',
                          flux=hourly_task,
                          every='1h',
                          organization_id=org_id
                      )
                      
                      # Daily aggregation task
                      daily_task = '''
                      option task = {{
                          name: "telemetry-daily-agg",
                          every: 1d,
                      }}
                      
                      from(bucket: "iot-telemetry-hourly")
                          |> range(start: -task.every)
                          |> filter(fn: (r) => r._measurement == "sensor_data")
                          |> aggregateWindow(every: 1d, fn: mean)
                          |> to(bucket: "iot-telemetry-daily", org: "{org}")
                      '''.format(org=org_id)
                      
                      tasks_api.create_task_every(
                          name='telemetry-daily-agg',
                          flux=daily_task,
                          every='1d',
                          organization_id=org_id
                      )
                      
                      print("Downsampling tasks created")
              
              # Usage
              if __name__ == '__main__':
                  setup = InfluxDBSetup(
                      url='http://localhost:8086',
                      token=os.getenv('INFLUXDB_TOKEN'),
                      org='my-org'
                  )
                  
                  org = setup.org_api.find_organizations()[0]
                  setup.setup_iot_buckets(org.id)
                  setup.create_downsampling_tasks(org.id)
              ```
              
              ### Optimized Data Writing
              
              ```python
              # influxdb/optimized_writer.py
              from influxdb_client import InfluxDBClient, Point
              from influxdb_client.client.write_api import WriteOptions
              import time
              from typing import List, Dict
              import logging
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              class OptimizedInfluxWriter:
                  def __init__(
                      self,
                      url: str,
                      token: str,
                      org: str,
                      bucket: str,
                      batch_size: int = 1000,
                      flush_interval: int = 1000
                  ):
                      self.bucket = bucket
                      
                      # Configure write options for batching
                      write_options = WriteOptions(
                          batch_size=batch_size,
                          flush_interval=flush_interval,
                          jitter_interval=0,
                          retry_interval=5000,
                          max_retries=3,
                          max_retry_delay=30000,
                          exponential_base=2
                      )
                      
                      self.client = InfluxDBClient(url=url, token=token, org=org)
                      self.write_api = self.client.write_api(write_options=write_options)
                      
                      self.buffer: List[Point] = []
                      self.buffer_size = batch_size
                  
                  def write_point(self, measurement: str, tags: Dict, fields: Dict, timestamp=None):
                      """Write a single point (buffered)"""
                      
                      point = Point(measurement)
                      
                      # Add tags
                      for key, value in tags.items():
                          point = point.tag(key, value)
                      
                      # Add fields
                      for key, value in fields.items():
                          if isinstance(value, int):
                              point = point.field(key, value)
                          elif isinstance(value, float):
                              point = point.field(key, value)
                          elif isinstance(value, bool):
                              point = point.field(key, value)
                          else:
                              point = point.field(key, str(value))
                      
                      # Set timestamp
                      if timestamp:
                          point = point.time(timestamp)
                      
                      self.buffer.append(point)
                      
                      # Flush if buffer is full
                      if len(self.buffer) >= self.buffer_size:
                          self.flush()
                  
                  def write_batch(self, points: List[Point]):
                      """Write multiple points at once"""
                      self.write_api.write(bucket=self.bucket, record=points)
                      logger.debug(f"Wrote batch of {len(points)} points")
                  
                  def flush(self):
                      """Flush buffered points"""
                      if self.buffer:
                          self.write_api.write(bucket=self.bucket, record=self.buffer)
                          logger.info(f"Flushed {len(self.buffer)} points")
                          self.buffer = []
                  
                  def close(self):
                      """Close writer and flush remaining points"""
                      self.flush()
                      self.write_api.close()
                      self.client.close()
              
              # Usage for IoT telemetry
              if __name__ == '__main__':
                  import random
                  
                  writer = OptimizedInfluxWriter(
                      url='http://localhost:8086',
                      token='your-token',
                      org='my-org',
                      bucket='iot-telemetry-raw',
                      batch_size=500,
                      flush_interval=5000
                  )
                  
                  try:
                      # Simulate IoT data
                      for i in range(10000):
                          writer.write_point(
                              measurement='sensor_data',
                              tags={
                                  'device_id': f'device-{i % 100}',
                                  'location': f'site-{i % 10}',
                                  'sensor_type': 'temperature'
                              },
                              fields={
                                  'value': 20 + random.random() * 10,
                                  'battery': random.random() * 100
                              }
                          )
                          
                          if i % 1000 == 0:
                              print(f"Written {i} points")
                  
                  finally:
                      writer.close()
              ```
              
              ### Query Optimization
              
              ```python
              # influxdb/query_optimizer.py
              from influxdb_client import InfluxDBClient
              import time
              from typing import List, Dict
              
              class InfluxQueryOptimizer:
                  def __init__(self, url: str, token: str, org: str):
                      self.client = InfluxDBClient(url=url, token=token, org=org)
                      self.query_api = self.client.query_api()
                  
                  def get_latest_values(self, bucket: str, measurement: str, device_id: str = None):
                      """Get latest values (optimized with limit)"""
                      
                      filter_device = f'|> filter(fn: (r) => r.device_id == "{device_id}")' if device_id else ''
                      
                      query = f'''
                      from(bucket: "{bucket}")
                          |> range(start: -1h)
                          |> filter(fn: (r) => r._measurement == "{measurement}")
                          {filter_device}
                          |> last()
                      '''
                      
                      return self.query_api.query(query)
                  
                  def get_aggregated_range(
                      self,
                      bucket: str,
                      measurement: str,
                      field: str,
                      start: str,
                      stop: str = 'now()',
                      window: str = '1h',
                      aggregate: str = 'mean'
                  ):
                      """Get aggregated data over time range"""
                      
                      query = f'''
                      from(bucket: "{bucket}")
                          |> range(start: {start}, stop: {stop})
                          |> filter(fn: (r) => r._measurement == "{measurement}")
                          |> filter(fn: (r) => r._field == "{field}")
                          |> aggregateWindow(every: {window}, fn: {aggregate}, createEmpty: false)
                          |> yield(name: "{aggregate}")
                      '''
                      
                      return self.query_api.query(query)
                  
                  def get_device_stats(self, bucket: str, measurement: str, device_id: str):
                      """Get comprehensive stats for a device"""
                      
                      query = f'''
                      data = from(bucket: "{bucket}")
                          |> range(start: -24h)
                          |> filter(fn: (r) => r._measurement == "{measurement}")
                          |> filter(fn: (r) => r.device_id == "{device_id}")
                      
                      mean = data |> mean() |> set(key: "stat", value: "mean")
                      max = data |> max() |> set(key: "stat", value: "max")
                      min = data |> min() |> set(key: "stat", value: "min")
                      count = data |> count() |> set(key: "stat", value: "count")
                      
                      union(tables: [mean, max, min, count])
                      '''
                      
                      return self.query_api.query(query)
                  
                  def find_anomalies(
                      self,
                      bucket: str,
                      measurement: str,
                      field: str,
                      threshold: float,
                      window: str = '5m'
                  ):
                      """Find anomalous values using standard deviation"""
                      
                      query = f'''
                      data = from(bucket: "{bucket}")
                          |> range(start: -1h)
                          |> filter(fn: (r) => r._measurement == "{measurement}")
                          |> filter(fn: (r) => r._field == "{field}")
                      
                      mean = data |> mean(column: "_value")
                      stddev = data |> stddev(column: "_value")
                      
                      join(tables: {{mean: mean, stddev: stddev}}, on: ["_measurement"])
                          |> map(fn: (r) => {{
                              r with
                              upper_bound: r._value_mean + {threshold} * r._value_stddev,
                              lower_bound: r._value_mean - {threshold} * r._value_stddev
                          }})
                      '''
                      
                      return self.query_api.query(query)
              
              # Usage
              if __name__ == '__main__':
                  optimizer = InfluxQueryOptimizer(
                      url='http://localhost:8086',
                      token='your-token',
                      org='my-org'
                  )
                  
                  # Get latest values
                  latest = optimizer.get_latest_values(
                      bucket='iot-telemetry-raw',
                      measurement='sensor_data',
                      device_id='device-001'
                  )
                  print("Latest values:", latest)
                  
                  # Get hourly averages
                  hourly = optimizer.get_aggregated_range(
                      bucket='iot-telemetry-raw',
                      measurement='sensor_data',
                      field='value',
                      start='-24h',
                      window='1h',
                      aggregate='mean'
                  )
                  print("Hourly averages:", hourly)
              ```
              
              ### TimescaleDB Alternative
              
              ```sql
              -- timescaledb/setup.sql
              
              -- Create hypertable for time-series data
              CREATE TABLE sensor_data (
                  time TIMESTAMPTZ NOT NULL,
                  device_id TEXT NOT NULL,
                  sensor_type TEXT NOT NULL,
                  value DOUBLE PRECISION NOT NULL,
                  metadata JSONB
              );
              
              -- Convert to hypertable
              SELECT create_hypertable('sensor_data', 'time', chunk_time_interval => INTERVAL '1 day');
              
              -- Create indexes
              CREATE INDEX idx_sensor_data_device ON sensor_data (device_id, time DESC);
              CREATE INDEX idx_sensor_data_type ON sensor_data (sensor_type, time DESC);
              
              -- Enable compression
              ALTER TABLE sensor_data SET (
                  timescaledb.compress,
                  timescaledb.compress_segmentby = 'device_id,sensor_type'
              );
              
              -- Add compression policy (compress after 7 days)
              SELECT add_compression_policy('sensor_data', INTERVAL '7 days');
              
              -- Add retention policy (drop after 90 days)
              SELECT add_retention_policy('sensor_data', INTERVAL '90 days');
              
              -- Create continuous aggregate for hourly data
              CREATE MATERIALIZED VIEW sensor_data_hourly
              WITH (timescaledb.continuous) AS
              SELECT
                  time_bucket('1 hour', time) AS bucket,
                  device_id,
                  sensor_type,
                  AVG(value) AS avg_value,
                  MAX(value) AS max_value,
                  MIN(value) AS min_value,
                  COUNT(*) AS sample_count
              FROM sensor_data
              GROUP BY bucket, device_id, sensor_type
              WITH NO DATA;
              
              -- Refresh policy for continuous aggregate
              SELECT add_continuous_aggregate_policy('sensor_data_hourly',
                  start_offset => INTERVAL '1 month',
                  end_offset => INTERVAL '1 hour',
                  schedule_interval => INTERVAL '1 hour'
              );
              
              -- Optimized queries
              -- Get latest reading per device
              SELECT DISTINCT ON (device_id)
                  device_id, time, value
              FROM sensor_data
              ORDER BY device_id, time DESC;
              
              -- Time range query with aggregation
              SELECT
                  time_bucket('5 minutes', time) AS bucket,
                  AVG(value) AS avg_value
              FROM sensor_data
              WHERE device_id = 'device-001'
                AND time > NOW() - INTERVAL '1 hour'
              GROUP BY bucket
              ORDER BY bucket;
              ```

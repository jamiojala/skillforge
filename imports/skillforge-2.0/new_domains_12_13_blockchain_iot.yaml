              ## Complete NFT Marketplace dApp
              
              ### Architecture Overview
              
              ```
              Frontend (Next.js)
                  ↓
              wagmi/viem (contract interactions)
                  ↓
              The Graph (indexed data)
                  ↓
              Smart Contracts (listing, trading, auctions)
                  ↓
              IPFS (NFT metadata)
              ```
              
              ### Smart Contracts
              
              ```solidity
              // contracts/NFTMarketplace.sol
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "@openzeppelin/contracts/token/ERC721/IERC721.sol";
              import "@openzeppelin/contracts/security/ReentrancyGuard.sol";
              import "@openzeppelin/contracts/security/Pausable.sol";
              import "@openzeppelin/contracts/access/Ownable.sol";
              
              contract NFTMarketplace is ReentrancyGuard, Pausable, Ownable {
                  struct Listing {
                      address seller;
                      address nftContract;
                      uint256 tokenId;
                      uint256 price;
                      bool active;
                  }
                  
                  struct Auction {
                      address seller;
                      address nftContract;
                      uint256 tokenId;
                      uint256 startPrice;
                      uint256 highestBid;
                      address highestBidder;
                      uint256 endTime;
                      bool active;
                  }
                  
                  // Platform fee (2.5%)
                  uint256 public platformFee = 250;
                  uint256 public constant FEE_DENOMINATOR = 10000;
                  
                  mapping(bytes32 => Listing) public listings;
                  mapping(bytes32 => Auction) public auctions;
                  mapping(address => uint256) public pendingReturns;
                  
                  event ItemListed(
                      bytes32 indexed listingId,
                      address indexed seller,
                      address indexed nftContract,
                      uint256 tokenId,
                      uint256 price
                  );
                  event ItemSold(
                      bytes32 indexed listingId,
                      address indexed buyer,
                      uint256 price
                  );
                  event AuctionCreated(
                      bytes32 indexed auctionId,
                      address indexed seller,
                      uint256 startPrice,
                      uint256 endTime
                  );
                  event BidPlaced(
                      bytes32 indexed auctionId,
                      address indexed bidder,
                      uint256 amount
                  );
                  event AuctionEnded(
                      bytes32 indexed auctionId,
                      address winner,
                      uint256 amount
                  );
                  
                  function listItem(
                      address nftContract,
                      uint256 tokenId,
                      uint256 price
                  ) external whenNotPaused {
                      require(price > 0, "Price must be greater than 0");
                      
                      IERC721 nft = IERC721(nftContract);
                      require(nft.ownerOf(tokenId) == msg.sender, "Not owner");
                      require(
                          nft.isApprovedForAll(msg.sender, address(this)) ||
                          nft.getApproved(tokenId) == address(this),
                          "Not approved"
                      );
                      
                      bytes32 listingId = keccak256(
                          abi.encodePacked(nftContract, tokenId, msg.sender, block.timestamp)
                      );
                      
                      listings[listingId] = Listing({
                          seller: msg.sender,
                          nftContract: nftContract,
                          tokenId: tokenId,
                          price: price,
                          active: true
                      });
                      
                      emit ItemListed(listingId, msg.sender, nftContract, tokenId, price);
                  }
                  
                  function buyItem(bytes32 listingId) external payable nonReentrant whenNotPaused {
                      Listing storage listing = listings[listingId];
                      require(listing.active, "Listing not active");
                      require(msg.value >= listing.price, "Insufficient payment");
                      
                      listing.active = false;
                      
                      // Calculate fees
                      uint256 fee = (listing.price * platformFee) / FEE_DENOMINATOR;
                      uint256 sellerAmount = listing.price - fee;
                      
                      // Transfer NFT
                      IERC721(listing.nftContract).safeTransferFrom(
                          listing.seller,
                          msg.sender,
                          listing.tokenId
                      );
                      
                      // Transfer payment
                      payable(listing.seller).transfer(sellerAmount);
                      
                      // Refund excess
                      if (msg.value > listing.price) {
                          payable(msg.sender).transfer(msg.value - listing.price);
                      }
                      
                      emit ItemSold(listingId, msg.sender, listing.price);
                  }
                  
                  function createAuction(
                      address nftContract,
                      uint256 tokenId,
                      uint256 startPrice,
                      uint256 duration
                  ) external whenNotPaused {
                      require(startPrice > 0, "Start price must be greater than 0");
                      require(duration >= 1 hours, "Duration too short");
                      
                      IERC721 nft = IERC721(nftContract);
                      require(nft.ownerOf(tokenId) == msg.sender, "Not owner");
                      
                      bytes32 auctionId = keccak256(
                          abi.encodePacked(nftContract, tokenId, msg.sender, block.timestamp)
                      );
                      
                      auctions[auctionId] = Auction({
                          seller: msg.sender,
                          nftContract: nftContract,
                          tokenId: tokenId,
                          startPrice: startPrice,
                          highestBid: 0,
                          highestBidder: address(0),
                          endTime: block.timestamp + duration,
                          active: true
                      });
                      
                      // Transfer NFT to contract
                      nft.transferFrom(msg.sender, address(this), tokenId);
                      
                      emit AuctionCreated(auctionId, msg.sender, startPrice, block.timestamp + duration);
                  }
                  
                  function placeBid(bytes32 auctionId) external payable nonReentrant whenNotPaused {
                      Auction storage auction = auctions[auctionId];
                      require(auction.active, "Auction not active");
                      require(block.timestamp < auction.endTime, "Auction ended");
                      require(msg.value > auction.highestBid, "Bid too low");
                      require(msg.value >= auction.startPrice, "Below start price");
                      
                      // Refund previous bidder
                      if (auction.highestBidder != address(0)) {
                          pendingReturns[auction.highestBidder] += auction.highestBid;
                      }
                      
                      auction.highestBid = msg.value;
                      auction.highestBidder = msg.sender;
                      
                      emit BidPlaced(auctionId, msg.sender, msg.value);
                  }
                  
                  function endAuction(bytes32 auctionId) external nonReentrant {
                      Auction storage auction = auctions[auctionId];
                      require(auction.active, "Auction not active");
                      require(block.timestamp >= auction.endTime, "Auction not ended");
                      
                      auction.active = false;
                      
                      if (auction.highestBidder != address(0)) {
                          // Transfer NFT to winner
                          IERC721(auction.nftContract).safeTransferFrom(
                              address(this),
                              auction.highestBidder,
                              auction.tokenId
                          );
                          
                          // Transfer payment to seller
                          uint256 fee = (auction.highestBid * platformFee) / FEE_DENOMINATOR;
                          payable(auction.seller).transfer(auction.highestBid - fee);
                          
                          emit AuctionEnded(auctionId, auction.highestBidder, auction.highestBid);
                      } else {
                          // No bids, return NFT to seller
                          IERC721(auction.nftContract).safeTransferFrom(
                              address(this),
                              auction.seller,
                              auction.tokenId
                          );
                      }
                  }
                  
                  function withdraw() external nonReentrant {
                      uint256 amount = pendingReturns[msg.sender];
                      require(amount > 0, "No pending returns");
                      
                      pendingReturns[msg.sender] = 0;
                      payable(msg.sender).transfer(amount);
                  }
                  
                  // Admin functions
                  function setPlatformFee(uint256 _fee) external onlyOwner {
                      require(_fee <= 1000, "Fee too high"); // Max 10%
                      platformFee = _fee;
                  }
                  
                  function pause() external onlyOwner {
                      _pause();
                  }
                  
                  function unpause() external onlyOwner {
                      _unpause();
                  }
              }
              ```
              

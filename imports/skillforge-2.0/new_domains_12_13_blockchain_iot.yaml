              ### Remote Diagnostics Tool
              
              ```python
              # diagnostics/remote_diagnostics.py
              from azure.iot.hub import IoTHubRegistryManager
              from azure.iot.hub.models import CloudToDeviceMethod
              import json
              import os
              
              class RemoteDiagnostics:
                  def __init__(self, iothub_connection_string: str):
                      self.registry_manager = IoTHubRegistryManager(iothub_connection_string)
                  
                  def run_diagnostics(self, device_id: str) -> dict:
                      """Run remote diagnostics on device"""
                      
                      # Invoke direct method on device
                      method_payload = {'methodName': 'RunDiagnostics'}
                      
                      response = self.registry_manager.invoke_device_method(
                          device_id,
                          CloudToDeviceMethod(
                              method_name='RunDiagnostics',
                              payload=method_payload
                          )
                      )
                      
                      return {
                          'status': response.status,
                          'payload': response.payload
                      }
                  
                  def get_device_logs(self, device_id: str, lines: int = 100) -> list:
                      """Retrieve device logs"""
                      
                      response = self.registry_manager.invoke_device_method(
                          device_id,
                          CloudToDeviceMethod(
                              method_name='GetLogs',
                              payload={'lines': lines}
                          )
                      )
                      
                      return response.payload.get('logs', [])
                  
                  def restart_device(self, device_id: str) -> dict:
                      """Restart device remotely"""
                      
                      response = self.registry_manager.invoke_device_method(
                          device_id,
                          CloudToDeviceMethod(
                              method_name='Restart',
                              payload={}
                          )
                      )
                      
                      return {
                          'status': response.status,
                          'message': 'Restart command sent'
                      }
                  
                  def get_device_twin(self, device_id: str) -> dict:
                      """Get device twin data"""
                      twin = self.registry_manager.get_twin(device_id)
                      return {
                          'device_id': twin.device_id,
                          'etag': twin.etag,
                          'version': twin.version,
                          'properties': {
                              'reported': twin.properties.reported,
                              'desired': twin.properties.desired
                          },
                          'connection_state': twin.connection_state,
                          'last_activity_time': twin.last_activity_time
                      }
                  
                  def update_device_twin(self, device_id: str, properties: dict) -> dict:
                      """Update device twin desired properties"""
                      
                      twin = self.registry_manager.update_twin(
                          device_id,
                          {'properties': {'desired': properties}}
                      )
                      
                      return {'status': 'success', 'twin': twin}
              
              # CLI for diagnostics
              if __name__ == '__main__':
                  import argparse
                  
                  parser = argparse.ArgumentParser(description='IoT Remote Diagnostics')
                  parser.add_argument('device_id', help='Device ID')
                  parser.add_argument('--diagnostics', action='store_true', help='Run diagnostics')
                  parser.add_argument('--logs', type=int, help='Get logs (specify lines)')
                  parser.add_argument('--restart', action='store_true', help='Restart device')
                  parser.add_argument('--twin', action='store_true', help='Get device twin')
                  
                  args = parser.parse_args()
                  
                  diag = RemoteDiagnostics(os.getenv('IOTHUB_CONNECTION_STRING'))
                  
                  if args.diagnostics:
                      result = diag.run_diagnostics(args.device_id)
                      print(json.dumps(result, indent=2))
                  
                  if args.logs:
                      logs = diag.get_device_logs(args.device_id, args.logs)
                      for line in logs:
                          print(line)
                  
                  if args.restart:
                      result = diag.restart_device(args.device_id)
                      print(json.dumps(result, indent=2))
                  
                  if args.twin:
                      twin = diag.get_device_twin(args.device_id)
                      print(json.dumps(twin, indent=2))
              ```
              
              ### Fleet Analytics
              
              ```python
              # analytics/fleet_analytics.py
              import pandas as pd
              from influxdb import InfluxDBClient
              from datetime import datetime, timedelta
              
              class FleetAnalytics:
                  def __init__(self, influx_host: str, database: str):
                      self.client = InfluxDBClient(host=influx_host, database=database)
                  
                  def get_fleet_health(self, hours: int = 24) -> dict:
                      """Get overall fleet health metrics"""
                      
                      query = f'''
                      SELECT 
                          mean("system_cpu_percent") as avg_cpu,
                          mean("system_memory_percent") as avg_memory,
                          count(distinct("device_id")) as active_devices
                      FROM "telemetry"
                      WHERE time > now() - {hours}h
                      '''
                      
                      result = self.client.query(query)
                      points = list(result.get_points())
                      
                      if points:
                          return {
                              'avg_cpu': points[0].get('avg_cpu', 0),
                              'avg_memory': points[0].get('avg_memory', 0),
                              'active_devices': points[0].get('active_devices', 0),
                              'period_hours': hours
                          }
                      return {}
                  
                  def get_offline_devices(self, threshold_minutes: int = 5) -> list:
                      """Get list of offline devices"""
                      
                      query = f'''
                      SELECT last("timestamp") as last_seen, "device_id"
                      FROM "telemetry"
                      GROUP BY "device_id"
                      '''
                      
                      result = self.client.query(query)
                      offline = []
                      
                      for point in result.get_points():
                          last_seen = datetime.fromisoformat(point['last_seen'].replace('Z', '+00:00'))
                          if datetime.utcnow() - last_seen > timedelta(minutes=threshold_minutes):
                              offline.append({
                                  'device_id': point['device_id'],
                                  'last_seen': point['last_seen']
                              })
                      
                      return offline
                  
                  def get_temperature_anomalies(self, threshold: float = 75) -> list:
                      """Get devices with abnormal temperatures"""
                      
                      query = f'''
                      SELECT max("device_temperature") as max_temp, "device_id"
                      FROM "telemetry"
                      WHERE time > now() - 1h
                      GROUP BY "device_id"
                      HAVING max_temp > {threshold}
                      '''
                      
                      result = self.client.query(query)
                      anomalies = []
                      
                      for point in result.get_points():
                          anomalies.append({
                              'device_id': point['device_id'],
                              'max_temperature': point['max_temp']
                          })
                      
                      return anomalies
                  
                  def generate_daily_report(self) -> dict:
                      """Generate daily fleet report"""
                      
                      health = self.get_fleet_health(hours=24)
                      offline = self.get_offline_devices()
                      temp_anomalies = self.get_temperature_anomalies()
                      
                      return {
                          'generated_at': datetime.utcnow().isoformat(),
                          'period': '24h',
                          'summary': {
                              'active_devices': health.get('active_devices', 0),
                              'avg_cpu': health.get('avg_cpu', 0),
                              'avg_memory': health.get('avg_memory', 0),
                              'offline_devices': len(offline),
                              'temperature_anomalies': len(temp_anomalies)
                          },
                          'offline_devices': offline,
                          'temperature_anomalies': temp_anomalies
                      }
              
              # Usage
              if __name__ == '__main__':
                  analytics = FleetAnalytics('localhost', 'iot_fleet')
                  
                  # Generate daily report
                  report = analytics.generate_daily_report()
                  print(json.dumps(report, indent=2))
              ```

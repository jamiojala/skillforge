              ### ONNX Optimization
              
              ```python
              # edge_ml/onnx_optimizer.py
              import onnx
              from onnxruntime.quantization import quantize_dynamic, QuantType
              import onnxruntime as ort
              import numpy as np
              import time
              
              class ONNXOptimizer:
                  def __init__(self, model_path: str):
                      self.model = onnx.load(model_path)
                      self.original_path = model_path
                  
                  def optimize_graph(self) -> onnx.ModelProto:
                      """Apply graph optimizations"""
                      
                      from onnxruntime.tools import optimizer
                      
                      optimized_model = optimizer.optimize_model(
                          self.original_path,
                          model_type='bert',  # or 'onnx' for general
                          use_gpu=False,
                          num_heads=0,
                          hidden_size=0
                      )
                      
                      return optimized_model.model
                  
                  def quantize_dynamic_onnx(self, output_path: str):
                      """Apply dynamic quantization to ONNX model"""
                      
                      quantize_dynamic(
                          model_input=self.original_path,
                          model_output=output_path,
                          weight_type=QuantType.QInt8
                      )
                      
                      print(f"Quantized model saved to {output_path}")
                  
                  def benchmark_onnx(self, model_path: str, sample_input: np.ndarray) -> dict:
                      """Benchmark ONNX model"""
                      
                      session = ort.InferenceSession(model_path)
                      input_name = session.get_inputs()[0].name
                      
                      # Warmup
                      for _ in range(10):
                          _ = session.run(None, {input_name: sample_input})
                      
                      # Benchmark
                      times = []
                      for _ in range(100):
                          start = time.time()
                          _ = session.run(None, {input_name: sample_input})
                          times.append((time.time() - start) * 1000)
                      
                      return {
                          'mean_ms': np.mean(times),
                          'std_ms': np.std(times),
                          'p95_ms': np.percentile(times, 95)
                      }
              
              # Usage
              if __name__ == '__main__':
                  optimizer = ONNXOptimizer('model.onnx')
                  
                  # Optimize graph
                  optimized = optimizer.optimize_graph()
                  onnx.save(optimized, 'model_optimized.onnx')
                  
                  # Quantize
                  optimizer.quantize_dynamic_onnx('model_quantized.onnx')
                  
                  # Benchmark
                  sample = np.random.randn(1, 3, 224, 224).astype(np.float32)
                  metrics = optimizer.benchmark_onnx('model_quantized.onnx', sample)
                  print(f"ONNX inference: {metrics['mean_ms']:.2f} ms")

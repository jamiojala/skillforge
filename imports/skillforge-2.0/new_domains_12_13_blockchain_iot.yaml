              ### Complete Optimization Workflow
              
              ```python
              # edge_ml/model_optimizer.py
              import tensorflow as tf
              import numpy as np
              import time
              import os
              from typing import Tuple, Dict
              import logging
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              class EdgeModelOptimizer:
                  def __init__(self, model_path: str):
                      self.model = tf.keras.models.load_model(model_path)
                      self.original_size = self._get_model_size()
                      self.baseline_metrics = None
                      logger.info(f"Loaded model from {model_path}")
                      logger.info(f"Original size: {self.original_size / 1024 / 1024:.2f} MB")
                  
                  def _get_model_size(self) -> int:
                      """Get model size in bytes"""
                      import tempfile
                      with tempfile.NamedTemporaryFile(suffix='.h5', delete=False) as f:
                          self.model.save(f.name)
                          size = os.path.getsize(f.name)
                          os.unlink(f.name)
                      return size
                  
                  def profile_model(self, sample_input: np.ndarray, iterations: int = 100) -> Dict:
                      """Profile model inference time"""
                      
                      # Warmup
                      for _ in range(10):
                          _ = self.model.predict(sample_input, verbose=0)
                      
                      # Measure
                      times = []
                      for _ in range(iterations):
                          start = time.time()
                          _ = self.model.predict(sample_input, verbose=0)
                          times.append((time.time() - start) * 1000)  # ms
                      
                      metrics = {
                          'mean_ms': np.mean(times),
                          'std_ms': np.std(times),
                          'min_ms': np.min(times),
                          'max_ms': np.max(times),
                          'p95_ms': np.percentile(times, 95),
                          'p99_ms': np.percentile(times, 99)
                      }
                      
                      logger.info(f"Baseline inference: {metrics['mean_ms']:.2f} ms (mean)")
                      return metrics
                  
                  def quantize_dynamic(self) -> tf.keras.Model:
                      """Apply dynamic range quantization"""
                      
                      converter = tf.lite.TFLiteConverter.from_keras_model(self.model)
                      converter.optimizations = [tf.lite.Optimize.DEFAULT]
                      
                      tflite_model = converter.convert()
                      
                      # Save quantized model
                      quant_path = 'model_dynamic_quant.tflite'
                      with open(quant_path, 'wb') as f:
                          f.write(tflite_model)
                      
                      size = os.path.getsize(quant_path)
                      logger.info(f"Dynamic quantized size: {size / 1024:.2f} KB")
                      logger.info(f"Compression ratio: {self.original_size / size:.2f}x")
                      
                      return quant_path
                  
                  def quantize_int8(
                      self,
                      representative_dataset: tf.data.Dataset
                  ) -> str:
                      """Apply INT8 quantization with representative dataset"""
                      
                      def representative_data_gen():
                          for input_value in representative_dataset.take(100):
                              yield [input_value]
                      
                      converter = tf.lite.TFLiteConverter.from_keras_model(self.model)
                      converter.optimizations = [tf.lite.Optimize.DEFAULT]
                      converter.representative_dataset = representative_data_gen
                      converter.target_spec.supported_ops = [
                          tf.lite.OpsSet.TFLITE_BUILTINS_INT8
                      ]
                      converter.inference_input_type = tf.int8
                      converter.inference_output_type = tf.int8
                      
                      tflite_model = converter.convert()
                      
                      # Save
                      quant_path = 'model_int8_quant.tflite'
                      with open(quant_path, 'wb') as f:
                          f.write(tflite_model)
                      
                      size = os.path.getsize(quant_path)
                      logger.info(f"INT8 quantized size: {size / 1024:.2f} KB")
                      logger.info(f"Compression ratio: {self.original_size / size:.2f}x")
                      
                      return quant_path
                  
                  def quantize_fp16(self) -> str:
                      """Apply FP16 quantization"""
                      
                      converter = tf.lite.TFLiteConverter.from_keras_model(self.model)
                      converter.optimizations = [tf.lite.Optimize.DEFAULT]
                      converter.target_spec.supported_types = [tf.float16]
                      
                      tflite_model = converter.convert()
                      
                      quant_path = 'model_fp16_quant.tflite'
                      with open(quant_path, 'wb') as f:
                          f.write(tflite_model)
                      
                      size = os.path.getsize(quant_path)
                      logger.info(f"FP16 quantized size: {size / 1024:.2f} KB")
                      
                      return quant_path
                  
                  def prune_model(
                      self,
                      sparsity: float = 0.5,
                      epochs: int = 3
                  ) -> tf.keras.Model:
                      """Apply magnitude-based pruning"""
                      
                      import tensorflow_model_optimization as tfmot
                      
                      # Define pruning schedule
                      pruning_schedule = tfmot.sparsity.keras.PolynomialDecay(
                          initial_sparsity=0.0,
                          final_sparsity=sparsity,
                          begin_step=0,
                          end_step=np.ceil(1000 / 32).astype(np.int32) * epochs
                      )
                      
                      # Apply pruning
                      prune_low_magnitude = tfmot.sparsity.keras.prune_low_magnitude
                      
                      pruned_model = prune_low_magnitude(
                          self.model,
                          pruning_schedule=pruning_schedule
                      )
                      
                      # Compile
                      pruned_model.compile(
                          optimizer='adam',
                          loss=self.model.loss,
                          metrics=['accuracy']
                      )
                      
                      logger.info(f"Pruned model to {sparsity*100:.0f}% sparsity")
                      
                      return pruned_model
                  
                  def convert_to_tflite(
                      self,
                      optimization: str = 'default',
                      representative_dataset: tf.data.Dataset = None
                  ) -> str:
                      """Convert to TFLite with specified optimization"""
                      
                      converter = tf.lite.TFLiteConverter.from_keras_model(self.model)
                      
                      if optimization == 'default':
                          converter.optimizations = [tf.lite.Optimize.DEFAULT]
                      elif optimization == 'size':
                          converter.optimizations = [tf.lite.Optimize.OPTIMIZE_FOR_SIZE]
                      elif optimization == 'latency':
                          converter.optimizations = [tf.lite.Optimize.OPTIMIZE_FOR_LATENCY]
                      
                      if representative_dataset:
                          def representative_data_gen():
                              for input_value in representative_dataset.take(100):
                                  yield [input_value]
                          converter.representative_dataset = representative_data_gen
                      
                      tflite_model = converter.convert()
                      
                      output_path = f'model_{optimization}.tflite'
                      with open(output_path, 'wb') as f:
                          f.write(tflite_model)
                      
                      return output_path
                  
                  def benchmark_tflite(self, model_path: str, sample_input: np.ndarray) -> Dict:
                      """Benchmark TFLite model"""
                      
                      interpreter = tf.lite.Interpreter(model_path=model_path)
                      interpreter.allocate_tensors()
                      
                      input_details = interpreter.get_input_details()
                      output_details = interpreter.get_output_details()
                      
                      # Prepare input
                      input_shape = input_details[0]['shape']
                      input_data = np.array(sample_input, dtype=input_details[0]['dtype'])
                      
                      # Warmup
                      for _ in range(10):
                          interpreter.set_tensor(input_details[0]['index'], input_data)
                          interpreter.invoke()
                      
                      # Benchmark
                      times = []
                      for _ in range(100):
                          start = time.time()
                          interpreter.set_tensor(input_details[0]['index'], input_data)
                          interpreter.invoke()
                          times.append((time.time() - start) * 1000)
                      
                      metrics = {
                          'mean_ms': np.mean(times),
                          'std_ms': np.std(times),
                          'min_ms': np.min(times),
                          'p95_ms': np.percentile(times, 95)
                      }
                      
                      logger.info(f"TFLite inference: {metrics['mean_ms']:.2f} ms (mean)")
                      return metrics
                  
                  def validate_accuracy(
                      self,
                      model_path: str,
                      validation_data: Tuple[np.ndarray, np.ndarray]
                  ) -> float:
                      """Validate model accuracy"""
                      
                      X_val, y_val = validation_data
                      
                      # Load TFLite model
                      interpreter = tf.lite.Interpreter(model_path=model_path)
                      interpreter.allocate_tensors()
                      
                      input_details = interpreter.get_input_details()
                      output_details = interpreter.get_output_details()
                      
                      # Run inference
                      predictions = []
                      for i in range(len(X_val)):
                          input_data = np.expand_dims(X_val[i], axis=0).astype(
                              input_details[0]['dtype']
                          )
                          interpreter.set_tensor(input_details[0]['index'], input_data)
                          interpreter.invoke()
                          output = interpreter.get_tensor(output_details[0]['index'])
                          predictions.append(output[0])
                      
                      predictions = np.array(predictions)
                      
                      # Calculate accuracy (adjust for your task)
                      accuracy = np.mean(np.argmax(predictions, axis=1) == y_val)
                      
                      logger.info(f"Validation accuracy: {accuracy*100:.2f}%")
                      return accuracy
              
              # Complete optimization pipeline
              def optimize_for_edge(
                  model_path: str,
                  validation_data: Tuple[np.ndarray, np.ndarray],
                  representative_dataset: tf.data.Dataset,
                  target_latency_ms: float = 50.0,
                  min_accuracy: float = 0.90
              ) -> Dict:
                  """Complete edge optimization pipeline"""
                  
                  optimizer = EdgeModelOptimizer(model_path)
                  
                  # Profile baseline
                  X_sample = validation_data[0][:1]
                  baseline_metrics = optimizer.profile_model(X_sample)
                  
                  results = {
                      'baseline': {
                          'size_mb': optimizer.original_size / 1024 / 1024,
                          'latency_ms': baseline_metrics['mean_ms']
                      },
                      'optimizations': []
                  }
                  
                  # Try different optimizations
                  optimizations = [
                      ('dynamic_quant', lambda: optimizer.quantize_dynamic()),
                      ('fp16_quant', lambda: optimizer.quantize_fp16()),
                      ('int8_quant', lambda: optimizer.quantize_int8(representative_dataset))
                  ]
                  
                  for name, optimize_fn in optimizations:
                      try:
                          logger.info(f"\nTrying {name}...")
                          
                          # Optimize
                          model_path = optimize_fn()
                          
                          # Benchmark
                          metrics = optimizer.benchmark_tflite(model_path, X_sample)
                          
                          # Validate accuracy
                          accuracy = optimizer.validate_accuracy(model_path, validation_data)
                          
                          # Get size
                          size = os.path.getsize(model_path)
                          
                          opt_result = {
                              'name': name,
                              'model_path': model_path,
                              'size_kb': size / 1024,
                              'latency_ms': metrics['mean_ms'],
                              'accuracy': accuracy,
                              'meets_latency': metrics['mean_ms'] <= target_latency_ms,
                              'meets_accuracy': accuracy >= min_accuracy
                          }
                          
                          results['optimizations'].append(opt_result)
                          
                          logger.info(f"  Size: {opt_result['size_kb']:.2f} KB")
                          logger.info(f"  Latency: {opt_result['latency_ms']:.2f} ms")
                          logger.info(f"  Accuracy: {opt_result['accuracy']*100:.2f}%")
                          
                      except Exception as e:
                          logger.error(f"  Failed: {e}")
                  
                  # Select best optimization
                  valid_opts = [
                      o for o in results['optimizations']
                      if o['meets_latency'] and o['meets_accuracy']
                  ]
                  
                  if valid_opts:
                      best = min(valid_opts, key=lambda x: x['latency_ms'])
                      results['recommended'] = best
                      logger.info(f"\nRecommended: {best['name']}")
                  else:
                      logger.warning("No optimization meets all requirements")
                  
                  return results
              
              # Usage
              if __name__ == '__main__':

              ### Device Telemetry Agent
              
              ```python
              # device/telemetry_agent.py
              import json
              import time
              import psutil
              import platform
              from datetime import datetime
              from azure.iot.device import IoTHubDeviceClient, Message
              
              class TelemetryAgent:
                  def __init__(self, connection_string: str, device_id: str):
                      self.client = IoTHubDeviceClient.create_from_connection_string(
                          connection_string
                      )
                      self.device_id = device_id
                      self.client.connect()
                  
                  def collect_system_metrics(self) -> dict:
                      """Collect system-level metrics"""
                      return {
                          'cpu_percent': psutil.cpu_percent(interval=1),
                          'memory_percent': psutil.virtual_memory().percent,
                          'disk_percent': psutil.disk_usage('/').percent,
                          'boot_time': psutil.boot_time(),
                          'network_io': {
                              'bytes_sent': psutil.net_io_counters().bytes_sent,
                              'bytes_recv': psutil.net_io_counters().bytes_recv
                          }
                      }
                  
                  def collect_device_metrics(self) -> dict:
                      """Collect device-specific metrics"""
                      # Add your device-specific metrics here
                      return {
                          'temperature': self._read_temperature(),
                          'uptime': time.time() - psutil.boot_time(),
                          'firmware_version': self._get_firmware_version(),
                          'connection_quality': self._measure_connection_quality()
                      }
                  
                  def _read_temperature(self) -> float:
                      # Implementation depends on hardware
                      try:
                          with open('/sys/class/thermal/thermal_zone0/temp', 'r') as f:
                              return float(f.read().strip()) / 1000
                      except:
                          return 0.0
                  
                  def _get_firmware_version(self) -> str:
                      try:
                          with open('/etc/firmware-version', 'r') as f:
                              return f.read().strip()
                      except:
                          return 'unknown'
                  
                  def _measure_connection_quality(self) -> dict:
                      import subprocess
                      try:
                          result = subprocess.run(
                              ['ping', '-c', '3', '8.8.8.8'],
                              capture_output=True,
                              text=True
                          )
                          # Parse ping output for latency and packet loss
                          return {'latency_ms': 20, 'packet_loss': 0}
                      except:
                          return {'latency_ms': -1, 'packet_loss': 100}
                  
                  def send_telemetry(self):
                      """Send telemetry to IoT Hub"""
                      telemetry = {
                          'device_id': self.device_id,
                          'timestamp': datetime.utcnow().isoformat(),
                          'system': self.collect_system_metrics(),
                          'device': self.collect_device_metrics()
                      }
                      
                      message = Message(json.dumps(telemetry))
                      message.content_encoding = 'utf-8'
                      message.content_type = 'application/json'
                      
                      self.client.send_message(message)
                      print(f"Telemetry sent: {telemetry}")
                  
                  def run(self, interval: int = 60):
                      """Run telemetry collection loop"""
                      while True:
                          try:
                              self.send_telemetry()
                          except Exception as e:
                              print(f"Error sending telemetry: {e}")
                          
                          time.sleep(interval)
              
              # Usage
              if __name__ == '__main__':
                  import os
                  agent = TelemetryAgent(
                      connection_string=os.getenv('IOTHUB_CONNECTION_STRING'),
                      device_id='device-001'
                  )
                  agent.run(interval=60)
              ```
              

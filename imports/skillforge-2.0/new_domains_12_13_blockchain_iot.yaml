              ## TinyML Gesture Recognition for Arduino
              
              ### Model Architecture
              
              ```python
              # tinyml/train_gesture_model.py
              import tensorflow as tf
              import numpy as np
              import os
              
              def create_tiny_gesture_model(input_shape=(100, 3), num_classes=4):
                  """Create ultra-small gesture recognition model"""
                  
                  model = tf.keras.Sequential([
                      # Input: 100 time steps, 3 axes (accel x, y, z)
                      tf.keras.layers.Input(shape=input_shape),
                      
                      # Depthwise separable convolutions for efficiency
                      tf.keras.layers.Conv1D(16, 3, activation='relu', padding='same'),
                      tf.keras.layers.MaxPooling1D(2),
                      
                      tf.keras.layers.SeparableConv1D(32, 3, activation='relu', padding='same'),
                      tf.keras.layers.MaxPooling1D(2),
                      
                      tf.keras.layers.SeparableConv1D(64, 3, activation='relu', padding='same'),
                      tf.keras.layers.GlobalAveragePooling1D(),
                      
                      # Classification head
                      tf.keras.layers.Dense(32, activation='relu'),
                      tf.keras.layers.Dropout(0.3),
                      tf.keras.layers.Dense(num_classes, activation='softmax')
                  ])
                  
                  return model
              
              def train_and_convert(
                  X_train, y_train,
                  X_val, y_val,
                  num_classes=4,
                  epochs=50
              ):
                  """Train model and convert for microcontroller"""
                  
                  # Create model
                  model = create_tiny_gesture_model(num_classes=num_classes)
                  
                  model.compile(
                      optimizer='adam',
                      loss='sparse_categorical_crossentropy',
                      metrics=['accuracy']
                  )
                  
                  model.summary()
                  
                  # Train
                  model.fit(
                      X_train, y_train,
                      validation_data=(X_val, y_val),
                      epochs=epochs,
                      batch_size=32,
                      callbacks=[
                          tf.keras.callbacks.EarlyStopping(patience=10, restore_best_weights=True)
                      ]
                  )
                  
                  # Evaluate
                  loss, accuracy = model.evaluate(X_val, y_val)
                  print(f"Validation accuracy: {accuracy*100:.2f}%")
                  
                  # Convert to TFLite with quantization
                  converter = tf.lite.TFLiteConverter.from_keras_model(model)
                  converter.optimizations = [tf.lite.Optimize.DEFAULT]
                  
                  # Representative dataset for quantization
                  def representative_dataset():
                      for i in range(min(100, len(X_train))):
                          yield [X_train[i:i+1].astype(np.float32)]
                  
                  converter.representative_dataset = representative_dataset
                  converter.target_spec.supported_ops = [
                      tf.lite.OpsSet.TFLITE_BUILTINS_INT8
                  ]
                  converter.inference_input_type = tf.int8
                  converter.inference_output_type = tf.int8
                  
                  tflite_model = converter.convert()
                  
                  # Save
                  model_path = 'gesture_model.tflite'
                  with open(model_path, 'wb') as f:
                      f.write(tflite_model)
                  
                  size = os.path.getsize(model_path)
                  print(f"Model size: {size} bytes ({size/1024:.2f} KB)")
                  
                  # Convert to C array for Arduino
                  convert_to_c_array(tflite_model, 'gesture_model.h')
                  
                  return model, tflite_model
              
              def convert_to_c_array(tflite_model, output_file):
                  """Convert TFLite model to C header file"""
                  
                  with open(output_file, 'w') as f:
                      f.write('// Auto-generated model file\n')
                      f.write('#ifndef GESTURE_MODEL_H\n')
                      f.write('#define GESTURE_MODEL_H\n\n')
                      f.write('const unsigned char gesture_model_tflite[] = {\n')
                      
                      hex_array = [f'0x{b:02x}' for b in tflite_model]
                      for i in range(0, len(hex_array), 12):
                          line = ', '.join(hex_array[i:i+12])
                          f.write(f'  {line},\n')
                      
                      f.write('};\n\n')
                      f.write(f'const int gesture_model_tflite_len = {len(tflite_model)};\n\n')
                      f.write('#endif  // GESTURE_MODEL_H\n')
                  
                  print(f"C header saved to {output_file}")
              
              # Generate training data (example)
              def generate_synthetic_data(num_samples=1000, num_classes=4):
                  """Generate synthetic accelerometer data for gestures"""
                  
                  X = []
                  y = []
                  
                  for _ in range(num_samples):
                      gesture_class = np.random.randint(0, num_classes)
                      
                      # Generate different patterns for each gesture
                      if gesture_class == 0:  # Up
                          data = np.random.randn(100, 3) * 0.1
                          data[:, 2] += np.sin(np.linspace(0, np.pi, 100)) * 2
                      elif gesture_class == 1:  # Down
                          data = np.random.randn(100, 3) * 0.1
                          data[:, 2] -= np.sin(np.linspace(0, np.pi, 100)) * 2
                      elif gesture_class == 2:  # Left
                          data = np.random.randn(100, 3) * 0.1
                          data[:, 0] -= np.sin(np.linspace(0, np.pi, 100)) * 2
                      else:  # Right
                          data = np.random.randn(100, 3) * 0.1
                          data[:, 0] += np.sin(np.linspace(0, np.pi, 100)) * 2
                      
                      X.append(data)
                      y.append(gesture_class)
                  
                  return np.array(X), np.array(y)
              
              if __name__ == '__main__':
                  # Generate data
                  X_train, y_train = generate_synthetic_data(5000)
                  X_val, y_val = generate_synthetic_data(1000)
                  
                  # Train and convert
                  model, tflite_model = train_and_convert(
                      X_train, y_train,
                      X_val, y_val,
                      num_classes=4
                  )
              ```
              
              ### Arduino Firmware
              

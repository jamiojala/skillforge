              ### Secure Boot Setup
              
              ```bash
              #!/bin/bash
              # secure-boot/setup_secure_boot.sh
              
              # Generate signing keys
              openssl genrsa -f4 -out u-boot-spl-sign.key 2048
              openssl req -batch -new -x509 -key u-boot-spl-sign.key -out u-boot-spl-sign.crt
              
              # Build U-Boot with secure boot
              make menuconfig
              # Enable: CONFIG_SECURE_BOOT, CONFIG_FIT_SIGNATURE
              
              # Sign U-Boot image
              mkimage -f u-boot.its -k u-boot-spl-sign.key -r u-boot-signed.itb
              
              # Program secure boot keys to eFUSE (one-time operation!)
              # WARNING: This permanently enables secure boot
              fuse prog -y 0 3 0x00000001  # Enable secure boot
              ```
              
              ### Disk Encryption
              
              ```python
              # security/disk_encryption.py
              import subprocess
              import os
              from cryptography.fernet import Fernet
              
              class DiskEncryption:
                  def __init__(self, device: str = '/dev/mmcblk0p3'):
                      self.device = device
                      self.mapper_name = 'encrypted-data'
                  
                  def setup_encryption(self, passphrase: str):
                      """Setup LUKS encryption on data partition"""
                      
                      # Check if already encrypted
                      result = subprocess.run(
                          ['cryptsetup', 'isLuks', self.device],
                          capture_output=True
                      )
                      
                      if result.returncode == 0:
                          print("Device already encrypted")
                          return
                      
                      # Format with LUKS
                      subprocess.run([
                          'cryptsetup', '-y', '-v', 'luksFormat',
                          self.device, '--key-file', '-'
                      ], input=passphrase.encode(), check=True)
                      
                      # Open encrypted device
                      subprocess.run([
                          'cryptsetup', 'open',
                          self.device, self.mapper_name,
                          '--key-file', '-'
                      ], input=passphrase.encode(), check=True)
                      
                      # Create filesystem
                      subprocess.run([
                          'mkfs.ext4', f'/dev/mapper/{self.mapper_name}'
                      ], check=True)
                      
                      print(f"Encryption setup complete: /dev/mapper/{self.mapper_name}")
                  
                  def mount_encrypted(self, passphrase: str, mount_point: str = '/encrypted'):
                      """Mount encrypted partition"""
                      
                      # Open if not already open
                      if not os.path.exists(f'/dev/mapper/{self.mapper_name}'):
                          subprocess.run([
                              'cryptsetup', 'open',
                              self.device, self.mapper_name,
                              '--key-file', '-'
                          ], input=passphrase.encode(), check=True)
                      
                      # Create mount point
                      os.makedirs(mount_point, exist_ok=True)
                      
                      # Mount
                      subprocess.run([
                          'mount', f'/dev/mapper/{self.mapper_name}', mount_point
                      ], check=True)
                      
                      print(f"Mounted at {mount_point}")
                  
                  def unmount(self, mount_point: str = '/encrypted'):
                      """Unmount and close encrypted partition"""
                      
                      # Unmount
                      subprocess.run(['umount', mount_point], check=False)
                      
                      # Close
                      subprocess.run([
                          'cryptsetup', 'close', self.mapper_name
                      ], check=True)
                      
                      print("Encrypted partition unmounted")
              
              # Usage
              if __name__ == '__main__':
                  import getpass
                  
                  encryption = DiskEncryption()
                  
                  # Get passphrase from user (or TPM in production)
                  passphrase = getpass.getpass("Enter encryption passphrase: ")
                  
                  # Setup (first time only)
                  # encryption.setup_encryption(passphrase)
                  
                  # Mount
                  encryption.mount_encrypted(passphrase)
              ```
              
              ### Application-Level Encryption
              
              ```python
              # security/app_encryption.py
              from cryptography.fernet import Fernet
              from cryptography.hazmat.primitives import hashes
              from cryptography.hazmat.primitives.kdf.pbkdf2 import PBKDF2HMAC
              import base64
              import os
              import json
              
              class AppEncryption:
                  def __init__(self, key_file: str = '/opt/secure/app.key'):
                      self.key_file = key_file
                      self.key = self._load_or_generate_key()
                      self.cipher = Fernet(self.key)
                  
                  def _load_or_generate_key(self) -> bytes:
                      """Load existing key or generate new one"""
                      
                      if os.path.exists(self.key_file):
                          with open(self.key_file, 'rb') as f:
                              return f.read()
                      
                      # Generate new key
                      key = Fernet.generate_key()
                      
                      # Save with restricted permissions
                      os.makedirs(os.path.dirname(self.key_file), exist_ok=True)
                      with open(self.key_file, 'wb') as f:
                          f.write(key)
                      os.chmod(self.key_file, 0o600)
                      
                      return key
                  
                  def encrypt(self, data: str) -> str:
                      """Encrypt string data"""
                      return self.cipher.encrypt(data.encode()).decode()
                  
                  def decrypt(self, encrypted_data: str) -> str:
                      """Decrypt string data"""
                      return self.cipher.decrypt(encrypted_data.encode()).decode()
                  
                  def encrypt_dict(self, data: dict) -> str:
                      """Encrypt dictionary"""
                      json_str = json.dumps(data)
                      return self.encrypt(json_str)
                  
                  def decrypt_dict(self, encrypted_data: str) -> dict:
                      """Decrypt to dictionary"""
                      json_str = self.decrypt(encrypted_data)
                      return json.loads(json_str)
                  
                  def encrypt_file(self, input_path: str, output_path: str):
                      """Encrypt file"""
                      with open(input_path, 'rb') as f:
                          data = f.read()
                      
                      encrypted = self.cipher.encrypt(data)
                      
                      with open(output_path, 'wb') as f:
                          f.write(encrypted)
                  
                  def decrypt_file(self, input_path: str, output_path: str):
                      """Decrypt file"""
                      with open(input_path, 'rb') as f:
                          encrypted = f.read()
                      
                      data = self.cipher.decrypt(encrypted)
                      
                      with open(output_path, 'wb') as f:
                          f.write(data)
              
              # Usage
              if __name__ == '__main__':
                  crypto = AppEncryption()
                  
                  # Encrypt sensitive configuration
                  config = {
                      'api_key': 'secret-api-key-123',
                      'database_password': 'db-password-456'
                  }
                  
                  encrypted = crypto.encrypt_dict(config)
                  print(f"Encrypted: {encrypted}")
                  
                  decrypted = crypto.decrypt_dict(encrypted)
                  print(f"Decrypted: {decrypted}")
              ```
              
              ### SSH Hardening
              
              ```bash
              #!/bin/bash
              # ssh/harden_ssh.sh
              
              SSH_CONFIG="/etc/ssh/sshd_config"
              
              # Backup original
              cp $SSH_CONFIG ${SSH_CONFIG}.bak
              
              # Apply hardening
              cat >> $SSH_CONFIG << 'EOF'
              
              # Disable root login
              PermitRootLogin no
              
              # Use key authentication only
              PasswordAuthentication no
              PubkeyAuthentication yes
              
              # Limit authentication attempts
              MaxAuthTries 3
              
              # Disable empty passwords
              PermitEmptyPasswords no
              
              # Set idle timeout
              ClientAliveInterval 300
              ClientAliveCountMax 2
              
              # Limit users
              AllowUsers device-admin
              
              # Use secure algorithms only
              Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com
              MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
              KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org
              
              # Disable forwarding (if not needed)
              AllowTcpForwarding no
              X11Forwarding no
              
              # Log level
              LogLevel VERBOSE
              EOF
              
              # Restart SSH
              systemctl restart sshd
              
              echo "SSH hardening applied"
              ```
              
              ### Firewall Configuration
              
              ```bash
              #!/bin/bash
              # firewall/setup_firewall.sh
              
              # Flush existing rules
              iptables -F
              iptables -X
              
              # Default policy: drop
              iptables -P INPUT DROP
              iptables -P FORWARD DROP
              iptables -P OUTPUT ACCEPT
              
              # Allow loopback
              iptables -A INPUT -i lo -j ACCEPT
              
              # Allow established connections
              iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
              
              # Allow SSH (restrict to specific IP in production)
              iptables -A INPUT -p tcp --dport 22 -j ACCEPT
              
              # Allow MQTT (if using local broker)
              iptables -A INPUT -p tcp --dport 1883 -s 127.0.0.1 -j ACCEPT
              
              # Allow HTTPS outbound
              iptables -A OUTPUT -p tcp --dport 443 -j ACCEPT
              
              # Log dropped packets
              iptables -A INPUT -j LOG --log-prefix "IPTABLES DROP: "
              
              # Save rules
              iptables-save > /etc/iptables/rules.v4
              
              echo "Firewall configured"
              ```
              
              ### Intrusion Detection
              
              ```python
              # security/intrusion_detection.py
              import subprocess
              import re
              import json
              from datetime import datetime
              from collections import defaultdict
              import time
              
              class IntrusionDetector:
                  def __init__(self):
                      self.failed_attempts = defaultdict(list)
                      self.suspicious_patterns = [
                          r'Failed password',
                          r'Invalid user',
                          r'Connection closed by authenticating user',
                          r'authentication failure',
                      ]
                      self.thresholds = {
                          'failed_logins': 5,  # per 5 minutes
                          'new_users': 3,      # per hour
                      }
                  
                  def monitor_auth_log(self):
                      """Monitor authentication log for suspicious activity"""
                      
                      process = subprocess.Popen(
                          ['tail', '-f', '/var/log/auth.log'],
                          stdout=subprocess.PIPE,
                          stderr=subprocess.PIPE,
                          text=True
                      )
                      
                      for line in process.stdout:
                          self._analyze_log_line(line.strip())
                  
                  def _analyze_log_line(self, line: str):
                      """Analyze a single log line"""
                      
                      for pattern in self.suspicious_patterns:
                          if re.search(pattern, line):
                              self._handle_suspicious_activity(line, pattern)
                  
                  def _handle_suspicious_activity(self, line: str, pattern: str):
                      """Handle detected suspicious activity"""
                      
                      timestamp = datetime.now()
                      
                      # Extract IP if present
                      ip_match = re.search(r'from\s+(\d+\.\d+\.\d+\.\d+)', line)
                      ip = ip_match.group(1) if ip_match else 'unknown'
                      
                      # Track failed attempts
                      if 'Failed password' in pattern or 'Invalid user' in pattern:
                          self.failed_attempts[ip].append(timestamp)
                          
                          # Clean old entries
                          cutoff = timestamp.timestamp() - 300  # 5 minutes
                          self.failed_attempts[ip] = [
                              t for t in self.failed_attempts[ip]
                              if t.timestamp() > cutoff
                          ]
                          
                          # Check threshold
                          if len(self.failed_attempts[ip]) >= self.thresholds['failed_logins']:
                              self._trigger_alert('brute_force', ip, len(self.failed_attempts[ip]))
                              self._block_ip(ip)
                  
                  def _block_ip(self, ip: str):
                      """Block IP address"""
                      
                      subprocess.run([
                          'iptables', '-A', 'INPUT', '-s', ip, '-j', 'DROP'
                      ], check=True)
                      
                      print(f"Blocked IP: {ip}")
                  
                  def _trigger_alert(self, alert_type: str, source: str, details: any):
                      """Send security alert"""
                      
                      alert = {
                          'timestamp': datetime.now().isoformat(),
                          'type': alert_type,
                          'source': source,
                          'details': details,
                          'severity': 'high' if alert_type == 'brute_force' else 'medium'
                      }
                      
                      # Send to monitoring system
                      print(f"SECURITY ALERT: {json.dumps(alert)}")
                      
                      # In production: send to SIEM, PagerDuty, etc.
                      # requests.post(ALERT_ENDPOINT, json=alert)
                  
                  def check_file_integrity(self):
                      """Check critical file integrity"""
                      
                      critical_files = [
                          '/etc/passwd',
                          '/etc/shadow',
                          '/etc/ssh/sshd_config',
                          '/bin/login',
                      ]
                      
                      # In production: compare against known good hashes
                      for file_path in critical_files:
                          if os.path.exists(file_path):
                              result = subprocess.run(
                                  ['sha256sum', file_path],
                                  capture_output=True,
                                  text=True
                              )
                              current_hash = result.stdout.split()[0]
                              print(f"{file_path}: {current_hash}")
              
              # Usage
              if __name__ == '__main__':
                  detector = IntrusionDetector()
                  
                  # Start monitoring
                  print("Starting intrusion detection...")
                  detector.monitor_auth_log()
              ```
              

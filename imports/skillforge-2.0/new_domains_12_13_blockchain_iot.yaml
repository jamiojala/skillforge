              ### Python MQTT Client
              
              ```python
              # mqtt/iot_client.py
              import paho.mqtt.client as mqtt
              import json
              import ssl
              import time
              import threading
              from typing import Callable, Dict
              
              class IoTMQTTClient:
                  def __init__(
                      self,
                      client_id: str,
                      broker_host: str = 'localhost',
                      broker_port: int = 8883,
                      username: str = None,
                      password: str = None,
                      ca_cert: str = None,
                      client_cert: str = None,
                      client_key: str = None
                  ):
                      self.client_id = client_id
                      self.broker_host = broker_host
                      self.broker_port = broker_port
                      
                      # Create client
                      self.client = mqtt.Client(client_id=client_id, protocol=mqtt.MQTTv5)
                      
                      # Set callbacks
                      self.client.on_connect = self._on_connect
                      self.client.on_disconnect = self._on_disconnect
                      self.client.on_message = self._on_message
                      self.client.on_publish = self._on_publish
                      
                      # Authentication
                      if username and password:
                          self.client.username_pw_set(username, password)
                      
                      # TLS
                      if ca_cert:
                          self.client.tls_set(
                              ca_certs=ca_cert,
                              certfile=client_cert,
                              keyfile=client_key,
                              tls_version=ssl.PROTOCOL_TLSv1_2
                          )
                      
                      # Last will
                      self.client.will_set(
                          topic=f'factory/site/001/devices/{client_id}/status',
                          payload=json.dumps({'status': 'offline', 'timestamp': time.time()}),
                          qos=1,
                          retain=True
                      )
                      
                      self.message_handlers: Dict[str, Callable] = {}
                      self.connected = False
                  
                  def _on_connect(self, client, userdata, flags, rc, properties=None):
                      if rc == 0:
                          self.connected = True
                          print(f"Connected to MQTT broker: {self.broker_host}")
                          
                          # Publish online status
                          self.publish(
                              f'factory/site/001/devices/{self.client_id}/status',
                              {'status': 'online', 'timestamp': time.time()},
                              qos=1,
                              retain=True
                          )
                      else:
                          print(f"Connection failed with code: {rc}")
                  
                  def _on_disconnect(self, client, userdata, rc):
                      self.connected = False
                      print(f"Disconnected from broker: {rc}")
                  
                  def _on_message(self, client, userdata, msg):
                      try:
                          payload = json.loads(msg.payload.decode())
                          print(f"Received on {msg.topic}: {payload}")
                          
                          # Call registered handler
                          if msg.topic in self.message_handlers:
                              self.message_handlers[msg.topic](payload)
                      except Exception as e:
                          print(f"Error processing message: {e}")
                  
                  def _on_publish(self, client, userdata, mid):
                      print(f"Message {mid} published")
                  
                  def connect(self):
                      """Connect to MQTT broker"""
                      self.client.connect(self.broker_host, self.broker_port, keepalive=60)
                      self.client.loop_start()
                  
                  def disconnect(self):
                      """Disconnect from broker"""
                      self.client.loop_stop()
                      self.client.disconnect()
                  
                  def subscribe(self, topic: str, qos: int = 1, handler: Callable = None):
                      """Subscribe to topic"""
                      self.client.subscribe(topic, qos=qos)
                      if handler:
                          self.message_handlers[topic] = handler
                      print(f"Subscribed to: {topic}")
                  
                  def publish(
                      self,
                      topic: str,
                      payload: dict,
                      qos: int = 1,
                      retain: bool = False
                  ):
                      """Publish message"""
                      message = json.dumps(payload)
                      result = self.client.publish(topic, message, qos=qos, retain=retain)
                      return result.mid
                  
                  def publish_telemetry(self, data: dict):
                      """Publish telemetry data"""
                      topic = f'factory/site/001/devices/{self.client_id}/telemetry'
                      return self.publish(topic, data, qos=1)
                  
                  def publish_event(self, event_type: str, data: dict):
                      """Publish device event"""
                      topic = f'factory/site/001/devices/{self.client_id}/events/{event_type}'
                      payload = {
                          'timestamp': time.time(),
                          'event': event_type,
                          'data': data
                      }
                      return self.publish(topic, payload, qos=2)
              
              # Usage
              if __name__ == '__main__':
                  import os
                  
                  # Create client
                  client = IoTMQTTClient(
                      client_id='device-001',
                      broker_host='mqtt.example.com',
                      broker_port=8883,
                      username='device-001',
                      password=os.getenv('MQTT_PASSWORD'),
                      ca_cert='/opt/certs/ca.crt'
                  )
                  
                  # Define command handler
                  def handle_config_update(payload):
                      print(f"Config update received: {payload}")
                      # Apply configuration
                  
                  # Connect and subscribe
                  client.connect()
                  client.subscribe(
                      f'factory/site/001/devices/device-001/config',
                      handler=handle_config_update
                  )
                  
                  # Publish telemetry
                  while True:
                      telemetry = {
                          'temperature': 25.5,
                          'pressure': 1013.25,
                          'timestamp': time.time()
                      }
                      client.publish_telemetry(telemetry)
                      time.sleep(60)
              ```
              
              ### Async MQTT Client
              
              ```python
              # mqtt/async_client.py
              import asyncio
              import aiomqtt
              import json
              
              class AsyncMQTTClient:
                  def __init__(self, broker_host: str, broker_port: int = 1883):
                      self.broker_host = broker_host
                      self.broker_port = broker_port
                      self.client = None
                  
                  async def connect(self):
                      self.client = aiomqtt.Client(
                          hostname=self.broker_host,
                          port=self.broker_port
                      )
                      await self.client.connect()
                  
                  async def publish(self, topic: str, payload: dict, qos: int = 1):
                      message = json.dumps(payload)
                      await self.client.publish(topic, message, qos=qos)
                  
                  async def subscribe(self, topic: str):
                      await self.client.subscribe(topic)
                      async for message in self.client.messages:
                          yield json.loads(message.payload.decode())
                  
                  async def disconnect(self):
                      await self.client.disconnect()
              
              # Usage
              async def main():
                  client = AsyncMQTTClient('localhost')
                  await client.connect()
                  
                  # Publish
                  await client.publish('test/topic', {'value': 42})
                  
                  # Subscribe
                  async for message in client.subscribe('test/#'):
                      print(f"Received: {message}")
              
              if __name__ == '__main__':
                  asyncio.run(main())
              ```
              
              ### MQTT Load Testing
              
              ```python
              # testing/mqtt_load_test.py
              import paho.mqtt.client as mqtt
              import threading
              import time
              import json
              import statistics
              from concurrent.futures import ThreadPoolExecutor
              
              class MQTTLoadTest:
                  def __init__(
                      self,
                      broker_host: str,
                      num_clients: int = 100,
                      messages_per_client: int = 1000
                  ):
                      self.broker_host = broker_host
                      self.num_clients = num_clients
                      self.messages_per_client = messages_per_client
                      self.latencies = []
                      self.errors = 0
                  
                  def _create_client(self, client_id: int):
                      client = mqtt.Client(client_id=f'load-test-{client_id}')
                      client.connect(self.broker_host, 1883)
                      return client
                  
                  def _publish_messages(self, client_id: int):
                      client = self._create_client(client_id)
                      
                      for i in range(self.messages_per_client):
                          topic = f'loadtest/client{client_id}/msg{i}'
                          payload = json.dumps({
                              'client_id': client_id,
                              'message_id': i,
                              'timestamp': time.time()
                          })
                          
                          start = time.time()
                          result = client.publish(topic, payload, qos=1)
                          
                          if result.rc == 0:
                              latency = (time.time() - start) * 1000
                              self.latencies.append(latency)
                          else:
                              self.errors += 1
                      
                      client.disconnect()
                  
                  def run(self):
                      print(f"Starting load test: {self.num_clients} clients, {self.messages_per_client} messages each")
                      
                      start_time = time.time()
                      
                      with ThreadPoolExecutor(max_workers=self.num_clients) as executor:
                          executor.map(self._publish_messages, range(self.num_clients))
                      
                      duration = time.time() - start_time
                      total_messages = self.num_clients * self.messages_per_client
                      
                      print(f"\nResults:")
                      print(f"Total messages: {total_messages}")
                      print(f"Duration: {duration:.2f}s")
                      print(f"Throughput: {total_messages/duration:.2f} msg/s")
                      print(f"Errors: {self.errors}")
                      
                      if self.latencies:
                          print(f"\nLatency (ms):")
                          print(f"  Min: {min(self.latencies):.2f}")
                          print(f"  Max: {max(self.latencies):.2f}")
                          print(f"  Avg: {statistics.mean(self.latencies):.2f}")
                          print(f"  P95: {statistics.quantiles(self.latencies, n=20)[18]:.2f}")
                          print(f"  P99: {statistics.quantiles(self.latencies, n=100)[98]:.2f}")
              
              # Usage
              if __name__ == '__main__':
                  test = MQTTLoadTest('localhost', num_clients=50, messages_per_client=100)
                  test.run()
              ```

              ## Complete ERC-20 Test Suite
              
              ```solidity
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "forge-std/Test.sol";
              import "../src/Token.sol";
              
              contract TokenTest is Test {
                  Token token;
                  address owner;
                  address alice;
                  address bob;
                  
                  event Transfer(address indexed from, address indexed to, uint256 value);
                  event Approval(address indexed owner, address indexed spender, uint256 value);
                  
                  function setUp() public {
                      owner = address(this);
                      alice = makeAddr("alice");
                      bob = makeAddr("bob");
                      
                      token = new Token("Test Token", "TEST", 18, 1000000 * 1e18);
                  }
                  
                  // ============ UNIT TESTS ============
                  
                  function test_InitialState() public {
                      assertEq(token.name(), "Test Token");
                      assertEq(token.symbol(), "TEST");
                      assertEq(token.decimals(), 18);
                      assertEq(token.totalSupply(), 1000000 * 1e18);
                      assertEq(token.balanceOf(owner), 1000000 * 1e18);
                  }
                  
                  function test_Transfer() public {
                      uint256 amount = 1000 * 1e18;
                      
                      vm.expectEmit(true, true, false, true);
                      emit Transfer(owner, alice, amount);
                      
                      bool success = token.transfer(alice, amount);
                      assertTrue(success);
                      assertEq(token.balanceOf(alice), amount);
                      assertEq(token.balanceOf(owner), 1000000 * 1e18 - amount);
                  }
                  
                  function test_Transfer_InsufficientBalance() public {
                      vm.prank(alice);
                      vm.expectRevert("ERC20: transfer amount exceeds balance");
                      token.transfer(bob, 1);
                  }
                  
                  function test_Approve() public {
                      uint256 amount = 500 * 1e18;
                      
                      vm.expectEmit(true, true, false, true);
                      emit Approval(owner, alice, amount);
                      
                      bool success = token.approve(alice, amount);
                      assertTrue(success);
                      assertEq(token.allowance(owner, alice), amount);
                  }
                  
                  function test_TransferFrom() public {
                      uint256 amount = 500 * 1e18;
                      token.approve(alice, amount);
                      
                      vm.prank(alice);
                      bool success = token.transferFrom(owner, bob, amount);
                      
                      assertTrue(success);
                      assertEq(token.balanceOf(bob), amount);
                      assertEq(token.allowance(owner, alice), 0);
                  }
                  
                  function test_TransferFrom_ExceedsAllowance() public {
                      token.approve(alice, 100 * 1e18);
                      
                      vm.prank(alice);
                      vm.expectRevert("ERC20: transfer amount exceeds allowance");
                      token.transferFrom(owner, bob, 200 * 1e18);
                  }
                  
                  // ============ FUZZ TESTS ============
                  
                  function testFuzz_Transfer(address to, uint256 amount) public {
                      vm.assume(to != address(0));
                      vm.assume(to != address(token));
                      amount = bound(amount, 0, token.balanceOf(owner));
                      
                      uint256 ownerBefore = token.balanceOf(owner);
                      
                      token.transfer(to, amount);
                      
                      assertEq(token.balanceOf(owner), ownerBefore - amount);
                      assertEq(token.balanceOf(to), amount);
                  }
                  
                  function testFuzz_ApproveAndTransferFrom(
                      address spender,
                      uint256 approveAmount,
                      uint256 transferAmount
                  ) public {
                      vm.assume(spender != address(0));
                      vm.assume(spender != address(token));
                      approveAmount = bound(approveAmount, 0, type(uint128).max);
                      transferAmount = bound(transferAmount, 0, approveAmount);
                      transferAmount = bound(transferAmount, 0, token.balanceOf(owner));
                      
                      token.approve(spender, approveAmount);
                      
                      vm.prank(spender);
                      token.transferFrom(owner, spender, transferAmount);
                      
                      assertEq(token.allowance(owner, spender), approveAmount - transferAmount);
                  }
                  
                  // ============ INVARIANT TESTS ============
                  
                  function invariant_TotalSupplyEqualsSumOfBalances() public {
                      uint256 total;
                      // Note: In real test, iterate over all holders
                      total = token.balanceOf(owner) + 
                              token.balanceOf(alice) + 
                              token.balanceOf(bob);
                      assertEq(total, token.totalSupply());
                  }
                  
                  // ============ GAS BENCHMARKS ============
                  
                  function testGas_Transfer() public {
                      token.transfer(alice, 1000 * 1e18);
                  }
                  
                  function testGas_Approve() public {
                      token.approve(alice, 1000 * 1e18);
                  }
                  
                  function testGas_TransferFrom() public {
                      token.approve(alice, 1000 * 1e18);
                      vm.prank(alice);
                      token.transferFrom(owner, bob, 500 * 1e18);
                  }
              }
              ```
              

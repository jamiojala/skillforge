              ### Python Kafka Producer (MQTT Bridge)
              
              ```python
              # streaming/mqtt_kafka_bridge.py
              import json
              import asyncio
              import aiomqtt
              from kafka import KafkaProducer
              import logging
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              class MQTTKafkaBridge:
                  def __init__(
                      self,
                      mqtt_host: str,
                      kafka_bootstrap: str,
                      topic_mapping: dict
                  ):
                      self.mqtt_host = mqtt_host
                      self.kafka_bootstrap = kafka_bootstrap
                      self.topic_mapping = topic_mapping
                      
                      # Initialize Kafka producer
                      self.producer = KafkaProducer(
                          bootstrap_servers=kafka_bootstrap,
                          value_serializer=lambda v: json.dumps(v).encode('utf-8'),
                          key_serializer=lambda k: k.encode('utf-8') if k else None,
                          acks='all',
                          retries=3,
                          linger_ms=10,
                          batch_size=16384
                      )
                  
                  async def run(self):
                      async with aiomqtt.Client(self.mqtt_host) as client:
                          # Subscribe to all mapped topics
                          for mqtt_topic in self.topic_mapping.keys():
                              await client.subscribe(mqtt_topic)
                              logger.info(f"Subscribed to: {mqtt_topic}")
                          
                          async for message in client.messages:
                              await self._handle_message(message)
                  
                  async def _handle_message(self, message):
                      try:
                          payload = json.loads(message.payload.decode())
                          mqtt_topic = message.topic.value
                          
                          # Map to Kafka topic
                          kafka_topic = self.topic_mapping.get(mqtt_topic)
                          if not kafka_topic:
                              logger.warning(f"No mapping for topic: {mqtt_topic}")
                              return
                          
                          # Enrich with metadata
                          enriched = {
                              'source_topic': mqtt_topic,
                              'timestamp': payload.get('timestamp', time.time()),
                              'data': payload
                          }
                          
                          # Send to Kafka
                          key = payload.get('device_id')
                          self.producer.send(kafka_topic, key=key, value=enriched)
                          
                          logger.debug(f"Forwarded to {kafka_topic}: {enriched}")
                          
                      except Exception as e:
                          logger.error(f"Error handling message: {e}")
                  
                  def close(self):
                      self.producer.flush()
                      self.producer.close()
              
              # Usage
              if __name__ == '__main__':
                  import time
                  
                  bridge = MQTTKafkaBridge(
                      mqtt_host='localhost',
                      kafka_bootstrap='localhost:9092',
                      topic_mapping={
                          'factory/+/devices/+/telemetry': 'iot-telemetry',
                          'factory/+/devices/+/events': 'iot-events',
                          'factory/+/alerts': 'iot-alerts'
                      }
                  )
                  
                  try:
                      asyncio.run(bridge.run())
                  except KeyboardInterrupt:
                      bridge.close()
              ```
              
              ### Apache Flink Processing Job
              
              ```python
              # streaming/flink_processor.py
              from pyflink.datastream import StreamExecutionEnvironment
              from pyflink.datastream.connectors.kafka import KafkaSource, KafkaOffsetsInitializer
              from pyflink.datastream.formats.json import JsonRowDeserializationSchema
              from pyflink.common.typeinfo import Types
              from pyflink.common.watermark_strategy import WatermarkStrategy
              from pyflink.datastream.window import TumblingEventTimeWindows, Time
              from pyflink.datastream.functions import AggregateFunction, ProcessWindowFunction
              import json
              
              class AverageAggregate(AggregateFunction):
                  def create_accumulator(self):
                      return (0.0, 0)  # (sum, count)
                  
                  def add(self, value, accumulator):
                      return (accumulator[0] + value['temperature'], accumulator[1] + 1)
                  
                  def get_result(self, accumulator):
                      return accumulator[0] / accumulator[1] if accumulator[1] > 0 else 0.0
                  
                  def merge(self, a, b):
                      return (a[0] + b[0], a[1] + b[1])
              
              class AlertProcessFunction(ProcessWindowFunction):
                  def process(self, key, context, averages):
                      avg_temp = next(iter(averages))
                      if avg_temp > 80:
                          alert = {
                              'device_id': key,
                              'window_start': context.window().start,
                              'window_end': context.window().end,
                              'avg_temperature': avg_temp,
                              'alert_type': 'HIGH_TEMPERATURE'
                          }
                          yield alert
              
              def create_flink_job():
                  env = StreamExecutionEnvironment.get_execution_environment()
                  env.set_parallelism(4)
                  
                  # Configure checkpointing
                  env.enable_checkpointing(60000)  # 1 minute
                  env.get_checkpoint_config().set_checkpointing_mode(
                      CheckpointingMode.EXACTLY_ONCE
                  )
                  
                  # Kafka source
                  source = KafkaSource.builder() \
                      .set_bootstrap_servers('localhost:9092') \
                      .set_topics('iot-telemetry') \
                      .set_group_id('flink-processor') \
                      .set_starting_offsets(KafkaOffsetsInitializer.latest()) \
                      .set_value_only_deserializer(
                          JsonRowDeserializationSchema.builder()
                              .type_info(Types.ROW([
                                  Types.STRING(),  # device_id
                                  Types.DOUBLE(),  # temperature
                                  Types.DOUBLE(),  # pressure
                                  Types.LONG()     # timestamp
                              ]))
                              .build()
                      ) \
                      .build()
                  
                  # Create stream
                  stream = env.from_source(
                      source,
                      WatermarkStrategy.for_bounded_out_of_orderness(
                          Duration.of_seconds(30)
                      ),
                      'Kafka Source'
                  )
                  
                  # Process: Calculate 5-minute average temperature per device
                  windowed = stream \
                      .key_by(lambda x: x[0]) \
                      .window(TumblingEventTimeWindows.of(Time.minutes(5))) \
                      .aggregate(
                          AverageAggregate(),
                          AlertProcessFunction()
                      )
                  
                  # Output alerts
                  windowed.print()
                  
                  # Or write to Kafka
                  # windowed.add_sink(KafkaSink.builder()...)
                  
                  env.execute('IoT Stream Processor')
              
              if __name__ == '__main__':
                  create_flink_job()
              ```
              

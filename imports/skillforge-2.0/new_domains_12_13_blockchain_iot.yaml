                  print("-" * 60)
                  
                  for detail in tensor_details:
                      shape = detail['shape']
                      dtype = detail['dtype']
                      
                      # Calculate size
                      size = np.prod(shape)
                      if dtype == np.int8:
                          bytes_per_element = 1
                      elif dtype == np.float32:
                          bytes_per_element = 4
                      elif dtype == np.int32:
                          bytes_per_element = 4
                      else:
                          bytes_per_element = 4
                      
                      memory = size * bytes_per_element
                      total_memory += memory
                      
                      print(f"{detail['name'][:40]:40} {shape} {memory:6} bytes")
                  
                  print("-" * 60)
                  print(f"Total memory: {total_memory} bytes ({total_memory/1024:.2f} KB)")
                  
                  return total_memory
              
              # Usage

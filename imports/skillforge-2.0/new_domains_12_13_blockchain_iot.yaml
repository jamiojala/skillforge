          - name: "Upgradeable Token Contract"
            user: "I need to create an ERC-20 token that can be upgraded later. What's the best approach?"
            ai_response: |
              ## Security Analysis
              For upgradeable tokens, we need to separate logic from storage using proxy patterns. The UUPS (Universal Upgradeable Proxy Standard) is recommended for gas efficiency.
              
              ## Recommended Pattern: UUPS Proxy
              
              ```solidity
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "@openzeppelin/contracts-upgradeable/token/ERC20/ERC20Upgradeable.sol";
              import "@openzeppelin/contracts-upgradeable/access/OwnableUpgradeable.sol";
              import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";
              
              contract MyToken is ERC20Upgradeable, OwnableUpgradeable, UUPSUpgradeable {
                  // Storage variables - NEVER change order in upgrades
                  uint256 public maxSupply;
                  mapping(address => bool) public blacklisted;
                  
                  /// @custom:oz-upgrades-unsafe-allow constructor
                  constructor() {
                      _disableInitializers();
                  }
                  
                  function initialize(
                      string memory name,
                      string memory symbol,
                      uint256 initialSupply,
                      uint256 _maxSupply,
                      address initialOwner
                  ) public initializer {
                      __ERC20_init(name, symbol);
                      __Ownable_init(initialOwner);
                      __UUPSUpgradeable_init();
                      
                      require(_maxSupply >= initialSupply, "Max supply too low");
                      maxSupply = _maxSupply;
                      _mint(initialOwner, initialSupply);
                  }
                  
                  function mint(address to, uint256 amount) public onlyOwner {
                      require(totalSupply() + amount <= maxSupply, "Exceeds max supply");
                      require(!blacklisted[to], "Address blacklisted");
                      _mint(to, amount);
                  }
                  
                  function _authorizeUpgrade(address newImplementation) internal override onlyOwner {}
              }
              ```
              
              ## Key Security Considerations
              
              1. **Storage Layout**: Never reorder or remove storage variables in upgrades
              2. **Initialization**: Use `initializer` modifier, not constructor
              3. **Access Control**: Only owner can authorize upgrades
              4. **Events**: Add events for transparency
              
              ## Deployment Script (Hardhat)
              
              ```javascript
              const { ethers, upgrades } = require("hardhat");
              
              async function main() {
                  const MyToken = await ethers.getContractFactory("MyToken");
                  const token = await upgrades.deployProxy(MyToken, [
                      "MyToken", "MTK", ethers.parseEther("1000000"), 
                      ethers.parseEther("10000000"), deployer.address
                  ]);
                  await token.waitForDeployment();
                  console.log("Token deployed to:", await token.getAddress());
              }
              ```
              
              ## Testing Recommendations
              - Test upgrade path with storage preservation
              - Verify access control on upgrade authorization
              - Test edge cases around max supply
            notes: "Demonstrates UUPS pattern with security-first approach, includes deployment and testing guidance"
          
          - name: "Access Control Implementation"
            user: "How should I implement role-based access control for a DeFi protocol with multiple admin levels?"
            ai_response: |
              ## Security Analysis
              Multi-level access control is critical for DeFi protocols. Use OpenZeppelin's AccessControl for granular permissions.
              
              ## Recommended Implementation
              
              ```solidity
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "@openzeppelin/contracts/access/AccessControl.sol";
              import "@openzeppelin/contracts/security/Pausable.sol";
              
              contract DeFiProtocol is AccessControl, Pausable {
                  // Role definitions
                  bytes32 public constant ADMIN_ROLE = keccak256("ADMIN_ROLE");
                  bytes32 public constant OPERATOR_ROLE = keccak256("OPERATOR_ROLE");
                  bytes32 public constant PAUSER_ROLE = keccak256("PAUSER_ROLE");
                  bytes32 public constant UPGRADER_ROLE = keccak256("UPGRADER_ROLE");
                  bytes32 public constant EMERGENCY_ROLE = keccak256("EMERGENCY_ROLE");
                  
                  // Role hierarchy: DEFAULT_ADMIN > ADMIN > others
                  constructor(address admin) {
                      _grantRole(DEFAULT_ADMIN_ROLE, admin);
                      _grantRole(ADMIN_ROLE, admin);
                      _setRoleAdmin(ADMIN_ROLE, DEFAULT_ADMIN_ROLE);
                      _setRoleAdmin(OPERATOR_ROLE, ADMIN_ROLE);
                      _setRoleAdmin(PAUSER_ROLE, ADMIN_ROLE);
                      _setRoleAdmin(UPGRADER_ROLE, ADMIN_ROLE);
                      _setRoleAdmin(EMERGENCY_ROLE, ADMIN_ROLE);
                  }
                  
                  // Example: Only operators can execute trades
                  function executeTrade(bytes calldata data) external onlyRole(OPERATOR_ROLE) whenNotPaused {
                      // Trade logic
                      emit TradeExecuted(msg.sender, data);
                  }
                  
                  // Example: Multiple roles can pause
                  function pause() external onlyRole(PAUSER_ROLE) {
                      _pause();
                  }
                  
                  // Example: Emergency withdrawal (timelock recommended in production)
                  function emergencyWithdraw(address token, uint256 amount) 
                      external 
                      onlyRole(EMERGENCY_ROLE) 
                      whenPaused 
                  {
                      // Emergency logic with timelock
                      emit EmergencyWithdrawal(msg.sender, token, amount);
                  }
                  
                  event TradeExecuted(address indexed operator, bytes data);
                  event EmergencyWithdrawal(address indexed caller, address token, uint256 amount);
              }
              ```
              
              ## Best Practices Applied
              
              1. **Role Hierarchy**: Clear inheritance of permissions
              2. **Granular Roles**: Separate concerns (operator vs pauser vs emergency)
              3. **Timelock Integration**: For critical operations in production
              4. **Event Logging**: All privileged actions logged
              
              ## Advanced: Timelock Integration
              
              ```solidity
              import "@openzeppelin/contracts/governance/TimelockController.sol";
              
              // Deploy TimelockController with 2-day delay
              // Critical operations go through timelock
              ```
              
              ## Testing Checklist
              - [ ] Verify role hierarchy
              - [ ] Test role revocation
              - [ ] Confirm unauthorized access reverts
              - [ ] Validate event emissions
            notes: "Shows comprehensive RBAC with role hierarchy and security considerations"
        

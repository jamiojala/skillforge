          - name: "Fork Testing"
            user: "How do I test my contract against real mainnet state?"
            ai_response: |
              ## Fork Testing Guide
              
              ### Setup
              
              ```solidity
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "forge-std/Test.sol";
              import "@openzeppelin/contracts/token/ERC20/IERC20.sol";
              
              contract ForkTest is Test {
                  // Mainnet addresses
                  address constant USDC = 0xA0b86a33E6441E6C7D3D4B4f47e0A2b3c4d5E6F7;
                  address constant AAVE_POOL = 0x7d2768dE32b0b80b7a3454c06BdAc94A69DDc7A9;
                  
                  uint256 mainnetFork;
                  
                  function setUp() public {
                      // Create fork at specific block
                      mainnetFork = vm.createFork("https://eth-mainnet.g.alchemy.com/v2/YOUR_KEY");
                      vm.selectFork(mainnetFork);
                      
                      // Or fork at specific block
                      // mainnetFork = vm.createForkAtBlock(RPC_URL, 18_000_000);
                  }
                  
                  function test_InteractWithRealUSDC() public {
                      IERC20 usdc = IERC20(USDC);
                      
                      // Impersonate a whale
                      address whale = 0x47ac0Fb4F2D84898e4D9E7b4DaB3C24507a6D503;
                      vm.startPrank(whale);
                      
                      uint256 whaleBalance = usdc.balanceOf(whale);
                      console.log("Whale USDC balance:", whaleBalance);
                      
                      // Transfer real USDC
                      usdc.transfer(address(this), 1000 * 1e6);
                      
                      vm.stopPrank();
                      
                      assertEq(usdc.balanceOf(address(this)), 1000 * 1e6);
                  }
                  
                  function test_AAVEInteraction() public {
                      // Test against real AAVE protocol
                      vm.selectFork(mainnetFork);
                      
                      // Your contract logic interacting with AAVE
                      // ...
                  }
                  
                  function testFork_Selection() public {
                      // Test multiple forks
                      uint256 polygonFork = vm.createFork("https://polygon-rpc.com");
                      
                      vm.selectFork(mainnetFork);
                      assertEq(vm.activeFork(), mainnetFork);
                      
                      vm.selectFork(polygonFork);
                      assertEq(vm.activeFork(), polygonFork);
                  }
              }
              ```
              
              ### Environment Setup
              
              ```bash
              # .env
              MAINNET_RPC=https://eth-mainnet.g.alchemy.com/v2/YOUR_KEY
              POLYGON_RPC=https://polygon-rpc.com
              
              # foundry.toml
              [rpc_endpoints]
              mainnet = "${MAINNET_RPC}"
              polygon = "${POLYGON_RPC}"
              ```
              
              ### Advanced: State Diff Testing
              
              ```solidity
              function test_StateChanges() public {
                  // Record state before
                  vm.record();
                  
                  // Execute operation
                  myContract.doSomething();
                  
                  // Get state changes
                  (bytes32[] memory reads, bytes32[] memory writes) = vm.accesses(address(myContract));
                  
                  // Assert expected state changes
                  assertEq(writes.length, 2); // Expect 2 storage writes
              }
              ```
              
              ### CI/CD Integration
              

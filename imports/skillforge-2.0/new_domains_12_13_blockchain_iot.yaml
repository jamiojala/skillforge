                      console.log(`Bridge: ${ethAmount} ETH to chain ${dstChainId}`);
                      
                      if (Number(ethAmount) > 100) {
                          await sendAlert(`Large bridge transfer: ${ethAmount} ETH`);
                      }
                  });
                  
                  // Monitor daily limit
                  const dailyLimit = await bridge.dailyLimit();
                  const dailyTransferred = await bridge.dailyTransferred();
                  const usage = (dailyTransferred * 100n) / dailyLimit;
                  
                  if (usage > 80n) {
                      await sendAlert(`Daily bridge usage at ${usage}%`);
                  }
              }

              ### Multi-Sig Setup Example
              
              ```solidity
              contract SecureAdmin is Ownable {
                  struct Proposal {
                      address target;
                      bytes data;
                      uint256 value;
                      uint256 approvals;
                      bool executed;
                      mapping(address => bool) hasApproved;
                  }
                  
                  mapping(uint256 => Proposal) public proposals;
                  uint256 public proposalCount;
                  uint256 public requiredApprovals;
                  mapping(address => bool) public isSigner;
                  
                  event ProposalCreated(uint256 indexed id, address indexed target);
                  event ProposalApproved(uint256 indexed id, address indexed signer);
                  event ProposalExecuted(uint256 indexed id);
                  
                  modifier onlySigner() {
                      require(isSigner[msg.sender], "Not signer");
                      _;
                  }
                  
                  function propose(
                      address target,
                      bytes calldata data,
                      uint256 value
                  ) external onlySigner returns (uint256) {
                      uint256 id = ++proposalCount;
                      Proposal storage p = proposals[id];
                      p.target = target;
                      p.data = data;
                      p.value = value;
                      
                      emit ProposalCreated(id, target);
                      return id;
                  }
                  
                  function approve(uint256 proposalId) external onlySigner {
                      Proposal storage p = proposals[proposalId];
                      require(!p.executed, "Already executed");
                      require(!p.hasApproved[msg.sender], "Already approved");
                      
                      p.hasApproved[msg.sender] = true;
                      p.approvals++;
                      
                      emit ProposalApproved(proposalId, msg.sender);
                      
                      if (p.approvals >= requiredApprovals) {
                          execute(proposalId);
                      }
                  }
                  
                  function execute(uint256 proposalId) public {
                      Proposal storage p = proposals[proposalId];
                      require(p.approvals >= requiredApprovals, "Insufficient approvals");
                      require(!p.executed, "Already executed");
                      
                      p.executed = true;
                      
                      (bool success, ) = p.target.call{value: p.value}(p.data);
                      require(success, "Execution failed");
                      
                      emit ProposalExecuted(proposalId);
                  }
              }
              ```
              

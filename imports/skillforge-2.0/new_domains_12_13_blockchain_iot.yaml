              ```tsx
              // app/hooks/useListings.ts
              'use client';
              
              import { useQuery } from '@tanstack/react-query';
              
              const SUBGRAPH_URL = 'https://api.thegraph.com/subgraphs/name/your/nft-marketplace';
              
              const GET_LISTINGS = `
                query GetListings {
                  listings(where: { active: true }, orderBy: createdAt, orderDirection: desc) {
                    id
                    listingId
                    nftContract
                    tokenId
                    price
                    seller {
                      id
                    }
                  }
                }
              `;
              
              export function useListings() {
                return useQuery({
                  queryKey: ['listings'],
                  queryFn: async () => {
                    const response = await fetch(SUBGRAPH_URL, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ query: GET_LISTINGS }),
                    });
                    const data = await response.json();
                    return data.data.listings;
                  },
                  refetchInterval: 10000, // Refetch every 10 seconds
                });
              }

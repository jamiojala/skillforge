              ### Firmware Signing
              
              ```python
              # scripts/sign_firmware.py
              import hashlib
              import json
              from pathlib import Path
              from cryptography.hazmat.primitives import hashes, serialization
              from cryptography.hazmat.primitives.asymmetric import padding, rsa
              from cryptography.exceptions import InvalidSignature
              
              class FirmwareSigner:
                  def __init__(self, private_key_path: str):
                      with open(private_key_path, 'rb') as f:
                          self.private_key = serialization.load_pem_private_key(f.read(), password=None)
                  
                  def sign_firmware(self, firmware_path: str, version: str) -> dict:
                      """Sign firmware and create manifest"""
                      
                      # Read firmware
                      with open(firmware_path, 'rb') as f:
                          firmware_data = f.read()
                      
                      # Calculate hash
                      firmware_hash = hashlib.sha256(firmware_data).hexdigest()
                      
                      # Create manifest
                      manifest = {
                          'version': version,
                          'filename': Path(firmware_path).name,
                          'size': len(firmware_data),
                          'hash': firmware_hash,
                          'algorithm': 'sha256',
                          'timestamp': int(time.time()),
                          'hardware_compatibility': ['hw-v1', 'hw-v2']
                      }
                      
                      # Sign manifest
                      manifest_json = json.dumps(manifest, sort_keys=True).encode()
                      signature = self.private_key.sign(
                          manifest_json,
                          padding.PSS(mgf=padding.MGF1(hashes.SHA256()), salt_length=padding.PSS.MAX_LENGTH),
                          hashes.SHA256()
                      )
                      
                      manifest['signature'] = signature.hex()
                      
                      return manifest
                  
                  def save_manifest(self, manifest: dict, output_path: str):
                      """Save manifest to file"""
                      with open(output_path, 'w') as f:
                          json.dump(manifest, f, indent=2)
              
              class FirmwareVerifier:
                  def __init__(self, public_key_path: str):
                      with open(public_key_path, 'rb') as f:
                          self.public_key = serialization.load_pem_public_key(f.read())
                  
                  def verify_firmware(self, firmware_path: str, manifest: dict) -> bool:
                      """Verify firmware against manifest"""
                      
                      # Verify file size
                      actual_size = Path(firmware_path).stat().st_size
                      if actual_size != manifest['size']:
                          raise ValueError(f"Size mismatch: {actual_size} != {manifest['size']}")
                      
                      # Verify hash
                      with open(firmware_path, 'rb') as f:
                          actual_hash = hashlib.sha256(f.read()).hexdigest()
                      if actual_hash != manifest['hash']:
                          raise ValueError(f"Hash mismatch: {actual_hash} != {manifest['hash']}")
                      
                      # Verify signature
                      manifest_copy = manifest.copy()
                      signature = bytes.fromhex(manifest_copy.pop('signature'))
                      manifest_json = json.dumps(manifest_copy, sort_keys=True).encode()
                      
                      try:
                          self.public_key.verify(
                              signature,
                              manifest_json,
                              padding.PSS(mgf=padding.MGF1(hashes.SHA256()), salt_length=padding.PSS.MAX_LENGTH),
                              hashes.SHA256()
                          )
                          return True
                      except InvalidSignature:
                          return False
              
              # Usage
              if __name__ == '__main__':
                  import time
                  
                  # Sign firmware
                  signer = FirmwareSigner('keys/private.pem')
                  manifest = signer.sign_firmware('firmware/app-v1.2.0.bin', '1.2.0')
                  signer.save_manifest(manifest, 'firmware/manifest-v1.2.0.json')
                  
                  # Verify firmware
                  verifier = FirmwareVerifier('keys/public.pem')
                  is_valid = verifier.verify_firmware('firmware/app-v1.2.0.bin', manifest)
                  print(f"Firmware valid: {is_valid}")
              ```
              
              ### Device Update Client
              
              ```python
              # device/update_client.py
              import json
              import hashlib
              import requests
              import subprocess
              import os
              import time
              from pathlib import Path
              from dataclasses import dataclass
              from enum import Enum
              
              class UpdateState(Enum):
                  IDLE = "idle"
                  CHECKING = "checking"
                  DOWNLOADING = "downloading"
                  VERIFYING = "verifying"
                  INSTALLING = "installing"
                  HEALTH_CHECK = "health_check"
                  ROLLING_BACK = "rolling_back"
                  COMPLETED = "completed"
                  FAILED = "failed"
              
              @dataclass
              class UpdateManifest:
                  version: str
                  filename: str
                  size: int
                  hash: str
                  signature: str
                  download_url: str
              
              class OTAUpdateClient:
                  def __init__(
                      self,
                      device_id: str,
                      current_version: str,
                      update_server: str,
                      public_key_path: str,
                      partition_a: str = '/dev/mmcblk0p2',
                      partition_b: str = '/dev/mmcblk0p3'
                  ):
                      self.device_id = device_id
                      self.current_version = current_version
                      self.update_server = update_server
                      self.partition_a = partition_a
                      self.partition_b = partition_b
                      self.active_partition = self._get_active_partition()
                      self.state = UpdateState.IDLE
                      
                      # Load verification key
                      with open(public_key_path, 'rb') as f:
                          from cryptography.hazmat.primitives import serialization
                          self.public_key = serialization.load_pem_public_key(f.read())
                  
                  def _get_active_partition(self) -> str:
                      """Get currently active partition"""
                      result = subprocess.run(
                          ['mount'], capture_output=True, text=True
                      )
                      if self.partition_a in result.stdout:
                          return 'A'
                      return 'B'
                  
                  def check_for_update(self) -> UpdateManifest:
                      """Check for available updates"""
                      self.state = UpdateState.CHECKING
                      
                      try:
                          response = requests.get(
                              f"{self.update_server}/api/v1/updates",
                              params={
                                  'device_id': self.device_id,
                                  'current_version': self.current_version
                              },
                              timeout=30
                          )
                          response.raise_for_status()
                          
                          data = response.json()
                          if data.get('update_available'):
                              return UpdateManifest(
                                  version=data['version'],
                                  filename=data['filename'],
                                  size=data['size'],
                                  hash=data['hash'],
                                  signature=data['signature'],
                                  download_url=data['download_url']
                              )
                          return None
                      except Exception as e:
                          self._report_error(f"Update check failed: {e}")
                          return None
                  
                  def download_firmware(self, manifest: UpdateManifest, download_path: str) -> bool:
                      """Download firmware from server"""
                      self.state = UpdateState.DOWNLOADING
                      
                      try:
                          response = requests.get(
                              manifest.download_url,
                              stream=True,
                              timeout=300
                          )
                          response.raise_for_status()
                          
                          with open(download_path, 'wb') as f:
                              for chunk in response.iter_content(chunk_size=8192):
                                  f.write(chunk)
                          
                          # Verify size
                          actual_size = Path(download_path).stat().st_size
                          if actual_size != manifest.size:
                              raise ValueError(f"Size mismatch: {actual_size} != {manifest.size}")
                          
                          return True
                      except Exception as e:
                          self._report_error(f"Download failed: {e}")
                          return False
                  
                  def verify_firmware(self, firmware_path: str, manifest: UpdateManifest) -> bool:
                      """Verify firmware integrity and signature"""
                      self.state = UpdateState.VERIFYING
                      
                      try:
                          # Verify hash
                          with open(firmware_path, 'rb') as f:
                              actual_hash = hashlib.sha256(f.read()).hexdigest()
                          if actual_hash != manifest.hash:
                              raise ValueError(f"Hash mismatch")
                          
                          # Verify signature
                          manifest_dict = {
                              'version': manifest.version,
                              'filename': manifest.filename,
                              'size': manifest.size,
                              'hash': manifest.hash,
                              'algorithm': 'sha256',
                          }
                          manifest_json = json.dumps(manifest_dict, sort_keys=True).encode()
                          signature = bytes.fromhex(manifest.signature)
                          
                          from cryptography.hazmat.primitives import hashes, padding
                          self.public_key.verify(
                              signature,
                              manifest_json,
                              padding.PSS(mgf=padding.MGF1(hashes.SHA256()), salt_length=padding.PSS.MAX_LENGTH),
                              hashes.SHA256()
                          )
                          
                          return True
                      except Exception as e:
                          self._report_error(f"Verification failed: {e}")
                          return False
                  
                  def install_firmware(self, firmware_path: str) -> bool:
                      """Install firmware to inactive partition"""
                      self.state = UpdateState.INSTALLING
                      
                      target_partition = self.partition_b if self.active_partition == 'A' else self.partition_a
                      
                      try:
                          # Write firmware to partition
                          subprocess.run([
                              'dd', f'if={firmware_path}', f'of={target_partition}', 'bs=4M', 'status=progress'
                          ], check=True)
                          
                          # Sync filesystem
                          subprocess.run(['sync'], check=True)
                          
                          return True
                      except Exception as e:
                          self._report_error(f"Installation failed: {e}")
                          return False
                  
                  def perform_health_check(self) -> bool:
                      """Perform system health check after update"""
                      self.state = UpdateState.HEALTH_CHECK
                      
                      checks = [
                          self._check_connectivity,
                          self._check_sensors,
                          self._check_memory,
                          self._check_disk_space,
                      ]
                      
                      for check in checks:
                          if not check():
                              return False
                      
                      return True
                  
                  def _check_connectivity(self) -> bool:
                      """Check network connectivity"""
                      try:
                          subprocess.run(['ping', '-c', '3', '8.8.8.8'], check=True, capture_output=True)
                          return True
                      except:
                          return False
                  
                  def _check_sensors(self) -> bool:
                      """Check sensor functionality"""
                      # Implementation depends on hardware
                      return True
                  
                  def _check_memory(self) -> bool:
                      """Check available memory"""
                      try:
                          result = subprocess.run(['free', '-m'], capture_output=True, text=True)
                          # Parse and check memory
                          return True
                      except:
                          return False
                  
                  def _check_disk_space(self) -> bool:
                      """Check disk space"""
                      try:
                          result = subprocess.run(['df', '-h', '/'], capture_output=True, text=True)
                          # Parse and check disk space
                          return True
                      except:
                          return False
                  
                  def rollback(self):
                      """Rollback to previous version"""
                      self.state = UpdateState.ROLLING_BACK
                      
                      # Switch back to previous partition
                      previous_partition = 'A' if self.active_partition == 'B' else 'B'
                      self._switch_partition(previous_partition)
                  
                  def _switch_partition(self, partition: str):
                      """Switch active partition"""
                      # Implementation depends on bootloader (e.g., U-Boot, GRUB)
                      # Update boot flags or environment variables
                      pass
                  
                  def _report_error(self, error: str):
                      """Report error to server"""
                      self.state = UpdateState.FAILED
                      try:
                          requests.post(
                              f"{self.update_server}/api/v1/errors",
                              json={
                                  'device_id': self.device_id,
                                  'error': error,
                                  'timestamp': int(time.time())
                              }
                          )
                      except:
                          pass
                  
                  def perform_update(self) -> bool:
                      """Full update workflow"""
                      try:
                          # Check for update
                          manifest = self.check_for_update()
                          if not manifest:
                              print("No update available")
                              return False
                          
                          print(f"Update available: {manifest.version}")
                          
                          # Download
                          download_path = f"/tmp/{manifest.filename}"
                          if not self.download_firmware(manifest, download_path):
                              return False
                          
                          # Verify
                          if not self.verify_firmware(download_path, manifest):
                              return False
                          
                          # Install
                          if not self.install_firmware(download_path):
                              return False
                          
                          # Switch partition
                          new_partition = 'B' if self.active_partition == 'A' else 'A'
                          self._switch_partition(new_partition)
                          
                          # Reboot and health check
                          print("Rebooting for update...")
                          subprocess.run(['reboot'])
                          
                          return True
                          
                      except Exception as e:
                          self._report_error(f"Update failed: {e}")
                          return False
              
              # Usage
              if __name__ == '__main__':
                  client = OTAUpdateClient(
                      device_id='device-001',
                      current_version='1.1.0',
                      update_server='https://updates.example.com',
                      public_key_path='/opt/keys/public.pem'
                  )
                  
                  # Check if this is a post-reboot health check
                  if os.path.exists('/tmp/update_in_progress'):
                      if not client.perform_health_check():
                          print("Health check failed, rolling back...")
                          client.rollback()
                      else:
                          print("Update successful!")
                          os.remove('/tmp/update_in_progress')
                  else:
                      # Normal update check
                      client.perform_update()

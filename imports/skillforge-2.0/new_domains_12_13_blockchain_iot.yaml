              ```graphql
              # subgraph/schema.graphql
              type Listing @entity {
                id: ID!
                listingId: Bytes!
                seller: User!
                nftContract: Bytes!
                tokenId: BigInt!
                price: BigInt!
                active: Boolean!
                createdAt: BigInt!
                sale: Sale
              }
              
              type Auction @entity {
                id: ID!
                auctionId: Bytes!
                seller: User!
                nftContract: Bytes!
                tokenId: BigInt!
                startPrice: BigInt!
                highestBid: BigInt!
                highestBidder: User
                endTime: BigInt!
                active: Boolean!
                bids: [Bid!]! @derivedFrom(field: "auction")
              }
              
              type Bid @entity {
                id: ID!
                auction: Auction!
                bidder: User!
                amount: BigInt!
                timestamp: BigInt!
              }
              
              type Sale @entity {
                id: ID!
                listing: Listing!
                buyer: User!
                price: BigInt!
                timestamp: BigInt!
              }
              
              type User @entity {
                id: ID!
                listings: [Listing!]! @derivedFrom(field: "seller")
                auctions: [Auction!]! @derivedFrom(field: "seller")
                bids: [Bid!]! @derivedFrom(field: "bidder")
                purchases: [Sale!]! @derivedFrom(field: "buyer")
              }

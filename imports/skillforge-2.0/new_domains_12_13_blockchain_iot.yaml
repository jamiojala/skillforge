              ### Server Implementation
              
              ```python
              # federated/server.py
              import tensorflow as tf
              import numpy as np
              import asyncio
              import grpc
              from concurrent import futures
              import logging
              from typing import List, Dict, Tuple
              import json
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              class FederatedServer:
                  def __init__(
                      self,
                      model: tf.keras.Model,
                      num_rounds: int = 100,
                      clients_per_round: int = 10,
                      fraction_fit: float = 0.1
                  ):
                      self.global_model = model
                      self.num_rounds = num_rounds
                      self.clients_per_round = clients_per_round
                      self.fraction_fit = fraction_fit
                      
                      self.client_updates: List[Tuple[List[np.ndarray], int]] = []
                      self.current_round = 0
                      
                      # Metrics
                      self.training_history = []
                  
                  def get_global_weights(self) -> List[np.ndarray]:
                      """Get current global model weights"""
                      return self.global_model.get_weights()
                  
                  def federated_average(
                      self,
                      client_updates: List[Tuple[List[np.ndarray], int]]
                  ) -> List[np.ndarray]:
                      """Aggregate client updates using weighted average"""
                      
                      # Calculate total samples
                      total_samples = sum(num_samples for _, num_samples in client_updates)
                      
                      # Initialize aggregated weights
                      aggregated_weights = []
                      
                      # Weighted average for each layer
                      for layer_idx in range(len(client_updates[0][0])):
                          layer_sum = np.zeros_like(client_updates[0][0][layer_idx])
                          
                          for weights, num_samples in client_updates:
                              weight = num_samples / total_samples
                              layer_sum += weights[layer_idx] * weight
                          
                          aggregated_weights.append(layer_sum)
                      
                      return aggregated_weights
                  
                  def aggregate_with_differential_privacy(
                      self,
                      client_updates: List[Tuple[List[np.ndarray], int]],
                      noise_multiplier: float = 1.0,
                      max_grad_norm: float = 1.0
                  ) -> List[np.ndarray]:
                      """Aggregate with differential privacy (DP-SGD)"""
                      
                      # Clip gradients
                      clipped_updates = []
                      for weights, num_samples in client_updates:
                          # Calculate global norm
                          global_norm = np.sqrt(sum(
                              np.sum(np.square(w)) for w in weights
                          ))
                          
                          # Clip
                          clip_factor = min(1.0, max_grad_norm / (global_norm + 1e-10))
                          clipped_weights = [w * clip_factor for w in weights]
                          clipped_updates.append((clipped_weights, num_samples))
                      
                      # Aggregate
                      aggregated = self.federated_average(clipped_updates)
                      
                      # Add noise
                      noisy_weights = []
                      for weight in aggregated:
                          noise = np.random.normal(
                              0,
                              noise_multiplier * max_grad_norm / len(client_updates),
                              weight.shape
                          )
                          noisy_weights.append(weight + noise)
                      
                      return noisy_weights
                  
                  def select_clients(
                      self,
                      available_clients: List[str]
                  ) -> List[str]:
                      """Select clients for current round"""
                      
                      num_clients = max(1, int(len(available_clients) * self.fraction_fit))
                      num_clients = min(num_clients, self.clients_per_round)
                      
                      selected = np.random.choice(
                          available_clients,
                          size=num_clients,
                          replace=False
                      )
                      
                      return list(selected)
                  
                  async def training_round(self, client_stubs: Dict[str, any]):
                      """Execute one round of federated training"""
                      
                      logger.info(f"Starting round {self.current_round + 1}/{self.num_rounds}")
                      
                      # Select clients
                      selected_clients = self.select_clients(list(client_stubs.keys()))
                      logger.info(f"Selected {len(selected_clients)} clients")
                      
                      # Get global weights
                      global_weights = self.get_global_weights()
                      
                      # Train on selected clients (in parallel)
                      client_updates = []
                      
                      async def train_client(client_id: str):
                          try:
                              stub = client_stubs[client_id]
                              
                              # Send global model and train
                              response = await stub.Train(
                                  global_weights,
                                  timeout=300  # 5 minute timeout
                              )
                              
                              return (response.weights, response.num_samples)
                          except Exception as e:
                              logger.error(f"Client {client_id} training failed: {e}")
                              return None
                      
                      # Execute training in parallel
                      tasks = [train_client(cid) for cid in selected_clients]
                      results = await asyncio.gather(*tasks)
                      
                      # Collect successful updates
                      client_updates = [r for r in results if r is not None]
                      
                      if not client_updates:
                          logger.warning("No successful client updates")
                          return
                      
                      # Aggregate
                      aggregated_weights = self.federated_average(client_updates)
                      
                      # Update global model
                      self.global_model.set_weights(aggregated_weights)
                      
                      # Log metrics
                      self.training_history.append({
                          'round': self.current_round,
                          'participating_clients': len(client_updates),
                          'total_samples': sum(n for _, n in client_updates)
                      })
                      
                      logger.info(f"Round {self.current_round + 1} complete")
                      self.current_round += 1
                  
                  def evaluate(self, test_data: Tuple[np.ndarray, np.ndarray]) -> Dict:
                      """Evaluate global model"""
                      
                      X_test, y_test = test_data
                      
                      loss, accuracy = self.global_model.evaluate(X_test, y_test, verbose=0)
                      
                      return {
                          'loss': loss,
                          'accuracy': accuracy,
                          'round': self.current_round
                      }
                  
                  def save_model(self, path: str):
                      """Save global model"""
                      self.global_model.save(path)
                      logger.info(f"Model saved to {path}")
              
              # gRPC service definition
              '''
              // federated/federated.proto
              syntax = "proto3";
              
              service FederatedService {
                rpc GetGlobalModel(Empty) returns (ModelWeights);
                rpc Train(ModelWeights) returns (ClientUpdate);
                rpc GetMetrics(Empty) returns (Metrics);
              }
              
              message Empty {}
              
              message ModelWeights {
                repeated bytes weights = 1;
              }
              
              message ClientUpdate {
                repeated bytes weights = 1;
                int32 num_samples = 2;
                float loss = 3;
              }
              
              message Metrics {
                float accuracy = 1;
                float loss = 2;
                int32 round = 3;
              }
              '''
              
              # Run server
              if __name__ == '__main__':
                  # Create model
                  model = tf.keras.Sequential([
                      tf.keras.layers.Dense(128, activation='relu', input_shape=(784,)),
                      tf.keras.layers.Dropout(0.2),
                      tf.keras.layers.Dense(64, activation='relu'),
                      tf.keras.layers.Dense(10, activation='softmax')
                  ])
                  
                  model.compile(
                      optimizer='adam',
                      loss='sparse_categorical_crossentropy',
                      metrics=['accuracy']
                  )
                  
                  # Initialize server
                  server = FederatedServer(
                      model=model,
                      num_rounds=100,
                      clients_per_round=10
                  )
                  
                  # Start gRPC server
                  # (Implementation depends on generated protobuf code)

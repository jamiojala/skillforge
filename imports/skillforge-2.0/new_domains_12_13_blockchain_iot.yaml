              ```python
              # monitoring/security_dashboard.py
              from flask import Flask, jsonify
              import subprocess
              import json
              from datetime import datetime
              
              app = Flask(__name__)
              
              @app.route('/api/security/status')
              def security_status():
                  """Get current security status"""
                  
                  # Check secure boot status
                  secure_boot = _check_secure_boot()
                  
                  # Check disk encryption
                  encryption = _check_encryption()
                  
                  # Check firewall status
                  firewall = _check_firewall()
                  
                  # Check SSH hardening
                  ssh = _check_ssh_hardening()
                  
                  # Recent security events
                  events = _get_recent_security_events()
                  
                  return jsonify({
                      'timestamp': datetime.now().isoformat(),
                      'secure_boot': secure_boot,
                      'disk_encryption': encryption,
                      'firewall': firewall,
                      'ssh_hardening': ssh,
                      'recent_events': events,
                      'overall_score': _calculate_security_score(
                          secure_boot, encryption, firewall, ssh
                      )
                  })
              
              def _check_secure_boot() -> dict:
                  try:
                      result = subprocess.run(
                          ['mokutil', '--sb-state'],
                          capture_output=True,
                          text=True
                      )
                      enabled = 'SecureBoot enabled' in result.stdout
                      return {'enabled': enabled, 'status': 'ok' if enabled else 'warning'}
                  except:
                      return {'enabled': False, 'status': 'unknown'}
              
              def _check_encryption() -> dict:
                  try:
                      result = subprocess.run(
                          ['cryptsetup', 'status', 'encrypted-data'],
                          capture_output=True,
                          text=True
                      )
                      active = result.returncode == 0
                      return {'active': active, 'status': 'ok' if active else 'warning'}
                  except:
                      return {'active': False, 'status': 'unknown'}
              
              def _check_firewall() -> dict:
                  try:
                      result = subprocess.run(
                          ['iptables', '-L', '-n'],
                          capture_output=True,
                          text=True
                      )
                      configured = 'DROP' in result.stdout
                      return {'configured': configured, 'status': 'ok' if configured else 'warning'}
                  except:
                      return {'configured': False, 'status': 'unknown'}
              
              def _check_ssh_hardening() -> dict:
                  try:
                      with open('/etc/ssh/sshd_config', 'r') as f:
                          config = f.read()
                      
                      checks = {
                          'root_disabled': 'PermitRootLogin no' in config,
                          'password_disabled': 'PasswordAuthentication no' in config,
                          'key_only': 'PubkeyAuthentication yes' in config,
                      }
                      
                      score = sum(checks.values()) / len(checks)
                      return {
                          'checks': checks,
                          'score': score,
                          'status': 'ok' if score >= 0.8 else 'warning'
                      }
                  except:
                      return {'status': 'unknown'}
              
              def _get_recent_security_events(self, limit: int = 10) -> list:
                  try:
                      result = subprocess.run(
                          ['grep', '-i', 'security', '/var/log/syslog'],
                          capture_output=True,
                          text=True
                      )
                      lines = result.stdout.strip().split('\n')[-limit:]
                      return [{'message': line} for line in lines if line]
                  except:
                      return []
              
              def _calculate_security_score(*checks) -> int:
                  scores = []
                  for check in checks:
                      if isinstance(check, dict):
                          if check.get('status') == 'ok':
                              scores.append(100)
                          elif check.get('status') == 'warning':
                              scores.append(50)
                          else:
                              scores.append(0)
                  return int(sum(scores) / len(scores)) if scores else 0
              
              if __name__ == '__main__':
                  app.run(host='0.0.0.0', port=5001)
              ```

              ```typescript
              // subgraph/src/mapping.ts
              import {
                ItemListed,
                ItemSold,
                AuctionCreated,
                BidPlaced,
                AuctionEnded,
              } from '../generated/NFTMarketplace/NFTMarketplace';
              import { Listing, Auction, Bid, Sale, User } from '../generated/schema';
              import { Address, Bytes } from '@graphprotocol/graph-ts';
              
              function getOrCreateUser(address: Address): User {
                let user = User.load(address.toHex());
                if (!user) {
                  user = new User(address.toHex());
                  user.save();
                }
                return user;
              }
              
              export function handleItemListed(event: ItemListed): void {
                let listing = new Listing(event.params.listingId.toHex());
                listing.listingId = event.params.listingId;
                listing.seller = getOrCreateUser(event.params.seller).id;
                listing.nftContract = event.params.nftContract;
                listing.tokenId = event.params.tokenId;
                listing.price = event.params.price;
                listing.active = true;
                listing.createdAt = event.block.timestamp;
                listing.save();
              }
              
              export function handleItemSold(event: ItemSold): void {
                let listing = Listing.load(event.params.listingId.toHex());
                if (listing) {
                  listing.active = false;
                  listing.save();
                  
                  let sale = new Sale(event.transaction.hash.toHex());
                  sale.listing = listing.id;
                  sale.buyer = getOrCreateUser(event.params.buyer).id;
                  sale.price = event.params.price;
                  sale.timestamp = event.block.timestamp;
                  sale.save();
                }
              }
              
              // ... similar handlers for auctions and bids
              ```
              
              ### Frontend Components
              
              ```tsx
              // app/components/NFTCard.tsx
              'use client';
              
              import { useAccount, useWriteContract } from 'wagmi';
              import { formatEther } from 'viem';
              import { MARKETPLACE_ABI, MARKETPLACE_ADDRESS } from '@/config/contracts';
              
              interface NFTCardProps {
                listing: {
                  id: string;
                  listingId: string;
                  nftContract: string;
                  tokenId: string;
                  price: string;
                  seller: { id: string };
                };
              }
              
              export function NFTCard({ listing }: NFTCardProps) {
                const { address } = useAccount();
                const { writeContract, isPending } = useWriteContract();
                
                const handleBuy = () => {
                  writeContract({
                    address: MARKETPLACE_ADDRESS,
                    abi: MARKETPLACE_ABI,
                    functionName: 'buyItem',
                    args: [listing.listingId as `0x${string}`],
                    value: BigInt(listing.price),
                  });
                };
                
                const isOwner = address?.toLowerCase() === listing.seller.id.toLowerCase();
                
                return (
                  <div className="nft-card">
                    <img
                      src={`https://ipfs.io/ipfs/${listing.tokenId}`}
                      alt={`NFT ${listing.tokenId}`}
                    />
                    <div className="nft-info">
                      <p className="price">{formatEther(BigInt(listing.price))} ETH</p>
                      <p className="seller">Seller: {listing.seller.id.slice(0, 6)}...</p>
                      {!isOwner && (
                        <button onClick={handleBuy} disabled={isPending}>
                          {isPending ? 'Buying...' : 'Buy Now'}
                        </button>
                      )}
                    </div>
                  </div>
                );
              }

              ### Load Testing
              
              ```python
              # testing/load_test.py
              import asyncio
              import aiohttp
              import time
              import numpy as np
              from typing import List
              
              async def make_request(
                  session: aiohttp.ClientSession,
                  url: str,
                  data: dict
              ) -> float:
                  """Make a single prediction request"""
                  
                  start = time.time()
                  
                  async with session.post(url, json=data) as response:
                      await response.json()
                      
                  return time.time() - start
              
              async def load_test(
                  url: str,
                  num_requests: int = 1000,
                  concurrency: int = 50
              ):
                  """Run load test"""
                  
                  # Sample data
                  sample_data = {
                      "instances": [[0.1] * 784]  # MNIST-sized input
                  }
                  
                  # Create semaphore for concurrency control
                  semaphore = asyncio.Semaphore(concurrency)
                  
                  async def bounded_request(session):
                      async with semaphore:
                          return await make_request(session, url, sample_data)
                  
                  # Run requests
                  async with aiohttp.ClientSession() as session:
                      start = time.time()
                      
                      tasks = [bounded_request(session) for _ in range(num_requests)]
                      latencies = await asyncio.gather(*tasks)
                      
                      total_time = time.time() - start
                  
                  # Calculate metrics
                  latencies_ms = [l * 1000 for l in latencies]
                  
                  print(f"Load Test Results:")
                  print(f"  Total requests: {num_requests}")
                  print(f"  Concurrency: {concurrency}")
                  print(f"  Total time: {total_time:.2f}s")
                  print(f"  Throughput: {num_requests/total_time:.2f} req/s")
                  print(f"  Latency (ms):")
                  print(f"    Mean: {np.mean(latencies_ms):.2f}")
                  print(f"    P50: {np.percentile(latencies_ms, 50):.2f}")
                  print(f"    P95: {np.percentile(latencies_ms, 95):.2f}")
                  print(f"    P99: {np.percentile(latencies_ms, 99):.2f}")
                  print(f"    Max: {np.max(latencies_ms):.2f}")
              
              # Run
              if __name__ == '__main__':
                  asyncio.run(load_test(
                      url='http://localhost:8080/v1/models/default:predict',
                      num_requests=1000,
                      concurrency=50
                  ))
              ```

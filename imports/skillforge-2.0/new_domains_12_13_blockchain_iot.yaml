              ### Client Implementation
              
              ```python
              # federated/client.py
              import tensorflow as tf
              import numpy as np
              import asyncio
              import grpc
              from typing import Tuple, List
              import logging
              
              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)
              
              class FederatedClient:
                  def __init__(
                      self,
                      client_id: str,
                      model: tf.keras.Model,
                      local_data: Tuple[np.ndarray, np.ndarray],
                      epochs: int = 5,
                      batch_size: int = 32
                  ):
                      self.client_id = client_id
                      self.model = model
                      self.X_train, self.y_train = local_data
                      self.epochs = epochs
                      self.batch_size = batch_size
                      
                      logger.info(f"Client {client_id} initialized with {len(self.X_train)} samples")
                  
                  def set_weights(self, weights: List[np.ndarray]):
                      """Set model weights from server"""
                      self.model.set_weights(weights)
                  
                  def get_weights(self) -> List[np.ndarray]:
                      """Get current model weights"""
                      return self.model.get_weights()
                  
                  def local_train(self) -> Tuple[List[np.ndarray], int, float]:
                      """Train on local data"""
                      
                      logger.info(f"Client {self.client_id} starting local training")
                      
                      # Train
                      history = self.model.fit(
                          self.X_train,
                          self.y_train,
                          epochs=self.epochs,
                          batch_size=self.batch_size,
                          verbose=0,
                          validation_split=0.1
                      )
                      
                      final_loss = history.history['loss'][-1]
                      
                      logger.info(f"Client {self.client_id} training complete. Loss: {final_loss:.4f}")
                      
                      return self.get_weights(), len(self.X_train), final_loss
                  
                  def evaluate_local(self) -> Tuple[float, float]:
                      """Evaluate on local validation set"""
                      
                      # Split data for validation
                      split_idx = int(0.9 * len(self.X_train))
                      X_val = self.X_train[split_idx:]
                      y_val = self.y_train[split_idx:]
                      
                      loss, accuracy = self.model.evaluate(X_val, y_val, verbose=0)
                      
                      return loss, accuracy
              
              # Client with differential privacy
              class PrivateFederatedClient(FederatedClient):
                  def __init__(
                      self,
                      client_id: str,
                      model: tf.keras.Model,
                      local_data: Tuple[np.ndarray, np.ndarray],
                      noise_multiplier: float = 1.0,
                      l2_norm_clip: float = 1.0,
                      **kwargs
                  ):
                      super().__init__(client_id, model, local_data, **kwargs)
                      self.noise_multiplier = noise_multiplier
                      self.l2_norm_clip = l2_norm_clip
                  
                  def local_train_with_dp(self) -> Tuple[List[np.ndarray], int, float]:
                      """Train with differential privacy"""
                      
                      import tensorflow_privacy as tfp
                      
                      # Create DP optimizer
                      optimizer = tfp.DPKerasSGDOptimizer(
                          l2_norm_clip=self.l2_norm_clip,
                          noise_multiplier=self.noise_multiplier,
                          num_microbatches=1,
                          learning_rate=0.01
                      )
                      
                      # Compute loss
                      loss = tf.keras.losses.SparseCategoricalCrossentropy(
                          from_logits=True,
                          reduction=tf.losses.Reduction.NONE
                      )
                      
                      # Compile with DP
                      self.model.compile(optimizer=optimizer, loss=loss, metrics=['accuracy'])
                      
                      # Train
                      history = self.model.fit(
                          self.X_train,
                          self.y_train,
                          epochs=self.epochs,
                          batch_size=self.batch_size,
                          verbose=0
                      )
                      
                      return self.get_weights(), len(self.X_train), history.history['loss'][-1]
              

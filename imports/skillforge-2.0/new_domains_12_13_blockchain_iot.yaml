        examples:
          - name: "Reentrancy Vulnerability Audit"
            user: "Can you audit this withdrawal function for security issues?\n```solidity\nfunction withdraw(uint256 amount) external {\n    require(balances[msg.sender] >= amount, \"Insufficient balance\");\n    (bool success, ) = msg.sender.call{value: amount}(\"\");\n    require(success, \"Transfer failed\");\n    balances[msg.sender] -= amount;\n}\n```"
            ai_response: |
              ## Security Audit Finding
              
              ### Severity: CRITICAL
              
              **Vulnerability**: Reentrancy Attack (SWC-107)
              
              **Description**: The contract sends Ether BEFORE updating the balance state. An attacker can recursively call `withdraw()` before the balance is deducted, draining the contract.
              
              ### Proof of Concept
              
              ```solidity
              contract Attacker {
                  VulnerableBank public target;
                  
                  function attack() external payable {
                      target.deposit{value: msg.value}();
                      target.withdraw(msg.value);
                  }
                  
                  receive() external payable {
                      if (address(target).balance >= msg.value) {
                          target.withdraw(msg.value); // Reentrant call!
                      }
                  }
              }
              ```
              
              ### Remediation
              
              ```solidity
              // Option 1: Checks-Effects-Interactions Pattern (Recommended)
              function withdraw(uint256 amount) external nonReentrant {
                  require(balances[msg.sender] >= amount, "Insufficient balance");
                  
                  // EFFECTS: Update state BEFORE external call
                  balances[msg.sender] -= amount;
                  totalDeposits -= amount;
                  
                  // INTERACTIONS: External call last
                  (bool success, ) = msg.sender.call{value: amount}("");
                  require(success, "Transfer failed");
                  
                  emit Withdrawal(msg.sender, amount);
              }
              
              // Option 2: ReentrancyGuard (Additional protection)
              import "@openzeppelin/contracts/security/ReentrancyGuard.sol";
              
              contract SecureBank is ReentrancyGuard {
                  function withdraw(uint256 amount) external nonReentrant {
                      // ... same as above
                  }
              }
              ```
              
              ### Additional Security Improvements
              
              ```solidity
              // Use pull over push pattern for withdrawals
              mapping(address => uint256) public pendingWithdrawals;
              
              function requestWithdrawal(uint256 amount) external {
                  require(balances[msg.sender] >= amount, "Insufficient balance");
                  balances[msg.sender] -= amount;
                  pendingWithdrawals[msg.sender] += amount;
                  emit WithdrawalRequested(msg.sender, amount);
              }
              
              function claimWithdrawal() external nonReentrant {
                  uint256 amount = pendingWithdrawals[msg.sender];
                  require(amount > 0, "No pending withdrawal");
                  pendingWithdrawals[msg.sender] = 0;
                  
                  (bool success, ) = msg.sender.call{value: amount}("");
                  require(success, "Transfer failed");
                  emit WithdrawalClaimed(msg.sender, amount);
              }
              ```
              
              ### Testing Recommendations
              
              ```solidity
              function testReentrancyProtection() public {
                  // Deploy attacker contract
                  Attacker attacker = new Attacker(address(bank));
                  
                  // Fund and attack
                  vm.deal(address(attacker), 1 ether);
                  attacker.attack{value: 1 ether}();
                  
                  // Verify attacker couldn't drain more than deposited
                  assertEq(address(bank).balance, INITIAL_BALANCE);
              }
              ```
            notes: "Shows critical finding with PoC, multiple remediation options, and comprehensive testing"
          
          - name: "Oracle Manipulation Audit"
            user: "My DeFi lending protocol uses Chainlink price feeds. What oracle risks should I be aware of?"
            ai_response: |
              ## Oracle Security Analysis
              
              ### Severity: HIGH
              
              **Vulnerability**: Oracle Manipulation & Price Feed Risks
              
              **Attack Vectors**:
              1. **Stale Prices**: Chainlink heartbeat exceeded
              2. **Price Deviation**: Sudden large price swings
              3. **Single Oracle Failure**: No fallback mechanism
              4. **Flash Loan Price Impact**: DEX price manipulation
              
              ### Current Vulnerable Pattern
              
              ```solidity
              // VULNERABLE: No validation
              function getCollateralValue(address user) public view returns (uint256) {
                  (, int256 price,,,) = priceFeed.latestRoundData();
                  return (collateral[user] * uint256(price)) / 1e8;
              }
              ```
              
              ### Secure Implementation
              
              ```solidity
              // SPDX-License-Identifier: MIT
              pragma solidity ^0.8.20;
              
              import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
              
              contract SecureLending {
                  AggregatorV3Interface public priceFeed;
                  uint256 public constant HEARTBEAT = 3600; // 1 hour
                  uint256 public constant MAX_PRICE_DEVIATION = 10; // 10%
                  uint256 public lastValidPrice;
                  uint256 public lastUpdateTime;
                  
                  struct PriceData {
                      uint256 price;
                      uint256 timestamp;
                      bool isValid;
                  }
                  
                  function getValidatedPrice() public view returns (uint256) {
                      (
                          uint80 roundId,
                          int256 price,
                          uint256 startedAt,
                          uint256 updatedAt,
                          uint80 answeredInRound
                      ) = priceFeed.latestRoundData();
                      
                      // Validation 1: Price must be positive
                      require(price > 0, "Invalid price");
                      
                      // Validation 2: Round must be complete
                      require(answeredInRound >= roundId, "Stale round");
                      
                      // Validation 3: Update within heartbeat
                      require(block.timestamp - updatedAt <= HEARTBEAT, "Stale price");
                      
                      // Validation 4: Started in the past
                      require(startedAt > 0 && startedAt <= block.timestamp, "Invalid timestamp");
                      
                      uint256 currentPrice = uint256(price);
                      
                      // Validation 5: Price deviation check
                      if (lastValidPrice > 0) {
                          uint256 deviation = currentPrice > lastValidPrice 
                              ? ((currentPrice - lastValidPrice) * 100) / lastValidPrice
                              : ((lastValidPrice - currentPrice) * 100) / lastValidPrice;
                          require(deviation <= MAX_PRICE_DEVIATION, "Price deviation too high");
                      }
                      
                      return currentPrice;
                  }
                  
                  // Multi-oracle fallback
                  function getPriceWithFallback() public view returns (uint256) {
                      try this.getValidatedPrice() returns (uint256 price) {
                          return price;
                      } catch {
                          // Fallback to secondary oracle or TWAP
                          return getTWAPPrice();
                      }
                  }
                  
                  function getTWAPPrice() internal view returns (uint256) {
                      // Implement Uniswap V3 TWAP as fallback
                      // ...
                  }
              }
              ```
              
              ### Additional Protections
              
              1. **Circuit Breakers**: Pause protocol on extreme price moves
              2. **TWAP Integration**: Time-weighted average for manipulation resistance
              3. **Multi-Oracle**: Chainlink + Uniswap TWAP + backup
              4. **Borrowing Limits**: Cap exposure per price feed
              
              ### Monitoring Setup
              
              ```javascript
              // Monitor for price anomalies
              priceFeed.on("AnswerUpdated", async (current, roundId, updatedAt) => {
                  const previous = await getPreviousPrice(roundId - 1);
                  const deviation = calculateDeviation(current, previous);
                  
                  if (deviation > THRESHOLD) {
                      await alertTeam("Price anomaly detected", { current, previous, deviation });
                      await triggerCircuitBreaker();
                  }
              });
              ```
              
              ### Testing Checklist
              - [ ] Test stale price rejection
              - [ ] Test deviation limit enforcement
              - [ ] Test fallback oracle activation
              - [ ] Test circuit breaker triggers
            notes: "Comprehensive oracle security analysis with multi-layered protection strategy"
        

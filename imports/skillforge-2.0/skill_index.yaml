# ============================================================
# USAGE GUIDE
# ============================================================
usage_guide:
  installation: |
    npm install -g skillforge
    skillforge init

  activation: |
    Skills activate automatically based on:
    1. File patterns in the codebase
    2. Code patterns detected
    3. Context from user queries

  marketplace: |
    skillforge search "security"
    skillforge install skill-name
    skillforge rate skill-name --stars 5

  delegation: |
    Primary model handles the main logic
    Secondary model provides validation
    Specialized models handle visual/audio content

  validation: |
    Each skill has associated validation hooks
    Hooks run automatically or on-demand
    Results feed back into skill refinement


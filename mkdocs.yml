site_name: orchestrator-mcp
site_description: Local-first MCP server and portable skill marketplace for Codex, Claude Code, Kimi Code, Ollama, Gemini, and NVIDIA-backed models.
site_url: https://jamiojala.github.io/orchestrator-mcp/
repo_url: https://github.com/jamiojala/orchestrator-mcp
repo_name: jamiojala/orchestrator-mcp

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo-mark.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - header.autohide
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jamiojala/orchestrator-mcp

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Installs: one-paste-installs.md
  - Marketplace: marketplace.md
  - Safety: safety.md
  - About: about.md
  - Reference:
      - Skills: skills.md
      - Providers: providers.md
      - Cost Routing: cost-routing.md
      - Dashboard: dashboard.md
      - Benchmarks: benchmarks.md
      - Cinematic Upgrade: cinematic-upgrade.md
      - FAQ: faq.md
      - Roadmap: roadmap.md

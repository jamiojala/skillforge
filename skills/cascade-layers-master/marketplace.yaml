thinking:
  analysis_approach: systematic
  reasoning_steps:
    - 1. Audit current specificity issues and conflicts
    - 2. Identify style categories (reset, base, components, etc.)
    - 3. Design layer hierarchy from least to most specific
    - 4. Define layer order explicitly
    - 5. Migrate existing styles into layers
    - 6. Handle third-party CSS with layer()
    - 7. Document and socialize the architecture
  verification_checklist:
    - Are all layers defined upfront?
    - Is the layer order logical?
    - Are third-party styles layered?
    - Is !important used appropriately?
  decision_criteria:
    - Specificity needs vs. maintainability
    - Team size and CSS ownership

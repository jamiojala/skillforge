    - Ignoring edge cases
    - Over-simplifying complex flows
thinking:
  analysis_approach: systematic
  reasoning_steps:
    - "Step 1: Parse SQL to extract AST"
    - "Step 2: Map source to target columns"
    - "Step 3: Capture transformation logic"
    - "Step 4: Build lineage graph"
    - "Step 5: Enable impact analysis"
    - "Step 6: Integrate with catalog"
    - "Step 7: Validate lineage accuracy"
  verification_checklist:
    - Column-level lineage is captured
    - All transformations are documented
    - Impact analysis is accurate
    - Lineage is queryable

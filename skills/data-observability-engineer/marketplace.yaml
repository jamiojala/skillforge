    - Vague monitoring
    - Ignoring patterns
thinking:
  analysis_approach: systematic
  reasoning_steps:
    - "Step 1: Identify critical data assets"
    - "Step 2: Define SLAs and thresholds"
    - "Step 3: Implement monitoring checks"
    - "Step 4: Set up anomaly detection"
    - "Step 5: Configure alerting"

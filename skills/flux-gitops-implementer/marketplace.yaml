  author: SkillForge Team
  license: MIT
  pricing_tier: free
  featured: false
  estimated_time_saved: 35-70 hours
  complexity: complex
  language_support:
    - yaml
  source_bundle: new_domain_04_05_qa_devops_skills.yaml

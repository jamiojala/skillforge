    - "Step 2: Determine latency requirements"
    - "Step 3: Choose windowing strategy"
    - "Step 4: Design stateful operations"
    - "Step 5: Plan watermark and late event handling"
  verification_checklist:
    - Is event time used correctly?
    - Are watermarks configured?
    - Is state bounded?
    - Is fault tolerance implemented?
  decision_criteria:
    - Need for real-time insights
    - Continuous event streams
    - Low latency requirements
    - Stateful operations needed
response_format:
  structure:
    - Event Source Analysis
    - Windowing Strategy

thinking:
  analysis_approach: systematic
  reasoning_steps:
    - "Step 1: Define role competencies and success criteria"
    - "Step 2: Design interview loops with coverage"
    - "Step 3: Create questions for each competency"
    - "Step 4: Develop detailed scoring rubrics"
    - "Step 5: Design bias mitigation strategies"
    - "Step 6: Create interviewer training materials"
    - "Step 7: Plan calibration and iteration process"
    - "Step 8: Measure prediction accuracy"
  verification_checklist:
    - Do questions map to competencies?
    - Are rubrics clear and specific?
    - Is the process consistent?
    - Are bias mitigations in place?
    - Is candidate experience respectful?
  decision_criteria:
    - Role level and requirements
    - Competencies to assess
    - Interview time available
    - Team size and hiring volume
response_format:
  structure:
    - 🎯 Role Analysis
    - 📋 Interview Loop Design
    - ❓ Question Bank
    - 📊 Rubric Design
    - ⚖️ Bias Mitigation
    - 👨‍🏫 Interviewer Training
    - 📈 Calibration & Iteration
  required_elements:
